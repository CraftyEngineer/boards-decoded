 answer Ireland. Hook: Potato + famine = Ireland ki tragedy.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H1-622", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Unification of Italy", "question": "Assertion (A): Giuseppe Mazzini was a revolutionary from Italy. Reason (R) : He founded underground organisations.", "answer": "(A) Both A and R are true and R is the correct explanation of A. Mazzini was indeed an Italian revolutionary, and he is called so because he founded secret/underground organisations - Young Italy and Young Europe - to spread his nationalist ideas.", "explanation": "Mazzini sach mein Italy ka revolutionary tha, aur isi liye kyunki usne 'Young Italy' aur 'Young Europe' jaisi underground organisations banaayi. Toh A aur R dono sach, R hi A ki wajah. Hook: Mazzini = secret societies ka baadshah.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 4}, {"key": "H1-624", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Language & nationalism (Poland)", "question": "Analyse the role of language in the development of nationalism in Poland during the nineteenth century.", "answer": "After Poland was partitioned and occupied by Russia, the Russian language was imposed and Polish was banned from schools. Polish then became a symbol of resistance: the clergy used Polish in churches and religious instruction, keeping the national language and identity alive against Russian dominance.", "explanation": "Poland pe Russia ka kabza tha aur usne schools mein Russian thop di, Polish hata di. Toh Polish bhasha 'resistance ka symbol' ban gayi - paadri (clergy) church mein Polish use karte the taaki pehchaan zinda rahe. Hook: bhasha = hathiyaar, Polish = Poland ki azaadi ki awaaz.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "H1-625", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Unification of Italy", "question": "Identify the place where the secret underground society named 'Young Europe' was founded by Mazzini.", "answer": "(A) Berne. Giuseppe Mazzini founded the secret society 'Young Europe' in Berne (Switzerland); he had earlier founded 'Young Italy' in Marseilles.", "explanation": "Mazzini ne 'Young Europe' Berne (Switzerland) mein banaayi, jabki uski 'Young Italy' Marseilles mein bani thi. Toh answer Berne. Hook: Young Europe = Berne, Young Italy = Marseilles.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H1-627", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "French Revolution & nation-making", "question": "Evaluate the role of print in the French Revolution.", "answer": "Print played a key role in the French Revolution: pamphlets, newspapers and cartoons spread ideas of liberty, equality and the rights of citizens to a wide public, criticised the monarchy and clergy, and helped create a shared revolutionary and national consciousness among the French people.", "explanation": "French Revolution mein print (pamphlets, akhbaar, cartoons) ne barood ka kaam kiya - inhone liberty-equality ke ideas ghar-ghar pahunchaaye, raja aur Church ka mazaak udaaya, aur logon mein ek common 'revolution wali soch' banaayi. Hook: chhapa hua shabd = revolution ka loudspeaker.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 4}, {"key": "H2-659", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Revolutionary nationalism (HSRA, Bhagat Singh)", "question": "Why is the formation of 'Hindustan Socialist Republican Army (HSRA)' considered as a turning point in the freedom struggle of India ?", "answer": "The HSRA (1928) marked a turning point because many young nationalists felt non-violence alone was not enough; it brought in revolutionary leaders like Bhagat Singh, Chandrashekhar Azad and Sukhdev, spreading patriotic, militant nationalist spirit among the youth.", "explanation": "HSRA (1928) turning point isliye tha kyunki kuch naujawaan maante the ki sirf ahinsa kaafi nahi - Bhagat Singh, Azad jaise revolutionary leader saamne aaye aur jawaano mein deshbhakti ki aag bhardi. Hook: 'Sirf ahinsa nahi, kranti bhi' - naye soch ki shuruaat.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "H2-660", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Revolutionary nationalism (HSRA, Bhagat Singh)", "question": "How did Bhagat Singh's trial speeches transform him from a revolutionary to a philosopher of freedom ?", "answer": "In his trial speeches Bhagat Singh explained he wanted not mere violence but a deep social revolution - freedom, justice and social equality for all. These ideas turned him from an armed revolutionary into a thinker and philosopher of freedom.", "explanation": "Bhagat Singh ki court speeches ne dikhaaya ki wo sirf violence nahi, ek gehra social revolution chahte the - azaadi, nyaay aur samaanta sabke liye. Isiliye wo 'revolutionary' se 'philosopher' ban gaye. Hook: 'Bandook nahi, badlaav' - asli soch.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "H2-661", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Revolutionary nationalism (HSRA, Bhagat Singh)", "question": "In what way did Bhagat Singh redefine the meaning of 'revolution' for his generation? Explain.", "answer": "Bhagat Singh redefined 'revolution' as more than bombs and pistols - it meant the inalienable right to freedom and a complete transformation of an unjust society. He urged youth to sacrifice for the nation and popularised the slogan 'Inquilab Zindabad!'.", "explanation": "Bhagat Singh ne 'revolution' ka matlab badal diya - sirf bomb-pistol nahi, balki na-cheenne-wala azaadi ka haq aur poore unjust samaaj ko badalna. Naujawaano ko qurbaani ke liye prerit kiya - 'Inquilab Zindabad!'. Hook: 'Inquilab = soch ka badlaav, sirf dhamaaka nahi'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "H2-662", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Quit India Movement", "question": "Mention the main aim of the Quit India Movement.", "answer": "The main aim of the Quit India Movement (1942) was to secure the complete independence of India by forcing an immediate end to British rule.", "explanation": "Quit India Movement (1942) ka ek hi maqsad tha - poori azaadi, angrezon Bharat chhodo abhi ke abhi! Hook: 'Quit India = turant azaadi'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "H2-663", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Quit India Movement", "question": "Where did Gandhiji deliver the famous 'Do or Die' speech ?", "answer": "Gandhi delivered his famous 'Do or Die' (Karo ya Maro) speech at Bombay (Mumbai) on 8 August 1942, launching the Quit India Movement.", "explanation": "Gandhi ji ne 'Karo ya Maro' (Do or Die) wala famous bhaashan Bombay (Mumbai) mein 8 August 1942 ko diya - yahin se Quit India shuru hua. Hook: 'Do or Die = Bombay, August 1942'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "H2-664", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Quit India Movement", "question": "Explain the forms of protest observed during the 'Quit India Movement'.", "answer": "Quit India saw mass, largely spontaneous protest: hartals, demonstrations and processions with national songs and slogans; people attacked symbols of colonial authority (police stations, post offices, railway lines), and in places set up parallel governments.", "explanation": "Quit India mein janta khud-ba-khud sadak par aa gayi - hartal, julus, raashtriya gaane-naare; police station, post office aur railway line jaise angrezi symbols par hamle, aur kahin-kahin apni samanaantar sarkaar bhi. Hook: 'Hartal, julus, hamla' - Quit India ka teen-rangi protest.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "H2-665", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Quit India Movement", "question": "How did the failure of the Cripps Mission contribute to the launch of the Quit India Movement ?", "answer": "The Cripps Mission (1942) failed because it offered only dominion status after the war, not immediate independence, which Congress rejected. The resulting anger and disappointment pushed Gandhi to launch the Quit India Movement demanding complete British withdrawal.", "explanation": "Cripps Mission (1942) flop ho gaya kyunki usne turant azaadi nahi, sirf war ke baad dominion status offer kiya - Congress ne thukra diya. Isi naaraazgi ne Quit India Movement ko janam diya. Hook: 'Cripps ne nirash kiya, Quit India bhadka'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "H2-666", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Quit India Movement", "question": "Why was Gandhiji's call for 'the Quit India' considered historic ?", "answer": "Gandhi's Quit India call (Aug 1942) was historic because the Congress passed the 'Quit India' resolution demanding immediate transfer of power, the AICC endorsed a non-violent mass struggle, and Gandhi gave his 'Do or Die' speech - bringing the colonial state machinery to a near standstill.", "explanation": "Quit India call historic isliye tha - Congress ne turant satta-hastantaran ki maang ki, AICC ne ahinsak mass struggle ko manzoori di, aur Gandhi ji ne 'Do or Die' bhaashan diya, jisse angrezi tantra thap pad gaya. Hook: 'Karo ya Maro = poora system jaam'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "H2-667", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Quit India Movement", "question": "Explain the role of women in making the Quit India Movement more inclusive.", "answer": "Women leaders like Aruna Asaf Ali (who hoisted the flag at Gowalia Tank), Matangini Hazra, Kanaklata Barua and Rama Devi led from the front. They joined hartals, demonstrations and processions and even underground activity, making the Quit India Movement truly mass-based and inclusive.", "explanation": "Quit India ko inclusive banane mein auraton ka bada haath - Aruna Asaf Ali (jhanda fahraaya), Matangini Hazra, Kanaklata Barua, Rama Devi aage aayin. Hartal, julus, underground kaam sab kiya. Hook: 'Aruna ka jhanda = mahilaon ki leadership'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "H2-668", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Non-Cooperation Movement", "question": "Explain the role of urban middle class in the 'Non-Cooperation Movement'.", "answer": "The urban middle class led the early NCM: students left government schools and colleges, lawyers (e.g. C.R. Das, Motilal Nehru) gave up their practice, voters and candidates boycotted council elections, and people boycotted foreign cloth - giving the movement its initial momentum.", "explanation": "Sheher ke madhyam varg ne NCM ko shuru mein khada kiya - students ne sarkari school chhode, vakeelon (C.R. Das, Motilal Nehru) ne practice chhodi, aur videshi kapde ka boycott hua. Hook: 'Student, vakeel, voter' - sheher ka teen-pillared support.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "H2-677", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Caste, leaders & MCQs", "question": "The given image shows a famous painting. Choose the painter of this art work from the following options:", "answer": "(D) Raja Ravi Varma - famous for his mythological and Indian-style paintings that helped build a shared visual culture and national imagination.", "explanation": "Ye painting Raja Ravi Varma ki hai - unki pauraanik (mythological) tasveerein desh ki saanjhi cultural pehchaan banane mein madad karti thi. Answer: (D) Raja Ravi Varma. Hook: 'Devi-devta ki paintings = Ravi Varma'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H2-678", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Caste, leaders & MCQs", "question": "Between which two leaders was the Poona Pact signed in 1932 ?", "answer": "(A) Bhimrao Ambedkar and Mahatma Gandhi - the Poona Pact (1932) gave depressed classes reserved seats within the general electorate instead of separate electorates.", "explanation": "Poona Pact (1932) Ambedkar aur Gandhi ke beech hua - depressed classes ko alag electorate ki jagah reserved seats milin. Answer: (A) Ambedkar & Gandhi. Hook: 'Poona Pact = Gandhi-Ambedkar ka samjhauta'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H2-679", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Caste, leaders & MCQs", "question": "Match Column I with Column II and choose the correct option : Column I (Role) a. The song Vande Mataram b. Picture of Bharat Mata with spiritual qualities c. Bardoli Satyagraha d. Poona Pact in 1932 Column II (Scholar) i. Sardar Vallabhbhai Patel ii. Dr. B.R. Ambedkar iii. Abanindranath Tagore iv. Bankim Chandra Chattopadhyay", "answer": "(B) a-iv, b-iii, c-i, d-ii : Vande Mataram - Bankim Chandra Chattopadhyay; Bharat Mata painting - Abanindranath Tagore; Bardoli Satyagraha - Sardar Vallabhbhai Patel; Poona Pact (1932) - Dr. B.R. Ambedkar.", "explanation": "Jodiyaan yaad rakho: Vande Mataram = Bankim Chandra, Bharat Mata painting = Abanindranath Tagore, Bardoli = Sardar Patel, Poona Pact = Ambedkar. Answer: (B) a-iv, b-iii, c-i, d-ii. Hook: 'Gaana-Bankim, Tasveer-Abanindra, Bardoli-Patel, Pact-Ambedkar'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 4}, {"key": "H2-684", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Chronology of national movement (MCQ)", "question": "Arrange the following in chronological order and choose the correct option : I. Gandhi-Irwin Pact II. Rowlatt Act III. Poona Pact IV. Khilafat Movement", "answer": "(C) II, IV, I and III : Rowlatt Act (1919) -> Khilafat Movement (1919-20) -> Gandhi-Irwin Pact (1931) -> Poona Pact (1932).", "explanation": "Order: Rowlatt Act (1919), Khilafat (1919-20), Gandhi-Irwin Pact (1931), Poona Pact (1932). Answer: (C) II, IV, I, III. Hook: 'Rowlatt-Khilafat saath, fir Pacts 31-32'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H2-685", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Chronology of national movement (MCQ)", "question": "Arrange the following events in chronological order and choose the correct option : I. Second Round Table Conference II. Formation of Depressed Class Association III. Lahore Session of Indian National Congress IV. Formation of Awadh Kissan Sabha", "answer": "(C) IV, III, II, I : Awadh Kisan Sabha (1920) -> Lahore Session (1929) -> Depressed Classes Association (1930) -> Second Round Table Conference (1931).", "explanation": "Order: Awadh Kisan Sabha (1920), Lahore Session (1929), Depressed Classes Assoc (1930), 2nd RTC (1931). Answer: (C) IV, III, II, I. Hook: '20-29-30-31'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H2-686", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Chronology of national movement (MCQ)", "question": "Arrange the following events in chronological order and choose the correct option : I. Salt Satyagraha II. Kheda Satyagraha III. Rowlatt Satyagraha IV. Ahmedabad Mill Workers Satyagraha", "answer": "(B) II, IV, III, I : Kheda (1918) -> Ahmedabad Mill Workers (1918) -> Rowlatt (1919) -> Salt Satyagraha (1930).", "explanation": "Order: Kheda (early 1918), Ahmedabad Mill Workers (1918), Rowlatt (1919), Salt Satyagraha (1930). Answer: (B) II, IV, III, I. Hook: 'Kheda-Ahmedabad jaldi, Salt sabse baad'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H3-708", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Early Globalisation", "question": "How had globalization begun long before sixteenth century ? Explain.", "answer": "Globalisation began centuries earlier through the Silk Routes, which enabled vibrant pre-modern trade and cultural exchange across Asia, Europe and North Africa, including the spread of religions like Buddhism, Christianity and Islam.", "explanation": "Globalisation koi naya phenomenon nahi - ye 16th century se bhi bahut pehle Silk Route ke through shuru ho chuka tha. Maal, log, religion (Buddhism, Christianity, Islam) sab distant deshon ke beech ghoom rahe the. Memory hook: 'duniya purane zamane mein bhi connected thi' - Silk Route hi pehla globalisation tha.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "H3-710", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Potato Famine", "question": "Which country was the most affected by the potato famine during 1845-1849?", "answer": "(C) Ireland - the Great Irish Potato Famine (1845-1849) caused mass starvation and large-scale emigration.", "explanation": "Aaloo gareebon ka dost tha, par jab 1845-49 mein Ireland mein potato crop fail hui to laakhon log bhookh se marr gaye aur bahut se America bhaag gaye. Memory hook: 'aaloo gaya to Ireland ro gaya' - Potato Famine ka sabse bada shikaar Ireland.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H3-711", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Spanish Conquest of America", "question": "Two statements labelled as Assertion (A) and Reason (R) are given below. Read both the statements carefully and choose the correct option : Assertion (A) : The Portuguese and Spanish conquest and colonisation of America was decisively under way by the mid-sixteenth century. Reason (R) : The Spanish conquerors had the most powerful conventional weapons.", "answer": "(C) Assertion is true but Reason is false. The conquest was real, but the decisive weapon was smallpox (germs), not powerful conventional weapons.", "explanation": "Assertion sahi hai - Portuguese aur Spanish ne mid-16th century tak America pe kabza shuru kar diya tha. Par Reason galat - unki sabse badi 'weapon' bandook nahi, smallpox (germs) thi. Isliye answer (C): A true, R false. Yaad rakho: jeet germs ne dilaayi, hathiyaron ne nahi.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 4}, {"key": "H3-712", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Indian Subcontinent in Trade", "question": "Choose the correct option to fill in the blank. The Indus Valley Civilization was linked to the ___________ region through coastal trade as early as 3000 BCE.", "answer": "(C) West Asia - the Indus Valley Civilisation traded with West Asia via coastal routes as early as 3000 BCE.", "explanation": "3000 BCE jitna purana - Indus Valley Civilization (Harappa) coastal trade ke through West Asia se juda hua tha. Matlab India ka trade-connection toh hazaaron saal purana hai! Memory hook: 'Harappa ka business partner = West Asia'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H3-713", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Precious Metals and Trade", "question": "Two statements are given below. They are Assertion (A) and Reason (R). Read both the statements and choose the correct option. Assertion (A) : Silver from Peru and Mexico enhanced Europe's wealth in the sixteenth century. Reason (R) : Europe used this silver to finance its trade with Asia.", "answer": "(A) Both A and R are true and R is the correct explanation of A. Silver from Peru/Mexico made Europe rich, and it used that silver to pay for trade with Asia.", "explanation": "Peru aur Mexico se aayi chaandi (silver) ne Europe ko maalamaal kar diya. Aur isi silver se Europe ne Asia ke saath trade kiya (Asia ko payment chaandi mein chahiye thi). Dono baatein sahi aur R hi A ki wajah - isliye answer (A). Memory hook: 'America ki chaandi se Europe ne Asia se shopping ki'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 4}, {"key": "H5-791", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print and religious communities", "question": "From which of the following regions did the 'Khalsa Tract Society' primarily operate ?", "answer": "(D) Punjab. The Khalsa Tract Society, linked to Sikh reform, operated mainly from Punjab. (Option printing in one paper was wrong.)", "explanation": "Khalsa Tract Society mukhya roop se Punjab se chalti thi (Sikh reform se judi). Ek paper mein options galat the, par area Punjab hi hai. Hook: Khalsa = Punjab.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H5-792", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Authors and their books", "question": "Which one of the following pairs is correctly matched ? Column - A (Writer) (A) Sudarshan Chakra (B) Kashi Baba (C) Bal Gangadhar Tilak (D) Pandita Ramabai Column - B (Contribution) Anandmath Sacchi Kavitayen Kesari Amar Jiban", "answer": "(C) Bal Gangadhar Tilak – Kesari is the correctly matched pair.", "explanation": "Yahan sahi jodi (C) Bal Gangadhar Tilak–Kesari hai. Baaki options ulte hain. Hook: Tilak ke saath hamesha Kesari aata hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 4}, {"key": "H5-793", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Gutenberg and the printing press", "question": "Explain the role of Johann Gutenberg in the spread of print culture in Europe.", "answer": "Using goldsmithing and mould-making skills, Gutenberg adapted existing technology to invent the printing press. His first book was the Bible, triggering a book-production boom and the Print Revolution that influenced events like the Protestant Reformation.", "explanation": "Gutenberg ne goldsmith ki kala se printing press banaya aur pehli Bible chhapi—isse books ka boom aur Print Revolution aaya, jisne Reformation tak ko hila diya. Hook: Gutenberg = Europe ke print ka pita.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "H5-794", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print and Reformation / Martin Luther", "question": "Explain the role of print in the expansion of protestant reformation.", "answer": "Print spread Martin Luther's 95 Theses and writings rapidly and widely, enabling mass criticism of the Catholic Church, fostering debate, and driving the Protestant Reformation and the split in the Church.", "explanation": "Print ne Martin Luther ke vichaar (95 Theses) tezi se phailaye, jisse Church ki aalochna hui aur Protestant Reformation aage badha. Hook: print = Luther ka megaphone, jisne Church ko challenge kiya.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "H5-795", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Chronology of print events", "question": "Arrange the following historical events in chronological order and choose the correct option : I. Publication of Bengal Gazette II. Publication of Diamond Sutra III. Publication of Bible by Johann Gutenberg IV. Return of Marco Polo to Italy from China", "answer": "(D) II, IV, III, I: Diamond Sutra (868 CE) → Marco Polo's return (1295) → Gutenberg's Bible (1450s) → Bengal Gazette (1780).", "explanation": "Sahi kram: Diamond Sutra (sabse purana) → Marco Polo wapsi → Gutenberg Bible → Bengal Gazette (sabse naya). Hook: 'Sutra-Polo-Bible-Gazette'—purana se naya.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H5-796", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Colonial control / censorship of the press", "question": "Why was the colonial government not in favour of freedom of the press ?", "answer": "Because Indian newspapers were becoming assertively nationalist; especially after the 1857 revolt the government feared the spread of revolutionary ideas and demanded a clampdown.", "explanation": "Sarkar press ki azaadi ke khilaf thi kyunki Indian newspapers nationalist ho rahe the aur 1857 ke baad revolution ka dar tha. Hook: nationalism + 1857 ka dar = press par lagaam.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "H5-797", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Chronology of print events", "question": "Arrange the following events of 'print culture' in chronological order and choose the correct option : I. Publication of 'Sambad Kaumudi' II. Publication of weekly magazine 'Bengal Gazette' III. 'Vernacular Press Act' was implemented IV. The first printed edition of the 'Ramcharitmanas'", "answer": "(D) II, IV, I, III: Bengal Gazette (1780) → first printed Ramcharitmanas → Sambad Kaumudi (1821) → Vernacular Press Act (1878).", "explanation": "Sahi kram: Bengal Gazette → Ramcharitmanas (printed) → Sambad Kaumudi → Vernacular Press Act. Hook: 'Gazette-Ramcharit-Sambad-VPA'—1780 se 1878 tak.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H5-798", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print in Japan", "question": "Which one of the following is the oldest printed book in Japan ?", "answer": "(B) The Diamond Sutra — the oldest (Japanese/Buddhist) printed book, dated 868 CE.", "explanation": "Sabse purani printed book = Diamond Sutra (868 CE), ek Buddhist granth. Picture-based questions mein bhi yahi answer. Hook: 'Diamond Sutra = duniya ki pehli printed book'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H5-799", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Gutenberg and the printing press", "question": "Analyse Gutenberg's contribution to printing in Europe.", "answer": "Gutenberg adapted existing technologies (goldsmith skills, lead moulds, the olive/wine press) to perfect the printing press; his first printed book was the Bible, produced fast for its time and starting the Print Revolution.", "explanation": "Gutenberg ne purani technologies—goldsmith hunar, lead moulds, olive press—jodkar printing press perfect kiya aur pehli Bible chhapi. Hook: jugaad se press, pehla product Bible.", "years": ["2026"], "papers": 1, "raw": 4, "marks": 3, "types": ["SA"], "score": 4}, {"key": "H5-800", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Manuscripts and book-making", "question": "The given painting is from the sixteenth century from Mughal India. Identify the work shown in this painting from the following options : (A) Minting of coins (B) Metal crafting (C) Pottery making (D) Book making", "answer": "(D) Book making. The 16th-century Mughal painting depicts the making of manuscripts/books.", "explanation": "16th century Mughal painting mein 'book making' (kitaab/manuscript banana) dikhaya gaya hai. Hook: Mughal painting + likhna-banana = book making.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H5-801", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Authors and their books", "question": "Which one of the following pairs is correctly matched ? Column – A (Writer) Column – B (Contribution) (A) Ram Chaddha – Bengal Gazette (B) Gangadhar Bhattacharya – Kesari (C) Jyotiba Phule – Gulamgiri (D) Rashsundari Devi – Padmarg", "answer": "(C) Jyotiba Phule – Gulamgiri is the correctly matched pair.", "explanation": "Sahi jodi (C) Jyotiba Phule–Gulamgiri. Baaki jaan-bujh ke ulte kar diye. Hook: Phule = Gulamgiri, yeh fix hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 4}, {"key": "H5-803", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print in China / Japan (Buddhist missionaries)", "question": "Evaluate the role of Buddhist Missionaries in printing culture.", "answer": "Buddhist missionaries spread hand-printing and woodblock printing across East Asia—carrying texts like the Diamond Sutra from China into Japan and Korea, helping print culture grow through religious texts.", "explanation": "Buddhist missionaries ne China se Japan-Korea tak printing (woodblock) aur Diamond Sutra jaise granth phailaye, jisse print culture badhi. Hook: dharm prachaar ke saath-saath printing bhi safar par nikli.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "H5-804", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Growth of the press in India", "question": "Which one of the following areas in Calcutta was devoted to the printing of popular books in the 19th century ?", "answer": "Battala (in Calcutta) was the area devoted to printing cheap, popular books in the 19th century. (Note: the option text 'Book making' was mismatched in the paper; the intended answer is Battala.)", "explanation": "Calcutta mein 'Battala' wo ilaaka tha jahan saste, popular books chhapti thi (kissa-kahani, dharmik kitaabein). Paper mein option text galat tha, par sahi jawab Battala hai. Hook: Calcutta + saste books = Battala.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H5-805", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Authors and their books", "question": "Which one of the following pairs is correctly matched ? Column A (Writer) Column B (Contribution) (A) Bal Gangadhar Tilak – Gulamgiri (B) Jyotiba Phule – Amar Jiban (C) Raja Rammohan Roy – Sambad Kaumudi (D) Tarabai Shinde – Istri Dharam Vichar", "answer": "(C) Raja Ram Mohan Roy – Sambad Kaumudi is the correctly matched pair.", "explanation": "Sahi jodi (C) Rammohan Roy–Sambad Kaumudi. Baaki swap kar diye gaye hain. Hook: Rammohan Roy = Sambad Kaumudi, reformer ka akhbaar.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ", "Match"], "score": 4}, {"key": "P1-816", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Horizontal Power Sharing", "question": "How is power shared among different organs of government ?", "answer": "Power is shared horizontally among the Legislature (makes laws), Executive (implements laws) and Judiciary (interprets laws/resolves disputes). They are at the same level but exercise different powers, creating checks and balances.", "explanation": "Teen organs, teen kaam: Legislature kanoon banata hai, Executive use lagu karta hai, Judiciary use samjhata aur jhagde suljhata hai. Same level pe hote hain par kaam alag. Hook: 'Banao-Lagao-Samjhao' = L-E-J.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "P1-818", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Horizontal Power Sharing", "question": "Explain the term ‘Balance of Power’.", "answer": "Balance of Power means no single organ of government can exercise unlimited power; each organ checks the others, ensuring authority is distributed among institutions.", "explanation": "'Balance of Power' yaani kisi ek organ ke paas poori taakat nahi - sab ek-doosre ko check karte hain. Jaise taraazu, koi ek palda bhaari na ho jaaye. Hook: balance = taraazu, koi unlimited power nahi le sakta.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "P1-819", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Horizontal Power Sharing", "question": "Why is the judiciary considered independent in a democracy ?", "answer": "Though judges are appointed by the executive, the judiciary is independent because it can check the functioning of the executive and review laws made by the legislature, ensuring accountability.", "explanation": "Judges ko bhale executive niyukt kare, par judiciary independent hai kyunki wo executive ke kaam aur legislature ke kanoon dono pe check rakh sakti hai. Hook: judiciary = nirpaksh umpire, kisi ki bhi galti pakad sakti hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "P1-821", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Self-Government & Participation", "question": "How does governing through institutions of self-government strengthen democracy ? Explain.", "answer": "Self-government strengthens democracy by empowering people, making the government more accountable, using local knowledge to solve problems, and enabling direct citizen participation in decision-making.", "explanation": "Self-government (jaise Panchayat) democracy ko mazboot karta hai - log apne mamle khud sambhalte hain, sarkar zyada jawabdeh banti hai, aur local problems local log hi better solve karte hain. Hook: 'apni gali, apni marzi' = sahi mayne mein janta ka raj.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "P1-825", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Self-Government & Participation", "question": "Why should all the powers of the government not be in the hands of one person ?", "answer": "Power should not be concentrated in one person because it can lead to dictatorship; sharing power upholds the basic democratic principle of power sharing.", "explanation": "Saari taakat ek aadmi ke haath mein? Khatra! Wo tanashah (dictator) ban jaata hai. Isliye power baatni zaruri hai - yahi democracy ka basic usool. Hook: 'akela = khatarnak', baatna = surakshit.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "P1-826", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Why Power Sharing is Desirable", "question": "Why is power sharing necessary ?", "answer": "Power sharing is necessary to accommodate social diversity and to prevent/avoid conflicts within society.", "explanation": "Power sharing kyun chahiye? Taaki alag-alag samaj (diversity) ko jagah mile aur aapas mein jhagda na ho. Hook: 'sab adjust, tabhi no fight' - diversity + no conflict.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "P1-828", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Power Sharing among Social Groups", "question": "How do social groups benefit from power sharing ?", "answer": "Social groups benefit through protection of their interests, fair representation of minorities and weaker sections (including women), reduced conflict and greater stability, ensuring all groups have a voice in governance.", "explanation": "Power sharing se har social group ko fayda - unke hit surakshit, minorities/kamzor varg/mahilaon ko fair representation, jhagda kam, stability zyada. Hook: 'sabko hissa = sab khush, koi alag-thalag nahi'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "P1-829", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Pressure Groups & Power Sharing", "question": "Explain the contributions of citizens in the power sharing process.", "answer": "Citizens contribute by participating in governmental committees, influencing decision-making, joining interest/pressure groups, and monitoring government actions.", "explanation": "Citizens kaise contribute karte hain? Committees mein hissa lekar, faislon ko prabhavit karke, interest groups mein judke, aur sarkar pe nazar rakhke. Hook: janta sirf vote tak nahi, har step pe involved - tabhi power sharing zinda rehta hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "P1-841", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - General", "question": "Identify the correct statement regarding Belgium.", "answer": "(A) Belgium is a small country of Europe.", "explanation": "Belgium Europe ka ek chhota sa desh hai, jiski seemayein France, Netherlands, Germany se lagti hain. Hook: 'chhota desh, bada power-sharing sabak'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "P1-845", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - Power Sharing Model", "question": "Assertion (A) : Belgium’s power sharing arrangements were designed to accommodate its linguistic and cultural divisions. Reason (R) : Belgian leaders recognized the existence of regional differences and cultural diversities.", "answer": "(A) Both (A) and (R) are true and (R) is the correct explanation of (A).", "explanation": "Belgium ke power sharing ka design hi isliye tha taaki language-culture ke bhed adjust ho - aur ye isliye mumkin hua kyunki leaders ne regional differences ko pehle maana. Dono sahi, R hi A ka reason. Hook: pehle maano (R), phir solution banao (A).", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 4}, {"key": "P1-851", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Sri Lanka - Majoritarianism", "question": "In Sri Lanka, which one of the following changes to the 1956 law gave rise to the possibility of civil war?", "answer": "(B) Declaring Sinhala as the official language.", "explanation": "1956 mein Sinhala ko akela official language ghoshit karna - yahi wo chingari thi jisne aage chalkar civil war ki sambhavna banayi. Hook: 'Sinhala-only' = Tamils naraz = civil war ka beej.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "P1-853", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Sri Lanka - Majoritarianism", "question": "Assertion (A) : The civil war in Sri Lanka resulted due to failure of political accommodation of ethnicity. Reason (R) : The distrust between the Sinhala and Tamil communities turned into widespread conflict in Sri Lanka.", "answer": "(A) Both (A) and (R) are correct and (R) is the correct explanation of (A).", "explanation": "Sri Lanka ki civil war ki jad = ethnicity ko political tareeke se accommodate na karna. Sinhala aur Tamil ke beech ka distrust hi bada conflict ban gaya. Hook: 'adjust nahi kiya -> bharosa toota -> war'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 4}, {"key": "P1-855", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium vs Sri Lanka", "question": "Compare the Belgian model and the Sri Lankan model of power sharing.", "answer": "Belgium accommodated diversity — it amended its constitution, gave equal representation to Dutch and French communities and set up a community government, preventing one-sided decisions. Sri Lanka instead followed majoritarianism — made Sinhala the official language and favoured the Sinhalese, ignoring minority feelings, which led to civil war.", "explanation": "Do desh, do raaste: Belgium ne diversity ko gale lagaya (barabar representation, community govt) - shanti rahi. Sri Lanka ne majoritarianism chuna (Sinhala thopa) - civil war ho gaya. Hook: 'Belgium = jodna, Sri Lanka = todna'. Yahi compare wala saara group hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 4}, {"key": "P1-856", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium vs Sri Lanka", "question": "Assertion (A): Both, Sri Lanka and Belgium faced challenges of ethnic and linguistic diversity. Reason (R): Sri Lanka had majority of Tamils whereas Belgium had majority of French speaking people.", "answer": "(C) (A) is true, but (R) is false. Both countries faced ethnic/linguistic diversity, but in Sri Lanka the MAJORITY is Sinhala (not Tamil) and in Belgium the majority is Dutch-speaking (not French).", "explanation": "Assertion sahi - dono desh diversity se jujh rahe the. Par Reason galat - Sri Lanka mein majority Tamil NAHI Sinhala thi, aur Belgium mein majority French NAHI Dutch thi. Hook: dono jagah Reason ne majority ulti bata di, isliye 'A true, R false'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 4}, {"key": "P1-861", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Power Sharing - Picture Based", "question": "Look at the given picture carefully and identify the building :", "answer": "(C) Parliament of India.", "explanation": "Tasveer mein circular/gol building dikhe toh wo Parliament of India (Sansad Bhavan) hai - jahan Legislature baithta hai. Hook: gol building + India = Parliament. Ye horizontal power sharing ka organ hai.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "P1-863", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Why Power Sharing is Desirable", "question": "How does power sharing promote stability of political order ?", "answer": "Power sharing promotes stability by allowing direct public participation (giving the government legitimacy), respecting diverse groups, reducing conflict and violence, and ensuring everyone has a voice in public policy.", "explanation": "Power sharing se political order stable kaise? Janta seedhe hissa leti hai (sarkar ko legitimacy milti hai), har group ki izzat hoti hai, jhagda-hinsa kam, aur sabki awaaz shaamil. Hook: 'sab shaamil = sab shaant = stable sarkar'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "P1-864", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Why Power Sharing is Desirable", "question": "How does power sharing contribute to the spirit of democracy ?", "answer": "Power sharing is the very spirit of democracy: it involves citizens in governance and gives them a stake in the system, reduces conflict between social groups, ensures political stability, and prevents the tyranny of the majority by giving everyone a voice.", "explanation": "Power sharing democracy ki aatma hai - janta ko governance mein hissa milta hai, jhagda kam hota hai, stability aati hai, aur majority ki manmaani (tyranny) rukti hai. Hook: 'sharing = caring' - tabhi sahi mayne mein democracy.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "P2-871", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "Match Column I with Column II and choose the correct option : Column I (List) a. Union list b. State list c. Concurrent list d. Residuary subjects Column II (Subject) i. Police ii. Computer software iii. Adoption iv. Defence", "answer": "(C) a-iv (Union-Defence), b-i (State-Police), c-iii (Concurrent-Adoption), d-ii (Residuary-Computer software).", "explanation": "Defence=Union, Police=State, Adoption=Concurrent (family-related dono ke paas), Computer software=Residuary. Adoption/marriage jaisi family cheezein Concurrent me yaad rakho, aur software hamesha Residuary – bas do hook se pura match ho jaata hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 4}, {"key": "P2-873", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Types of federations (coming together vs holding together)", "question": "Which one of the following countries is an example of a 'coming together federation'?", "answer": "(D) Australia. Australia is a 'coming together' federation.", "explanation": "Yahaan options me Australia sahi tha. USA, Switzerland aur Australia teeno coming-together federations hain – jahaan choti-choti azaad units ne milke bada desh banaya. Bas yaad rakho ye teen naam, India/Belgium/Spain holding-together me aate hain.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "P2-874", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Types of federations (coming together vs holding together)", "question": "Which one of the following is the best example of 'coming together federation'?", "answer": "(D) Switzerland. Switzerland is a classic 'coming together' federation.", "explanation": "Switzerland me alag-alag cantons (chote regions) ne apni marzi se milke federation banaya, isliye ye 'coming together' ka best example hai. USA, Switzerland, Australia – teeno ek hi family ke hain. India isme nahi aata, yaad rahe.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "P2-888", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Indian federalism / Parliament", "question": "Which of the following is a house of the Indian Parliament ?", "answer": "(C) Parliament of India. (As per the official key; the two Houses of Parliament are the Lok Sabha and Rajya Sabha.)", "explanation": "Indian Parliament ke do houses hote hain – Lok Sabha (lower house) aur Rajya Sabha (upper house). Hook: Lok = log/public chunte hain, Rajya = states ka representation. Parliament khud in dono ko milake banta hai.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "P2-920", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Decentralisation / 1992 amendments", "question": "Read the following statements regarding decentralization step India took in the year 1992 and choose the correct option : I. Mandatory regular elections for local bodies II. Two-third seats reserved for women III. Formation of the State Election Commission IV. Seats reserved for Schedule Castes and Schedule Tribes", "answer": "(B) I, III and IV are correct. The 1992 amendments made local elections mandatory, set up State Election Commissions, and reserved seats for SCs/STs; women's reservation was one-third (not two-thirds), so II is wrong.", "explanation": "1992 me regular local elections zaroori hue (I), State Election Commission bana (III), aur SC/ST ke liye seats reserve hui (IV) – ye sahi. II galat hai kyunki auraton ke liye ek-tihai (1/3) seats reserve hui thi, do-tihai (2/3) nahi. Hook: 'mahilaon ko 1/3, do-tihai nahi'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "P2-921", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Decentralisation / Panchayati Raj structure", "question": "Read the given statements regarding decentralisation in India and choose the correct option : i. Rural local government is known as Panchayati Raj. ii. Each village or group of villages have Gram Panchayat. iii. Panch and Sarpanch of villages are selected by Election Commission. iv. Panchayat works under the supervision of Gram Sabha.", "answer": "(B) Only i, ii and iv are correct. Rural local government is Panchayati Raj, each village has a Gram Panchayat, and it works under the Gram Sabha; Panch/Sarpanch are elected by villagers (not the Election Commission), so iii is wrong.", "explanation": "Rural local government = Panchayati Raj (i sahi), har gaon me Gram Panchayat (ii sahi), aur woh Gram Sabha ki nigraani me chalti hai (iv sahi). iii galat – Panch aur Sarpanch ko gaon ke log chunte hain, Election Commission nahi. Hook: 'Sarpanch ko gaon chunta hai, EC nahi'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "P2-922", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government / structure", "question": "Read the given statements regarding urban local government and choose the correct option : I. Municipalities are setup in towns. II. Big cities have Municipal Corporation. III. Municipal chairperson is the head of Block Samiti. IV. The officer in Municipal Corporation is called as Mayor. Options : (A) Only I, II and III are correct. (B) Only I, II and IV are correct. (C) Only I, III and IV are correct. (D) Only II, III and IV are correct.", "answer": "(B) Only I, II and IV are correct. Towns have Municipalities, big cities have Municipal Corporations, and the head of a Corporation is the Mayor; statement III (chairperson heads Block Samiti) is wrong.", "explanation": "Town me Municipality (I sahi), badi city me Municipal Corporation (II sahi), aur Corporation ka head Mayor hota hai (IV sahi). III galat hai – Block Samiti se municipal chairperson ka koi lena-dena nahi. Hook: 'town=Municipality, city=Corporation, head=Mayor'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "P2-926", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Features of federalism", "question": "Explain any two features of federalism.", "answer": "Two features: (1) Two or more tiers of government, each with its own constitutionally guaranteed jurisdiction over the same citizens; (2) Fundamental constitutional provisions can be changed only with the consent of both levels, and courts interpret their powers.", "explanation": "Federalism ke do features: (1) do ya zyada level ki sarkarein, har ek ka apna constitution-guaranteed kaam ka daayra; (2) constitution ke basic niyam dono levels ki marzi se hi badle ja sakte hain, aur jhagde court suljhata hai. Hook: 'do level + apni-apni power + court referee'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "P2-934", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "How does the Indian Constitution define the distribution of powers between the centre and the states ? Explain with examples.", "answer": "Through three lists: Union List (national subjects like defence, banking—Union legislates), State List (state/local subjects like police, trade—State legislates), and Concurrent List (common subjects like education, forest—both legislate, Union law prevails in conflict). Residuary subjects go to the Union.", "explanation": "Power teen lists me baanti hai: Union (defence, banking – Centre banaye), State (police, trade – State banaye), Concurrent (education, forest – dono banayein, par jhagde me Centre ki chalti hai). Naye/baache subjects Residuary me Centre ke. Hook: 'Union=national, State=local, Concurrent=dono, Residuary=Centre'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "P2-935", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "How does the ‘system of three lists’ function in Indian federalism ? Explain with examples.", "answer": "Union List (national subjects e.g. defence, banking—Union makes laws), State List (local subjects e.g. police, agriculture—States make laws), Concurrent List (common subjects e.g. education, forest—both can legislate, Union law prevails in conflict); residuary powers lie with the Union.", "explanation": "Teen list system: Union (defence, banking – sirf Centre), State (police, agriculture – sirf State), Concurrent (education, forest – dono, par conflict me Centre jeet ta). Bacha-khucha Residuary me Centre ke paas. Hook: 'teen list = power ka traffic rule, jisse kisi ka jhagda na ho'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "P2-939", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Linguistic states / federalism", "question": "The creation of linguistic states was the first and a major test for democratic politics in India.' Explain the statement.", "answer": "Leaders feared linguistic states would break up the country and the government initially resisted, but creating states on a language basis actually strengthened Indian unity, reinforced faith in democracy, and made administration easier—so it passed the test.", "explanation": "Shuru me leaders darte the ki bhasha ke aadhaar par states banane se desh toot jaayega, isliye sarkar ne mana kiya. Par jab banaye to ulta desh aur juda aur democracy par bharosa badha – isliye yeh democracy ka pehla bada 'test' tha jo India ne pass kiya. Hook: 'dar tha tootne ka, par bhasha-states ne joda'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 4}, {"key": "P2-940", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Indian federalism / role of Constitution", "question": "\"Constitutional provisions are necessary for the success of federalism.\" Explain the statement in the context of India.", "answer": "The Constitution declares India a Union of States, provides a three-fold distribution of legislative powers, sets up an independent judiciary to interpret it, requires a two-thirds parliamentary majority plus ratification by half the states to change fundamental provisions, and lets both levels levy taxes—making such provisions essential for federalism's success.", "explanation": "Federalism tabhi chalega jab Constitution me pakke niyam hon – India ko 'Union of States' kaha, power teen lists me baanti, independent court banaya, aur basic niyam badalne ke liye 2/3 majority + aadhe states ki haami zaroori ki. Hook: 'strong Constitution = strong federalism'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 4}, {"key": "P3-973", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Women & Values (Picture-based)", "question": "Look at the given picture carefully and choose the most appropriate option : Which of the following values is being reflected through this picture ?", "answer": "(C) Multi-tasking and dedication - the picture reflects the values of multi-tasking and dedication (typically shown by a woman managing many roles).", "explanation": "Yeh picture-based value question hai - aam taur par aurat ko ek saath kai kaam (ghar, naukri, parivaar) sambhalte dikhaya jaata hai, jo 'multi-tasking aur samarpan (dedication)' dikhata hai. Memory hook: picture mein 'ek saath sab kuch' = multi-tasking + dedication.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "P3-974", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Secularism & Diversity", "question": "How does the Indian Constitution accommodate the social diversities ? Explain with examples.", "answer": "The Constitution has no official religion, prohibits discrimination on grounds of religion/caste/creed, abolishes untouchability (Art. 17), guarantees the Right to Equality and freedom of religion, and gives special provisions and reservations for weaker sections - thus accommodating India's social diversity.", "explanation": "Indian Constitution alag-alag samaajon ko saath rakhta hai - koi official dharm nahi, dharm/jaati/creed par bhedbhaav mana, chhua-chhoot khatam (Article 17), Right to Equality, aur kamzor varg ke liye reservation. Memory hook: 'no discrimination + no untouchability + equality + reservation' = diversity ko samaane ka formula. Yeh 'unity in diversity' ko sambhalta hai.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 4}, {"key": "P4-982", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Reforms to political parties", "question": "Suggest any two reforms to strengthen 'party system' in India.", "answer": "Suggested reforms: (1) Strengthen internal democracy with regular organisational elections; (2) Check the growing role of money and muscle power; (3) Make it mandatory for parties to give a minimum share of tickets (about one-third) to women; (4) Provide state funding of elections and ensure ordinary workers get a chance to rise.", "explanation": "Ye 'aage kya karna chahiye' wala question hai (challenges ka solution). Char suggestion yaad rakho: andar se democracy mazboot karo, money-muscle power pe lagaam, mahilaon ko 1/3 tickets do, aur state funding do election ke liye. Tip: challenges ka ulta likh do = reform ban jaata hai! Lack of internal democracy ka solution = strengthen internal democracy.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "P4-989", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Functions of political parties", "question": "Examine the role of opposition parties in a Parliamentary democracy.", "answer": "The opposition (parties that lose elections) plays a vital role: it criticises the ruling government for its wrong policies and failures, voices public grievances, keeps a check on the misuse of power, and presents alternative policies, thereby keeping the government accountable.", "explanation": "Opposition matlab woh parties jo haar gayi - lekin inka kaam kam important nahi! Ye sarkar ki galtiyon pe ungli uthaati hain, janta ki problems uthati hain, aur sarkar ko 'check' mein rakhti hain taaki wo manmaani na kare. Socho cricket mein bina opposition team ke match? Bekaar. Opposition = sarkar ka watchdog.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "P4-991", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Functions of political parties", "question": "Read the following statements about the functions of political parties and choose the correct option : I. Political parties build public opinion. II. Political parties play the role of the opposition. III. Political parties present their programmes to the public. IV. Political parties make foreign policy.", "answer": "(A) Only I, II and III are correct - parties build public opinion, act as opposition, and present programmes. Making foreign policy (IV) is the job of the government, not a general function of parties.", "explanation": "Teen sahi functions: public opinion banana, opposition ka role, aur apne programmes janta ke saamne rakhna. 'Foreign policy banana' (IV) galat hai - wo sarkar ka kaam hai, har party ka nahi. Exam trap yahi hota hai - foreign policy ghusa dete hain. Toh answer I, II, III.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "P4-1000", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Party systems (one-party)", "question": "Why is a 'one-party system' not compatible with democracy?", "answer": "A one-party system is not democratic because it gives citizens no real choice - they cannot choose between alternatives or change their rulers through elections. With only one party allowed, it works like a dictatorship and denies people a genuine say in who governs them.", "explanation": "Democracy ka matlab hi hai CHOICE - tum apni marzi se sarkar chuno. Par one-party system mein to ek hi option hai, koi vikalp nahi! Toh wo choice chheen leta hai aur dictatorship jaisa ban jaata hai. Isiliye democracy ke saath fit nahi baithta. Yaad rakho: 'no choice = no democracy'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "P4-1001", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Party systems (coalition)", "question": "Explain the main characteristics of a coalition government.", "answer": "A coalition government forms when no single party wins a clear majority, so several parties join together to form the government on the basis of a common programme. It represents diverse interests and opinions, requires give-and-take among partners, and reduces the dominance of any single party.", "explanation": "Jab kisi ek party ko clear majority nahi milti, tab kai parties milkar sarkar banati hain - ise coalition government kehte hain. Socho ek 'team-up' jaha sab apna-apna interest leke aate hain aur compromise karke chalte hain. Faayda: har group ko jagah, aur kisi ek party ki dadagiri nahi. Multi-party system ka common result hai yeh.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "P5-1027", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Assessing outcomes of democracy", "question": "Analyse the positive outcomes of the democracy.", "answer": "Positive outcomes of democracy include citizen participation based on norms, regular free elections, open public debate built on deliberation and negotiation, right to information, equality, responsiveness, and a legitimate transparent government.", "explanation": "Democracy ke positive results - participation, free elections, public debate (deliberation aur negotiation se), right to information, equality. Sarkaar logon ki sunti hai aur transparent rehti hai. Hook: 'participation + elections + deliberation = democracy ke fruits'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "P5-1040", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Values of democracy", "question": "\"Democracy is a legitimate government with deep values.\" Examine the statement.", "answer": "Democracy is a legitimate government rooted in deep values – it is the people's own lawful government based on consent, and rests on values like equality, dignity, freedom, justice and respect for diversity.", "explanation": "Democracy sirf ek system nahi, gehre values pe tiki hai - equality, dignity, freedom, justice. Aur yeh legitimate hai kyunki janta ne khud chuna hai. Hook: 'legitimate (janta ki chuni) + deep values = democracy'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "P5-1041", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Cartoon-based (strength of democracy)", "question": "Look at the given picture carefully and choose the most appropriate option : Which of the following is a strength of democracy highlighted in the cartoon ?", "answer": "(D) Thinking/accommodation of various demands. The cartoon shows democracy's strength of balancing and accommodating the many different demands of people.", "explanation": "Cartoon wala question - democracy ki strength hai alag-alag demands ko 'accommodate' karna, sabko balance mein rakhna. Itni saari maange aur phir bhi sabko saath lekar chalna - yahi democracy ki taaqat. Hook: 'sab ki maang ka jugaad = democracy ki power'.", "years": ["2026"], "papers": 1, "raw": 5, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "P5-1042", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Democracy vs dictatorship", "question": "Differentiate between democracy and dictatorship.", "answer": "Democracy: people elect leaders, government is accountable, power lies with the people, free and fair elections with guaranteed rights. Dictatorship: no public role in choosing rulers, government not accountable, power with one person/small group, no free elections and no guaranteed rights/freedom.", "explanation": "Difference table yaad rakho - Democracy: janta chunti hai, sarkaar jawabdeh, power janta ke paas, free elections + rights. Dictatorship: ek banda boss, na election na rights. Hook: 'democracy = sabki, dictatorship = ek ki'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "P5-1043", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Cartoon-based (economic inequality)", "question": "Look at the given cartoon carefully and answer the question that follow : [Cartoon showing a large person representing 'Rich Nations' and a small person representing 'Poor Nations' on a seesaw, with the rich nations much heavier] Which of the following concepts is best illustrated in the cartoon ?", "answer": "(C) Uneven distribution of wealth among nations. The cartoon contrasting rich and poor nations highlights the uneven/unequal distribution of wealth across countries.", "explanation": "Cartoon mein ameer nation bada aur gareeb nation chhota dikhaya - matlab duniya mein daulat ka batwara barabar nahi hai. Yeh 'uneven distribution of wealth' dikhata hai. Hook: 'seesaw imbalance = wealth ka uneven batwara'.", "years": ["2026"], "papers": 1, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E1-8", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "World Bank – Criterion for Development", "question": "'Per capita income' is criterion for development of which one of the following?", "answer": "(D) World Bank. Per capita income is the criterion used by the World Bank.", "explanation": "Per capita income kiska favourite criterion hai? World Bank ka. Bas isko ulta-seedha pucha jaata hai – kabhi 'World Bank kya use karta hai', kabhi 'per capita income kiska criterion hai'. Jawab dono ka link same: World Bank ↔ Per Capita Income.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E1-11", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "HDI – Reading Country Data Tables", "question": "Look at the given table showing HDI Rank in the World and answer the questions given below : Amongst the given countries, which one of the following countries has the lowest HDI Rank ?", "answer": "(B) India – among the listed countries India has the lowest HDI rank number, i.e. the highest HDI level.", "explanation": "Yahan 'lowest HDI rank' poocha hai – aur rank ka number jitna kam, utni achhi position. India ka rank sabse kam number hai inn options mein, isliye answer India. Confuse mat ho: 'lowest rank number' actually 'best development' dikhata hai. Padhke jawab do, ratt ke nahi.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E1-12", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "HDI – Reading Country Data Tables", "question": "Study the following table related to World Human Development Index and answer the question that follow : S. No. Country HDI Rank in the World 1. India 130 2. Myanmar 148 3. Nepal 149 4. Pakistan 150 Which one of the following countries has the highest HDI Rank in the World?", "answer": "(D) Pakistan – it has the highest HDI rank number (150), i.e. the lowest HDI level among the four.", "explanation": "Dhyaan se: 'highest HDI rank' matlab rank ka sabse bada number, jo actually sabse buri position hoti hai. Pakistan ka rank 150 hai – sabse bada number, isliye answer Pakistan. India 130 pe hai yaani best. Yeh wording wala trap hai, rank aur level ko ulta mat samajhna.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E1-14", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "HDI – Reading Country Data Tables", "question": "Read the table given below carefully and answer the question that follow : Data of few Countries Country Gross National Income (GNI) per capita (2017 PPP) in US $ Life Expectancy at birth Mean Years of Schooling of People aged 25 and above HDI Rank in the world (2021-22) A 12,578 76.4 10.8 73 B 6,590 67.2 6.7 132 C 3,851 65.7 6.4 149 D 4,624 66.1 4.5 161 E 3,877 68.4 5.1 143 F 5,472 72.4 7.4 129 Which of the following countries has high per capita income, life expectancy at birth and high rank in human development index?", "answer": "(a) A – Country A has the highest GNI per capita, highest life expectancy and the best HDI rank (73).", "explanation": "Country A ke saare numbers sabse upar hain – income 12,578, life expectancy 76.4, aur HDI rank 73 (best). Isliye yeh teeno parameters mein top. Trick yaad rakho: high income + high life expectancy + chhota rank number = sabse developed country. Yahan clearly A jeet raha hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E1-15", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "HDI – Reading Country Data Tables", "question": "Which one of the following countries has a high 'Human Development Index' score?", "answer": "(C) India – among the given options, India has the higher HDI score.", "explanation": "Inn options mein se India ka HDI score sabse achha aata hai. 'High HDI score' matlab behtar development. Bas yaad rakho ki har sawaal ka data alag hota hai – yahan India winner hai, par doosri jagah Sri Lanka ya Country A ho sakta hai. Hamesha diye gaye numbers dekho.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E1-18", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "World Bank & UNDP – Reports", "question": "By which organization is the Human Development Report published ?", "answer": "(C) United Nations Development Programme (UNDP) publishes the Human Development Report.", "explanation": "Human Development Report kaun publish karta hai? UNDP – United Nations Development Programme. Yaad rakho: 'Human' development insaano ke baare mein (health, education), aur yeh UNDP ka kaam hai. World Bank ka kaam paise/income (World Development Report) dekhna hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E1-25", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Measuring Development – Indicators", "question": "Choose the correct option to fill in the blank : The total value of all final goods and services produced within a country in a particular year is called __________.", "answer": "(D) Gross Domestic Product (GDP) – the total value of all final goods and services produced within a country in a year.", "explanation": "GDP ki definition hi yeh hai: ek saal mein desh ke andar bani saari final goods aur services ki total keemat. 'Final' word important hai – kachha maal count nahi hota, sirf taiyaar product. Memory hook: Gross = total, Domestic = desh ke andar, Product = saaman.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E1-31", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Different People, Different Developmental Goals", "question": "Read the following developmental goals and choose correct option of goals related to a student studying in university.", "answer": "(c) Only (i), (ii) and (iv) are correct – these match the developmental goals of a university student.", "explanation": "University student ke goals kya honge? Achhi padhai, career/job, aur freedom – yeh teen (i, ii, iv) sahi. Har role ka apna sapna hota hai: student ko career chahiye, kisaan ko daam, mazdoor ko wages. Memory hook: socho ek student kya maangega, wahi options pick karo.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E1-34", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Different People, Different Developmental Goals", "question": "How can development for one be destructive for another? Explain.", "answer": "Development for one group can harm another because their interests differ. E.g. building a big dam gives electricity/water to industries and cities but submerges land and displaces tribals and villagers who lose their homes and livelihood.", "explanation": "Kabhi-kabhi ek ka vikas doosre ki barbaadi ban jaata hai. Bada dam banao toh sheher ko bijli-paani milta hai, par gaon-walon aur aadivasiyon ki zameen doob jaati hai, ghar ujad jaate hain. Memory hook: 'kisi ki khushi, kisi ka aansoo' – yahi contradictory development hai. Dam ka example sabse strong hai.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "E1-35", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Different People, Different Developmental Goals", "question": "“The goals of development may also be contradictory.” Examine the statement through examples.", "answer": "Development goals can be contradictory because what benefits one may harm another. E.g. industrialists wanting dams for electricity may displace local communities; a girl wanting freedom and shared housework may conflict with her brother's expectations.", "explanation": "Development ke goals aapas mein takra sakte hain. Industrialist ko dam se bijli chahiye, par usi dam se logon ki zameen doobti hai. Ya ghar mein ladki chahti hai azaadi aur barabari ka kaam, par bhai ki soch alag. Memory hook: ek ka faayda doosre ka nuksaan = contradictory goals. Do alag-alag example likho toh poore marks.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "E1-36", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Different People, Different Developmental Goals", "question": "Analyse the social and economic goals of development.", "answer": "Development has both economic goals (higher income, more income-earning jobs, better wages, support prices) and social goals (equal treatment, freedom, security, respect, education, healthcare and a pollution-free environment). People want more than just income for a good life.", "explanation": "Development sirf paise tak limited nahi hai. Economic goals: zyada income, job, achhe daam. Social goals: izzat, azaadi, security, achhi padhai aur health, saaf hawa. Memory hook: 'paisa bhi, izzat bhi' – dono milke asli development banti hai. Dono side ke points likhna exam mein zaroori hai.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 3}, {"key": "E1-43", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Sustainability of Development", "question": "Why is the question of sustainability of development becoming challenging in the present times ? Analyse the appropriate reasons.", "answer": "Sustainability is becoming challenging because of rapid depletion of natural resources, overuse of groundwater, rising pollution, global warming from industrialisation, and deforestation — all of which threaten resource availability for the future.", "explanation": "Sustainability aaj challenge isliye ban gayi hai kyunki resources tezi se khatam ho rahe hain, groundwater zyada nikala ja raha hai, pollution aur global warming badh rahe hain, aur jungle kat rahe hain. Memory hook: jitna zyada hum aaj loot rahe hain, kal utna hi kam bachega. Reasons point-wise likho.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 3}, {"key": "E1-46", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Sustainability of Development", "question": "Explain the meaning of 'Sustainable Development'.", "answer": "Sustainable development is development that meets the needs of the present generation without compromising the ability of future generations to meet their own needs, by conserving the environment and using resources judiciously.", "explanation": "Sustainable development ki seedhi definition: aisa vikas jo aaj ki zaruraton ko poora kare bina aane waali peedhi ka haq cheene. Matlab resources aise use karo ki future mein bhi bachein. Memory hook: 'aaj bhi, kal bhi'. (Note: id 2169 ka diya official answer galti se religion ke baare mein hai; sahi answer Development ka diya gaya hai.)", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "E1-47", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Sustainability of Development", "question": "Recent evidence suggests that overuse of groundwater is threatening the sustainability of development. Justify the statement in the context of sustainability of development.", "answer": "Although groundwater is a renewable resource, its overuse across India (for farming, industry and drinking) is exhausting it faster than it can recharge, lowering the water table. This threatens future water supply, farming and survival, showing development is unsustainable if resources are overused.", "explanation": "Groundwater renewable hai, par hum itna zyada nikaal rahe hain ki woh dobara bharne se pehle khatam ho raha hai – water table neeche ja raha hai. Kheti, industry aur peene ka paani sab khatre mein. Memory hook: 'renewable bhi over-use se mukne lagta hai'. Yeh sustainability ka best example hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 3}, {"key": "E1-48", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Sustainability of Development", "question": "\"The question of sustainability of development becoming more complex day by day.\" Examine the statement in context of use of underground water in India.", "answer": "Sustainability is becoming complex because India's underground (ground) water — a renewable resource — is being overused for irrigation, industry and households, so the water table is falling rapidly. If this continues, future generations will face acute water scarcity.", "explanation": "India mein underground water dhad
