Credit in Development", "count": 27}, {"topic": "Self-Help Groups (SHGs)", "count": 24}, {"topic": "Money as Medium of Exchange", "count": 22}, {"topic": "Cooperative Societies", "count": 21}, {"topic": "Banking & Deposits", "count": 18}, {"topic": "Choosing a Credit Source (Case-based)", "count": 18}, {"topic": "Reserve Bank of India", "count": 12}, {"topic": "Distribution of Credit", "count": 12}]}, {"code": "E1", "name": "Development", "marks_per_paper": 4.6, "importance": "MEDIUM", "total_q": 222, "total_q_raw": 222, "papers": 23, "years": 4, "concepts": 73, "topics": [{"topic": "Different People, Different Developmental Goals", "count": 31}, {"topic": "HDI – Reading Country Data Tables", "count": 30}, {"topic": "Sustainability of Development", "count": 29}, {"topic": "Development Indicators – Literacy, IMR, Attendance", "count": 27}, {"topic": "World Bank & UNDP – Reports", "count": 24}, {"topic": "World Bank – Criterion for Development", "count": 20}, {"topic": "Average / Per Capita Income", "count": 18}, {"topic": "Measuring Development – Indicators", "count": 10}, {"topic": "Development Indicators – Reading State Data Tables", "count": 10}, {"topic": "Public Facilities & Quality of Life", "count": 6}, {"topic": "Government's Role in Development", "count": 6}, {"topic": "Development Indicators – Health (BMI)", "count": 6}, {"topic": "Money Cannot Buy Everything (Non-material things)", "count": 5}]}, {"code": "E4", "name": "Globalisation and the Indian Economy", "marks_per_paper": 4.4, "importance": "MEDIUM", "total_q": 161, "total_q_raw": 161, "papers": 23, "years": 4, "concepts": 40, "topics": [{"topic": "Technology and globalisation", "count": 45}, {"topic": "Liberalisation 1991", "count": 28}, {"topic": "Meaning of liberalisation", "count": 15}, {"topic": "Impact of globalisation", "count": 12}, {"topic": "Meaning of globalisation", "count": 12}, {"topic": "Trade barriers", "count": 9}, {"topic": "MNCs and production", "count": 7}, {"topic": "Attracting foreign investment", "count": 7}, {"topic": "MNCs and joint production", "count": 6}, {"topic": "Foreign trade and globalisation", "count": 5}, {"topic": "Fair globalisation", "count": 4}, {"topic": "MNCs (case examples)", "count": 3}, {"topic": "Impact of globalisation on workers", "count": 3}, {"topic": "Aspects of globalisation", "count": 3}, {"topic": "Exchange rates", "count": 1}, {"topic": "Factors of globalisation", "count": 1}]}]}], "concepts": [{"key": "H2-628", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Map work", "question": "Two places (A) and (B) have been marked on the given outline political Map of India. Identify them with the help of given information and write their correct names on the lines drawn near them : (A) The place where the session of INC was held in September, 1920. (B) The place where Mahatma Gandhi broke Salt Law.", "answer": "Standard National Movement map locations: Dandi, Gujarat (Gandhi broke the Salt Law); INC session - Calcutta/Kolkata (Sept 1920), Nagpur (Dec 1920), Madras/Chennai (1927); Amritsar (Jallianwala Bagh / Gen. Dyer's firing, 13 Apr 1919); Champaran, Bihar (Satyagraha for indigo peasants); Ahmedabad (cotton mill workers' movement / 'Do or Die' speech at Bombay).", "explanation": "Beta, ye saare ek hi 'map-locate' skill hai - bas India ke outline map par National Movement ke famous jagah mark karne hain. Yaad rakho: Dandi = namak kanoon toda, Champaran = neel (indigo) wala satyagraha, Amritsar = Jallianwala Bagh, INC session 1927 = Madras (Chennai) aur 1920 = Calcutta/Nagpur. Trick: 'Dandi-Daandaa' namak pe, 'Champaran-Champi' kisaano ki - ek baar set yaad kiya to poora 2-marker pakka!", "years": ["2023", "2024", "2025", "2026"], "papers": 23, "raw": 127, "marks": 1, "types": ["Map", "VSA"], "score": 55}, {"key": "P5-1019", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Accountable, responsive & legitimate government", "question": "Democracy is an accountable and legitimate government. Support this statement.", "answer": "Democracy is accountable, responsive and legitimate because rulers are chosen and controlled by the people through regular free and fair elections, decisions follow set norms and procedures with a right to information, and it is the people's own government.", "explanation": "Democracy mein sarkaar janta ko jawab degi (accountable), unki zaroorat puri karegi (responsive) aur janta ne hi use chuna hai (legitimate). Regular elections, transparency aur right to information isko mazboot banate hain. Hook: 3 cheezein - Accountable, Responsive, Legitimate (A-R-L).", "years": ["2023", "2024", "2025", "2026"], "papers": 13, "raw": 23, "marks": 5, "types": ["LA", "SA"], "score": 24}, {"key": "P4-975", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Functions of political parties", "question": "\"Political parties perform a series of functions in the democracy.\" Explain the statement with examples.", "answer": "Political parties: (1) contest elections and put forward policies/programmes; (2) play a decisive role in making laws and form & run governments; (3) those who lose act as the opposition and shape public opinion, also helping citizens access government schemes and welfare.", "explanation": "Bhai, political parties democracy ki backbone hoti hain. Yaad rakhne ka simple tarika: socho ek party kya-kya karti hai election se le kar government tak. Election ladti hai, policies banati hai, laws pass karti hai, sarkar banati/chalati hai, aur jo haar jaaye woh opposition ban kar sarkar pe nazar rakhti hai. Plus, public opinion banati hai aur logon ko schemes tak pahunchaati hai. Memory hook: 'EPLGO' - Election, Policy, Law, Government, Opposition.", "years": ["2023", "2024", "2025", "2026"], "papers": 12, "raw": 26, "marks": 3, "types": ["LA", "SA", "VSA"], "score": 30}, {"key": "P4-979", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Challenges to political parties", "question": "Explain any five challenges faced by political parties in India.", "answer": "Main challenges: (1) Lack of internal democracy (no regular organisational elections, power with few leaders); (2) Dynastic succession (top posts go to family members); (3) Growing role of money and muscle power, especially during elections; (4) Lack of meaningful choice for voters as parties' policies differ little.", "explanation": "Char bade problems yaad karo - main inhe '4 D/M' bolta hoon: (1) internal Democracy ki kami, (2) Dynasty (parivaarvaad - bete-bete ko ticket), (3) Money & Muscle power, (4) voters ke paas Meaningful choice nahi. Socho ek party andar se hi loktantrik nahi, to bahar kya karegi? Yeh chaaron points har challenge wale answer mein fit ho jaate hain.", "years": ["2023", "2024", "2025", "2026"], "papers": 12, "raw": 20, "marks": 3, "types": ["LA", "SA"], "score": 30}, {"key": "E2-80", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Importance of the Tertiary Sector", "question": "Examine the rising importance of the tertiary sector in India.", "answer": "The tertiary sector is rising because it provides basic services (transport, banking, healthcare, education), supports the primary and secondary sectors, generates large employment, contributes the highest share to GDP, and demand grows with rising incomes and new services like IT.", "explanation": "Tertiary (service) sector India mein tezi se badh raha hai kyunki income badhne par log zyada services chahte hain - hospital, bank, IT, transport. Ye baaki dono sectors ko bhi support karta hai aur ab GDP mein sabse bada hissa deta hai. Memory hook: 'Paise badhe = services ki demand badhe'.", "years": ["2023", "2024", "2025", "2026"], "papers": 11, "raw": 15, "marks": 3, "types": ["LA", "SA"], "score": 29}, {"key": "P5-1018", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Democracy vs other forms (better government)", "question": "Democracy is a better form of government. Support this statement.", "answer": "Democracy is better than other forms because it promotes equality and individual dignity, improves the quality of decision-making through discussion, provides peaceful methods to resolve conflicts, allows mistakes to be corrected, and is accountable and legitimate.", "explanation": "Democracy baaki sab systems se behtar kyun? Kyunki yeh barabari aur izzat deti hai, decisions soch-samajh ke leti hai, jhagde shaanti se suljhaati hai, aur galti ho to sudhaarne ka mauka deti hai. Dictatorship mein yeh sab kahaan! Hook: 'equality + dignity + correction = democracy wins'.", "years": ["2023", "2024", "2025", "2026"], "papers": 11, "raw": 17, "marks": 5, "types": ["LA", "SA", "VSA"], "score": 26}, {"key": "H1-603", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Balkans & nationalism", "question": "How did nationalism aligned with imperialism lead Europe to disaster in 1914 ? Explain.", "answer": "By the late 19th century nationalism became intolerant and aligned with imperialism. The Balkans, with diverse Slav peoples under the declining Ottoman Empire, became a 'powder keg': Balkan states fiercely competed for territory while the Big Powers (Russia, Germany, England, Austria-Hungary) jostled for control. This rivalry and a series of Balkan wars finally exploded into the First World War in 1914.", "explanation": "Late 1800s tak nationalism 'aggressive' ho gaya aur imperialism se mil gaya. Balkans ek baarood ka dher ban gaya - andar Slav kaumein azaadi maang rahi thi aur bahar bade desh (Russia, Germany, Austria, England) control ke liye lad rahe the. Yahi rivalry 1914 mein World War I ban gayi. Hook: Balkans = Europe ka 'powder keg' jo 1914 mein phata.", "years": ["2024", "2025", "2026"], "papers": 8, "raw": 12, "marks": 5, "types": ["LA", "SA"], "score": 26}, {"key": "E3-152", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Formal vs Informal Sources of Credit", "question": "Differentiate between formal and informal sources of credit.", "answer": "Formal sources (banks, cooperatives) are RBI-supervised, charge low interest, require collateral/documents and use fair recovery. Informal sources (moneylenders, traders, friends) are unsupervised, charge very high interest and may use unfair means, raising debt-trap risk.", "explanation": "Difference ka core: FORMAL = RBI ki supervision, kam byaaj, collateral/papers chahiye, fair recovery. INFORMAL = koi supervision nahi, mehenga byaaj, debt-trap ka risk. Exam mein table banao: 'Supervision / Interest rate / Collateral / Recovery' — 4 points se 3-5 marks pakke. Bhaiya tip: formal = safe, informal = jaal.", "years": ["2023", "2025", "2026"], "papers": 8, "raw": 10, "marks": 5, "types": ["LA", "SA", "VSA"], "score": 21}, {"key": "G5-494", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Map work - Narora nuclear plant (UP)", "question": "Name the place where Nuclear Power Plant is located in Uttar Pradesh.", "answer": "Narora (Naraura) Atomic Power Station is located in Uttar Pradesh. (Answer to both 'locate Narora' and 'name the nuclear plant in UP'.)", "explanation": "Uttar Pradesh ka nuclear power plant = Narora (Naraura)! Sab variations - chahe 'Narora locate karo' ya 'UP mein nuclear plant batao' - jawab ek: Narora, UP. Spelling alag-alag (Narora/Naraura) par jagah same. (Note: id 461, 2469 ke answer fields mein galat data chhapaa hai.)", "years": ["2023", "2024", "2025", "2026"], "papers": 8, "raw": 21, "marks": 1, "types": ["Map", "VSA"], "score": 19}, {"key": "H1-573", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Liberal nationalism", "question": "“Ideas of national unity in the early nineteenth century Europe were closely allied to the ideology of liberalism.” Examine the statement.", "answer": "Liberalism meant individual freedom and equality before law. Politically it stood for government by consent, a constitution and representative parliaments (suffrage limited to propertied men). Economically it meant free markets and the abolition of state restrictions on the movement of goods and capital. These ideas were closely allied to the demand for national unity.", "explanation": "Liberalism ka root word hai 'liberty' = azaadi. Teen flavours yaad rakho - Political: janta ki consent aur constitution; Legal: sab kanoon ke saamne barabar; Economic: free market, trade pe rok khatam. Middle class ye sab chahti thi, aur isi ke saath 'ek nation' wali demand judi thi. Hook: Liberty + Equality + Free Trade.", "years": ["2023", "2024", "2025", "2026"], "papers": 8, "raw": 14, "marks": 2, "types": ["LA", "SA", "VSA"], "score": 19}, {"key": "H3-693", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Silk Route", "question": "\"The Silk route was a good example of vibrant pre-modern trade and cultural links between distant parts of the world.\" Explain the statement with any two examples.", "answer": "The Silk Routes linked distant regions of Asia with Europe and North Africa, enabling trade in goods (Chinese silk and pottery, Indian/SE Asian textiles and spices, European gold and silver) and the two-way exchange of culture, religion and ideas. MCQ: silk-route trade = (d) due to trade and cultural exchange; from India/SE Asia travelled (B) clothes and spices.", "explanation": "Silk Route matlab purane zamane ka super-highway jo China se Europe-Africa tak judta tha. Sirf silk hi nahi - pottery, spices, kapde, sona-chandi sab travel karte the, aur saath mein religion aur ideas bhi. Memory hook: 'maal bhi, vichaar bhi' - trade aur culture dono saath-saath chalte the, isliye ye 'vibrant trade and cultural exchange' ka best example hai.", "years": ["2023", "2024", "2025", "2026"], "papers": 8, "raw": 18, "marks": 2, "types": ["MCQ", "SA", "VSA"], "score": 17}, {"key": "P5-1016", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Accommodation of social diversity", "question": "Analyse the conditions under which democracies accommodate social diversities.", "answer": "Democracies accommodate diversity when the majority works with the minority, differences are negotiated peacefully, all groups get equal treatment, and no group feels permanently excluded (e.g. Belgium managing ethnic differences); they do this far better than dictatorship.", "explanation": "Bhai, India jaisa diverse desh democracy se hi chal sakta hai. Yahan majority aur minority milke kaam karte hain, har community ko barabari milti hai aur koi group hamesha ke liye 'loser' feel nahi karta. Belgium iska best example hai. Hook: 'majority + minority saath chalo, tabhi diversity sambhalti hai'.", "years": ["2023", "2024", "2025"], "papers": 8, "raw": 10, "marks": 5, "types": ["LA", "SA"], "score": 15}, {"key": "E3-191", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Self-Help Groups (SHGs)", "question": "Justify the role of ‘Self Help Groups’ in the rural economy.", "answer": "SHGs organise the rural poor (mainly 15–20 women) to pool savings and give small loans at reasonable rates without collateral. They help members get bank loans, promote self-employment and women's empowerment, ensure repayment, and provide a platform to discuss social issues.", "explanation": "SHG = 15-20 logon (zyaadatar mahilaayein) ka group jo paisa pool karke aapas mein chhota loan deta hai — bina collateral! Group ki guarantee pe bank bhi loan deta hai. Isse self-employment, mahila sashaktikaran aur samaj ki problems pe baat hoti hai. Points: pool savings + no collateral + bank loan + women empowerment. 5-marker, 4-5 points likhna.", "years": ["2023", "2024", "2025", "2026"], "papers": 7, "raw": 14, "marks": 5, "types": ["LA", "SA"], "score": 19}, {"key": "E2-86", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Organised vs Unorganised sector", "question": "Compare the employment conditions prevailing in the organized and unorganized sector.", "answer": "Organised sector: regular, secure jobs, registered, follows government rules, fixed hours with overtime pay, and benefits (PF, paid leave, medical). Unorganised sector: irregular, insecure jobs, unregistered, rules not followed, long hours, no overtime, and no benefits.", "explanation": "Organized vs Unorganized ka seedha farak: Organized mein job pakki, rules follow, PF/leave/medical milta hai. Unorganized mein sab ulta - kaam kabhi hai kabhi nahi, koi security ya benefit nahi. Memory hook: 'Organized = aaram aur rule, Unorganized = risk aur no rule'.", "years": ["2023", "2024", "2025", "2026"], "papers": 7, "raw": 8, "marks": 5, "types": ["LA", "SA", "VSA"], "score": 17}, {"key": "P4-976", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Need for political parties in democracy", "question": "Analyze the need of Political Parties in the Democracy.", "answer": "Political parties are a necessary condition for democracy: large representative democracies need parties to gather diverse views and present them to government, to form a responsible government, to support or restrain it, and to make/oppose policies. Without parties every candidate would be independent and no government could take or be held responsible for collective decisions.", "explanation": "Imagine cricket match bina teams ke - har player apne liye khelega, koi taalmel nahi! Waise hi bina parties ke har neta apni constituency dekhega, poore desh ki nahi. Parties hi alag-alag logon ko ek chhat ke neeche laa kar responsible sarkar banati hain. Isiliye representative democracy aur political parties saath-saath paida hue - ye link hi exam mein bar-bar poocha jaata hai. Yaad rakho: 'no parties = no accountable government'.", "years": ["2023", "2025", "2026"], "papers": 7, "raw": 27, "marks": 2, "types": ["Case-based", "LA", "SA"], "score": 17}, {"key": "H2-636", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Civil Disobedience Movement - social groups", "question": "Explain the role of women in the Civil Disobedience Movement, with examples.", "answer": "Thousands of women joined the Salt March, made salt, picketed foreign-cloth and liquor shops, and courted arrest. Mostly from high-caste urban families and rich peasant households, they saw national service as a sacred duty - though Gandhi long kept them in symbolic rather than authority roles.", "explanation": "Civil Disobedience mein auratein bahar nikal aayin - namak banaya, sharab-videshi kapde ki dukaanon par picketing ki, aur jail bhi gayin. Inke liye desh-seva ek 'sacred duty' thi. Hook: 'Namak banaya, dukaan par dharna, jail jaana - mahilaon ka bahaduri ka nazraana'.", "years": ["2023", "2024", "2025", "2026"], "papers": 7, "raw": 9, "marks": 5, "types": ["LA", "SA"], "score": 13}, {"key": "H1-602", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Unification of Italy", "question": "Evaluate the role of Giuseppe Mazzini in the unification of the Italian Republic.", "answer": "Giuseppe Mazzini, a fervent Italian revolutionary, founded the secret societies Young Italy (Marseilles) and Young Europe (Berne) to spread the idea of Italy as one unified republic. Through his vision and tireless propaganda he inspired a generation of nationalists - Metternich called him 'the most dangerous enemy of our social order' - giving Italian unification its ideological base.", "explanation": "Mazzini Italy ki unification ka 'idea aur josh' wala hero tha - usne 'Young Italy' aur 'Young Europe' jaisi secret societies banakar ek united Italian republic ka sapna failaaya. Metternich ne to ise 'humare order ka sabse khatarnaak dushman' kaha! Hook: Mazzini = soch aur inspiration ka leader.", "years": ["2024", "2025", "2026"], "papers": 6, "raw": 6, "marks": 5, "types": ["LA"], "score": 20}, {"key": "E4-227", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Technology and globalisation", "question": "“Rapid improvement in technology has been one major factor that has stimulated the globalisation process.” Explain the statement with examples.", "answer": "Technology stimulated globalisation: improved transport (containers, air freight) made goods delivery faster and cheaper over long distances, while ICT (telecom, computers, internet, email) enabled instant global communication and spread of services - connecting the world.", "explanation": "Technology globalisation ka engine hai! Transport sudhra (containers, hawai jahaaz) toh saaman door tak sasta aur jaldi pahunchne laga; aur ICT (phone, internet, email) se duniya bhar mein turant baat-cheet shuru ho gayi. Memory hook: tej transport + tej internet = duniya juda. Naye technology ne distance ko mitaa diya.", "years": ["2024", "2026"], "papers": 6, "raw": 17, "marks": 3, "types": ["LA", "SA"], "score": 18}, {"key": "G7-561", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Map work - Punjab Airport", "question": "Airport – Sri Guru Ram Dass Jee International Airport", "answer": "The international airport in Punjab is at Amritsar - Sri Guru Ram Dass Jee International Airport (formerly Raja Sansi Airport); Chandigarh is also accepted.", "explanation": "Punjab ka international airport = Amritsar (Sri Guru Ram Das Jee / Raja Sansi airport). Golden Temple ki nagri mein. Hook: 'Amritsar-Airport' dono A se; Raja Sansi aur Sri Guru Ram Das ek hi jagah ke do naam. Map pe North-West (Punjab) mein mark.", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 14, "marks": 1, "types": ["Map"], "score": 17}, {"key": "P1-811", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Why Power Sharing is Desirable", "question": "Why is power sharing desirable in democracy? Explain", "answer": "Power sharing is desirable for prudential reasons (reduces conflict between social groups, ensures political stability, controls violence) and moral reasons (it is the very spirit of democracy and gives citizens a stake through participation, increasing trust between groups).", "explanation": "Power sharing kyun zaruri? Do tarah ke reason yaad karo - Prudential (samajhdari wale): jhagda kam, stability zyada, hinsa control. Moral (usool wale): ye toh democracy ki aatma hai, har citizen ko awaaz milti hai aur groups ke beech bharosa badhta hai. Memory hook: 'Prudential + Moral' = PM ka rule.", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 10, "marks": 5, "types": ["LA", "SA", "VSA"], "score": 16}, {"key": "P5-1030", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Reducing inequality & poverty", "question": "Explain with examples the role of democracy in the reduction of inequality and poverty.", "answer": "Democracy promotes social justice/equality through universal adult franchise (political equality) and welfare schemes, reservations etc. for marginalised groups; though democracies are often not very successful at removing economic inequalities, they keep working to reduce poverty and disparity.", "explanation": "Democracy political equality (har banda ek vote) to deti hai, aur welfare schemes, reservation se gareebi aur inequality kam karne ki koshish karti hai. Par sach yeh bhi hai ki economic inequality poori tarah khatam karna mushkil hota hai. Hook: 'one person one vote' equality ka asli example.", "years": ["2024", "2025"], "papers": 6, "raw": 10, "marks": 5, "types": ["LA"], "score": 15}, {"key": "P5-1020", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Dignity & freedom of citizens", "question": "“Democracy stands much superior to any other forms of governments in promoting dignity and freedom of the individual.” Support the statement with arguments.", "answer": "Democracy is superior in promoting dignity and freedom because it is built on political equality, guarantees freedom of speech and rights, ensures equal treatment of all (including women and weaker sections), and lets citizens demand respect from those in power.", "explanation": "Koi bhi government democracy jitni izzat aur azaadi nahi de sakti. Yahan har banda barabar, sabko bolne ki freedom, aur kamzor logon ko bhi haq milta hai. Dictatorship mein to bas chup rehna padta hai! Hook: 'dignity + freedom mein democracy = No.1'.", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 9, "marks": 5, "types": ["LA", "SA"], "score": 14}, {"key": "H1-575", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "French Revolution & nation-making", "question": "Describe any three measures that were introduced by the French revolutionaries to create a sense of collective identity amongst the French people.", "answer": "Measures included: the ideas of la patrie (fatherland) and le citoyen (citizen); a new tricolour flag replacing the royal standard; the Estates General renamed the National Assembly; new hymns, oaths and martyr commemorations; a centralised administration with uniform laws, abolition of internal customs duties and uniform weights and measures; and French made the common national language.", "explanation": "French revolutionaries ne logon ko 'hum ek hain' feel karaane ke liye kai cheezein kiin - sabko 'citizen' (le citoyen) aur desh ko 'la patrie' kaha, naya tricolour laaye, Estates General ko National Assembly banaaya, ek bhasha (French) aur ek jaisa kanoon-naap-tol set kiya. Hook: jhanda + bhasha + kanoon + 'citizen' = ek nation.", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 10, "marks": 3, "types": ["LA", "SA"], "score": 13}, {"key": "H3-697", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Migration to America", "question": "Why did Europeans flee to America in the 19th century ? Explain.", "answer": "Due to widespread poverty and hunger, overcrowded cities with deadly diseases, and religious conflicts and persecution of dissenters - America offered land and better economic opportunity. (MCQ on reasons: poverty/hunger, disease, religious conflict are correct - 'slaves for sale' is not a reason Europeans themselves fled.)", "explanation": "19th century Europe mein halaat kharab the - gareebi, bhookh, bheed-bhaad wale shehar, jaanleva bimariyaan aur religion ke jhagde. Logon ne socha America mein nayi zindagi milegi, zameen aur kaam milega. Memory hook: 'PHD-R' - Poverty, Hunger, Disease, Religious conflict - inse bhaag ke America. ('Slaves for sale' Europeans ke bhaagne ki wajah nahi thi.)", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 12, "marks": 2, "types": ["MCQ", "VSA"], "score": 13}, {"key": "P3-943", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Secularism in India", "question": "Explain any two provisions that make India a secular state.", "answer": "India has no official state religion; the Constitution gives all citizens freedom to profess, practise and propagate any religion (or none); it prohibits discrimination on the basis of religion; and allows the state to intervene to ensure equality within religious communities (e.g. banning untouchability).", "explanation": "Secular state ka matlab - sarkar ka koi apna dharm nahi hota. India mein sabko apna dharm maanne, practise karne aur failane ki azadi hai, ya koi dharm na maano toh bhi chalega. Dharm ke naam par bhedbhaav bhi mana hai. Yaad rakho 3 baatein: koi official religion nahi, sabko freedom, aur no discrimination. Yeh hi India ko 'sarv-dharma-sambhaav' wala secular desh banata hai.", "years": ["2023", "2025", "2026"], "papers": 6, "raw": 7, "marks": 2, "types": ["SA", "VSA"], "score": 13}, {"key": "H2-637", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Different meanings of Swaraj (workers, peasants, tribals)", "question": "Mahatma Gandhi's ideas and the concept of Swaraj were understood differently by plantation workers. Corroborate this statement.", "answer": "For Assam tea-plantation workers, Swaraj/'Gandhi Raj' meant freedom to move freely in and out of plantations and keep links with their villages, against the Inland Emigration Act of 1859. Hearing of Non-Cooperation, many left the plantations believing land would be given - but were caught and beaten.", "explanation": "Assam ke bagaan (tea garden) workers ke liye Swaraj ka matlab tha - apne gaon aana-jaana aazaad ho, kyunki 1859 ke Inland Emigration Act ne unhe band kar rakha tha. Unhone socha 'Gandhi Raj' aayega to zameen milegi. Hook: 'Workers ke liye Swaraj = gate khula, ghar wapas' - har group ka apna Swaraj!", "years": ["2023", "2024", "2025"], "papers": 6, "raw": 9, "marks": 5, "types": ["LA", "SA", "VSA"], "score": 11}, {"key": "H2-638", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Civil Disobedience Movement - Salt March", "question": "Mahatma Gandhi saw salt as a powerful symbol that could unite the nation. Corroborate this statement.", "answer": "Salt was used by rich and poor alike, so the British salt tax and monopoly touched everyone. Gandhi made it the centre of the Civil Disobedience Movement: the Dandi March (1930) and breaking the salt law let people across all classes and regions defy colonial authority, uniting the nation in protest.", "explanation": "Namak chhota lagta hai par genius idea tha - ameer ho ya gareeb, namak sab khaate hain! Salt-tax ne sabko chhua, isiliye Gandhi ji ne Dandi March karke namak kanoon toda aur poora desh ek saath protest mein aa gaya. Hook: 'Namak sabki thaali mein, isliye andolan sabki taali mein'.", "years": ["2023", "2025"], "papers": 6, "raw": 8, "marks": 5, "types": ["LA", "VSA"], "score": 10}, {"key": "E3-174", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Role of Credit in Development", "question": "How is credit essential for economic activities ? Explain with examples.", "answer": "Credit funds production expenses and working capital, helps set up industries and farms, lets projects finish on time, raises incomes and creates jobs—boosting overall economic development. E.g., a farmer buys seeds/fertilisers; a manufacturer meets working-capital needs.", "explanation": "Credit (udhaar) economy ka petrol hai. Isse kisaan beej-khaad khareedta hai, businessman factory chalata hai, projects time pe poore hote hain, income aur naukriyan badhti hain. Example zaroor likhna (Salim/kisaan). Positive role = production + income + employment.", "years": ["2024", "2025", "2026"], "papers": 5, "raw": 6, "marks": 3, "types": ["LA", "SA"], "score": 15}, {"key": "E4-228", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Meaning of liberalisation", "question": "Removing barriers or restrictions on business and trade set by the government is called as __________.", "answer": "Liberalisation - the removal of government-imposed barriers/restrictions on trade and investment (e.g. 'Removing trade barriers' / 'Removal of restriction on trade').", "explanation": "Liberalisation ka seedha matlab - government dwaara lagaye gaye trade aur business ke restrictions (barriers) hata dena. 'Liberal' = aazaad/free. Memory hook: Liberalisation = 'Liberty' to trade, sarkari taale khol diye. Jab bhi 'removing barriers/restrictions on trade' dikhe, jawaab Liberalisation.", "years": ["2024", "2025", "2026"], "papers": 5, "raw": 15, "marks": 1, "types": ["MCQ"], "score": 15}, {"key": "G1-282", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Land degradation", "question": "Explain any two measures to solve the problem of land degradation.", "answer": "Measures: afforestation, proper management of grazing, planting shelter belts, stabilising sand dunes with thorny bushes, managing wastelands, controlling mining, and proper treatment/disposal of industrial effluents.", "explanation": "Land degradation rokne ke upay: afforestation (ped lagao), grazing control, shelter belts, sand dunes ko thorny bushes se rokna, mining control aur industrial waste ka sahi disposal. Hook: 'Ped lagao, charai roko, kachra theek se nipta-o'.", "years": ["2024", "2025", "2026"], "papers": 5, "raw": 7, "marks": 2, "types": ["SA", "VSA"], "score": 15}, {"key": "H2-630", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Cultural nationalism (folklore, symbols, icons)", "question": "Analyse the role of folklore and symbols in the revival of nationalism in India during late 19th century.", "answer": "Nationalists revived folk tales, songs and legends (e.g. Rabindranath Tagore, Natesa Sastri) to restore pride in 'true' Indian culture. Icons like Bharat Mata, the image of Bharat Mata, and the tricolour/Swaraj flag became powerful symbols of unity and defiance, uniting people emotionally with the nation.", "explanation": "Bhaichara yahan simple hai - jab apni purani lok-kathayein, gaane aur Bharat Mata jaise icons logon ke saamne aaye, to ek 'hum sab ek hain' wali feeling aayi. Tagore ji ne folk songs jamaa kiye, jhanda uthhana defiance ka symbol ban gaya. Hook: 'Geet, kissa aur jhanda - inhi se juda desh ka dhanda (ekta)'.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 14, "marks": 5, "types": ["Case-based", "LA", "SA", "VSA"], "score": 14}, {"key": "P3-948", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Women in Politics - Representation", "question": "Suggest any three ways to enhance political participation of women in India.", "answer": "Legally mandate a fair proportion (reservation) of women in elected bodies - e.g. reserve at least one-third of seats in Lok Sabha and State Assemblies; effectively implement the Women's Reservation Act/Nari Shakti Vandan Adhiniyam 2023; raise political awareness, education and provide training/mentorship for women.", "explanation": "Aurton ko rajneeti mein laane ke liye sabse zaroori - kanoon se seats reserve karna (jaise Nari Shakti Vandan Adhiniyam 2023 / Women's Reservation Act), unhe political education dena, aur training-mentorship dena. Memory hook: 'reservation + awareness + training' teeno milein toh sansad mein aurtein badhein. Yeh sawaal alag-alag shabdon mein baar-baar aata hai.", "years": ["2023", "2025", "2026"], "papers": 5, "raw": 9, "marks": 2, "types": ["SA", "VSA"], "score": 14}, {"key": "G6-505", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Importance of manufacturing", "question": "'Manufacturing industries are considered the backbone of economic development.' Justify the statement.", "answer": "Justified: manufacturing modernises agriculture, generates employment, reduces unemployment/poverty, lessens regional disparities, expands trade by exporting finished goods (earning foreign exchange), and converts raw materials into higher-value products — hence the 'backbone' of development.", "explanation": "Ye wahi backbone wala concept hai par 'justify' style mein. Soch — agar industries na hon to raw material kachcha hi pada rahega, na value badhegi na paisa. Industries kachche maal ko mehngi cheez bana deti hain (raw cotton se shirt), jobs deti hain aur desh ko ameer banati hain. Isliye inhe development ki 'backbone' kehte hain.", "years": ["2024", "2025", "2026"], "papers": 5, "raw": 8, "marks": 3, "types": ["LA", "SA"], "score": 13}, {"key": "G6-530", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Map work - Software Technology Parks", "question": "Name the place where software technology park is located in Uttar Pradesh.", "answer": "Noida (NOIDA) — the Software Technology Park located in Uttar Pradesh.", "explanation": "Uttar Pradesh ka software technology park = NOIDA. Map mein UP ke upar (Delhi ke paas) point karna hai. Yaad rakho: 'UP ka IT hub = Noida'. (Dhyan: ek-do papers mein iska answer galti se Karnataka likha mila hai — sahi NOIDA hi hai.)", "years": ["2023", "2024", "2026"], "papers": 5, "raw": 12, "marks": 1, "types": ["Map", "VSA"], "score": 12}, {"key": "E4-214", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Technology and globalisation", "question": "How have the developments in information and communication technology been the major factor to enable globalisation ? Explain.", "answer": "ICT (telecommunication, computers, internet, satellite, mobile, email/voicemail) enables instant global contact, information sharing and spread of services (e-banking, call centres) across countries at negligible cost, thus stimulating globalisation.", "explanation": "IT aur globalisation best friends hain! Phone, internet, email, satellite - in sab ne duniya ko chhota kar diya. Ab ek click mein dusre desh se baat ho jaati hai, paisa transfer ho jaata hai, call centre India mein baith ke US ke customers ko handle karte hain. Memory hook: ICT = 'Instantly Connecting The world' - low cost mein duniya jod di.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 12, "marks": 3, "types": ["SA", "VSA"], "score": 11}, {"key": "P5-1024", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Assessing outcomes of democracy", "question": "'Democracy is best suited to produce its own outcomes.' Explain.", "answer": "Democracy is best judged by its expected outcomes: a responsive, accountable, legitimate and transparent government, citizen participation, free elections, equality and dignity – and democracy's ability to generate its own support is itself a key outcome.", "explanation": "Democracy ko aankne ke liye dekho yeh kya 'outcomes' deti hai - accountable sarkaar, participation, equality, transparency. Aur sabse badi baat, log democracy ko support karte rehte hain - yeh khud ek outcome hai! Hook: 'expected outcomes se democracy ko jaancho'.", "years": ["2023", "2024", "2025"], "papers": 5, "raw": 8, "marks": 5, "types": ["LA"], "score": 11}, {"key": "E3-175", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Role of Credit in Development", "question": "Why is cheap and affordable credit important for the country’s development ? Explain.", "answer": "Cheap, affordable credit lets people borrow for farming, business and investment, raises incomes, reduces dependence on costly informal lenders and ensures formal credit reaches the poor—accelerating national development.", "explanation": "Sasta credit = development ka rocket fuel. Jab byaaj kam ho, to log dar ke bina udhaar le ke kheti/business mein lagate hain, income badhti hai, aur moneylender ke jaal se bachte hain. Yaad rakho: 'sasta loan = sab ka faayda'. Yeh 5-marker hai, 4-5 points likhna.", "years": ["2023", "2024", "2025"], "papers": 5, "raw": 9, "marks": 5, "types": ["LA", "SA"], "score": 10}, {"key": "H2-632", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Cultural nationalism (folklore, symbols, icons)", "question": "How did people belonging to different communities, regions and language groups develop a sense of collective belonging in the late - nineteenth century India ? Explain with examples.", "answer": "A sense of collective belonging grew through shared culture: the figure of Bharat Mata, the song Vande Mataram (Bankim Chandra), revival of folklore, popular prints/calendar art (Raja Ravi Varma), the national flag, and reinterpretation of history - all making diverse people feel part of one nation.", "explanation": "Alag-alag bhasha aur region ke log 'ek desh' kaise feel karein? Iske liye common cheezein use hui - Bharat Mata ki image, Vande Mataram gaana, folk kathayein, prints aur tiranga. Ye saari cheezein dil ko jodti hain. Hook: 'Maa (Bharat Mata) + Gaana (Vande Mataram) = sabki ekta'.", "years": ["2023", "2024", "2025"], "papers": 5, "raw": 11, "marks": 5, "types": ["LA", "SA"], "score": 10}, {"key": "H2-639", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Civil Disobedience Movement - social groups", "question": "Examine the progress of the Civil Disobedience Movement among different strata of society.", "answer": "Different groups joined the CDM for their own reasons: rich Patidar/Jat peasants (boycotts, against high revenue), poor peasants (rent remission), industrialists (FICCI, funds), workers, and women. Forest people defied forest laws, villagers refused taxes - making it a broad, though uneven, mass movement.", "explanation": "Civil Disobedience mein har tabka apni wajah se juda - ameer kisaan lagaan ke khilaaf, gareeb kisaan kiraye ki maafi ke liye, industrialists business ke liye, aur mahilaayein-mazdoor-aadivaasi bhi. Sab milke ye 'mass movement' bana. Hook: 'Sabki alag shikayat, par dushman ek - angrez sarkar'.", "years": ["2023", "2024", "2025"], "papers": 5, "raw": 9, "marks": 5, "types": ["LA", "SA"], "score": 10}, {"key": "G6-531", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Map work - Software Technology Parks", "question": "Software technology park located in Maharashtra.", "answer": "Pune (or Mumbai) — the Software Technology Park located in Maharashtra.", "explanation": "Maharashtra ka software technology park = Pune (ya Mumbai). Map mein west India mein point karo. Yaad rakho: 'Maharashtra = Pune/Mumbai IT'. (Kuch keys mein galti se Uttarakhand likha mila — sahi Pune/Mumbai hai.)", "years": ["2023", "2024", "2026"], "papers": 5, "raw": 12, "marks": 1, "types": ["Map"], "score": 9}, {"key": "E4-223", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Attracting foreign investment", "question": "Explain any five steps taken by the Central and State Governments to attract foreign investments.", "answer": "Steps: set up Special Economic Zones (SEZs) with world-class facilities, flexible labour laws, tax exemptions, good infrastructure (power, roads, ports), and easing rules so foreign companies can invest freely.", "explanation": "Foreign investment khinchne ke liye government kaafi steps leti hai - SEZ (Special Economic Zones) banaati hai jahan world-class suvidha milti hai, labour laws flexible karti hai, tax mein chhoot deti hai, achi roads-bijli deti hai. Memory hook: SEZ = 'Super Easy Zone' for foreign companies. Government red carpet bichhaati hai investors ke liye.", "years": ["2023", "2024"], "papers": 5, "raw": 7, "marks": 5, "types": ["LA", "VSA"], "score": 6}, {"key": "G7-554", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Map work - Haldia Port", "question": "Haldia Sea port", "answer": "Haldia Sea Port is located in West Bengal (on the Hooghly river, a satellite port to Kolkata).", "explanation": "Haldia = West Bengal, Kolkata ke paas Hooghly nadi par. Yeh Kolkata ka bojh halka karne ke liye banaya gaya. Hook: 'Haldia-Hooghly-West Bengal' - sab saath chalte hain. Map pe East coast ke upri hisse par dot lagao.", "years": ["2023", "2024"], "papers": 5, "raw": 10, "marks": 1, "types": ["Map", "VSA"], "score": 6}, {"key": "P3-972", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Women in Public Life", "question": "Suggest any two measures to ensure participation of women in public life.", "answer": "Increase female literacy and education; provide skill development, vocational training, mentorship and easy loans for women's entrepreneurship; ensure equal pay (enforce the Equal Remuneration Act); promote gender equality; and increase women's representation in politics and professions.", "explanation": "Aurton ko public life/professions/entrepreneurship mein laane ke liye - unki shiksha aur skill-training badhao, mentorship aur aasan loan do, equal pay pakka karo, aur har kshetra mein unki bhागidari badhao. Memory hook: 'padhai + skill + paisa-madad + equal pay' har field (sports, tech, business) mein laagu hota hai. Yeh saare 'how to support women' wale sawaal ek hi formula maangte hain.", "years": ["2025", "2026"], "papers": 4, "raw": 9, "marks": 2, "types": ["VSA"], "score": 15}, {"key": "E2-109", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Importance of the Primary Sector", "question": "Explain the contribution of the primary sector in the context of employment in India.", "answer": "Despite its falling share in GDP, the primary sector (agriculture, mining, fishing, dairy, forestry) remains India's largest employer, engaging over half the workforce, and it supplies raw materials and food, supporting the other sectors.", "explanation": "Primary sector aaj bhi India ka sabse bada employer hai - aadhe se zyada log isme kaam karte hain, bhale hi GDP mein iska hissa kam ho gaya. Ye baaki sectors ko kaccha maal aur khaana deta hai. Memory hook: 'GDP kam, par naukri sabse zyada'.", "years": ["2024", "2025", "2026"], "papers": 4, "raw": 4, "marks": 5, "types": ["LA", "SA"], "score": 12}, {"key": "E4-232", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Liberalisation 1991", "question": "What changes did the Government of India make in its economic policies in the beginning of 1991 ? Explain.", "answer": "In 1991 the govt removed trade barriers and foreign-investment restrictions, allowing easier import/export and letting foreign companies set up factories/offices; this fostered competition, MNC entry (e.g. cell phones, autos), SEZs and new IT services.", "explanation": "1991 mein government ne badi economic changes ki - trade barriers aur foreign investment ki rok hata di. Ab import-export aasaan, foreign companies India mein factory laga sakti thi. Example: cell phone, gaadiyan, IT services aayi. Memory hook: 1991 = India ki economy ka 'naya janam', darwaaze khul gaye.", "years": ["2024", "2025", "2026"], "papers": 4, "raw": 6, "marks": 3, "types": ["SA", "VSA"], "score": 12}, {"key": "P5-1025", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Subject to citizen / complaints as success", "question": "'Democracy transforms people from the status of a subject into that of a citizen.' Support the statement with examples.", "answer": "Democracy turns subjects into citizens by giving them equality, dignity and freedom to express even dissatisfaction. Citizens' complaints are themselves proof of success – they show people are aware of rights and can critically judge those in power.", "explanation": "Pehle log 'praja' the - jo raja kahe wahi. Democracy ne unhe 'citizen' bana diya jo sawaal puchh sakta hai, complaint kar sakta hai! Complaint karna actually democracy ki SUCCESS hai - matlab log jaag gaye hain. Hook: 'subject se citizen = complaint karne ka haq mila'.", "years": ["2023", "2025", "2026"], "papers": 4, "raw": 6, "marks": 5, "types": ["LA", "VSA"], "score": 12}, {"key": "H1-586", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Making of Britain", "question": "Explain the process of formation of 'United Kingdom of Great Britain'.", "answer": "Britain was formed not by a revolution but a long process. England's growing power let its Parliament dominate; after 1688 the Act of Union (1707) between England and Scotland created the 'United Kingdom of Great Britain', with the English Parliament dominant. Ireland was later (1801) forcibly incorporated, and English culture, language and symbols (Union Jack, English, God Save the King) were imposed over older identities.", "explanation": "Britain kisi ek revolution se nahi, dheere-dheere bana. England powerful tha, 1707 ke Act of Union se Scotland ko jod liya aur 'Great Britain' bana, baad mein Ireland ko bhi (1801) zabardasti shaamil kiya. Phir English bhasha, Union Jack aur culture sab pe thop diya. Hook: Britain = revolution nahi, lamba 'merger' jisme England boss tha.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 6, "marks": 5, "types": ["LA", "VSA"], "score": 11}, {"key": "H3-701", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Indian Subcontinent in Trade", "question": "Why was the Indian subcontinent central to the flows of the trading network before the sixteenth century ? Explain.", "answer": "India's location made it a hub linking East (China/SE Asia) and West (West Asia, Europe, Africa) through land and sea routes like the Silk Route and Indian Ocean trade, exchanging goods (spices, textiles, pottery), people, knowledge and customs. (Assertion-Reason: both A and R true, R explains A.)", "explanation": "India ka location tha ekdum jackpot - East (China) aur West (Europe-Africa) ke beech mein. Isliye Silk Route aur Indian Ocean trade ka center India bana. Spices, kapde, ideas sab yahin se guzarte the. Memory hook: 'India = duniya ka chauraha (crossroads)', isliye trade ka dil.", "years": ["2024", "2025", "2026"], "papers": 4, "raw": 9, "marks": 2, "types": ["Assertion-Reason", "VSA"], "score": 11}, {"key": "E2-97", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Public vs Private sector", "question": "Explain the differences between public and private sector of economic activities.", "answer": "Public sector: government owns assets and runs services with a welfare motive, funded by taxes (e.g., Railways). Private sector: private individuals/companies own assets and run activities with a profit motive, using their own funds (e.g., Tata Steel/TISCO).", "explanation": "Public sector sarkar ka, motive janta ka faayda (welfare), paisa tax se - jaise Railway. Private sector private logon ka, motive profit, apna paisa - jaise Tata Steel. Memory hook: 'Public = welfare, Private = profit'.", "years": ["2024", "2025"], "papers": 4, "raw": 7, "marks": 5, "types": ["LA", "SA", "VSA"], "score": 10}, {"key": "G4-376", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Explain any two features of Intensive Subsistence farming.", "answer": "Intensive subsistence farming is practised where population pressure on land is high. It is labour-intensive, uses high biochemical inputs and irrigation for higher production, and farmers extract maximum output from small, often uneconomical landholdings.", "explanation": "Intensive subsistence wahan hoti hai jahan log zyada aur zameen kam. Isliye kisaan chhoti zameen se zyada output ke liye bahut mehnat, fertilizer aur irrigation lagate hain. Hook: 'intensive' = ghani aabadi, zameen par poora pressure.", "years": ["2023", "2024", "2025", "2026"], "papers": 4, "raw": 4, "marks": 3, "types": ["SA", "VSA"], "score": 10}, {"key": "G6-511", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Agriculture-industry relationship", "question": "“Agriculture and industry move hand in hand.” Support the statement with examples.", "answer": "Agriculture and industry are interdependent: industries depend on agriculture for raw materials (cotton, sugarcane, jute), while agriculture uses industrial products (fertilizers, pesticides, pumps, tractors, tools); agro-industries also raise farm productivity.", "explanation": "Bhai ye dono best friends hain. Industry ko kheti se raw material milta hai (cotton, ganna), aur kheti ko industry se tractor, khaad, pump milte hain. Dono ek dusre ke bina adhoore. Isliye kehte hain 'hand in hand chalte hain'.", "years": ["2023", "2024", "2025", "2026"], "papers": 4, "raw": 5, "marks": 5, "types": ["LA", "VSA"], "score": 10}, {"key": "P4-988", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Functions of political parties", "question": "Analyse the role of political parties in shaping public opinion.", "answer": "Parties shape public opinion by raising and highlighting issues of public interest. With their large network of members and activists across the country, and by launching movements, they make people aware and cause opinions in society to crystallise along their lines, often in coordination with pressure groups.", "explanation": "Parties ke paas poore desh mein members aur karyakarta hote hain jo mudde uthaate hain aur andolan chalate hain. Isi se aam logon ki soch banti/badalti hai. Socho - jab koi party kisi issue pe protest karti hai, news mein aata hai, aur log uss baare mein sochna shuru kar dete hain. Yahi 'public opinion shaping' hai. Yaad: 'mudda uthao, andolan chalao, soch banao'.", "years": ["2023", "2024", "2025", "2026"], "papers": 4, "raw": 6, "marks": 1, "types": ["Case-based", "SA", "VSA"], "score": 10}, {"key": "H1-581", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Conservatism after 1815", "question": "European Governments were driven by a spirit of conservatism in 1815. Support this statement.", "answer": "Yes - after 1815 conservative regimes were autocratic: they aimed to preserve traditional institutions (monarchy, Church, family, property), did not tolerate criticism or dissent, and imposed censorship laws to curb ideas of liberty and any questioning of their legitimacy. The Congress of Vienna (1815) restored monarchies to entrench this order.", "explanation": "1815 ke baad ki sarkaarein 'sab purana achha' wali soch (conservatism) pe chalti thi aur poori autocratic thi - raja ki marzi final. Criticism bardaasht nahi tha, isliye censorship laga di. Hook: Conservatism = no change + no bolne ki azaadi.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 5, "marks": 5, "types": ["LA", "VSA"], "score": 9}, {"key": "P4-993", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Party systems (multi-party)", "question": "Describe any three features of Multiparty System.", "answer": "In a multi-party system several parties compete for power and more than two have a real chance of forming government, alone or through alliances/coalitions. Merits: it accommodates social and geographical diversity, gives voters more choice, provides checks and balances, and reduces chances of one-party dictatorship.", "explanation": "Multi-party system = bahut saari parties power ke liye competition mein, aur do se zyada ke paas sarkar banane ka mauka (akele ya alliance se). India ka example perfect hai! Faayda: har samaj/region ko jagah milti hai, voters ko zyada choice, aur kisi ek party ki taanashaahi nahi. Yaad rakho: 'zyada parties = zyada choice + zyada diversity'.", "years": ["2023", "2025", "2026"], "papers": 4, "raw": 6, "marks": 3, "types": ["Case-based", "SA"], "score": 9}, {"key": "E1-32", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Different People, Different Developmental Goals", "question": "“Different persons can have different developmental goals.” Support the statement with an example.", "answer": "Different people have different developmental goals because their economic, social and cultural needs differ. E.g. a landless labourer wants more work and better wages, while a prosperous farmer wants higher support prices for crops; an urban girl may want the same freedom as her brother. Goals can even conflict.", "explanation": "Har insaan ka 'development' alag hota hai bhai – jo ek ke liye achha, woh doosre ke liye nahi. Mazdoor zyada kaam aur wages chahta hai, kisaan fasal ke achhe daam, ladki chahti hai bhai jaisi azaadi. Kabhi-kabhi goals ek doosre se takraate bhi hain. Memory hook: 'apni-apni soch, apna-apna sapna'. Example zaroor likhna exam mein.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 10, "marks": 2, "types": ["SA", "VSA"], "score": 8}, {"key": "E2-78", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Differentiate between primary and secondary sectors with examples.", "answer": "Primary sector directly exploits natural resources (e.g., farming, fishing) and supplies raw materials. Secondary sector transforms these into finished goods through manufacturing (e.g., cotton textile, sugar from sugarcane).", "explanation": "Primary = nature se seedha maal nikalna (kheti, machhli). Secondary = us maal ko factory mein product banana (kapas se kapda). Ek 'kaccha maal' deta hai, doosra 'pakka product'. Memory hook: 'Primary paida karta hai, Secondary banata hai'.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 4, "marks": 3, "types": ["LA", "SA", "VSA"], "score": 8}, {"key": "G1-268", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil types", "question": "Which one of the following soils develops in an area with high temperature and heavy rainfall ?", "answer": "Laterite soil. It develops in areas of high temperature and heavy rainfall, forms by intense leaching, has low humus, and is useful for tea, coffee and cashew.", "explanation": "Laterite soil ka formula simple hai: high temperature + heavy rainfall = leaching (poshak tatv bah jaate hain), isliye humus kam. Yeh coffee aur tea ke liye famous hai (Western Ghats, Kerala). Memory hook: 'Garmi + Baarish ki laterite = chai-coffee wali mitti'.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 12, "marks": 1, "types": ["MCQ"], "score": 8}, {"key": "G5-439", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Sustainable energy & development", "question": "Energy is required for all activities. Explain this statement with examples.", "answer": "Energy powers all economic activities - agriculture (irrigation, machinery), industry (factories), transport (vehicles, trains) and domestic/commercial use (lights, appliances). Without energy no sector can function, so it is fundamental for development.", "explanation": "Soch ke dekho - subah uthte hi geyser, phir bus/metro, office ka computer, raat ka khana banane ki gas... har cheez energy pe chalti hai! Kisaan ka pump ho ya factory ki machine, sab ko energy chahiye. Bina energy ke zindagi ruk jaaye. Examples har sector se do: kheti, industry, transport, ghar.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 4, "marks": 3, "types": ["LA", "SA"], "score": 8}, {"key": "G5-493", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Map work - Tarapur nuclear plant", "question": "Name the state where Tarapur Nuclear Power Plant is located.", "answer": "Tarapur Nuclear/Atomic Power Plant is located in Maharashtra. (It is also the answer to 'nuclear power plant located in Maharashtra'.)", "explanation": "Tarapur Nuclear Power Plant Maharashtra mein hai - India ka sabse purana atomic power plant! Chahe 'Tarapur kahan hai' poochhein ya 'Maharashtra mein nuclear plant kaunsa', jawab Tarapur/Maharashtra. Yaad rakho: 'Tarapur = Maharashtra ka nuclear pioneer'. Map pe Mumbai ke paas.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 11, "marks": 1, "types": ["Map", "VSA"], "score": 8}, {"key": "G6-522", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Industrial pollution control", "question": "Explain any three ways through which industrial pollution can be reduced.", "answer": "Industrial pollution can be reduced by: minimising water use through reuse/recycling and rainwater harvesting; treating effluents (primary, secondary, tertiary) before discharge; fitting smokestacks with electrostatic precipitators, scrubbers and filters; using cleaner fuels; and redesigning machinery with silencers to cut noise.", "explanation": "Pollution kam karne ke 3 area yaad rakho: Paani (recycle/reuse + rainwater harvesting + effluent treatment), Hawa (precipitator, scrubber, clean fuel) aur Shor (silencer, machinery redesign). Jitne marks utne points. Memory hook: 'Paani-Hawa-Shor'.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 6, "marks": 5, "types": ["LA", "SA"], "score": 8}, {"key": "G7-555", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Map work - Tuticorin Port", "question": "Seaport – Tuticorin Seaport (formerly V.O. Chidambaranar Port)", "answer": "Tuticorin (V.O. Chidambaranar) Sea Port is in Tamil Nadu; the major sea port of Tamil Nadu is Tuticorin/Chennai.", "explanation": "Tuticorin = Tamil Nadu (ab V.O. Chidambaranar Port). Tamil Nadu ka major port poochhein to Tuticorin ya Chennai. Hook: 'Tuti-Tamil' dono T se. Map pe South-East coast par mark karo.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 7, "marks": 1, "types": ["Map"], "score": 8}, {"key": "H1-576", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Unification of Germany", "question": "Explain the role of Otto Von Bismark in the Unification of Germany.", "answer": "Otto von Bismarck, Prussia's Chief Minister, was the architect of German unification, achieved with the Prussian army and bureaucracy ('blood and iron'). He won three wars - against Denmark, Austria and France (1864-71) - and after victory the Prussian king William I was proclaimed German Emperor at Versailles in January 1871.", "explanation": "Bismarck Germany jodne ka 'mastermind' tha - Prussia ka chief minister jiska famous formula tha 'blood and iron' (fauj aur jung se kaam). Usne teen war jeete - Denmark, Austria, France - aur 1871 mein William I ko Versailles mein German Emperor banwa diya. Hook: Bismarck = 3 wars + Blood & Iron.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 4, "marks": 3, "types": ["LA", "SA"], "score": 8}, {"key": "P5-1017", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Dignity & freedom of citizens", "question": "Analyse the conditions under which democracies promote dignity and freedom of citizens.", "answer": "Democracy promotes dignity and freedom because every individual wants respect; it guarantees equal treatment (e.g. of women), strengthens the claims of disadvantaged groups, and ensures rights and freedoms for all citizens.", "explanation": "Democracy ki sabse khoobsurat baat - yeh har insaan ki izzat aur azaadi sabse upar rakhti hai. Aurton ko barabari, kamzor tabke ko awaaz, aur sabko apni baat kehne ki freedom. Yahi dignity aur freedom democracy ki neev hai. Hook: 'respect + freedom = har citizen ka haq'.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 6, "marks": 5, "types": ["LA"], "score": 8}, {"key": "P5-1023", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Values of democracy", "question": "How does democracy promote Political and Social values ?", "answer": "Democracy promotes values like political equality, individual dignity, freedom and respect, better decision-making, peaceful conflict resolution, accommodation of diversity and reduction of inequality – these deep social and political values are its core.", "explanation": "Democracy sirf vote dena nahi - yeh equality, dignity, freedom aur respect jaise values sikhaati hai. Yahi 'deep values' democracy ko khaas banaate hain. Hook: 5 values yaad karo - equality, dignity, decision, conflict-resolution, diversity.", "years": ["2023", "2024", "2025"], "papers": 4, "raw": 5, "marks": 5, "types": ["LA"], "score": 8}, {"key": "E4-221", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "MNCs and production", "question": "How do Multinational Corporations (MNCs) interlink production across countries ? Explain with examples.", "answer": "MNCs set up production near markets with cheap labour/resources, form joint ventures with local firms, place orders with small producers, and exert strong control - thus interlinking production globally (e.g. parts made in different countries, assembled elsewhere).", "explanation": "MNCs duniya bhar mein production ko aapas mein jodti hain. Woh wahan factory lagaati hain jahan sasta labour aur resources milein, local companies ke saath joint venture karti hain, chhote producers ko order deti hain. Example: ek car ke parts alag-alag deshon mein bante hain. Memory hook: MNC = duniya ki 'production chain' ka master.", "years": ["2023", "2026"], "papers": 4, "raw": 6, "marks": 5, "types": ["LA", "SA"], "score": 7}, {"key": "E3-181", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Money as Medium of Exchange", "question": "How does the use of money make it easier to exchange things ? Explain with examples.", "answer": "Money acts as a medium of exchange, removing the need for a 'double coincidence of wants'. A person can sell goods for money and use that money to buy anything else; it is universally accepted and serves as a common measure of value.", "explanation": "Barter mein dono ki zarurat match honi chahiye thi (double coincidence of wants) — bada jhanjhat. Money ne yeh solve kar diya: kuch bhi becho, paisa lo, kuch bhi khareedo. Example: kisaan gehu becho, paise se kapda khareedo. Money = beech ka 'middleman' jo sab kaam aasaan karta hai.", "years": ["2023", "2025"], "papers": 4, "raw": 4, "marks": 2, "types": ["SA", "VSA"], "score": 6}, {"key": "P4-997", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Party systems (bi-party)", "question": "Which one of the following countries has two-party system ?", "answer": "Two-party system countries: the United States of America and the United Kingdom (power usually alternates between two major parties).", "explanation": "Two-party (bi-party) system matlab power do hi badi parties ke beech ghumti rehti hai. USA (Democrats vs Republicans) aur UK (Conservative vs Labour) iske best examples hain. Option mein jo bhi ho - America ya United Kingdom - wahi answer. Baaki parties hoti hain par jeetne ka chance sirf do ko.", "years": ["2023", "2024"], "papers": 4, "raw": 12, "marks": 1, "types": ["MCQ"], "score": 6}, {"key": "G3-342", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Map work – Tehri Dam (Uttarakhand)", "question": "Tehri Dam", "answer": "Tehri Dam is located in Uttarakhand, on the Bhagirathi river.", "explanation": "Map par Tehri Dam dhoondna ho ya state poochha jaaye – yaad rakho: Tehri = Uttarakhand, Bhagirathi river par. (Ignore karna woh galat printed answers jaise 'Nagpur/Dandi' – woh typos hain.) Hook: 'Tehri upar pahaadon mein = Uttarakhand'.", "years": ["2023", "2024"], "papers": 4, "raw": 8, "marks": 1, "types": ["Map"], "score": 5}, {"key": "E4-218", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Impact of globalisation", "question": "Analyse the impact of globalisation on the Indian economy.", "answer": "Positives: more MNC investment, jobs, better tech, choice for consumers, Indian firms becoming MNCs. Negatives: small manufacturers face tough competition and closures, job losses, uncertain/insecure employment - so impact is uneven.", "explanation": "Globalisation India ke liye double-edged sword hai. Acche side: zyada investment, jobs, naya technology, consumers ko choice, kuch Indian companies (Tata, Infosys) khud MNC ban gayi. Bure side: chhote producers competition mein band ho gaye, log berozgaar hue. Memory hook: globalisation = kuch ke liye sona, kuch ke liye sankat.", "years": ["2023"], "papers": 4, "raw": 4, "marks": 5, "types": ["LA"], "score": 4}, {"key": "E4-219", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Fair globalisation", "question": "Analyse any five steps for ensuring fair globalisation in India.", "answer": "Fair globalisation steps: govt should protect small producers, ensure labour laws are implemented, support workers, negotiate fair trade rules at WTO, attract more investment, and ensure benefits reach all - not just the rich.", "explanation": "Globalisation ko 'fair' (nyaay-poorn) banane ke liye government ka role bada hai. Sarkar ko chhote producers ko protect karna chahiye, workers ke rights laagu karne chahiye, WTO mein India ke haq ke liye ladna chahiye, taaki faayda sirf ameeron tak na ruke. Memory hook: 'Fair' = sabko equal chance, government referee ki tarah.", "years": ["2023"], "papers": 4, "raw": 4, "marks": 5, "types": ["LA"], "score": 4}, {"key": "E2-139", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Explain the main characteristics of the 'secondary sector' of the economy.", "answer": "The secondary sector transforms natural products into other forms through manufacturing, converting raw materials into finished goods in factories/workshops; it is therefore also called the industrial sector and adds value to primary products.", "explanation": "Secondary sector ki khaasiyat - natural maal ko factory mein product banana (kapas se kapda, ganne se cheeni). Isiliye ise 'industrial sector' bhi kehte hain. Ye primary ke maal mein value add karta hai. Memory hook: 'Banane wala kaam = Secondary'.", "years": ["2026"], "papers": 3, "raw": 3, "marks": 5, "types": ["LA", "VSA"], "score": 12}, {"key": "P4-1009", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "National vs regional parties", "question": "Find the odd one out regarding the Political Parties of India : (A) Indian National Congress and Communist Party of India (M) (B) Rashtriya Janta Dal and Lok Jan Shakti Party (C) Indian National Lok Dal and Jan Nayak Janta Party (D) Rashtriya Lok Dal and Jan Satta Dal", "answer": "The odd pair is the one made of NATIONAL parties while all others are regional parties - e.g. (A) Indian National Congress & CPI(M); or (A) CPI(M) & BJP; or (A) BJP & Aam Aadmi Party - these are national parties, the rest are state/regional parties.", "explanation": "In 'odd one out' sawaalon ka rule ek hi hai: jo jodi NATIONAL parties ki ho wahi odd hai, baaki sab regional hote hain. Jaise INC, CPI(M), BJP, AAP - ye national parties hain. Toh pehle national parties pehchaano (Congress, BJP, BSP, CPI, CPI-M, AAP, NPP), phir wahi pair odd nikaalo. Skill same hai, bas options badalte hain!", "years": ["2026"], "papers": 3, "raw": 9, "marks": 1, "types": ["MCQ"], "score": 12}, {"key": "G1-270", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil types", "question": "A researcher is examining a soil type which is formed by the weathering of volcanic rock and is rich in minerals. Which one of the following soils is it?", "answer": "Black soil (regur). Formed from weathering of volcanic/lava rocks, made of extremely fine clayey material, rich in minerals, and ideal for cotton.", "explanation": "Black soil ko 'Black cotton soil' ya 'regur' bhi kehte hain - yeh lava/volcanic chattano ke tootne se banti hai (Deccan trap). Bahut fine clay hoti hai jo paani pakad ke rakhti hai, isliye cotton ke liye best. Memory hook: 'Lava se black, black se cotton'.", "years": ["2025", "2026"], "papers": 3, "raw": 9, "marks": 1, "types": ["MCQ", "Match"], "score": 11}, {"key": "H1-611", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Romanticism & culture", "question": "'Not every nation has a glorious past.' Analyse the statement with examples from sixteenth century Europe.", "answer": "Culture and the arts were central to building nations. Romantic artists, poets, musicians and folk-tale collectors used vernacular language, folk songs, dances and history to create a shared cultural identity and emotional bond, giving even people without a glorious past or their own state a sense of common nationhood.", "explanation": "Nation banane mein culture aur artists ka bada haath tha - poets, painters, musicians aur folk-story collectors ne local bhasha, gaane aur itihaas se logon ko 'hum ek hain' feel karaaya. Chahe kisi kaum ka 'glorious past' na ho, culture se identity ban jaati thi. Hook: pen, brush aur folk-song bhi nation banate hain.", "years": ["2025", "2026"], "papers": 3, "raw": 3, "marks": 5, "types": ["LA"], "score": 11}, {"key": "H2-631", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Cultural nationalism (folklore, symbols, icons)", "question": "How did reinterpretation of history become a means of creating a sense of nationalism by the end of the 19th century in India ? Explain.", "answer": "Nationalists rewrote history to counter the British view of Indians as backward. They glorified India's ancient achievements in art, science, culture and trade, contrasting that golden past with present decline under colonial rule - urging Indians to take pride and struggle for freedom.", "explanation": "Angrez kehte the 'Indians toh pichhde hue hain'. Iska jawab dene ke liye nationalists ne history dobara likhi - dikhaaya ki purane zamane mein India art-science-vyapar mein top par tha! Idea: glorious past yaad dilao, present ki ghulami se gussa dilao, aur azaadi ke liye khada karo. Hook: 'Shaandaar ateet = aatmvishwaas ka cheat-code'.", "years": ["2025", "2026"], "papers": 3, "raw": 10, "marks": 2, "types": ["Case-based", "LA", "VSA"], "score": 11}, {"key": "E2-110", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Importance of the Primary Sector", "question": "Analyse the significance of Primary Sector in Indian economy.", "answer": "The primary sector is significant as it supplies raw materials to the secondary sector, provides the largest employment, ensures food security, supports national and international trade, and earns foreign exchange.", "explanation": "Primary sector ki importance: kaccha maal deta hai industries ko, sabse zyada naukri deta hai, food security deta hai aur trade/foreign exchange mein madad karta hai. Sabse buniyaadi (basic) sector. Memory hook: 'Sab kuch yahin se shuru - raw material aur roti'.", "years": ["2025", "2026"], "papers": 3, "raw": 3, "marks": 5, "types": ["LA", "SA"], "score": 10}, {"key": "G2-322", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Map/Match - National Parks and States", "question": "Choose the correctly matched pair from the following : National Park/Tiger Reserve State (A) Corbett National Park Himachal Pradesh (B) Bandhavgarh National Park Rajasthan (C) Periyar Tiger Reserve Tamil Nadu (D) Manas Tiger Reserve Assam", "answer": "(D) Manas Tiger Reserve – Assam is the correctly matched pair. (Corbett is in Uttarakhand, Bandhavgarh in MP, Periyar in Kerala.)", "explanation": "Correct pair dhoondho: Manas Tiger Reserve = Assam (sahi). Baaki galat - Corbett Uttarakhand mein, Bandhavgarh MP mein, Periyar Kerala mein. Memory hook: 'Manas = Assam' pakka yaad rakho, ye baar-baar correct answer banta hai.", "years": ["2025", "2026"], "papers": 3, "raw": 9, "marks": 1, "types": ["MCQ", "Match"], "score": 10}, {"key": "G5-447", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Conventional vs non-conventional energy", "question": "How are conventional sources of energy different from non-conventional sources ? Explain.", "answer": "Conventional sources (coal, petroleum, natural gas) are non-renewable, exhaustible and polluting. Non-conventional sources (solar, wind, biogas, tidal) are renewable, inexhaustible and eco-friendly. Conventional are used at large scale traditionally; non-conventional are being newly promoted.", "explanation": "Yaad rakho ek table ki tarah - Conventional (coal, petrol, gas): khatam hone wale, pollution karne wale, purane. Non-conventional (solar, wind, biogas): kabhi na khatam hone wale, clean, naye. Ek side exhaustible + dirty, doosri renewable + green. Bas yahi farak hai!", "years": ["2024", "2026"], "papers": 3, "raw": 5, "marks": 2, "types": ["LA", "VSA"], "score": 10}, {"key": "G7-557", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Map work - Odisha Port", "question": "Name the place where a major Sea Port is located in Odisha.", "answer": "The major sea port in Odisha is Paradip (Paradwip), on the east coast.", "explanation": "Odisha ka major sea port = Paradip (Paradwip), East coast par. Yeh deep-water port hai aur iron-ore/coal export karta hai. Hook: 'Paradip in Odisha'. id 2471 ka answer thoda garbled hai par Paradip hi sahi jawab hai.", "years": ["2025", "2026"], "papers": 3, "raw": 8, "marks": 1, "types": ["Map", "VSA"], "score": 10}, {"key": "H1-596", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Unification of Germany", "question": "Analyse the process of German Unification.", "answer": "German unification was led by Prussia under Chief Minister Otto von Bismarck through a policy of 'blood and iron' (army and bureaucracy). The Zollverein customs union first bound the states economically; then three wars - against Denmark, Austria and France (1864-71) - brought Prussian victory, and in January 1871 the Prussian king William I was proclaimed German Emperor at Versailles.", "explanation": "Germany jodne ka kaam Prussia ne Bismarck ki leadership mein 'blood and iron' policy se kiya. Pehle Zollverein ne states ko economically joda, phir teen wars (Denmark, Austria, France) jeet kar 1871 mein William I ko Versailles mein German Emperor declare kiya. Hook: Economy (Zollverein) + 3 Wars = Germany.", "years": ["2024", "2026"], "papers": 3, "raw": 5, "marks": 3, "types": ["LA", "SA"], "score": 10}, {"key": "H3-704", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Spanish Conquest of America", "question": "In the mid-16th century, diseases like smallpox reached America through which of the following ?", "answer": "Smallpox - carried to America by the Spanish soldiers/conquerors (also via Portugal and Spain); it was the deadliest killer of native Americans.", "explanation": "Smallpox (chhoti maata) America mein Spanish soldiers ke saath pahunchi aur native logon ke liye jaanleva sabit hui kyunki unme immunity nahi thi. Chahe sawaal 'kaun si beemari' ho ya 'kaise pahunchi', answer ghoom-phir ke Smallpox + Spanish conquerors pe aata hai. Yaad rakho: Spanish laaye, smallpox chhaayi.", "years": ["2025", "2026"], "papers": 3, "raw": 9, "marks": 1, "types": ["MCQ"], "score": 10}, {"key": "E2-102", "chapter_code": "E2", "chapter_name": "Sectors of the Indian
