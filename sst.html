udicious use.", "explanation": "Resource planning ki definition: yeh ek process hai jismein desh ke har region ke resources ko pehchaan kar unki list (inventory) banayi jaati hai, phir unke sahi istemaal ka plan banta hai. Hook: 'Pehchaano + List banao + Plan banao'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "G1-293", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Resource conservation", "question": "Why did Gandhiji say – ‘‘There is enough for everybody’s need and not for any body’s greed ?’’ Analyse any two reasons.", "answer": "Gandhiji blamed greedy individuals and exploitative modern technology for resource depletion. He advocated 'production by the masses' over 'mass production' so that resources meet everyone's needs, not a few people's greed.", "explanation": "Gandhiji ka matlab tha: dharti ke paas sabki zaroorat ke liye kaafi hai, par kuch logon ke laalach ke liye nahi. Unhone greedy log aur exploitative technology ko blame kiya aur 'production by the masses' ki baat ki. Hook: 'Zaroorat = OK, Laalach = problem'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "G1-294", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Sustainable development", "question": "Explain the meaning of sustainable development.", "answer": "Sustainable development means development that takes place without damaging the environment and meets present needs without compromising the ability of future generations to meet their own needs.", "explanation": "Sustainable development matlab aisa vikas jo environment ko nuksan na pahuchaye aur future generation ke haq na cheene. Aaj ki zaroorat puri karo, par kal ke liye bhi bacha kar rakho. Hook: 'Aaj bhi, kal bhi - dono ka khayal'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "G1-295", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Sustainable development", "question": "In which international conference was ‘Agenda-21’ accepted ?", "answer": "Agenda-21 was accepted at the Rio de Janeiro Earth Summit (UNCED), Brazil, in 1992.", "explanation": "Agenda-21 ko 1992 mein Rio de Janeiro (Brazil) ke Earth Summit mein accept kiya gaya tha. Yeh 21vi sadi ke liye sustainable development ka blueprint hai. Hook: 'Rio + 1992 + Agenda-21' - teeno saath yaad karo.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "G1-296", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Sustainable development", "question": "Explain any two outcomes of the Summit.", "answer": "Two outcomes of the Rio Earth Summit (1992): global cooperation on common interests, mutual needs and shared responsibilities; and the creation of the Commission on Sustainable Development (along with Agenda-21).", "explanation": "Rio Earth Summit ke do nateeje: (1) duniya ne common interest aur shared responsibility par global cooperation pe haami bhari, (2) 'Commission on Sustainable Development' bana. Hook: 'Sab milke kaam (cooperation) + ek commission bani'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "G1-297", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Disaster management (floods)", "question": "Mention any two essential items that should be included in a 'family emergency kit'.", "answer": "Essential items: a portable radio/transistor, torch with spare batteries, a first-aid box with essential medicines (like ORS), dry food items, drinking water and matchboxes.", "explanation": "Family emergency kit mein zaroori cheezein: radio/transistor, torch + extra batteries, first-aid box (ORS, dawai), dry food, peene ka paani aur matchbox. Hook: 'Radio, torch, dawai, khaana, paani - emergency ki sab nishaani'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "G1-298", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Disaster management (floods)", "question": "Why are the items of family emergency kit important during flood situation?", "answer": "They are important because during floods normal services are disrupted, so the kit ensures survival and basic necessities - communication, light, medical aid, food and clean water.", "explanation": "Flood ke time bijli, paani, dukaan sab band ho jaate hain. Emergency kit isiliye important hai kyunki yeh communication, roshni, dawai, khaana aur paani de kar zinda rehne mein madad karti hai. Hook: 'Normal services band, kit hi sahara'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "G2-303", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Forest conservation measures", "question": "Suggest any two measures for the conservation of forest.", "answer": "(i) Prevent excessive cutting of trees and promote afforestation/recycling of paper. (ii) Implement protective laws and encourage Joint Forest Management.", "explanation": "Forest bachane ke liye: ped kam kaato, naye ped lagao (afforestation), aur kanoon laagu karo. Wildlife conservation se thoda alag hai - yahaan focus 'pedon' pe hai, janwaron pe nahi. Memory hook: 'Kam kaato, zyada lagao'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G2-313", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Project Tiger", "question": "Why was 'Project Tiger' considered a significant step for Tiger Conservation ?", "answer": "It was a large-scale effort launched (1973) to save the endangered tiger by tackling poaching, habitat loss and human encroachment, thereby protecting entire ecosystems along with the tiger.", "explanation": "Project Tiger itna important kyun? Kyunki ye bade scale pe sher bachane ka plan tha - poaching aur habitat loss dono se ladta hai, aur sher bachao toh poora ecosystem bach jaata hai. Memory hook: 'Sher bacha toh jungle bacha'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "G2-314", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Project Tiger", "question": "What role did India play in the global tiger population ?", "answer": "India (along with Nepal) is home to about two-thirds of the world's surviving tigers; it launched Project Tiger and the Wildlife Protection Act and set up numerous tiger reserves to protect them.", "explanation": "Duniya ke do-tihaai (2/3) sher India aur Nepal mein hain! Isliye India ka role bahut bada hai - humne Project Tiger chalaya aur kai tiger reserves banaye. Memory hook: '2/3 tigers = India ka responsibility'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "G2-315", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Threats to wildlife", "question": "Mention any two major threats to the wildlife species.", "answer": "(i) Poaching for trade (skins, bones for traditional medicine). (ii) Habitat loss due to deforestation and urban expansion; also depletion of prey base.", "explanation": "Wildlife ko khatra do cheezon se: poaching (chamdi-haddi ke liye shikaar) aur habitat loss (jungle katne se ghar khatam). Memory hook: 'Shikaar + Ghar tootna = janwar khatre mein'. Ye 2-marker case-based mein aata hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "G2-318", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Bishnoi / Jeev daya", "question": "Explain the cultural values that contribute to the coexistence of nature.", "answer": "Values like 'Jeev daya' (compassion for all living beings) among the Bishnoi community of Rajasthan promote coexistence; they treat blackbucks, nilgai and peacocks as integral to their life and protect them on religious grounds.", "explanation": "Bishnoi community (Rajasthan) ka mantra hai 'Jeev daya' - har jeev pe daya. Wo blackbuck, nilgai, mor ko apne parivaar jaisa maante hain aur jaan dekar bhi bachate hain. Memory hook: 'Bishnoi = Jeev daya = sab janwar apne'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "G2-319", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Chipko Movement", "question": "Assertion (A) : The famous 'Chipko Movement' in the Himalayas successfully resisted deforestation in several areas. Reason (R) : Through this, community afforestation campaign with indigenous species was made enormously successful.", "answer": "(B) Both (A) and (R) are true and (R) is the correct explanation of (A) — the Chipko Movement resisted deforestation and succeeded through community afforestation with indigenous species.", "explanation": "Chipko Movement = ped se chipak kar deforestation roka, aur saath hi local species ke ped bhi lagaye. Dono baatein sahi hain aur R hi A ka kaaran hai, isliye option B. Memory hook: 'Chipko = pedon ko jhappi + naye ped lagao'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 2}, {"key": "G2-321", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Map/Match - National Parks and States", "question": "Match Column I with Column II and choose the correct option. Column I (National Park) Column II (State) i. Kaziranga a. Madhya Pradesh ii. Jim Corbett b. Assam iii. Sunderbans c. Uttarakhand iv. Bandhavgarh d. West Bengal", "answer": "(D) i-b, ii-c, iii-d, iv-a — Kaziranga–Assam, Jim Corbett–Uttarakhand, Sunderbans–West Bengal, Bandhavgarh–Madhya Pradesh.", "explanation": "National park ko sahi state se jodo: Kaziranga-Assam (gainde), Corbett-Uttarakhand, Sunderban-West Bengal (Royal Bengal Tiger), Bandhavgarh-MP. Memory hook: 'KABS' - Kaziranga-Assam, Bandhavgarh-MP, etc. Inhe ratt lo, har year aata hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 2}, {"key": "G3-349", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Dams & rivers (matching)", "question": "Match Column I with Column II and choose the correct option. Column I (Dams) Column II (Rivers) i. Sardar Sarovar a. Sutlej ii. Hirakud b. Krishna iii. Bhakra Nangal c. Narmada iv. Nagarjuna Sagar d. Mahanadi", "answer": "(D) i–c, ii–d, iii–a, iv–b → Sardar Sarovar–Narmada, Hirakud–Mahanadi, Bhakra Nangal–Sutlej, Nagarjuna Sagar–Krishna.", "explanation": "Dam–River jodi: Sardar Sarovar–Narmada, Hirakud–Mahanadi, Bhakra Nangal–Sutlej, Nagarjuna Sagar–Krishna. Hook: 'Nagarjuna par Krishna' aur 'Bhakra par Sutlej'. In dam-river jodiyon ko ratne ke baad saare match wale MCQ aasaan.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 2}, {"key": "G4-378", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Explain the features of Commercial Farming.", "answer": "Commercial farming uses high doses of modern inputs (HYV seeds, fertilizers, pesticides) for higher productivity, needs developed irrigation and transport, and its degree of commercialisation varies regionally. Plantations are a form of commercial farming.", "explanation": "Commercial farming = sab market ke liye! Modern seeds, khaad, dawaai, achhi sinchai aur transport chahiye. Hook: jitna zyada modern input, utni zyada paidawar. Yeh subsistence se bilkul ulta hai.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G4-381", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Differentiate between Primitive Subsistence and Commercial Farming.", "answer": "Primitive subsistence farming uses small plots, primitive tools and family labour, depending on monsoon and natural fertility. Commercial farming uses modern inputs (HYV seeds, fertilizers, machinery) on larger areas mainly to sell produce in the market.", "explanation": "Differentiate matlab antar batao. Primitive subsistence = chhoti zameen, purane tools, apne liye; Commercial = bade paimane par, modern inputs, bechne ke liye. Bas do columns bana ke ek-ek point likh do, easy marks!", "years": ["2024"], "papers": 1, "raw": 2, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G4-382", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Differentiate between Intensive Subsistence and Plantation Farming.", "answer": "Intensive subsistence farming is labour-intensive on small holdings in densely populated areas, growing food crops for the family. Plantation farming grows a single cash crop (tea, coffee, rubber) on a large area using heavy capital and labour for the market.", "explanation": "Intensive subsistence = chhoti zameen, zyada log, khaane ke liye; Plantation = bada area, ek cash crop, bechne ke liye. Hook: plantation ki soch chai-coffee ke bagaan se karo, intensive ki soch ghani aabadi wale chhote khet se.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G4-383", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop classification", "question": "Match Column-I with Column-II and choose the correct option : Column-I (Crop) Column-II (Type) I. Wheat a. Millet Crop II. Ragi b. Beverage Crop III. Tea c. Food Crop IV. Maize d. Food & Fodder Crop Options : I II III IV (A) d a c b (B) c d b a (C) c a b d (D) d b a c", "answer": "Correct: (C) I-c (Wheat = Food crop), II-a (Ragi = Millet crop), III-b (Tea = Beverage crop), IV-d (Maize = Food & Fodder crop).", "explanation": "Crop ko uske type se match karo: Wheat khaana (food), Ragi ek millet, Tea beverage (peene wali), Maize food + fodder (jaanwaron ka chaara bhi). Hook: 'Cha-Ra-Te-Ma' yaad rakho aur option C tick karo!", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 2}, {"key": "G4-387", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Cropping seasons", "question": "Read the given statements and choose the correct option with regard to Rabi cropping season from the following : I. Rabi crops are sown in winter. II. Sown from October to December and harvested from April to June. III. Important crops are Maize, Cotton, Jute. IV. Punjab, Haryana, Uttar Pradesh are important for the production of wheat.", "answer": "Correct: (c) I, II and IV. (Statement III is wrong because Maize, Cotton and Jute are Kharif crops, not Rabi.)", "explanation": "Rabi ke baare mein III galat hai kyunki Maize, Cotton, Jute toh Kharif crops hain! Baaki I, II, IV sab sahi. Hook: jaise hi 'Maize/Cotton/Jute' dikhe samajh jao yeh Kharif hai, isliye option (c) sahi.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "G4-388", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Cropping seasons", "question": "Describe any three features of Kharif season of Indian agriculture.", "answer": "Kharif crops are sown with the onset of the monsoon (June-July) and harvested in September-October. Important crops include paddy, maize, jowar, bajra, cotton and groundnut. Major rice areas: Assam, West Bengal, coastal Odisha, Andhra Pradesh and Tamil Nadu.", "explanation": "Kharif crops monsoon ke saath bote hain (June-July) aur Sept-Oct mein kaatte hain. Crops: paddy, maize, jowar, bajra, cotton, groundnut. Hook: 'Kharif = barsaat ki fasal', baarish wale season ki kheti.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 2}, {"key": "G4-391", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Cropping seasons", "question": "Differentiate between Rabi and Kharif cropping seasons.", "answer": "Rabi crops are sown in winter (Oct-Dec) and harvested in summer (Apr-Jun) - e.g. wheat, gram, mustard. Kharif crops are sown with the monsoon (Jun-Jul) and harvested in Sept-Oct - e.g. paddy, maize, cotton.", "explanation": "Rabi vs Kharif: Rabi = sardi mein boya, garmi mein kaata (wheat, gram); Kharif = barsaat mein boya, autumn mein kaata (paddy, maize). Hook: 'Rabi = sardi, Kharif = barsaat' - bas yeh do line yaad rakho.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G4-392", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Cropping seasons", "question": "Differentiate between Kharif and Zaid cropping seasons.", "answer": "Kharif crops are sown with the monsoon (Jun-Jul) and harvested in Sept-Oct (paddy, maize, cotton). Zaid is a short summer season between Rabi and Kharif (Mar-Jun) growing watermelon, muskmelon, cucumber and fodder crops.", "explanation": "Kharif = barsaat ki lambi season (paddy, maize); Zaid = garmi ki chhoti season (Mar-Jun) jisme tarbooz, kharbooja, kakdi ugte hain. Hook: 'Zaid = garmi ke juicy fruits', short summer crop.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G4-404", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Government reforms", "question": "Explain the Technological and Institutional reforms taken by the government in the interest of farmers.", "answer": "Technological reforms: HYV seeds, fertilizers, modern irrigation, Green/White Revolutions, weather forecasting. Institutional reforms: land reforms, crop insurance, Grameen banks/cooperatives, Kisan Credit Card, PAIS and Minimum Support Price (MSP).", "explanation": "Yeh question dono reforms ek saath maangta hai. Trick: Technological = technology (HYV seeds, machine, irrigation); Institutional = system/paisa (land reforms, banks, KCC, MSP). Dono ke 2-3 points alag-alag likho, 5 marks!", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G4-405", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Government reforms", "question": "Explain the initiative taken by the government to ensure the increase in agricultural production.", "answer": "Initiatives include the Green Revolution (HYV seeds, fertilizers, irrigation), land reforms, multipurpose projects, crop insurance, Kisan Credit Card, Grameen banks and Minimum Support Price (MSP) to boost production.", "explanation": "Paidawar badhane ke liye sarkaar ne Green Revolution, land reforms, irrigation projects aur paise ki madad (KCC, MSP) di. Hook: 'production badhao' = technology + support dono lagao, jaise Green Revolution ne gehu-chawal badhaya.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G4-406", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Agriculture and economy", "question": "Explain the importance of agriculture in the Indian Economy.", "answer": "Agriculture is the backbone of the Indian economy: it provides livelihood to about two-thirds of the population, contributes to national income/GDP, supplies food and fodder, gives raw materials to industries (cotton, jute, sugarcane), and earns foreign exchange through exports.", "explanation": "Agriculture Bharat ki reedh ki haddi hai! Yeh do-tihaai logon ko rozgaar deti hai, GDP mein hissa, khaana aur industry ka raw material deti hai. Hook: 'kheti = roti + rozgaar + raw material', isliye economy ke liye sabse zaroori.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G4-409", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Sustainable / organic farming", "question": "Describe any three impacts of globalisation on Indian agriculture.", "answer": "Globalisation pushed farmers to invest in new technology and genetically modified seeds; diversify from traditional crops to high-value crops (horticulture, millets, herbs); and adopt low-cost organic farming while exploring new international markets.", "explanation": "Globalisation ne Indian kheti badal di: kisaan nayi technology aur GM seeds use karne lage, high-value crops (horticulture, herbs) ki taraf shift hue aur organic farming + naye international markets dhoondhne lage. Hook: duniya se jud gaye toh kheti bhi business-minded ho gayi.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 2}, {"key": "G4-413", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop identification", "question": "Read the following informations and identify the crop. It is the staple food crop of majority of people in India. India is the second largest producer of this crop. It is a Kharif crop. It requires high humidity with 100 cm of annual rainfall.", "answer": "(D) Rice - staple food of most Indians, India is the second largest producer, a Kharif crop needing high humidity and ~100 cm rainfall.", "explanation": "Staple food + India duniya ka doosra sabse bada producer + Kharif + 100 cm baarish = Rice! Hook: China ke baad India rice mein No.2, yaad rakho. Sahi option Rice.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "G4-421", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop conditions and requirements", "question": "Explain the geographical conditions required for the growth of tea.", "answer": "Tea needs a warm, moist, frost-free climate (20-30°C), heavy rainfall (150-300 cm) well distributed through the year, and deep, fertile, well-drained loamy soil rich in humus on hill slopes (so water does not stagnate).", "explanation": "Tea (chai) ke liye chahiye: garam-namee mausam, khoob baarish saal bhar aur dhalaan (slope) wali achhi mitti taaki paani ruke na. Hook: 'chai = pahaadi dhalaan + baarish', isliye Assam-Darjeeling ki hilly tea famous.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G5-443", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Energy conservation", "question": "“Promotion of energy conservation is important plank of sustainable energy.” Explain the statement with examples.", "answer": "Energy conservation is central to sustainable energy because conventional resources are limited and consumption is rising. Promoting renewables, energy-efficient devices, public awareness, judicious use and small steps (public transport, power-saving appliances) help meet demand sustainably.", "explanation": "Sustainable energy ka sabse zaroori hissa hai energy bachana. Jab tak hum fizool waste rokenge nahi, sustainable kaise honge? Ghar mein LED lagao, public transport pakdo, awareness failao - yeh chhote kadam hi bada farak laate hain. Conservation = sustainable energy ki neev.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G5-446", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Non-conventional energy", "question": "Explain with examples the significance of the usage of non-conventional sources of energy for the country.", "answer": "Non-conventional (renewable) sources like solar, wind, biogas and geothermal are significant because they are clean, inexhaustible, reduce dependence on imported fossil fuels, cut pollution and support sustainable development across the country.", "explanation": "Non-conventional energy desh ke liye vardaan hai - solar, wind, biogas khatam nahi hote, pollution nahi karte, aur petrol import pe paisa bhi bachta hai. India jaise dhoop-bhare desh ke liye toh perfect. Clean energy = clean future. Isi me desh ki bhalai hai.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G5-450", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Wind energy", "question": "‘‘India has great potential of wind power generation.’’ Explain the statement in context of wind energy.", "answer": "India has significant wind power potential. The largest wind farm cluster is in Tamil Nadu (Nagercoil to Madurai), with other important farms in Andhra Pradesh, Karnataka, Gujarat, Kerala, Maharashtra and Lakshadweep.", "explanation": "India mein hawa se bijli banane ka bada scope hai! Sabse bada wind farm Tamil Nadu mein hai - Nagercoil se Madurai tak. Gujarat, Karnataka, Andhra, Kerala mein bhi badhiya wind farms hain. Hawa free hai, clean hai - bas pankhe ghumao aur bijli banao!", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G5-459", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Natural gas", "question": "Analyse the advantages of Natural Gas as a source of energy.", "answer": "Natural gas is used as a domestic and industrial fuel, for electricity generation and industrial heating, as a raw material in chemical and fertiliser industries, and as transport fuel (CNG) and cooking fuel (PNG). It is clean and low-polluting.", "explanation": "Natural gas ke fayde gino: ghar ka fuel, industry ka fuel, bijli banana, khaad-chemical ka raw material, CNG aur PNG! Itne saare kaam aur upar se clean energy. Isliye ise 'fuel of the future' kehte hain. Versatile aur green - dono!", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G5-461", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Occurrence of minerals", "question": "‘‘Minerals occur in igneous and metamorphic rocks.’’ Explain the statement with example.", "answer": "In igneous and metamorphic rocks minerals occur in cracks, crevices, faults or joints - smaller occurrences are 'veins' and larger ones are 'lodes'. They form when molten/gaseous minerals are forced upward, cool and solidify. Examples: tin, copper, zinc, lead.", "explanation": "Igneous aur metamorphic rocks mein minerals daraaron (cracks) mein jamte hain - chhota jamav 'vein', bada jamav 'lode'. Pighla mineral upar aata hai, thanda hota hai aur solid ban jaata hai. Examples: tin, copper, zinc, lead. Yaad rakho: chhoti vein, badi lode!", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G5-462", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Occurrence of minerals", "question": "‘‘The ocean waters contain vast quantities of minerals.’’ Explain the statement with example.", "answer": "Ocean waters contain vast quantities of minerals, but most are too widely diffused to be of economic use. Common salt, magnesium and bromine are largely derived from ocean waters, and ocean beds are rich in manganese nodules.", "explanation": "Samundar ka paani minerals se bhara hai, par zyadatar itne phaile (diffused) hain ki nikalna mushkil. Phir bhi namak (common salt), magnesium aur bromine samundar se hi milte hain. Aur ocean bed pe manganese nodules bichhe hote hain. Yaad rakho: samundar = namak ka khazana!", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G5-475", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Classification of minerals", "question": "Choose the correctly matched pair. (a) Ferrous – Natural Gas (b) Non-Ferrous – Nickel (c) Non-Metallic Minerals – Limestone (d) Energy Minerals – Cobalt", "answer": "(c) Non-Metallic Minerals - Limestone. Limestone is correctly a non-metallic mineral (others are mismatched: Natural Gas is energy, Nickel and Cobalt are ferrous).", "explanation": "Sahi jodi dhoondho - Limestone ek non-metallic mineral hai, ekdum sahi match (option c). Baaki galat: Natural Gas energy mineral hai, Nickel/Cobalt ferrous. Yaad rakho: Limestone = non-metallic (cement-vement banta hai).", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "G5-476", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Classification of minerals", "question": "Choose the correct option to fill the blank. Non Metallic Mineral : Mica Energy Mineral : ………… (A) Natural Gas (B) Bauxite (C) Manganese (D) Platinum", "answer": "(A) Natural Gas. Natural Gas is an energy mineral (like coal and petroleum), just as Mica is a non-metallic mineral.", "explanation": "Analogy samajho: jaise Mica ek non-metallic mineral hai, waise Natural Gas ek energy mineral hai (coal, petroleum ki family). Bauxite/Manganese/Platinum metallic hain. Yaad rakho: energy mineral = jisse energy mile (coal, petroleum, natural gas).", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "G5-482", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Mineral producers (MCQ)", "question": "Choose the correct option for the following States’ share (in percentage) in the production of ‘manganese’ in India from the highest to the lowest order.", "answer": "(B) Madhya Pradesh, Maharashtra, Odisha, Karnataka - the descending order of states by manganese production share.", "explanation": "Manganese production ka order (zyada se kam): Madhya Pradesh, Maharashtra, Odisha, Karnataka. Jugaad: 'MP-Maha-Odisha-Karnataka' (M-M-O-K). MP sabse aage manganese mein. Order yaad rakhna padega!", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "G5-484", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Mineral producers (MCQ)", "question": "Which one of the following is the highest ‘bauxite’ producing state of India ?", "answer": "(D) Odisha. Odisha is the largest bauxite-producing state of India (Koraput, Kalahandi region).", "explanation": "Bauxite ka raja kaun? Odisha! Koraput-Kalahandi mein bauxite ke bade bhandar. Bauxite se aluminium banta hai. Yaad rakho: 'Bauxite = Odisha No. 1'. Iron ore mein bhi Odisha top - mineral-rich state hai!", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "G5-485", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Classification of minerals", "question": "Match Column-I with Column-II and choose the correct option. Column-I (Minerals) Column-II (Examples) I. Ferrous II. Non-Ferrous III. Non-Metallic IV. Energy", "answer": "(B) I-d, II-c, III-b, IV-a. Ferrous, Non-Ferrous, Non-Metallic and Energy minerals matched with their respective examples.", "explanation": "Match-the-column - mineral type ko example se jodo. Answer (B) I-d, II-c, III-b, IV-a. Concept: Ferrous (iron ore), Non-Ferrous (copper/bauxite), Non-Metallic (mica/limestone), Energy (coal/petroleum). Type pehchaano aur jod do!", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 2}, {"key": "G5-495", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Map work - Kalpakkam nuclear plant", "question": "Name the State where Kalpakkam Nuclear Power Plant is located.", "answer": "Kalpakkam Nuclear Power Plant (Madras Atomic Power Station) is located in Tamil Nadu.", "explanation": "Kalpakkam Nuclear Power Plant Tamil Nadu mein hai (Chennai ke paas). Ise Madras Atomic Power Station bhi kehte hain. Yaad rakho: 'Kalpakkam = Tamil Nadu'. (id 1353 mein official answer galti se NCM ka Nagpur/Kolkata wala chhap gaya hai, par sahi jagah Tamil Nadu hai.)", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Map"], "score": 2}, {"key": "G5-498", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Map work - coal mines", "question": "Talcher – Major Coal Mines", "answer": "Talcher major coal mines are located in Odisha (Mahanadi valley coalfields).", "explanation": "Talcher coal mines Odisha mein hain - Mahanadi valley coalfield. Yaad rakho: 'Talcher = Odisha ka coal'. Odisha minerals ka khazana hai - iron, bauxite, coal sab! Map pe Odisha mein dot.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 1, "types": ["Map"], "score": 2}, {"key": "G5-500", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Map work - oil fields", "question": "Naharkatiya – Oil field", "answer": "Naharkatiya oil field is located in Assam (upper Assam / Brahmaputra valley).", "explanation": "Naharkatiya oil field Assam mein hai - upper Assam ki Brahmaputra valley mein. Yaad rakho: 'Naharkatiya = Assam ka tel'. Assam India ka sabse purana oil-producing area hai (Digboi bhi yahin). Map pe Assam mein dot.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 1, "types": ["Map"], "score": 2}, {"key": "G5-501", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Map work - thermal power plants", "question": "Namrup – Thermal Power Plant", "answer": "Namrup Thermal Power Plant is located in Assam.", "explanation": "Namrup Thermal Power Plant Assam mein hai. Yaad rakho: 'Namrup = Assam ka thermal plant'. Assam mein tel aur gas hai isliye thermal plant bhi yahin. (id 1782 ka official answer 'Dandi' galti se chhapaa hai - sahi jagah Assam hai.) Map pe Assam mein dot.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 1, "types": ["Map"], "score": 2}, {"key": "G6-510", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "IT & Electronics industry", "question": "“The development process of India has experienced transformation due to the significant influence of Information Technology (I.T.) and Electronic Industry.” Explain the statement with examples.", "answer": "IT and the electronics industry (from transistors to computers) transformed India's development — Bengaluru is the electronic capital; the sector boosted communication, generated huge employment, expanded trade/commerce and strengthened the economy via hardware, software and satellite technology.", "explanation": "Ye question kehta hai IT aur electronics ne India ko badal diya. Bengaluru = electronic capital (ye zaroor likhna). IT se communication fast hua, lakhon jobs bani aur economy strong hui. Memory hook: BCE — Bengaluru, Communication, Employment.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 2}, {"key": "G7-556", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Map work - Mormugao Port", "question": "Name the State where Mormugao Sea Port is located.", "answer": "Mormugao Sea Port is located in Goa.", "explanation": "Mormugao = Goa, India ka ek purana natural harbour aur iron-ore export ke liye famous. Note: id 1355 ka official answer 'Tamil Nadu' galat chhapa hai - sahi Goa hai. Hook: 'Mormugao-Goa, masti aur ore dono.'", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Map"], "score": 2}, {"key": "G7-563", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Map work - Tamil Nadu Airport", "question": "Meenam Bakkam – International Airport", "answer": "Meenambakkam (Chennai) International Airport is located in Tamil Nadu.", "explanation": "Meenambakkam = Chennai International Airport, Tamil Nadu mein. id 1784 ka 'Assam' answer galat chhapa hai - yeh Tamil Nadu mein hai. Hook: 'Meenambakkam-Madras(Chennai)' dono South ke. Map pe South-East coast par mark.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 1, "types": ["Map"], "score": 2}, {"key": "H1-588", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Treaty of Vienna 1815", "question": "Who among the following hosted the ‘Vienna Congress’ in 1815 ?", "answer": "(A) Chancellor Duke Metternich. The Austrian Chancellor Metternich hosted the Congress of Vienna in 1815, which drew up the conservative settlement of Europe after Napoleon's defeat.", "explanation": "Vienna Congress (1815) ko Austria ke Chancellor Metternich ne host kiya - wahi conservative leader jisne Napoleon ke baad Europe ko purane raja-raj mein wapas set kiya. Hook: Vienna = Metternich ka show.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H1-589", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Unification of Italy", "question": "From which of the following countries Giuseppe Garibaldi belonged to ?", "answer": "(b) Italy. Giuseppe Garibaldi was an Italian revolutionary whose volunteer 'Red Shirts' conquered the Kingdom of the Two Sicilies (southern Italy), a key step in Italian unification.", "explanation": "Garibaldi Italy ka tha - wahi 'Red Shirts' waala josheela fighter jisne South Italy (Sicily) jeeta. Toh answer Italy. Hook: Garibaldi = Italy ka action-hero in red shirts.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H1-590", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Balkans & nationalism", "question": "Two statements are given below. They are Assertion (A) and Reason (R). Read both the statements and choose the correct option : Assertion (A) : The most serious source of nationalist tension in Europe after 1871 was Balkan. Reason (R) : A large part of the Balkan was under the control of Ottoman Empire.", "answer": "(a) Both A and R are true and R is the correct explanation of A. After 1871 the Balkans were the most serious source of nationalist tension precisely because much of the region was under the declining Ottoman Empire, whose Slav peoples sought independence amid Big-Power rivalry.", "explanation": "Balkan area Europe ka sabse 'tension wala' kona tha kyunki kamzor pad rahe Ottoman Empire ke andar saari Slav kaumein azaadi maang rahi thi, aur bade desh wahan control chahte the. Toh A bhi sach, R bhi sach, aur R hi A ki wajah. Hook: Balkans = 'powder keg'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 2}, {"key": "H1-591", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Chronology", "question": "Arrange the following events in chronological order and choose the correct option from the following : I. Treaty of Constantinople II. Defeat of Napoleon III. Unification of Italy IV. Unification of Germany", "answer": "(c) II, I, IV, III - Defeat of Napoleon (1815) -> Treaty of Constantinople (1832) -> Unification of Germany (1871) -> Unification of Italy. (CBSE awarded full marks to all who attempted, as the listed options were defective.)", "explanation": "Sequence: pehle Napoleon haara (1815), phir Treaty of Constantinople (1832), uske baad Germany aur Italy unification. CBSE ne option galat hone ki wajah se sabko marks de diye, toh tension mat lo - bas logic samjho. Hook: Napoleon pehle, baaki sab baad mein.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H1-592", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Romanticism & culture", "question": "The German philosopher ‘Johann Gottfried’ belonged to which one of the following schools of thought ?", "answer": "(C) Romanticist. Johann Gottfried Herder was a German Romantic thinker who claimed that true German culture was to be found among the common people (das volk) through their folk songs, poetry and dances (volksgeist).", "explanation": "Johann Gottfried Herder ek Romantic thinker tha jiska kehna tha ki asli German culture aam logon (das volk) ke folk-songs aur kahaniyon mein basta hai. Toh woh Romanticist school ka tha. Hook: Herder + volksgeist = Romanticism.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H1-593", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Making of Britain", "question": "Assertion (A) : ‘The Act of Union 1707’ between England and Scotland resulted in the formation of ‘United Kingdom of Great Britain’. Reason (R) : England wanted to impose its influence on Scotland.", "answer": "(A) Both A and R are true and R is the correct explanation of A. The Act of Union (1707) merged England and Scotland into the 'United Kingdom of Great Britain', driven by England's wish to extend its dominance over Scotland (Scottish culture and institutions were systematically suppressed).", "explanation": "1707 ke Act of Union se England aur Scotland milkar 'Great Britain' bane, aur ye hua kyunki England Scotland pe control chahta tha (Scottish culture dabaaya bhi gaya). Toh A aur R dono sach, R hi A ka kaaran. Hook: 1707 = England ne Scotland ko apni marzi se merge kiya.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 2}, {"key": "H1-594", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Chronology", "question": "Arrange the following events in chronological order and choose the correct option. I. Treaty of Constantinople II. Hamburg granted autonomy to Hungary III. Balkan Conflict IV. Napoleonic Civil Code", "answer": "(C) IV, I, II, III - Napoleonic Civil Code (1804) -> Treaty of Constantinople (1832) -> autonomy to Hungary -> Balkan Conflict (early 20th century).", "explanation": "Order: sabse pehle Napoleon ka Civil Code (1804), phir Treaty of Constantinople (1832), uske baad Hungary ko autonomy, aur aakhir Balkan Conflict. Hook: Code(1804) pehle, Balkan baad - IV,I,II,III.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H1-595", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "French Revolution & nation-making", "question": "Explain the impact of French Revolution on other European countries.", "answer": "The French Revolution spread nationalism and collective identity beyond France: Jacobin clubs sprang up in other countries, and French revolutionary armies carried the principles of liberty and the Napoleonic Code abroad, abolishing feudal privileges and inspiring peoples to free themselves from despotism.", "explanation": "French Revolution sirf France tak nahi ruka - iska bukhaar baaki Europe mein bhi failaa. Doosre deshon mein Jacobin clubs bane, aur French fauj jahan gayi wahan liberty aur Napoleonic Code le gayi. Hook: Revolution ka 'export' - ideas border paar chale gaye.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "H1-597", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Unification of Germany", "question": "Two statements are given below. They are Assertion (A) and Reason (R). Read both statements and choose the correct option : Assertion (A) : On Prussian initiative ‘Zolleverin’ Custom Union was formed. Reason (R) : It was to create unified economic territory allowing the unhindered movement of goods, people and capital.", "answer": "(A) Both A and R are correct and R is the correct explanation of A. The Zollverein, formed on Prussian initiative (1834), abolished tariff barriers among German states to create a single economic/customs territory allowing free movement of goods and capital - a major step towards political unification.", "explanation": "Prussia ne 1834 mein Zollverein banaaya taaki German states ke beech tax-barriers hat jaayein aur goods-capital free ghoom sakein. Yahi R, A ka sahi kaaran. Hook: Zollverein = pehle economy jodo, phir desh khud jud jaayega.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 2}, {"key": "H1-598", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Chronology", "question": "Arrange the following incidents in chronological order and choose the correct option. I. French Revolution II. Napoleon’s invasion of Italy III. Unification of Italy IV. Vienna Peace Treaty", "answer": "(A) I, II, IV, III - French Revolution (1789) -> Napoleon's invasion of Italy (1796) -> Vienna Peace Treaty (1815) -> Unification of Italy (1861).", "explanation": "Sequence: French Revolution (1789) sabse pehle, phir Napoleon ka Italy pe hamla, uske baad Vienna Treaty (1815), aur aakhir Italy ki unification. Hook: Revolution -> Napoleon -> Vienna -> Italy united (I,II,IV,III).", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H1-599", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Economic hardship of 1830s", "question": "‘‘Until the nineteenth century, poverty and hunger were common in Europe.’’ Analyse the statement.", "answer": "Until the 19th century poverty and hunger were common because of rapid population growth and overcrowded towns/slums, frequent food shortages and bad harvests, widespread deadly diseases, and competition that ruined small producers - leading to large-scale pauperism.", "explanation": "19th century tak Europe mein gareebi aur bhookh aam thi - aabaadi badhne se shehar khachakhach bhar gaye, khaane ki kami aur bimaariyaan phaili, aur chhote karigar competition mein doob gaye. Hook: bheed + kam khaana + bimaari = pauperism.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "H1-600", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "French Revolution & nation-making", "question": "‘‘The mission and the destiny of the French nation was to liberate the peoples of Europe.’’ Support the statement in context of impact of French revolution.", "answer": "French revolutionaries believed it was their nation's mission and destiny to liberate Europe's peoples from despotism and help them become nations. As Napoleon's armies moved across Europe they carried revolutionary ideas, abolished feudalism and spread the Napoleonic Code, inspiring nationalist movements abroad.", "explanation": "French logon ka maanna tha ki unka 'mission' hai poore Europe ko despotism se azaad karaana. Napoleon ki fauj jahan gayi, revolution ke ideas aur Code saath le gayi aur feudalism khatam kiya. Hook: France ne khud ko Europe ka 'mukti-data' samjha.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "H2-633", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Non-Cooperation Movement", "question": "Describe any three causes that led to the Non-Cooperation Movement.", "answer": "Main causes of the Non-Cooperation Movement: the repressive Rowlatt Act (1919), the Jallianwala Bagh massacre and martial-law brutality in Punjab, the Khilafat issue (to support the Caliph), and the broad demand for Swaraj - all of which fuelled widespread anger against British rule.", "explanation": "Non-Cooperation Movement ke teen bade kaaran: kaala Rowlatt Act, Jallianwala Bagh ka kaand, aur Khilafat ka mudda + Swaraj ki maang. In sabne logon ko angrezon ke khilaaf bhadkaaya. Hook: 'Rowlatt + Jallianwala + Khilafat = NCM ki aag'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 2}, {"key": "H2-634", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Civil Disobedience Movement - causes", "question": "Describe any three causes of 'Civil Disobedience Movement'.", "answer": "Main causes of the Civil Disobedience Movement: the all-white Simon Commission (no Indian members), rejection of the demand for dominion status, the Lahore Session (1929) call for 'Purna Swaraj', and the hated salt tax - leading Gandhi to launch the movement with the Dandi March (1930).", "explanation": "Civil Disobedience Movement ke teen bade kaaran: Simon Commission mein ek bhi Indian nahi (so 'Simon go back!'), Lahore Session 1929 ka 'Purna Swaraj' ka naara, aur namak-kar jaise unfair tax. Isi se Dandi March shuru hui. Hook: 'Simon + Purna Swaraj + Namak-kar = CDM ki shuruaat'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 2}, {"key": "H2-648", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Satyagraha & early movements", "question": "'The Gandhian idea of Satyagraha, emphasized the power of truth and struggle against injustice.' Explain the statement with examples.", "answer": "Satyagraha meant the force of truth and non-violence: without using arms, a true cause could win by appealing to the oppressor's conscience. Gandhi applied it successfully in Champaran (1917, indigo peasants), Kheda (1918, peasants) and Ahmedabad (1918, cotton mill workers).", "explanation": "Satyagraha = sach aur ahinsa ki taakat. Bina hathiyar uthaaye, sachchai se dushman ka dil jeeto. Gandhi ji ne ise Champaran (neel kisaan), Kheda (kisaan) aur Ahmedabad (mill mazdoor) mein aazmaaya. Hook: 'Sach ka aagrah = Satyagraha'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 2}, {"key": "H2-672", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Caste, leaders & MCQs", "question": "Which one of the following pairs regarding Indian nationalism is correctly matched ?", "answer": "(d) Jawaharlal Nehru - Oudh Kisan Sabha (he, with Baba Ramchandra, helped set up the Oudh Kisan Sabha in 1920).", "explanation": "Sahi jodi: Jawaharlal Nehru - Oudh Kisan Sabha (1920 mein Baba Ramchandra ke saath banayi). Answer: (d). Hook: 'Nehru + Awadh ke kisaan = Oudh Kisan Sabha'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H2-673", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Caste, leaders & MCQs", "question": "Choose the correct option, related to the founders of the 'Swaraj Party' within the Congress.", "answer": "(C) C.R. Das and Motilal Nehru - they founded the Swaraj Party (1923) within Congress to contest council elections from within.", "explanation": "Swaraj Party (1923) ko C.R. Das aur Motilal Nehru ne banaya tha - council elections andar se ladne ke liye. Answer: (C). Hook: 'Das + Motilal = Swaraj Party ki jodi'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H2-680", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Chronology of national movement (MCQ)", "question": "Arrange the following events of Indian National Movement in chronological order and choose the correct option. I. Formation of Swaraj Party II. Lahore Session of the Indian National Congress III. Gandhi-Irwin Pact IV. Formation of Depressed Class Association", "answer": "(B) I, II, IV and III : Swaraj Party (1923) -> Lahore Session (1929) -> Depressed Classes Association (1930) -> Gandhi-Irwin Pact (1931).", "explanation": "Order yaad rakho: Swaraj Party (1923), Lahore Session (1929), Depressed Classes Assoc (1930), Gandhi-Irwin Pact (1931). Answer: (B) I, II, IV, III. Hook: '23-29-30-31' badhte saal.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H2-681", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Chronology of national movement (MCQ)", "question": "Arrange the following events in chronological order and choose the correct option. I. Formation of Khilafat Committee in Bombay II. Jallianwala Bagh Massacre III. Bardoli Satyagraha IV. Withdrawal of Non-Cooperation Movement", "answer": "(C) I, II, IV, III - here ordering by the standard answer key: Khilafat Committee, Jallianwala Bagh (1919), Withdrawal of NCM (1922), Bardoli Satyagraha (1928).", "explanation": "Is question ka official answer (C) I, II, IV, III maana gaya hai: Khilafat Committee -> Jallianwala Bagh (1919) -> NCM withdrawal (1922) -> Bardoli (1928). Hook: official key ke hisaab se I-II-IV-III.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H5-747", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Mercier and the power of reading (case study)", "question": "How did the immersive nature of reading influence Mercier — How does the passage reflect the immersive nature of reading of Mercier ?", "answer": "Mercier's reading was deeply immersive—like gulping fresh water—so absorbing that external distractions and even dim light didn't bother him as the text's eloquence carried him along.", "explanation": "Mercier itna kho jaata tha padhne mein jaise pyaasa thanda paani pee raha ho—na light ki parwah, na bahar ka shor. Hook: reading = total immersion, doob jaana kitaab mein.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "H5-748", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Mercier and the power of reading (case study)", "question": "Why did Mercier describe himself as a virtual writer ?", "answer": "Mercier called himself a virtual writer because he was so deeply engaged with the text that he felt intimately part of the writing process, absorbing new ideas as if creating them himself.", "explanation": "Mercier khud ko 'virtual writer' bolta tha kyunki padhte-padhte aisa lagta jaise wo khud likh raha ho, ideas ko apna bana leta. Hook: itna involved ki reader hi writer ban gaya.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "H5-749", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Mercier and the power of reading (case study)", "question": "How did reading influence Mercier's intellectual capacity and his engagement with new concepts ? Explain in any two points.", "answer": "Reading boosted Mercier's intellect: new ideas 'rushed into his brain' and his intelligence readily 'adopted them', showing strong receptiveness and willingness to integrate new perspectives (he even lost track of time).", "explanation": "Padhne se Mercier ka dimaag tej hua—naye ideas seedhe dimaag mein ghus jaate aur wo unhe apna leta, time ka bhi hosh nahi rehta. Hook: reading = brain ka upgrade.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "H5-750", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Colonial control / censorship of the press", "question": "What method did the colonial government employ to keep track of Indian newspapers ?", "answer": "The colonial government tracked Indian newspapers by passing laws (e.g. the Vernacular Press Act), constantly monitoring publications, imposing penalties, and censoring war-related reports.", "explanation": "Angrez sarkar Indian newspapers par nazar rakhne ke liye kanoon banati thi (jaise Vernacular Press Act), saza deti thi aur war wali khabrein censor karti thi. Hook: 'kanoon + censor + penalty' = sarkari nigraani.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "H5-751", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Colonial control / censorship of the press", "question": "How did the colonial government's laws affect the press ?", "answer": "Colonial laws hit the press hard—during WWI 18 of 22 newspapers shut down due to security demands (Defence of India Rules), provoking strong protests, loss of press liberty and imprisonment of journalists.", "explanation": "In kanoonon ne press ka dum ghont diya—World War I mein 22 mein se 18 newspapers band ho gaye, security maangi gayi, log jail gaye. Hook: number yaad rakho 18/22 band.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "H5-752", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Colonial control / censorship of the press", "question": "Analyse the impact of 'Sedition Committee' on Newspapers.", "answer": "The Sedition Committee tightened control: newspapers were warned for seditious reports, and if warnings were ignored, the press and printing machinery were liable to be seized and confiscated.", "explanation": "Sedition Committee ne press par shikanja kasa—pehle warning, na maano toh press aur machine dono zabt. Hook: 'warning phir zabti'—sarkar ka danda.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "H5-753", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Authors and their books", "question": "Which one of the following pairs is correctly matched ? List-I (Author) List-II (Book) (A) Jyotiba Phule Amar Jiban (B) Sudarshan Chakra Sachhi Kavitayen (C) Rash Sundari Debi Gulamgiri (D) Kashi Baba Chotte aur Bade Sawal", "answer": "Correctly matched: (B) Sudarshan Chakra – Sachhi Kavitayen and (D) Kashi Baba – Chhote aur Bade Sawal. (Phule wrote Gulamgiri, Rashsundari wrote Amar Jiban—so A and C are wrong.)", "explanation": "Yaha sahi jodi (B) Sudarshan Chakra–Sachhi Kavitayen aur (D) Kashi Baba–Chhote-Bade Sawal hai. Phir se yaad: Phule=Gulamgiri, Rashsundari=Amar Jiban. Galat options ko ulta-pulta kiya gaya hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ", "Match"], "score": 2}, {"key": "H5-754", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Authors and their books", "question": "Who among the following published 'Samvad Kaumudi' ?", "answer": "(C) Raja Ram Mohan Roy, who published the reformist Bengali newspaper Sambad Kaumudi.", "explanation": "Sambad Kaumudi nikali Raja Ram Mohan Roy ne—reform ke liye. Hook: Rammohan Roy = reformer = Sambad Kaumudi. Sati-virodh wale Roy yaad aate hi answer ready.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H5-755", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Newspapers and public welfare (Ranade/Deccan case)", "question": "Analyse the primary objective proposed by Ranade for publishing Marathi Language newspaper.", "answer": "Ranade wanted Marathi newspapers to give useful local information and allow free discussion on subjects of general utility, scientific investigation and the country's history/geography, especially for the Deccan.", "explanation": "Ranade chahte the Marathi newspaper local kaam ki jaankari de aur science-itihaas par khuli bahas ho, khaaskar Deccan ke liye. Hook: Ranade = Deccan ka 'gyaan + charcha' akhbaar.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "H5-756", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Newspapers and public welfare (Ranade/Deccan case)", "question": "Why did the Bombay Telegraph emphasize the role of newspaper in promoting welfare of Deccan region ?", "answer": "The Bombay Telegraph stressed that newspapers promote Deccan's welfare by providing valuable information, encouraging open discussion, and seeking support from those wishing to spread knowledge and improve people's well-being.", "explanation": "Bombay Telegraph kehta tha ki newspaper Deccan ka bhala karega—jaankari de kar, bahas karwa kar aur logon ki bhalai ke liye support juta kar. Hook: newspaper = Deccan ka hitkari dost.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "H5-757", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Newspapers and public welfare (Ranade/Deccan case)", "question": "What were the key responsibilities attributed to native newspapers ? Mention any two.", "answer": "Native newspapers were to critically examine government policy and suggest improvements, ensure speedy implementation, study specific issues in depth, and gather diverse information to advocate positive change.", "explanation": "Native newspapers ka kaam tha: sarkar ki policy ki jaanch, sudhaar ke sujhaav, aur muddon ki gehri padhai. Hook: akhbaar = watchdog jo sarkar ko sahi raah dikhaye.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "H5-759", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Vernacular Press Act", "question": "Why did the attitude of the British change towards the freedom of press after the Revolt of 1857 ? Explain.", "answer": "After the Revolt of 1857, vernacular newspapers became assertively nationalist, so the British grew hostile to press freedom and demanded a clampdown.", "explanation": "1857 ke baad vernacular akhbaar khulkar nationalist ho gaye, isliye angrez press ki azaadi se ghabra gaye. Hook: 1857 = gussa = press par lagaam.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "H5-762", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Hickey's Bengal Gazette", "question": "In which language was 'Bengal Gazette' edited by James Augustus Hickey published ?", "answer": "English. Hickey's Bengal Gazette (1780) was published in English.", "explanation": "Hickey wala Bengal Gazette English mein chhapta tha. Hook: Hickey = English Gazette, Gangadhar = Indian Gazette. Dono alag mat mila dena.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "H5-763", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Hickey's Bengal Gazette", "question": "Why was James Augustus Hickey persecuted ?", "answer": "Hickey was persecuted because he published gossip about the East India Company's senior officials, angering the colonial authorities.", "explanation": "Hickey ko isliye satait gaya kyunki usne Company ke bade officials ki gupshup/gossip chhaap di. Hook: badon ki chugli ki, toh saza mili.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "H5-764", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Hickey's Bengal Gazette", "question": "Which newspapers were encouraged during the 1780s ? Why were they encouraged ?", "answer": "Officially sanctioned (government-approved) newspapers were encouraged in the 1780s to counter information that damaged the colonial government's image.", "explanation": "1780s mein sarkar apne 'officially sanctioned' newspapers ko badhava deti thi taaki apni achhi image bana sake. Hook: sarkari akhbaar = sarkar ka PR.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "H5-765", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Women writers and print", "question": "In the beginning of the 19th century, _________ a girl married in a very orthodox household wrote an autobiography called 'Amar Jiban'.", "answer": "(B) Rashsundari Devi. She wrote Amar Jiban, the first full-length autobiography in Bengali.", "explanation": "Amar Jiban likhi Rashsundari Devi ne—ek orthodox ghar ki aurat, jisne chhup kar padhna seekha. Yeh Bengali ki pehli atmakatha thi. Hook: Rashsundari = Amar Jiban = pehli autobiography.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P1-809", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Importance of Power Sharing", "question": "Read the arguments given in the favour of power sharing and choose the correct option. I. Reduces the likelihood of bias. II. Barricades the decision-making process. III. Accommodates diversities. IV. Increases the participation of people in power.", "answer": "(C) Only I, III and IV are correct. Power sharing reduces bias, accommodates diversity and increases people's participation; it does NOT barricade (block) decision-making.", "explanation": "Power sharing ke favour mein teen baat sahi - bias kam karta hai, diversity ko jagah deta hai, logon ki bhaagidari badhata hai. Statement II 'barricades decision-making' (faisla rok deta hai) galat hai. Tip: 'barricade/block' jaisa negative word aaye toh wo galat hota hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P1-810", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Importance of Power Sharing", "question": "Statement I : Division of power is good for democratic systems. Statement II : It helps to reduce the possibility of conflict between social groups.", "answer": "(C) Both statements I and II are true and II is the correct explanation of I.", "explanation": "Dono statement sahi hain aur II asal mein I ka reason hai - power baatne se hi toh groups ka jhagda kam hota hai, isliye ye democracy ke liye achha hai. Yaad rakho: yahan II 'kyun' ka jawab de raha hai I ka, isliye II correct explanation hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason", "MCQ"], "score": 2}, {"key": "P1-812", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Why Power Sharing is Desirable", "question": "Explain the prudential reasons of Power sharing.", "answer": "Prudential reasons: power sharing reduces conflict between social groups and ensures the stability of the political order by preventing violence and instability.", "explanation": "'Prudential' matlab samajhdari/faayde wale kaaran. Ye sirf practical benefit dekhte hain - ladai-jhagda kam aur sarkar stable. (Iske saamne 'moral' reasons hote hain jo democracy ki aatma ki baat karte hain.) Yaad rakho: Prudential = 'profit/peace', Moral = 'principle'.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "P1-815", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Horizontal vs Vertical Power Sharing", "question": "How is horizontal power sharing different from vertical ? Explain.", "answer": "Horizontal sharing distributes power among organs at the SAME level (legislature, executive, judiciary) with checks and balances; vertical sharing distributes power among DIFFERENT levels of government (central, state, local) with constitutionally defined independent powers.", "explanation": "Simple difference: Horizontal = same level (L-E-J aaspaas), Vertical = alag-alag level (Centre upar, State beech, Local neeche). Horizontal mein 'checks and balances', vertical mein 'upar-neeche ki sarkaarein'. Hook: Horizontal = handshake (barabar), Vertical = ladder (seedhi).", "years": ["2024"], "papers": 1, "raw": 2, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "P1-817", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Horizontal Power Sharing", "question": "What role do 'checks and balances' play in a democratic country ? Choose the most suitable option from the following.", "answer": "(b) To create a separation of powers to prevent from authoritarianism.", "explanation": "Checks and balances ka matlab - har organ doosre pe control rakhe taaki koi tanashah (authoritarian) na ban jaaye. Power alag-alag baant do. Hook: 'check' = nazar rakhna, 'balance' = barabari, dono milke dictatorship rokte hain.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P1-820", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Power Sharing among Social Groups", "question": "Why is power shared among different social groups ? Explain.", "answer": "Power is shared among social groups to give diverse communities a voice, prevent alienation, ensure fair representation for minorities and weaker sections (e.g. reserved constituencies), and reduce social conflict.", "explanation": "Alag-alag samajik group (dharm, bhasha, kamzor varg) ko power dene se sabko awaaz milti hai aur koi alag-thalag mehsoos nahi karta. Minorities ko reserved seats milti hain. Hook: 'sabka saath' - tabhi koi naraz nahi hota aur jhagda kam.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "P1-835", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - Power Sharing Model", "question": "Read the following statements about power sharing arrangement in Belgium and choose the correct option. I. Brussels has a separate govt. with equal representation. II. Dutch & French speaking ministers are equal in Central Govt. III. Community Govt. is elected by People belonging to one language. IV. Series of majoritarian measures adopted in Belgium. Options : (A) I, II and IV (B) I, III and IV (C) II, III and IV (D) I, II and III", "answer": "(D) I, II and III. Brussels has a separate equal-representation govt, Dutch and French ministers are equal at the centre, and the community government is elected language-wise; Belgium did NOT adopt majoritarian measures.", "explanation": "Phir wahi trick - statement IV 'majoritarian measures in Belgium' galat hai (wo toh Sri Lanka ne kiya). Baaki I, II, III sahi. Hook: Belgium ke saath 'majoritarian' word kabhi match mat karo.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P1-836", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - Power Sharing Model", "question": "Which of the following was the primary objective of Belgium to form the separate government in Brussels ?", "answer": "(d) Ensuring linguistic accommodation.", "explanation": "Brussels mein alag sarkar isliye banayi taaki dono bhasha (Dutch-French) ko adjust kiya ja sake - yani linguistic accommodation. Hook: Brussels mein French zyada the par Dutch ko bhi barabari di, isliye 'bhasha ka balance'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P1-837", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - Power Sharing Model", "question": "Identify the primary objective of power sharing arrangements in Belgium from the following options.", "answer": "(D) Accommodating linguistic and regional interests.", "explanation": "Belgium ke power sharing ka main maqsad = bhasha aur kshetra (linguistic + regional) ke jhagde ko adjust karna. Hook: Belgium ki poori kahani 'language fight ka solution' hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P1-850", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Sri Lanka - Ethnic Composition", "question": "Describe the ethnic composition of Sri Lanka.", "answer": "Sri Lanka has 74% Sinhala-speakers and 18% Tamil-speakers. Tamils are of two kinds — Sri Lankan Tamils (13%) and Indian Tamils (descendants of plantation workers). Most Sinhalas are Buddhist, while Tamils are Hindu/Muslim and about 7% are Christian.", "explanation": "Sri Lanka ka ethnic mix: 74% Sinhala, 18% Tamil (jisme Sri Lankan Tamil aur Indian Tamil dono), 7% Christian. Sinhala zyadatar Buddhist, Tamil zyadatar Hindu/Muslim. Hook: '74-18' - majority Sinhala, minority Tamil, yahi tension ki jad.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "P1-858", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Power Sharing among Social Groups", "question": "In which one of the following institutions in India was a system of reservation for women made by amending the Constitution in 1992 ?", "answer": "(D) Panchayat. The 1992 constitutional amendment reserved seats for women in local self-government bodies (Panchayats and Municipalities).", "explanation": "1992 ke constitutional amendment se mahilaon ke liye reservation aaya - Panchayat (local self-government) mein. Hook: '1992 + Panchayat + women reservation' - grassroots pe mahilaon ko power mili.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P2-869", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "Match the Column I with Column II and choose the correct option : Column I (List) I. Union list subjects II. State list subjects III. Concurrent subjects IV. Residuary subjects Column II (Jurisdiction Sphere) A. State Governments alone make laws on it. B. For uniformity Central Government Legislates on it. C. Subjects under Jurisdiction of Centre and State Governments. D. Central Government legislates on new subjects.", "answer": "(d) I-B (Union: Centre legislates for uniformity), II-A (State: State alone), III-C (Concurrent: Centre & State), IV-D (Residuary: Centre on new subjects).", "explanation": "Yeh definition-wala match hai. Union = Centre uniformity ke liye banaye (B), State = sirf state banaye (A), Concurrent = dono ka kaam (C), Residuary = naye subjects pe Centre (D). Logic clear ho to option apne aap mil jaata hai, ratte ki zaroorat nahi.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 2}, {"key": "P2-870", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "Match Column-I with Column-II and choose the correct option from the following : Column-I (Subject List in the Indian Constitution) I. Union List II. State List III. Concurrent List IV. Residuary List Column-II (Subject) a. Trade Union b. Banking c. Police d. Internet", "answer": "(B) I-b (Union-Banking), II-c (State-Police), III-a (Concurrent-Trade Union), IV-d (Residuary-Internet).", "explanation": "Banking=Union, Police=State, Trade Union=Concurrent (labour dono ka subject), Internet=Residuary (naya tech subject). Internet aur computer hamesha Residuary me jaate hain kyunki ye nayi cheezein hain – yahi memory hook kaafi hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 2}, {"key": "P2-878", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "Which one of the following pairs is correctly matched ? (Subject List in the Indian Constitution) (Subject) (A) Union List Subjects – Communication (B) State List Subjects – Education (C) Concurrent List Subjects – Adoption (D) Residuary Subjects – Marriages", "answer": "(A) Union List - Communication, and (C) Concurrent List - Adoption (both accepted as correct).", "explanation": "Communication poore desh ka maamla = Union List (A sahi). Adoption family ka subject = Concurrent (C sahi). Education actually Concurrent hai (State nahi), aur Marriage Concurrent hai (Residuary nahi) – isliye B aur D galat. Do sahi jode the is question me.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ", "Match"], "score": 2}, {"key": "P2-879", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Indian federalism / role of judiciary", "question": "Which of the following is responsible for resolving disputes between Centre and States ?", "answer": "(B) Supreme Court of India. The judiciary (Supreme Court) acts as the umpire in Centre-State disputes.", "explanation": "Jab Centre aur State ke beech jhagda ho, to faisla Supreme Court karta hai – woh referee/umpire ki tarah constitution dekhke decide karta hai kiski power kahaan tak hai. Hook: court = judge = jhagde ka faisla.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P2-880", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "‘Education’ falls under which one of the following lists given in the Indian Constitution ?", "answer": "(C) Concurrent List. Education is a Concurrent List subject (both Centre and States can legislate).", "explanation": "Education Concurrent List me aata hai – matlab Centre aur State dono ispe kanoon bana sakte hain, kyunki padhai sabke liye important hai. Hook: Education = sabke kaam ki cheez = dono milke (Concurrent).", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P2-882", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "Choose the most appropriate option regarding the division of legislative rights in India. Subject list in Indian Constitution - Subjects (A) Union List – Defence and Commerce (B) State List – Police and Agriculture (C) Concurrent List – Forest and Communication (D) Residuary Subjects – Computer Software and Trade", "answer": "(B) State List – Police and Agriculture. Both Police and Agriculture are correctly State List subjects.", "explanation": "Police aur Agriculture dono hi State List me sahi baithte hain (B sahi). Baaki options me galti hai – Communication Union ka hai, Trade State ka, etc. Hook: 'apne ghar ki police aur apne khet' = State ke kaam = State List.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P2-883", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Linguistic diversity / Eighth Schedule", "question": "Which one of the following is a scheduled language as per the Constitution of India ?", "answer": "(C) Nepali. Nepali is one of the 22 languages in the Eighth Schedule.", "explanation": "Nepali Eighth Schedule ki 22 official languages me se ek hai. Yaad rakho Eighth Schedule me 22 bhashayein hain jaise Hindi, Bengali, Tamil, Nepali, Odia waghera. Non-scheduled wale (Garhwali, Rajasthani jaise) is list me nahi aate. Hook: '22 ki list = Eighth Schedule'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P2-884", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Linguistic diversity / Eighth Schedule", "question": "Which
