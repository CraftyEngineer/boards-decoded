ation": "Social groups mein power baatne se democracy strong hoti hai - barabari aati hai, diversity adjust hoti hai, majority ka dabdaba rukta hai, aur minorities ko reserved seats milti hain. Hook: 'sab groups ka hissa = sab ka bharosa'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "P1-862", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Horizontal Power Sharing", "question": "Evaluate the system of 'Checks and Balances' in the horizontal distribution of power in India.", "answer": "In horizontal power sharing (legislature, executive, judiciary), no single organ has unlimited power; each checks the others, creating balance — e.g. the judiciary can review actions of the executive and laws made by the legislature, keeping all organs accountable.", "explanation": "India mein 'checks and balances' ka kaam - teeno organ (L-E-J) ek-doosre pe nazar rakhte hain, koi akela boss nahi banta. Jaise judiciary, executive ke kaam aur legislature ke kanoon dono ko check kar sakti hai. Hook: 'teen umpire, sab ek-doosre ko out kar sakte' = balanced power.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "P2-875", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Types of federations (coming together vs holding together)", "question": "Which of the following countries is an example of sharing of power between the national and state governments to account for internal diversity ?", "answer": "(C) Belgium. Belgium shares power to accommodate its internal linguistic/regional diversity (a 'holding together' federation).", "explanation": "Belgium me alag-alag bhasha bolne wale log the (Dutch, French, German), isliye unhone power share karke internal diversity ko sambhala – ye 'holding together' federation ka example hai. India bhi isi tarah apni diversity ke liye power baant ta hai. Belgium = diversity wala model.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P2-876", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Federal vs unitary government", "question": "Choose the correctly matched pair from the following : (Country) (System) (A) Canada Unitary (B) Bolivia Federal (C) Australia Unitary (D) Spain Federal", "answer": "(D) Spain - Federal. Spain has a federal-type system; Canada and Australia are federal (not unitary).", "explanation": "Yahaan sahi jodi sirf Spain-Federal thi. Canada aur Australia bhi actually federal hain (option me galat 'Unitary' likha tha), isliye woh galat ho gaye. Yaad rakho bade-bade diverse desh aksar Federal hote hain, ek hi system me sab nahi chalta.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ", "Match"], "score": 3}, {"key": "P2-881", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "Choose the correctly matched pair from the following : (A) Concurrent List Education (B) Concurrent List Defence (C) Concurrent List Police (D) Concurrent List Trade", "answer": "(A) Concurrent List – Education. Education is the only correct Concurrent List subject here (Defence=Union, Police=State, Trade=State/Union).", "explanation": "Sirf Education hi sahi Concurrent subject hai yahaan. Defence to Union ka, Police State ka, Trade bhi alag list ka. Education hi woh subject hai jo Concurrent me pakka aata hai – isliye ise hamesha pehchaan lo. Education = Concurrent ka favourite example.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ", "Match"], "score": 3}, {"key": "P2-885", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Linguistic diversity / Eighth Schedule", "question": "Which one of the following languages is included in the Eighth Schedule of the Indian Constitution ?", "answer": "(D) Tamil. Tamil is one of the 22 Scheduled languages in the Eighth Schedule.", "explanation": "Tamil Eighth Schedule ki 22 bhashaon me se ek hai (Tamil Nadu ki bhasha). Yaad rakho jis bhasha ka apna state hai woh aksar scheduled hoti hai. 22 ki magic list me Tamil, Telugu, Malayalam, Kannada – South ki badi bhashayein sab aati hain.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P2-886", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "Choose the correct option related to concurrent list of the Indian Constitution.", "answer": "(D) Education, Forest and Marriage. All three are Concurrent List subjects.", "explanation": "Education, Forest aur Marriage – teeno Concurrent List me aate hain, matlab Centre aur State dono inpe kanoon bana sakte hain. Hook: padhai, jungle aur shaadi – ye teeno aise hain jinme dono governments ko interest hota hai, isliye Concurrent.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P2-887", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "Choose the correct option related to Union list.", "answer": "(D) Currency, Communication, Defense. All three are Union List subjects handled by the Centre.", "explanation": "Currency (paisa), Communication aur Defence – teeno poore desh ke liye ek jaise hone chahiye, isliye sirf Centre inko sambhalta hai = Union List. Hook: jo cheez puri country me same honi chahiye (note, army, post) woh Union List me.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P2-889", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Indian federalism / division of power", "question": "How does the Indian federal structure promote balance governance across the nation ? Choose the most suitable option from the following :", "answer": "(b) By ensuring a division of power between centre and states.", "explanation": "Federal structure power ko Centre aur States ke beech baant deta hai, taaki koi ek akele sab control na kare aur har level apna kaam dekhe – isse governance balanced rehti hai. Hook: power baant do = balance ban jaata hai, ek hi haath me sab nahi.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P2-908", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government", "question": "In the context of separation of powers, the given example defines which type of government?", "answer": "Local Self Government. (The example describes the third tier—local self-government.)", "explanation": "Diye gaye example me jab power sabse neeche wale level pe baant ti hai, to woh Local Self Government ko define karta hai – yani Panchayat/Municipality wala teesra tier. Hook: 'sabse neeche ka level = Local Self Government'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "P2-909", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government", "question": "Describe the structure of the system in India which is almost similar to the above example of Brazil.", "answer": "India has a similar Local Self-Government system—Panchayati Raj (rural) and Municipalities/Municipal Corporations (urban)—all elected by the people, with the Gram Sabha enabling direct participation.", "explanation": "Brazil ki tarah India me bhi Local Self-Government hai – gaon me Panchayati Raj, sheher me Municipality/Corporation, sab logon ke chune hue. Gram Sabha me to log seedhe shaamil hote hain. Hook: 'Brazil ka local model = India ka Panchayat + Municipality'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "P2-910", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Decentralisation / three-tier government", "question": "At how many levels has decentralisation of power been done in the Indian Constitution ?", "answer": "At three levels: Central (Union), State, and Local Government (both rural and urban).", "explanation": "Power teen levels pe baanti gayi hai – Central (Centre), State, aur Local (gaon + sheher). Isi ko three-tier system kehte hain. Hook: 'teen-tier = Centre, State, Local – ginti yaad rakho: 3'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "P2-911", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government", "question": "Explain the role of local self-government in solving problems.", "answer": "Local self-government solves problems effectively because local people have better knowledge of local issues and the most efficient ways to manage local resources.", "explanation": "Local self-government problems isliye achhe se solve karti hai kyunki wahin ke log apni dikkat aur resources ko sabse achha jaante hain – paani, safai, sadak jaisi cheezein local level pe jaldi sulajh jaati hain. Hook: 'apni problem apne log = jaldi solution'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "P2-912", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government", "question": "How does local self-government strengthen the basic principle of democracy? Justify the statement.", "answer": "It strengthens democracy by ensuring representation of diverse groups and allowing direct public participation in decision-making, thereby deepening democracy through broad grassroots involvement.", "explanation": "Local self-government me har tarah ke logon ko representation milti hai aur aam janta seedhe decisions me hissa leti hai – isse democracy aur gehri ho jaati hai. Yeh hi to asli loktantra hai jahaan janata khud chalati hai. Hook: 'sabki bhागidari = strong democracy'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "P2-913", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government / structure", "question": "Explain the relationship between gram panchayats and panchayat samitis.", "answer": "Several Gram Panchayats are grouped together to form a Panchayat Samiti, which acts as a link between the Gram Panchayats and the Zila Parishad.", "explanation": "Kai Gram Panchayats milke ek Panchayat Samiti banti hai, aur ye Samiti neeche Gram Panchayat aur upar Zila Parishad ke beech ka pul (link) hoti hai. Hook: 'Gram Panchayat -> Panchayat Samiti -> Zila Parishad' – neeche se upar ki seedhi.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "P2-914", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government / structure", "question": "How is the structure of municipal corporation different from municipality?", "answer": "A Municipal Corporation administers a large city, while a Municipality administers a smaller town—both being urban local self-government bodies.", "explanation": "Dono sheher ke local government hain, par bade sheher (city) me Municipal Corporation hoti hai aur chote sheher (town) me Municipality. Corporation ka head Mayor hota hai. Hook: 'badi city = Corporation, chota town = Municipality'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "P2-915", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government", "question": "How does the local government structure promote democracy ? Examine.", "answer": "It promotes democracy by enabling grassroots participation, deepening democratic roots, increasing women's involvement, and enhancing people's role in decision-making.", "explanation": "Local government democracy ko gaon-mohalle tak le jaati hai – log seedhe shaamil hote hain, mahilaon ki bhागidari badhti hai, aur faisle me sabki aawaz aati hai. Hook: 'democracy ki jadein gaon tak = local government'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "P2-916", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Linguistic states / federalism", "question": "What promise did Gandhiji make to his followers ?", "answer": "Gandhiji promised that the new nation (free India) would have provinces reorganised on the principle of language.", "explanation": "Gandhiji ne wada kiya tha ki aazaad India me states/provinces bhasha ke aadhaar par banaye jaayenge – yani jo log ek bhasha bolte hain unka apna state ho. Baad me yahi hua (linguistic states). Hook: 'Gandhi ka wada = bhasha ke hisaab se naye states'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "P2-917", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Linguistic states / federalism", "question": "How did language strengthen the unity of India?", "answer": "Creating linguistic states strengthened national unity, made administration easier, and showed that regional identities (e.g., being a Kannadiga) are fully consistent with being Indian.", "explanation": "Logon ko jab apni bhasha wala state mila to woh khush hue aur desh aur judne laga – administration bhi aasaan ho gayi. Yeh sabit hua ki Kannadiga/Tamil hona aur Indian hona dono saath chal sakte hain. Hook: 'apni bhasha ka state mila = desh aur jud gaya'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "P2-918", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Linguistic states / federalism", "question": "Mention the names of major language of Kerala and Andhra Pradesh states.", "answer": "Kerala – Malayalam; Andhra Pradesh – Telugu.", "explanation": "Kerala ki main bhasha Malayalam hai aur Andhra Pradesh ki Telugu. Hook: 'Kerala = Malayalam (M se M), Andhra = Telugu'. South ke states linguistic basis par bane the, isliye har state ki apni bhasha.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "P2-919", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Linguistic states / federalism", "question": "Read the following statements regarding the creation of States on the basis of language in India and choose the correct options : I. Formation of states on the basis of language made the country more united and stronger. II. Formation of states on the basis of language made administration easier. III. Formation of states on the basis of language has weakened the federal structure. IV. Formation of states on the basis of language led to the development of Indian languages.", "answer": "(C) Only I, II and IV are correct. Linguistic states united and strengthened the country, eased administration and developed Indian languages; they did NOT weaken the federal structure (so III is wrong).", "explanation": "Bhasha ke aadhaar par states banane se desh aur juda (I), administration aasaan hui (II), aur bhashayein develop hui (IV) – ye teeno sahi. III galat hai kyunki isse federal structure kamzor nahi balki majboot hua. Hook: 'linguistic states ne joda, toda nahi'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P2-923", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Decentralisation / 1992 amendments", "question": "In which year the Constitution amendment providing for 33% representation of women in the local self governance system in India was made? Choose the correct option :", "answer": "(c) 1992. The 73rd and 74th Constitutional Amendments of 1992 provided 33% reservation for women in local bodies.", "explanation": "1992 me hi 73rd-74th amendment aaye jisne local bodies me auraton ke liye 33% (1/3) seats reserve ki. Hook: '1992 = local government ka magic year = 33% mahila reservation'. Decentralisation ke saare bade kaam isi saal hue.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P2-925", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Federal vs unitary government", "question": "Differentiate between federal and unitary form of government with examples.", "answer": "Federal: two or more levels of government with power decentralised and balanced (e.g., Belgium, USA). Unitary: only one level of government with all power centralised, sub-units subordinate (e.g., Sri Lanka).", "explanation": "Federal = do ya zyada level (Centre + State), power baanti hui aur balanced – example Belgium, USA. Unitary = sirf ek level, sari power Centre ke paas, baaki uske neeche – example Sri Lanka. Hook: 'Federal = USA/Belgium (power baanto), Unitary = Sri Lanka (ek haath me)'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "P2-933", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "How does the Indian Constitution ensure the division of powers between the Union and State Governments ? Explain.", "answer": "Through a three-fold distribution of legislative powers—Union List, State List and Concurrent List—with residuary powers to the Union, while the independent judiciary oversees implementation of these provisions.", "explanation": "Constitution power ko teen lists me baant ta hai – Union (Centre), State, aur Concurrent (dono) – aur jo bacha woh Residuary (Centre). Judiciary dhyaan rakhti hai ki sab apni-apni limit me rahein. Hook: 'teen lists = power baant ne ka formula'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "P2-936", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Decentralisation / three-tier government", "question": "Describe any two provisions made in the Constitution to establish the three-tier system of government in India.", "answer": "Two provisions: (1) the 73rd Amendment set up a three-tier Panchayati Raj (Gram Panchayat, Panchayat Samiti, Zila Parishad) in rural areas; (2) the 74th Amendment set up urban local bodies (Municipalities and Municipal Corporations), with mandatory regular elections and reserved seats.", "explanation": "Teen-tier system ke liye do main provisions: (1) 73rd amendment ne gaon me teen-tier Panchayati Raj banaya, (2) 74th amendment ne sheher me Municipality/Corporation banaya – dono me regular elections aur reservation zaroori. (Note: is paper ki official answer galti se secularism par chhap gayi thi, par sahi answer yahi hai.) Hook: '73 = gaon, 74 = sheher'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "P3-963", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Caste in Politics", "question": "Explain the role of anti-caste movements.", "answer": "Anti-caste movements (led by reformers like Jotiba Phule, Gandhiji, Ambedkar, Periyar) fought against the caste hierarchy and untouchability, demanded equality and dignity for lower castes, and helped weaken caste-based discrimination in society and politics.", "explanation": "Anti-caste movements - jaise Jotiba Phule, Ambedkar, Periyar, Gandhiji ne chalaye - ne jaati-bhedbhaav aur chhua-chhoot ke khilaaf ladai ladi aur dabe-kuchle logon ke liye barabari maangi. Inhi ki wajah se caste system kamzor pada. Memory hook: 'samaaj sudhaarak' jिnhone jaati ki deewar todne ki koshish ki.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "P3-964", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Caste in Politics", "question": "Explain any two ways in which caste inequalities are still continuing in India.", "answer": "Caste inequalities persist: lower castes still face discrimination and limited access to resources; inter-caste marriage is rare and caste largely decides marriage; many poor and landless labourers belong to 'lower' castes while the wealthy are often 'upper' caste. (Note: the official_answer printed for this id is about globalisation and is wrong.)", "explanation": "Aaj bhi jaati ki asamanta khatam nahi hui - neechi jaati ke logon ke saath bhedbhaav hota hai, antar-jaati shaadi ab bhi kam hai, aur gareeb-bhoomihheen majdoor zyadातar 'lower caste' se aur ameer 'upper caste' se hote hain. Memory hook: caste ab kamzor hui par mari nahi. (Dhyaan do: is question ka chhapa hua answer galti se globalisation ka hai.)", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "P3-965", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Language Policy", "question": "Which one of the following languages is included in the Eighth Schedule of the Indian Constitution ?", "answer": "(D) Tamil - Tamil is one of the 22 languages included in the Eighth Schedule of the Indian Constitution.", "explanation": "Eighth Schedule mein 22 bhashayein listed hain jinhe official maanyata mili hai - Tamil unme se ek hai. Memory hook: 8th Schedule = 'scheduled languages' ka register. Yeh topic asal mein 'Diversity & Language Policy' (Federalism/Power Sharing) se zyada judta hai, par gender-religion-caste paper mein diversity ke context mein aaya hai.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P3-966", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Women's Reservation - 1992", "question": "In which one of the following organs of India are women taking advantage of reservation ?", "answer": "(A) Municipality (local self-government). Women enjoy one-third reservation in municipalities and panchayats under the 1992 (73rd/74th) amendments.", "explanation": "Aurtein local self-government - Municipality aur Panchayat - mein reservation ka faayda utha rahi hain (1992 ka amendment). Toh organ = Municipality. Memory hook: reservation pakka hai sirf 'local body' mein (panchayat/municipality), abhi tak Lok Sabha/Vidhan Sabha mein poori tarah lागu hona baaki hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P3-968", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Gender Equality - Concept", "question": "Which of the following statements represent gender equality ?", "answer": "(D) Providing voting rights equally to men and women - this represents gender equality.", "explanation": "Gender equality ka matlab - mardon aur aurton ko barabar haq, jaise dono ko barabar voting right dena. Memory hook: barabar vote = barabar awaaz = gender equality. India mein shuruaat se hi aurton ko bhi vote ka haq mila, jo barabari ki misaal hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P3-969", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Feminist Movement", "question": "How did the feminist movements help to enhance the role of women in public life? Explain.", "answer": "Feminist movements advocated equal rights and opportunities, raised women's legal status, won equal pay and voting rights, improved educational and career opportunities, and encouraged women's participation in politics and public life.", "explanation": "Feminist movements ne barabar haq aur mauke maange - inhi ki wajah se aurton ko vote ka haq, equal pay, behtar shiksha aur naukri ke mauke mile, aur ve public life mein aage aayi. Memory hook: movement = 'awaaz uthi toh haq mile'. Bina andolan ke yeh badlaav nahi aate.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "P3-970", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Discrimination Against Women", "question": "Suggest any two measures to prevent violence against women.", "answer": "Increase women's literacy and legal awareness; strengthen and strictly enforce laws against domestic and workplace violence; ensure speedy justice and safe public spaces; and increase women's political and economic empowerment.", "explanation": "Aurton ke khilaaf hinsa rokne ke liye - unhe padhao aur kanooni jaankari do, domestic/workplace hinsa ke khilaaf kanoon mazboot karo aur sakhti se lागu karo, aur jaldi insaaf dilao. Memory hook: 'jaagrukta + sakht kanoon' se hi hinsa par lagaam. Sashakt aurat surakshit aurat.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "P3-971", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Secularism in India", "question": "Suggest any two measures to promote secularism as mentioned in the Indian Constitution.", "answer": "Ensure the state has no official religion and stays neutral; guarantee freedom to profess, practise and propagate any religion (or none); prohibit and act against religious discrimination; and promote equal respect for all religions (sarva-dharma-sambhava).", "explanation": "Secularism badhane ke liye - sarkar kisi ek dharm ko apna na banaye, sabko apna dharm maanne ki azadi de, dharm ke naam par bhedbhaav par sakhti kare, aur sab dharmon ko barabar izzat de. Memory hook: 'no official religion + freedom + no discrimination' = secularism ka teen-sutra. Yeh question 2867/2113 wale secular provisions se halka alag (measures/promote) hai par usi theme par.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "P4-978", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Components of a political party", "question": "Which of the following are the main components of a political party ? Choose the correct option : I. Leaders II. Active members III. Followers IV. Pressure groups", "answer": "(A) Only I, II and III are correct - the three components of a political party are Leaders, Active members and Followers. (Pressure groups are NOT a component.)", "explanation": "Yaad rakho 'LAF' - Leaders, Active members, Followers. Yehi teen ek party ke main parts hain. Pressure groups alag cheez hote hain (jaise trade unions), wo party ka hissa nahi - isliye option mein IV galat hai. Exam mein trick yahi hoti hai ki pressure group ko ghusa dete hain, tum mat phasna!", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P4-981", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Reforms to political parties", "question": "Why is it difficult to reform political parties ? Explain by giving two arguments.", "answer": "It is difficult because: (1) parties themselves make the laws, so they are reluctant to pass laws that curb their own power/wrong-doings; and (2) it is hard to make a law banning something undesirable, as parties may misuse or evade it. Reform finally depends on political will and public pressure.", "explanation": "Soch bhai - jo log khud kanoon banate hain, wahi apne khilaaf sakht kanoon kyun banayenge? Yahi badi dikkat hai. Doosra, har problem ka legal solution nahi hota, kanoon ke bawajood log raasta nikaal lete hain. Isliye asli reform tabhi aata hai jab janta (public pressure) aur media dabav daalein. Yaad rakho: 'parties khud judge, khud mujrim'.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "P4-984", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Reforms to political parties", "question": "To reform the party system, which of the following tasks have been made compulsory for the political parties ? Choose the most appropriate option. I. It is now compulsory for all the political parties to file income tax returns. II. It is now compulsory for all parties to have one-third women candidates. III. It is now compulsory for all the political parties to hold their organisational election. IV. It is now compulsory for all candidates to disclose information about pending criminal cases against them through affidavit.", "answer": "(C) Only I, III and IV are correct - filing income-tax returns, holding organisational elections, and disclosing pending criminal cases by affidavit are compulsory. The one-third women candidates rule (II) is only a suggestion, not yet compulsory.", "explanation": "Yaad rakho jo abhi tak ZAROORI hai: income tax return (I), organisational election (III), aur criminal cases ka affidavit (IV). Mahila candidates 1/3 wala (II) abhi sirf suggestion hai, kanoon nahi bana - isliye wo galat hai. Trap yahi hai ki II ko sahi dikhane ki koshish karte hain. Toh answer = I, III, IV.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P4-986", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Reforms to political parties", "question": "Assertion (A) : Every party in India has to register with the Election Commission. Reason (R) : The Government provides election symbols to all political parties in India.", "answer": "(C) (A) is true, but (R) is false. Parties must register with the Election Commission, but it is the Election Commission (not the Government) that allots election symbols.", "explanation": "Assertion sahi hai - haan, sab parties ko EC ke paas register karna padta hai. Lekin Reason galat hai kyunki symbol 'Government' nahi, balki Election Commission deta hai. Ye chhoti si trick hai - Government vs Election Commission ka farak. Isliye answer (C): A true, R false.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "P4-992", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Functions of political parties", "question": "Which of the following statements are correct related to the role of political parties in India ? I. Play a decisive role in making laws for the country. II. Making different interest groups in the country. III. Play a role for shaping public opinion in the country. IV. Pulling forward different policies and programmes before voters.", "answer": "(B) Only I, III and IV are correct - parties make laws, shape public opinion, and put forward policies/programmes. 'Making interest groups' (II) is not a function of political parties.", "explanation": "Sahi roles: laws banana (I), public opinion shaping (III), aur policies-programmes janta ke saamne rakhna (IV). 'Interest groups banana' (II) party ka kaam nahi - interest/pressure groups to alag se khud bante hain. Toh answer I, III, IV (option B). Pattern dekho - har baar ek galat statement ghusta hai jise pakadna hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P4-994", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Party systems (multi-party)", "question": "Why did India adopt the multiparty system ? Explain with suitable arguments.", "answer": "India adopted a multi-party system because it is best able to accommodate the country's vast social and geographical diversity. No single party can represent all regions, languages, religions and communities, so a multi-party system gives diverse groups a fair chance at political representation.", "explanation": "India itna vishaal aur vividh hai - alag bhasha, dharm, region - to ek ya do parties sabko represent nahi kar sakti! Isliye humne multi-party system chuna jisme har group ko apni awaaz uthane ka mauka mile. Memory hook: 'vividhta itni zyada = parties bhi zyada chahiye'. Yahi Assertion-Reason mein bhi aata hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "P4-1006", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Regional parties", "question": "Which one of the following pairs is correctly matched ? List-I (Regional Parties) (a) Rashtriya Janta Dal (b) Janta Dal (Secular) (c) Rashtriya Lok Dal (d) Biju Janta Dal List-II (Regions) Uttar Pradesh Bihar Assam Odisha", "answer": "(d) Biju Janata Dal - Odisha is the correctly matched pair. (RJD belongs to Bihar, JD(S) to Karnataka, RLD to Uttar Pradesh.)", "explanation": "Sahi jodi: Biju Janata Dal - Odisha. Baaki yaad rakho - RJD = Bihar, JD(Secular) = Karnataka, RLD = Uttar Pradesh. In party-state jodiyon ko ratt lo, har saal alag-alag combination mein poochte hain. Trick: party ke naam mein chhipa hint dhoondo (Biju Patnaik = Odisha).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ", "Match"], "score": 3}, {"key": "P4-1007", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Regional parties", "question": "Choose the correctly matched pair from the following : Political Party State (A) Janata Dal (Secular) Bihar (B) Maharashtrawadi Gomantak Party Goa (C) Dravida Munnetra Kazhagam Andhra Pradesh (D) All India Forward Bloc Punjab", "answer": "(B) Maharashtrawadi Gomantak Party - Goa is correctly matched. (JD(S) is Karnataka, DMK is Tamil Nadu, AIFB is West Bengal.)", "explanation": "Sahi jodi: Maharashtrawadi Gomantak Party - Goa. Baaki galat hain: JD(S) Karnataka ka hai (Bihar nahi), DMK Tamil Nadu ka (Andhra nahi), Forward Bloc West Bengal ka (Punjab nahi). 'Gomantak' shabd hi Goa ka purana naam hai - yahi hint hai! Party naam ke clue pakdo.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P4-1008", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Regional parties", "question": "Choose the correct option related to the regional political parties of India : Party Name Election Symbol State (A) Rashtriya Lok Dal Mashal Uttar Pradesh (B) Telugu Desam Cycle Andhra Pradesh (C) Telangana Rashtra Samiti Kite Telangana (D) Shiromani Akali Dal Chashma Punjab", "answer": "(B) Telugu Desam - Cycle - Andhra Pradesh is the correctly matched option.", "explanation": "Sahi triple-match: Telugu Desam Party (TDP) - Cycle symbol - Andhra Pradesh. Yahaan party + symbol + state teeno match karna hai, thoda tricky! TDP = cycle = Andhra yaad kar lo. Baaki options mein symbol ya state galat hai. Practice se ye visual jodiyaan dimaag mein baith jaati hain.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ", "Match"], "score": 3}, {"key": "P4-1011", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Representative democracy", "question": "Explain the meaning of 'representative democracy'.", "answer": "Representative democracy is a system in which citizens do not govern directly but elect their leaders/representatives, who then take decisions and run the government on the people's behalf. It is also called indirect democracy.", "explanation": "Representative democracy = log khud sarkar nahi chalate, balki apne neta (representatives) chunte hain jo unki taraf se faisle lete hain. Isko 'indirect democracy' bhi kehte hain. Socho - tum khud Parliament mein nahi baithte, tumhara chuna hua MP baithta hai. Yahi se parties ki zaroorat aati hai!", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "P5-1035", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Assessing outcomes of democracy", "question": "In a democratic country the government adopts environment friendly policies with the help of citizens and experts. Which one of the following is a positive outcome of this process ?", "answer": "(b) Citizens feel empowered to determine policies. When government works with citizens and experts, people feel they have a real say in shaping policy – a positive democratic outcome.", "explanation": "Jab sarkaar janta aur experts ke saath milke policy banati hai, to logon ko lagta hai 'humari bhi sunwai hai, hum bhi decide kar sakte hain' - yahi empowerment democracy ka positive outcome hai. Hook: 'participation = empowerment'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P5-1036", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Role of opposition", "question": "Explain the role of opposition in democracy.", "answer": "The opposition (losing parties) voices alternative views, criticises government failures, protests wrong policies and mobilises public opinion – keeping the government accountable and offering people an alternative.", "explanation": "Opposition matlab woh parties jo haar gayi - par inka kaam bahut important hai! Yeh sarkaar ki galtiyan ujaagar karti hain, galat policy ka virodh karti hain aur janta ki awaaz banti hain. Hook: 'opposition = sarkaar par check rakhne wala watchman'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "P5-1037", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Democracy & development", "question": "\"Democracy and Development go together.\" Justify the statement with suitable arguments.", "answer": "Democracy and development go together because democracy encourages power sharing, decentralisation and citizen voice, upholds dignity and freedom that motivate people to contribute, and its harmony and equality promote economic growth and progress.", "explanation": "Democracy aur development saath-saath chalte hain - power sharing, decentralisation aur logon ki awaaz se development tez hoti hai. Jab dignity aur freedom milti hai, log desh ke liye mehnat karte hain. Hook: 'azaadi + barabari = tarakki'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "P5-1038", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Dignity & freedom of citizens", "question": "Explain the role of democracy in establishing the dignity of citizens.", "answer": "Democracy establishes citizens' dignity by recognising every person's worth, ensuring equality and equal treatment (e.g. of women and weaker sections), guaranteeing freedom of expression, and letting people demand respect from the government.", "explanation": "Democracy har citizen ki dignity banati hai - sabko barabar maanti hai, aurton aur kamzor logon ko bhi izzat deti hai, aur freedom of expression deti hai. Hook: 'democracy = har insaan ki izzat ki guarantee'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "P5-1039", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Democracy vs other forms (better government)", "question": "How is democracy better than other forms of Government? Choose the most appropriate option.", "answer": "(A) It enhances the dignity of the individuals. Democracy is better than other governments mainly because it raises and protects the dignity of every individual.", "explanation": "MCQ mein democracy ki sabse badi khasiyat - 'individual ki dignity badhana'. Baaki forms mein insaan ki izzat itni nahi hoti. Hook: 'democracy = dignity ka doctor'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E1-2", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Average / Per Capita Income", "question": "Suppose, the monthly income of the family members is as follows respectively : • Mother – Rs. 50,000/- • Father – Rs. 40,000/- • Son – Rs. 20,000/- • Daughter – Rs. 20,000/- The average income of the family would be :", "answer": "(c) Rs. 32,500. Average = (50,000+40,000+20,000+20,000)/4 = 1,30,000/4 = Rs. 32,500.", "explanation": "Family ke chaaron members ki income jodo: 50k+40k+20k+20k = 1,30,000. Ab 4 se divide karo toh 32,500 aata hai. Bhai bas dhyaan rakhna ki saare members count karne hain, koi chhoot na jaaye. Average nikaalne ka tarika ekdam fix hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E1-3", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Average / Per Capita Income", "question": "Assume there are four families in a locality. If the incomes of these four families in a week are ` 2,000, ` 5,000, ` 3,000 and ` 6,000, then the weekly average income of the locality will be –", "answer": "(A) Rs. 4,000. Weekly average = (2,000+5,000+3,000+6,000)/4 = 16,000/4 = Rs. 4,000.", "explanation": "Same average formula, bas yahan weekly income hai. Total 16,000 ko 4 families se divide karo, 4,000 aa jaata hai. Monthly ho ya weekly, average nikaalne ka rule nahi badalta – jod aur baant. Easy marks hain yeh, miss mat karna.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E1-13", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "HDI – Reading Country Data Tables", "question": "Study the table given below carefully and answer the question that follows. Which of the following country has high Human Development Index Rank in the world ?", "answer": "(A) Country 'A' – based on the table, Country A has the high (best) HDI rank.", "explanation": "Imaginary countries A, B, C, D ka table diya hota hai. Jiska GNI per capita, life expectancy aur schooling zyada, uska HDI rank achha. Yahan Country A top pe hai. Memory hook: jis country ke saare numbers bade (income, life expectancy), uska HDI utna hi strong.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E1-20", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "World Bank & UNDP – Reports", "question": "On which of the following basis does the United Nations Development Programme (UNDP) publish the ‘Human Development Report’ ?", "answer": "(B) Education, Health and Per Capita Income – these three parameters form the basis of UNDP's Human Development Report.", "explanation": "UNDP ka HDR teen cheezon pe banta hai: Education (literacy/schooling), Health (life expectancy), aur Per Capita Income. Memory hook: 'EHI' – Education, Health, Income. World Bank sirf income dekhta hai, par UNDP teeno milaata hai – isiliye HDI ko 'composite index' kehte hain.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E1-23", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "World Bank & UNDP – Reports", "question": "How does the United Nations Development Program’s (UNDP’s) developmental criterion differ from the World Bank ? Explain.", "answer": "The World Bank measures development using GDP and per capita income only, while the UNDP uses the Human Development Index (HDI), which combines educational levels, health status and per capita income.", "explanation": "Dono ka farak yaad rakho: World Bank sirf paise dekhta hai – GDP aur per capita income. UNDP thoda full picture leta hai – education + health + income teeno milaake HDI banata hai. Memory hook: World Bank = sirf jeb, UNDP = jeb + sehat + padhai. Isiliye HDI zyada complete maana jaata hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "E1-24", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Measuring Development – Indicators", "question": "Which of the following is a key indicator used to measure a country’s development ?", "answer": "(C) Gross Domestic Product (GDP) – a key indicator used to measure a country's development.", "explanation": "Desh ki development naapne ka ek bada indicator hai GDP (Gross Domestic Product) – yaani saal bhar mein desh ke andar bani saari final goods aur services ki total value. Memory hook: GDP zyada matlab economy strong. Yeh income-based measure hai jo World Bank type criterion se judta hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E1-29", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Different People, Different Developmental Goals", "question": "Which of the following are developmental goals of a prosperous farmer ? Choose the correct from the given options. I. Better wages II. Higher support prices for crops III. Assured high family income IV. More days for work", "answer": "(c) II and III are correct – a prosperous farmer wants higher support prices for crops and assured high family income.", "explanation": "Ameer (prosperous) kisaan kya chahega? Apni fasal ke achhe daam (higher support price) aur pakki achhi income. Better wages aur more days of work toh mazdoor chahta hai, kisaan nahi. Isliye II aur III sahi. Memory hook: maalik fasal bechta hai – use daam chahiye, kaam nahi.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E1-33", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Different People, Different Developmental Goals", "question": "Why could different persons have different notions of a country’s development ? Explain with examples.", "answer": "Different people have different notions of development because each prioritises what matters most to them, and goals can be contrasting. E.g. industrialists may want large dams for electricity, while displaced tribals prefer small check dams for irrigation.", "explanation": "Notion of development sabka alag hota hai kyunki har koi apne faayde ki cheez ko 'vikas' maanta hai. Jaise industrialist bada dam chahta hai bijli ke liye, par jo log waha se displace ho rahe hain woh chhote check dam chahte hain. Memory hook: ek ka vikas doosre ka nuksaan ban sakta hai – isi tension ko example se samjhao.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 2}, {"key": "E1-41", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Sustainability of Development", "question": "How is the issue of sustainability important for development ? Explain.", "answer": "Sustainability matters because development must protect health and the environment, use renewable resources wisely and manage non-renewable resources so that resources remain available for future generations.", "explanation": "Development tabhi achhi hai jab woh sustainable ho – matlab sehat aur environment ko nuksaan na ho aur resources future ke liye bache. Renewable cheezein soch-samajh ke, non-renewable bacha-bacha ke. Memory hook: 'vikas aisa ho jo prakriti ko zinda rakhe'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 2}, {"key": "E1-42", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Sustainability of Development", "question": "Why has the issue of sustainability become essential for development in present times ? Explain with example.", "answer": "Sustainability has become essential because non-renewable resources are depleting fast and the environment is being damaged. It calls for alternative renewable sources (solar/wind), judicious resource use and the practice of Reduce, Reuse, Recycle.", "explanation": "Aajkal sustainability isliye zaroori ho gayi hai kyunki coal-petrol jaise non-renewable tezi se khatam ho rahe hain aur environment bigad raha hai. Solar/wind jaise options aur 'Reduce, Reuse, Recycle' ka formula apnao. Memory hook: 3R yaad rakho – kam karo, dobara use karo, recycle karo.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 2}, {"key": "E1-50", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Sustainability of Development", "question": "How can a nation achieve a balance between economic growth and environment sustainability ? Explain by giving any two arguments.", "answer": "A nation can balance growth and sustainability by promoting sustainable development — using renewable energy, conserving resources for the future, reducing use of non-renewables, and adopting practices like Reduce, Reuse, Recycle and public transport.", "explanation": "Growth aur environment dono saath chal sakte hain agar samajhdaari se kaam ho. Renewable energy (solar/wind) use karo, resources bachao, aur 3R (Reduce, Reuse, Recycle) + public transport apnao. Memory hook: 'taraqqi karo par prakriti ka khayal rakho'. Do clean arguments likho toh poore marks.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "E1-60", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Development Indicators – Health (BMI)", "question": "Choose the correct option regarding ‘Body Mass Index’ (BMI) from the following.", "answer": "(C) Assessment of Body Composition – BMI is used to assess whether a person is over- or under-nourished.", "explanation": "BMI (Body Mass Index) batata hai ki banda theek se nourished hai ya nahi – yaani body composition ka andaaza. Memory hook: BMI = weight aur height ka rishta, sehat ka scorecard. Yahan sahi option 'assessment of body composition' hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E1-72", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Development Indicators – Reading State Data Tables", "question": "Analyse the development of Punjab, Kerala and Bihar states on the basis of literacy.", "answer": "On literacy, Kerala is the most developed (very high literacy and net attendance, low dropout), Punjab is in the middle, and Bihar is the least developed (lowest literacy and attendance, higher dropout) — showing literacy reflects differences in development among states.", "explanation": "Literacy ke basis pe teen states: Kerala sabse aage (highest literacy aur attendance), Punjab beech mein, aur Bihar sabse peeche (kam literacy, zyada dropout). Memory hook: 'Kerala top, Bihar bottom'. Literacy se pata chalta hai kaunsa state kitna developed hai – comparison karke likho.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 2}, {"key": "E2-96", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Organised vs Unorganised sector", "question": "Which one of the following is an example of organized sector activities ?", "answer": "(d) A teacher taking classes in a government school. A government-school teacher has a registered, regulated job with benefits, hence organised sector.", "explanation": "Government school ka teacher - fixed salary, rules, benefits, job security sab milta hai. Isliye organized sector. Memory hook: 'Sarkari naukri = organized'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E2-98", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Which one of the following pairs is correctly matched ? (Sector of the Economy) (Example) (A) Primary Sector – Tailor (B) Secondary Sector – Fisherman (C) Tertiary Sector – Astronaut (D) Primary Sector – Courier", "answer": "(C) Tertiary Sector – Astronaut. An astronaut provides a specialised service, so it falls under the tertiary sector.", "explanation": "Astronaut koi goods nahi banata - wo ek specialised service deta hai, isliye Tertiary sector. Tailor secondary mein, fisherman primary mein aate hain, isliye baaki options galat match the. Memory hook: 'Seva = Tertiary, chahe space mein ho!'", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ", "Match"], "score": 2}, {"key": "E2-99", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Organised vs Unorganised sector", "question": "Look at the given image. The work done in the image comes under which one of the following sectors ?", "answer": "(C) Unorganized Sector. The depicted informal work (no registration, no benefits) belongs to the unorganised sector.", "explanation": "Image mein dikha kaam informal type ka hai - na registration na benefits - isliye Unorganized sector. Picture-based questions mein dekho kaam casual/informal toh unorganized. Memory hook: 'Footpath/casual kaam = Unorganized'.", "years": ["2024"], "papers": 1, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E2-100", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Importance of the Tertiary Sector", "question": "“Tertiary sector has a pivotal role in the economy of the country.” Support your answer with day-to-day examples.", "answer": "The tertiary sector is pivotal because it supports the primary and secondary sectors (transport, banking, communication), provides everyday services (doctors, teachers, shops), generates large employment, contributes the highest share to GDP, and earns foreign exchange.", "explanation": "Tertiary sector roz ki zindagi mein har jagah hai - doctor, teacher, bank, transport, dukaan. Ye baaki sectors ko bhi chalata hai aur GDP mein sabse aage hai. Isiliye ise 'pivotal' (most important) kehte hain. Memory hook: 'Subah se shaam tak sab services = Tertiary'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 2}, {"key": "E2-103", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Basis of classifying sectors", "question": "Primary, Secondary and Tertiary sectors are divided in which one of the following basis ?", "answer": "(B) Nature of activities. Primary, secondary and tertiary sectors are divided on the basis of the nature of the economic (production) activity.", "explanation": "Primary/Secondary/Tertiary ka batwara kis aadhar par? Kaam ki 'nature' (kaisa kaam hai) par - nature uthana, banana, ya seva dena. Memory hook: 'Kaam kaisa hai = sector kaunsa hai'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E2-106", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Public vs Private sector", "question": "‘‘Activities in the private sector are guided by the motive to earn profits.’’ Examine the statement with examples.", "answer": "In the private sector, assets are owned by private individuals/companies whose main aim is to maximise profit (e.g., Tata Steel, Reliance). They invest where returns are high and generally do not run loss-making public services.", "explanation": "Private sector ka main maksad - profit kamaana. Companies wahi kaam karti hain jisme paisa banta hai (Tata, Reliance). Isiliye ghaate wali public services wo nahi chalatin - wo sarkar (public sector) karti hai. Memory hook: 'Private ka dil = profit'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 2}, {"key": "E2-108", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "‘Floriculture’ comes under which one of the following sectors of the economy ?", "answer": "Floriculture (growing flowers) comes under the Primary sector, as it directly uses natural resources. (The marked option 'Tertiary' in the key is an error; floriculture is primary.)", "explanation": "Floriculture matlab phool ki kheti - ye seedha zameen aur nature se hoti hai, isliye Primary sector. (Note: answer key mein 'Tertiary' likha hai jo galat lagta hai - cultivation hamesha Primary hota hai.) Memory hook: 'Ugaana = Primary, chahe phool ho ya fasal'.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E3-149", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Formal vs Informal Sources of Credit", "question": "Select the formal sources of credit from the given sources and choose the correct option. I. Bank II. Moneylender III. Cooperatives IV. Businessman", "answer": "(C) Only I and III. Banks and Cooperatives are formal sources; moneylenders and businessmen are informal.", "explanation": "Bank (I) aur Cooperatives (III) hi formal hain, isliye option C. Moneylender aur businessman to apni marzi se zyada byaaj lagate hain, koi RBI unhe control nahi karta. Memory hook: 'B for Bank, C for Cooperative = formal Crew'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E3-158", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Terms of Credit & Collateral", "question": "Why do lenders often require collateral before lending loan ? Choose the most suitable option from the following.", "answer": "(d) To mitigate the risk of loan default. Collateral is security the lender can sell if the borrower fails to repay.", "explanation": "Lender collateral kyun maangta hai? Taaki agar tum loan na chuka pao, to woh us cheez (zameen, gehne) ko bech ke apna paisa nikaal le. Yani default ka risk kam karna. Option (d) sahi. Collateral = lender ki 'guarantee'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E3-160", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Terms of Credit & Collateral", "question": "Assertion (A) : Banks are not ready to lend money to certain borrowers. Reason (R) : Some people do not have collateral.", "answer": "(A) Both (A) and (R) are true and (R) is the correct explanation of (A). Banks hesitate to lend because many borrowers cannot provide collateral.", "explanation": "Bank kuch logon ko loan nahi dena chahta (A) — kyun? Kyunki unke paas collateral nahi hai (R). Dono sahi, aur R hi A ki wajah hai, isliye option (A). Logic seedha hai: no collateral = no trust = no loan.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 2}, {"key": "E3-161", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Terms of Credit & Collateral", "question": "Assertion (A) : Rural poor families are still dependent on informal sources of credit. Reason (R) : For obtaining loan from banks, collateral and special documents are required.", "answer": "(A) Both (A) and (R) are true and (R) is the correct explanation of (A). Poor families lack collateral/documents, so they rely on informal lenders.", "explanation": "Gaon ke garib aaj bhi moneylender pe nirbhar hain (A) kyunki bank collateral aur papers maangta hai jo unke paas nahi (R). Dono true, R hi A ka kaaran — option (A). Yaad rakho: papers nahi to bank nahi, majboori mein informal.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 2}, {"key": "E3-168", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Reserve Bank of India", "question": "Which one of the following banks in India controls the issuance of currency and regulates the credit system in the country ?", "answer": "(C) Reserve Bank of India. The RBI controls currency issuance and regulates the credit system.", "explanation": "Currency chhaapne aur poore credit system ko control karne wala bank = RBI. Option (C). Yeh bank 'banks ka bank' hai — baaki sab commercial banks RBI ke under chalte hain. Easy 1 marker.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E3-172", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Banking & Deposits", "question": "Look at the given picture carefully and infer the income of the bank. DEPOSITORS People make deposits BANK People take loans BORROWERS People make withdrawals and get interest The Income of the bank increases People repay loans with interest Choose the correct option from the following. (a) The difference between the amount deposited and borrowed by the bank to Reserve Bank of India. (b) The difference of amount of interest between what is charged from borrowers and what is paid to depositors. (c) The difference of interest rate between what is charged from borrowers and what is charged from depositor. (d) The difference between the amount deposited by the depositor and borrowed by the borrower.", "answer": "(b) The difference of amount of interest between what is charged from borrowers and what is paid to depositors.", "explanation": "Bank ki kamai kaise? Borrowers se zyada byaaj leta hai, depositors ko kam byaaj deta hai — beech ka antar = bank ki income. Option (b). Memory hook: 'leta zyada, deta kam, beech mein bank ka dam'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E3-173", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Banking & Deposits", "question": "Which of the following is the primary purpose of loan activities offered by banks ?", "answer": "(D) To support economic growth. Bank loans fund production, business and investment, driving the economy.", "explanation": "Bank loan dete hi kyun hain? Taaki log business/kheti mein invest karein aur economy badhe — yani economic growth. Option (D). Loan = economy ko aage badhane ka fuel.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E3-176", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Role of Credit in Development", "question": "Read the following situation regarding credit and identify the positive impact of credit. Salim obtains credit to meet the working capital needs of production. The credit helps him to meet the ongoing expenses and complete production on time.", "answer": "(B) Salim’s income will increase. Credit lets him complete production on time, so his earnings rise—showing the positive role of credit.", "explanation": "Salim ko credit mila, usne time pe production poora kiya, isliye uski income badhegi — option (B). Yeh credit ka positive role hai. Jab credit sahi kaam mein lage to fayda; galat phase to debt-trap. Yahan fayda wali side hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E3-180", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Role of Credit in Development", "question": "In one of the small villages, a farmer borrows money from the village moneylender at a high monthly interest rate but is not able to repay it back. Next, he borrows it from a bank at a lower interest rate. Gradually he earns and pays back the loan to the moneylender and the bank. Which of the following best describes the role of the bank in this credit situation ?", "answer": "(D) The bank saves the farmer from the debt trap. Cheap bank credit replaces the costly moneylender loan, helping him repay and escape debt.", "explanation": "Kisaan pehle moneylender se mehenge byaaj pe phansa tha, fir bank se sasta loan le ke sabko chukaa diya — yani bank ne use debt-trap se bachaaya. Option (D). Yeh formal credit ka positive role dikhata hai: sasta loan = chhutkaara.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E3-185", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Money as Medium of Exchange", "question": "Assertion (A) : No individual in India can legally refuse a payment made in rupees. Reason (R) : In India the rupee is authorized by the State Governments.", "answer": "(C) (A) is true but (R) is false. The rupee is legal tender so no one can refuse it, but it is authorised by the Reserve Bank of India (central authority), NOT by State Governments.", "explanation": "Assertion sahi: India mein koi rupee mein payment lene se mana nahi kar sakta (legal tender). Reason GALAT: rupee ko State Government nahi, balki RBI/Central authority authorize karti hai. Isliye option (C). Trap yahin hai — 'State Governments' galat hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 2}, {"key": "E3-187", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Banking & Deposits", "question": "Read the image of the cheque. Identify the cheque number from the given options :", "answer": "(A) 362255. The cheque number is the unique number printed on the cheque (here, 362255).", "explanation": "Cheque pe ek unique number hota hai jo har cheque ko alag pehchaan deta hai — yahan woh 362255 hai, option (A). Image-based hai par concept simple: cheque number = cheque ki ID.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E3-192", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Self-Help Groups (SHGs)", "question": "'Self-help-groups (SHGs) in rural society serve as empowering platform towards socio-economic development.' Give arguments in support of your answer.", "answer": "SHGs pool members' savings, give small collateral-free loans (especially to women), secure bank loans for self-employment, decide loan terms collectively and ensure repayment—empowering the rural poor socially and economically.", "explanation": "SHG ek empowering platform kaise? Members ki savings pool hoti hai, bina collateral chhota loan milta hai (khaaskar auraton ko), bank bhi group ko loan deta hai, aur sab milke shartein/recovery sambhaalte hain. Yani aarthik + samaajik dono tarah se taakat. 3 strong arguments likh do.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 2}, {"key": "E3-194", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Cooperative Societies", "question": "Explain the contribution of Cooperative Societies in rural development.", "answer": "Cooperative societies provide cheap loans for agricultural implements, cultivation, trade, fishery and house construction, reducing dependence on moneylenders and supporting all-round rural development.", "explanation": "Cooperative society gaon ke vikaas mein kya deti hai? Sasta loan — kheti ke aujaar, kheti, vyapaar, machhli-paalan, ghar banane ke liye. Isse moneylender pe nirbharta kam hoti hai. Yaad rakho: cooperative = gaon ka apna sasta bank.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "E3-195", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Cooperative Societies", "question": "How do ‘Krishak Cooperatives’ secure funds for providing loans to their members ?", "answer": "Krishak Cooperatives accept deposits from their farmer members and use these deposits as collateral to obtain large loans from banks, which they then lend to members.", "explanation": "Krishak Cooperative paisa kaise jutaati hai? Apne kisaan members se deposit leti hai, aur usi deposit ko collateral bana ke bank se bada loan le aati hai. Fir woh paisa members ko loan pe deti hai. Chakra: deposit > bank loan > member loan.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "E3-196", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Cooperative Societies", "question": "What are the different types of loans that ‘Krishak Cooperatives’ offer to their members ?", "answer": "Loans for agricultural implements, cultivation, agricultural trade, fishery, house construction and other expenses.", "explanation": "Krishak Cooperative kaun-kaun se loan deti hai? Kheti ke aujaar, kheti (cultivation), agri-trade, machhli-paalan, ghar banana, aur aur kharche. Bas yeh list yaad rakho — 1 marker mein 2-3 likh do.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "E3-197", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Cooperative Societies", "question": "Why are such cooperatives desirable in the rural areas ?", "answer": "Cooperatives are desirable because they offer cheap credit, cut dependence on costly informal lenders, allow repeated lending once loans are repaid, and need less documentation than banks.", "explanation": "Gaon mein cooperative kyun achhi? Sasta loan deti hai, moneylender se peecha chhutta hai, ek loan chukao to dobara mil jaata hai, aur kam kaagaz-paani. Yani garib kisaan ke liye easy aur sasta credit. 2-marker, 2-3 points kaafi.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "E4-226", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Meaning of globalisation", "question": "“Globalisation is the process of rapid integration or interconnection between countries.\" Explain the statement with examples.", "answer": "Globalisation means rapid integration/interconnection of countries through rising foreign trade, MNC investment, joint ventures, technology exchange, and movement of goods, services and people - increasing global interdependence and consumer choice.", "explanation": "Globalisation ka matlab hai duniya ke desh tezi se aapas mein jud rahe hain. Trade, investment, MNCs, technology - sab ne deshon ko ek dhaage mein piro diya. Aaj India mein bana product America mein bikta hai aur ulta bhi. Memory hook: globalisation = duniya ek 'global village' ban gaya, sab connected.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 2}, {"key": "E4-229", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Meaning of globalisation", "question": "Match the following aspects of globalization with their descriptions and choose the correct option. List-I (Global Aspect) List-II (Description) I. Technological Advancement a. Interaction of ideas, values and traditions II. Liberalization of Trade b. Companies operating in many countries III. Cultural Exchange c. Innovation in manufacturing, communication and information IV. Multinational Corporations d. The removal of restriction on trade", "answer": "(B) I-c, II-d, III-a, IV-b. (Tech advancement=innovation; Liberalisation=removal of trade restrictions; Cultural exchange=interaction of ideas; MNCs=companies in many countries.)", "explanation": "Matching ka logic samjho: Technology = innovation (c), Liberalisation = restrictions hatana (d), Cultural exchange = ideas/values ka aadan-pradaan (a), MNC = kayi deshon mein chalne waali company (b). Memory hook: har term apni clear definition se match - ratta nahi, samajh ke karo. Answer (B).", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 2}, {"key": "E4-230", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Aspects of globalisation", "question": "Which one of the following is a significant aspect of globalisation ?", "answer": "(D) Access to new markets.", "explanation": "Globalisation ka ek bada aspect hai - naye markets tak pahunch (access to new markets). Companies apna product dusre deshon mein bhi bech sakti hain. Memory hook: globalisation = duniya bhar ke market ka darwaaza khula. Producer ab sirf apne desh tak seemit nahi.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E4-234", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Meaning of globalisation", "question": "Which one of the following statements best describes the meaning of ‘Globalization’ ?", "answer": "(C) Process of rapid integration between countries.", "explanation": "Globalisation ka best meaning - deshon ke beech tezi se ho rahi integration (jud-aav). Trade, investment, technology, culture sab se desh aapas mein jud rahe hain. Memory hook: globalisation = duniya ko 'fevicol' lag gaya, sab desh chipak gaye ek doosre se. Answer (C).", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E4-235", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Technology and globalisation", "question": "How is technology an important factor of globalisation ? Explain with examples.", "answer": "Technology (telecommunication, advanced transport, IT like internet/email) is crucial for globalisation - it enables rapid communication and faster, cheaper movement of goods and services across countries.", "explanation": "Technology globalisation ka zaroori factor hai. Phone-internet se turant communication, aur achhe transport se saaman jaldi aur sasta pahunchta hai. Example: email se ek second mein message, container se sasti shipping. Memory hook: bina technology ke globalisation adhura - ye uska fuel hai.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "E4-249", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Factors of globalisation", "question": "Examine the factors that have enabled globalization in India.", "answer": "Factors enabling globalisation in India: technology (transport + ICT), liberalisation (removal of trade barriers), foreign trade, foreign investment and MNCs, and policy support like SEZs.", "explanation": "India mein globalisation kayi factors se aaya: technology (transport + internet), liberalisation (barriers hatna), foreign trade, foreign investment aur MNCs. Memory hook: yaad rakho 'TLMFF' - Technology, Liberalisation, MNCs, Foreign trade, Foreign investment. Ye saare milke globalisation laaye.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G-MAP-254", "chapter_code": "G-MAP", "chapter_name": "Geography (Map Work)", "discipline": "Geography", "topic": "Map work", "question": "On the same Political outline map of India, locate and label any three of the following with suitable symbols : (a) Hirakud – Dam (b) Mumbai – Software Technology Park (c) Raja Sansi – International Airport (d) Naraura – Nuclear Power Plant", "answer": "Hirakud Dam: Odisha. Mumbai STP: Maharashtra. Raja Sansi (Sri Guru Ram Das Jee) International Airport: Amritsar, Punjab. Naraura Nuclear Power Plant: Uttar Pradesh.", "explanation": "Hirakud Odisha, Mumbai STP Maharashtra — yeh toh aate honge. Raja Sansi airport Amritsar (Punjab) mein hai, naya naam Sri Guru Ram Das Jee. Narora UP. Hook: 'Raja Sansi = Punjab da raja'. Note: is question ki answer-key mein galti se History ke Dandi/INC daale the, unhe ignore karo.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["Map"], "score": 2}, {"key": "G-MAP-255", "chapter_code": "G-MAP", "chapter_name": "Geography (Map Work)", "discipline": "Geography", "topic": "Map work", "question": "On the same political outline map of India, locate and label any three of the following with suitable symbols : (i) Salal – Dam (ii) Kalpakkam – Nuclear Power Plant (iii) Bengaluru – Software Technology Park (iv) Mormugao – Major Sea Port", "answer": "Salal Dam: Jammu & Kashmir (Chenab). Kalpakkam Nuclear Power Plant: Tamil Nadu. Bengaluru STP: Karnataka. Mormugao Major Sea Port: Goa.", "explanation": "Salal upar J&K mein. Kalpakkam nuclear plant South mein Tamil Nadu. Bengaluru STP Karnataka (IT capital, easy). Mormugao port Goa mein — chhota state, West coast pe. Hook: 'Mormugao = Goa ka gaana'. Ek upar, baaki teen South-West side, balance ban jaata hai.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["Map"], "score": 2}, {"key": "G-MAP-256", "chapter_code": "G-MAP", "chapter_name": "Geography (Map Work)", "discipline": "Geography", "topic": "Map work", "question": "On the same political outline map of India, locate and label any three of the following with suitable symbols : (i) Bhakra Nangal – Dam (ii) Noida – Software Technology Park (iii) Tarapur – Nuclear Power Plant (iv) Haldia – Sea Port", "answer": "Bhakra Nangal Dam: Punjab–Himachal Pradesh border (Sutlej). Noida STP: Uttar Pradesh. Tarapur Nuclear Power Plant: Maharashtra. Haldia Sea Port: West Bengal.", "explanation": "Bhakra Nangal famous dam, Sutlej river pe Punjab-HP border — North mein. Noida UP. Tarapur Maharashtra. Haldia West Bengal. Hook: 'Bhakra = Bada dam Sutlej ka'. Yeh sab alag-alag corners mein hain, toh map pe spread dikhega — naam galat mat likhna.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["Map"], "score": 2}, {"key": "G-MAP-257", "chapter_code": "G-MAP", "chapter_name": "Geography (Map Work)", "discipline": "Geography", "topic": "Map work", "question": "On the same political outline map of India, locate and label any three of the following with suitable symbols : (i) Naharkatiya – Oil field (ii) Talcher – Major Coal Mines (iii) Narora – Atomic Power Plant (iv) Tuticorin – Major Sea Port", "answer": "Naharkatiya Oil field: Assam. Talcher Coal Mines: Odisha. Narora Atomic Power Plant: Uttar Pradesh. Tuticorin Major Sea Port: Tamil Nadu.", "explanation": "Naharkatiya oil field Assam mein (North-East ka tel). Talcher coal Odisha. Narora UP atomic plant. Tuticorin Tamil Nadu ka South port. Hook: 'Naharkatiya = North-East naphtha'. East se South tak phaila hua set hai, location approximate bhi chal jayegi exam mein.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["Map"], "score": 2}, {"key": "G1-269", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil types", "question": "Read the following characteristics of a soil and identify the soil from the given options. · It is widely spread and important soil. · Northern plains are made of it. · It consists of sand, silt and clay. Options : (A) Yellow soil (B) Black soil (C) Laterite soil (D) Alluvial soil", "answer": "(D) Alluvial Soil. It is the most widespread, forms the Northern Plains, and consists of sand, silt and clay.", "explanation": "Jab bhi sunno 'sabse zyada faili mitti, Northern Plains, sand-silt-clay' - turant samajh jao yeh Alluvial soil hai. Yeh India ki sabse fertile aur important mitti hai. Trick: 'Northern Plains ka raja = Alluvial'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "G1-291", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Resource planning", "question": "Define the term ‘Resource Planning’.", "answer": "Resource planning is a complex process of identifying and making an inventory of resources across the regions of a country, then planning their j
