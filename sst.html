eavy and bulky goods; they are fuel-efficient and eco-friendly, use natural rivers and canals (declared as National Waterways), and serve both cargo and passenger traffic wherever rivers are navigable.", "explanation": "Pani par chalna sabse sasta hai - na sadak banao, na patri, bas nadi/canal istemal karo. Bhaari saaman ke liye perfect aur eco-friendly bhi. Hook: 'cheapest + cleanest = waterways.'", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "G7-547", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Air Transport", "question": "Explain the important features of Air Transport of India.", "answer": "Air transport is the fastest, most comfortable and prestigious mode; it covers difficult terrain like high mountains, deserts and dense forests easily; it is vital for long distances and remote areas (e.g. North-East, Jammu & Kashmir) but is the most expensive.", "explanation": "Hawai jahaaz sabse tej - pahad, registan, jungle sab upar se cross kar jaata hai. Door-daraz jagah (jaise North-East) ke liye lifesaver. Bas mehenga hai. Hook: 'fastest but costliest.'", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "G7-550", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Tourism as Trade", "question": "Why do we call Tourism as a Trade ? Explain.", "answer": "Tourism is called a trade because it earns large foreign exchange, promotes national integration, supports local handicrafts and cultural industries, and provides employment to millions, making it a major service industry.", "explanation": "Tourism bina kuch 'becha' paise kamata hai - videshi sailani aate hain, foreign exchange dete hain, locals ko rozgaar milta hai. Isliye ise trade kehte hain. Hook: 'tourist = chalta-firta export.'", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 1}, {"key": "G7-551", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Transport & Communication", "question": "'Transport and Communication are complementary to each other.' Support the statement.", "answer": "Transport and communication are complementary: transport physically moves goods and people, while communication moves the information needed to plan, coordinate and manage that movement; neither can function efficiently without the other.", "explanation": "Transport saaman le jaata hai, communication batata hai kahan-kab le jaana hai. Dono ek doosre ke bina adhure. Hook: socho courier (transport) aur tracking SMS (communication) - dono saath chahiye.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "G7-566", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Unidentified (empty text in source)", "question": "31A", "answer": "Question text is blank in the source, so the exact fact tested cannot be determined. These are LA (5-mark) 31A/31B questions from series 48-4, matching this chapter's Transport/Communication/International-trade long-answer pattern.", "explanation": "In dono questions ka text source mein khaali hai, isliye exact meaning pakka nahi. Series 48-4 ke 31A/31B aam taur par transport/communication/international trade par hote hain - to revision ke liye un teeno topics ko cover kar lena safe rahega.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 1}, {"key": "H1-570", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Romanticism & culture", "question": "Explain Frederic Sarrieu's dream in the context of democratic and social republics in France during 1848.", "answer": "In Frederic Sorrieu's 1848 prints, his 'dream' showed a world made up of democratic and social Republics: peoples of Europe and America marching past a Statue of Liberty in homage, having shattered the symbols of absolutist monarchy.", "explanation": "Sorrieu ek artist tha jisne 1848 mein prints banaye - usme alag-alag deshon ke log ek line mein Statue of Liberty ki taraf chal rahe hain. Uska sapna tha ki saari kaumein azaad democratic republics ban jaayein, raja-rajwaade khatam. Hook: ek 'dream-march' jisme har nation bhaichare se aage badh rahi hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "H1-579", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Visual culture & allegory", "question": "Which one of the following is not true about the female allegory of France ?", "answer": "(b) 'She took part in the French Revolution' - this is NOT true. Marianne was an allegory of the French nation (Liberty/Republic), not a real woman who fought; her image was used on coins, stamps and statues to give the abstract idea of the nation a concrete form.", "explanation": "Marianne France ki symbol-woman hai, koi real insaan nahi - toh 'usne French Revolution mein hissa liya' galat hai (wahi answer). Woh sirf ek allegory thi jise coins, stamps aur statues pe lagaaya gaya taaki 'nation' jaisi abstract cheez ko ek chehra mile. Hook: Marianne = idea ka chehra, na ki koi soldier.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "H1-582", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Revolutions of 1830 & 1848", "question": "Explain any five effects of the revolution of the liberals in Europe in 1848.", "answer": "Effects of the 1848 liberal revolutions: monarchs were forced to grant concessions; serfdom and bonded labour were abolished in the Habsburg lands; middle classes demanded constitutions, freedom of press and association; in Germany the Frankfurt Parliament met to draft a constitution for a united nation; and though largely suppressed, the revolts forced autocratic rulers to introduce reforms.", "explanation": "1848 mein educated middle class ne constitution, press ki azaadi aur nation-state ki maang ki - isi ko 'liberals ki kranti' kehte hain. Asar: kai jagah serfdom khatam, Frankfurt Parliament baitha, aur raja-maharaja ko thodi reforms deni padi. Bhale crush ho gayi, message clear tha. Hook: 1848 = middle class ka constitution-maango aandolan.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "H1-584", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Unification of Italy", "question": "Match the following and choose the correct option. (Leader) (a) Victor Emmanuel II (b) Guiseppe Mazzini (c) Guiseppe Garibaldi (d) Count Cavour (Role) I. Chief Minister of Italy II. Young Italy Movement III. Conquered the Kingdom of Sicillies IV. Proclaimed as king of Unified Italy", "answer": "(C) a-IV, b-II, c-III, d-I: Victor Emmanuel II - proclaimed king of unified Italy; Mazzini - Young Italy movement; Garibaldi - conquered the Kingdom of the Two Sicilies; Cavour - Chief Minister of (Sardinia-Piedmont) Italy.", "explanation": "Italy ke chaar heroes ko unke kaam se jodo: Victor Emmanuel II = raja (IV), Mazzini = 'Young Italy' idea-man (II), Garibaldi = Sicily jeetne wala fauji (III), Cavour = Chief Minister/diplomat (I). Hook: Raja, Soch, Sword aur Smart-PM - sab apni jagah.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 1, "types": ["Match"], "score": 1}, {"key": "H2-669", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Caste, leaders & MCQs", "question": "Which one of the following aspects was common between the writings of B.R. Ambedkar and E.V. Ramaswamy Naicker ?", "answer": "(A) Wrote on the caste system in India - both Ambedkar and Periyar (E.V. Ramaswamy Naicker) attacked caste oppression and championed the rights of the depressed classes.", "explanation": "Ambedkar aur Periyar dono ne caste system ke khilaaf likha - dono ne dabe-kuchle logon (depressed classes) ke haq ki baat ki. Answer: (A) caste system par likha. Hook: 'Dono caste-system ke baagi'.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "H2-671", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Caste, leaders & MCQs", "question": "Who among the following led the peasant movement in Bardoli in 1928 ?", "answer": "(d) Vallabhbhai Patel - he led the 1928 Bardoli Satyagraha (a no-tax peasant movement), after which he earned the title 'Sardar'.", "explanation": "Bardoli Satyagraha (1928, no-tax andolan) ko Vallabhbhai Patel ne lead kiya - isi ke baad unhe 'Sardar' ki upaadhi mili. Answer: (d) Vallabhbhai Patel. Hook: 'Bardoli = Sardar ka birthplace (title wala)'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "H3-687", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Chronology / Timeline", "question": "Arrange the following in chronological order and choose the correct option : I. The Bretton Woods conference established the International Monetary Fund. II. The Second World War broke out between the Axis and Allied groups. III. A car manufacturer Henry Ford adopted the 'Assembly Line Method' for production. IV. The Western economies organized themselves as a group 'The Group of 77'.", "answer": "(A) III, II, I, & IV  (Assembly Line ~1913 -> WWII 1939 -> Bretton Woods/IMF 1944 -> G-77 1964).", "explanation": "Yaad rakhne ka simple trick: pehle factory (Henry Ford ki assembly line, 1913), phir jung (WWII, 1939), phir us jung ke baad system banana (Bretton Woods aur IMF, 1944), aur sabse last mein gareeb deshon ka group G-77 (1964). Bas dimaag mein 'factory -> war -> bank -> group' ka order baith jaaye to answer pakka III, II, I, IV.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "H3-695", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Exchange Rates", "question": "Differentiate between Fixed and Floating exchange rate.", "answer": "Fixed exchange rate: currency value is officially fixed by the government/central bank and stays stable. Floating exchange rate: value fluctuates freely according to demand and supply in the market.", "explanation": "Fixed rate matlab sarkar ne currency ki keemat pakki kar di - hilti nahi. Floating rate matlab market ki demand-supply pe value upar-neeche naachti rehti hai. Trick: 'Fixed = locked, Floating = floating in water (lehrata hua)'. Bas itna yaad rakho aur 2 marks pakke.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "H3-696", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Bretton Woods System", "question": "Which one of the following aspects was the base of the Bretton Woods system ?", "answer": "(c) Economic System - the Bretton Woods system was based on the post-war international economic/monetary framework (IMF and World Bank).", "explanation": "Bretton Woods system 1944 mein bana tha WWII ke baad duniya ki economy sambhalne ke liye - isi se IMF aur World Bank aaye. Iska base tha 'economic system'. Yaad rakho Bretton Woods = paisa-economy ka naya rulebook, isliye answer economic system.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "H3-698", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Great Depression", "question": "How was India affected by the Great Depression of 1929 ? Explain.", "answer": "India's trade nearly halved and agricultural prices crashed (e.g. wheat fell ~50%). Peasants suffered as revenue demands stayed unchanged, while urban dwellers with fixed incomes were relatively better off.", "explanation": "1929 ki Great Depression ne India ko bhi hila diya. Export-import aadha reh gaya, fasal ke daam dhadaam se gir gaye (gehu 50% tak sasta), par lagaan (tax) wahi ka wahi - to kisaan barbaad ho gaye. Sheher wale fixed salary wale thoda bach gaye. Yaad rakho: kisaan = sabse zyada pisaa.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "H3-699", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Canal Colonies", "question": "Explain any two dramatic changes that occurred in West Punjab in the 19th century, in the field of agriculture.", "answer": "The British built irrigation canals that turned semi-desert wasteland into fertile farmland for wheat and cotton export; new 'canal colonies' were settled and cultivated by migrant peasants.", "explanation": "West Punjab mein angrezon ne nahar (canals) banayi, jisse sukha-banjar ilaaka hara-bhara khet ban gaya - gehu aur cotton export ke liye ugne lage. In naye ilaakon ko 'canal colonies' kaha gaya jahan kisaan basaye gaye. Memory hook: 'paani aaya, registan khet ban gaya'.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "H4-714", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "Indian industrialists", "question": "Who of the following set up the first Iron and Steel industry in India?", "answer": "(A) J.R.D. Tata. (TISCO, the first iron and steel plant, was set up by the Tata family at Jamshedpur in 1912.)", "explanation": "Yaad rakho — Tata ka naam aaye toh steel automatic click ho jaaye! India ki pehli Iron & Steel industry (TISCO) Tata family ne 1912 mein Jamshedpur me lagayi thi. Memory hook: 'Tata = Tata Steel' — yeh connection toh tum aaj bhi roz dekhte ho, isliye exam me confuse mat hona.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "H4-715", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "Advertising and markets", "question": "How was the marketing of goods done in India by the British ?", "answer": "British marketed their goods using labels (often with 'MADE IN MANCHESTER'), images of Indian Gods and Goddesses, and printed calendars to make products look familiar and appealing to Indian consumers.", "explanation": "British log apne maal ko Indian dilon tak pahunchane ke liye clever marketing karte the — labels pe Indian Gods-Goddesses ki tasveerein, aur ghar-ghar me lagne wale calendars! Soch — agar Lakshmi ji ki photo packet pe ho, toh logon ko lagega yeh cheez 'apni' aur shubh hai. Memory hook: Labels + Devi-Devta + Calendar = trust banane ka jugaad.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "H4-716", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "Advertising and markets", "question": "How were the new consumers created through advertisement during colonial India ?", "answer": "Advertisements created new consumers by making products appear desirable and necessary, shaping people's minds and generating new needs. They spread through newspapers, magazines, hoardings and calendars, expanding markets and building a new consumer culture.", "explanation": "Advertisement ka kaam hi tha logon ke dimaag me 'yeh cheez toh chahiye hi' wali feeling daalna! Newspaper, magazine, hoarding — har jagah product dikha ke ek nayi 'zaroorat' bana di jaati thi. Memory hook: Ad = desire create karna. Aaj bhi toh same hota hai na, Instagram pe reel dekh ke kuch bhi khareedne ka mann ho jaata hai!", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "H4-717", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "Advertising and markets", "question": "Identify the messages conveyed through advertisements during industrialization.", "answer": "Ads conveyed messages about product quality, the place of manufacturing, built familiarity with goods, aimed to expand markets, and (for Indian manufacturers) promoted 'Swadeshi' to encourage use of locally made products.", "explanation": "Ads sirf product nahi, ek 'message' bechte the — quality acchi hai, kahan bana hai, aur Indian companies toh 'Swadeshi' ka jazba bhi jagati thi! Memory hook: Quality + Origin + Familiarity + Swadeshi. Yaad rakho — British ads 'foreign acha' bolti thi, Indian ads 'apna desi acha' — yahi tha asli marketing war.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 1}, {"key": "H4-722", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "Indian factories come up", "question": "When was the first cotton mill set up in India ?", "answer": "1854 — the first cotton mill in India was set up in Bombay (Mumbai) in 1854.", "explanation": "India ki pehli cotton mill 1854 me Bombay me lagi thi. Memory hook: '18-54, cotton ka pehla door' — Bombay tha India ka cotton hub kyunki wahan se kapas export hoti thi. Bas yeh saal yaad rakh lo, 1-mark ka pakka sawaal hai!", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "H4-723", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "Indian industrialists", "question": "Name any two early industrialists of India.", "answer": "Dwarkanath Tagore (Bengal) and Dinshaw Petit (Bombay). Others include Jamsetjee Nusserwanjee Tata, Seth Hukumchand and G.D. Birla.", "explanation": "India ke early industrialists me bade naam the — Dwarkanath Tagore (Bengal) aur Dinshaw Petit (Bombay). Inhone China trade aur factories se paisa banaya. Memory hook: 'Tagore-Petit-Tata-Birla' — yeh log the India ke pehle business tycoons, jinhone British raj me bhi apna empire khada kiya.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "H4-724", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "Indian industrialists", "question": "How did many Indian entrepreneurs survive despite tight economic controls imposed by the British Government ? Explain.", "answer": "Indian entrepreneurs survived by accumulating capital through international trade (e.g. with China), working through wide trade networks, financing and transferring funds across cities, and managing supplies and shipping of consignments before entering industry.", "explanation": "British ne bahut control lagaya, phir bhi Indian businessmen tikke kaise? Kyunki unhone pehle international trade (jaise China ke saath) se khoob capital jodi, fir networks aur funds ka jaal failaya. Memory hook: 'Pehle trade se paisa, fir industry me chhalaang' — smart move tha unka, isliye survive kar gaye.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 1}, {"key": "H4-725", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "Inventions and inventors", "question": "Which of the following industries increased with the expansion of railways in England from 1840s to 1860s ?", "answer": "(A) Iron and Steel. The railway boom of the 1840s-1860s created massive demand for iron and steel, making it a leading industry in England.", "explanation": "Railway phaili toh sabse zyada faayda kis industry ko? Iron and Steel ko! Patri, engine, dabbe — sab loha-steel se bante the, toh demand aasmaan chhoo gayi (1840s-1860s). Memory hook: 'Train chalegi toh loha lagega' — railway aur steel ki dosti pakki hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "H4-726", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "Swadeshi and regaining the market", "question": "What was the Swadeshi Movement?", "answer": "The Swadeshi Movement was a national appeal by leaders to people to use indigenous (Indian-made) goods and boycott foreign goods, to strengthen India's own industries.", "explanation": "Swadeshi Movement ka matlab tha — 'apna banao, apna khareedo'! Leaders ne logon se kaha videshi maal chhodo aur desi cheezein use karo, taaki Indian industries majboot ho. Memory hook: 'Swa-deshi = apne desh ka' — videshi kapde jalao, khadi pehno wala jazba yahi tha.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "H4-727", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "Swadeshi and regaining the market", "question": "Why did the Cotton piece goods production in India double between 1900 to 1912?", "answer": "Indian yarn exports to China fell due to competition from Chinese and Japanese mills, so Indian industrialists shifted from spinning yarn to weaving cloth — doubling cotton piece-goods (cloth) production between 1900 and 1912.", "explanation": "1900-1912 me Indian cloth production double kaise hua? Kyunki China ko yarn (dhaaga) bechna mushkil ho gaya (China-Japan ki competition se), toh Indian industrialists ne yarn chhod ke kapda (cloth) banana shuru kar diya! Memory hook: 'Yarn ka market gir gaya, toh cloth pe shift ho gaye' — clever business pivot.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "H4-728", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "Swadeshi and regaining the market", "question": "Explain any two events that helped India to regain its market.", "answer": "Two events: (1) The Swadeshi Movement, which mobilised people to boycott foreign cloth and pushed for tariff protection; (2) The First World War, which sharply reduced Manchester imports and boosted Indian factory production.", "explanation": "India ne apna market wapas paaya do bade events se — ek, Swadeshi Movement (videshi kapde ka boycott + tariff protection ki maang) aur do, First World War (jisme Manchester ka maal aana band, India ki factories chal padi). Memory hook: 'Swadeshi + World War = ghar wapsi of Indian market'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 1}, {"key": "H4-729", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "Regional industrial change", "question": "Mention any two changes that occurred in West Punjab in the 19th century.", "answer": "In 19th-century West Punjab, hand-weavers/spinners faced decline as cheap Manchester machine-made cloth and imported yarn flooded the market, ruining local weavers; many shifted occupations, while some weavers using imported cheap yarn could cut costs and survive.", "explanation": "19th century West Punjab me bade badlaav aaye — Manchester ka sasta machine-made kapda aur imported yarn aaya, jisse local haath se bunne wale weavers ka dhandha chaupat ho gaya. Kuch weavers ne sasta imported yarn use karke kharcha kam kiya. Memory hook: 'Sasta videshi maal aaya, desi haath-karigar pareshan' — yahi tha colonial impact.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "H4-730", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "Industrialisation and society", "question": "\"Industrialisation and Urbanisation go hand in hand.\" Explain.", "answer": "Industrialisation creates factories that need large workforces, drawing people from villages to towns. This causes rapid growth of cities (urbanisation), with new housing, transport and services developing around industrial centres — so the two grow together.", "explanation": "Industrialisation aur Urbanisation saath-saath chalte hain — factory lagti hai toh kaam ke liye log gaon se sheher aate hain, aur dheere-dheere sheher bada hota jaata hai! Naye ghar, transport, market sab develop hote hain. Memory hook: 'Factory aayi = log aaye = sheher bana' — ek chain reaction jaisa hai.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "H5-733", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print and religious reform in India", "question": "Explain the implication of print culture on the religious reforms in India during 19th century.", "answer": "Print fuelled intense religious debates and reform. Reformers used cheap tracts and newspapers to criticise practices like sati and to spread new interpretations of faith, shaping public opinion (e.g. Rammohan Roy's Sambad Kaumudi).", "explanation": "19th century mein print ne dharm par bahas chhed di. Reformers ne saste tracts aur newspapers se sati jaisi pratha ko challenge kiya aur naye vichaar phaila diye. Memory hook: 'chhapa = charcha'—jab baatein chhapne lagi, toh sudhaar ki aag lag gayi.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "H5-734", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print in Japan", "question": "How did the printing of visual material lead to publishing practices in Japan? Explain.", "answer": "Hand-printing in Japan led to wide publishing. The Buddhist Diamond Sutra was an early printed book; pictures were printed on textiles, playing cards and paper money. Cheap, abundant books on many subjects depicted urban life and filled libraries.", "explanation": "Japan mein hand-printing se publishing boom aaya—Buddhist Diamond Sutra sabse purani printed book thi. Tasveerein kapdon, taash aur paison par bhi chhapne lagi. Yaad rakho Japan = visual + Diamond Sutra, books saste aur bhar-bhar ke.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "H5-735", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print and caste / social reform writers", "question": "Which one of the following aspects was common between the writings of B.R. Ambedkar and E.V. Ramaswamy Naicker ?", "answer": "(A) Wrote on the caste system in India. Both Ambedkar and Periyar (E.V. Ramaswamy Naicker) used print to attack caste oppression.", "explanation": "Ambedkar aur Periyar dono ne apni writings mein caste system par chot ki. Print unka hathiyaar tha jaati-paati ke khilaaf. Simple link: dono 'anti-caste' awaaz the, isliye answer caste system pe likhna.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "H5-736", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print Revolution in Europe", "question": "'The shift from hand printing to mechanical printing led to the print revolution in Europe.' Explain the statement with examples.", "answer": "Mechanical printing caused a book boom—from about 20 million books in the late 15th century to about 200 million in the 16th century. German printers spread the press across Europe, making books cheap, abundant and information widely accessible.", "explanation": "Haath se chhapai dheemi thi, machine aate hi books ki barsaat ho gayi—20 million se seedhe 200 million! Isi ko Print Revolution kehte hain. Number yaad rakho: 20M se 200M, das guna jump.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "H5-742", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Gutenberg and the printing press", "question": "Which one of the following books was printed first by Gutenberg ?", "answer": "(c) Bible. The Gutenberg Bible was the first major book printed using his press.", "explanation": "Gutenberg ne sabse pehle Bible chhapi—yahi uska famous pehla kaam tha. Bas itna yaad rakho: Gutenberg ki pehli book = Bible.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "H5-743", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Bengal Gazette / Gangadhar Bhattacharya", "question": "Who among the following brought out 'Bengal Gazette; the first weekly newspaper?", "answer": "(C) Gangadhar Bhattacharya, who brought out the Bengal Gazette, often called the first Indian-edited weekly newspaper.", "explanation": "Yahan 'first weekly newspaper' Gangadhar Bhattacharya wala Bengal Gazette hai (Indian-edited). Dhyan: Hickey ka Bengal Gazette alag hai—jab 'Gangadhar' option ho toh use chuno.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "H5-744", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print and the French Revolution", "question": "Examine any three effects of Print culture on the French Revolution.", "answer": "Print popularised Enlightenment thinkers' ideas (reason over tradition/despotism), gave critical commentary on Church and State eroding the old order, and circulated literature mocking royalty—fostering hostility to the monarchy.", "explanation": "French Revolution se pehle print ne teen kaam kiye: Enlightenment ke vichaar phailaye, Church-State pe sawaal uthaye, aur raja-rani ka mazaak udaaya. Teeno milke logon ko bhadkaya. Hook: 'reason, criticism, mockery' = revolution ki recipe.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "H5-745", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print comes to India", "question": "How did print come in India? Explain with example.", "answer": "The printing press came to Goa with Portuguese missionaries in the mid-16th century. Jesuit priests printed in Konkani; the first Tamil book was printed in 1579 and the first Malayalam book in 1713.", "explanation": "India mein print Portuguese missionaries ke saath Goa pahuncha (16th century). Sabse pehle Tamil (1579) aur baad mein Malayalam (1713) books chhapi. Hook: India mein print ka entry gate = Goa, dharm prachaar ke liye.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "H5-746", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Visual culture in India", "question": "By the end of 19th century a new visual culture took shape in India. Explain the statement with examples.", "answer": "Cheaper printing let images be mass-produced. Painters like Raja Ravi Varma made images for wide circulation; cheap prints and calendars reached even poor homes, shaping popular ideas of religion, tradition, modernity and politics.", "explanation": "19th century ke ant mein saste prints aur calendars ghar-ghar pahunch gaye. Raja Ravi Varma jaise painters ne images mass mein banayi. Hook: Ravi Varma + saste calendar = naya visual culture.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "P1-806", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Importance of Power Sharing", "question": "Consider the following statements on Power Sharing and choose the correct option : I. It deepens democracy. II. It helps to reduce conflicts among social groups. III. It is a way to ensure political stability. IV. It brings socio-economic struggles.", "answer": "(A) I, II and III. Power sharing deepens democracy, reduces conflict among social groups and ensures political stability; it does NOT bring socio-economic struggles.", "explanation": "Dekho, power sharing ke teen achhe effect yaad rakho - democracy gehri hoti hai, groups ke beech jhagda kam hota hai, aur stability aati hai. Statement IV 'socio-economic struggles' galat hai kyunki power sharing toh shanti laata hai, ladai nahi. Memory hook: 'Deep-Reduce-Stable' teeno sahi, struggle wala bahar.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "P1-808", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Importance of Power Sharing", "question": "Consider the following statements on Power sharing and choose the correct option. I. Imposing the will of majority community over others. II. It helps in reducing the possibility of conflict between the social groups. III. Power sharing is a good way to ensure the stability of political order. IV. It brings socio-political opposition among parties.", "answer": "(B) II and III. Only reducing conflict between social groups and ensuring stability of political order are correct.", "explanation": "Is version mein sirf do statement sahi hain - II (conflict kam) aur III (stability). Statement I (majority ki marzi thopna) aur IV (parties mein opposition) dono galat hain. Yaad rakho: power sharing thopna nahi, jodna hai, isliye sirf II aur III.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "P1-830", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - Ethnic Composition", "question": "Explain the ethnic composition of Belgium.", "answer": "Of Belgium's population, 59% live in the Flemish region and speak Dutch, 40% live in Wallonia and speak French, and the remaining 1% speak German.", "explanation": "Belgium ka ethnic ganit: 59% Dutch (Flemish region), 40% French (Wallonia), 1% German. Hook: '59-40-1' yaad rakho - Dutch sabse zyada, French doosre, German thode. (Aur Brussels mein ulta - 80% French, 20% Dutch.)", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "P1-831", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - Ethnic Composition", "question": "What percentage of the population of Belgium lives in the Flemish region ?", "answer": "(c) 59%.", "explanation": "Flemish region mein Belgium ki 59% janta rehti hai aur Dutch bolti hai. Hook: Flemish = sabse bada group = 59%. Bas '59' number pakad lo.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "P1-832", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - Ethnic Composition", "question": "Define the term 'ethnic'.", "answer": "'Ethnic' refers to a social division based on shared culture; people in the same ethnic group believe in a common descent because of similarities of physical type or culture, or both.", "explanation": "'Ethnic' matlab culture ke aadhar pe banaa samajik bhed - ek hi ethnic group ke log maante hain ki unka pehle ek hi khaandaan/janam tha (physical ya cultural similarity se). Hook: ethnic = 'ek jaisi sanskriti/nasal wale log'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "P1-847", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Sri Lanka - Majoritarianism", "question": "Which one of the following languages was declared as the official language of Sri Lanka by an Act passed in 1956 ?", "answer": "(b) Sinhala.", "explanation": "1956 ke Act ne Sinhala ko Sri Lanka ki official language banaya, Tamil ko ignore karke. Hook: 'Sinhala 1956' - majority ki bhasha thopi gayi, yahin se jhagda shuru.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "P1-857", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Forms of Power Sharing", "question": "In modern democracies, power sharing arrangements can take many forms. Explain the statement.", "answer": "Power sharing takes several forms: horizontal (among legislature, executive, judiciary), vertical (among central, state and local governments), among different social groups (religious, linguistic), and among political parties, pressure groups and movements through competition.", "explanation": "Modern democracy mein power kai tareeke se baanti jaati hai - Horizontal (L-E-J), Vertical (Centre-State-Local), Social groups ke beech, aur Parties/Pressure groups ke beech. Hook: 4 forms = 'HVSP' (Horizontal, Vertical, Social, Political).", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "P2-865", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "Match Column – A with Column – B and choose the correct option : Column – A (Subjects) I. Defence II. Police III. Marriage IV. Computer Software Column – B (List/Subjects) 1. Concurrent List 2. Union List 3. State List 4. Residuary Subjects", "answer": "(D) I-2 (Defence-Union), II-3 (Police-State), III-1 (Marriage-Concurrent), IV-4 (Computer Software-Residuary).", "explanation": "Yaad rakho: Defence to poore desh ka maamla hai isliye Union List, Police har state apni dekhti hai to State List, Marriage/adoption dono level pe aata hai to Concurrent, aur Computer Software naya subject hai jo constitution likhte time tha hi nahi, isliye Residuary (jo bacha-khucha sab Centre ke paas). Trick: 'naya gadget = Residuary = Centre'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 1}, {"key": "P2-868", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "Match Column – A with Column – B and choose the correct option. Column – A (Subjects) I. E-Programming II. Police III. Education IV. Defence Column – B (List) 1. Concurrent List 2. Union List 3. State List 4. Residuary List", "answer": "(A) I-4 (E-Programming-Residuary), II-3 (Police-State), III-1 (Education-Concurrent), IV-2 (Defence-Union).", "explanation": "E-Programming ek naya-naya subject hai jo purane constitution me tha hi nahi – isliye Residuary. Police state ki, Education concurrent, Defence pakka Union. Hook: jo bhi 'tech/computer/e-' wala dikhe, samajh jao woh Residuary (Centre) me jaata hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 1}, {"key": "P2-877", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Indian federalism / quasi-federal nature", "question": "Which one of the following options prove that India is a quasi-federal state ? I. More powers with Centre II. Residuary subjects with Centre III. Equal subjects with Centre and States IV. Currency and Railways with Centre", "answer": "(b) I, II and IV. India is quasi-federal because the Centre has more powers, residuary subjects, and key subjects like currency and railways.", "explanation": "Quasi-federal matlab federal to hai par Centre thoda zyada powerful hai. Proof: zyada powers Centre ke paas (I), residuary subjects bhi Centre ke (II), aur currency-railways jaise important kaam bhi Centre (IV). Option III galat kyunki Centre-State ke subjects barabar nahi hote. Hook: Centre = bada bhai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "P2-891", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Decentralisation / three-tier government", "question": "Explain Decentralization in democracy.", "answer": "Decentralisation is the transfer of power from the Central and State governments to local governments (a third tier closest to the people).", "explanation": "Decentralisation ka simple matlab – sari power upar (Centre/State) hi na rakho, kuch neeche local government (panchayat/municipality) ko bhi do. Isse problems wahin solve hoti hain jahaan log rehte hain. Hook: 'power upar se neeche bhej do' = decentralisation.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "P2-892", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government", "question": "Explain the importance of Local self Government in democracy.", "answer": "Local self-government is important because many problems are best solved locally—local people know their problems and resources best and can directly participate in decision-making.", "explanation": "Local self-government isliye important hai kyunki gaon/sheher ke log apni problems aur resources ko sabse achha samajhte hain, aur khud decisions me hissa lete hain. Door baithe Centre se behtar wahin ke log faisla le sakte hain. Hook: 'apne mohalle ki problem apne log behtar samjhein'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "P2-894", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Decentralisation / three-tier government", "question": "Why is Indian decentralisation considered as the largest experiment in democracy?", "answer": "Because about 36 lakh elected representatives in panchayats and municipalities run local governance—a number larger than the population of many countries—making it the world's largest democratic experiment.", "explanation": "India me lagbhag 36 lakh log panchayat/municipality me chunke aate hain – itne to kai chote deshon ki poori aabadi bhi nahi hoti! Itne saare elected reps isliye ise duniya ka sabse bada democracy experiment kehte hain. Hook: '36 lakh netas = sabse bada experiment'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "P2-895", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government", "question": "Analyse how constitutional status for local government has helped to deepen democracy in India?", "answer": "It deepened democracy by increasing women's representation and voice, enabling direct citizen participation in decisions, building democratic habits, and realising the principle of local self-government.", "explanation": "Constitution me local government ko pakka status milne se democracy ki jadein gehri hui – mahilaon ko zyada seats/awaaz mili, aam log seedhe decisions me shaamil hue, aur logon me democracy ki aadat bani. Hook: 'local body ko constitution ka tag = democracy aur strong'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "P3-941", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Feminist Movement", "question": "Two statements are given below as Assertion (A) and Reason (R). Read the statements and choose the appropriate option : Assertion (A) : Women in different parts of the World organized themselves and agitated for equal rights. Reason (R) : Women's movement aimed at equality in personal and family life as well.", "answer": "(A) Both A and R are true, and R is the correct explanation of A.", "explanation": "Dekho yaar, duniya bhar mein aurton ne milkar barabari ke liye aawaaz uthayi - yeh hi feminist movement hai. Aur reason bhi sahi hai kyunki yeh movement sirf vote ya naukri tak nahi, balki ghar-parivaar mein bhi barabari maangti thi. Dono sahi, aur R hi A ko explain karta hai. Yaad rakhne ka trick: feminism = har jagah barabari, ghar se sansad tak.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 1}, {"key": "P3-942", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Family Laws / Religion-Politics", "question": "Which one of the following matters do NOT deal with the 'Family Laws'?", "answer": "(D) Finance. Family laws deal with marriage, divorce, inheritance, adoption - not finance.", "explanation": "Family laws ka matlab hai shaadi, talaaq, virasat (inheritance), bachche god lena - yeh sab parivaar se jude mamle. Finance ka isse koi lena-dena nahi, isliye wahi answer hai. Memory hook: 'parivaar ke jhagde' family law, paisa-vyapaar nahi. Yeh dikhata hai ki alag-alag dharmon ke family laws alag hote hain India mein.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "P3-944", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Women Empowerment", "question": "Mention any two steps taken by Indian Government for the women empowerment.", "answer": "Reserving one-third of seats in local government bodies (panchayats/municipalities) for women; enacting laws banning sex-selective abortion; schemes like Beti Bachao, Beti Padhao.", "explanation": "Sarkar ne aurton ko aage badhane ke liye kaafi kuch kiya - jaise panchayat aur municipality mein 1/3 seats aurton ke liye reserve ki, sex-selective abortion par ban lagaya, aur 'Beti Bachao Beti Padhao' jaisi schemes chalayi. Memory hook: 'reservation + kanoon + scheme' = women empowerment ka teen-pillar formula.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "P3-945", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Caste in Politics", "question": "How has caste system in modern India undergone great change? Explain.", "answer": "Economic development, urbanisation, growth of literacy and education, occupational mobility, and the constitutional prohibition of caste discrimination have weakened the old caste hierarchies.", "explanation": "Aaj ka India badal gaya hai - sheher badhe, padhai-likhai badhi, log nayi naukriyan karne const DC={History:'His',Geography:'Geo','Political Science':'Pol',Economics:'Eco'};
const DCOL=c=>getComputedStyle(document.documentElement).getPropertyValue('--'+c);
const esc=s=>(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const app=document.getElementById('app');
document.getElementById('ft').textContent=DATA.meta.sets;
let curChapter=null, filters={year:null,marks:null,type:null};

function go(v,arg){window.scrollTo(0,0);
 document.getElementById('n-home').className=v=='home'?'on':'';
 document.getElementById('n-hy').className=v=='hy'?'on':'';
 if(v=='home')renderHome();else if(v=='hy')renderHY();else if(v=='chapter'){curChapter=arg;filters={year:null,marks:null,type:null};renderChapter();}}

function conceptsFor(code){return DATA.concepts.filter(c=>c.chapter_code==code).sort((a,b)=>b.papers-a.papers||b.score-a.score);}

function renderHome(){
 let h=`<div class="stats">
  <div class="stat"><b>${DATA.meta.sets}</b><span>official papers analysed</span></div>
  <div class="stat"><b>4</b><span>exam years (2023–26)</span></div>
  <div class="stat"><b>${DATA.meta.total_questions.toLocaleString()}</b><span>questions classified</span></div>
  <div class="stat"><b>${DATA.meta.recurring_concepts}</b><span>high-yield repeats</span></div></div>`;
 h+=`<p style="color:var(--mut);margin:0 0 6px">Chapters are ranked by <b style="color:var(--ink)">marks per paper</b>. Tap a chapter for its most-repeated questions, official answers & Hinglish explanations.</p>`;
 for(const d of DATA.disciplines){const col=DC[d.name];
  h+=`<h2 class="sec"><span class="dot" style="background:var(--${col})"></span>${d.name} · 20 marks</h2><div class="cards">`;
  for(const c of d.chapters){
   h+=`<a class="ch" style="border-left-color:var(--${col})" onclick="go('chapter','${c.code}')">
    <div class="nm">${esc(c.name)}</div>
    <div class="meta"><span><span class="bigmark">${c.marks_per_paper}</span> mk/paper</span>
    <span class="badge ${c.importance}">${c.importance}</span></div>
    <div class="meta" style="margin-top:8px"><span>${c.total_q} Qs · ${c.years}/4 yrs</span><span>${c.concepts} key Qs ›</span></div>
   </a>`;}
  h+=`</div>`;}
 app.innerHTML=h;}

function pills(c){let y=c.years.map(x=>`<span class="pill yr">${x}</span>`).join('');
 return `<span class="pill freq">🔁 ${c.papers} papers</span>${y}<span class="pill">${c.marks} mark${c.marks>1?'s':''}</span>${(c.types[0]?`<span class="pill">${esc(c.types[0])}</span>`:'')}`;}

function qcard(c,i,star){const id='a'+Math.random().toString(36).slice(2,9);
 return `<div class="qcard${star?' star':''}">
  <div class="qtop">${star?'<span class="star-tag">⭐ MUST-DO · yeh padh liya toh sorted</span>':''}${pills(c)}</div>
  <div class="qtext">${esc(c.question)}</div>
  <span class="toggle" onclick="t('${id}',this)">▸ Show answer & explanation</span>
  <div class="ans" id="${id}">
   <div class="lab">Answer</div><div class="ansbox">${esc(c.answer)||'—'}</div>
   ${c.explanation?`<div class="lab">Samajh le (Hinglish)</div><div class="expl">${esc(c.explanation)}</div>`:''}
  </div></div>`;}
function t(id,el){const e=document.getElementById(id);e.classList.toggle('open');
 el.textContent=(e.classList.contains('open')?'▾ Hide':'▸ Show answer & explanation');}

function renderChapter(){let list=conceptsFor(curChapter);
 const ch=DATA.disciplines.flatMap(d=>d.chapters).find(x=>x.code==curChapter)||{name:curChapter,topics:[]};
 const col=DC[Object.keys(DC).find(k=>DATA.disciplines.find(d=>d.name==k&&d.chapters.some(x=>x.code==curChapter)))]||'accent';
 const years=[...new Set(list.flatMap(c=>c.years))].sort();
 const marks=[...new Set(list.map(c=>c.marks))].sort((a,b)=>a-b);
 const types=[...new Set(list.flatMap(c=>c.types))].filter(Boolean).sort();
 const f=l=>l.filter(c=>(!filters.year||c.years.includes(filters.year))&&(!filters.marks||c.marks==filters.marks)&&(!filters.type||c.types.includes(filters.type)));
 const shown=f(list);
 const topics=ch.topics||[];const maxt=topics.length?topics[0].count:1;
 const tid=s=>'t-'+(s||'x').replace(/[^a-z0-9]/gi,'');
 let h=`<div class="crumb"><a onclick="go('home')">Home</a> › <b>${esc(ch.name)}</b></div>
  <h2 class="sec" style="margin-top:4px"><span class="dot" style="background:var(--${col})"></span>${esc(ch.name)}</h2>
  <p style="color:var(--mut);margin:0 0 12px">${ch.marks_per_paper||''} marks/paper · <b style="color:var(--ink)">${ch.total_q_raw||list.length}</b> questions across ${DATA.meta.sets} papers · ${list.length} repeated (answers below)</p>`;
 if(topics.length){h+=`<div class="card-sec"><div class="lab">Topic breakdown · all ${ch.total_q_raw} questions (raw count)</div>`;
  topics.forEach(t=>{h+=`<div class="toprow" onclick="jump('${tid(t.topic)}')"><span class="tname">${esc(t.topic)}</span>
   <span class="tbarwrap"><span class="tbar" style="width:${Math.max(4,Math.round(100*t.count/maxt))}%;background:var(--${col})"></span></span>
   <span class="tcount">${t.count}</span></div>`;});h+=`</div>`;}
 const cf=(lab,key,vals,fmt)=>`<div class="chips"><span style="color:var(--mut);font-size:12px;align-self:center">${lab}:</span>`+
  `<span class="chip ${!filters[key]?'on':''}" onclick="setF('${key}',null)">All</span>`+
  vals.map(v=>`<span class="chip ${filters[key]==v?'on':''}" onclick="setF('${key}','${v}')">${fmt?fmt(v):v}</span>`).join('')+`</div>`;
 h+=`<div class="lab" style="margin-top:16px">Most-repeated questions · official answers + Hinglish</div>`;
 h+=cf('Year','year',years)+cf('Marks','marks',marks,v=>v+'m')+(types.length?cf('Type','type',types):'');
 if(!shown.length){h+='<div class="empty">No questions match these filters.</div>';app.innerHTML=h;return;}
 const groups={};shown.forEach(c=>{(groups[c.topic]=groups[c.topic]||[]).push(c);});
 const seen=new Set();
 topics.forEach(t=>{const g=groups[t.topic];if(!g)return;seen.add(t.topic);
  h+=`<div class="tsub" id="${tid(t.topic)}">${esc(t.topic)} · ${g.length} key Q${g.length>1?'s':''}</div>`;
  g.sort((a,b)=>b.papers-a.papers).forEach((c,i)=>h+=qcard(c,i,c.papers>=4));});
 Object.keys(groups).forEach(tp=>{if(seen.has(tp))return;
  h+=`<div class="tsub">${esc(tp||'Other')}</div>`;groups[tp].forEach((c,i)=>h+=qcard(c,i,c.papers>=4));});
 app.innerHTML=h;}
function jump(id){const e=document.getElementById(id);if(e)e.scrollIntoView({behavior:'smooth',block:'start'});}
function setF(k,v){filters[k]=v;renderChapter();}

function renderHY(){const top=[...DATA.concepts].sort((a,b)=>b.score-a.score||b.papers-a.papers).slice(0,60);
 let h=`<h2 class="sec">⭐ High-Yield for 2027 <span style="font-size:11px;color:var(--mut);text-transform:none;letter-spacing:0">· recency-weighted (2026×4 … 2023×1)</span></h2>
  <p style="color:var(--mut);margin:0 0 10px">If time is short, start here. These repeated most — and most recently.</p>`;
 top.forEach((c,i)=>{h+=`<div class="chlabel">${i+1}. <span style="color:var(--accent)">${esc(c.chapter_name)}</span> · ${c.discipline}</div>`+qcard(c,i,i<5);});
 app.innerHTML=h;}

function search(v){v=v.trim().toLowerCase();if(!v){go('home');return;}
 document.getElementById('n-home').className='';document.getElementById('n-hy').className='';
 const r=DATA.concepts.filter(c=>(c.question+' '+c.key+' '+c.chapter_name+' '+(c.answer||'')).toLowerCase().includes(v)).sort((a,b)=>b.papers-a.papers).slice(0,80);
 let h=`<h2 class="sec">🔍 ${r.length} results for “${esc(v)}”</h2>`;
 if(!r.length)h+='<div class="empty">Kuch nahi mila — try another keyword.</div>';
 r.forEach((c,i)=>h+=`<div class="chlabel"><span style="color:var(--accent)">${esc(c.chapter_name)}</span></div>`+qcard(c,i,false));
 app.innerHTML=h;}
renderHome();
</script></body></html>
