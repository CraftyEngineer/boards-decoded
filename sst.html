modes of transport.", "explanation": "India mein sabse zyada saaman aur log sadak se hi chalte hain. Kyun? Banane mein sasti, pahad par bhi ban jaati hai, aur seedha ghar tak le jaati hai. Note: id 1969 ka official answer galti se power-sharing ka chhapa hai - usse ignore karo, road wala point hi sahi hai.", "years": ["2023", "2025"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 4}, {"key": "H1-569", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Romanticism & culture", "question": "Explain Romanticism as a cultural movement in Europe.", "answer": "Romanticism was a cultural movement that stressed emotions, intuition and mystic feelings over reason and science. Through folk songs, dances, poetry and language (volksgeist - the spirit of the common people) it built a shared cultural heritage and a sense of national identity.", "explanation": "Romanticism ne kaha - dimaag se zyada dil ki suno! Logic-science ko side karke emotions aur folk-culture (gaane, kahaniyan, local bhasha) ko important maana. Idea simple: jab aam log apni mitti ke songs share karte hain, tabhi 'hum ek nation hain' wali feeling jagti hai. Magic word - 'volksgeist'.", "years": ["2023", "2025"], "papers": 2, "raw": 4, "marks": 2, "types": ["LA", "VSA"], "score": 4}, {"key": "H2-629", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "First World War & its effects", "question": "Analyse the implications of First World War on the economic and Political situation of India.", "answer": "WWI raised defence expenditure, funded by war loans and new taxes (e.g. income tax, customs duties). Prices nearly doubled (1913-1918) hurting common people, forced recruitment angered villages, and 1918-19 crop failures + influenza epidemic killed millions - creating deep discontent that fed nationalism.", "explanation": "Socho, jab pehla World War chhida to angrezon ne saara kharcha India par daal diya - taxes badhe, cheezein mehngi (double price!), aur zabardasti log fauj mein bharti kiye gaye. Upar se akaal aur flu ne lakhon jaanein le li. Memory hook: 'War aaya, jeb khaali, pet khaali' - isi gussa se aage andolan bhadke.", "years": ["2023", "2025"], "papers": 2, "raw": 6, "marks": 5, "types": ["LA", "VSA"], "score": 4}, {"key": "H2-643", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Rowlatt Act & Satyagraha", "question": "How was the Rowlatt Act opposed by the people of India ? Explain with three examples.", "answer": "People opposed the Rowlatt Act through Gandhi's call for nationwide hartals, peaceful rallies and shop closures, satyagraha and fasting. Protests were strongest in Punjab; the agitation led to the Jallianwala Bagh gathering, after which anger spread further across the country.", "explanation": "Rowlatt Act ke khilaaf logon ne hartal ki, dukaanein band ki, shanti se rallies aur satyagraha kiya - khaaskar Punjab mein. Isi maahaul mein Jallianwala Bagh wali ghatna hui. Hook: 'Bandh, rally, satyagraha' - teen tareeke yaad rakho 3-marker ke liye.", "years": ["2023", "2025"], "papers": 2, "raw": 4, "marks": 3, "types": ["SA", "VSA"], "score": 4}, {"key": "H2-645", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Non-Cooperation Movement", "question": "Explain any three effects of Non-Co-operation Movement on the Indian economy.", "answer": "Foreign goods were boycotted and burnt, foreign cloth imports halved (1921-22), liquor shops were picketed, and people took to khadi and Indian mills/handlooms - boosting Indian textile production while British trade and revenue fell.", "explanation": "NCM ne economy par seedha asar daala - videshi kapda jalaaya gaya, import aadha ho gaya, sharab ki dukaano par dharna, aur log khadi/Indian mills ki taraf gaye. Angrezon ka vyapaar gira, apni industry badhi. Hook: 'Videshi maal bahishkaar, swadeshi ka vyapaar'.", "years": ["2023", "2025"], "papers": 2, "raw": 6, "marks": 3, "types": ["SA"], "score": 4}, {"key": "H2-670", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Caste, leaders & MCQs", "question": "The author of Gulamgiri is:", "answer": "'Gulamgiri' (1873) was written by Jyotiba Phule. (Note: the options given in these papers were wrong - the correct author is Jyotirao/Jyotiba Phule.)", "explanation": "Dhyaan se! 'Gulamgiri' (1873) Jyotiba Phule ne likhi thi - caste aur chhua-chhoot ke khilaaf. In papers ke options galat the, par sahi jawab Jyotiba Phule hai. Hook: 'Gulamgiri = Phule ki kalam'.", "years": ["2023", "2025"], "papers": 2, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "H3-702", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Spread of Buddhism", "question": "'Buddhism emerged from eastern India and spread in several directions.' Read the following reasons for its spread and choose the correct option. I. Due to Cultural exchange II. Due to Silk route III. Due to trade & travellers IV. Due to European efforts", "answer": "(C) Only I, II and III are correct. Buddhism spread via cultural exchange, the Silk Route and traders/travellers - NOT European efforts. (Where asked which religion: (C) Buddhism.)", "explanation": "Buddhism eastern India se nikla aur Silk Route ke through traders aur travellers ke saath duniya bhar mein faila - cultural exchange se. 'European efforts' wala point galat hai (Europeans to bahut baad mein aaye). Yaad rakho: Buddhism = Silk Route ka passenger, Europe ka isse koi lena-dena nahi.", "years": ["2024"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "P3-955", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Gender Inequality - Measures", "question": "Analyze any three measures to remove discrimination against women in India.", "answer": "Increase women's literacy and invest in girls' education; boost women's political representation (reservation in legislatures); provide legal protection in employment - equal pay and anti-discrimination laws; create awareness against gender bias.", "explanation": "Gender bhedbhaav hatane ke liye - ladkiyon ki padhai badhao, rajneeti mein aurton ki bhागidari badhao, aur naukri mein kanooni suraksha (equal pay) do. Memory hook: 'shiksha + rajneeti + kanoon' yeh teen hathiyaar gender inequality ke khilaaf. Soch badle bina kuch nahi badlega.", "years": ["2023", "2025"], "papers": 2, "raw": 3, "marks": 2, "types": ["SA", "VSA"], "score": 4}, {"key": "P3-957", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Secularism in India", "question": "Read the given statements : • India has no official religion. • All the communities have freedom to profess and practice any religion in India. Which one of the following constitutional term is used for the above statements?", "answer": "(B/D) Secular - a state with no official religion and freedom for all communities to follow any religion is called a 'secular' state.", "explanation": "Jab kaha jaye 'koi official dharm nahi + sabko apna dharm maanne ki azadi', toh Constitution ka shabd hai 'Secular'. Yeh Preamble (prastavna) ka keyword hai. Memory hook: Secular = sab dharmon ke liye barabar jagah. Options mein Republic/Sovereign/Socialist se confuse mat hona - yahan Secular hi sahi.", "years": ["2024"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G3-346", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Map work – Hirakud Dam (Mahanadi, Odisha)", "question": "Hirakud – Dam", "answer": "Hirakud Dam is on the Mahanadi river in Odisha.", "explanation": "Map par Hirakud Dam = Odisha, Mahanadi river par. Yeh duniya ke sabse lambe dams mein se ek hai. Hook: 'Hirakud par Mahanadi' – jaise 'Hira' (heera) Odisha ka. Map question hai toh location pakki rakho.", "years": ["2023", "2024"], "papers": 2, "raw": 3, "marks": 1, "types": ["Map"], "score": 3}, {"key": "G4-375", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Explain any two features of Primitive Subsistence farming.", "answer": "Primitive subsistence farming is practised on small land patches with primitive tools (hoe, dao, digging sticks) and family/community labour; it depends on monsoon and natural soil fertility (slash-and-burn) and has low productivity.", "explanation": "Primitive subsistence kheti ekdum purani style: chhoti zameen, hoe-dao jaise basic tools aur ghar ke log hi kaam karte hain. Sab kuch monsoon aur mitti ki natural fertility par depend karta hai. Hook: 'primitive' yaani prachin, na machine na fertilizer, sirf nature ka bharosa.", "years": ["2023", "2024"], "papers": 2, "raw": 2, "marks": 2, "types": ["LA", "VSA"], "score": 3}, {"key": "G4-386", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Cropping seasons", "question": "Describe any three features of Rabi crop season.", "answer": "Rabi crops are sown in winter (October-December) and harvested in summer (April-June). Major Rabi crops are wheat, barley, peas, gram and mustard; grown mainly in Punjab, Haryana, UP and other northern/north-western states.", "explanation": "Rabi crops thand mein bote hain (Oct-Dec) aur garmi mein kaatte hain (Apr-June). Yaad rakho 'WBGPM' - Wheat, Barley, Gram, Peas, Mustard. Hook: 'Rabi = sardi ki fasal', winter season ki kheti.", "years": ["2023", "2024"], "papers": 2, "raw": 4, "marks": 2, "types": ["SA", "VSA"], "score": 3}, {"key": "G6-507", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Importance of manufacturing", "question": "The economic strength of a country is measured by the development of manufacturing industries. Explain with examples.", "answer": "A country's economic strength is gauged by its manufacturing development: strong industries add value to raw materials, create large-scale employment, reduce import dependence, raise exports/foreign exchange, and increase national income — developed nations all have robust manufacturing sectors.", "explanation": "Bhai simple logic — jis desh mein industries strong, woh desh ameer. Manufacturing kachche maal ko value deta hai, jobs banata hai aur export badhata hai. Isliye economists desh ki taqat naapne ke liye manufacturing dekhte hain. Example: India ka steel aur textile sector, ya Japan ka strong manufacturing.", "years": ["2023", "2024"], "papers": 2, "raw": 4, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G6-509", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "IT & Electronics industry", "question": "How has Information Technology affected Electronic Industry ? Explain.", "answer": "IT has driven growth of the electronics industry across products like phones and computers; continuous hardware and software advances improve productivity, service quality and efficiency and create customer-oriented products and new sectors (telecom, e-commerce).", "explanation": "IT ne electronics ko rocket bana diya — phone, computer, software sab tezi se grow hue. Naya hardware-software aata raha to productivity aur quality badhti gayi. Yaad rakho: IT = electronics ka turbo engine. Bengaluru ko India ki 'electronic capital' bolte hain.", "years": ["2023", "2024"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 3}, {"key": "P4-995", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Party systems (multi-party)", "question": "Assertion (A) : Multi-party system has been adopted in India. Reason (R) : It is capable of accommodating all the social and geographical differences in India.", "answer": "(A) Both Assertion (A) and Reason (R) are true and (R) is the correct explanation of (A) - India chose a multi-party system precisely because it can accommodate its great social and geographical diversity.", "explanation": "Dono statements sahi hain AUR Reason hi Assertion ka kaaran hai. Kyun India ne multi-party liya? Kyunki yehi humari social-geographical diversity ko sambhaal sakta hai. Toh A aur R dono true, aur R correctly explains A. Yaad rakho: 'diversity hi multi-party ki wajah hai' - isliye correct explanation.", "years": ["2023", "2024"], "papers": 2, "raw": 6, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "P4-999", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Party systems (one-party)", "question": "Which one of the following countries has 'one-party system' ? (A) United States of America (B) United Kingdom (C) India (D) China", "answer": "(D) China - China has a one-party system, where only one party (the Communist Party) is allowed to control and run the government.", "explanation": "One-party system = sirf ek hi party ko sarkar chalane ki permission. China iska sabse bada example hai (Communist Party). Yaad rakho jodi: China = one-party, America = two-party, India = multi-party. Bas yeh teen pakke kar lo!", "years": ["2023", "2024"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E1-6", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "World Bank – Criterion for Development", "question": "For comparing countries, their __________ is considered to be one of the most important attributes by the World Bank.", "answer": "Income (per capita / average income). The World Bank uses income as the main criterion to compare countries.", "explanation": "World Bank ke liye sabse important cheez hai income – yaani per capita ya average income. Inka simple logic: jis desh ke logon ki income zyada, woh utna hi developed. Yaad rakho: World Bank = Income/GDP, jabki UNDP = HDI. Dono ka criterion alag hai, exam isi pe confuse karta hai.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E1-9", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "HDI – Reading Country Data Tables", "question": "Carefully observe the given table and answer the question below: Data for India and its neighbouring countries for the year 2019 Country Gross National Income (GNI) per capita in US dollars (2011 PPP) Life Expectancy at birth Mean years of schooling for people aged 25 and above HDI Rank in the World (2018) Sri Lanka 12,707 77 10.6 73 India 6,681 69.7 6.5 130 Myanmar 4,961 67.1 5.0 148 Pakistan 5,005 67.3 5.2 154 Nepal 3,457 70.8 5.0 143 Bangladesh 4,976 72.6 6.2 134 Which of the following countries has the highest 'Human Development Index (HDI)' level?", "answer": "Sri Lanka. Among India and its neighbours (2019 data), Sri Lanka has the highest HDI (best rank, 73).", "explanation": "Table waale sawaal mein dhyaan do: HDI rank jitna chhota number, utna hi achha (rank 1 = best). Sri Lanka ka rank 73 hai – baaki sab se behtar, isliye highest HDI. India 130 pe hai. Trick: chhota rank = upar, bada rank = neeche. Numbers compare karke jawab nikaalo.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E1-10", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "HDI – Reading Country Data Tables", "question": "Which of the following countries has better rank in Human Development Index ?", "answer": "(c) India – among the given options, India has the better (higher) HDI rank.", "explanation": "Yeh sawaal options-based hai aur diye gaye choices mein se India ka HDI rank behtar nikalta hai. Yaad rakho 'better rank' ka matlab achhi position. Table/options dhyaan se padho kyunki yahan India sahi answer hai, par doosre sawaalon mein Sri Lanka bhi ho sakta hai – har baar data check karo.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E1-22", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "World Bank & UNDP – Reports", "question": "Read the following statements about Human Development and choose the correct option : (I) It is the composite Index prepared by United Nations Development Programme (UNDP). (II) Parameters to measure it are Longevity, Literacy and Per Capita Income. (III) Countries are ranked according to Developed and Low Developing countries. (IV) World Bank also prepares report of Human Development on the basis of Quality of Life.", "answer": "(a) I & II are correct – HDI is a composite index by UNDP, measured by longevity, literacy and per capita income. (Statements III and IV are wrong.)", "explanation": "Statement-based sawaal hai. Sahi do baatein: (I) HDI UNDP ka composite index hai, aur (II) iske parameters hain longevity (lambi umar), literacy aur per capita income. III aur IV galat hain (World Bank Human Development Report nahi banata). Trick: jahan UNDP + teen parameters likha ho, woh sahi statement hai.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E1-28", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Different People, Different Developmental Goals", "question": "Which one of the following is a developmental goal of the factory workers ?", "answer": "(a) Better wages – a developmental goal of factory workers.", "explanation": "Factory worker ka sapna kya hoga? Better wages (zyada tankhwah). Har banda apni zarurat ke hisaab se goal rakhta hai – mazdoor chahta hai achhi salary, kisaan chahta hai achhe daam. Memory hook: factory worker = wages. Yahi 'different people, different goals' ka core idea hai.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E2-76", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Natural products being changed into other forms is known as :", "answer": "(b) Secondary Product. Transforming natural products into other forms (e.g., cotton to cloth) is a secondary-sector activity.", "explanation": "Jab natural cheez ko badal kar nayi cheez banate hain - jaise kapas se kapda, ganne se cheeni - wo Secondary sector hai. Iska doosra naam 'industrial sector' bhi hai. Memory hook: 'Second step = banao/transform'.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E2-77", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Organised vs Unorganised sector", "question": "Which one of the following is a feature of the unorganized sector ?", "answer": "(d) There are rules and regulations but they are not followed. The unorganised sector is outside effective government control.", "explanation": "Unorganized sector ki pehchaan - rules hote toh hain par follow nahi hote, na job security, na fixed hours. Choti-choti scattered units jahan worker ka koi protection nahi. Memory hook: 'Un-organized = un-controlled, no niyam-paalan'.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E2-79", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Differentiate between secondary and tertiary sectors with examples.", "answer": "Secondary sector transforms natural products into other forms through manufacturing (e.g., cotton textile). Tertiary sector does not produce goods but provides services that support the other sectors (e.g., banking, transport).", "explanation": "Secondary cheez 'banata' hai (factory mein product), Tertiary cheez nahi banata - wo 'service' deta hai (bank, transport, teacher). Isiliye Tertiary ko 'service sector' kehte hain. Memory hook: 'Secondary = saaman, Tertiary = seva'.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 2}, {"key": "E2-81", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Employment generation", "question": "How can more employment be created/generated in India ? Explain with examples.", "answer": "More employment can be generated by promoting industries and services in semi-rural areas, developing tourism, regional crafts and IT, providing cheap credit, and investing in infrastructure like irrigation, transport and storage.", "explanation": "Naukri kaise badhayein? Semi-rural areas mein chhoti industries lagao, tourism aur local crafts ko badhao, IT aur infrastructure (roads, irrigation) mein invest karo. Idea ye hai ki kaam wahi laao jahan log rehte hain. Memory hook: 'Gaon mein kaam = shehar par bojh kam'.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 2}, {"key": "E2-82", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Which one of the following pairs is correctly matched ? (a) Primary Sector - Flower Cultivator (b) Secondary Sector - Milk Vendor (c) Tertiary Sector - Fisherman (d) Manufacturing Sector - Gardener", "answer": "(a) Primary Sector – Flower Cultivator. Growing flowers (floriculture) uses natural resources, hence primary sector.", "explanation": "Flower cultivator yaani phool ugaane wala - ye kheti jaisa hi hai, seedha zameen aur nature se. Isliye Primary sector. Milk vendor aur fisherman wale options galat jagah lage hain. Memory hook: 'Ugao ya nikaalo = Primary'.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E2-83", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Sectors and GDP", "question": "Which one of the following sectors contribute highest in the GDP of India ?", "answer": "(c) Tertiary. The tertiary (service) sector has the largest share in India's GDP.", "explanation": "GDP mein sabse bada hissa kiska? Tertiary (service) sector ka. Dhyan rakho - GDP mein Tertiary aage hai, par employment (naukri) mein Primary aage hai - ye do alag baatein hain, exam mein confuse mat hona! Memory hook: 'GDP mein Tertiary top, naukri mein Primary top'.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E2-87", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Explain how 'Tertiary Sector' is different from other sectors.", "answer": "Unlike the primary and secondary sectors which produce goods, the tertiary sector does not produce goods; it provides services (transport, banking, communication, education) that support and aid production in the other two sectors, hence it is called the service sector.", "explanation": "Primary aur Secondary cheezein 'banate' hain (goods). Tertiary kuch banata nahi - sirf 'services' deta hai aur baaki dono ki madad karta hai. Isiliye ise alag rakha jaata hai aur 'service sector' kehte hain. Memory hook: 'Tertiary = teesra, sirf seva'.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 2}, {"key": "E2-90", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Employment generation", "question": "Suggest any two ways to create more employment in the rural sector.", "answer": "Improve irrigation so multiple crops can be grown; build roads, transport and storage facilities; set up food/honey processing and cottage industries with cheap loans; and develop tourism and local services.", "explanation": "Gaon mein naukri kaise badhe? Irrigation sudhar do taaki saal mein zyada fasal ho, roads-transport-storage banao, aur local industries (honey, food processing) ko sasta loan do. Tourism aur services bhi help karti hain. Memory hook: 'Paani + raasta + chhoti factory = gaon mein kaam'.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "E3-178", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Role of Credit in Development", "question": "Debt trap is a situation where a loan pushes the debt-borrower into a situation from which recovery is very painful. Examine this statement.", "answer": "When credit is used but income fails (e.g., crop failure), the borrower cannot repay the loan and is forced to borrow more or sell assets, sinking deeper into debt—this is a debt trap, the negative role of credit.", "explanation": "Debt-trap = udhaar ka aisa jaal jisse nikalna bahut dard-bhara ho. Jaise kisaan ne loan liya, fasal kharab ho gayi, ab chukaane ke liye aur loan ya zameen bechni padi — aur fas gaya. Yeh credit ka negative side hai. Memory hook: 'loan pe loan = trap'.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "E3-183", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Money as Medium of Exchange", "question": "Which one of the following is the modern form of currency ?", "answer": "(a) Paper notes. Modern currency is in the form of paper notes (and coins), not commodity money like gold/silver.", "explanation": "Aaj-kal ki modern currency = paper notes (aur coins). Pehle log sona-chaandi ya cheezein exchange karte the, ab kaagaz ke note. Option (a). Simple: 'modern = paper note'.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E3-207", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Distribution of Credit", "question": "Which one of the following categories of urban households take the highest percentage of loan from the formal sector ?", "answer": "(d) Rich households. In urban India, rich households take the highest share of loans from the formal sector, while the poor rely more on informal sources.", "explanation": "Shehar mein formal sector se sabse zyada loan kaun leta hai? Ameer ghar (rich households) — option (d). Kyunki unke paas collateral aur papers hote hain. Garibon ko bank loan nahi milta, woh informal pe nirbhar. Yaad rakho: ameer = formal, garib = informal.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E4-212", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Impact of globalisation", "question": "Which one of the following is a challenge of Globalisation ?", "answer": "(d) Disproportionate Growth (unequal/uneven growth).", "explanation": "Globalisation ki sabse badi problem hai 'disproportionate growth' - matlab growth sabko barabar nahi milti. Bade log aur badi companies aur ameer ho jaati hain, chhote producers aur workers piche reh jaate hain. Memory hook: globalisation ka cake sabko equal slice nahi deta - kuch ko bada piece, kuch ko crumbs.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E4-213", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Liberalisation 1991", "question": "Why did the Indian government liberalize trade regulations in 1991 ?", "answer": "(c) The government wanted Indian producers to compete in the world market.", "explanation": "1991 mein government ne trade barriers hata diye taaki Indian producers duniya ke market mein compete kar sakein. Soch isko aise: pehle Indian companies ek 'protected bubble' mein thi, government ne bubble phoda taaki woh global competition mein strong banein. Memory hook: 1991 = India ne darwaaza khola world ke liye.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E4-220", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Meaning of globalisation", "question": "How is globalization a multi-dimensional concept ? Explain.", "answer": "Globalisation is multi-dimensional: it integrates economies (trade, investment, MNCs), spreads technology, exchanges culture/ideas, and increases movement of goods, services and people across countries.", "explanation": "Globalisation sirf paise ka khel nahi - ye 'multi-dimensional' hai matlab kayi aayam. Isme economy (trade, investment), technology, culture (ideas, tyohaar, khaana) sab juda hai. Memory hook: globalisation = ek thali jisme economy + culture + technology sab parose gaye. Sirf ek nahi, sab dimensions.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G-MAP-251", "chapter_code": "G-MAP", "chapter_name": "Geography (Map Work)", "discipline": "Geography", "topic": "Map work", "question": "On the same political outline map of India, locate and label any three of the following with suitable symbols : (i) Noida Software Technology Park (ii) Bailadila Iron-ore mines (iii) Tarapur Nuclear Power Plant (iv) Haldia Sea port", "answer": "Noida STP: Uttar Pradesh. Bailadila Iron-ore mines: Chhattisgarh. Tarapur Nuclear Power Plant: Maharashtra. Haldia Sea Port: West Bengal.", "explanation": "Yaad rakho: Noida toh UP mein hai hi (Delhi ke paas). Bailadila iron-ore Chhattisgarh ki shaan hai. Tarapur hamesha Maharashtra. Haldia port West Bengal mein, Kolkata ke neeche. Trick: 'Bailadila = Best iron of Chhattisgarh'. Map pe approximate location bhi chalega, bas state sahi ho.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 3, "types": ["Map"], "score": 2}, {"key": "G1-272", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Types of resources", "question": "Match the column - 1 with column - 2 and choose the correct option : Column - 1 (Resources) (I) Biological (II) Renewable (III) Non-renewable Column - 2 (Example) 1. Coal 2. Wildlife 3. Solar Energy", "answer": "I-2, II-3, III-1 (Biological/Biotic/Organic – Wildlife; Renewable – Solar Energy; Non-renewable – Coal).", "explanation": "Bas logic lagao: Biological/Biotic matlab jeev (Wildlife), Renewable matlab kabhi khatam na ho (Solar), Non-renewable matlab ek baar khatam to gaya (Coal). Memory hook: 'Jaanwar=bio, Suraj=renewable, Koyla=non-renewable'.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Match"], "score": 2}, {"key": "G2-304", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Colonial deforestation", "question": "Explain any two causes of depletion of forests during the colonial period in India.", "answer": "(i) Expansion of railways and shipbuilding needed huge timber. (ii) Spread of agriculture and commercial/scientific forestry plus mining cleared large forest areas.", "explanation": "Angrezon ke zamaane mein jungle kyun kam hue? Railways banane ke liye lakdi chahiye thi (sleepers), aur kheti badhane ke liye jungle saaf kiye gaye. Memory hook: 'Rail + Kheti = Jungle khatam'. Ye colonial period wala point exam mein aata hai.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G2-305", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Forest classification (Reserved/Protected/Unclassed)", "question": "Differentiate between reserved and protected forests.", "answer": "Reserved forests: over half of total forest land, the most valuable, given highest protection. Protected forests: about one-third of forest area, safeguarded from further depletion but with some permitted use.", "explanation": "Reserved forest = sabse zyada protected, aadhe se zyada area, koi chehere-chhaad allowed nahi. Protected forest = ek-tihaai area, थोड़ी छूट milti hai par depletion se bachaya jaata hai. Memory hook: 'Reserved = Royal protection, Protected = thodi chhoot'.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G3-333", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Narmada Bachao Andolan", "question": "Name the movement against the river project in Gujarat.", "answer": "Narmada Bachao Andolan (the movement against the Sardar Sarovar dam on the Narmada in Gujarat).", "explanation": "Gujarat mein Narmada par Sardar Sarovar dam ke against jo aandolan chala, uska naam hai Narmada Bachao Andolan. Medha Patkar ne ise lead kiya tha kyunki dam se log displace ho rahe the. Memory hook: 'Narmada bachao = Narmada Bachao Andolan' – naam mein hi answer chhupa hai!", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "G3-334", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Dams & floods", "question": "How have the big dams mostly been unsuccessful in controlling floods at the time of excessive rainfall ?", "answer": "During heavy rainfall reservoirs fill up, so dams must release the excess water; this sudden release aggravates floods downstream instead of controlling them. Dams have also induced floods by sedimentation.", "explanation": "Soch ke dekho – jab bohot zyada baarish hoti hai toh dam ka reservoir bhar jaata hai, aur majboori mein extra paani chhodna padta hai. Yeh achanak chhoda gaya paani neeche ke ilaake mein flood aur bigaad deta hai. Toh bade dam flood rokte nahi, kabhi-kabhi badha dete hain – yahi twist exam mein poocha jaata hai.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "G3-335", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Multi-purpose river projects", "question": "Analyse any two merits of multi-purpose river projects.", "answer": "Any two: (i) generate hydroelectric power, (ii) provide canals/water for irrigation; also help in flood control, water supply, navigation and soil conservation.", "explanation": "'Multi-purpose' matlab ek dam, kai kaam. Do easy merits yaad karo: bijli (hydroelectricity) aur sinchai (irrigation through canals). Extra mein flood control, peene ka paani aur navigation bhi aate hain. Trick: 'Bijli + Paani' – do magic words jo 2-marker mein full marks dila denge.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "G3-336", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Rainwater harvesting", "question": "Why is water harvesting system a viable alternative ?", "answer": "Because it is inexpensive, eco-friendly and affordable for common people, conserving water locally and reducing dependence on big projects.", "explanation": "Water harvesting isliye 'viable' (sahi/practical) hai kyunki yeh sasta hai, eco-friendly hai aur aam aadmi bhi apne ghar par kar sakta hai – bade dam jaise crores ki zarurat nahi. Memory hook: 'Sasta, Sundar, Tikau' – yahi teen cheezein likho aur marks pakke.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "G3-337", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Rainwater harvesting", "question": "Describe the process of ‘rooftop rainwater harvesting.’", "answer": "Rainwater falling on rooftops is carried through PVC pipes, filtered using sand and bricks, and stored in an underground tank (sump) for use; the excess recharges groundwater through a well.", "explanation": "Roof par giri baarish ko PVC pipe se neeche laate hain, sand-bricks se filter karte hain, aur underground sump mein store kar lete hain. Jo paani bach jaata hai woh well ke through zameen ke andar groundwater recharge kar deta hai. Picture banao: chhat -> pipe -> filter -> tank -> well. Step-by-step likhoge toh poore marks.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "G3-338", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Traditional water harvesting", "question": "Mention any two methods adopted by ancient India for water conservation.", "answer": "Any two traditional methods: guls/kuls (diversion channels in hills), khadins and johads (Rajasthan), tanks, inundation channels of Bengal, rooftop tankas of Rajasthan, stepwells and embankments.", "explanation": "Purane zamane mein log apni hi techniques se paani bachate the: pahaadon mein 'guls/kuls', Rajasthan mein 'khadins aur johads', Bengal mein 'inundation channels', aur ghar ki chhat par 'tankas'. Koi bhi do likh do. Trick: Region se jodo – Rajasthan=khadin/johad, Bengal=inundation, hills=gul/kul.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "G4-379", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Explain the features of primitive subsistence and commercial farming in India.", "answer": "Primitive subsistence: small land patches, primitive tools, family labour, depends on monsoon/natural fertility (slash-and-burn), low output. Commercial farming: modern inputs (HYV seeds, fertilizers, pesticides) for high productivity; commercialisation varies by region (rice in Punjab vs Odisha).", "explanation": "Yeh 5-marks wala dono ko ek saath compare karta hai. Trick: primitive = purana, chhoti zameen, monsoon par depend; commercial = naya, modern inputs, market ke liye. Dono ka contrast points mein likh do, marks pakke!", "years": ["2023"], "papers": 2, "raw": 5, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G4-380", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Explain the features of intensive subsistence and plantation farming in India.", "answer": "Intensive subsistence: high population pressure, labour-intensive, high biochemical inputs and irrigation, maximum output from small holdings. Plantation: single crop on a large area, capital-intensive, interface of agriculture and industry; produce is industrial raw material (tea, coffee, rubber).", "explanation": "Iss paired question mein intensive subsistence (chhoti zameen, zyada mehnat, ghani aabadi) aur plantation (bada area, ek crop, factory ke liye maal) ko compare karte ho. Hook: intensive = kam zameen par zor, plantation = bade area par ek fasal.", "years": ["2023"], "papers": 2, "raw": 5, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G4-398", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Government reforms", "question": "Explain any three institutional reforms taken for the development of Indian agriculture.", "answer": "Institutional reforms include crop insurance against natural calamities; setting up Grameen Banks and Cooperative Societies for low-interest loans (Kisan Credit Card, PAIS); special weather bulletins/agricultural programmes; and Minimum Support Price (MSP) to protect farmers from exploitation.", "explanation": "Institutional reforms = kisaano ki madad ke liye banaye gaye system. Yaad rakho: crop insurance, Grameen banks/cooperatives se sasta loan (KCC, PAIS), MSP aur weather bulletins. Hook: 'KCC + MSP + insurance' - teen point likho, 3 marks ready.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 3, "types": ["SA"], "score": 2}, {"key": "G5-469", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Iron ore", "question": "Explain any three characteristics of Durg-Bastar-Chandrapur iron-ore belt in India.", "answer": "The Durg-Bastar-Chandrapur belt lies in Chhattisgarh and Maharashtra. (1) It has very high-grade hematite ore in the Bailadila range; (2) the range has about 14 deposits ideal for steel-making; (3) ore is exported to Japan and South Korea via Vishakhapatnam port.", "explanation": "Durg-Bastar-Chandrapur belt Chhattisgarh aur Maharashtra mein hai. Teen khaasiyat: (1) Bailadila range mein top-grade hematite; (2) 14 deposits jo steel ke liye perfect; (3) ore Japan aur South Korea export hota hai (Vishakhapatnam port se). Bailadila = hematite ka hero!", "years": ["2023"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 2}, {"key": "G5-474", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Classification of minerals", "question": "Which one of the following is an example of the Ferrous Metal ?", "answer": "Nickel (keyed answer (d) Nickel in these papers). Ferrous minerals are those containing iron, such as iron ore, manganese, nickel and cobalt.", "explanation": "Ferrous matlab jismein loha (iron) ho. Options mein se Nickel ferrous group mein aata hai (iron ore, manganese, nickel, cobalt - sab ferrous). Yaad rakho: 'Ferrous = Fe (iron) wale'. Nickel, cobalt, manganese - iron family! Note: ids 984,1040,1090 ka same iron-ore/ferrous MCQ hai.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "G6-512", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Agriculture-industry relationship", "question": "Two statements are given below as Assertion (A) and Reason (R). Read both the statements carefully and choose the correct option. Assertion (A): Agriculture and industry are complementary to each other. Reason (R): Industrial development in the country is a necessary condition for the eradication of unemployment and poverty.", "answer": "(b) Both (A) and (R) are true, but (R) is not the correct explanation of (A). Agriculture and industry are indeed complementary, but that is not because industry alone removes poverty.", "explanation": "Assertion-Reason ka trick: dono statement sahi hain, par Reason, Assertion ko explain nahi karta. (A) kehta hai dono saath chalte hain, (R) kehta hai industry se garibi hatti hai — sahi hai par alag baat hai. Isliye answer (b).", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Assertion-Reason"], "score": 2}, {"key": "G6-514", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Cotton textile industry", "question": "Why does the textile industry occupy unique position in the Indian economy. Explain.", "answer": "The textile industry holds a unique position due to its large contribution to industrial production, huge employment generation (direct and indirect), significant foreign-exchange earnings through exports, and its self-reliant chain from raw material to finished cloth.", "explanation": "Textile industry India ki favourite hai kyunki ye sabse zyada logo ko kaam deti hai, GDP mein bada contribution karti hai aur export se paisa laati hai. Plus poori chain India mein hi — cotton se kapda tak. Isliye 'unique position'. Yaad rakho: Jobs + Export + Self-reliant.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G7-536", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Transport - Importance", "question": "Efficient means of Transport are pre-requisite for fast development.' Justify the statement.", "answer": "Efficient transport (land, water, air) is a pre-requisite for fast development: it moves goods, services and people, links production with markets, supports trade, industry, agriculture and tourism, and integrates the national economy.", "explanation": "Socho transport ke bina koi cheez factory se market tak pahunch hi nahi sakti. Roads, rail, pani, hawa - sab milke economy ki 'lifelines' banti hain. Yaad rakho: bina transport na trade, na development. Isliye fast growth ke liye efficient transport sabse pehli zaroorat hai.", "years": ["2023"], "papers": 2, "raw": 4, "marks": 3, "types": ["LA", "SA"], "score": 2}, {"key": "G7-540", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Road Transport - Problems", "question": "Analyse the problems of Road Transport in India.", "answer": "Problems of Indian road transport: network inadequate for the traffic, many roads are unsurfaced/kutcha and unusable in the rainy season, national highways are insufficient and poorly maintained, city roads are congested, and many roads lack bridges and level crossings.", "explanation": "India mein sadkein hain to sahi, par traffic ke hisaab se kam padti hain. Barsaat mein kacchi sadkein kichad ban jaati hain, highways pe jam, aur maintenance ki kami. Memory hook: 'quantity zyada, quality kam' - yahi road transport ka dukhda hai.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G7-543", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Railways - Socio-economic role", "question": "‘Railways in India promotes the socio-economic life of the country.’ Examine the statement.", "answer": "Railways promote socio-economic life by carrying people for business, tourism and pilgrimage, moving raw materials and finished goods for industry and agriculture, generating employment, and binding distant parts of the country into one economy and society.", "explanation": "Railway sirf saaman nahi, samaaj bhi jodti hai - shaadi, teerth, naukri sab ke liye log train pakadte hain. Industry ko kachha maal, kisan ko mandi - sab rail se. Hook: 'socio' = log/society, 'economic' = paisa/vyapar, dono ko rail sambhalti hai.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G7-545", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Pipeline Transport", "question": "How is pipeline transport network important in the transport system of India ? Explain with an example.", "answer": "Pipelines carry crude oil, petroleum products, natural gas and water over long distances; solids can move as slurry; they eliminate trans-shipment delays; running cost is minimal though initial cost is high. Example: HVJ (Hazira-Vijaipur-Jagdishpur) gas pipeline.", "explanation": "Pipeline matlab zameen ke neeche chhupi hui transport - tel, gas, paani sab bina ruke flow karte hain. Ek baar bana lo to chalana lagbhag muft. Example yaad rakho: HVJ gas pipeline. Hook: 'invisible but unstoppable.'", "years": ["2023"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA", "SA"], "score": 2}, {"key": "G7-548", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Communication", "question": "Explain the rapid transformation in the communication sector in the modern times.", "answer": "Communication has transformed rapidly: STD/ISD and mobile telephony connect the whole country, mass media (radio, TV, press, films) spread information, and the internet enables instant e-mail and voice-mail worldwide at negligible cost, supporting business and daily life.", "explanation": "Pehle chitthi hafton mein pahunchti thi, ab e-mail second mein. Mobile, internet, TV ne duniya ko chhota kar diya. Hook: 'sab kuch instant + sasta' - yahi modern communication ka jaadu hai.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G7-552", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Ports - Match", "question": "Match Column I with Column II and choose the correct option. Column I (Port): i. Kandla ii. Mumbai iii. Visakhapatnam iv. Kolkata. Column II (Type): 1. Riverine port 2. Deepest landlocked port 3. Biggest port 4. Port developed after independence.", "answer": "Correct option (a): i-4, ii-3, iii-2, iv-1 (Kandla - developed after independence; Mumbai - biggest port; Visakhapatnam - deepest landlocked port; Kolkata - riverine port).", "explanation": "Yaad karne ka tarika: Kolkata nadi (Hooghly) par = riverine; Vizag zameen ke andar chhupa = deepest landlocked; Mumbai = sabse bada; Kandla = azadi ke baad bana (Partition ke baad Karachi ki jagah). Hook: 'K-M-V-K = 4-3-2-1'.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Match"], "score": 2}, {"key": "H1-568", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Visual culture & allegory", "question": "Match the following attributes of allegory of Germania with its significance and choose the correct option : Attributes a. Broken Chains b. Breast-Plate with eagle c. Crown of oak leaves d. Sword Significance I. Heroism II. Readiness to fight III. Strength IV. Being free", "answer": "(B) a-IV (Broken Chains = Being free), b-III (Breast-plate with eagle = Strength), c-I (Crown of oak leaves = Heroism), d-II (Sword = Readiness to fight).", "explanation": "Germania, Germany ki 'allegory' yaani symbol-woman hai, aur uska har attribute kuch kehta hai. Yaad rakhne ka hook: tooti chain = azaadi (free), eagle waala armour = taqat (strength), oak-leaves ka taaj = bahaduri (heroism), talwaar = ladne ko taiyaar. Chaaron jod do aur option (B) pakka!", "years": ["2023"], "papers": 2, "raw": 4, "marks": 1, "types": ["Match"], "score": 2}, {"key": "H1-571", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Conservatism after 1815", "question": "Which one of the following ideologies were the European Governments driven by after the defeat of Napoleon in 1815 ?", "answer": "(b) Conservatism. After Napoleon's defeat in 1815, European governments were driven by conservatism, which sought to preserve traditional institutions - monarchy, the Church, social hierarchies and property.", "explanation": "Napoleon 1815 mein haar gaya, toh purane raja ghabra gaye aur bole 'ab koi change nahi - sab purana wapas!' Isi soch ka naam Conservatism: monarchy, Church aur traditions bachao. Hook: 'Conserve = sambhaal ke rakhna', toh answer hamesha Conservatism.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H1-572", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Unification of Italy", "question": "Analyse the role of Chief Minister Cavour who led the movement to unite the regions of Italy.", "answer": "Cavour, Chief Minister of Sardinia-Piedmont, was neither a revolutionary nor a democrat. Through tactful diplomacy and a clever alliance with France, he defeated Austria (1859) and led the drive to unify the northern Italian states under Sardinia-Piedmont.", "explanation": "Cavour Italy ka 'dimaag-wala' leader tha - na revolutionary na democrat, bas chalaak diplomat. Usne France se dosti karke Austria ko harwaaya. Hook: Cavour = cleverness; talwaar se zyada deal-making se Italy jodi.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "H1-574", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Chronology", "question": "Arrange the following in chronological order and choose the correct option : (I) Napoleonic wars (II) The Treaty of Vienna (III) Greek Struggle for Independence (IV) Slav Nationalism in Ottoman Empire", "answer": "(b) I, II, III, IV - Napoleonic Wars (to 1815) -> Treaty of Vienna (1815) -> Greek Struggle for Independence (1821-32) -> Slav Nationalism in the Ottoman Empire (later 19th century).", "explanation": "Timeline seedha hai: pehle Napoleon ke yuddh, uske haarne ke baad 1815 mein Treaty of Vienna, phir Greece ki 1821 wali azaadi ki ladai, aur sabse aakhir Ottoman ke andar Slav nationalism. Hook: Napoleon -> Vienna -> Greece -> Slav (I,II,III,IV).", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H2-641", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Non-Cooperation Movement", "question": "'Gandhiji felt the Khilafat issue as an opportunity to bring Hindus and Muslims under the umbrella of a unified national movement.' Explain the statement.", "answer": "After WWI the Ottoman Caliph (Khalifa) faced harsh treatment; Indian Muslims (Mohammad Ali & Shaukat Ali) formed a Khilafat Committee. Gandhi saw supporting Khilafat as a chance to unite Hindus and Muslims, so he combined it with Non-Cooperation in 1920 to build one broad national movement.", "explanation": "WWI ke baad Turkey ke Khalifa ke saath bura hua, to Indian Muslims naaraz the. Gandhi ji ne socha - Khilafat ko support karke Hindu aur Muslim dono ko ek manch par laaya jaa sakta hai. Isiliye Khilafat + Non-Cooperation ko jod diya. Hook: 'Khilafat ka pull = Hindu-Muslim ekta ka rasta'.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA"], "score": 2}, {"key": "H3-688", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "First World War", "question": "Choose the correct option from the following regarding Central Powers in the First World War :", "answer": "(a) Germany, Austria-Hungary and Ottoman Turkey were the Central Powers in WWI.", "explanation": "Central Powers matlab WWI mein ek taraf wali team: Germany, Austria-Hungary aur Ottoman Turkey. Inke saamne thi Allies (Britain, France, Russia, baad mein USA). Yaad rakho 'GAO' - Germany, Austria-Hungary, Ottoman - ye teeno 'central' Europe ke aaspaas the, isliye Central Powers.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H3-689", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Mass Production", "question": "In which one of the following countries was mass production an important feature in the 1920s ?", "answer": "(a) United States of America (USA) - mass production was a key feature in the 1920s.", "explanation": "1920s mein 'mass production' ka asli baadshah tha USA. Henry Ford ki assembly line ne cars ko sasta aur fast bana diya, ek standard model dhadadhad ban-ne lage. To jab bhi 'mass production' ya 'large-scale production 1920s' aaye, seedha answer USA likh do.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H3-690", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Indentured Labour", "question": "Explain any two methods that were used by the Europeans for the recruitment of the indentured labours.", "answer": "Agents recruited labourers with false promises about work, wages and living conditions; many were forced or tricked into migrating, often not even told the long sea journey or final destination.", "explanation": "Indentured labour matlab contract wale mazdoor jo girmit (agreement) pe foreign jaate the. Europeans ke agents jhoothe sapne dikhate the - achhi salary, badhiya kaam - par sach chhupa lete the. Kai baar to logon ko force karke ya bina bataye ship pe chadha diya jaata tha. Memory hook: 'jhootha vaada + dhokha' = recruitment trick.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "H3-691", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Spanish Conquest of America", "question": "How did the 'small pox' prove as the most powerful weapon of the Spanish conquerors in the mid-sixteenth century ? Explain.", "answer": "America's original inhabitants had no immunity against smallpox brought from Europe; it spread fast and killed entire communities, clearing the way for Spanish conquest - a more decisive weapon than guns.", "explanation": "Spanish ke paas guns the par asli 'weapon' tha chhoti maata (smallpox)! America ke local logon ne ye disease kabhi dekhi hi nahi thi, to unke body mein immunity zero. Beemari aag ki tarah faili aur poore-poore communities khatam ho gaye. Yaad rakho: biology ne Spanish ki jeet karwa di, bandook se zyada germs ne kaam kiya.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "H3-692", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Three Flows of Globalisation", "question": "There were three important developments that greatly shrank the pre-modern world. Identify the incorrect one from the following options : (a) The flow of trade (b) The flow of labour (c) The flow of capital (d) The flow of technology", "answer": "(d) Flow of Technology is incorrect. The three flows that shrank the world were trade (goods), labour (people) and capital (money).", "explanation": "Globalisation ke teen 'flow' yaad rakho: maal (trade), log (labour), aur paisa (capital). Technology iss list mein NAHI aati, isliye galat option wahi hai. Trick: 'Goods, People, Money' - 3 flows, technology bahar.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H3-694", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "First World War", "question": "State the names and countries of the two hostile groups that turned each other in the First World War.", "answer": "Allies - Britain, France and Russia (later joined by USA); Central Powers - Germany, Austria-Hungary and Ottoman Turkey.", "explanation": "WWI do teamon ke beech thi. Team 1 = Allies: Britain, France, Russia (baad mein USA bhi). Team 2 = Central Powers: Germany, Austria-Hungary, Ottoman Turkey. Bas do groups yaad rakho - ek 'Allies' (dost) aur doosri 'Central'. Cricket match samajh lo, dono taraf ke players alag.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "H4-718", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "First World War and industry", "question": "Why could Manchester never recapture its old position in the Indian market after the First World War ?", "answer": "After WWI, Manchester could not modernise and was unable to compete with new industrial powers like the USA, Germany and Japan; meanwhile Indian mills had captured the home market, so Britain lost its earlier dominance.", "explanation": "WWI ke baad Manchester purani shaan wapas nahi paa saka — kyunki na toh woh modernize hua, aur USA, Germany, Japan jaise naye players se compete nahi kar paaya. Tab tak India ne apna market khud sambhal liya tha! Memory hook: 'Manchester slow ho gaya, USA-Germany-Japan tez nikal gaye' — race haar gaya bechara.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "H4-719", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "First World War and industry", "question": "Why did Manchester imports decline in India ?", "answer": "During the First World War British mills were busy producing for the army's war needs, so they had less to export. This sharp fall in supply caused Manchester imports into India to decline.", "explanation": "First World War aaya toh British mills apni army ke liye war ka saaman banane me lag gayi — toh India bhejne ko maal hi kam bacha! Isliye Manchester ke kapde ke imports gir gaye. Memory hook: 'War aaya, factory army ke liye busy, India ke liye supply band' — simple cause-effect.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "H4-720", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "First World War and industry", "question": "Analyse any two benefits of the First World War to India.", "answer": "Two benefits: (1) British imports (esp. Manchester cloth) declined sharply, giving Indian industries a chance to capture the home market; (2) Indian factories got huge demand for war supplies, boosting domestic production and helping new industries grow.", "explanation": "War India ke liye chhupa hua vardaan tha! Ek — British maal aana band hua toh Indian factories ne ghar ka market pakad liya. Do — army ko jute, kapde, saaman chahiye tha, toh Indian factories full speed me chal padi. Memory hook: 'Britain busy in war = India ka business boom'.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "H4-721", "chapter_code": "H4", "chapter_name": "The Age of Industrialisation", "discipline": "History", "topic": "Inventions and inventors", "question": "Who among the following improved the steam engine ?", "answer": "(a) James Watt. He improved Newcomen's steam engine (1781) and patented it; his partner Mathew Boulton manufactured it, powering the Industrial Revolution.", "explanation": "Steam engine ko 'improve' karne wala bhai tha James Watt — usne Newcomen ke purane engine ko behtar banaya aur 1781 me patent karwaya. Memory hook: 'Watt = Watt (bijli/power)' — engine me power dene wala banda. Industrial Revolution ka engine isi James Watt se chala!", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H5-731", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print comes to Europe", "question": "How did print come into existence in Europe ? Explain.", "answer": "Chinese paper reached Europe via the Silk Route; Marco Polo brought woodblock printing knowledge from China. The big breakthrough was Johann Gutenberg's printing press (1430s), whose first printed book was the Bible, starting the print revolution.", "explanation": "Dekho, printing Europe mein aise hi nahi aayi—pehle China se paper aaya, phir Marco Polo woodblock printing ka idea le aaya. Asli game-changer tha Gutenberg, jisne 1430s mein printing press banaya aur sabse pehle Bible chhapi. Yaad rakho: China se kaagaz, Marco Polo se idea, Gutenberg se machine.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 3, "types": ["SA"], "score": 2}, {"key": "H5-737", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Authors and their books", "question": "Who among the following is the author of Gulamgiri?", "answer": "Jyotiba Phule. He wrote Gulamgiri (1871) attacking the caste system. (Note: in these papers some options were misprinted; the correct author of Gulamgiri is Jyotiba Phule.)", "explanation": "Gulamgiri likhi Jyotiba Phule ne—isme caste system ki gulami par karara waar tha. Dhyan rakho, kuch papers mein options galat chhpe the, par sahi jawab hamesha Jyotiba Phule hai. Hook: Phule = Gulamgiri = anti-caste.", "years": ["2023"], "papers": 2, "raw": 5, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H5-738", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Women writers and print", "question": "Which one of the following aspects was common among the writings of Kailashbashini Debi, Tarabai Shinde and Pandita Ramabai ?", "answer": "(b) They highlighted the experiences of women. All three women wrote about women's lives, confinement and injustice faced by them.", "explanation": "Kailashbashini, Tarabai aur Pandita Ramabai—teenon ne auraton ke dukh, ghutan aur na-insaafi par likha. Common baat = women's experiences. Hook: teen mahilaayein, teenon ka topic 'aurat ki zindagi'.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "H5-739", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Newspapers and public welfare (Krishnaji case)", "question": "Explain the main reason of publishing newspaper by Krishnaji ?", "answer": "Krishnaji published the newspaper to give useful local information and to allow free discussion of subjects of general utility, scientific investigation, and the country's antiquities, history and geography.", "explanation": "Krishnaji ne newspaper isliye nikala taaki local logon ko kaam ki jaankari mile aur science, itihaas, geography jaise topics par khuli bahas ho sake. Hook: Krishnaji = 'gyaan + charcha' ke liye akhbaar.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "H5-740", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Newspapers and public welfare (Krishnaji case)", "question": "How was the task of native newspaper and political association seen identical to the role of opposition ?", "answer": "Like an opposition, native newspapers and political associations critically examined government policies, suggested improvements, pushed for speedy implementation, and gathered information to recommend desirable changes.", "explanation": "Jaise vipaksh (opposition) sarkar par nazar rakhta hai, waise hi native newspapers aur political associations sarkar ki policies ki jaanch karke sudhaar suggest karte the. Hook: akhbaar = janta ka opposition.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "H5-741", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Newspapers and public welfare (Krishnaji case)", "question": "Analyze the reasons of popularity of newspapers during 19th century.", "answer": "Newspapers grew popular because they shaped and spread new ideas (social reform, different interpretations of faith), critically examined government policy, and became a medium for public debate and gathering knowledge.", "explanation": "19th century mein newspapers isliye popular hue kyunki ye naye vichaar phailate the, sarkar ki policies par sawaal uthate the aur public debate ka adda ban gaye. Hook: 'naye vichaar + sarkar pe nazar' = newspaper hit.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "P1-807", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Importance of Power Sharing", "question": "Consider the following statements on Power Sharing and choose the correct option : (I) Majoritarianism is the real spirit of democracy. (II) It creates balance and harmony in different groups. (III) It reduces the possibility of conflict among social groups. (IV) Power sharing is the essence of democracy.", "answer": "(B) II, III and IV. Balance/harmony, reducing conflict and being the essence of democracy are correct; majoritarianism is NOT the real spirit of democracy.", "explanation": "Yahan twist statement I mein hai - 'Majoritarianism real spirit of democracy hai' ye bilkul galat hai, kyunki majoritarianism toh ulta minorities ko dabata hai. Baaki teeno (II, III, IV) sahi hain. Trick: jahan bhi 'majoritarianism = democracy' likha ho, usko cross kar do.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P1-843", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - Power Sharing Model", "question": "Assertion (A) : Belgium amended their constitution four times. Reason (R) : Amendments were to enable everyone to live together in the same country.", "answer": "(a) Both (A) and (R) are true and (R) is the correct explanation of (A). Belgium amended its constitution four times so that all communities could live together peacefully.", "explanation": "Belgium ne constitution 4 baar badla - kyun? Taaki sab log (Dutch, French, German) ek hi desh mein milke rahein. Dono sahi aur R hi A ka kaaran hai. Hook: '4 baar amend = sabko saath rakhne ki koshish'.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Assertion-Reason"], "score": 2}, {"key": "P1-846", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Sri Lanka - Majoritarianism", "question": "Why did the feeling of alienation increase among the Sri Lankan Tamils in 1956 ? Explain.", "answer": "Alienation increased because the 1956 Act made Sinhala the sole official language (disregarding Tamil), government policies favoured Sinhalese for jobs and university seats, and the constitution gave Buddhism a protected/foremost status — marginalising the Tamils.", "explanation": "1956 mein Tamils ko paraya kyun lagne laga? Teen wajah - Sinhala ko akela official language banaya, jobs/colleges mein Sinhala logon ko preference, aur Buddhism ko special darja. Tamil log bole 'humein ginti hi nahi'. Hook: 'Bhasha + Naukri + Dharm' teeno mein Tamils peeche.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "P1-848", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Sri Lanka - Majoritarianism", "question": "Assertion (A) : Sri Lanka adopted ‘Tamil’ as the official language of the State. Reason (R) : The Govt. of Sri Lanka adopted a series of majoritarian measures.", "answer": "(d) A is false but R is true. Sri Lanka adopted Sinhala (not Tamil) as the official language, but it did adopt a series of majoritarian measures.", "explanation": "Trap alert! Assertion galat hai - Sri Lanka ne Tamil nahi, SINHALA ko official language banaya. Reason sahi hai - majoritarian measures liye gaye. Isliye 'A false, R true'. Hook: Tamil dekhte hi 'galat' bolo, Sinhala sahi tha.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Assertion-Reason"], "score": 2}, {"key": "P2-866", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "Match Column I with Column II and choose the correct option. Column I i. Union List ii. State List iii. Concurrent List iv. Residuary Subjects Column II 1. Agriculture 2. Computer Software 3. Banking 4. Education Options: (a) i – 3, ii – 1, iii – 4, iv – 2 (b) i – 4, ii – 3, iii – 2, iv – 1 (c) i – 2, ii – 4, iii – 3, iv – 1 (d) i – 1, ii – 2, iii – 3, iv – 4", "answer": "(a) i-3 (Union-Banking), ii-1 (State-Agriculture), iii-4 (Concurrent-Education), iv-2 (Residuary-Computer Software).", "explanation": "Banking jaisa paisa-wala kaam Centre ke Union List me, Agriculture/kheti state apne hisaab se dekhti to State List, Education dono ke liye zaroori isliye Concurrent, aur Computer Software naya tha to Residuary. Bas isi ek line me poora list ka game samajh aa jaata hai – Centre = bada/national, State = local, Concurrent = mil-jul ke.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Match"], "score": 2}, {"key": "P2-867", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Division of powers (three lists)", "question": "Match column − A with column − B and choose the correct option : Column − A (Subjects) (I) Banks (II) Agriculture (III) Education (IV) Computer Column − B (List) 1. Concurrent List 2. Union List 3. State List 4. Residuary Subjects", "answer": "(c) I-2 (Banks-Union), II-3 (Agriculture-State), III-1 (Education-Concurrent), IV-4 (Computer-Residuary).", "explanation": "Same logic phir se: Banks=Union (national paisa), Agriculture=State (local kheti), Education=Concurrent (sabko padhna hai), Computer=Residuary (naya subject). Ye matching baar-baar repeat hoti hai board me, to bas ratta maaro: B-A-E-C ka order = Union, State, Concurrent, Residuary.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Match"], "score": 2}, {"key": "P2-872", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Types of federations (coming together vs holding together)", "question": "Which one of the following is an example of 'coming together' federations ?", "answer": "(b) United States of America (USA). USA is a 'coming together' federation where independent states united to form one nation.", "explanation": "Coming together matlab pehle alag-alag azaad states the, phir khud milke ek desh banaya – jaise USA, Switzerland, Australia. India 'holding together' hai (ek desh ko todne ke bajaye saath rakha). Hook: USA = pehle alag the, phir 'united' hue – naam me hi United hai!", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P2-890", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Decentralisation / three-tier government", "question": "Identify the administrative level of Indian Government with the help of the information given in the box and choose the correct option : 1. Power shared between Central to Local Government. 2. The State Governments are required to share some powers and revenue with them. 3. It is called a three tier government.", "answer": "(c) Decentralized System. The three-tier sharing of power down to the local level describes a decentralised system.", "explanation": "Jab power Centre se neeche State aur fir Local government tak baanti jaaye aur teen level (Centre-State-Local) ban jaayein, use decentralised (teen-tier) system kehte hain. Hook: 'three-tier cake' = teen layer = Centre, State, Local.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P2-893", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Decentralisation / three-tier government", "question": "Describe any two steps taken by Indian government for decentralization.", "answer": "Two steps: (1) Established Panchayats in villages and Municipalities in towns; (2) Passed the 73rd and 74th Constitutional Amendments (1992) giving local bodies constitutional status and creating a three-tier democracy.", "explanation": "Do bade steps yaad rakho: (1) gaon me Panchayat aur sheher me Municipality banai, (2) 73rd aur 74th amendment (1992) laake unhe constitution me pakka status diya. Hook: '73 = gaon (Panchayat), 74 = sheher (Municipality)'.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "P2-902", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Linguistic diversity", "question": "Explain the importance of language diversity in India.", "answer": "India's vast language diversity (over a thousand mother tongues, 22 Scheduled languages) has actually helped unite the country, as most Indians understand more than one language and share a common identity despite differences.", "explanation": "India me hazaaron bhashayein hain par yeh diversity desh ko todti nahi, jodti hai – zyadatar Indians ek se zyada bhasha samajhte hain. Alag bhasha hote hue bhi sab 'Indian' feel karte hain. Hook: 'anekta me ekta' – bhashayein alag, dil ek.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "P2-903", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Linguistic diversity / Eighth Schedule", "question": "Differentiate between Scheduled and Non-Scheduled Languages.", "answer": "Scheduled languages are those listed in the Eighth Schedule of the Constitution (22 languages); Non-Scheduled languages are those not included in this schedule.", "explanation": "Simple difference: jo bhasha Eighth Schedule ki list me hai woh Scheduled (22 hain, jaise Hindi, Tamil, Odia), aur jo us list me nahi woh Non-Scheduled (jaise Garhwali, Bhojpuri). Hook: 'list me ho to Scheduled, list ke bahar to Non-Scheduled'.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "P2-904", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Linguistic diversity", "question": "‘The fusion of languages has united the country into one cultural entity.’ Explain the statement with an example.", "answer": "The blending and overlap of India's many languages—seen across its linguistic history and geography—ties people of different tongues into one shared culture, enabling mutual understanding and exchange.", "explanation": "Bhashaon ka aapas me ghul-mil jaana (words udhaar lena, ek doosre ko samajhna) desh ko ek cultural family bana deta hai. Jaise Hindi me kitne hi Urdu, Tamil, English ke shabd ghul gaye hain. Hook: 'bhashayein mix hoke ek culture banati hain'.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "P4-977", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Meaning of a political party", "question": "Explain the meaning of a 'political party'.", "answer": "A political party is a group of people who come together to contest elections and hold power in the government. They agree on some policies and programmes for society to promote the collective good.", "explanation": "Definition simple hai bhai: political party = ek group jo milkar election ladta hai aur sarkar mein power paana chahta hai. Inka apna ek agenda/programme hota hai jise wo society ke bhale ke naam pe leke chalte hain. Teen cheezein yaad rakho - leaders, active members, aur followers. Bas yahi ek party banate hain!", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "P4-980", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Reforms to political parties", "question": "Analyze the measures taken to reform political parties in India.", "answer": "Measures taken: (1) Anti-defection law - an MLA/MP changing party can lose their seat; (2) Supreme Court order making it mandatory for candidates to file an affidavit declaring property and criminal cases; (3) Election Commission order making it compulsory for parties to hold organisational elections and file income-tax returns.", "explanation": "Teen reforms yaad rakho jo PEHLE SE laagu ho chuke hain: (1) Anti-defection law - dal-badal karoge to seat gayi, (2) affidavit - candidate ko apni property aur criminal cases batane padte hain, (3) EC ne kaha - party ke andar election karao aur income tax bharo. In teeno ka source bhi yaad rakho: law, Supreme Court, Election Commission - alag-alag teen jagah se aaye hain.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 3, "types": ["LA", "SA"], "score": 2}, {"key": "P4-996", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Party systems (multi-party)", "question": "Which one of the following countries adopted multi-party system ?", "answer": "(b) India - India follows a multi-party system.", "explanation": "Seedhi baat: India = multi-party system ka classic example. America = two-party, China = one-party, India = multi-party. Yeh teen yaad kar lo to har MCQ mein sahi nikaloge. India mein itni saari parties hain na - isiliye multi-party!", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P4-1004", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Regional parties", "question": "Which of the following States is ruled by a regional party ?", "answer": "(c) Odisha - Odisha is ruled by a regional party (Biju Janata Dal).", "explanation": "Regional party matlab kisi ek rajya/kshetra tak simit party. Odisha mein Biju Janata Dal (BJD) ki sarkar rahi hai - isliye answer Odisha. Yaad rakho: BJD = Odisha ki regional party. Jab bhi 'kaunsa state regional party se chalta hai' poochein, Odisha pakka contender hai.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P4-1005", "chapter_code": "P4", "chapter_name": "Political Par
