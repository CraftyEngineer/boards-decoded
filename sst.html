 Economy", "discipline": "Economics", "topic": "Employment generation", "question": "What efforts are being made by the government to increase employment in the urban areas ? Explain.", "answer": "In urban areas the government boosts employment by investing in infrastructure, transport, education, health, banking, trade, tourism and the IT sector, and by promoting regional crafts and industries, creating many job opportunities.", "explanation": "Shehron mein naukri kaise badhe? Government infrastructure, transport, education, health, IT, tourism aur trade mein paisa lagati hai - jisse naye kaam paida hote hain. Memory hook: 'Shehar = services + IT + infra mein naukri'.", "years": ["2024", "2025", "2026"], "papers": 3, "raw": 3, "marks": 3, "types": ["LA", "SA"], "score": 9}, {"key": "E3-165", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Reserve Bank of India", "question": "Explain any three functions of the Reserve Bank of India.", "answer": "RBI (1) issues currency notes, (2) supervises formal loan sources and regulates banks, (3) ensures banks keep minimum cash balances, and (4) monitors that banks lend to small cultivators/industries, not just big businesses.", "explanation": "RBI hamare desh ki 'mother bank' hai. Kaam: (1) note chhaapna, (2) sab banks ko control/supervise karna, (3) banks ko minimum cash rakhne ko kehna, (4) dekhna ki loan chhote kisaan tak bhi pahunche. Koi 3 likh do — note chhaapna to pakka likhna!", "years": ["2023", "2026"], "papers": 3, "raw": 5, "marks": 3, "types": ["SA"], "score": 9}, {"key": "E4-233", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Foreign trade and globalisation", "question": "‘‘Foreign trade results in connecting the markets in different countries.’’ Support the statement in context of globalisation.", "answer": "Foreign trade connects markets of different countries: it lets producers sell beyond domestic markets, gives consumers a wider choice of goods, opens new investment and job avenues, and integrates markets - a key route to globalisation.", "explanation": "Foreign trade alag-alag deshon ke markets ko jodta hai. Producer apne desh ke bahar bhi bech sakta hai, aur consumers ko zyada choice milti hai. Memory hook: foreign trade = pul (bridge) jo do deshon ke baazaar ko jodta hai. Isse hi markets integrate hote hain aur globalisation badhta hai.", "years": ["2024", "2025", "2026"], "papers": 3, "raw": 5, "marks": 1, "types": ["Assertion-Reason", "VSA"], "score": 9}, {"key": "G3-347", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Map work – Salal Dam (Chenab, J&K)", "question": "Name the dam built on River Chenab in India.", "answer": "Salal Dam is the major dam on the Chenab river (in Jammu & Kashmir).", "explanation": "Chenab river par bada dam = Salal Dam (Jammu & Kashmir mein). Chahe map par 'Salal' locate karo ya 'Chenab ka dam' naam poochha jaaye, answer same hai. (Printed 'Dandi/Madras' wale options galat/typos hain.) Hook: 'Chenab par Salal' – CH se SA, do crisp naam jod lo.", "years": ["2024", "2025", "2026"], "papers": 3, "raw": 10, "marks": 1, "types": ["Map", "VSA"], "score": 9}, {"key": "G6-532", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Map work - Software Technology Parks", "question": "Name the place where a major Software Technology Park is located in Karnataka.", "answer": "Bengaluru — the major Software Technology Park located in Karnataka (India's electronic capital).", "explanation": "Karnataka ka software technology park = Bengaluru, jise India ki 'Silicon Valley' / electronic capital bhi kehte hain. Map mein south India mein point karo. Yaad rakho: 'Karnataka = Bengaluru IT'. (Kuch keys mein answer Uttarakhand/mixed likha mila — sahi Bengaluru hai.)", "years": ["2024", "2025", "2026"], "papers": 3, "raw": 8, "marks": 1, "types": ["Map", "VSA"], "score": 9}, {"key": "G7-559", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Map work - Gujarat Port", "question": "A major Sea port located in Gujarat.", "answer": "The major sea port in Gujarat is Kandla (Deendayal Port), a tidal port developed after independence.", "explanation": "Gujarat ka major sea port = Kandla (ab Deendayal Port), Partition ke baad Karachi ki jagah banaya gaya. id 1783 ka 'Chhattisgarh' answer galat hai - Kandla Gujarat mein hai. Hook: 'Kandla-Kutch-Gujarat'.", "years": ["2024", "2025", "2026"], "papers": 3, "raw": 8, "marks": 1, "types": ["Map"], "score": 9}, {"key": "P5-1026", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Assessing outcomes of democracy", "question": "How do democracies lead to peaceful and harmonious life among citizens ? Explain.", "answer": "Democracy leads to peaceful, harmonious life and is responsive to citizens by holding regular free elections, accommodating diversity, ensuring transparency and open debate, addressing people's needs, and resolving conflicts without violence.", "explanation": "Democracy logon ke beech shaanti aur harmony laati hai - kyunki jhagde elections aur baat-cheet se sulajhte hain, har group ki sunwai hoti hai, aur sarkaar logon ki zaroorat ka dhyan rakhti hai. Hook: 'sabki sunwai = peace + harmony'.", "years": ["2024", "2025", "2026"], "papers": 3, "raw": 4, "marks": 5, "types": ["LA"], "score": 9}, {"key": "E1-57", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Development Indicators – Literacy, IMR, Attendance", "question": "Which one of the following definitions is most suitable for the ‘Literacy Rate’ ?", "answer": "Literacy Rate is the proportion of the literate population in the 7 years and above age group. (MCQ answer: 7 years.)", "explanation": "Literacy rate naapte waqt sirf 7 saal aur usse upar ke logon ko ginte hain – isse chhote bachhe count nahi hote. Memory hook: 'saat saal se shuru'. Chahe fill-in-the-blank ho ya definition, jawab hamesha '7 years and above' hi rahega.", "years": ["2024", "2026"], "papers": 3, "raw": 9, "marks": 1, "types": ["MCQ"], "score": 8}, {"key": "E3-151", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Formal vs Informal Sources of Credit", "question": "‘Cooperative society’ is an example of which source of ‘credit’ ?", "answer": "Formal source of credit. Cooperative societies are supervised by the RBI and offer credit at low, fair interest rates.", "explanation": "Cooperative society hamesha FORMAL source maani jaati hai, kyunki yeh RBI ke niyam follow karti hai aur sasta loan deti hai. Bas itna yaad rakhna: cooperative = sab milke chalate hain par fir bhi formal. Ek line ka answer hai, exam mein pakka aayega.", "years": ["2024", "2025"], "papers": 3, "raw": 9, "marks": 1, "types": ["Case-based"], "score": 8}, {"key": "G3-345", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Bamboo drip irrigation (Meghalaya)", "question": "Which one of the following is the irrigation system in Meghalaya ?", "answer": "Bamboo drip irrigation system (prevalent in Meghalaya).", "explanation": "Meghalaya mein paani bansh (bamboo) ki naliyon se boondh-boondh karke plants tak pahunchaya jaata hai – ise 'bamboo drip irrigation' kehte hain, ek 200 saal purani technique. Hook: 'Bamboo + Drip = Meghalaya'. Yeh MCQ har saal aata hai, pakka kar lo.", "years": ["2024", "2026"], "papers": 3, "raw": 9, "marks": 1, "types": ["MCQ"], "score": 8}, {"key": "G5-448", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Solar energy", "question": "“Solar energy has a bright future in India.” Explain the statement with examples.", "answer": "India, being a tropical country, receives abundant sunlight year-round, giving it huge solar potential. Solar energy is gaining popularity in rural areas and large solar power plants are being set up across the country, making its future bright.", "explanation": "India ek tropical desh hai - yahan saal bhar dhoop khoob milti hai, toh solar energy ka future ekdum chamakdaar hai! Gaon-gaon mein solar lag raha hai aur bade solar parks ban rahe hain. Suraj free hai, clean hai - isse behtar kya? Bright future, literally aur figuratively!", "years": ["2024", "2026"], "papers": 3, "raw": 3, "marks": 5, "types": ["LA", "VSA"], "score": 8}, {"key": "G6-526", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Air pollution", "question": "Explain the role of industries in increasing air pollution and suggest any three measures to reduce air pollution.", "answer": "Industries pollute air by emitting undesirable gases (SO2, CO) and particulate matter (dust, smoke) from manufacturing and fossil-fuel burning. Measures: increase chimney height, fit smokestacks with electrostatic precipitators/scrubbers/filters, and switch to cleaner fuels (gas/oil) or renewable energy.", "explanation": "Factories hawa kaise kharab karti hain? Zehrili gas (SO2, CO) aur dhuआn-dhool (particulate matter) chodti hain. Control: lambi chimney, precipitator/scrubber lagao, aur coal ki jagah clean fuel/gas use karo. Memory hook: gas+dust andar, precipitator se saaf.", "years": ["2024", "2025"], "papers": 3, "raw": 4, "marks": 5, "types": ["LA"], "score": 8}, {"key": "H1-580", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Economic hardship of 1830s", "question": "How were the years of 1830s of great economic hardship in Europe ? Explain.", "answer": "The 1830s saw great economic hardship: enormous population growth meant more job-seekers than jobs; the poor migrated to overcrowded slums; small producers faced stiff competition from cheap machine-made English imports; weavers (e.g. in Silesia) were exploited; and rising food prices with bad harvests caused widespread pauperism.", "explanation": "1830s Europe ke 'kharab din' the - aabaadi tezi se badhi par naukri kam, gaon se log shehar ke gande slums mein aaye, chhote karigar England ke saste machine-made saaman ke aage haar gaye, aur khaane ke daam aasmaan chhoo gaye. Silesia ke julaahe bhookhe mar rahe the. Hook: zyada log + kam kaam + mehngaai = bawaal.", "years": ["2023", "2025", "2026"], "papers": 3, "raw": 3, "marks": 5, "types": ["LA"], "score": 8}, {"key": "H1-601", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Napoleonic Code & reforms", "question": "‘‘In the administrative field Napoleon had incorporated revolutionary principles.’’ Explain the statement.", "answer": "The Napoleonic (Civil) Code of 1804 and Napoleon's reforms made administration rational and efficient: they abolished privileges based on birth, established equality before law and secured the right to property; simplified administrative divisions; abolished the feudal system and freed peasants from serfdom and manorial dues; removed guild restrictions; and improved transport and communication.", "explanation": "Napoleon ne 1804 ka Civil Code laakar administration ko 'rational aur efficient' bana diya - janm ke aadhaar par privileges khatam, sab kanoon ke saamne barabar, property ka adhikaar pakka, feudal system aur serfdom khatam, aur transport behtar. Hook: Napoleon = ladaiyon ke saath ek 'reformer' bhi.", "years": ["2024", "2025"], "papers": 3, "raw": 3, "marks": 5, "types": ["LA", "SA"], "score": 8}, {"key": "E2-104", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Study the following picture. The work done in the picture comes under which one of the following sectors of the economy ?", "answer": "(C/D) Tertiary. The work shown is a service activity (e.g., transport/sales), so it belongs to the tertiary sector.", "explanation": "Picture mein dikha kaam ek service hai (jaise transport, sales, delivery) - isliye Tertiary sector. Picture-based questions mein agar koi seva de raha hai toh Tertiary. Memory hook: 'Seva dikhi = Tertiary'.", "years": ["2024", "2025"], "papers": 3, "raw": 7, "marks": 1, "types": ["MCQ"], "score": 7}, {"key": "H1-577", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Unification of Italy", "question": "Explain the process of unification of Italy.", "answer": "Italy was unified in stages: Mazzini's Young Italy spread the idea; Cavour (PM of Sardinia-Piedmont) used diplomacy and a French alliance to defeat Austria (1859); Garibaldi with his Red Shirts conquered the Kingdom of the Two Sicilies (1860); these regions joined Sardinia-Piedmont, and in 1861 Victor Emmanuel II was proclaimed king of a united Italy.", "explanation": "Italy ki unification ek teen-hero wali film hai: Mazzini ne idea aur josh diya, Cavour ne diplomacy se Austria ko nikala, aur Garibaldi ne 'Red Shirts' sena se South (Sicily) jeeta. Sab tukde Sardinia-Piedmont mein mile aur 1861 mein Victor Emmanuel II raja ban gaya. Hook: Soch (Mazzini) + Smartness (Cavour) + Sword (Garibaldi).", "years": ["2023", "2024", "2026"], "papers": 3, "raw": 6, "marks": 5, "types": ["LA", "SA"], "score": 7}, {"key": "H1-578", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "French Revolution & nation-making", "question": "How did the French Revolution play an important role in creating the idea of 'nation' in Europe ? Explain.", "answer": "The French Revolution (1789) was the first clear expression of nationalism. It transferred sovereignty from the monarchy to a body of French citizens, created a collective identity through symbols (tricolour, National Assembly), uniform laws and a common language, and declared a mission to liberate the peoples of Europe - spreading nationalist ideas via Jacobin clubs and French armies.", "explanation": "French Revolution ne pehli baar dikhaya ki 'desh raja ka nahi, janta ka hai' - sovereignty raja se hatkar citizens ke paas aayi. Inhone ye idea poore Europe mein failaaya, yahan tak ke kaha 'hum baaki Europe ko bhi azaad karayenge'. Jacobin clubs aur French fauj ne nationalism har jagah boya. Hook: pehli baar 'We the citizens' - yahin se nation shuru.", "years": ["2023", "2025"], "papers": 3, "raw": 3, "marks": 5, "types": ["LA"], "score": 7}, {"key": "E2-84", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Organised vs Unorganised sector", "question": "Examine the benefits that are enjoyed by the people working in the organized sector.", "answer": "Organised-sector workers enjoy job security, fixed working hours with paid overtime, paid leave, medical/health benefits, provident fund, pension, and protection under government rules.", "explanation": "Organized sector mein kaam karne waalon ki masti - job security, paid chhutti, medical, PF, pension, fixed timing. Sab kuch rules ke according. Isiliye log organized sector pasand karte hain. Memory hook: 'Organized = security + sab benefits'.", "years": ["2023", "2026"], "papers": 3, "raw": 3, "marks": 3, "types": ["LA", "SA"], "score": 6}, {"key": "E2-101", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Employment generation", "question": "Give any three suggestions to increase the employment in rural society and explain them.", "answer": "Provide cheap credit to farmers, build irrigation, transport and storage facilities, set up local agro-based and cottage industries, develop social services like schools/health, and promote tourism and crafts to create extra rural jobs.", "explanation": "Gaon mein kaam laao: sasta loan, irrigation, roads-storage, local industries (food processing, crafts), school-hospital aur tourism. Idea: gaon mein hi rozgaar mile taaki log shehar na bhaagein. (Sarpanch/village head wale questions bhi yahi maangte hain.) Memory hook: 'Gaon mein hi kaam = palaayan band'.", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 5, "marks": 5, "types": ["LA", "SA", "VSA"], "score": 6}, {"key": "G5-438", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Energy conservation", "question": "Explain 'Energy saved is energy produced'.", "answer": "Saving energy means we don't need to produce extra energy, so saved energy effectively equals produced energy. By using renewable sources, ensuring affordable/reliable access, adopting energy-efficient habits and practising reduce-reuse-recycle, we conserve exhaustible resources and ease pressure on power generation.", "explanation": "Yeh ek dum mast line hai - jitni bijli tum bacha lo, utni hi nayi bijli banane ki zaroorat khatam! Fan-light band karna, LED lagana, public transport use karna - yeh sab 'production' jaisa hi kaam karta hai bina naya power plant banaye. Agle baar light off karte waqt sochna: tumne abhi 'energy produce' ki hai.", "years": ["2023", "2026"], "papers": 3, "raw": 7, "marks": 2, "types": ["Case-based", "LA", "VSA"], "score": 6}, {"key": "G5-440", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Sustainable energy & development", "question": "How is energy a basic requirement for economic development ? Explain.", "answer": "Energy is the backbone of economic development - it runs agriculture, industries, transport and communication. Manufacturing, development projects and rising living standards all depend on adequate energy supply, so economic growth is impossible without it.", "explanation": "Bhai, koi bhi desh tabhi tarakki karta hai jab uske paas energy ho. Factory chalani ho, fasal ugani ho, saaman ek jagah se doosri le jaana ho - sab ke liye energy chahiye. Isliye energy ko development ki 'basic requirement' kehte hain. No energy = no growth.", "years": ["2024"], "papers": 3, "raw": 3, "marks": 5, "types": ["LA", "VSA"], "score": 6}, {"key": "H1-585", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Greek War of Independence", "question": "How did the 'Treaty of Constantinople' of 1832 recognize Greece as an independent nation ? Explain.", "answer": "The Greek War of Independence (from 1821) mobilised nationalist feeling among educated elites across Europe; Greeks won support from West European sympathisers and poets like Lord Byron. With help from Britain, France and Russia the struggle succeeded, and the Treaty of Constantinople (1832) recognised Greece as an independent nation.", "explanation": "Greece 1821 se Ottoman raj ke khilaaf lada, aur poore Europe ke padhe-likhe log uska support karne lage (Lord Byron jaise poet to ladne hi chale gaye!). Aakhir Britain-France-Russia ki madad se 1832 ki Treaty of Constantinople ne Greece ko azaad nation maan liya. Hook: Greece = ancient civilization ki yaad, isliye sabne sympathy di.", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 4, "marks": 5, "types": ["LA", "VSA"], "score": 6}, {"key": "H2-644", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Non-Cooperation Movement", "question": "Why did the Non-Cooperation Movement spread to the countryside from the cities ? Explain.", "answer": "In the countryside the NCM merged with peasant and tribal struggles: Awadh peasants (under Baba Ramchandra) demanded lower revenue, abolition of begar and social boycott of oppressive talukdars; in Gudem Hills tribals (Alluri Sitaram Raju) revolted against forest laws and forced labour - so the movement spread rapidly beyond cities.", "explanation": "Sheher se gaon tak movement isliye phaila kyunki wahan kisaan aur aadivaasi ki apni ladaai isme mil gayi. Awadh mein kisaano ne lagaan aur begar ke khilaaf awaaz uthhayi (Baba Ramchandra), aur Gudem hills mein Alluri Sitaram Raju ne forest laws ke khilaaf bagaawat ki. Hook: 'Kisaan + jungle ke log = gaon mein aag'.", "years": ["2023", "2026"], "papers": 3, "raw": 3, "marks": 5, "types": ["LA"], "score": 6}, {"key": "P3-947", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Women's Education", "question": "Suggest three steps to enhance the literacy rate among women in India.", "answer": "Run government literacy programmes/campaigns to enrol girls in school; provide incentives like scholarships, free meals and free books; open girls' schools nearby and counsel families to break prejudices against girls' education.", "explanation": "Ladkiyon ki literacy badhane ke liye - sarkar campaigns chalaye, scholarship aur muft khana/kitaab de, aur gaon ke paas ladkiyon ke school khole. Saath hi parivaaron ki soch badalni padegi taaki ve betiyon ko padhaayein. Memory hook: 'school paas + paisa-madad + soch badlo' = literacy upar.", "years": ["2023", "2026"], "papers": 3, "raw": 3, "marks": 3, "types": ["SA", "VSA"], "score": 6}, {"key": "E4-224", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Liberalisation 1991", "question": "Liberalisation of foreign trade and foreign investment policy have shown far reaching changes in India. Support the statement with suitable arguments.", "answer": "Liberalisation brought far-reaching changes: removal of trade barriers, easier import/export, entry of MNCs, more foreign investment, Indian firms becoming multinationals, better technology and more consumer choice.", "explanation": "Liberalisation ne India ko poori tarah badal diya! Trade barriers hate, import-export aasaan hua, MNCs aayi, foreign investment badha, aur kuch Indian companies khud MNC ban gayi. Memory hook: 1991 ke liberalisation ne India ki economy ko 'unlock' kar diya - ek nayi duniya khul gayi.", "years": ["2023", "2024"], "papers": 3, "raw": 7, "marks": 5, "types": ["LA"], "score": 5}, {"key": "G5-442", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Energy conservation", "question": "Analyse any three ways to conserve energy resources.", "answer": "Three ways: (1) promote energy conservation and judicious use; (2) increase use of renewable/non-conventional sources (solar, wind); (3) adopt energy-efficient technology and practise reduce-reuse-recycle. Conventional sources are exhaustible, so conservation is vital.", "explanation": "Energy bachane ke teen jugaad: pehla - fizool kharchi band karo (judicious use), doosra - solar/wind jaise renewable use karo, teesra - energy-efficient gadgets (LED, 5-star AC) lagao. Coal-petrol toh khatam ho jaayenge, isliye bachana hi samajhdari hai. Bachao, badlo, dobara use karo!", "years": ["2023", "2025"], "papers": 3, "raw": 3, "marks": 3, "types": ["SA", "VSA"], "score": 5}, {"key": "G6-504", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Importance of manufacturing", "question": "Explain the importance of manufacturing industries.", "answer": "Manufacturing industries are the backbone of economic development: they modernise agriculture, create jobs in secondary/tertiary sectors, reduce unemployment and poverty, lessen regional disparities, and boost exports to earn foreign exchange.", "explanation": "Dekho bhai, manufacturing industries economy ki reedh ki haddi (backbone) hain. Ye kheti ko modern banati hain, naukriyan deti hain, garibi-berozgari kam karti hain aur exports se foreign exchange laati hain. Yaad rakhne ka trick: 'Jobs-Backbone-Foreign exchange-Regional balance-Export'. Bas ye 5 point likh do, full marks pakke.", "years": ["2023", "2025"], "papers": 3, "raw": 3, "marks": 5, "types": ["LA", "SA"], "score": 5}, {"key": "G6-523", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Industrial pollution control", "question": "How can the industrial pollution of fresh water be reduced ? Explain with examples.", "answer": "Freshwater pollution can be reduced by reusing and recycling water in successive processes, harvesting rainwater to meet demand, reducing hazardous materials and waste, and treating hot water and effluents (primary mechanical, secondary biological, tertiary chemical) before releasing them into rivers.", "explanation": "Fresh water bachane ke tareeke: paani ko reuse/recycle karo, rainwater harvest karo, hazardous waste kam karo, aur effluent ko 3 step (mechanical, biological, chemical) mein treat karke hi nadi mein chodo. Memory hook: '3R + 3-step treatment'.", "years": ["2023", "2024"], "papers": 3, "raw": 5, "marks": 5, "types": ["LA", "SA"], "score": 5}, {"key": "G7-553", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Map work - Mixed (combined)", "question": "On the same outline Map of India, locate and label any THREE of the following with suitable symbols : (i) Hirakud Dam (ii) Tarapur Atomic Power Station (iii) Pune Software Technology Park (iv) Paradip Sea Port", "answer": "Hirakud Dam - Odisha; Tarapur/Kakrapara Atomic Power Station - Maharashtra/Gujarat; Software Technology Parks - Pune (Maharashtra), Hyderabad (Telangana), Bengaluru (Karnataka); Sea Ports - Paradip (Odisha), Kandla (Gujarat); Indira Gandhi International Airport - Delhi; international airport of West Bengal - Kolkata.", "explanation": "Yeh combined map question hai - ek saath dam, atomic plant, software park aur sea port dhoondhne hote hain. Trick: rajya yaad rakho - Paradip=Odisha, Tarapur=Maharashtra, Kakrapara=Gujarat, Pune=Maharashtra, Bengaluru=Karnataka. Map mein sahi symbol aur naam dono likhna zaroori.", "years": ["2023", "2025"], "papers": 3, "raw": 6, "marks": 3, "types": ["Map"], "score": 5}, {"key": "H2-642", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Rowlatt Act & Satyagraha", "question": "Why did Gandhiji decide to launch a nationwide Satyagraha against the proposed Rowlatt Act, 1919. Explain.", "answer": "The Rowlatt Act (1919) gave the government huge powers to repress political activity and allowed detention of political prisoners without trial for up to two years. Gandhi saw it as unjust 'devilish' law, so he launched a nationwide Satyagraha (hartals, fasting, civil disobedience) against it.", "explanation": "Rowlatt Act ek 'kaala kanoon' tha - bina trial ke kisi ko bhi 2 saal tak jail mein daal sakte the! Itna unfair tha ki Gandhi ji ne poore desh mein Satyagraha (hartal, vrat, civil disobedience) shuru kar diya. Hook: 'No appeal, no vakeel, no daleel' - isi gusse mein Satyagraha aaya.", "years": ["2023", "2025"], "papers": 3, "raw": 5, "marks": 2, "types": ["Case-based", "LA"], "score": 5}, {"key": "H5-732", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "New culture of reading", "question": "How did access to books create a new culture of reading ? Explain.", "answer": "As printing cut book costs, books reached a wider public, shifting society from a hearing/oral culture to a reading public. Printers published popular illustrated books and ballads, so even non-readers could enjoy texts read aloud.", "explanation": "Pehle books mehngi thीं, sirf padhe-likhe sun-ne walon tak limited. Jab printing se daam giraa, toh aam log bhi books khareedne lage—'hearing public' ab 'reading public' ban gayi. Trick: jab cheez sasti hoti hai, sab tak pahunchti hai—wahi books ke saath hua.", "years": ["2023", "2025"], "papers": 3, "raw": 7, "marks": 3, "types": ["LA", "SA"], "score": 5}, {"key": "E2-85", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Public vs Private sector", "question": "Examine how 'Public Sector' contributes in the economic development of the nation ?", "answer": "The public sector builds essential infrastructure (roads, railways, electricity, dams), generates employment, provides basic services like safe water and housing at low cost, and invests in health and education for human development.", "explanation": "Public sector (sarkari) desh ki development ki neev banata hai - roads, railway, bijli, dam jaisa bada infrastructure jisme private log paisa nahi lagana chahte. Saath hi sasti services aur naukri deta hai. Memory hook: 'Public = praja ka faayda, profit nahi'.", "years": ["2023", "2024"], "papers": 3, "raw": 4, "marks": 3, "types": ["SA"], "score": 4}, {"key": "E2-105", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Protection of unorganised-sector workers", "question": "‘‘There is a need for protection and support of the workers in the unorganised sector.’’ Examine the statement with examples.", "answer": "Unorganised-sector workers need protection because they have insecure, low-paid jobs with no fixed hours, no benefits and are easily exploited. They need fair wages, job security, social security (health/maternity benefits), safe conditions and government regulation.", "explanation": "Unorganized workers ka koi protection nahi - kam pay, no security, exploitation aasaan. Isliye unhe fair wages, social security aur safe conditions dene ki zaroorat hai. Yahi 'Right to work' aur worker-protection ka point hai. Memory hook: 'Kamzor worker = sarkari suraksha zaroori'.", "years": ["2023", "2024"], "papers": 3, "raw": 6, "marks": 3, "types": ["LA", "SA"], "score": 4}, {"key": "G2-302", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Wildlife conservation measures", "question": "Suggest any two measures for the conservation of wildlife in India.", "answer": "(i) Enforce the Wildlife (Protection) Act, 1972 (ban hunting, list protected species). (ii) Establish national parks, sanctuaries and biosphere reserves to protect habitats; promote awareness and Joint Forest Management.", "explanation": "Wildlife bachane ke do simple tareeke yaad rakho: ek toh Wildlife Protection Act 1972 lagao (shikaar pe ban), aur doosra national park/sanctuary banao taaki janwaron ka ghar safe rahe. Memory hook: 'Kanoon + Ghar' - law banao aur habitat do. Ye bahut common 2-marker hai.", "years": ["2023", "2024"], "papers": 3, "raw": 5, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "G5-492", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Map work - Bailadila iron ore", "question": "On the same political outline map of India, locate and label any three of the following with suitable symbols : (i) Bailadila – Iron ore Mines (ii) Namrup – Thermal Power Plant (iii) Kandla – Major Sea Port (iv) Meenam Bakkam – International Airport", "answer": "Bailadila Iron-ore mines are located in Chhattisgarh (Dantewada district). (Map-location skill; in the combined item Namrup is in Assam, Kandla in Gujarat, Meenambakkam in Tamil Nadu.)", "explanation": "Map sawaal - Bailadila iron-ore mines Chhattisgarh mein hain (Dantewada). Yeh sab same map-locate skill hai chahe akela poocha ho ya combined. Yaad rakho: 'Bailadila = Chhattisgarh ka iron ore'. Map pe Chhattisgarh mein dot. (id 1781 ka official answer galat chhapaa hai par location Chhattisgarh hi hai.)", "years": ["2023", "2024"], "papers": 3, "raw": 6, "marks": 1, "types": ["Map"], "score": 4}, {"key": "P1-833", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - Power Sharing Model", "question": "How did the Belgian Government solve their ethnic problem ? Explain.", "answer": "Belgium solved it by: (1) amending the constitution; (2) keeping equal numbers of Dutch- and French-speaking ministers in the central government; (3) giving state governments powers not subordinate to the centre; (4) a separate Brussels government with equal representation; and (5) a 'community government' elected by each language group for cultural/educational/language matters.", "explanation": "Belgium ne smartly solve kiya - constitution badla, Centre mein Dutch aur French ministers barabar, states ko apni power, Brussels ki alag sarkar barabari se, aur ek 'Community Government' jo bhasha ke hisaab se cultural-education kaam dekhe. Hook: 'Barabari + Community Govt' = Belgium ka jaadu.", "years": ["2023", "2024"], "papers": 3, "raw": 5, "marks": 2, "types": ["Case-based", "SA"], "score": 4}, {"key": "P3-946", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Women in Public Life - Nordic", "question": "In which one of the following regions is the participation of women in public life the highest ?", "answer": "(A) Nordic countries - they have the highest participation of women in public life and the highest women's representation in their national parliaments.", "explanation": "Yeh ek pakka exam favourite hai - jab bhi poochein ki aurton ki public life mein sabse zyada bhागidari kahan hai, jawaab hai Nordic countries (Sweden, Norway, Finland, Denmark, Iceland). Memory hook: 'thandi jagah, garam barabari!' Nordic desh gender equality mein sabse aage hain.", "years": ["2023", "2024"], "papers": 3, "raw": 9, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G7-549", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "International Trade", "question": "Analyse the features of International trade of India.", "answer": "Features of India's international trade: exchange of goods/services across borders; exports include agricultural products, ores & minerals, gems & jewellery and engineering goods; imports include petroleum, machinery and electronics; trade is the economic barometer of a country, with services/IT exports growing.", "explanation": "International trade matlab deshon ke beech len-den - hum kuch bechte (export) hain, kuch khareedte (import) hain. Yeh desh ki economic health ka thermometer hai. Hook: 'export bechna, import khareedna', aur trade desh ka 'economic barometer'.", "years": ["2023"], "papers": 3, "raw": 3, "marks": 5, "types": ["LA"], "score": 3}, {"key": "H2-635", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Civil Disobedience Movement - social groups", "question": "How did the Business class relate itself to the Civil Disobedience Movement? Explain with examples.", "answer": "Business classes (industrialists) wanted protection against imports and a favourable rupee-sterling exchange ratio. Through bodies like FICCI and leaders like Purushottamdas Thakurdas and G.D. Birla, they funded the movement, boycotted foreign goods and refused to deal in imported cloth, seeing Swaraj as good for enterprise.", "explanation": "Vyapaari log bhi andolan mein kyun the? Kyunki angrezon ki import-policy aur rupee-rate unke dhandhe ko maar rahe the. FICCI banakar, paisa lagaakar aur videshi maal ka boycott karke unhone CDM ko support kiya. Hook: 'Swaraj = business ke liye accha sauda' - isiliye Birla-Thakurdas saath aaye.", "years": ["2023"], "papers": 3, "raw": 4, "marks": 5, "types": ["LA"], "score": 3}, {"key": "P3-949", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Discrimination Against Women", "question": "“Women face discrimination in various ways in our society.” Explain any two ways.", "answer": "Parents often prefer to spend more resources on sons than daughters; women face domestic violence; they get fewer highly-paid jobs; and they receive unequal (lower) wages than men for the same work.", "explanation": "Aaj bhi aurton ke saath bahut tarah ka bhedbhaav hota hai - maa-baap bete par zyada kharch karte hain, ghar mein hinsa (domestic violence) hoti hai, achhi-tankhwah wali naukriyan kam milti hain, aur same kaam ka kam paisa milta hai. Memory hook: 'beta-preference, hinsa, kam naukri, kam tankhwah' - yeh chaar discrimination ke roop hain.", "years": ["2023"], "papers": 3, "raw": 6, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "P5-1013", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Why democracy is preferred", "question": "Which one of the following is the most popular form of government in the contemporary world ?", "answer": "Democratic Government. It is the most popular/preferred form of government in the contemporary world because it is accountable, responsive and protects people's rights.", "explanation": "Simple si baat hai yaar - aaj ki duniya mein sabse popular government democracy hai. Logon ko apni marzi ki sarkaar chahiye jise vote se chun saken aur hata bhi saken. Tabhi poori duniya mein democracy hi favourite hai. Hook: 'most popular = democratic', baaki monarchy/dictatorship distractors hain.", "years": ["2023"], "papers": 3, "raw": 9, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E2-132", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "MGNREGA / Right to Work", "question": "Describe the efforts done by the Indian government to increase employment in rural areas.", "answer": "The government increases rural employment through laws like MGNREGA, guaranteeing about 100 days of wage employment (or unemployment allowance if work is not given), and by prioritising works that improve land productivity and agricultural development.", "explanation": "Government ne gaon mein naukri badhane ke liye MGNREGA jaisa kanoon banaya - 100 din ki guaranteed dihaadi, warna allowance. Saath hi aise kaam pehle karte hain jisse zameen aur kheti behtar ho. Ye 'Right to Work' hai. Memory hook: 'MGNREGA = gaon mein kaam ki guarantee'.", "years": ["2026"], "papers": 2, "raw": 3, "marks": 5, "types": ["LA"], "score": 8}, {"key": "E2-136", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Protection of unorganised-sector workers", "question": "Suggest any three measures for labour safety in the unorganised sector.", "answer": "Ensure fair/minimum wages, provide health insurance and maternity benefits, guarantee safe working conditions with proper equipment and inspections, and educate workers on their rights with skill development.", "explanation": "Unorganized workers ki safety ke liye: fair wages do, health insurance aur maternity benefits do, safe working conditions banao aur unhe apne haq ke baare mein educate karo. Memory hook: 'Paisa + suraksha + jaankaari = worker safe'.", "years": ["2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 8}, {"key": "E2-138", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Employment generation", "question": "Suggest the measures for the creation of extra employment generation in the agriculture sector.", "answer": "Provide timely seeds, inputs, credit (KCC) and crop insurance, improve irrigation and storage/marketing, train farmers in modern methods, promote cooperative farming and agro-based industries, and use schemes like MGNREGA.", "explanation": "Kheti mein zyada naukri ke liye: time par seed/credit/insurance do, irrigation aur storage sudhaaro, kisano ko training do, aur agro-industries + MGNREGA jaise scheme chalao. Memory hook: 'Beej, paani, loan, training = khet mein kaam'.", "years": ["2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 8}, {"key": "E2-140", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Organised vs Unorganised sector", "question": "Explain the main characteristics of the organised sector.", "answer": "The organised sector has regular, assured employment that follows government rules, with registration, fixed hours and overtime pay, plus benefits like job security, paid leave, medical, provident fund and pension.", "explanation": "Organized sector ki pehchaan - registered kaam, government rules follow, fixed hours, overtime ka paisa, aur job security + PF + paid leave + pension. Sab kuch system mein. Memory hook: 'Rules + registration + benefits = organized'.", "years": ["2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["LA", "SA"], "score": 8}, {"key": "G1-281", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Land degradation", "question": "Explain any three main factors responsible for land degradation.", "answer": "Main causes: mining (abandoned sites, deforestation), overgrazing, over-irrigation causing waterlogging/salinity, deforestation, and dust from mineral processing; floods also cause erosion and deprive plains of silt.", "explanation": "Land degradation ke main kaaran: mining, overgrazing (zyada charai), over-irrigation se salinity, deforestation aur industrial dust. Floods bhi soil erosion karti hain. Hook: 'Khodo (mining), charao (grazing), zyada paani do - sab zameen kharaab'.", "years": ["2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["Case-based", "SA"], "score": 8}, {"key": "G2-327", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Joint Forest Management (JFM)", "question": "Describe the main provisions of 'Joint Forest Management'.", "answer": "JFM (started in Odisha, 1988) involves local communities in managing and restoring degraded forests; local institutions undertake protection and in return get non-timber forest produce and a share in the harvested timber.", "explanation": "JFM = sarkar aur gaon waale milke degraded (kharab) jungle ko bachate hain. Log protection karte hain, badle mein unhe non-timber products aur timber ka hissa milta hai. Memory hook: 'JFM = Degraded forest + milke kaam + share milta hai'. Note: JFM sirf DEGRADED forest ke liye hai.", "years": ["2026"], "papers": 2, "raw": 4, "marks": 1, "types": ["Case-based", "VSA"], "score": 8}, {"key": "G2-328", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Community role in forest conservation", "question": "Describe the role of communities in the conservation of forests in India.", "answer": "Local communities protect forests by forming local institutions (JFM), declaring protected areas with their own rules (e.g. Bhairodev Dakav Sonchuri in Alwar), collaborating with the government and organising movements like Chipko and Navdanya.", "explanation": "Communities forest kaise bachati hain? Local institutions banakar (JFM), apne niyam banakar (Bhairodev Sonchuri), aur Chipko/Navdanya jaise andolan chalakar. Memory hook: 'JFM + apne rules + Chipko' - teeno milake community ka role. Ye 2-marker hai.", "years": ["2026"], "papers": 2, "raw": 5, "marks": 2, "types": ["Case-based", "VSA"], "score": 8}, {"key": "G3-365", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Map work – Hirakud Dam (Mahanadi, Odisha)", "question": "The dam built on Mahanadi river.", "answer": "Hirakud Dam (built on the Mahanadi river in Odisha).", "explanation": "Mahanadi river par bana dam = Hirakud Dam (Odisha). Yeh map aur VSA dono mein poochha jaata hai. Hook: 'Mahanadi par Hirakud' – jaise heera nadi ka taj. Same fact baar-baar aata hai, ek baar pakka.", "years": ["2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["Map"], "score": 8}, {"key": "G5-455", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Petroleum / Mineral oil", "question": "Examine the role of petroleum as an important source of energy and describe its distribution in India.", "answer": "Petroleum is the second major energy source after coal, providing fuel for transport and raw material for petrochemicals, fertilisers and plastics. In India it occurs in Mumbai High (offshore), Gujarat (Ankleshwar) and Assam (Digboi, Naharkatiya, Moran).", "explanation": "Petroleum ko 'liquid gold' kehte hain - coal ke baad doosra sabse bada energy source. Gaadiyon ka fuel, plastic, khaad, paint sab isse bante hain. India mein milta hai: Mumbai High (samundar), Gujarat (Ankleshwar), Assam (Digboi, Naharkatiya). Yaad rakho: Mumbai-Gujarat-Assam = petroleum trio!", "years": ["2026"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA"], "score": 8}, {"key": "G6-519", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Jute industry", "question": "Explain the reasons why most of the Jute industries in India are located in West Bengal.", "answer": "Jute industries cluster in West Bengal (Hugli belt) due to proximity to raw jute, cheap water transport, abundant water for processing, cheap labour from neighbouring states, and Kolkata's banking, port and trade facilities.", "explanation": "Jute industry West Bengal mein Hugli river ke kinare kyun? Wahin jute ugta hai (raw material paas), river se sasta transport, paani processing ke liye, sasta labour aur Kolkata ka port-bank. Memory hook: Hugli ke kinare — jute, jal, jahaaz (port), majdoor.", "years": ["2026"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA"], "score": 8}, {"key": "H1-623", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Visual culture & allegory", "question": "Identify this image of the allegorical figure of a European nation during the nineteenth century from the following options : (A) Britannia (B) Marianna (C) Helvetia (D) Germania", "answer": "Germania. The allegorical female figure shown - wearing a crown of oak leaves and associated with strength - is Germania, the personification of the German nation. (Note: one paper's key wrongly attaches 'Germania' to a Civil-Code question, id 3579, but the visual-allegory answer is Germania.)", "explanation": "Picture mein jo allegory-woman hai - oak-leaves ka taaj pehne, strength wali - woh Germania hai, yaani German nation ki symbol. Britannia (Britain), Marianne (France), Helvetia (Switzerland) doosri allegories hain. Hook: oak-crown + Germany = Germania.", "years": ["2026"], "papers": 2, "raw": 7, "marks": 1, "types": ["MCQ"], "score": 8}, {"key": "H3-709", "chapter_code": "H3", "chapter_name": "The Making of a Global World", "discipline": "History", "topic": "Trade and Spread of Disease", "question": "How did trade help to spread diseases during the pre-modern world ? Explain.", "answer": "Traders and travellers moving along long-distance routes unknowingly carried germs and diseases (e.g. smallpox to America); populations with no immunity were devastated, as seen in the Americas after European contact.", "explanation": "Jab traders aur travellers door-door tak gaye, to apne saath germs bhi le gaye - bina jaane! Jaise smallpox America pahunchi aur native log marr gaye kyunki immunity nahi thi. Memory hook: 'maal ke saath bimari free' - trade routes disease ke bhi highway ban gaye.", "years": ["2026"], "papers": 2, "raw": 6, "marks": 2, "types": ["VSA"], "score": 8}, {"key": "H5-802", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print and the French Revolution", "question": "Evaluate the role of print in the French Revolution.", "answer": "Print spread Enlightenment ideas (reason over tradition/despotism), gave critical commentary on Church and State, and circulated literature mocking the monarchy—creating a culture of debate that built favourable conditions for the French Revolution.", "explanation": "Print ne French Revolution ke liye zameen taiyaar ki—Enlightenment ke vichaar, Church-State ki aalochna, aur raja-rani ka mazaak. Sab milke bahas aur baghaawat ka mahaul bana. Hook: print = revolution ka spark.", "years": ["2026"], "papers": 2, "raw": 5, "marks": 3, "types": ["SA"], "score": 8}, {"key": "P1-827", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Pressure Groups & Power Sharing", "question": "How do pressure groups influence the government ?", "answer": "Pressure groups (e.g. of traders or farmers) influence the government by representing specific ideologies/interests in committees, raising public awareness, and impacting the decision-making process, thus sharing power.", "explanation": "Pressure groups (jaise vyapari ya kisan sangh) sarkar pe asar daalte hain - committees mein apni baat rakhte hain, public ko jagaate hain, aur faislon ko mod dete hain. Hook: ye 'dabav daalne wale' group hain, isliye power sharing ka hissa ban jaate hain.", "years": ["2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 8}, {"key": "E2-119", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Shift in sectors over time", "question": "Analyse the changes taking place in the sectors of the Indian economy in the last forty years.", "answer": "Production rose in all three sectors, but the share shifted: in 1973-74 the primary sector was the largest contributor to GDP, whereas by 2013-14 the tertiary sector became the largest, followed by secondary and then primary.", "explanation": "40 saal mein bada badlav - pehle (1973-74) Primary sector GDP mein sabse aage tha, ab (2013-14) Tertiary sabse aage hai. Production sabka badha par hissa Tertiary ki taraf shift ho gaya. Memory hook: 'Kheti se services ki taraf chal pada India'.", "years": ["2025", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["LA", "SA"], "score": 7}, {"key": "G2-326", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Forest area - states", "question": "Which state of India has the maximum area under permanent forest ?", "answer": "(D)/(B) Madhya Pradesh — it has the largest area under permanent forests in India.", "explanation": "Sabse zyada permanent forest kis state mein? Madhya Pradesh - isliye ise 'Tiger State' aur forest-rich state kehte hain (Bandhavgarh, Kanha sab yahin). Memory hook: 'MP = jungle ka raja state'. Option letter badle par answer hamesha Madhya Pradesh.", "years": ["2025", "2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 7}, {"key": "G2-329", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Importance of wildlife/forest conservation", "question": "Why is conservation of wildlife important for all of us ? Explain.", "answer": "Conservation maintains ecological balance, preserves ecological/biological diversity and safeguards our life-support system (water, air, soil, climate).", "explanation": "Wildlife/forest bachana kyun zaroori? Kyunki isse ecological balance banta hai, diversity bachti hai, aur hamara life-support system (hawa-paani-mitti) safe rehta hai. Memory hook: 'Balance + Diversity + Life-support'. Bina jungle ke hum bhi nahi bachenge - simple.", "years": ["2025", "2026"], "papers": 2, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 7}, {"key": "G5-465", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Importance of minerals", "question": "Assertion (A) : Minerals are an indispensable part of our lives. Reason (R) : All living things need minerals.", "answer": "(A) Both (A) and (R) are true and (R) is the correct explanation of (A). Minerals are indispensable because everything from food to tools and machines depends on them, and all living things genuinely need minerals to survive.", "explanation": "Yeh ekdum sahi hai - dono true aur R sahi explanation hai A ka. Minerals zindagi ka anivarya hissa hain - khaana, tools, gadgets sab mein. Aur sach mein har jeev ko minerals chahiye (jaise humein iron, calcium). A bhi sahi, R bhi sahi, R hi A ka kaaran. Easy marks!", "years": ["2025", "2026"], "papers": 2, "raw": 4, "marks": 1, "types": ["Assertion-Reason", "LA"], "score": 7}, {"key": "G5-496", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Map work - Gujarat nuclear plant", "question": "Name the place where nuclear power plant is located in Gujarat.", "answer": "Kakrapara (Kakrapar) Atomic Power Plant is located in Gujarat.", "explanation": "Gujarat ka atomic power plant = Kakrapara (Kakrapar)! Chahe 'Gujarat mein nuclear plant' poochhein ya 'Kakrapara locate karo', jawab same. Yaad rakho: 'Kakrapara = Gujarat ka nuclear plant'. Map pe Gujarat mein dot.", "years": ["2025", "2026"], "papers": 2, "raw": 5, "marks": 1, "types": ["Map", "VSA"], "score": 7}, {"key": "G6-515", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Cotton textile industry", "question": "Explain any three factors responsible for the concentration of cotton textile industries in Maharashtra and Gujarat.", "answer": "Cotton textiles concentrate in Maharashtra/Gujarat due to: availability of raw cotton from the black-soil region, humid climate (good for spinning), ports like Mumbai for trade, abundant cheap labour, power supply, good transport, and established banking and machinery.", "explanation": "Maharashtra-Gujarat mein cotton industry kyun? Black soil mein cotton ugta hai (raw material paas), humid climate spinning ke liye perfect, Mumbai port export ke liye, aur labour-power sab available. Memory hook: Raw cotton + Climate + Port + Labour.", "years": ["2025", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["LA", "SA"], "score": 7}, {"key": "G7-564", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Map work - East-West Corridor", "question": "Name the eastern terminal station of the East-West Corridor.", "answer": "The eastern-most terminal station of the East-West Corridor is Silchar (Assam). (The corridor runs Silchar to Porbandar.)", "explanation": "East-West Corridor = Silchar (Assam, East) se Porbandar (Gujarat, West) tak. Eastern terminal poochhein to Silchar. Hook: 'Silchar = Sunrise side (East)', Porbandar = West. Map pe Assam mein eastern point mark karo.", "years": ["2025", "2026"], "papers": 2, "raw": 5, "marks": 1, "types": ["Map"], "score": 7}, {"key": "H5-788", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Innovations in printing technology (19th c.)", "question": "Analyze the significant changes in printing technology during 19th century in the world.", "answer": "19th-century innovations: Richard Hoe's power-driven rotary press (printing thousands/hour), the offset press (multi-colour printing), electrically operated presses, better paper feeding and methods that made printing faster, cheaper and more attractive.", "explanation": "19th century mein printing tech mein dher saare badlaav aaye—Hoe ki rotary press (ghante mein hazaaron copies), offset press (multi-colour), bijli wali press. Hook: tezi + rang + sasta = modern printing.", "years": ["2025", "2026"], "papers": 2, "raw": 4, "marks": 3, "types": ["LA", "SA"], "score": 7}, {"key": "P2-928", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Features of federalism", "question": "Explain the main features of the Indian federal system.", "answer": "Multiple tiers of government with constitutionally specified jurisdictions; fundamental provisions unchangeable unilaterally; courts interpret powers; legislative powers split across Union, State and Concurrent lists; clear revenue sources—aiming to safeguard unity while accommodating diversity.", "explanation": "Indian federalism ke main features: kai tiers, har ek ki power constitution me fixed, basic niyam akele nahi badalte, court interpret karta hai, aur power teen lists (Union/State/Concurrent) me baanti hai. Maksad – ekta bhi bani rahe aur diversity bhi. Hook: 'unity + diversity dono sambhaalna = Indian federalism'.", "years": ["2025", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 7}, {"key": "P3-967", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Gender Equality - Employment", "question": "Suggest any five measures to establish the gender equality of labour.", "answer": "Enforce equal pay for equal work; ensure equal access to education and skill training; prevent discrimination in hiring and promotion; ensure safe workplaces for women; provide maternity benefits and childcare support; and reserve/encourage women in all professions.", "explanation": "Kaam-kaaj mein gender equality ke liye - same kaam ki same tankhwah (equal pay), barabar shiksha-training, hiring-promotion mein no bhedbhaav, surakshit workplace, aur maternity-childcare support. Memory hook: 'equal pay + safe job + barabar mauka' = labour mein gender equality. Equal Remuneration Act bhi yaad rakho.", "years": ["2025", "2026"], "papers": 2, "raw": 4, "marks": 5, "types": ["LA", "VSA"], "score": 7}, {"key": "E1-51", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Public Facilities & Quality of Life", "question": "Explain the importance of public facilities for the development of a country.", "answer": "Public facilities like health, education, safe drinking water, housing, sanitation and the PDS, provided by the government, improve people's quality of life, develop human resources and reach the poorest regions — things individuals cannot arrange alone. Hence they are vital for development.", "explanation": "Public facilities – jaise sarkari health, education, saaf paani, ghar, PDS – sabki life behtar banati hain aur gareeb se gareeb tak pahunchti hain. Yeh aise kaam hain jo akela banda nahi kar sakta, sarkar karti hai. Memory hook: 'sarkari suvidhaayein = sabka wer": "The Act gave the government extensive rights to censor reports and editorials and to regularly track vernacular newspapers; if a seditious report was ignored after warning, the press could be seized and machinery confiscated.", "explanation": "Vernacular Press Act se sarkar ko do bade powers mile: reports censor karna aur akhbaron ki nigraani; seditious nikla toh press zabt. Hook: 'censor + zabti' do hathiyaar.", "years": ["2024", "2026"], "papers": 2, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 6}, {"key": "H5-761", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print and Reformation / Martin Luther", "question": "Who among the following said – ''Printing is the ultimate gift of God and the greatest one.'' ?", "answer": "Martin Luther. He praised print as the ultimate gift of God; print spread his ideas and fuelled the Protestant Reformation.", "explanation": "Ye line Martin Luther ki hai—usne print ko 'Bhagwan ka sabse bada tohfa' kaha kyunki print se uske vichaar tezi se faile (Reformation). Hook: Luther + print = Reformation.", "years": ["2024", "2026"], "papers": 2, "raw": 5, "marks": 1, "types": ["MCQ", "SA"], "score": 6}, {"key": "P2-932", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Indian federalism / division of power", "question": "Explain the vertical distribution of power given in the Indian Constitution.", "answer": "Vertical division of power distributes authority among different levels of government—Central, State, and (after the 1992 amendment) local bodies like panchayats and municipalities—with each tier's powers clearly defined by the Constitution.", "explanation": "Vertical division matlab power ko upar se neeche level-wise baant na – Centre, fir State, fir Local (panchayat/municipality). 1992 ke amendment ne local level bhi jod diya. Har level ki power constitution me clear hai. Hook: 'vertical = upar-neeche, te es": ["SA", "VSA"], "score": 6}, {"key": "E1-7", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "World Bank – Criterion for Development", "question": "Which one of the following indices is given priority by the World Bank with respect to development ?", "answer": "(d) Per Capita Income. The World Bank gives priority to per capita income for measuring development.", "explanation": "World Bank development naapne ke liye Per Capita Income ko sabse upar rakhta hai. Per capita income matlab desh ki total income ÷ total population. Memory hook: World Bank ka dimaag paise pe chalta hai, isliye income/per capita income hi inka favourite criterion hai.", "years": ["2024", "2025"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "E1-38", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Money Cannot Buy Everything (Non-material things)", "question": "‘‘Money in your pocket cannot buy all the goods and services that you may need to live well.’’ Support the statement with example.", "answer": "Money alone cannot buy everything needed for a good life — e.g. a pollution-free environment, unadulterated medicines, peace and security, freedom from disease (which needs collective action), or genuine happiness and social respect.", "explanation": "Jeb mein paise hone se sab kuch nahi milta. Saaf hawa, milawat-free dawai, shanti, izzat, bimaari se suraksha – yeh paise se nahi, samaaj aur collective effort se aati hain. Memory hook: 'paisa zaroori hai, par kaafi nahi'. Achhi life ke liye non-material cheezein bhi chahiye. (Note: id 2236 ka diya official answer is question se match nahi karta, isliye yahan sahi Development-based answer diya gaya hai.)", "years": ["2024", "2025"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 5}, {"key": "E2-107", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Employment across sectors", "question": "Which one of the following sectors has the highest share in employment in India ?", "answer": "(A) Primary. The primary sector (mainly agriculture) is the largest employer in India.", "explanation": "Employment (naukri) mein sabse aage Primary sector - kyunki aaj bhi aadhe se zyada log kheti-baadi mein hain. (Yaad rakho: GDP mein Tertiary aage, par naukri mein Primary aage.) Memory hook: 'Naukri = Primary, GDP = Tertiary'.", "years": ["2024", "2025"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "E3-153", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Formal vs Informal Sources of Credit", "question": "'Formal sector of credit better than informal sector.' Give arguments in support of your answer.", "answer": "Formal credit is better: lower interest rates, RBI supervision, no unfair recovery, and it saves borrowers from debt traps while supporting income growth and investment.", "explanation": "Yahan sirf formal ke FAYDE likhne hain (compare nahi): (1) sasta byaaj, (2) RBI ki nigrani, (3) recovery mein zabardasti nahi. Isi se aadmi debt-trap se bachta hai aur income badhti hai. 3 strong points likh do, marks mil jayenge.", "years": ["2024", "2025"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 5}, {"key": "E3-163", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Terms of Credit & Collateral", "question": "Explain any three terms of Credit.", "answer": "Terms of credit include: (1) Interest rate, (2) Collateral (security/asset), (3) Documentation, and (4) Mode of repayment. These vary between lenders and borrowers.", "explanation": "Terms of credit = loan ki shartein. 4 main: Interest rate, Collateral, Documentation, aur Mode of repayment. Koi bhi 3 likh do. Memory hook 'ICDM' (Interest-Collateral-Documents-Mode). Yeh har lender-borrower deal mein hote hain.", "years": ["2023", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 5}, {"key": "E3-193", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Self-Help Groups (SHGs)", "question": "Mention any two sources of capital for Self-Help Groups.", "answer": "Two sources of SHG capital: (1) members' own savings/contributions, and (2) loans obtained from banks (also interest earned on loans given to members).", "explanation": "SHG ke paise kahan se aate hain? (1) Members khud savings jama karte hain, (2) Bank se loan milta hai (aur members se liya gaya byaaj bhi jud jaata hai). Koi 2 likh do. Simple: 'apni saving + bank ka loan'.", "years": ["2024", "2025"], "papers": 2, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 5}, {"key": "G2-316", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Sacred groves", "question": "How does sacred groves relate to the belief in nature worship ?", "answer": "Sacred groves are pristine, untouched forests preserved through nature worship; local communities treat them as sacred and ban human interference, ascribing sacred qualities to springs, peaks, plants and animals.", "explanation": "Sacred groves = pavitra jungle jinhe log devi-devta maan ke bachate hain. Yahaan ped, jharne, pahaad sab ko sacred maana jaata hai isliye koi cheere-chhaad nahi. Memory hook: 'Bhagwan ka jungle = bilkul untouched'. Spirituality aur ecology ka mel.", "years": ["2024", "2025"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 5}, {"key": "G2-317", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Tree worship / cultural practices", "question": "How do communities incorporate trees into their cultural practices ? Explain with example.", "answer": "Communities revere specific trees in their culture: Mundas and Santhals worship mahua and kadamba, while tribes in Odisha and Bihar revere tamarind and mango trees during weddings.", "explanation": "Tribal log pedon ki pooja karte hain - Munda aur Santhal mahua/kadamba ko, aur Odisha-Bihar wale shaadi mein imli (tamarind)/aam (mango) ko poojte hain. Memory hook: 'Munda-Santhal = Mahua-Kadamba; Shaadi = Imli-Aam'. Isse jungle apne aap bach jaata hai.", "years": ["2024", "2025"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 5}, {"key": "G4-377", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Describe any three features of commercial farming.", "answer": "Commercial farming uses high doses of modern inputs (HYV seeds, chemical fertilizers, insecticides, pesticides) for higher productivity; degree of commercialisation varies by region (rice is commercial in Punjab but subsistence in Odisha); plantation is a type of commercial farming.", "explanation": "Commercial farming poori tarah market ke liye, isliye HYV seeds, khaad aur dawaiyon ka full use. Mazedaar baat: same crop ek state mein commercial, dusri mein subsistence, jaise chawal Punjab mein business par Odisha mein pet bharne ke liye!", "years": ["2024", "2025"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 5}, {"key": "G4-429", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop conditions and requirements", "question": "Describe the main characteristics of major millet crops grown in India.", "answer": "Millets (jowar, bajra, ragi) are rain-fed, hardy crops needing little irrigation. Jowar grows in Maharashtra and Karnataka; bajra on sandy/shallow soils in Rajasthan and UP; ragi on dry red/black/sandy soils. They are nutritious coarse grains rich in iron, calcium and roughage.", "explanation": "Millets = jowar, bajra, ragi - yeh hardy crops hain jinhe kam paani chahiye. Jowar (Maharashtra), Bajra (Rajasthan ki retili mitti), Ragi (sookhi red/black soil). Hook: 'mote anaaj' bahut poshtik - iron-calcium se bharpoor!", "years": ["2024", "2025"], "papers": 2, "raw": 2, "marks": 3, "types": ["LA", "SA"], "score": 5}, {"key": "G5-466", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Conservation of minerals", "question": "Why do we need to conserve mineral resources ? Explain with examples.", "answer": "Minerals must be conserved because they are finite and non-renewable - coal, iron ore etc. take millions of years to form, while extraction is rapid. Industry and agriculture depend heavily on them. Conservation needs judicious use, improved technology for low-grade ores, recycling of metals and use of substitutes.", "explanation": "Minerals bachana zaroori hai kyunki yeh ban-ne mein laakhon saal lagte hain, par hum minute mein nikaal lete hain! Ek baar khatam toh khatam - renewable nahi. Industry aur kheti inhi pe nirbhar. Bachne ke tareeke: soch-samajh ke use, recycling, low-grade ore ka behtar istemaal. Aaj bachao, kal kaam aayega.", "years": ["2024", "2025"], "papers": 2, "raw": 4, "marks": 5, "types": ["LA"], "score": 5}, {"key": "G6-528", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Water pollution", "question": "Explain the role of industries in increasing water pollution and suggest any three measures to reduce water pollution.", "answer": "Industries pollute water by discharging organic and inorganic effluents — dyes, chemicals, heavy metals, fly ash and hot water — into rivers. Measures: reuse/recycle water, harvest rainwater, and treat effluents (primary, secondary, tertiary) before discharge.", "explanation": "Factories paani kaise kharab karti hain? Dye, chemical, heavy metal, garam paani sidha nadi mein chod deti hain. Control: paani reuse/recycle karo, rainwater harvest karo, aur effluent ko treat karke hi chodo. Memory hook: pehle treat, fir release.", "years": ["2024", "2025"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA"], "score": 5}, {"key": "H1-587", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Treaty of Vienna 1815", "question": "Mention any two objectives of the ‘Treaty of Vienna' of 1815.", "answer": "Objectives/provisions of the Treaty of Vienna (1815), hosted by Chancellor Metternich: undo the changes made by Napoleon; restore the deposed monarchies (e.g. the Bourbon dynasty in France); create a series of buffer states around France to prevent future expansion; and establish a conservative order in Europe.", "explanation": "1815 mein Metternich ki adhyakshta mein hui Treaty of Vienna ka maksad - Napoleon ke saare changes ulto, purane raja (jaise Bourbon) wapas bithao, France ke around 'buffer states' banao taaki woh dobara na phaile, aur conservative order set karo. Hook: Vienna = 'ghadi peeche ghumao' (undo Napoleon).", "years": ["2023", "2026"], "papers": 2, "raw": 4, "marks": 3, "types": ["SA", "VSA"], "score": 5}, {"key": "P1-813", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Horizontal Power Sharing", "question": "Why is horizontal distribution of power sharing important ? Explain", "answer": "Horizontal power sharing distributes power among legislature, executive and judiciary at the SAME level so no organ has unlimited power; each checks the others (checks and balances), maintaining balance.", "explanation": "Horizontal matlab same level pe power baatna - Legislature, Executive, Judiciary. Koi bhi akela boss nahi ban sakta, sab ek-doosre pe nazar rakhte hain (checks and balances). Hook: 'L-E-J teeno barabar, koi upar koi neeche nahi'.", "years": ["2024", "2025"], "papers": 2, "raw": 2, "marks": 2, "types": ["VSA"], "score": 5}, {"key": "P3-953", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Women in Public Life - Nordic", "question": "Which one of the following countries has the highest representation of women in their National Parliament ?", "answer": "(C) Sweden - among the listed countries, Sweden has the highest representation/participation of women in its national parliament and public life.", "explanation": "Jab specific desh poocha jaye (Nordic ki jagah country option mein), toh jawaab Sweden hai - yeh women's parliament representation mein top par hai. Memory hook: Sweden = Nordic ka 'star player' for women in politics. Region poochein toh Nordic, country poochein toh Sweden.", "years": ["2023", "2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "P3-960", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Women's Reservation - 1992", "question": "In which one of the following institutions in India was a system of reservation for women made by amending the Constitution in 1992 ?", "answer": "(D) Panchayat (local self-government bodies). The Constitution was amended in 1992 (73rd/74th amendments) to reserve one-third (33%) seats for women in panchayats and municipalities.", "explanation": "1992 mein Constitution badal kar panchayat (aur municipality) mein aurton ke liye 1/3 seats reserve ki gayi - yeh 73va/74va amendment tha. Toh institution = Panchayat, saal = 1992. Memory hook: 'panchayat + 1992 + ek tihaai (33%)'. Yeh local self-government wali baat hai, sansad nahi.", "years": ["2024", "2025"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "E2-93", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Organised vs Unorganised sector", "question": "Why do people prefer to work in the organised sector ? Explain any three reasons.", "answer": "People prefer the organised sector for job/employment security, fixed working hours with paid overtime, and benefits like paid leave, medical allowance, provident fund, pension and a safe working environment.", "explanation": "Log organized sector kyun pasand karte hain? Job ki guarantee, fixed timing, overtime ka paisa, paid chhutti, medical aur pension. Tension-free zindagi! Memory hook: 'Security + benefits = organized ki demand'.", "years": ["2023", "2025"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 4}, {"key": "E3-177", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Role of Credit in Development", "question": "How does credit play a positive and a negative role ? Explain with examples.", "answer": "Positive: credit funds production, raises output and income (e.g., a farmer/manufacturer earns more). Negative: if income fails (e.g., crop failure), the borrower cannot repay and falls into a debt trap, sometimes losing assets.", "explanation": "Credit ke do roop: ACHHA — production badhe, income badhe (Salim wala case). BURA — agar fasal kharab ho gayi ya kaam na chala, to loan na chukaa paaye aur debt-trap mein phans jaaye (Swapna wala case). Dono side likhna, ek-ek example ke saath. Yahi full marks dilata hai.", "years": ["2023", "2025"], "papers": 2, "raw": 4, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G1-292", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Resource conservation", "question": "Explain the need for conservation of resources.", "answer": "Conservation of resources is needed because irrational consumption and over-utilisation lead to socio-economic and environmental problems; resources are limited, so they must be saved for present and future generations (reduce, reuse, recycle).", "explanation": "Resources limited hain, agar andha-dhund use kiya to socio-economic aur environmental problems aayengi aur future generation ke liye kuch nahi bachega. Isliye conserve karo - reduce, reuse, recycle. Hook: 'Aaj bachao, kal kaam aayega'.", "years": ["2024"], "papers": 2, "raw": 6, "marks": 2, "types": ["Case-based", "VSA"], "score": 4}, {"key": "G3-344", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Water pollution & conservation", "question": "Suggest any three ways to protect fresh water from industrial pollution.", "answer": "Any three: minimise water use by reuse/recycling, harvest rainwater, treat hot water and effluents before discharge, and legally regulate over-drawing of groundwater.", "explanation": "Industry se paani bachane ke teen tareeke: paani reuse/recycle karo, rainwater harvest karo, aur factory ka ganda/garam paani treat karke hi nadi mein chhodo, saath hi groundwater nikalne par kanoon ho. (Note: 5-marker version bhi isi mein merge hai – bas zyada points likh dena.) Hook: 'Reuse, Recharge, Treat, Regulate' – 4 R/T.", "years": ["2024"], "papers": 2, "raw": 2, "marks": 3, "types": ["LA", "SA"], "score": 4}, {"key": "G4-374", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Mention any two features of Plantation agriculture.", "answer": "Plantation agriculture: a single crop grown on a large area; an interface between agriculture and industry; uses capital-intensive inputs and migrant labour; produce serves as industrial raw material (tea, coffee, rubber, sugarcane).", "explanation": "Plantation matlab ek hi crop bade area par, jaise chai, coffee, rubber. Yeh kheti aur industry ke beech pul hai kyunki iska maal factory mein raw material banta hai. Hook: bada area + ek crop + bahut paisa + mazdoor = plantation. Tea garden ki photo yaad rakho!", "years": ["2023", "2025"], "papers": 2, "raw": 2, "marks": 2, "types": ["SA", "VSA"], "score": 4}, {"key": "G5-445", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Non-conventional energy", "question": "Why is there a pressing need to use non-conventional energy resources ? Explain.", "answer": "Non-conventional sources are needed because of growing dependence on fossil fuels, their rising prices and shortages, and the serious environmental pollution they cause. Renewable sources like solar, wind and biomass are clean, inexhaustible and sustainable.", "explanation": "Coal aur petrol pe zyada depend karna khatarnaak hai - yeh khatam ho rahe hain, mehnge ho rahe hain aur pollution bhi failate hain. Isliye solar, wind, biomass jaise non-conventional sources zaroori ho gaye hain - yeh kabhi khatam nahi honge aur clean bhi hain. Future ki energy yahi hai!", "years": ["2023", "2025"], "papers": 2, "raw": 4, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "G5-460", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Occurrence of minerals", "question": "'Minerals generally occur in different rocks.' Examine the statement.", "answer": "Minerals occur in different rocks: in igneous and metamorphic rocks as veins and lodes; in sedimentary rocks as beds/layers (e.g., coal, limestone); as alluvial 'placer deposits' in valley sands (e.g., gold); and from decomposition of surface rocks (e.g., bauxite). Ocean waters also contain dissolved minerals.", "explanation": "Minerals alag-alag rocks mein milte hain - igneous/metamorphic mein veins aur lodes, sedimentary mein layers/beds (jaise coal), nadi ki ret mein placer deposits (gold), aur surface rocks decompose hone se (bauxite). Memory hook: rock ke type se mineral ka roop badalta hai!", "years": ["2024"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G7-538", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Road Transport", "question": "Why is road transport more important than the other means of transportation in India ? Explain.", "answer": "Road transport is most important in India because of lower construction cost, ability to negotiate hilly terrain and high gradients, door-to-door service, economy for short distances and small loads, and its role as a feeder linking other
