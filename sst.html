one of the following languages is included in Eighth Schedule in Indian Constitution ? (A) Hariyanavi (B) Rajasthani (C) Garhwali (D) Odia", "answer": "(D) Odia. Odia is a Scheduled language in the Eighth Schedule; Haryanvi, Rajasthani and Garhwali are not.", "explanation": "Odia Eighth Schedule wali 22 official bhashaon me hai. Haryanvi, Rajasthani, Garhwali – ye sab bolte to log hain par constitution ki list me nahi hain, isliye non-scheduled. Hook: agar kisi bhasha ka apna state hai (Odisha), to woh aksar scheduled hoti hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P2-896", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government", "question": "Analyse the significance of the elected representatives in the Panchayats.", "answer": "The huge number of elected Panchayat representatives reflects India's vast democratic experiment—enabling direct grassroots participation and settling local issues locally.", "explanation": "Panchayat me itne saare chune hue log hone ka matlab – democracy gaon-gaon tak pahunch gayi hai. Local problems wahin local netas solve karte hain aur aam log seedhe shaamil hote hain. Hook: 'jitne zyada elected log, utni gehri democracy'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "P2-897", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government", "question": "In what way has the representation of women in democracy influenced by Constitutional status for local government ?", "answer": "Constitutional status reserved seats for women in local bodies, greatly increasing their representation and voice and promoting inclusivity and gender equality.", "explanation": "Local government ko constitutional status milne par mahilaon ke liye seats reserve hui (1/3 seats), isse unki representation aur awaaz dono badhi. Pehle ghar tak simti aurtein ab gaon ki sarpanch ban rahi hain. Hook: 'reservation = mahilaon ko democracy me entry'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "P2-898", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government", "question": "What has been the impact of granting Constitutional status to local government on the democratic landscape of the country? Analyse any two impacts.", "answer": "Two impacts: (1) it deepened democracy by empowering grassroots governance and direct participation; (2) it enhanced women's representation and inclusive decision-making on local issues.", "explanation": "Do bade asar: (1) democracy gaon tak gehri hui, log seedhe decisions me aaye; (2) mahilaon ki representation badhi. Matlab power upar se neeche aam logon aur khaaskar auraton tak pahunchi. Hook: 'gehri democracy + mahila empowerment = local body ka constitutional status'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "P2-899", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government / Gandhi's vision", "question": "How does giving power to Panchayats relate to the vision of Mahatma Gandhi ?", "answer": "It fulfils Gandhiji's vision of true democracy and 'Gram Swaraj'—restoring power to people at the grassroots and involving them directly in decision-making and governance.", "explanation": "Gandhiji chahte the ki asli aazadi tab hai jab power gaon ke logon ke haath me ho – unka sapna tha 'Gram Swaraj'. Panchayat ko power dena bilkul wahi vision pura karta hai. Hook: 'Gandhi = Gram Swaraj = gaon ko power'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "P2-900", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government / Gandhi's vision", "question": "Explain the primary objective of giving power to the Panchayats.", "answer": "The main objective is to realise true democracy as envisioned by Gandhiji and the Constitution makers—placing power in people's hands and giving them grassroots experience of democratic governance.", "explanation": "Panchayat ko power dene ka main maksad – asli democracy lana, jahaan power seedhe logon ke paas ho aur woh khud governance seekhein aur chalayein. Yeh Gandhiji aur constitution banane walon ka sapna tha. Hook: 'power logon ke haath = asli loktantra'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "P2-901", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government / Gandhi's vision", "question": "How does the establishment of Panchayati Raj contribute to democracy ? Explain.", "answer": "Panchayati Raj empowers people at the grassroots, promotes local self-governance, involves citizens in planning and implementing development schemes, and increases accountability and people's control.", "explanation": "Panchayati Raj se aam log development schemes banane aur lagu karne me khud shaamil hote hain, jisse unka control aur accountability badhti hai. Democracy sirf vote tak nahi, gaon ke kaam-kaaj tak pahunch jaati hai. Hook: 'Panchayati Raj = gaon ki sarkar, gaon ke haath me'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "P2-905", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Linguistic diversity", "question": "How many languages were recorded as mother tongues in the 2011 Census of India ?", "answer": "More than 1,300 distinct languages were recorded as mother tongues in the 2011 Census of India.", "explanation": "2011 Census me 1300 se zyada alag-alag bhashayein logon ki mother tongue ke roop me likhi gayi! Itni variety kisi aur desh me mushkil se milti hai. Hook: '2011 Census = 1300+ mother tongues = India ka bhasha-khazana'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "P2-906", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Linguistic diversity", "question": "How were the languages grouped together in the Census report ?", "answer": "Many regional languages—such as Bhojpuri, Magadhi, Bundelkhandi, Chhattisgarhi and Rajasthani—were grouped together under the broad category of 'Hindi'.", "explanation": "Census me kai choti regional bhashaon (Bhojpuri, Magadhi, Rajasthani, Chhattisgarhi) ko mila ke ek bade 'Hindi' group me daal diya gaya. Isi wajah se Hindi bolne walon ki ginti itni badi dikhti hai. Hook: 'Hindi ek bada chhata jisme kai bhashayein aa gayin'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "P2-907", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Linguistic diversity / Eighth Schedule", "question": "How does the inclusion of languages in the Eighth Schedule of the Indian Constitution contribute to linguistic diversity ? Explain.", "answer": "Inclusion in the Eighth Schedule recognises a language's cultural significance, helps protect and promote it, ensures speakers can access education and government services in it, and often makes it an official state language.", "explanation": "Eighth Schedule me aane se bhasha ko izzat aur sarkari support milta hai – padhai aur government kaam us bhasha me ho sakte hain, aur woh aksar state ki official language ban jaati hai. Isse choti bhashayein bhi zinda aur strong rehti hain. Hook: 'Schedule me entry = bhasha ko surakshaa + pehchaan'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "P2-924", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Federal vs unitary government", "question": "‘‘Federal form of government is in direct contrast to the Unitary form of government.’’ Explain the statement.", "answer": "In a unitary system there is only one level of government (or sub-units subordinate to the centre, which can order them). In a federal system there are two or more levels, with state governments having their own constitutionally guaranteed powers, both levels being answerable to the people.", "explanation": "Unitary me sari power ek (central) sarkar ke paas, baaki sab uske neeche aur order maante hain. Federal me Centre aur State dono ki apni-apni power hoti hai, koi kisi ka naukar nahi, dono janta ko jawabdeh. Hook: 'Unitary = ek boss, Federal = power baanti hui'.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 2}, {"key": "P2-927", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Features of federalism", "question": "Describe any three characteristics of the Indian federal system.", "answer": "1) Two or more tiers of government (Centre, States, Local). 2) Each tier has its own jurisdiction in legislation, taxation and administration, specified in the Constitution. 3) Fundamental provisions cannot be changed unilaterally; courts interpret the Constitution and act as umpires in disputes.", "explanation": "Indian federal system ki teen baatein: (1) kai level ki sarkarein (Centre, State, Local), (2) har level ka apna kaam, tax aur administration ka daayra constitution me likha hua, (3) basic niyam akele koi nahi badal sakta, aur court referee banke jhagde suljhata hai. Hook: 'tiers + apni jurisdiction + court referee'.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 2}, {"key": "P2-929", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Indian federalism / role of Constitution", "question": "Examine the role of the Constitution in the Federal System of India in two points.", "answer": "The Constitution: (1) sets up different tiers of government with clearly specified powers (Union, State, Concurrent lists); (2) makes fundamental federal provisions changeable only with both levels' consent, safeguarding the federal balance.", "explanation": "Constitution federal system me do bade kaam karta hai: (1) Centre aur State ki power saaf-saaf baant deta hai (teen lists ke through), (2) basic federal niyam aise banata hai ki akela koi level unhe badal na sake. Hook: 'Constitution = rulebook jo power baant ta aur balance protect karta hai'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "P2-930", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Indian federalism / role of judiciary", "question": "Examine the role of the Supreme Court in the Federal System of India in two points.", "answer": "The Supreme Court: (1) interprets the Constitution and the powers of different tiers; (2) acts as the umpire/arbiter, settling disputes between the Centre and States.", "explanation": "Supreme Court federal system me do kaam karta hai: (1) constitution aur har level ki power ka matlab samjhata hai, (2) Centre-State jhagde me referee banke faisla deta hai. Hook: 'Supreme Court = federalism ka umpire/referee'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "P2-931", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Indian federalism / division of power", "question": "‘‘Sharing of power between the Union Government and State Governments is basic to the structure of our Constitution.’’ Support the statement.", "answer": "The Constitution sets up different tiers (Centre and State) with specified jurisdictions via three lists (Union, State, Concurrent), and these fundamental power-sharing provisions cannot be changed unilaterally by one level—making power-sharing basic to its structure.", "explanation": "Hamare Constitution ki neev hi power-sharing par tiki hai – Centre aur State ki power teen lists me baanti hui hai, aur ye baant akela koi level badal nahi sakta. Isliye power baant na constitution ka basic structure hai. Hook: 'power baant na = constitution ki buniyaad'.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 2}, {"key": "P2-937", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Decentralisation / three-tier government", "question": "Why was the need for decentralisation recognized in the Indian Constitution ? Explain.", "answer": "Because India is vast and diverse, power-sharing was essential; local issues are best handled locally by people who know their problems and resources best, and it deepens democracy by encouraging direct participation.", "explanation": "India itna bada aur vividh hai ki sari power upar nahi rakhi ja sakti – isliye decentralisation zaroori tha. Local problems wahin ke log behtar samajhte hain aur direct participation se democracy gehri hoti hai. Hook: 'bada desh + alag-alag log = power neeche tak baant na zaroori'.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "P2-938", "chapter_code": "P2", "chapter_name": "Federalism", "discipline": "Political Science", "topic": "Local self-government / structure", "question": "Mention the formation of Zilla Parishad.", "answer": "A Zilla Parishad is formed by grouping all the Panchayat Samitis/Blocks of a district. Most members are elected; it also includes MPs and MLAs of the district, and its chairperson is the political head.", "explanation": "Ek district ki saari Panchayat Samitis (blocks) milke Zilla Parishad banti hai – ye Panchayati Raj ka sabse upar wala (district) level hai. Iske zyadatar members chune hue, plus us area ke MP/MLA bhi, aur chairperson iska head. Hook: 'Zilla Parishad = poore district ka top panchayat level'.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "P3-958", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Women Empowerment", "question": "Which one of the following statements, best describes women empowerment ?", "answer": "(C) Ensuring equal opportunities and rights for women - that is the best description of women empowerment.", "explanation": "Women empowerment ka sabse sahi matlab hai - aurton ko barabar mauke aur haq dena, na ki sirf koi ek cheez. Memory hook: empowerment = 'barabar mauka + barabar haq'. Bas izzat ya paisa dena nahi, balki har kshetra mein equal opportunity dena hi asli sashaktikaran hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P3-959", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Women in Politics - Representation", "question": "“Role of women is gradually enhancing in the politics of the country.” Examine the statement.", "answer": "Women's political role is growing due to constitutional reservation (33% at local level via 73rd/74th amendments, 1992), more education and training, and women now heading panchayats and holding seats in state assemblies and parliament and high political offices.", "explanation": "Haan, ab rajneeti mein aurton ka role badh raha hai - 1992 ke 73ve/74ve sanshodhan se panchayat-municipality mein 33% reservation mila, shiksha badhi, aur ab aurtein panchayat se sansad tak leadership mein hain. Memory hook: '1992 reservation + shiksha' ne aurton ko rajneeti mein aage badhaya.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "P3-961", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Secularism in India", "question": "Read the following provisions regarding Secularism in the Indian Constitution and choose the correct option. I. The Indian State has not adopted any religion as its official religion. II. The Constitution gives freedom to all the citizens to practice and propagate any religion. III. The Constitution declares any kind of discrimination done on the basis of religion to be legal. IV. It gives the government the right to intervene in religious matters for ensuring equality within religious communities.", "answer": "(B) Only I, II and IV are correct. Statement III is wrong - the Constitution makes religious discrimination ILLEGAL, not legal.", "explanation": "Yahan I, II, IV sahi hain - koi official dharm nahi, sabko freedom, aur state equality ke liye dakhal de sakta hai. Par III galat hai kyunki dharm ke aadhaar par bhedbhaav 'legal' nahi balki 'gaiar-kanooni' hai. Memory hook: discrimination kabhi 'legal' nahi hota - yeh trap statement hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P3-962", "chapter_code": "P3", "chapter_name": "Gender, Religion and Caste", "discipline": "Political Science", "topic": "Women in Public Life", "question": "Statement I : Women are now actively contributing to various professions including roles as doctors, engineers, lawyers, managers and university teachers. Statement II : Political expression of gender division and political mobilization helped to improve women’s role in public life.", "answer": "(C) Both Statements I and II are true and II is the correct explanation of I.", "explanation": "Aaj aurtein doctor, engineer, lawyer, manager sab ban rahi hain (Statement I sahi). Aur iska kaaran - gender division ko rajneeti mein uthana aur political mobilization (Statement II) - bilkul sahi explanation hai. Memory hook: jab aawaaz uthi (political mobilization), tab hi aurton ko public life mein jagah mili.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason", "MCQ"], "score": 2}, {"key": "P4-983", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Reforms to political parties", "question": "Which one of the following steps has been taken by the Election Commission of India to reform political parties ?", "answer": "(D) It has been made mandatory for all parties to conduct organizational elections and file income-tax returns.", "explanation": "Election Commission ne do cheezein compulsory ki - party andar election karaye aur income tax return bhare. Isko alag se yaad rakho: EC = 'organisational election + ITR'. Affidavit wala order Supreme Court ka tha, EC ka nahi - is confusion mein mat phasna exam mein!", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P4-990", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Functions of political parties", "question": "How do Political Parties ensure accountability to the public ? Choose the most suitable option from the following.", "answer": "(D) Through Election and Voter Support - parties remain accountable because they must face elections periodically and depend on voters' support to stay in power.", "explanation": "Parties janta ke prati jawabdeh kaise rehti hain? Kyunki har kuch saal mein election hota hai aur janta ka vote chahiye hota hai! Agar kaam nahi karoge to agli baar vote nahi milega. Isliye answer = Election aur Voter Support. Simple logic: 'vote ka dar hi accountability laata hai'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P4-1002", "chapter_code": "P4", "chapter_name": "Political Parties", "discipline": "Political Science", "topic": "Need for political parties in democracy", "question": "Assertion (A) : Modern democracy cannot function without political parties. Reason (R) : Elected representatives will be accountable only to their constituencies, not towards the country.", "answer": "(C) Both (A) and (R) are true and (R) is the correct explanation of (A) - without parties each representative would answer only to their own area, so parties are needed to make a government responsible to the whole country.", "explanation": "Dono sahi, aur Reason hi Assertion ka kaaran. Bina parties ke har neta sirf apne area ki sochta - poore desh ki kaun dekhta? Isiliye modern democracy parties ke bina chal hi nahi sakti. Note: yahan option label '(C)' hai (paper ke hisaab se) - dhyaan rakhna ki text 'both true + R explains A' keh raha hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 2}, {"key": "P5-1028", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Values of democracy", "question": "Analyse any five values of democracy.", "answer": "Five values of democracy: promotes equality, enhances individual dignity, improves decision-making, resolves conflicts peacefully, and accommodates social diversity – rooted in people's passion for respect and freedom.", "explanation": "Paanch values rat lo bhai - (1) equality, (2) dignity, (3) better decisions, (4) conflict resolution, (5) diversity accommodation. Yeh sab respect aur freedom ki bhookh se aate hain. Hook: 'E-D-D-C-D' formula yaad rakho.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "P5-1029", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Features of democracy (MCQ)", "question": "Which one of the following is a fundamental principle of democracy ? (A) Rule of single individual (B) Rule with hereditary norms (C) Rule of people with freedom (D) Rule of military chiefs", "answer": "(C) Rule of people with freedom. Democracy fundamentally means rule BY the people, with freedom guaranteed – not by one person, heredity or the military.", "explanation": "Democracy ka asli funda - 'janta ka raaj, freedom ke saath'. Na ek aadmi ka, na khaandaani, na fauj ka. Hook: option mein jahan 'people + freedom' dikhe, wahi sahi answer.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P5-1031", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Features of democracy (MCQ)", "question": "Read the following statements regarding democracy and choose the correct option. I. Promotes equality among citizens II. Government by few individuals III. Protection of human rights IV. Ensures checks and balance system", "answer": "(C) I, III and IV. Democracy promotes equality, protects human rights and ensures checks and balances; 'government by few individuals' (II) is NOT a feature of democracy.", "explanation": "Sahi features chuno - equality (I), human rights (III), checks & balances (IV). 'Few individuals ka raaj' (II) to oligarchy/dictatorship hai, democracy nahi! Hook: jahan 'few individuals' dikhe hata do.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "P5-1032", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Assessing outcomes of democracy", "question": "“Democracy’s ability to generate its own support is also its outcome and it cannot be ignored.” Explain the statement.", "answer": "A major outcome of democracy is that it generates its own support – even people unhappy with results still prefer democracy and want more of it, which shows its legitimacy and acceptability.", "explanation": "Democracy ki ek mast baat - log isse khush na bhi hon, phir bhi democracy hi chahte hain, dictatorship nahi! Yeh khud-ba-khud support paida karna democracy ka sabse bada outcome hai. Hook: 'logon ka bharosa = democracy ka asli result'.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "P5-1033", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Political equality", "question": "“Democratic systems are based on political equality.” Explain the statement.", "answer": "Democracy is based on political equality: every adult citizen gets one vote of equal value (universal adult franchise), regardless of wealth, caste, religion or gender, giving everyone an equal say in choosing the government.", "explanation": "Political equality ka matlab - chahe ameer ho ya gareeb, sabka ek vote, aur har vote ki keemat barabar! Yahi democracy ki buniyaad hai. Hook: 'one person, one vote, one value'.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "P5-1034", "chapter_code": "P5", "chapter_name": "Outcomes of Democracy", "discipline": "Political Science", "topic": "Features of democracy (MCQ)", "question": "Read the following characteristics of democracy and choose the correct option. I. Free and fair elections II. Equality before law III. Dignity of a person IV. Majority rule", "answer": "(A) Only I, II and III are correct. Free and fair elections, equality before law and dignity of a person are democratic features; bare 'majority rule' (IV) ignoring minorities is not a correct characteristic.", "explanation": "Sahi characteristics - free elections (I), equality before law (II), dignity (III). 'Majority rule' (IV) akela galat hai kyunki democracy minority ka bhi dhyan rakhti hai. Hook: democracy = majority + minority dono.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "E1-0", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Average / Per Capita Income", "question": "Assume there are four families in a locality. If the monthly income of each family is ₹ 10,000, ₹ 20,000, ₹ 30,000 and ₹ 40,000, then what is the average income of the locality? Choose the correct option from the following:", "answer": "(A) Rs. 25,000. Average = (10,000+20,000+30,000+40,000)/4 = 1,00,000/4 = Rs. 25,000.", "explanation": "Yeh simple average ka sawaal hai bhai. Saari family incomes ko jodo aur kitni families hain usse divide kar do. Yahan total 1,00,000 bana, 4 se divide kiya toh 25,000. Yaad rakho: average income = total income ÷ total population. Yahi formula per capita income mein bhi kaam aata hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E1-1", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Average / Per Capita Income", "question": "Assume there are four families in a locality. If the income of each family is ₹ 6,000, ₹ 4,000, ₹ 7,000 and ₹ 3,000 then find out the average income of the locality from the following options :", "answer": "(A) Rs. 5,000. Average = (6,000+4,000+7,000+3,000)/4 = 20,000/4 = Rs. 5,000.", "explanation": "Phir wahi average wala funda. Chaaron incomes jodo (20,000 bana) aur 4 se baant do, jawab aaya 5,000. Trick yeh hai ki options dekh ke confuse mat ho, bas seedha jod aur divide. Average income ka formula har baar same rehta hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E1-4", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Average / Per Capita Income", "question": "Read the given data in the table and find out the average monthly income of Country A. Choose the correct option. Monthly Income of Citizens of Two Countries (in Rupees) Country A 10500 9800 9500 10000 10500 ? Country B 6000 6000 6000 6000 50000", "answer": "(d) 10,060. Average of Country A = (10,500+9,800+9,500+10,000+10,500)/5 = 50,300/5 = Rs. 10,060.", "explanation": "Yahan 5 citizens ki income di hai Country A ki. Sab jodo (50,300) aur 5 se baant do, jawab 10,060. Side note: Country B mein ek banda 50,000 kamaata hai jisse uska average bhi bada dikhega – isiliye average kabhi-kabhi asli tasveer chhupa deta hai. Yahi average ki limitation hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E1-16", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "HDI – Reading Country Data Tables", "question": "Which of the following countries has the highest 'Life Expectancy' at the birth?", "answer": "(B) Bangladesh – among the given options it has the highest life expectancy at birth.", "explanation": "Life expectancy matlab average kitne saal log jeete hain. Inn options mein Bangladesh sabse aage hai. Yeh bhi table/data based hota hai – jis country ke saamne life expectancy ka number bada, wahi answer. Yahan Bangladesh ka number sabse zyada nikla.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E1-17", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "World Bank & UNDP – Reports", "question": "Which one of the following organizations prepares the 'World Development Report'?", "answer": "(A) World Bank – it prepares and publishes the 'World Development Report'.", "explanation": "Naam mein hi hint hai – 'World Development Report' banata hai World Bank. Iske ulat 'Human Development Report' UNDP banata hai. Memory hook: World Bank → World Development Report, UNDP → Human Development Report. Dono reports ko mat mix karna, exam isi pe trap karta hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E1-37", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Money Cannot Buy Everything (Non-material things)", "question": "Select which among the following cannot be purchased through money. Choose the correct option : I. Full protection from infectious diseases II. A pollution-free atmosphere III. High quality education IV. A luxury home", "answer": "(d) I and II – full protection from infectious diseases and a pollution-free atmosphere cannot be bought with money (they need collective/community effort).", "explanation": "Paise se sab kuch nahi khareeda jaata bhai. Luxury ghar aur achhi padhai toh paise se mil jaaye, par bimaariyon se poori suraksha aur pollution-free hawa? Yeh sirf paise se nahi, sabke saath milke (community effort) aati hain. Memory hook: hawa aur sehat 'sabke' hote hain, akele paise se nahi milte.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E1-39", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Sustainability of Development", "question": "'The question of sustainability of development raises many fundamentally new issues about the nature and process of development.' Explain it with examples.", "answer": "Sustainable development means meeting present needs without harming future generations. It requires conserving the environment, using renewable resources (solar, wind, groundwater) wisely and limiting use of non-renewable resources so they last for the future.", "explanation": "Sustainability ka matlab: aaj develop karo par aane waali peedhi ka haq mat cheeno. Renewable cheezein (solar, wind, groundwater) samajhdaari se use karo aur non-renewable (coal, petrol) bacha ke rakho. Memory hook: 'aaj bhi, kal bhi' – development aisi ho jo hamesha chal sake. Example zaroor likhna.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 1}, {"key": "E1-40", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Sustainability of Development", "question": "Why is the issue of sustainability important for development ? Explain with examples.", "answer": "Sustainability is important because it protects people from pollution, conserves the environment and ensures resources last for future generations. It checks overuse of renewables (like groundwater) and depletion of non-renewables.", "explanation": "Sustainability zaroori hai kyunki yeh hamein pollution se bachati hai, environment ko zinda rakhti hai aur resources future ke liye bacha ke rakhti hai. Groundwater jaise renewable bhi over-use se khatam ho jaate hain. Memory hook: prakriti ko itna hi lo jitna woh dubara de sake.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 1}, {"key": "E1-58", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Development Indicators – Literacy, IMR, Attendance", "question": "Read the following data and answer the question that follow : Some comparative Data on Haryana, Kerala and Bihar State Infant Mortality Rate (per thousand person) Literacy Rate % Net Attendance Ratio (per 100 person) Haryana 30 82 61 Kerala 7 94 83 Bihar 32 62 43 How much is the Net Absence Ratio of Haryana ? Choose the appropriate option from the following :", "answer": "(a) 39. Net Absence Ratio = 100 − Net Attendance Ratio = 100 − 61 = 39 (for Haryana).", "explanation": "Net Attendance Ratio of Haryana 61 hai, toh jo bachhe school nahi ja rahe (Net Absence) = 100 − 61 = 39. Bas 100 mein se attendance ghata do. Memory hook: 'jo aaye + jo nahi aaye = 100'. Yeh chhota sa calculation easy marks deta hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E1-59", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Development Indicators – Literacy, IMR, Attendance", "question": "Read the following material and answer the question given below. Some Comparative Data of Haryana, Kerala and Bihar State | Infant Mortality Rate per 1000 persons | Literacy Rate % | Net Attendance Ratio % Haryana | 61 | 82 | 30 Kerala | 7 | 94 | 83 Bihar | 43 | 62 | 32 What is the Net Attendance Ratio (in %) of Haryana? Choose the correct answer.", "answer": "Net Attendance Ratio of Haryana = 30% (read directly from the Net Attendance Ratio column for Haryana in the given table).", "explanation": "Iss table mein Haryana ke saamne Net Attendance Ratio column mein 30 likha hai – seedha wahi answer hai, koi calculation nahi. Memory hook: 'jo column maanga, wahi number uthao'. Bas dhyaan rakho kaunsa column poocha gaya hai, kyunki numbers aaspaas hote hain.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E1-70", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Government's Role in Development", "question": "Which one of the following is the preceding Government Agency of NITI Aayog ?", "answer": "(A) Planning Commission – it was the body that preceded NITI Aayog (which replaced it in 2015).", "explanation": "NITI Aayog se pehle jo sansthaan tha woh tha Planning Commission (2015 mein NITI Aayog ne iski jagah li). Memory hook: 'Planning Commission purana, NITI Aayog naya'. Yeh ek seedha GK-type fact hai, bas yaad rakhna hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E1-71", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Government's Role in Development", "question": "Imagine that you are the village Head. Suggest any two activities that you think should be taken up to increase the income of the villagers.", "answer": "Develop water-harvesting and irrigation facilities to boost farming, and promote Self-Help Groups, animal husbandry and cottage industries to create extra income and employment for villagers.", "explanation": "Agar tum gaon ke pradhan ho toh income badhane ke do simple kaam: (1) paani aur sinchai (irrigation) ka intezaam taaki kheti achhi ho, (2) Self-Help Groups, pashupalan ya cottage industries chalao taaki extra kamai ho. Memory hook: 'paani + chhote dhandhe = zyada income'. Do clear activities likho.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "E2-73", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Which one of the following pair is correctly matched ? (A) Primary Sector - Fishermen (B) Secondary Sector - Priest (C) Tertiary Sector - Basket Weaver (D) Quaternary Sector - Gardener", "answer": "(A) Primary Sector – Fishermen. Fishing uses natural resources directly, so it is a primary-sector activity.", "explanation": "Yaad rakho - jo kaam directly nature se hota hai (kheti, machhli pakadna, mining) wo Primary sector hai. Fisherman samundar se machhli nikaalta hai, matlab seedha prakriti se - isliye Primary. Memory hook: 'Pehle nature, phir Primary'. Baaki options galat match hain.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ", "Match"], "score": 1}, {"key": "E2-74", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Employment data / NSO", "question": "Which one of the following organization is providing data regarding employment in India ?", "answer": "(A) National Statistical Office (NSO). The NSO conducts surveys and provides official employment data in India.", "explanation": "India mein rozgaar (employment) ka official data kaun deta hai? National Statistical Office (NSO). Ye government ki body hai jo surveys karke aankde nikaalti hai. Memory hook: 'Naukri ka Saara data - NSO'. Yahi exam mein baar-baar poocha jaata hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E2-75", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Organised vs Unorganised sector", "question": "Kanta works in an office. She gets her salary regularly at the end of every month. In addition to the salary, she also gets other benefits laid down by the government. In which of the following sector Kanta is working?", "answer": "(A) Organized Sector. Regular salary plus government-mandated benefits are features of the organised sector.", "explanation": "Kanta ko har mahine fixed salary milti hai aur govt-wale benefits (PF, paid leave) bhi - ye saare signs Organized sector ke hain. Jahan rules follow hote hain aur security hoti hai, wahi organized. Memory hook: 'Organized = order + benefits'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E2-88", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Employment across sectors", "question": "Study the data given below in the table and answer the question by selecting the correct option. Which is the most important sector that provides maximum jobs to the people ? Table Workers in different sectors (in millions) Sector Organized Unorganized Total Primary 1 231 232 Secondary 41 74 115 Tertiary 40 88 128 Total 82 393 475", "answer": "(d) Primary sector, especially the unorganised part. The data shows the primary sector employs the most people (232 million), mostly unorganised.", "explanation": "Table dekho - Primary mein 232 million log kaam karte hain, sabse zyada, aur unme bhi zyadatar unorganized hain. Matlab India mein abhi bhi sabse zyada naukri kheti (Primary, unorganized) deti hai. Memory hook: 'Sabse zyada haath = kheton mein'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E2-89", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Organised vs Unorganised sector", "question": "Ramesh is a worker in a garment export industry of Jaipur. He gets facilities like health insurance, provident fund, medical leave, etc. In which one of the following sectors is Ramesh working ?", "answer": "(c) Organized sector. Facilities like health insurance, provident fund and medical leave are features of the organised sector.", "explanation": "Ramesh ko health insurance, PF, medical leave mil raha hai - ye saare organized sector ke benefits hain. Jahan ye sab milein, samajh lo organized sector hai. Memory hook: 'PF + insurance = Organized pakka'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E2-91", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Public vs Private sector", "question": "Which are the two sectors based on the ownership of resources ? Explain each of them.", "answer": "Based on ownership: (1) Public Sector – government owns most assets and provides services for public welfare (e.g., Railways, Post Office). (2) Private Sector – assets owned and services delivered by private individuals/companies for profit (e.g., TISCO, Reliance).", "explanation": "Ownership ke hisaab se do sector: Public (sarkar ke control mein, jaise Railway, Post Office) aur Private (private logon ke, profit ke liye, jaise Reliance, TISCO). Memory hook: 'Public = sarkar, Private = paisa kamaana'.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "E2-92", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Interdependence of sectors", "question": "How are primary, secondary and tertiary sectors dependent on each other ? Explain.", "answer": "They are interdependent: the primary sector supplies raw materials to the secondary sector; the secondary sector makes goods/machines used by primary and tertiary; and the tertiary sector provides services (transport, banking, communication) that support both other sectors.", "explanation": "Teeno sector ek doosre par depend karte hain - Primary kaccha maal deta hai Secondary ko, Secondary machine/goods banata hai sabke liye, aur Tertiary transport/bank jaisi services deke dono ki madad karta hai. Memory hook: 'Sab ek team - koi akela nahi chal sakta'.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "E2-94", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Which one of the following pairs is correctly matched ? (A) Primary Sector – Money Lender (B) Secondary Sector – Priest (C) Tertiary Sector – Bank (D) Manufacturing Sector – Gardener", "answer": "(C) Tertiary Sector – Bank. Banking is a service, so it belongs to the tertiary sector.", "explanation": "Bank koi cheez nahi banata - wo paise/loan ki service deta hai, isliye Tertiary sector. Priest aur money lender wale options galat jagah lage the. Memory hook: 'Service deta hai = Tertiary'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E2-95", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Organised vs Unorganised sector", "question": "Which one of the following is an activity of the unorganized sector ?", "answer": "(D) A daily wage labourer working under a contractor. Such work is irregular and outside government regulation, hence unorganised.", "explanation": "Daily wage labourer jo contractor ke neeche kaam karta hai - na job pakki, na koi benefit, na rules. Yahi unorganized sector hai. Memory hook: 'Roz ki dihaadi, koi guarantee nahi = Unorganized'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E3-148", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Formal vs Informal Sources of Credit", "question": "Which one of the following is a formal source of credit ?", "answer": "(D) Cooperative Society. Cooperative societies are a formal source of credit (along with banks), supervised by the RBI.", "explanation": "Yaad rakho: bank aur cooperative society = formal source. Moneylender, trader, dost-rishtedaar = informal. Formal wale RBI ke control mein aate hain aur interest kam lete hain, isliye option D (Cooperative Society) sahi hai. Trick: jiske upar RBI ki nazar hai, wahi formal.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E3-166", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Banking & Deposits", "question": "Explain the role of banks with regard to money which they accept from the public.", "answer": "Banks keep only a small part of public deposits as cash and use the major portion to give loans to businesses and individuals, earning interest; this mediates between depositors and borrowers and circulates money in the economy.", "explanation": "Public jo paisa bank mein jama karti hai, bank uska thoda hissa cash rakhta hai aur baaki loan pe de deta hai. Borrowers se byaaj leta, depositors ko kam byaaj deta — beech ka difference bank ki kamai. Yani bank depositor aur borrower ke beech ka 'bridge' hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 1}, {"key": "E3-167", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Reserve Bank of India", "question": "Which among the following organisations issues the currency notes in India ?", "answer": "(d) The Reserve Bank of India. The RBI issues currency notes on behalf of the Central Government.", "explanation": "India mein note kaun chhaapta hai? Sirf RBI (Reserve Bank of India), Central Government ki taraf se. Option (d). Yaad rakho: 1 rupee note Finance Ministry, baaki saare notes RBI — exam ke liye 'RBI issues currency' kaafi hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E3-179", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Terms of Credit & Collateral", "question": "What is a collateral ? Why is it a main reason to prevent the poor getting a loan from banks ? Explain.", "answer": "Collateral is an asset (land, building, deposits) the borrower pledges as security against a loan. The poor usually have no such asset, so banks refuse them loans and they are pushed towards informal lenders.", "explanation": "Collateral = woh cheez (zameen, ghar, gehne) jo loan ke badle guarantee ke roop mein girvi rakhte ho. Garib ke paas yeh hota hi nahi, isliye bank loan nahi deta aur woh moneylender ke paas chala jaata hai. Yahi collateral ki 'wall' garibon ko rokti hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 1}, {"key": "E3-190", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Self-Help Groups (SHGs)", "question": "Who among the following takes the decision regarding saving and loan activities in the Self Help Groups (SHGs) ?", "answer": "(D) Members of the Self-Help Group. In an SHG, members themselves decide on savings and loan matters.", "explanation": "SHG mein saving aur loan ke faisle kaun leta hai? Khud group ke MEMBERS — option (D). Bank ya bahar koi nahi, sab milke decide karte hain kis ko, kitna loan dena hai. Yahi SHG ki khaasiyat hai: apni group, apne faisle.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E4-210", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "MNCs and joint production", "question": "Which one of the following is a major benefit to an MNC when it works on joint production with a local company ?", "answer": "(B) MNC can decide all parameters and prices of the product.", "explanation": "Yaad rakho - jab MNC kisi local company ke saath milke production karti hai, to bada faayda MNC ko hota hai: woh product ke saare parameters aur prices khud control kar leti hai. Memory hook: MNC = 'My Name Controls' - paisa aur power dono uske paas. Local company sirf saath deti hai, decisions MNC leti hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E4-211", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "MNCs and joint production", "question": "Which one of the following is a major benefit to a local company which goes for joint production with an MNC?", "answer": "(A) MNCs can provide money and technology to the local company.", "explanation": "Ye ulta wala sawaal hai - yahan poochha hai LOCAL company ko kya faayda. Simple: MNC paise (money) aur naye technology le aati hai, jo local company ke paas nahi hote. Toh local company ko investment aur modern tech mil jaata hai. Trick: 'M' for MNC = Money + Machinery (technology) milti hai local ko.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E4-215", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "MNCs (case examples)", "question": "Cargill Foods, a very large MNC, is the largest producer of edible oil in India. Which one of these countries does it belong to ?", "answer": "(d) United States of America.", "explanation": "Cargill Foods ek American (USA) MNC hai jo India mein sabse bada edible oil (khaane ka tel) producer hai. Memory hook: Cargill = 'Car' se yaad karo America (cars wala desh, USA). Yeh wahi company hai jisne Indian brands jaise Leonardo, Sweekar khareede the.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E4-216", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Technology and globalisation", "question": "In which one of the following ways has information and communication technology stimulated the globalisation process the most ?", "answer": "(d) Access information instantly across countries.", "explanation": "ICT ne globalisation ko sabse zyada is tarah boost kiya - duniya bhar ki information turant (instantly) mil jaati hai. Pehle din lagte the khabar pahunchne mein, ab seconds mein! Memory hook: 'Instant access' = ICT ka superpower. Internet aur phone ne distance ko zero kar diya.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "E4-217", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Impact of globalisation on workers", "question": "Describe the impact of flexibility in the labour laws on the workers in India.", "answer": "Negative impact: MNCs employ workers temporarily to cut costs, no year-round pay, long hours/night shifts in peak season; job security and income stability badly affected (some BPO workers get flexible hours).", "explanation": "Flexible labour laws ka matlab - companies workers ko jab chaahe rakh aur nikaal sakti hain. Workers ko saal bhar kaam nahi milta, peak season mein 12-12 ghante kaam, fir chhutti. Job security khatam! Memory hook: 'Flexible' company ke liye accha, worker ke liye 'no guarantee'. Cost bachaane ke liye workers ka shoshan.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 1}, {"key": "E4-222", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Liberalisation 1991", "question": "'Liberalization of foreign trade involves policy framework at National and International level.' Explain the statement.", "answer": "Liberalisation removes trade barriers at national level (govt eases import/export rules, allows foreign companies) and works with international organisations like WTO that set rules to promote free trade among nations.", "explanation": "Liberalisation do levels par chalta hai. National level - apni sarkar trade barriers hataati hai (import-export aasaan). International level - WTO jaisi sanstha global trade ke niyam banaati hai. Memory hook: ghar ke andar (national) bhi darwaaza khola, aur duniya ke club (WTO/international) mein bhi shaamil hue.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "E4-225", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Impact of globalisation", "question": "Among producers and workers, the impact of globalization has not been uniform. Support the statement with suitable arguments.", "answer": "Impact is uneven: large producers and skilled/educated workers benefited (growth, jobs, exports), but small producers faced ruinous competition and closures, and many workers lost job security with low wages and temporary work.", "explanation": "Globalisation ka faayda sabko barabar nahi mila. Bade producers aur padhe-likhe, skilled workers ko khoob faayda hua, lekin chhote producers competition mein doob gaye aur kayi workers ki naukri unsafe ho gayi. Memory hook: ek hi baarish mein kuch fasal lehlahaati hai, kuch doob jaati hai - globalisation aisa hi hai.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "E4-236", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Exchange rates", "question": "Differentiate between Fixed Exchange and Floating Exchange rates.", "answer": "Fixed exchange rate: govt/central bank fixes and maintains the currency's value. Floating (flexible) exchange rate: the rate is determined by market forces of demand and supply, not the government.", "explanation": "Do tarah ke exchange rate hote hain. Fixed - government/RBI currency ka rate fix kar deti hai. Floating - rate market ki demand aur supply se khud upar-niche hota hai. Memory hook: 'Fixed' = government ne keel se taang diya (sthir), 'Floating' = paani par tairta (market ke hisaab se badalta). Yeh thoda alag topic hai, dhyaan se.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "G-MAP-250", "chapter_code": "G-MAP", "chapter_name": "Geography (Map Work)", "discipline": "Geography", "topic": "Map work", "question": "On the same outline Map of India, locate and label any THREE of the following with suitable symbols : (i) Hirakud Dam (ii) Tarapur Atomic Power Station (iii) Pune Software Technology Park (iv) Paradip Sea Port", "answer": "Hirakud Dam: Odisha (Mahanadi). Tarapur Atomic Power Station: Maharashtra. Pune Software Technology Park: Maharashtra. Paradip Sea Port: Odisha.", "explanation": "Yeh classic map-locate set hai bhai. Hirakud (Odisha) aur Paradip port (Odisha) dono ek hi state mein — yaad rakho 'O for Odisha'. Tarapur aur Pune dono Maharashtra mein. Memory hook: 'TP Maharashtra mein, HP Odisha mein'. Bas symbol sahi banao aur naam clearly likho, marks pakke.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 3, "types": ["Map"], "score": 1}, {"key": "G-MAP-252", "chapter_code": "G-MAP", "chapter_name": "Geography (Map Work)", "discipline": "Geography", "topic": "Map work", "question": "On the same political outline map of India, locate and label any three of the following with suitable symbols : (i) Tehri Dam (ii) Bokaro Coal mines (iii) Pune Software Technology Park (iv) Tuticorin Sea port", "answer": "Tehri Dam: Uttarakhand (Bhagirathi). Bokaro Coal mines: Jharkhand. Pune STP: Maharashtra. Tuticorin Sea Port: Tamil Nadu.", "explanation": "Tehri dam Uttarakhand mein, pahaadon wala area — North mein dikhao. Bokaro coal Jharkhand (coal-belt yaad rakho). Pune Maharashtra. Tuticorin ekdum South tip ke paas, Tamil Nadu ka port. Hook: 'Tuticorin = Tamil tip'. North se South tak ek line ban jaati hai isme.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["Map"], "score": 1}, {"key": "G-MAP-253", "chapter_code": "G-MAP", "chapter_name": "Geography (Map Work)", "discipline": "Geography", "topic": "Map work", "question": "On the same given map of India, mark and label any three of the following with appropriate symbols. (a) Salal Dam (b) Narora Atomic Power Plant (c) Pune Software Technology Park (d) Haldia Seaport", "answer": "Salal Dam: Jammu & Kashmir (Chenab river). Narora Atomic Power Plant: Uttar Pradesh. Pune STP: Maharashtra. Haldia Seaport: West Bengal.", "explanation": "Salal dam J&K mein, Chenab river pe — ekdum top pe dikhao. Narora UP mein (atomic plant). Pune toh apna Maharashtra. Haldia West Bengal ka port. Trick: 'Salal = Chenab ka saathi'. Yeh teen-teen ke combo mein koi bhi 3 chuno, par naam aur symbol clear rakhna.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["Map"], "score": 1}, {"key": "G1-264", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil types", "question": "Which of the following pair is correctly matched ? (A) Alluvial Soil - Gangetic Plain (B) Black Soil - Himalayan Region (C) Arid Soil - Western Ghats (D) Laterite Soil - Desert Area", "answer": "(A) Alluvial Soil – Gangetic Plains.", "explanation": "Yaad rakho: Alluvial (jallodh) mitti nadiyan laati hain, isliye yeh Gangetic Plains (uttar ke maidan) mein milti hai. Baaki options ulti jodi hain (Black soil Deccan mein, Arid soil Rajasthan mein). Trick: 'Ganga = Alluvial' ek dum pakka pair hai, exam mein aankh band karke isi ko tick karna.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ", "Match"], "score": 1}, {"key": "G1-265", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil types", "question": "Which of the following is correctly matched ? (a) Alluvial Soil - Consist of sand and silt (b) Black Soil - Salt content is high (c) Arid Soil - Diffusion of iron in crystalline (d) Laterite Soil - Made up of Lava flows", "answer": "(a) Alluvial soil – Consist of sand and silt.", "explanation": "Alluvial soil banti hai sand (ret), silt aur clay se jo nadiyon ke saath beh kar aati hai. Baaki jodi ulti hain - lava flows se to Black soil banti hai, Alluvial nahi. Memory hook: 'River ka tohfa = sand + silt = Alluvial'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G1-266", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil types", "question": "Which of the following pair is correctly matched ? (A) Alluvial Soil Western Rajasthan (B) Black Soil Northern Plain (C) Arid Soil Deccan Plateau (D) Laterite Soil Western Ghats", "answer": "(D) Laterite Soil – Western Ghats.", "explanation": "Laterite mitti wahan banti hai jahan zyada baarish aur leaching hoti hai - jaise Western Ghats, Eastern Ghats, Kerala, Karnataka. Yahan coffee aur tea ki kheti hoti hai. Trick: 'Laterite = Ghats ki baarish wali mitti', isliye option D sahi hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G1-267", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil types", "question": "Which of the following is a correct pair (match)?", "answer": "The correctly matched soil pair is Alluvial Soil – consists of sand and silt (the standard soil-characteristic match).", "explanation": "Yeh general 'correct pair' wala MCQ hai - sahi jodi wahi jahan mitti aur uska theek gun mile, jaise 'Alluvial – sand & silt'. Galat options mein jodi badli hoti hai. Tip: har soil ka ek pakka feature yaad rakho, phir matching easy ho jaati hai.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G1-280", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Land degradation", "question": "Mention the main reason for land degradation in states like Jharkhand, Chhattisgarh and Odisha.", "answer": "(b) Mining. Deforestation and abandoned mines in Jharkhand, Chhattisgarh and Odisha are the main cause of land degradation there.", "explanation": "Jharkhand, Chhattisgarh, Odisha mineral-rich states hain, isliye yahan khoob mining hoti hai. Mining ke liye jungle katte hain aur khaali khaani (abandoned mines) zameen barbaad karti hai. Hook: 'Mineral wale states = Mining se zameen kharaab'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G2-307", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Wildlife (Protection) Act 1972", "question": "When was the Wildlife Protection Act implemented ?", "answer": "(a) 1972 — The Indian Wildlife (Protection) Act was implemented in 1972.", "explanation": "Wildlife Protection Act ka saal = 1972. Bas yahi yaad rakhna hai. Memory hook: '72 mein janwaron ko mila kanoon'. Ye ek-marker har saal repeat hota hai, pakka point hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G2-308", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Wildlife (Protection) Act 1972", "question": "Explain the aim of 'Wildlife Protection Act.", "answer": "Its aim is to prohibit hunting of wild animals and birds, prescribe punishment for violations, protect wildlife from encroachment, and give legal security to species (including those not yet endangered).", "explanation": "Wildlife Protection Act ka maksad: shikaar band karo, todne walon ko sazaa do, aur janwaron ka ghar bachao. Memory hook: 'Shikaar pe rok, sazaa ka thok'. Ye case-based mein 1-marker ke roop mein baar-baar aata hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "G2-311", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Forests and communities", "question": "How are forests related with Communities?", "answer": "Forests are closely linked to communities as they serve as the home and a vital source of livelihood for traditional/tribal populations.", "explanation": "Jungle aur log ka rishta: jungle inka ghar bhi hai aur rozi-roti ka zariya bhi (lakdi, phal, jadi-booti). Memory hook: 'Jungle = Ghar + Rozgaar' for tribals. Seedha simple 1-marker hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "G2-312", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Community conservation - Alwar/Sariska", "question": "How are communities working for the conservation of Wildlife ? Explain with example.", "answer": "Communities protect wildlife habitats themselves, sometimes rejecting govt involvement. Example: villagers in Alwar, Rajasthan declared 1,200 hectares as the 'Bhairodev Dakav Sonchuri', enforcing their own rules against hunting.", "explanation": "Log khud wildlife bachate hain - sarkar ka intezaar nahi karte. Best example: Alwar (Rajasthan) ke gaon walon ne 1200 hectare ko 'Bhairodev Dakav Sonchuri' ghoshit kiya aur apne niyam banaye. Memory hook: 'Alwar = 1200 hectare = Bhairodev Sonchuri'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 1}, {"key": "G3-332", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Dams & rivers (MCQ)", "question": "In which of the following States Tungabhadra Dam is located ?", "answer": "(D) Karnataka.", "explanation": "Tungabhadra Dam Karnataka mein hai, Tungabhadra river par. Yaad rakhne ka trick: 'Tunga' bole toh South India ka pani – Karnataka. Yeh ek seedha-saadha factual MCQ hai jo har series mein repeat hota hai, toh isko ek baar pakka kar lo.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G3-339", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Traditional water harvesting", "question": "How do people of Rajasthan utilise rainwater ?", "answer": "They build underground tanks (tankas), often part of rooftop rainwater harvesting (palar pani) inside houses/courtyards, to store rainwater for drinking; the tanka also keeps the rooms cool.", "explanation": "Rajasthan jaise sookhe ilaake mein log ghar ke andar/aangan mein underground 'tanka' banate hain aur chhat ka baarish ka paani usme store karte hain – ise 'palar pani' kehte hain. Yeh peene ka paani deta hai aur kamre ko thanda bhi rakhta hai. Hook: 'Tanka = Rajasthan ka water bank'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "G3-340", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Rainwater harvesting", "question": "Explain any two benefits of rainwater harvesting.", "answer": "Any two: meets local water/drinking needs, supports irrigation through diversion channels, recharges groundwater, and stored tanka water helps keep rooms cool in arid areas.", "explanation": "Rainwater harvesting ke fayde: paani ki zarurat poori hoti hai, kheti ke liye diversion channels se paani milta hai, groundwater recharge hota hai, aur Rajasthan mein tanka ka paani kamre ko thanda rakhta hai. Koi do likh do. Note: yeh 'benefits' wala sawaal hai, 'viable alternative kyun' se thoda alag hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 1}, {"key": "G3-341", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Traditional water harvesting", "question": "Mention any two methods of traditional water-harvesting used in India.", "answer": "Any two: inundation channels of Bengal, khadins of Rajasthan, johads of Rajasthan (also guls/kuls of hills, tankas, tanks).", "explanation": "Note: yeh wahi traditional-method wala sawaal hai. Easy answer: Bengal ke inundation channels, Rajasthan ke khadin aur johad. Region-naam jod ke yaad rakho toh kabhi bhoologe nahi.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "G3-343", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Dams & rivers (matching)", "question": "Match the Column – A with Column – B and choose the correct option : Column – A (River) Column – B (Dam) I. Mahanadi 1. Sardar Sarovar II. Narmada 2. Hirakud III. Chambal 3. Salal IV. Chenab 4. Rana Pratap Sagar", "answer": "(C) I–2, II–1, III–4, IV–3 → Mahanadi–Hirakud, Narmada–Sardar Sarovar, Chambal–Rana Pratap Sagar, Chenab–Salal.", "explanation": "River-Dam jodi yaad karo: Mahanadi–Hirakud, Narmada–Sardar Sarovar, Chambal–Rana Pratap Sagar, Chenab–Salal. Hook: 'Chenab par Salal' aur 'Mahanadi par Hirakud' – yeh do pakke kar lo toh aadhe match apne aap ho jaate hain.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 1}, {"key": "G4-385", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Choose the correctly matched pair. (a) Primitive subsistence farming - practised on large patches of land (b) Intensive subsistence farming - single crop production farming (c) Commercial farming - use of higher doses of modern inputs (d) Plantation farming - practised on small patches of land", "answer": "Correct: (c) Commercial farming - use of higher doses of modern inputs.", "explanation": "Yahan sahi jodi dhoondhni hai. Sirf option (c) sahi baithta hai: Commercial farming mein zyada modern inputs lagte hain. Baaki options ulte-pulte hain. Hook: Commercial = modern inputs, yeh hamesha sach!", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ", "Match"], "score": 1}, {"key": "G4-402", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Government reforms", "question": "Explain any two efforts taken by the Government of India to modernise agriculture.", "answer": "Efforts to modernise agriculture: providing HYV seeds, chemical fertilizers and modern irrigation; promoting farm mechanisation; and supporting farmers through Kisan Credit Card, crop insurance and the Green Revolution.", "explanation": "Agriculture ko modern banane ke do efforts: HYV seeds aur khaad dena, aur machine/irrigation badhana. Hook: 'modern' shabd dikhe toh technology wale points likho - seeds, machine, irrigation.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "G4-410", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop identification", "question": "Identify the crop with the help of the following information and choose the correct option. • This is the second most important Cereal Crop. • This is a Rabi crop. • It requires a cool growing season and bright sunshine at the time of ripening. • It requires 50 to 75 cm annual rainfall.", "answer": "(A) Wheat - the second most important cereal, a Rabi crop needing a cool season, bright sunshine while ripening and 50-75 cm rainfall.", "explanation": "Clues: doosra sabse important cereal + Rabi + thandi season + 50-75 cm baarish = Wheat (gehu)! Hook: 'cool season + bright sunshine + Rabi' suno toh seedha gehu, option A.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G4-412", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop identification", "question": "Identify the Crop with the help of the following information and choose the correct option. • This is the staple food crop. • This is a Kharif crop. • It requires high temperature and high humidity. • It requires above 100 cm of annual rainfall. Options: (A) Wheat (B) Maize (C) Rice (D) Jwar", "answer": "(C) Rice - the staple food crop, a Kharif crop needing high temperature, high humidity and above 100 cm of rainfall.", "explanation": "Clues: staple food + Kharif + zyada garmi-nami + 100 cm se zyada baarish = Rice (chawal)! Hook: 'paani-paani crop' yaani jise sabse zyada baarish chahiye, woh rice. Option C.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G5-436", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Sustainable energy & development", "question": "Why is sustainable energy a key to sustainable development ?", "answer": "Energy is a basic requirement for economic development across all sectors (agriculture, industry, transport). Conserving energy ensures resources last for future generations, so sustainable energy is essential for sustainable development.", "explanation": "Dekho bhai, sustainable development ka matlab hai aaj ki zaroorat bhi poori ho aur future generations ke liye bhi resources bachein. Energy har sector ki jaan hai - kheti, industry, transport sab isi pe chalte hain. Agar energy hi sustainable nahi hogi toh development bhi tikau nahi rahega. Yaad rakho: energy = development ka fuel.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "G5-437", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Sustainable energy & development", "question": "Why is consumption of energy rising in all over India?", "answer": "India is the world's third-largest energy consumer. Consumption is rising due to rising incomes, improving living standards, economic development, population growth, and technological advancement.", "explanation": "Simple baat hai - jaise jaise India developed ho raha hai, log zyada gaadiyan, AC, phone, factories use kar rahe hain. Income badhi, population badhi, technology badhi - toh energy ki bhookh bhi badh gayi. India ab duniya ka teesra sabse bada energy consumer hai. Memory hook: 'PITE' - Population, Income, Technology, Economic growth.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "G5-497", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Map work - coal mines", "question": "Bokaro Coal mines", "answer": "Bokaro Coal mines are located in Jharkhand (Damodar valley coalfields).", "explanation": "Bokaro Coal mines Jharkhand mein hain - Damodar valley ke coalfields ka hissa. Yaad rakho: 'Bokaro = Jharkhand ka coal'. Jharkhand-Bengal belt coal ka khazana hai (Jharia, Raniganj, Bokaro). Map pe Jharkhand mein dot.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 1, "types": ["Map"], "score": 1}, {"key": "G6-508", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Importance of manufacturing", "question": "How are industries contributing to the national economy ? Explain.", "answer": "Industries contribute to the national economy by adding value to raw materials, generating employment, modernising agriculture, reducing regional imbalance, earning foreign exchange through exports, and raising GDP and per-capita income.", "explanation": "Industries economy mein kaise contribute karti hain? Kachche maal ko value deti hain, jobs banati hain, kheti ko support karti hain aur export se foreign exchange laati hain. Sab milake GDP badhta hai. Memory hook: value + jobs + export = strong national economy.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "G6-513", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Industrialisation & urbanisation", "question": "‘‘Industrialisation and Urbanisation go hand in hand.’’ Explain.", "answer": "Industrialisation and urbanisation are interlinked: industries set up near cities for markets, banking, transport and labour, leading to agglomeration; in turn, growing industries attract people and expand towns, providing goods for the urban population.", "explanation": "Jahaan industry lagti hai, wahan sheher bas jaata hai — log kaam ke liye aate hain, dukaan-transport-bank develop hote hain. Aur jahaan sheher hai wahan industry ko market aur labour milta hai. Dono ek dusre ko badhate hain. Yaad rakho: factory aayi to city aayi.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "G6-517", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Iron & Steel industry", "question": "Who of the following set up the first Iron and Steel industry in India?", "answer": "(A) J.R.D. Tata — the Tata Iron and Steel Company (TISCO) at Jamshedpur was set up by the Tatas.", "explanation": "First iron-steel industry India mein Tata ne lagayi thi — TISCO, Jamshedpur mein. Option mein Tata diya hai to wahi sahi. Memory hook: Tata = Steel = Jamshedpur.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G6-524", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Industrial pollution control", "question": "Explain any five ways to reduce air and water pollution.", "answer": "Air: increase chimney height, fit electrostatic precipitators/scrubbers/filters, use cleaner fuels (gas/oil) and renewable energy. Water: reuse/recycle water, harvest rainwater, and treat effluents (primary, secondary, tertiary) before discharge.", "explanation": "Yahan air AUR water dono saath. Air ke liye: lambi chimney, precipitator/scrubber, clean fuel. Water ke liye: reuse/recycle, rainwater harvesting, effluent treatment. 5 points chahiye to dono se mila ke likh do. Memory hook: chimney upar, paani recycle.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 1}, {"key": "G6-525", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Location of industries", "question": "Explain any five factors affecting the location of industries.", "answer": "Factors affecting industrial location: availability of raw material, labour, capital/finance, power and energy, market access, transport and communication, and government policies — industries locate where the combined cost is lowest (least-cost location).", "explanation": "Industry kahaan lage, ye in cheezon pe depend karta hai: Raw material, Labour, Capital, Power, Market, Transport, Government policy. Jahaan kharcha sabse kam ho wahin factory lagti hai. Memory hook: 'jahaan sab cheez sasti aur paas, wahin factory'.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "G6-535", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Map work - Industry locations", "question": "Jute Industry – Bhadravati", "answer": "Bhadravati (Karnataka) is actually the site of an Iron and Steel plant (VISL), not a jute industry; the label as written is incorrect — Bhadravati is to be located in Karnataka.", "explanation": "Yeh question thoda confusing hai — Bhadravati (Karnataka) mein actually Iron & Steel plant (VISL) hai, jute industry nahi (jute to West Bengal mein hota hai). Map locate karna ho to Bhadravati ko Karnataka mein point karo. Yaad rakho: 'Bhadravati = Karnataka steel'.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 1, "types": ["Map"], "score": 1}, {"key": "G7-537", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Road Transport", "question": "'Roadways have an edge over Railways.' Justify the statement.", "answer": "Roads have an edge over railways: lower construction cost, can be built in hilly/dissected terrain and higher gradients, provide door-to-door service, are cheaper for short distances and small loads, and act as feeders to railways, ports and airports.", "explanation": "Rail to fix patri par hi chalti hai, par sadak pahad, gaon, gali har jagah ja sakti hai - ghar tak saaman pahuncha deti hai. Sasti bhi hai aur short distance ke liye best. Memory hook: 'door-to-door' service sirf road deti hai, rail nahi.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "G7-541", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Railways", "question": "Explain the importance of Railways as a means of transportation in India.", "answer": "Railways are vital for freight and passenger transport in India: they carry goods over long distances, support business, tourism and pilgrimage, bind the economy together, and aid industrial and agricultural development.", "explanation": "Railway India ki badi lifeline hai - lambi doori par bhaari saaman aur lakhon log ek saath le jaati hai. Business, tourism, teerth yatra sab isi par. Yaad rakho: rail desh ko ek dhaage mein pirone wali mala hai.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "G7-544", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Railways - Distribution", "question": "How have physical and economic factors influenced the distribution pattern of the Indian Railway Network ? Explain with examples.", "answer": "Distribution of railways depends on physical factors (level plains like the Northern Plains favour rail, while Himalayas, deserts, swamps and dense forests hinder it) and economic factors (industrial, agricultural and urban regions attract dense networks; sparsely populated/hilly regions have fewer lines).", "explanation": "Samtal maidan (jaise North India) mein rail bichana easy - isliye wahan jaal ghana hai. Pahad, registan, jungle mein mushkil - wahan patri kam. Aur jahan industry/kheti zyada, wahan demand zyada. Hook: 'flat zameen + paisa = zyada rail.'", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "G7-546", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Water Transport", "question": "How are waterways an important mode of transport for both passenger and cargo traffic in India? Explain.", "answer": "Waterways are the cheapest mode for h
