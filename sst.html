ties", "discipline": "Political Science", "topic": "Regional parties", "question": "Explain the role of Regional Parties in Indian democracy.", "answer": "Regional parties, focused on state/regional identity, have grown in number and strength over time. They give regional issues a voice in Parliament, increase diversity, and - by compelling national parties to form coalitions with them - they strengthen federalism and democracy in India.", "explanation": "Regional parties chhoti lag sakti hain par India ki democracy mein bada role nibhati hain! Wo apne rajya ke mudde Parliament tak le jaati hain, aur coalition mein national parties ko apni baat manwa leti hain. Isse federalism (kendra-rajya balance) mazboot hota hai. Memory hook: 'chhoti parties, badi awaaz'.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 2}, {"key": "E1-5", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Average / Per Capita Income", "question": "Study the given data carefully and answer the question that follows : Monthly income of citizens in ` Country I II III IV V AY A 9,500 10,500 9,800 1,000 10,200 B 500 500 500 500 4,800 Identify the average monthly income of citizens in ‘country A’.", "answer": "(A) 8,200. Average of Country A = (9,500+10,500+9,800+1,000+10,200)/5 = 41,000/5 = Rs. 8,200.", "explanation": "Country A ke 5 logon ki income jodo: total 41,000 banta hai, 5 se divide karo toh 8,200. Dekho ek banda sirf 1,000 kamaata hai phir bhi average 8,200 dikhata hai – average sabko barabar maan leta hai, asli farak chhupa deta hai. Calculation simple hai, bas saari values theek se jodo.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E1-19", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "World Bank & UNDP – Reports", "question": "Which of the following organisations publishes the 'Human Development Report'?", "answer": "(D) United Nations Development Programme (UNDP) publishes the 'Human Development Report'.", "explanation": "Same baat dohra rahe hain – Human Development Report = UNDP. Insaan (human) ki development naapne ka kaam UNDP ka. World Bank sirf income/GDP dekhta hai. Yeh ek pakka aane wala sawaal hai, isliye ratt lo: HDR = UNDP.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E1-21", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "World Bank & UNDP – Reports", "question": "Which of the following reports compare countries using health, education and per capita income ?", "answer": "(A) Human Development Report – it compares countries using health, education and per capita income.", "explanation": "Jo report health + education + per capita income teeno use kare, woh hai Human Development Report (UNDP wali). Sirf income waali World Development Report hoti hai. Yaad rakho: teen parameters = Human Development Report = HDI ka composite formula.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E1-26", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Measuring Development – Indicators", "question": "Smt. Deepti is a resident of X country. Her country is a developed country. Which of the following would be a characteristic of her country?", "answer": "(B) High Per Capita Income – a key characteristic of a developed country.", "explanation": "Developed country ki pehchaan kya? High per capita income – yaani har insaan ki average income zyada. Developed countries mein log zyada kamaate hain, achhi facilities milti hain. Memory hook: developed = ameer = high per capita income.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E1-27", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Measuring Development – Indicators", "question": "The meaning of per capita income is :", "answer": "Per capita income = Total income of the country ÷ Total population. (In this paper a printing error in the options led the board to award marks for any option A–D.)", "explanation": "Per capita income ka matlab: desh ki total income ko total population se divide karna – yaani har insaan ki average income. Iss particular paper mein options galat chhap gaye the, isliye board ne saare options ke marks de diye. Par concept clear rakho: per capita income = total income ÷ population.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E1-30", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Different People, Different Developmental Goals", "question": "The developmental goal for a prosperous farmer can be :", "answer": "(A) Higher support price for crops – the developmental goal of a prosperous farmer.", "explanation": "Ameer kisaan ka goal: fasal ka higher support price. Wo apni paidawar mehngi bechna chahta hai. Better wages aur more days of work mazdoor ke goals hain, kisaan ke nahi. Memory hook: farmer = sells crops = wants higher prices.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E1-44", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Sustainability of Development", "question": "Why is sustainable development essential ? Explain with examples.", "answer": "Sustainable development is essential to ensure environment-friendly economic growth, conserve resources for future generations and use present resources judiciously, since many vital resources (like groundwater) are depleting rapidly.", "explanation": "Sustainable development zaroori hai taaki growth bhi ho aur environment bhi bache, aur aane waali peedhi ke liye resources reh jaayein. Groundwater jaise resources bahut tezi se kam ho rahe hain. Memory hook: 'aaj kamao, par kal ke liye bhi chhodo'. Yeh seedha aur common 3-marker hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "E1-45", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Sustainability of Development", "question": "Analyse the issues that necessitate sustainable development for the future.", "answer": "Sustainable development is needed because the present development model damages ecosystems and pollutes natural resources, non-renewable resources are depleting, rapid industrialisation causes global warming, and deforestation leads to species extinction — all threatening future availability.", "explanation": "Aaj ka development model nature ko bahut nuksaan pahuncha raha hai – ecosystem bigad raha hai, resources khatam ho rahe hain, global warming badh rahi hai aur jungle katne se jaanwar-paudhe lupt ho rahe hain. Isiliye sustainable development zaroori hai. Memory hook: pollution + depletion + global warming + deforestation = sustainability ki zaroorat.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "E1-61", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Development Indicators – Health (BMI)", "question": "Define the term 'Body Mass Index'. Explain the method of its calculation.", "answer": "BMI is a scale used by nutrition scientists to find whether a person is properly nourished. It is calculated by dividing a person's weight (in kg) by the square of their height (in metres): BMI = weight (kg) ÷ [height (m)]².", "explanation": "BMI ki definition: nutrition scientists isse check karte hain ki banda sahi nourished hai ya nahi. Formula: weight (kg) ko height (metre) ke square se divide karo. Memory hook: 'weight upar, height ka square neeche'. Definition + formula dono likhna toh poore 3 marks.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "E1-62", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Development Indicators – Literacy, IMR, Attendance", "question": "Choose the correct option to fill in the blank : Net attendance ratio is expressed as a ________ of total children in the age group of 6 – 10 years attending school.", "answer": "(B) Percentage – Net Attendance Ratio is the total number of children (aged 6–10) attending school expressed as a percentage of the total children in that age group.", "explanation": "Net Attendance Ratio ko 'percentage' mein likha jaata hai – 6 se 10 saal ke kitne bachhe school ja rahe hain, total ke comparison mein. Memory hook: 'ratio bola, par answer percentage'. Yeh seedha definition wala fill-in-the-blank hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E1-63", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Development Indicators – Literacy, IMR, Attendance", "question": "Choose the correct option to fill in the blank : Infant Mortality Rate indicates the number of children that die before the age of _____ year(s) per 1000 live births in that particular year.", "answer": "(A) One. Infant Mortality Rate (IMR) is the number of children who die before the age of 1 year per 1,000 live births in a year.", "explanation": "IMR (Infant Mortality Rate) batata hai ki 1000 paida hue bachhon mein se kitne 1 saal ki umar se pehle mar jaate hain. Toh blank mein answer hai 'One'. Memory hook: 'infant' matlab bilkul chhota bachha (1 saal se kam). IMR jitna kam, health utni achhi.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E1-65", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Development Indicators – Literacy, IMR, Attendance", "question": "Study the data of a State given below and answer the question that follow: Educational achievement of rural population of State Category Males Females I. Literacy rate of rural population 76% 54% II. Literacy rate of rural children in age group of 10-14 years 90% 87% III. Percentage of rural children aged 10-14 years attending school 85% 82% If rural children aged 10-14 years are considered, then how many female children are attending school?", "answer": "(C) 82. The percentage of rural female children (aged 10–14) attending school is read directly from row III = 82.", "explanation": "Table ki row III dekho – rural female children (10-14 saal) ka school attendance 82% hai, seedha wahi answer. Memory hook: 'jo poocha, usi row mein dekho' – distractors ke chakkar mein literacy rate (54/87) mat utha lena. Yeh sirf table-padhne ka sawaal hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E1-66", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Development Indicators – Reading State Data Tables", "question": "Study the following table and arrange the States from lower to higher on the basis of 'Life Expectancy at Birth' and choose the correct option : States Life Expectancy at Birth (2018) Enrolment in Higher Education (2017-18) Haryana 69.7 23 Kerala 75.2 37 Bihar 68.9 13.6 Odisha 68.4 22.1", "answer": "(C) Odisha, Bihar, Haryana, Kerala – arranged from lowest to highest life expectancy (68.4 < 68.9 < 69.7 < 75.2).", "explanation": "Life expectancy ke numbers chhote se bade order mein lagao: Odisha 68.4, Bihar 68.9, Haryana 69.7, Kerala 75.2. Toh sahi sequence Odisha→Bihar→Haryana→Kerala. Memory hook: 'lower to higher matlab chhote number pehle'. Enrolment column ko ignore karo, sirf life expectancy dekho.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E1-67", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Development Indicators – Reading State Data Tables", "question": "Study the table given below and answer the question that follows : State Infant Mortality Rate per 1000 live births (2018) Literacy Rate % 2017 – 18 Net Attendance Ratio (per 100 persons) secondary stage (aged 14 and 15 years) 2017 – 18 P 32 62 43 Q 7 94 43 R 30 82 61 S 20 83 78 Identify the State whose Infant Mortality Rate is almost three times that of State 'Q'.", "answer": "(C) S. State Q's IMR is 7; almost three times of 7 ≈ 21, which is closest to State S's IMR of 20.", "explanation": "State Q ka IMR 7 hai. Iska teen guna ≈ 21. Table mein dekho kaunsa iske sabse paas hai – State S ka 20, ekdam fit. Memory hook: 'guna karo, phir match karo'. 7×3=21, aur 20 sabse kareeb, isliye answer S.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E1-68", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Development Indicators – Reading State Data Tables", "question": "Study the given data and answer the question that follow : Comparative Data of few States Infant Mortality Rate (2020) Literacy Rate (2017-18) Net Attendance Rate (Class 1 to 5) State A 28 82 73 State B 6 94 94 State C 27 62 69 By how many of the following points does State B’s literacy rate exceeds from State A in 2017-18 ?", "answer": "(A) 12. State B literacy (94) − State A literacy (82) = 12 points.", "explanation": "State B ka literacy rate 94, State A ka 82. Farak = 94 − 82 = 12. Bas do numbers ghatao. Memory hook: 'exceeds by matlab subtract karo'. Distractor columns (IMR, attendance) chhod do, sirf literacy column compare karo.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E1-69", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Sustainability of Development", "question": "Which of the following is an example of a renewable resource ?", "answer": "(D) Ground water – it is a renewable resource (it can be replenished by rain), though overuse can still exhaust it.", "explanation": "Renewable resource woh hai jo dobara ban sakta hai – jaise groundwater (baarish se phir bhar jaata hai). Coal-petrol non-renewable hain (ek baar khatam toh khatam). Memory hook: 'renewable = wapas aa jaata hai'. Par dhyaan: groundwater bhi over-use se mukh sakta hai.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E2-131", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Public vs Private sector", "question": "Match Column - I with Column – II and choose the correct option : Column - I (Sectors on the basis of ownership) a. Public Sector b. Private Sector c. Joint Sector d. Cooperative Sector Column - II (Examples) (i) Amul Dairy (ii) Maruti Suzuki (iii) Oil and Natural Gas Corporation (iv) Airtel Limited", "answer": "(C) a-(iii) ONGC [Public], b-(iv) Airtel [Private], c-(ii) Maruti Suzuki [Joint], d-(i) Amul Dairy [Cooperative].", "explanation": "Ownership ke hisaab se: ONGC = Public (sarkari), Airtel = Private, Maruti Suzuki = Joint (sarkar + private mix), Amul = Cooperative (kisaano ki society). Memory hook: 'ONGC-sarkari, Airtel-private, Maruti-mix, Amul-cooperative'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 4}, {"key": "E2-133", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Assertion (A): Agricultural production related activities are included in the tertiary sector. Reason (R) : Tertiary sector is called as service sector.", "answer": "(D) Assertion (A) is false, but Reason (R) is true. Agriculture is a primary-sector (not tertiary) activity, but the tertiary sector is indeed called the service sector.", "explanation": "Assertion galat hai - agriculture Primary sector mein aata hai, Tertiary mein nahi. Reason sahi hai - Tertiary sector ko sach mein 'service sector' kehte hain. Isliye answer (D). Memory hook: 'Kheti = Primary, par Tertiary = service - dono yaad rakho'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 4}, {"key": "E2-134", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Public vs Private sector", "question": "Which of the following is an example of public sector ?", "answer": "(D) Indian Railways. Indian Railways is owned and run by the government, hence a public-sector example.", "explanation": "Public sector ka classic example - Indian Railways, kyunki ye poori tarah sarkar ke control mein hai. Memory hook: 'Railway = sarkari = Public sector'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E2-135", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Underemployment / Disguised unemployment", "question": "Explain 'Disguised Unemployment' with example.", "answer": "Disguised unemployment occurs when more people are employed than actually needed, so removing some workers does not reduce output. It is hidden underemployment, common in agriculture where work is shared and each person works below potential.", "explanation": "Disguised unemployment = chhupi berozgaari. Jab zaroorat se zyada log ek kaam mein lage hon (jaise ek khet par poora parivaar) toh kuch logon ko hatane par bhi production kam nahi hota. Kheti mein bahut common. Memory hook: 'Dikhte sab busy, par asli zaroorat kam = disguised'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "E2-137", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Describe the main characteristics of the 'primary sector' of the economy.", "answer": "The primary sector produces goods by directly exploiting natural resources, depends on natural factors like rainfall and climate, yields mostly natural products, and includes agriculture, dairy, forestry, fishing and animal husbandry.", "explanation": "Primary sector ki khaasiyat - seedha nature se maal banana (kheti, dairy, machhli, jungle). Ye baarish aur climate par depend karta hai, aur products natural hote hain. Memory hook: 'Prakriti par nirbhar = Primary'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "E2-141", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Public vs Private sector", "question": "Choose the correct characteristic of private sector of the economy.", "answer": "(B) Individually controlled. In the private sector, assets and services are owned and controlled by private individuals/companies, driven by the profit motive.", "explanation": "Private sector ki sahi pehchaan - ye 'individually controlled' hota hai, yaani private log/company iska maalik hota hai aur maksad profit hota hai. Memory hook: 'Private = ek vyakti/company ka control'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E2-142", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Gross Domestic Product (GDP)", "question": "Why are only final goods and services counted in Gross Domestic Product (GDP) ? Explain.", "answer": "Only final goods and services are counted to avoid double-counting, because the value of a final good already includes the value of the intermediate goods used to make it, giving a true measure of GDP.", "explanation": "GDP mein sirf final goods kyun? Kyunki final cheez ki value mein intermediate (beech ki) cheezon ki value pehle se shaamil hoti hai. Agar dono gino toh double counting ho jaayegi aur GDP galat aayega. Memory hook: 'Final mein sab shaamil = double count mat karo'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "E2-143", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Public vs Private sector", "question": "Describe the role of 'private sector' in the economic development of the country.", "answer": "The private sector boosts manufacturing, invests heavily in IT, creates large employment, and dominates many service areas like healthcare and online businesses, thus contributing significantly to economic development.", "explanation": "Private sector economy mein manufacturing, IT, healthcare aur online business ko aage badhata hai aur bahut naukriyan deta hai. Isliye development mein iska bada haath hai. Memory hook: 'Private = IT + jobs + growth ka engine'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 4}, {"key": "E2-144", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Public vs Private sector", "question": "Identify the sector of the economy on the basis of ownership with the help of following information : The government owns most of the assets. Delivery of services in the hands of government. Fair price shops is an example of it.", "answer": "(B) Public Sector. Government ownership of assets and service delivery, with examples like fair price shops, identifies the public sector.", "explanation": "Government ke paas assets, services bhi sarkar deti hai, aur fair price shop ka example - ye sab Public sector ki pehchaan hai. Memory hook: 'Sarkar maalik + fair price shop = Public sector'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E2-145", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Public vs Private sector", "question": "Identify the sector of economy with the help of information given in the box : • Ownership of assets and delivery of services in the hands of private individuals • Activities are guided by the motive to earn profits (A) Private Sector (B) Public Sector (C) Joint Sector (D) Cooperative Sector", "answer": "(A) Private Sector. Private ownership of assets/services plus a profit motive identifies the private sector.", "explanation": "Box mein likha hai - private logon ke paas assets aur services, aur maksad profit. Ye seedha Private sector ki definition hai. Memory hook: 'Private maalik + profit motive = Private sector'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E2-146", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Employment across sectors", "question": "Explain the sectoral activities on the basis of employment.", "answer": "On the basis of employment, sectors are classified as organised and unorganised: the organised sector has registered, regulated, secure jobs with benefits, while the unorganised sector has small, scattered, unregistered units with insecure jobs and no benefits.", "explanation": "Employment ke aadhar par sectors do tarah ke hote hain - Organized (registered, secure, benefits wale) aur Unorganized (chhote, scattered, no security/benefits). Memory hook: 'Naukri ke hisaab se = Organized vs Unorganized'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "E3-155", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Formal vs Informal Sources of Credit", "question": "Analyse the negative impacts of informal sources of loans.", "answer": "Informal loans charge very high interest, have no RBI supervision, use unfair recovery methods, and often push borrowers into a debt trap, worsening poverty.", "explanation": "Informal loan ke nuksan: bahut zyada byaaj, koi control nahi, aur vasooli ke liye dhamki-dabaav. Result? Aadmi debt-trap mein. Memory hook: informal = 'high byaaj + high tension'. Negative points pe focus karo, yahi pucha gaya hai.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "E3-159", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Terms of Credit & Collateral", "question": "Which one of the following is the purpose of collateral in a loan?", "answer": "(B) To secure the loan for the lender. Collateral acts as a guarantee the lender can claim if repayment fails.", "explanation": "Collateral ka kaam = lender ka loan secure karna. Agar borrower na chukaye to lender us asset se paisa recover kar leta hai. Option (B). Pichle wale ('risk of default') jaisa hi concept hai, bas wording alag — same baat.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E3-162", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Terms of Credit & Collateral", "question": "Megha has taken a loan of ` 5 lakhs from bank to purchase a house. The annual rate on the loan is 12% and loan is to be repaid in 5 years in monthly instalments. The 12% interest charged by the bank to Megha is related to which of the following ? (A) Collateral (B) Cost of Credit (C) Duration of Loan (D) Documentation", "answer": "(B) Cost of credit. The interest rate is the cost a borrower pays for taking the loan.", "explanation": "Interest rate (12%) = loan ka 'cost of credit', yani loan lene ki keemat. Collateral, duration, documentation alag terms hain. Option (B). Simple equation: byaaj = credit ka daam.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E3-169", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Reserve Bank of India", "question": "Differentiate between the Reserve Bank of India and other Commercial banks.", "answer": "RBI is the central bank: it issues currency, supervises/regulates all banks and ensures fair lending. Commercial banks accept public deposits, give loans, keep cash balances and work under RBI's control.", "explanation": "RBI vs Commercial bank: RBI = boss (note chhaapta, sabko control karta, khud public se deposit nahi leta). Commercial bank = aam aadmi ka bank (deposit leta, loan deta, RBI ke niyam maanta). Bas yeh contrast likh do — 3 marks easy.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 4}, {"key": "E3-171", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Banking & Deposits", "question": "Explain the role of banks in credit-related activities in India.", "answer": "Banks mediate credit by accepting deposits and extending loans to individuals and businesses, charging interest from borrowers and paying lower interest to depositors; this makes affordable formal credit available across the economy.", "explanation": "Credit ke maamle mein bank ka kaam: public se paisa lo (deposit), zarurat-mand ko loan do. Borrower se zyada byaaj, depositor ko kam byaaj — beech ka antar bank ki income. Isi tarah formal, sasta loan logon tak pahunchta hai.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "E3-184", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Money as Medium of Exchange", "question": "Why is Rupee accepted as a medium of exchange in India ?", "answer": "(B) Because it is issued by the Reserve Bank of India on behalf of the Central Government. This legal authorisation makes the rupee acceptable to all.", "explanation": "Rupee sab kyun accept karte hain? Kyunki use RBI, Central Government ki taraf se jaari karti hai — law isko legal tender banata hai. Option (B). Yaad rakho: sarkaar ki guarantee = sab maante hain.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E3-188", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Banking & Deposits", "question": "Two statements I and II are given below. Read both the statements carefully and choose the correct option : Statement I : 'Demand deposits' can be withdrawn on demand. Statement II : 'Demand deposits' settle payments directly without the use of cash.", "answer": "(C) Both statement I and statement II are correct. Demand deposits can be withdrawn on demand and can settle payments directly (e.g., by cheque) without cash.", "explanation": "Demand deposits do kaam karte hain: (I) jab chaaho nikaal lo, aur (II) cheque se seedhe payment ho jaaye, cash ki zarurat nahi. Dono statements sahi — option (C). Isiliye demand deposits ko 'money' maana jaata hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ", "Statement-based"], "score": 4}, {"key": "E3-203", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Choosing a Credit Source (Case-based)", "question": "Swapna owns a small farm in her village. She wants to take loan to meet the expense of cultivation. From which of the following sources should Swapna take the loan ?", "answer": "(B) Nearest nationalised bank. A formal source like a nationalised bank offers cheap, safe credit for cultivation.", "explanation": "Swapna ko kheti ke liye loan kahan se? Paas ke nationalised bank se (option B) — formal, sasta aur safe. Moneylender se loge to debt-trap. Yaad rakho: kheti ka loan = formal bank, na ki private udhaar.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E3-204", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Choosing a Credit Source (Case-based)", "question": "Read the given case and choose the correct option : Swapna, a small farmer grows groundnut on her three acres of land. She takes a loan from the moneylender to meet the expenses of cultivation but midway due to flood, crop fails and her debt increased. Again she has to take loan to manage crops. Suggest Swapna, which of the following sources of loan would be suitable for her.", "answer": "(D) Banks. After being trapped by a moneylender, Swapna should switch to a formal source—banks—for cheaper, safer credit.", "explanation": "Swapna moneylender ke chakkar mein debt-trap mein phans gayi (fasal kharab, loan pe loan). Use ab Bank (option D) se loan lena chahiye — formal, sasta, safe. Lesson: musibat se nikalne ka rasta = formal credit.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E4-246", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Trade barriers", "question": "Why do some countries impose tariffs on imported goods in the context of globalization ? Choose the correct reason from the following options :", "answer": "(B) To protect local industries.", "explanation": "Desh import par tariff (tax) isliye lagaate hain taaki apni local industries ko bachaya jaaye. Mehngaa import hoga toh log desi maal khareedenge. Memory hook: tariff = desi industry ke liye 'suraksha kavach' (shield) foreign maal ke against. Answer (B).", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E4-247", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Trade barriers", "question": "If companies decide to import cotton from other countries, what will be its impact on domestic cotton cultivation ? Choose the most appropriate option : I. Less profitable II. More profitable III. The price of domestic cotton will decrease IV. The price of domestic cotton will increase", "answer": "(B) Only I and III are correct. (Cheaper imported cotton increases supply, so domestic cotton's price falls and cultivation becomes less profitable.)", "explanation": "Agar companies bahar se cotton import karne lagein, toh market mein cotton zyada ho jaayega - desi cotton ka daam girega (III) aur kisaano ke liye kam faayda (less profitable, I). Memory hook: supply badhi toh price gira, kisaan ka munafa bhi gira. Answer (B): sirf I aur III.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "E4-248", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Trade barriers", "question": "Which of the following is the main purpose of a trade barrier in global trade ? Choose the correct option.", "answer": "(C) To regulate foreign trade into the country.", "explanation": "Trade barrier (jaise tax ya import limit) ka main maksad hai - foreign trade ko 'regulate' karna yaani kitna maal andar aaye, ispe control rakhna. Memory hook: trade barrier = darwaaze ka chaukidaar jo decide karta hai kitna foreign maal andar aayega. Answer (C).", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G-MAP-263", "chapter_code": "G-MAP", "chapter_name": "Geography (Map Work)", "discipline": "Geography", "topic": "Map work", "question": "On the same outline map of India (page 27) given for question no. 10, locate and label any three of the following with appropriate symbols : (18.1) The largest dam built on Narmada river in Gujarat (18.2) International airport located in Punjab (18.3) Software Technology Park located in Karnataka (18.4) Major sea port located in Odisha", "answer": "Largest dam on Narmada in Gujarat: Sardar Sarovar. International airport in Punjab: Sri Guru Ram Das Jee (Amritsar / Raja Sansi). STP in Karnataka: Bengaluru. Major Sea Port in Odisha: Paradip.", "explanation": "Narmada pe Gujarat ka sabse bada dam = Sardar Sarovar (famous, Patel ji se yaad rakho). Punjab airport = Amritsar (Sri Guru Ram Das Jee). Karnataka STP = Bengaluru. Odisha port = Paradip. Hook: 'Sardar Sarovar = Sardar Patel ka dam'. Descriptive hints hain, naam jaano toh dot lagana easy.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["Map"], "score": 4}, {"key": "G1-271", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil types", "question": "Read the given infographics carefully and choose the correct option that identifies the soil described. (1) Sandy in texture (2) Red to brown in colour (3) Soil lacks humus due to dry climate", "answer": "(C) Arid Soil. It is sandy in texture, red to brown in colour, and lacks humus due to the dry climate.", "explanation": "Arid (registan wali) soil sandy hoti hai, rang red-brown, aur dry climate ki wajah se humus na ke barabar. Rajasthan ki mitti soch lo. Trick: 'Sukha mausam + ret + red-brown = Arid soil'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G1-279", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil formation", "question": "Explain any three factors responsible for soil formation.", "answer": "Factors of soil formation include relief, parent rock, climate, vegetation and other life forms, and time; processes like temperature change, running water, wind, glaciers and decomposers also contribute.", "explanation": "Soil banne ke factors yaad rakho: relief, parent rock, climate, vegetation, time - aur running water, hawa, glacier jaise forces. Memory hook: 'Maa-Baap (parent rock) + Mausam (climate) + Time = mitti'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 4}, {"key": "G1-284", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Land use pattern", "question": "Choose the correct option related to the factors that determined the land use pattern in India :", "answer": "(D) Physical and Human factors. Land-use in India is determined by physical factors (topography, climate, soil) and human factors (population, technology).", "explanation": "India ka land-use do cheezon par depend karta hai: Physical factors (terrain, climate, soil type) aur Human factors (aabaadi, technology, culture). Dono milke decide karte hain kahan kya use hoga. Hook: 'Kudrat + Insaan = land use'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G1-285", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Land use pattern", "question": "In which of the following categories of ‘land-use’ has India registered an increase ?", "answer": "(D) Forest. The area under forest has registered an increase among India's land-use categories.", "explanation": "Land-use mein India mein 'Forest' wala area badha hai (afforestation aur reporting ki wajah se), halaki abhi bhi target 33% se kam hai. Hook: 'Jungle wala hissa plate par thoda badha'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G1-286", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Land use pattern", "question": "Which of the following is an example of ‘current fallow land’ ? (A) Land left without cultivation for five agricultural years. (B) Land left without cultivation for three agricultural years. (C) Land left without cultivation for two agricultural years. (D) Land left without cultivation for one agricultural year.", "answer": "(D) Land left without cultivation for one agricultural year. (Left fallow for more than one but up to five years is 'fallow other than current fallow'.)", "explanation": "Current fallow = zameen jo sirf 1 saal ke liye khaali chhodi gayi (taaki mitti aaram kar le). Agar 1-5 saal khaali rahe to woh 'other than current fallow'. Hook: 'Current = 1 saal ki chhutti'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G1-300", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Disaster management (floods)", "question": "Suggest one precaution before using water after floods.", "answer": "Boil or filter water before drinking, and store it in clean, covered containers to avoid water-borne diseases.", "explanation": "Flood ke baad paani gandagi se infected ho sakta hai, isliye peene se pehle ubaalo ya filter karo, aur saaf dhakke wale bartan mein rakho. Hook: 'Ubaalo, filter karo, dhak ke rakho'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "G1-301", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Disaster management (floods)", "question": "Mention any two measures related to protection of food items during floods.", "answer": "Eat only freshly cooked and dry food, and always keep food items covered to prevent contamination.", "explanation": "Flood mein khaana jaldi kharaab aur infected ho jaata hai. Isliye fresh-cooked ya dry food khao aur khaane ko hamesha dhak ke rakho. Hook: 'Taaza khao, dhak ke rakho'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "G2-310", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Wildlife (Protection) Act 1972", "question": "Describe the main provisions of the Indian Wildlife (Protection) Act, 1972.", "answer": "It provides legal protection to wildlife habitats, bans hunting of listed wild animals and birds, publishes a list of protected species, and prescribes punishment for poaching and trade in wildlife.", "explanation": "Yahaan poore 'provisions' likhne hain (2 marker): habitat ko legal protection, shikaar pe ban, protected species ki list, aur poachers ko sazaa. Ye upar wale aim wale sawaal se thoda detailed hai - isliye alag group. Memory hook: 'Ghar do, shikaar roko, list banao, sazaa do'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "G2-320", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Chipko Movement", "question": "Identify the state related with the Chipko Movement :", "answer": "(C) Uttarakhand — the Chipko Movement originated in the Himalayan region of Uttarakhand.", "explanation": "Chipko Movement kahaan se shuru hua? Uttarakhand (Himalaya) se. Memory hook: 'Chipko = Uttarakhand ki pahaadi'. Saal 1973 ke aaspaas, par exam mein bas state poocha jaata hai - Uttarakhand likhna.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G2-324", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Map/Match - National Parks and States", "question": "Match Column – I with Column – II and choose the correct option : Column – I (National Park) Column – II (States) a. Corbett i. Rajasthan b. Sunderban ii. Uttarakhand c. Sariska iii. Kerala d. Periyar iv. West Bengal", "answer": "(D) a–ii, b–iv, c–i, d–iii — Corbett–Uttarakhand, Sunderban–West Bengal, Sariska–Rajasthan, Periyar–Kerala.", "explanation": "Sahi jodi: Corbett-Uttarakhand, Sunderban-West Bengal, Sariska-Rajasthan, Periyar-Kerala. Memory hook: Sunderban hamesha West Bengal (mangrove + Royal Bengal Tiger), Periyar hamesha Kerala. In char ko pakka kar lo.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 4}, {"key": "G2-325", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Map/Match - National Parks and States", "question": "Match Column-I with Column-II and choose the correct option : Column-I (National Parks) Column-II (States) a. Sariska i. Madhya Pradesh b. Sunderban ii. Uttarakhand c. Corbett iii. West Bengal d. Bandhavgarh iv. Rajasthan Options : a b c d (A) iii ii i iv (B) iv ii iii i (C) iv iii ii i (D) ii iv iii i", "answer": "(C) a–iv, b–iii, c–ii, d–i — Sariska–Rajasthan, Sunderban–West Bengal, Corbett–Uttarakhand, Bandhavgarh–Madhya Pradesh.", "explanation": "Jodi: Sariska-Rajasthan, Sunderban-West Bengal, Corbett-Uttarakhand, Bandhavgarh-MP. Yahi cheezein har match question mein ghoom-phir kar aati hain. Memory hook: 'Bandhavgarh = MP, Sariska = Rajasthan' - bas park ko state se jodte raho.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 4}, {"key": "G2-330", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Forest classification (Reserved/Protected/Unclassed)", "question": "Describe any two characteristics of 'reserved forests' in India.", "answer": "Reserved forests make up more than half of India's forest area and are regarded as the most valuable; they are given the highest degree of protection where grazing and cultivation are usually not permitted.", "explanation": "Reserved forest ki khaasiyat: aadhe se zyada forest area, sabse valuable, aur sabse zyada protection - yahaan grazing/kheti allowed nahi. Memory hook: 'Reserved = Royal = sab band'. Ye akele wala question isliye alag group mein hai.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "G2-331", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Forest classification (Reserved/Protected/Unclassed)", "question": "Describe any two characteristics of 'protected forests' in India.", "answer": "Protected forests constitute about one-third of the total forest area and are protected from any further depletion, though limited grazing and use of forest produce are allowed.", "explanation": "Protected forest ki khaasiyat: lagbhag ek-tihaai area, aur inhe aur kam hone se bachaya jaata hai par थोड़ी छूट (grazing/use) milti hai. Memory hook: 'Protected = ek-tihaai + thodi chhoot'. Reserved se kam strict hota hai.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "G3-362", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Flood safety (disaster management)", "question": "Suggest one precaution before using water after floods.", "answer": "Boil and/or filter the water before drinking to make sure it is safe and free from contamination.", "explanation": "Flood ke baad paani mein keede-bacteria mil jaate hain, isliye peene se pehle ubaalo (boil) ya filter karo. Hook: 'Pehle ubaalo, phir piyo' – ek line ka jawab, ek mark pakka.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "G3-363", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Flood safety (disaster management)", "question": "Mention any two measures related to protection of food items during floods.", "answer": "Eat only freshly cooked, dry food and always keep food covered to prevent contamination.", "explanation": "Flood ke time khaana ka dhyaan: taaza pakaa hua aur sookha khaana khao, aur khaane ko hamesha dhak ke rakho taaki contaminate na ho. Hook: 'Taaza + Dhaka hua' = surakshit khaana.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "G3-364", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Flood safety (disaster management)", "question": "Suggest two actions to be taken before leaving the house during a flood warning.", "answer": "Any two: turn off power and gas connections, and move valuables/important documents to a safe, elevated place (also keep an emergency kit and follow weather bulletins).", "explanation": "Flood warning par ghar chhodne se pehle: bijli aur gas ki supply band karo, aur zaroori documents/keemti saaman oonchi-surakshit jagah par rakho. Hook: 'Switch off + Uthao upar' – do simple steps jo do marks dilayenge.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "G3-366", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Dams & rivers (location/ordering)", "question": "Arrange the location of the following dams of India from North to South and choose the correct option : I. Pravara II. Salal III. Koyna IV. Gandhi Sagar", "answer": "(B) II, IV, I, III → Salal (J&K) → Gandhi Sagar (MP) → Pravara (Maharashtra) → Koyna (Maharashtra, further south).", "explanation": "North se South order: Salal (J&K, sabse upar) → Gandhi Sagar (MP) → Pravara → Koyna (Maharashtra mein neeche). Hook: India ke naqshe par upar se neeche socho – J&K pehle, Maharashtra baad mein. Isliye option B.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G3-367", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Map work – Sardar Sarovar (Narmada, Gujarat)", "question": "The largest dam built on Narmada river in Gujarat", "answer": "Sardar Sarovar Dam (the largest dam on the Narmada in Gujarat).", "explanation": "Gujarat mein Narmada par sabse bada dam = Sardar Sarovar. Yahi woh dam hai jiske against Narmada Bachao Andolan chala tha. Hook: 'Narmada + Gujarat = Sardar Sarovar' – do clue, ek jawab.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["Map"], "score": 4}, {"key": "G3-368", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Sardar Sarovar / Narmada project", "question": "Why is Sardar Sarovar Project considered important for Gujarat ?", "answer": "It provides irrigation to about 18.45 lakh hectares across 3,112 villages in 15 districts (especially drought-prone areas) and supplies drinking water to Gujarat.", "explanation": "Sardar Sarovar Gujarat ke liye isliye important hai kyunki yeh ~18.45 lakh hectare zameen ko sinchai deta hai, 15 zilon ke 3112 gaon tak, khaaskar sookhe ilaakon ko. Hook: numbers yaad rakho – '15 districts, 3112 villages' – examiner impress ho jaayega.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "G3-369", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Sardar Sarovar / Narmada project", "question": "Why is Sardar Sarovar Project designed to cover four states ?", "answer": "Because it aims to meet the water and irrigation needs of the drought-prone and desert areas of all four partner states – Gujarat, Rajasthan, Maharashtra and Madhya Pradesh.", "explanation": "Project char states ko isliye cover karta hai kyunki Gujarat, Rajasthan, Maharashtra aur MP – sabke sookhe aur registaani ilaakon ko paani aur sinchai chahiye. Hook: 'Char rajya, ek Narmada' – sabki pyaas bujhane ka plan.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "G3-370", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Sardar Sarovar / Narmada project", "question": "In what ways does this project promote sustainability ?", "answer": "It supplies drinking water to drought-prone areas, irrigates farmland for food security, generates renewable hydro-electricity, and recharges groundwater – ensuring long-term, sustainable water management.", "explanation": "Sardar Sarovar sustainable isliye hai kyunki yeh peene ka paani, kheti ka paani, clean hydro-bijli, aur groundwater recharge – sab ek saath deta hai, woh bhi long-term ke liye. Hook: 'Paani + Anaaj + Bijli + Recharge' = sustainability ke 4 stambh.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "G3-371", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Floods & land degradation", "question": "Explain the role of floods in land degradation.", "answer": "Floods cause soil erosion and excessive sedimentation, washing away fertile topsoil and depriving flood plains of fresh silt, thereby degrading the land.", "explanation": "Baadh upajaau mitti (topsoil) ko baha le jaati hai aur reti/sediment jama kar deti hai, jisse zameen ki zarkhezi (fertility) khatm hoti hai – yahi land degradation hai. Hook: 'Flood = mitti baha, zameen kharaab'.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "G3-372", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Irrigation & cropping pattern", "question": "How has irrigation changed cropping pattern ?", "answer": "Assured irrigation has encouraged farmers to shift towards water-intensive and commercial crops (like sugarcane, rice), changing the traditional cropping pattern.", "explanation": "Jab pakka paani (irrigation) milne laga, kisaan zyada paani maangne wali aur cash/commercial fasal (jaise ganna, dhaan) ki taraf shift ho gaye. Hook: 'Paani aaya toh fasal badli' – water-intensive crops ki taraf jhukao.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "G3-373", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Government water schemes", "question": "Explain any two objectives of the ‘Pradhan Mantri Krishi Sinchayee Yojana’.", "answer": "Any two: extend assured irrigation to more farmland (‘har khet ko pani’) and improve on-farm water-use efficiency through micro-irrigation (‘per drop more crop’).", "explanation": "PM Krishi Sinchayee Yojana ke do aim: har khet tak paani pahunchana ('har khet ko pani') aur kam paani mein zyada fasal ('per drop more crop'). Hook: do catchy slogans hi do objectives hain – likho aur marks lo.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "G4-384", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Match Column - I with Column - II and choose the correct option: Column - I (Types of Farming) I. Primitive subsistence farming II. Intensive subsistence farming III. Commercial farming IV. Plantation farming Column - II (Features) (a) Use of modern inputs with less labour (b) Single crop cultivation on large scale (c) Slash and burn cultivation (d) Labour intensive cultivation", "answer": "Correct: (C) I-(c) Primitive = Slash and burn, II-(d) Intensive subsistence = Labour intensive, III-(a) Commercial = Modern inputs with less labour, IV-(b) Plantation = Single crop on large scale.", "explanation": "Type ko feature se jodo: Primitive = slash & burn, Intensive subsistence = bahut labour, Commercial = modern inputs kam labour, Plantation = ek crop bade scale par. Hook: 'C-D-A-B' ka order yaad rakho, option C sahi hai!", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 4}, {"key": "G4-389", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Cropping seasons", "question": "Choose the correct option related to main crops of Kharif cropping season : (A) Urad, Gram, Groundnut, Mustard (B) Wheat, Peas, Soyabean, Bajra (C) Maize, Mustard, Gram, Jowar (D) Paddy, Maize, Groundnut, Soyabean", "answer": "Correct: (D) Paddy, Maize, Groundnut, Soyabean - all are Kharif (monsoon) crops.", "explanation": "Kharif crops dhoondho - jisme paddy ho woh sahi! Option D mein Paddy, Maize, Groundnut, Soyabean sab barsaat ki fasalein hain. Hook: Gram, Peas, Mustard dikhe toh woh Rabi, isliye reject kar do.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G4-390", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Cropping seasons", "question": "Identify the correct option related to major crops grown in the ‘Kharif’ cropping season in India : (A) Paddy, Peas, Mustard (B) Paddy, Mustard, Gram (C) Paddy, Jowar, Maize (D) Paddy, Maize, Gram", "answer": "Correct: (C) Paddy, Jowar, Maize - all Kharif crops. (Peas, Mustard and Gram are Rabi crops.)", "explanation": "Phir se Kharif crops! Option C - Paddy, Jowar, Maize - teeno barsaat ki fasal hain. Peas, Mustard, Gram toh Rabi hote hain isliye reject. Hook: Kharif = paddy + millets wale options.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G4-403", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Government reforms", "question": "Explain the measures made by government to improve Indian agriculture.", "answer": "Measures include land reforms (zamindari abolition, consolidation), multipurpose irrigation projects, Green and White Revolutions, and financial support such as crop insurance, Grameen banks, Kisan Credit Card and Minimum Support Price (MSP).", "explanation": "Indian agriculture sudhaarne ke kadam: land reforms, irrigation projects, Green/White Revolution aur paise ki madad (insurance, KCC, MSP). Hook: do tarah ki reforms - technological + institutional - dono mila ke likho.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "G4-407", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Agriculture and economy", "question": "If every farmer in India follows modern farming practices, explain any two positive changes this could bring to villages.", "answer": "Modern farming would lead to optimum use of water and resources and higher agricultural productivity. This would improve farmers' economic status and generate more employment opportunities in villages.", "explanation": "Agar sab kisaan modern farming karein toh paani-resource ka sahi use hoga aur paidawar badhegi. Isse gaon mein paisa aur naukri dono badhegi. Hook: modern farming = zyada upaj + behtar kamai + jobs.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "G4-408", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Sustainable / organic farming", "question": "Suggest any two measures for better productivity and organic farming.", "answer": "Use organic manure/compost to improve soil fertility; practise crop rotation and biological pest control to reduce pests; adopt water-saving methods like drip irrigation and mulching.", "explanation": "Organic farming aur achhi paidawar ke liye: organic khaad/compost dalo, crop rotation karo aur natural tareeke se keede control karo. Hook: 'organic = no chemicals', mitti ko natural tarike se zinda rakho.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "G4-416", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop identification", "question": "Identify the plantation crop from the following :", "answer": "(D) Rubber - rubber is a plantation crop (along with tea, coffee, sugarcane).", "explanation": "Plantation crop dhoondho - Rubber sahi hai! Plantation crops = tea, coffee, rubber, sugarcane. Hook: bade bagaan wali ek-crop kheti = plantation, isme rubber aata hai, option D.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G4-418", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop conditions and requirements", "question": "Which one of the following crops grows well in hot and humid climate ?", "answer": "(A) Sugarcane - grows well in a hot and humid climate.", "explanation": "Garam aur namee wali jagah par achhi ugne wali fasal = Sugarcane (ganna)! Hook: ganne ko garmi + paani chahiye, isliye hot-humid mein khoob badhta hai. Option A.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G4-426", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "\"Plantation agriculture is also a type of commercial farming.\" Support the statement with suitable arguments.", "answer": "Plantation is commercial farming because it grows a single crop on a large area, needs heavy capital and labour, uses modern inputs, and its produce (tea, coffee, rubber) is grown mainly for sale in the market/industry.", "explanation": "Plantation ko commercial kyun kehte hain? Kyunki yeh ek crop bade area par, bahut paisa-mazdoor aur poora maal market/industry ke liye banata hai. Hook: tea-coffee bechne ke liye ugaate hain, ghar khaane ke liye nahi - isliye commercial!", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 4}, {"key": "G4-427", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "\"The main characteristic of commercial farming is to achieve high yields through modern inputs.\" Support the statement with appropriate arguments.", "answer": "Commercial farming aims for high yields by using modern inputs - HYV seeds, chemical fertilizers, insecticides and pesticides - supported by good irrigation and transport networks; commercialisation varies by region.", "explanation": "Commercial farming ka asli maqsad = zyada paidawar via modern inputs (HYV seeds, khaad, dawaai) + achhi sinchai aur transport. Hook: 'modern input dalo, zyada upaj pao' - yahi commercial farming ki pehchaan.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 4}, {"key": "G4-430", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Cropping seasons", "question": "Rice cultivation is an example of which type of agricultural season ?", "answer": "Kharif - rice is a Kharif (monsoon) crop.", "explanation": "Rice kaunsi season ki fasal? Kharif! Kyunki yeh monsoon ke saath boya jaata hai. Hook: 'chawal = baarish = Kharif', seedha sa connection.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "G4-431", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Cropping seasons", "question": "Name any one crop which is harvested between April to June in India.", "answer": "Wheat (a Rabi crop, harvested April-June).", "explanation": "April-June mein kaata jaane wala crop = Wheat! Yeh Rabi crop hai jo sardi mein boya aur garmi mein kaata jaata hai. Hook: 'Rabi harvest = Apr-Jun = gehu'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "G4-432", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Cropping seasons", "question": "Mention any two zaid crops.", "answer": "Watermelon and muskmelon (also cucumber, fodder crops) are Zaid crops grown in the short summer season.", "explanation": "Zaid crops = garmi ki chhoti season ke crops: tarbooz (watermelon), kharbooja (muskmelon), kakdi. Hook: 'Zaid = garmi ke juicy fruits', exam mein tarbooz-kharbooja likh do.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "G4-433", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Sustainable / organic farming", "question": "How has irrigation changed cropping pattern ?", "answer": "Irrigation has shifted cropping towards water-intensive and commercial crops, allowing multiple crops a year, but it can cause ecological problems like soil salinization and falling water tables.", "explanation": "Irrigation ne kya badla? Ab kisaan zyada paani wale aur commercial crops ugaane lage. Lekin nuksaan bhi - mitti khaari (salinization) ho jaati hai. Hook: paani aaya toh fasal badli, par zameen ka dhyan rakhna padta hai.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "G4-434", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Sustainable / organic farming", "question": "Explain any two objectives of the ‘Pradhan Mantri Krishi Sinchayee Yojana’.", "answer": "Objectives of PMKSY: enhance physical access to water and expand cultivable area under assured irrigation ('Har Khet Ko Pani'); and improve on-farm water-use efficiency to cut wastage through water-saving technologies ('Per Drop More Crop').", "explanation": "PMKSY ke do maqsad: har khet tak paani pahunchana ('Har Khet Ko Pani') aur paani ki bachat ('Per Drop More Crop'). Hook: do famous slogans yaad rakho - paani har khet ko, aur har boond se zyada fasal.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "G4-435", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Sustainable / organic farming", "question": "In which of the following regions did the “Beej-Bachao Andolan” of farmers begin ?", "answer": "(B) Tehri - the Beej Bachao Andolan began in the Tehri region (Uttarakhand).", "explanation": "'Beej Bachao Andolan' kahan shuru hua? Tehri (Uttarakhand) mein! Yeh aandolan deshi/traditional beejon ko bachane ke liye tha. Hook: 'Beej Bachao = Tehri', option B.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G5-451", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Wind energy", "question": "The largest wind farm cluster in India is located between __________. (A) Nagercoil to Madurai (B) Jaipur to Jodhpur (C) Bokaro to Raniganj (D) Hazira to Jhabua", "answer": "(A) Nagercoil to Madurai. This stretch in Tamil Nadu has India's largest wind farm cluster.", "explanation": "Seedha factual MCQ - India ka sabse bada wind farm cluster Tamil Nadu mein Nagercoil se Madurai ke beech hai. Yaad rakhne ke liye: 'Nagercoil-Madurai = Wind ka raja'. South India ki tez hawaayein isko perfect banati hain.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G5-452", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Non-conventional energy", "question": "Examine the importance of Bio-gas energy in rural areas.", "answer": "Biogas, produced from cattle dung and farm/animal waste, is important in rural areas as a cheap, clean cooking and lighting fuel. It has higher thermal efficiency than dung-cakes/wood, reduces deforestation, and the leftover slurry is excellent organic manure.", "explanation": "Gaon mein gobar aur farm-waste se biogas banta hai - 'Gobar Gas' plant! Yeh sasta hai, khana banane aur light ke liye perfect. Lakdi-uplon se zyada efficient, aur bacha hua slurry khaad ban jaata hai khet ke liye. Double fayda: energy bhi, khaad bhi. Rural India ke liye superhit!", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G5-453", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Non-conventional energy", "question": "Examine the potential of geothermal energy as a renewable power source.", "answer": "Geothermal energy is heat from the Earth's interior. Where the geothermal gradient is high, this heat converts water into steam to run turbines. India has experimental projects in the Parvati valley (Manikaran, Himachal Pradesh) and Puga Valley (Ladakh). It is clean and renewable.", "explanation": "Geothermal energy matlab dharti ke andar ki garmi se bijli! Jahan zameen ke neeche bahut garmi hoti hai, wahan paani bhaap banti hai aur turbine ghoomti hai. India mein Manikaran (Himachal) aur Puga Valley (Ladakh) mein projects hain. Dharti ki garmi free aur renewable!", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G5-454", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Nuclear energy", "question": "Examine the role of nuclear energy in meeting growing demand of power.", "answer": "Nuclear (atomic) energy is produced by altering the structure of atoms (e.g., uranium, thorium), releasing huge energy as heat to generate electricity. A small amount of fuel gives large power, helping meet rising demand. India's plants include Tarapur, Rawatbhata, Kalpakkam, Narora, Kakrapara and Kaiga.", "explanation": "Nuclear energy mein atom ko tod ke (uranium/thorium se) bahut saari energy nikalti hai - thoda sa fuel, dher saari bijli! Isliye badhti demand ke liye yeh useful hai. Plants yaad rakho: Tarapur, Kalpakkam, Narora, Kakrapara, Rawatbhata, Kaiga.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G5-456", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Coal", "question": "Examine the role of coal as an important energy resource and describe its distribution in India.", "answer": "Coal is India's most abundant and widely used conventional fuel - used for power generation, industry and as raw material. Major deposits lie in Gondwana fields: Damodar valley (Jharkhand-West Bengal: Jharia, Raniganj, Bokaro), and Godavari, Mahanadi, Son and Wardha valleys.", "explanation": "Coal India ka sabse zyada milne aur use hone wala fuel hai - bijli, industry, sab isi pe. Zyadatar coal Gondwana fields mein hai: Damodar valley (Jharia, Raniganj, Bokaro), aur Godavari-Mahanadi valleys. Yaad rakho: 'Jharia-Raniganj-Bokaro = coal ka ghar'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G5-457", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Electricity sources & environment", "question": "Examine the various sources of electricity and their environmental impacts.", "answer": "Electricity is generated from thermal (coal/gas - air pollution, CO2), hydel (clean but submerges land), nuclear (low emissions but radioactive-waste risk) and renewables (solar/wind - clean, minimal impact). Conventional sources pollute more, so shifting to renewables reduces environmental damage.", "explanation": "Bijli kai tarah se banti hai - thermal (coal/gas: pollution + CO2), hydel (saaf par zameen doob jaati hai), nuclear (kam emission par radioactive waste ka risk), aur renewable (solar/wind: ekdum clean). Lesson: jitna renewable pe shift karenge, environment utna khush!", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G5-458", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Natural gas", "question": "Examine the significance of natural gas for industrial usage.", "answer": "Natural gas is a clean energy source used as industrial fuel, for power generation and heating, and as a vital raw material in petrochemical and fertiliser industries. As CNG it fuels transport and as PNG it is piped for cooking, making it important and eco-friendly for industry.", "explanation": "Natural gas industries ke liye bahut kaam ka hai - fuel bhi, heating bhi, aur khaad/petrochemical ka kaccha maal bhi! Yeh clean energy hai - CNG se gaadi, PNG se kitchen. Industry ke liye eco-friendly aur multipurpose. Future ka clean fuel.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G5-463", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Occurrence of minerals", "question": "“Minerals are found in various forms and types, each having distinct properties.” Support the statement with suitable arguments.", "answer": "Minerals occur in various forms - in igneous/metamorphic rocks as veins and lodes, in sedimentary rocks as beds, as placer deposits in valley sands, and in ocean water. They are classified as metallic (ferrous, non-ferrous), non-metallic and energy minerals, each with distinct physical/chemical properties and uses.", "explanation": "Minerals kai roop aur kism mein aate hain - kuch rocks ki veins-lodes mein, kuch beds mein, kuch ret (placer) mein, kuch samundar mein. Aur classify hote hain: metallic (ferrous/non-ferrous), non-metallic, energy. Har ek ki apni khaasiyat aur use. Variety hi inki pehchaan hai!", "years": ["2026"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G5-468", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Distribution of minerals", "question": "“India is fortunate to have fairly rich and varied mineral resources. However these are unevenly distributed.” Examine the statement.", "answer": "India has rich and varied minerals, but they are unevenly distributed: the peninsular plateau (Chhotanagpur, Odisha, Chhattisgarh) is rich in metallic minerals and coal; the western/north-western regions (Gujarat-Rajasthan) have non-metallic and energy minerals; the northern plains are largely devoid of minerals.", "explanation": "India ke paas minerals khoob hain par baant-waar barabar nahi! Peninsular plateau (Chhotanagpur, Odisha) - metallic minerals aur coal. West India (Gujarat-Rajasthan) - petroleum aur non-metallic. Par northern plains lagbhag khaali. Kahin bahut, kahin kuch nahi - uneven distribution!", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G5-477", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Classification of minerals", "question": "Choose the appropriate option to fill in the blank : Minerals Ferrous -> Nickel Non-Ferrous -> Bauxite Precious -> Gold", "answer": "(C) Non-Ferrous Minerals. Bauxite (like copper, lead, tin) is a non-ferrous metallic mineral - one that does not contain iron.", "explanation": "Bauxite kis group mein? Non-Ferrous! Kyunki ismein iron nahi hota (aluminium banta hai). Ferrous = iron wale (nickel), Non-ferrous = bina iron wale (bauxite, copper), Precious = keemti (gold). Bauxite ka iron se rishta nahi = Non-Ferrous.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G5-478", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Classification of minerals", "question": "Choose the correct option to fill in the blank : [Image shows a classification of minerals into metallic and non-metallic, with a blank under non-metallic] Options : (A) Non-metallic (B) Metallic (C) Precious (D) Energy", "answer": "(A) Non-Metallic (per the official key). Minerals are classified into Metallic (Ferrous and Non-Ferrous), Non-Metallic and Energy minerals.", "explanation": "Diagram-based MCQ. Answer key (A) Non-Metallic deti hai. Mineral classification yaad rakho: Minerals -> Metallic (Ferrous + Non-Ferrous) aur Non-Metallic, plus Energy minerals. Diagram ke blank ko classification tree se match karke bhar do.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G5-479", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Classification of minerals", "question": "Choose the appropriate option to fill in the blank : [Image of Mineral classification, with a blank under Metallic Minerals, next to Non-Ferrous Minerals] Options : (A) Non-Ferrous minerals (B) Igneous minerals (C) Energy minerals (D) Ferrous minerals", "answer": "(C) Energy minerals (per the official key for these variants). Mineral types: Metallic (Ferrous/Non-Ferrous), Non-Metallic and Energy minerals (coal, petroleum, natural gas).", "explanation": "Yeh bhi classification diagram MCQ hai aur answer key (C) Energy minerals deti hai. Types yaad rakho: Metallic (Ferrous/Non-Ferrous), Non-Metallic, aur Energy minerals (coal, petroleum, natural gas). Diagram padhke blank sahi category se bharo.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G5-480", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Classification of minerals", "question": "Which of the following is an example of a renewable resource ? (A) Natural Gas (B) Crude Oil (C) Coal (D) Ground Water", "answer": "(D) Ground Water. Ground water is renewable (replenished by rainfall), whereas natural gas, crude oil and coal are non-renewable fossil fuels.", "explanation": "Renewable kaun? Ground Water! Yeh baarish se dobara bhar jaata hai. Natural gas, crude oil, coal toh fossil fuels hain - ek baar khatam toh khatam (non-renewable). Yaad rakho: paani baarish se wapas aata hai, coal-petrol nahi. Water = renewable.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G5-481", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Classification of minerals", "question": "Differentiate between ferrous and non-ferrous minerals.", "answer": "Ferrous minerals contain iron (e.g., iron ore, manganese) and form the base of the metallurgical (steel) industry, accounting for most metallic mineral production. Non-ferrous minerals do not contain iron (e.g., copper, bauxite, gold) and are crucial for various industries, though India's reserves are limited.", "explanation": "Ferrous vs Non-Ferrous: Ferrous mein iron hota hai (iron ore, manganese) - steel industry ki neev. Non-ferrous mein iron nahi (copper, bauxite, gold) - inki India mein reserves kam hain. Yaad rakho: Fe = iron, ferrous = lohe wale, non-ferrous = bina lohe wale!", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "G5-503", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Energy conservation", "question": "“Conserving energy is essential for sustainable development.” Support the statement with suitable arguments.", "answer": "Conserving energy is essential for sustainable development because conventional resources are finite and exhaustible, consumption is rising, and saving energy reduces pollution and the need for new generation. It involves judicious use, energy-efficient devices, renewables and small everyday steps.", "explanation": "Energy bachana sustainable development ke liye zaroori hai - coal-petrol limited hain, consumption badh rahi hai, aur bachat se pollution aur naye power plants ki zaroorat dono kam hoti hai. Judicious use, efficient devices, renewables aur chhote daily kadam - sab milke future bachate hain.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G6-521", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Chemical industry", "question": "(b) \"The chemical industry is fast growing in India.\" Justify the statement with suitable arguments.", "answer": "Justified: the chemical industry is among India's fastest-growing sectors, with large and small-scale units, covering inorganic chemicals (sulphuric acid, soda ash, fertilizers) and organic chemicals (petrochemicals, plastics, dyes); it is largely self-reliant in inputs and contributes significantly to GDP.", "explanation": "Chemical industry India mein bahut tezi se badh rahi hai — ismein inorganic (acid, soda ash, fertilizer) aur organic (petrochemicals, plastic, dyes) dono aate hain. Bade aur chhote dono units hain. Memory hook: chemical = 2 type (organic + inorganic) + GDP mein bada contribution.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G6-533", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Map work - Software Technology Parks", "question": "Name the place where software technology park is located in Tamil Nadu.", "answer": "Chennai — the Software Technology Park located in Tamil Nadu.", "explanation": "Tamil Nadu ka software technology park = Chennai. Map mein south-east coast pe point karo. Yaad rakho: 'Tamil Nadu = Chennai IT'. Chennai pehle Madras kehlata tha.", "years": ["2026"], "papers": 1, "raw": 5, "marks": 1, "types": ["Map"], "score": 4}, {"key": "G7-560", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Map work - Software Park UP", "question": "A Software Technology Park located in Uttar Pradesh", "answer": "A Software Technology Park in Uttar Pradesh is located at Noida.", "explanation": "UP ka software technology park = Noida (Delhi ke paas, NCR mein). Hook: 'Noida = New Okhla Industrial Development Authority', UP ka IT hub. Map pe North India mein Delhi ke paas mark karo.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["Map"], "score": 4}, {"key": "G7-562", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Map work - Maharashtra Airport", "question": "An International Airport located in Maharashtra", "answer": "The international airport in Maharashtra is Chhatrapati Shivaji Maharaj International Airport, Mumbai.", "explanation": "Maharashtra ka international airport = Mumbai (Chhatrapati Shivaji Maharaj International Airport). India ke busiest airports mein se ek. Hook: 'Mumbai-Maharashtra' dono M se. Map pe West coast par mark karo.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Map", "VSA"], "score": 4}, {"key": "H1-621", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Economic hardship of 1830s", "question": "Which country was the most affected by the potato famine during 1845-1849?", "answer": "(C) Ireland. The Great Potato Famine (1845-1849) hit Ireland hardest, where the population depended heavily on the potato crop; around a million died and many more emigrated.", "explanation": "1845-49 ki potato famine se sabse zyada Ireland tabaah hua kyunki wahan log mukhya roop se aaloo pe nirbhar the - laakhon mar gaye ya desh chhod gaye. Toh
