alle se nikala ja raha hai – kheti, factory, ghar sab ke liye. Renewable hone ke bawajood itni tezi se use ho raha hai ki water level neeche gir raha hai. Isiliye sustainability ka sawaal din-ba-din mushkil hota ja raha hai. Memory hook: paani jitna aaj bachao, kal utna milega.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "E1-49", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Sustainability of Development", "question": "“The consequences of environmental degradation do not respect national and state boundaries.\" Examine the statement in context of sustainability of development.", "answer": "Environmental degradation crosses borders — air and water pollution, global warming and falling groundwater affect neighbouring states and countries too. Hence sustainability is a shared, global concern and needs cooperation beyond political boundaries.", "explanation": "Pollution aur environment ka nuksaan kisi border ko nahi maanta – hawa, paani aur global warming ek desh se doosre desh tak phail jaate hain. Isiliye sustainability sirf ek desh ka nahi, sabka saanjha mudda hai. Memory hook: 'pradushan ke paas passport nahi hota' – yeh sabko milke solve karna padega.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "E1-52", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Public Facilities & Quality of Life", "question": "Explain the role of public facilities for quality of life.", "answer": "Public facilities such as government-provided healthcare, education, safe drinking water, housing and transport improve citizens' well-being, develop human resources, ensure good health and boost economic activities — raising the overall quality of life.", "explanation": "Quality of life sudhaarne mein public facilities ka bada role hai – sarkari health, education, saaf paani, ghar aur transport. Inse log healthy aur skilled bante hain aur economy bhi chalti hai. Memory hook: achhi suvidhaayein = achhi zindagi. Yeh ek scoring 2-marker hai, points clear likho.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "E1-53", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Government's Role in Development", "question": "Examine the role of government policies in promoting economic growth in India.", "answer": "Government policies promote growth by building infrastructure, giving subsidies, investing in public facilities, adopting liberalisation/globalisation, promoting rural industries, running poverty/employment schemes (like MGNREGA), supporting startups, easing formal loans and investing in skill training.", "explanation": "Sarkar economy ko aage badhane ke liye bahut kuch karti hai – infrastructure banati hai, subsidy deti hai, MGNREGA jaise rozgaar scheme chalati hai, startups aur skill training ko support karti hai, aur loan asaan banati hai. Memory hook: 'sarkar = economy ka driver'. Jitne zyada saaf points, utne marks.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "E1-54", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "World Bank – Criterion for Development", "question": "How is income an important factor in assessing the development of a country ? Mention the classification done by the World Bank.", "answer": "Income is key because higher income means more resources to meet human needs, so it indicates development. The World Bank (2019) classifies countries by per capita income: High-income (US$ 49,300+), Middle-income (US$ 2,500–49,300, India falls here) and Low-income (US$ 2,500 or less).", "explanation": "Income important hai kyunki zyada paisa matlab zaruraton ko poora karne ke zyada saadhan – isiliye yeh development ka indicator hai. World Bank desh ko income ke hisaab se baant-ta hai: High, Middle (yahan India aata hai) aur Low income. Memory hook: 'jeb dekho, vikas jaano'. Classification ke numbers yaad rakho.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 3}, {"key": "E1-55", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "World Bank – Criterion for Development", "question": "Why is the income considered most important for comparing countries? Explain.", "answer": "Income is considered most important because it shows how many goods and services people can access; the more the income, the more needs can be met. So average/per capita income is used (e.g. by the World Bank) to compare and classify countries.", "explanation": "Income ko countries compare karne ke liye sabse important isliye maana jaata hai kyunki paise se hi log goods aur services khareed paate hain – zyada income matlab zyada zaruraton ki poorti. Isiliye World Bank average/per capita income use karta hai. Memory hook: 'paisa = options' – jitni income utni sahuliyat.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "E1-56", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "World Bank – Criterion for Development", "question": "Explain the significance and limitations of average income for comparing different countries with examples.", "answer": "Average (per capita) income helps compare living standards and classify countries. But its limitations are: it hides inequalities within a country, ignores the distribution of income among people, and does not reflect quality of life, health or education. E.g. two countries with the same average income can have very different inequality.", "explanation": "Average income se countries compare karna asaan hota hai, par iski kamiyan bhi hain: yeh ameer-gareeb ka farak chhupa deta hai aur health/education/quality of life nahi dikhata. Do desh same average income ke ho sakte hain par ek mein bahut na-barabari ho. Memory hook: 'average sabko barabar dikha deta hai, asliyat chhupa deta hai'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "E1-64", "chapter_code": "E1", "chapter_name": "Development", "discipline": "Economics", "topic": "Development Indicators – Literacy, IMR, Attendance", "question": "Data related to an imaginary country is given below. Study these data and answer the question that follows : Age Total Population Net Attendance 7 and 8 years of age 1200 1000 14 and 15 years of age 1000 800 Total 2200 1800 The attendance percentage of this country of the age group of 14 and 15 years is __________.", "answer": "(B) 80 percent. For 14–15 years: (800 / 1000) × 100 = 80%.", "explanation": "14-15 saal ke 1000 bachhon mein se 800 school ja rahe hain. Percentage = (800÷1000)×100 = 80%. Bas attendance ko total se divide karke 100 se multiply karo. Memory hook: 'part ÷ whole × 100' – yahi percentage ka jaadu.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E2-111", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Which one of the following sectors is also known as the service sector ?", "answer": "The Tertiary sector is also known as the service sector. (The key marks 'Primary', which is an error; the service sector is the Tertiary sector.)", "explanation": "'Service sector' ka doosra naam hai Tertiary sector - kyunki ye goods nahi, services deta hai (bank, transport, teacher). (Answer key mein 'Primary' likha hai jo galat hai.) Memory hook: 'Service = Tertiary, dono ek hi cheez'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E2-112", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Which of the following comes under the primary sector of the economy?", "answer": "The activity that directly uses natural resources (e.g., agriculture, mining, fishing) comes under the primary sector.", "explanation": "Primary sector mein wo kaam aate hain jo seedha nature se hote hain - kheti, mining, machhli pakadna, dairy. Memory hook: 'Zameen/paani/jangal se seedha = Primary'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E2-113", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Importance of the Tertiary Sector", "question": "Evaluate the contribution of the tertiary sector in Gross Domestic Product (GDP) in India.", "answer": "The tertiary sector is India's largest sector and contributes the biggest share to GDP. It provides services like healthcare, transport, banking and IT, creates large employment, and its demand keeps rising with growth of other sectors and incomes.", "explanation": "Tertiary sector GDP mein sabse bada contributor hai - services (bank, IT, transport, health) ke through. Income badhne aur baaki sectors ke develop hone se iski demand aur badhti hai. Memory hook: 'GDP ka raja = Tertiary'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "E2-114", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Gross Domestic Product (GDP)", "question": "Choose the correct option to fill in the blank : The total value of all final goods and services produced within a country in a particular year is called __________.", "answer": "(D) Gross Domestic Product (GDP) – the total value of all final goods and services produced within a country in a particular year.", "explanation": "Ek saal mein desh ke andar bane saare final goods aur services ki total value = GDP (Gross Domestic Product). Sirf 'final' cheezein gini jaati hain taaki double counting na ho. Memory hook: 'Desh ki saal bhar ki kamaai ki value = GDP'.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E2-115", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Look at the given picture and answer the question that follows : The work being done in the picture falls under which sector of the economy ?", "answer": "(D) Secondary. The work shown is manufacturing (making goods in a factory), which is a secondary-sector activity.", "explanation": "Picture mein factory/manufacturing ka kaam dikh raha hai (cheez banana) - isliye Secondary sector. Jahan natural maal se naya product banta hai, wo Secondary. Memory hook: 'Factory mein banana = Secondary'.", "years": ["2025"], "papers": 1, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E2-116", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Organised vs Unorganised sector", "question": "Rakhi has done an economic survey of her area. The survey has revealed that people earn their livelihood by doing different jobs. The table prepared by Rakhi for this is given below. Study the table carefully and answer the question that follows : S. No. Work No. of People 1. Farmer working in his fields 250 2. Teachers teaching in school 10 3. Handloom weaver working in his/her house 70 4. Workers working in big factories 140 5. Employees working at a hospital in the area 60 Total 530 How many people are working in the organised sector ?", "answer": "(D) 210. Organised-sector workers = teachers (10) + factory workers (140) + hospital employees (60) = 210.", "explanation": "Organized mein wahi jinki naukri formal hai: teacher (10) + factory worker (140) + hospital employee (60) = 210. Farmer aur handloom weaver unorganized hain, isliye chhod diye. Memory hook: 'Formal + benefits wale jodo = organized count'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E2-117", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Organised vs Unorganised sector", "question": "Rakhi has done an economic survey of her area. The survey has revealed that people earn their livelihood by doing different jobs. The table prepared by Rakhi for this is given below. Study the table carefully and answer the question that follow : S.N. Work No. of People 1. Farmer working his fields 250 2. Teachers teaching in school 10 3. Handloom weavers in his/her house 70 4. Workers working in big factories 140 5. Employees working at a hospital in the area 60 Total 530 How many people are working in the unorganised sector?", "answer": "(C) 320. Unorganised-sector workers = farmers (250) + handloom weavers (70) = 320.", "explanation": "Unorganized mein farmer (250) + handloom weaver (70) = 320. Ye log bina formal rules/benefits ke kaam karte hain. Total 530 mein se 210 organized nikaal do toh 320 unorganized bachte hain. Memory hook: 'Khet + ghar ka kaam = unorganized'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E2-118", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Underemployment / Disguised unemployment", "question": "Analyse the problem of underemployment in agriculture sector in India.", "answer": "Agriculture suffers from disguised/under-employment: more people work on a small plot than needed, so removing some would not reduce output. Work is shared, each person works below capacity; it can be fixed by creating extra job opportunities.", "explanation": "Kheti mein 'disguised unemployment' - zaroorat se zyada log ek hi chhote khet par kaam karte hain. Agar kuch log hata do toh bhi production utna hi rahega, kyunki kaam baant liya jaata hai. Memory hook: 'Zyada log, kaam utna hi = chhupi berozgaari'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "E2-120", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Public vs Private sector", "question": "Identify the odd one out. (A) Hindustan Computers Limited (B) Bharti Airtel Limited (C) Hindustan Unilever Limited (D) Bharat Heavy Electricals Limited", "answer": "(D) Bharat Heavy Electricals Limited (BHEL). It is a public-sector (government) company, while the others are private-sector companies.", "explanation": "BHEL ek sarkari (public sector) company hai, baaki teen (HCL, Airtel, HUL) private hain - isliye BHEL odd one out. Memory hook: 'Bharat Heavy = sarkari, baaki private'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E2-121", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Public vs Private sector", "question": "Identify the sector on basis of the following characteristics and choose the correct option : The objective of this sector is to earn profit. This sector is owned by a person or company. Tata Iron and Steel is a example of this sector.", "answer": "(D) Private Sector. Profit motive plus private ownership (e.g., Tata Iron and Steel) identifies the private sector.", "explanation": "Profit ka motive + private ownership + TISCO ka example = Private sector. Tata jaisi companies private sector mein aati hain. Memory hook: 'Profit + private maalik = Private sector'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E2-122", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Organised vs Unorganised sector", "question": "Mention any one feature of the working conditions of organised sector.", "answer": "Regular terms of employment with assured work, fixed working hours, and adherence to government rules and regulations.", "explanation": "Organized sector ki ek feature: regular aur assured kaam, fixed working hours aur government rules ka paalan. Sab kuch system mein. Memory hook: 'Fixed timing + rules = organized'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "E2-123", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Organised vs Unorganised sector", "question": "Explain any one benefit provided by the employers to the organised sector employees.", "answer": "Employers in the organised sector provide benefits such as paid leave and minimum wages (also PF, medical allowance, pension).", "explanation": "Organized sector mein employer paid leave aur minimum wages deta hai (PF, medical, pension bhi). Ye benefits unorganized mein nahi milte. Memory hook: 'Paid chhutti + minimum salary = organized ka benefit'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "E2-124", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Protection of unorganised-sector workers", "question": "Why is it necessary for all self-employed people to register with the government ?", "answer": "Registration makes self-employed people comply with rules and regulations and helps the government build a database for monitoring, policy-making and extending protection/benefits.", "explanation": "Self-employed log register kyun karein? Taaki rules follow hon aur government ke paas data ho - jisse sahi policy bane aur unhe protection/benefits mil sakein. Memory hook: 'Register karo = data + suraksha'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "E2-125", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Choose the odd one out from the following options regarding the sectors of economy : (a) Pilot, Driver, Gardener (b) Fisherman, Teacher, Lawyer (c) Engineer, Professor, Farmer (d) Doctor, Teacher, Lawyer", "answer": "(d) Doctor, Teacher, Lawyer. All three are tertiary-sector (service) jobs, making this the only fully same-sector group, hence the odd one out.", "explanation": "Option (d) - Doctor, Teacher, Lawyer - teeno hi Tertiary (service) sector ke hain, ek hi sector ka group, isliye odd one out. Baaki options mein alag-alag sector ke log mix hain. Memory hook: 'Teeno service wale = ek hi sector = odd'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E2-126", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Basis of classifying sectors", "question": "Choose the correct option to fill the blank : Sector Criteria Used • Primary, Secondary and Tertiary • Organized and Unorganized Sectors Nature of Employment Activities", "answer": "(c) Nature of production activities. Primary/Secondary/Tertiary are classified on the basis of the nature of production activities.", "explanation": "Primary/Secondary/Tertiary kis criteria par baante? 'Nature of production activities' - yaani kaam ki kism (maal nikalna, banana, seva dena). Memory hook: 'Kaam ki kism = sector ka aadhar'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E2-127", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Gross Domestic Product (GDP)", "question": "Define 'Gross Domestic Product' and explain its importance.", "answer": "GDP is the total value of all final goods and services produced in all three sectors of a country in a particular year. It is important as a key indicator of a country's economic health and standard of living.", "explanation": "GDP = ek saal mein teeno sectors mein bane saare final goods aur services ki total value. Ye batata hai desh ki economy kitni mazboot hai aur log ka standard of living kaisa hai. Memory hook: 'Desh ki economy ka report card = GDP'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "E2-128", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "MGNREGA / Right to Work", "question": "Which of the following provisions have been made under the 'Mahatma Gandhi National Rural Employment Guarantee Act – 2005'?", "answer": "(D) The government provides an unemployment allowance to beneficiaries if it fails to provide employment (the Act guarantees 100 days of wage employment a year).", "explanation": "MGNREGA 2005 ke tahat saal mein 100 din ki guaranteed naukri milti hai, aur agar government kaam na de paaye toh unemployment allowance deti hai. Ye 'Right to Work' ka example hai. Memory hook: 'Kaam nahi toh paisa - MGNREGA ki guarantee'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E2-129", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Public vs Private sector", "question": "Find the odd one out. (A) Hindustan Computers Limited (B) Hindustan Unilever (C) Bharti Airtel Limited (D) Indian Postal Service", "answer": "(D) Indian Postal Service. It is a public-sector (government) service, while the others are private-sector companies.", "explanation": "Indian Postal Service sarkari (public sector) hai, baaki teen (HCL, HUL, Airtel) private companies hain - isliye Postal Service odd one out. Memory hook: 'Daak vibhag = sarkari, baaki private'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E2-130", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Gross Domestic Product (GDP)", "question": "How are final goods and services calculated? Explain through one example.", "answer": "Only the value of final goods and services is counted (= GDP) to avoid double-counting intermediate goods. E.g., the value of biscuits (final good) already includes the cost of flour (intermediate good), so flour is not counted separately.", "explanation": "GDP mein sirf 'final' cheez ki value gini jaati hai - jaise biscuit ki value mein aata (flour) ka cost pehle se shaamil hai, isliye aata alag se nahi ginte. Aisa karne se double counting nahi hoti. Memory hook: 'Sirf final cheez gino = double count se bacho'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "E2-147", "chapter_code": "E2", "chapter_name": "Sectors of the Indian Economy", "discipline": "Economics", "topic": "Classification of sectors", "question": "Look at the given picture and answer the question that follows : Cars made by Indian workers being transported to be sold abroad by MNCs. The work being done in the picture falls in which sector of the economy ?", "answer": "(C) Tertiary. Transporting and selling/trading the cars is a service activity (it does not produce the goods), so it falls under the tertiary sector.", "explanation": "Cars banana toh Secondary hota, par yahan picture mein cars ko 'transport karke bechna' dikh raha hai - ye ek service hai, isliye Tertiary sector. Trick: dhyan se padho ki picture mein 'banana' ho raha hai ya 'service' (transport/sell). Memory hook: 'Le jaana/bechna = Tertiary, banana = Secondary'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E3-150", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Formal vs Informal Sources of Credit", "question": "Read the following sources of loan carefully and choose the correct option related to formal sources of credit. (i) Commercial Bank (ii) Landlords (iii) Government (iv) Money Lender", "answer": "(a) (i) and (iii) are correct. Commercial Bank and Government are formal sources; landlords and moneylenders are informal.", "explanation": "Commercial Bank (i) aur Government (iii) formal sources hain, isliye option (a). Landlord aur moneylender to gaon ke private log hain jo manmaani byaaj lete hain. Simple rule: sarkaari ya bank-type = formal, private aadmi = informal.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E3-156", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Terms of Credit & Collateral", "question": "Why does it become difficult for farmers in rural areas to take loans from government banks ? Read the following reasons and choose the most appropriate option : I. Lack of collateral II. Complicated procedure III. Higher cost of borrowing IV. Lack of awareness", "answer": "(C) Only I, II and IV are correct. Lack of collateral, complicated procedure and lack of awareness make bank loans hard; the cost of borrowing from banks is actually lower.", "explanation": "Bank se loan lena gaon walon ke liye mushkil kyun? Collateral nahi hai (I), process lamba-complicated hai (II), aur awareness ki kami (IV). Higher cost (III) GALAT hai kyunki bank to sasta deta hai! Isliye option C. Yahi cheez aksar trick karti hai — III mat select karna.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E3-157", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Terms of Credit & Collateral", "question": "Why is it not easy to get loans from the formal sector ? Read the following reasons and choose the most appropriate option : I. Availability of Banks II. Availability of Collateral III. Long and Complicated Loan Process IV. Awareness of Borrower", "answer": "(B) Only II, III and IV are correct. Need for collateral, the long/complicated process, and borrower awareness make formal loans hard to get.", "explanation": "Formal loan lena tabhi mushkil hota hai jab — collateral chahiye (II), process lamba-complicated (III), aur borrower ko jaankari nahi (IV). 'Availability of banks' (I) to ulta madad karta hai, isliye chhod do. Answer: option B. Dhyaan se padho, reasons thode alag likhe hain.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E3-164", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Terms of Credit & Collateral", "question": "Mention one important term of credit for taking a loan from the bank.", "answer": "Any one term of credit: Interest rate (or Collateral / Documentation / Mode of repayment).", "explanation": "Bas ek term batani hai — Interest rate sabse easy answer hai (ya Collateral/Documentation/Mode of repayment). 1 mark ka question hai, ek word likh do, kaam ho gaya. Terms of credit waala hi family hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "E3-170", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Banking & Deposits", "question": "Analyse the role of banks in the economy of the Country.", "answer": "Banks accept deposits and pay interest, provide loans for production and investment, mediate between depositors and borrowers, promote savings, and thus drive economic growth and employment.", "explanation": "Bank ka economy mein role: deposit lo, byaaj do, loan do, savings ko badhao, aur depositor-borrower ke beech bridge bano. Isse business chalte hain, naukri banti hai, GDP badhta hai. Yaad rakho: bank = economy ka 'blood circulation system'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "E3-182", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Money as Medium of Exchange", "question": "The problem of 'Double Coincidence of Wants' can be solved by which of the following?", "answer": "(A) By increasing the circulation of currency. Money as a medium of exchange removes the need for both parties' wants to match.", "explanation": "Double coincidence of wants ki dikkat (dono ko ek-doosre ki cheez chahiye) ko money/currency solve karti hai. Jab paisa beech mein aaya, barter ka jhanjhat khatam. Is set mein option (A) diya gaya hai. Concept: money = barter ka ilaaj.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E3-186", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Money as Medium of Exchange", "question": "Assertion (A) : Rupees is accepted as medium of exchange in India. Reason (R) : The World Bank legalises the use of rupee as a medium of payment in India.", "answer": "(C) (A) is true but (R) is false. The rupee is accepted as a medium of exchange, but it is legalised by the Reserve Bank of India / Government of India, NOT the World Bank.", "explanation": "Assertion theek: rupee India mein medium of exchange hai. Reason galat: ise World Bank nahi, balki RBI/Indian Government legal banati hai. World Bank ka isse koi lena-dena nahi! Option (C). Yaad rakho: apni currency apni sarkaar control karti hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "E3-189", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Banking & Deposits", "question": "Examine the importance of bank deposits.", "answer": "Bank deposits keep money safe, earn interest, can be withdrawn on demand (demand deposits), allow cashless payments by cheque, and encourage the habit of saving.", "explanation": "Bank deposit ke faayde: paisa safe rehta hai, byaaj milta hai, jab chaaho nikaal sakte ho, cheque se cashless payment, aur saving ki aadat. 3-4 points likh do. Memory hook: 'safe + byaaj + demand + saving'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "E3-198", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Cooperative Societies", "question": "Mention any two sources of capital of cooperative societies.", "answer": "Two sources: (1) deposits from members, and (2) large loans obtained from banks using member deposits as collateral (plus interest earned on loans given).", "explanation": "Cooperative society ke paise ka source? (1) Members ke deposits, (2) Bank se bada loan (deposits ko collateral bana ke). Koi 2 likh do. Same logic jaise SHG/Krishak — 'apni saving + bank loan'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "E3-199", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Cooperative Societies", "question": "Explain the role of cooperative societies in increasing the income of farmers.", "answer": "Cooperative societies give low-interest loans for cultivation, implements and trade, which raise crop production and income, and they promote savings by paying interest on members' deposits.", "explanation": "Cooperative kisaan ki income kaise badhaati hai? Sasta loan deti hai kheti/aujaar ke liye, jisse paidaawar badhti hai aur kamai zyada hoti hai. Saath hi deposit pe byaaj de ke saving ki aadat daalti hai. Double fayda: zyada production + saving.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "E3-200", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Cooperative Societies", "question": "Explain the functioning of Co-operative Societies.", "answer": "Members pool their resources and deposits; the society uses these deposits as collateral to obtain large bank loans, then lends to members for needs like agriculture, trade or housing. Repaid loans fund further lending.", "explanation": "Cooperative society chalti kaise hai? Members apna paisa pool karte hain, us deposit ko collateral bana ke bank se bada loan aata hai, fir woh members ko loan pe milta hai (kheti, vyapaar, ghar). Loan wapas aaya to phir naya loan — cycle chalti rehti hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "E3-201", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Choosing a Credit Source (Case-based)", "question": "Shyamal is a small farmer. Shyamal has got his 'Kisan Card' made. He needs a loan to grow new crops. Which of the following means will be easy and beneficial for this?", "answer": "(A) Cooperative Bank. A formal source like a cooperative bank gives cheap, fair credit—best for a small farmer with a Kisan Card.", "explanation": "Chhote kisaan Shyamal ke liye best = Cooperative Bank (option A), kyunki yeh formal source hai, sasta byaaj aur fair terms. Moneylender se door raho! Rule: kisaan ko hamesha formal (bank/cooperative) suggest karo.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E3-202", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Choosing a Credit Source (Case-based)", "question": "Rama is a farmer. She needs loan for agriculture work. Which of the following sources of loan will be beneficial for Rama? Choose the most appropriate option : I. Bank II. Agricultural Trader III. Self-Help Group IV. Government", "answer": "(A) Only (i), (iii) and (iv). Bank, Self-Help Group and Government are beneficial formal/fair sources; the agricultural trader (informal) charges high interest.", "explanation": "Rama ke liye achhe sources: Bank (I), SHG (III), Government (IV) — option (A). Agricultural trader (II) chhod do kyunki woh informal hai aur mehenga byaaj leta hai. Trick: trader/moneylender hamesha hatao.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E3-205", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Choosing a Credit Source (Case-based)", "question": "From which source has Arun taken the loan ?", "answer": "Bank / formal source. Arun has taken his loan from a bank, which is a formal source of credit.", "explanation": "Arun ne loan kahan se liya? Bank se — yani formal source. (Is set mein 'benefit identify karo' / 'source batao' sab isi Arun case se jude hain.) Bank ka matlab: kam byaaj, fixed term, safe loan.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "E3-206", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Choosing a Credit Source (Case-based)", "question": "How does Arun plan to repay the loan and take a fresh loan ?", "answer": "Arun's bank loan has a low interest rate (8.5%) and a 3-year flexible repayment period, so he can save capital, reinvest, and apply for a fresh loan against his cold-storage receipt.", "explanation": "Arun ka plan: bank ka loan sasta (8.5%) aur 3 saal ka flexible repayment hai, isliye woh paisa bacha ke dobara invest kar sakta hai aur cold-storage receipt pe naya loan le sakta hai. Idea: formal loan ki flexibility se aage badho.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "E3-208", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Distribution of Credit", "question": "Which of the following groups in urban India depend on informal sources to meet their credit needs ?", "answer": "(C) Both poor households and households with few assets. With little collateral, these groups cannot easily access formal credit and depend on informal sources.", "explanation": "Shehar mein informal source pe kaun nirbhar? Garib ghar aur kam assets waale dono — option (C). Inke paas collateral nahi, isliye bank loan nahi deta, majboori mein moneylender. Ulta side: ameer formal lete hain.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E3-209", "chapter_code": "E3", "chapter_name": "Money and Credit", "discipline": "Economics", "topic": "Distribution of Credit", "question": "Arrange the following sources of credit in the most to least order to meet the credit requirement of rural households in India and choose the correct option : I. Government II. Cooperative Banks and Societies III. Moneylenders IV. Relatives and friends Options : (A) III, II, I, IV (B) III, II, IV, I (C) I, III, II, IV (D) I, III, IV, II", "answer": "(B) III, II, IV, I — Moneylenders (most), then Cooperative Banks/Societies, then Relatives & friends, then Government (least).", "explanation": "Rural households ka credit kahan se aata hai, zyada se kam: Moneylenders > Cooperatives > Relatives/friends > Government — option (B). Dukh ki baat hai ki aaj bhi sabse zyada moneylender se, isiliye formal credit badhana zaroori. Order yaad rakho: 'III-II-IV-I'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E4-238", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Technology and globalisation", "question": "Statement I : Rapid improvement in technology has been one major factor to stimulate the globalisation process. Statement II : This has made much faster delivery of goods across long distances possible at lower costs.", "answer": "(A) Both statements are correct and Statement II is the correct explanation of Statement I. (Improved technology stimulated globalisation because it made faster delivery of goods over long distances possible at lower costs.)", "explanation": "Dono statements sahi, aur II hi I ki wajah hai. Technology ne globalisation kaise badhaya? Kyunki saaman ab door tak jaldi aur sasta pahunchne laga (containers, transport). Memory hook: technology ka asar = 'fast + cheap delivery', isi karan duniya judi. Answer (A).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason", "Statement-based"], "score": 3}, {"key": "E4-239", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Technology and globalisation", "question": "How did improvement in transportation technology stimulate the globalisation process? Explain.", "answer": "Improved transportation technology enabled faster and cheaper delivery of goods over long distances (domestic and international trade) and let people travel long distances in less time - boosting globalisation.", "explanation": "Transportation technology ke sudhar se saaman door tak jaldi aur sasta pahunchne laga, aur log bhi kam samay mein lambi doori tay karne lage. Example: containers aur cargo planes. Memory hook: pehle mahine lagte the, ab dino mein delivery - transport ne duniya ko paas le aaya, globalisation tezi se badha.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "E4-240", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Meaning of globalisation", "question": "Explain the concept of economic relations between countries.", "answer": "Economic relations between countries (globalisation) involve rapid integration through rising foreign trade, increased MNC activity, greater foreign investment, and movement of goods, services and technology across borders.", "explanation": "Deshon ke beech economic relations matlab woh aapas mein trade, investment aur technology ke through jude rehte hain - yahi globalisation hai. Foreign trade, MNCs, investment sab isme aate hain. Memory hook: jaise do dost paise, saaman aur ideas share karte hain, waise hi desh economic relations rakhte hain.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "E4-241", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "MNCs and production", "question": "Explain any two ways in which MNCs control production across countries.", "answer": "MNCs control production by (1) setting up their own plants/joint ventures near cheap labour and markets, and (2) placing orders with local small producers and closely controlling price, quality and delivery.", "explanation": "MNCs do tareeke se production control karti hain: (1) khud factory lagaati hain ya local company ke saath joint venture, sasta labour wali jagah; (2) chhote producers ko order deti hain aur price-quality khud decide karti hain. Memory hook: MNC = boss jo ya toh khud factory chalaaye ya doosron se apni shartein pe banwaaye.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "E4-242", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Liberalisation 1991", "question": "Why did the Indian Government restrict foreign trade and foreign investment between 1947-1991 ? Explain.", "answer": "To protect domestic producers from foreign competition, safeguard indigenous/infant industries, and promote the growth and development of the Indian economy.", "explanation": "1947-1991 ke beech government ne foreign trade-investment par rok lagayi thi taaki desi (domestic) producers ko foreign competition se bachaya jaaye aur naye Indian industries pann sakein. Memory hook: jaise chhote paudhe ko dhoop-hawa se bachaane ke liye gamle mein rakha jaata hai - India ne apni nayi industries ko 'protect' kiya. (1991 ke baad bubble phoda.)", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "E4-243", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Impact of globalisation", "question": "Explain any two benefits of globalisation.", "answer": "Benefits: greater consumer choice and better-quality products at lower prices; access to new markets, more investment, new jobs, innovation and improved living standards.", "explanation": "Globalisation ke faayde: consumers ko zyada choice aur achhi quality saste daam par; companies ko naye markets, jobs aur investment; overall living standard improve. Memory hook: maal sasta + variety zyada + naye jobs = globalisation ka tohfa consumers ke liye. (Negatives alag baat hai.)", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "E4-244", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Technology and globalisation", "question": "The growth of digital technology has greatly influenced globalization. Which of the following is its main benefit ?", "answer": "(c) Enhanced connectivity.", "explanation": "Digital technology ka globalisation par sabse bada faayda - 'enhanced connectivity' yaani behtar jud-aav. Internet, mobile se duniya bhar ke log aur business turant connect ho jaate hain. Memory hook: digital tech = duniya ka WiFi, sab connected. Answer (c).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "E4-245", "chapter_code": "E4", "chapter_name": "Globalisation and the Indian Economy", "discipline": "Economics", "topic": "Liberalisation 1991", "question": "Read the following statements for stimulating the process of globalization and choose the correct options : I. Government reduces trade barriers. II. Government reduces competition among producers. III. Government reduces import and export taxes. IV. Government removes restrictions on foreign investment.", "answer": "(C) Only I, III and IV are correct. (Govt stimulates globalisation by reducing trade barriers, cutting import/export taxes, and removing restrictions on foreign investment - NOT by reducing competition.)", "explanation": "Globalisation badhane ke liye government: trade barriers kam karti hai (I), import-export tax kam karti hai (III), foreign investment ki rok hataati hai (IV). Statement II galat hai - globalisation toh competition badhaata hai, kam nahi karta! Memory hook: globalisation = zyada competition, isiliye II out. Answer (C).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G-MAP-258", "chapter_code": "G-MAP", "chapter_name": "Geography (Map Work)", "discipline": "Geography", "topic": "Map work", "question": "Locate and label any three of the following: Leading state in production of Jute, Atomic Power Plant located in Gujarat, Iron and Steel Plant located in Jharkhand, Sri Guru Ram Das Jee International Airport.", "answer": "Leading Jute state: West Bengal. Atomic Power Plant in Gujarat: Kakrapar. Iron & Steel Plant in Jharkhand: Jamshedpur (TISCO) / Bokaro. Sri Guru Ram Das Jee International Airport: Amritsar, Punjab.", "explanation": "Yeh descriptive style hai — naam khud sochna padta hai. Jute ka raja West Bengal. Gujarat ka atomic plant = Kakrapar. Jharkhand ka steel = Jamshedpur (TISCO) ya Bokaro. Amritsar wala airport Sri Guru Ram Das Jee. Hook: 'Jute = Joy of Bengal'. Soch ke sahi jagah pe dot lagao.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 3, "types": ["Map"], "score": 3}, {"key": "G-MAP-259", "chapter_code": "G-MAP", "chapter_name": "Geography (Map Work)", "discipline": "Geography", "topic": "Map work", "question": "On the same political outline map of India, locate and label any three of the following with suitable symbols : (i) Eastern terminal station of the East-West Corridor (ii) Leading state in coffee production (iii) Nuclear power plant located in Uttar Pradesh (iv) Major sea port located in Odisha", "answer": "Eastern terminal of East-West Corridor: Silchar (Assam). Leading coffee state: Karnataka. Nuclear Power Plant in UP: Narora. Major Sea Port in Odisha: Paradip.", "explanation": "East-West Corridor ka Eastern end = Silchar (Assam); Western end Porbandar tha. Coffee ka raja Karnataka (South ki khushboo). UP ka nuclear = Narora. Odisha ka port = Paradip. Hook: 'Silchar = East ka sirा'. Descriptive question hai, naam yaad rakho.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["Map"], "score": 3}, {"key": "G-MAP-260", "chapter_code": "G-MAP", "chapter_name": "Geography (Map Work)", "discipline": "Geography", "topic": "Map work", "question": "Locate and label any three of the following with suitable symbols : (i) An international airport of West Bengal (ii) A software technology park of Karnataka (iii) A nuclear power plant located in Maharashtra (iv) A major sea port of Odisha", "answer": "International airport of West Bengal: Netaji Subhas Chandra Bose (Kolkata). STP of Karnataka: Bengaluru. Nuclear Power Plant in Maharashtra: Tarapur. Major Sea Port of Odisha: Paradip.", "explanation": "WB ka airport = Kolkata (Netaji Subhas Chandra Bose). Karnataka STP = Bengaluru (pakka). Maharashtra nuclear = Tarapur. Odisha port = Paradip. Hook: 'Netaji = Kolkata'. Yeh sab apne-apne state ki famous cheezein hain, easy marks agar naam aate ho.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["Map"], "score": 3}, {"key": "G-MAP-261", "chapter_code": "G-MAP", "chapter_name": "Geography (Map Work)", "discipline": "Geography", "topic": "Map work", "question": "On the same political outline map of India, locate and label any three of the following with suitable symbols : (a) A major dam on the Chenab river. (b) Nuclear Power Plant located in Uttar Pradesh. (c) A major Software Technology Park located in Karnataka. (d) A major Sea Port located in Odisha.", "answer": "Major dam on Chenab: Salal (J&K). Nuclear Power Plant in UP: Narora. STP in Karnataka: Bengaluru. Major Sea Port in Odisha: Paradip.", "explanation": "Chenab river pe major dam = Salal (J&K). UP nuclear = Narora. Karnataka STP = Bengaluru. Odisha port = Paradip. Hook: 'Chenab = Salal cha saathi'. Note: is question ki answer-key mein galti se Madras/Dandi (History) bhi likhe the, unko chhod do — geography ke sahi answers yahi hain.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["Map"], "score": 3}, {"key": "G-MAP-262", "chapter_code": "G-MAP", "chapter_name": "Geography (Map Work)", "discipline": "Geography", "topic": "Map work", "question": "On the same outline map of India locate and label any three of the following with suitable symbols : (i) Leading state in production of rice (ii) Coal-mines located in Tamil Nadu (iii) Major sea port located in Karnataka (iv) Oil field located in Maharashtra", "answer": "Leading rice state: West Bengal. Coal-mines in Tamil Nadu: Neyveli (lignite). Major Sea Port in Karnataka: New Mangalore. Oil field in Maharashtra: Mumbai High (offshore).", "explanation": "Rice ka raja West Bengal. Tamil Nadu ka coal = Neyveli (lignite, special). Karnataka ka port = New Mangalore. Maharashtra ka oil = Mumbai High (samundar ke andar). Hook: 'Neyveli = Tamil ka lignite'. Mumbai High offshore hai, toh coast ke paas dikhao.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 3, "types": ["Map"], "score": 3}, {"key": "G1-273", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil characteristics (descriptive)", "question": "Explain two important characteristics of Black soil.", "answer": "Black soil (regur) is made of fine clayey material with high moisture-retention; rich in calcium carbonate, magnesium, potash and lime but poor in phosphorus, and ideal for cotton.", "explanation": "Black soil ke do khaas gun: (1) bahut fine clay jo paani der tak rokti hai, (2) calcium, potash, lime se bharpoor par phosphorus kam. Isiliye 'black cotton soil' kapaas ke liye perfect hai. Hook: 'Paani pakdo, cotton ugao'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "G1-274", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil characteristics (descriptive)", "question": "Describe two main characteristics of 'Alluvial Soil'.", "answer": "Deposited by Himalayan rivers (Indus, Ganga, Brahmaputra), it consists of sand, silt and clay; highly fertile and rich in potash, phosphoric acid and lime, ideal for sugarcane and paddy.", "explanation": "Alluvial soil nadiyon (Indus, Ganga, Brahmaputra) ki den hai - sand, silt, clay ka mix. Potash, phosphoric acid, lime se rich, isliye gehu, dhaan, ganna khoob ugta hai. Hook: 'Nadi laayi mitti, fasal hui fatti'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "G1-275", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil characteristics (descriptive)", "question": "Describe any two characteristics of laterite soil.", "answer": "Laterite soil develops in tropical/subtropical climate with alternate wet-dry seasons by intense leaching; mostly acidic, low in nutrients, and useful for tea, coffee and cashew.", "explanation": "Laterite mitti garam-tropical jagah par banti hai jahan kabhi baarish kabhi sukha. Leaching se nutrients bah jaate hain to yeh acidic aur kam upjau - par tea, coffee, cashew ke liye theek. Hook: 'Leaching ki acidic chai-coffee mitti'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "G1-276", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil characteristics (descriptive)", "question": "Explain the main features of alluvial soil.", "answer": "Alluvial soil is deposited by Himalayan rivers; made of sand, silt and clay (coarser near valleys), classified as old Bangar and new Khadar (Khadar more fertile), rich in potash, phosphoric acid and lime, ideal for sugarcane, paddy and wheat.", "explanation": "5-marker ke liye yaad rakho: Himalayan rivers se bani, sand-silt-clay, do type - Bangar (purani) aur Khadar (nayi, zyada fertile). Potash-phosphoric acid-lime se rich, isliye dense aabaadi aur khoob kheti. Hook: 'Bangar buddha, Khadar jawan'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G1-277", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil characteristics (descriptive)", "question": "Describe any two features of arid soils.", "answer": "Arid soils are sandy in texture and saline in nature, red to brown in colour, low in humus and moisture due to the dry climate, and often have a kankar layer that restricts water infiltration.", "explanation": "Arid soil ke do feature: (1) sandy aur namkeen (saline), (2) red-brown rang, humus kam kyunki dry climate. Rajasthan jaise registan ki mitti. Hook: 'Sukha = ret + namak + red-brown'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "G1-278", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Soil characteristics (descriptive)", "question": "Describe any two features of forest soils.", "answer": "Forest soils are found in hilly and mountainous forest areas; texture varies with relief - loamy and silty in valleys but coarse-grained on upper slopes; they are acidic with low humus in snow-covered areas.", "explanation": "Forest/mountain soil pahaadi jangal walon mein milti hai. Dhalaan (relief) ke hisaab se badalti hai - valley mein loamy/silty, upar slope par coarse aur kankar wali. Hook: 'Pahaad ki mitti, jagah-jagah badalti'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "G1-283", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Maintaining soil fertility", "question": "Read the story of Rinjha and answer the question that follows : Story of Rinjha Rinjha lived with her family in a small village at the outskirts of Diphu in Assam. She enjoys watching her family members clearing, slashing and burning a patch of land for cultivation. She often helps them in irrigating the fields with water running through a bamboo canal from the nearby spring. She loves the surroundings and wants to stay here as long as she can, but this little girl has no idea about the declining fertility of the soil of her fields due to the practice of slash and burn cultivation after every season. Suggest any three measures to Rinjha so that the fertility of the soil of her fields remains intact for a long time.", "answer": "To keep soil fertile: practise crop rotation, use organic manure/compost, and grow leguminous (nitrogen-fixing) crops; also manage pests and avoid slash-and-burn.", "explanation": "Rinjha ki jhoom kheti (slash & burn) se mitti ki taakat khatam ho rahi hai. Solution: crop rotation karo, manure (gobar khaad) daalo, aur dalhan (leguminous) faslein ugao jo nitrogen wapas laati hain. Hook: 'Fasal badlo, khaad daalo, daal ugao'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "G1-287", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Resource planning", "question": "Explain the meaning of resource planning. Why is it necessary to have resource planning in India in the context of indiscriminate use of resources.", "answer": "Resource planning is the judicious, balanced use and inventory of resources. It is necessary because indiscriminate use causes global problems like global warming, ozone depletion, pollution and land degradation, and India has uneven resource distribution.", "explanation": "Resource planning matlab sources ko soch-samajh ke, balance se use karna. Zaroori isliye kyunki andha-dhund use se global warming, ozone hole, pollution aur land degradation hota hai. Hook: 'Plan karo warna planet kharaab'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "G1-289", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Resource planning", "question": "\"An equitable distribution of resources has become essential for a sustained quality of human life.\" Explain the statement.", "answer": "Equitable (fair) distribution of resources is essential because over-use by a few leads to depletion and a divided society; sharing resources fairly among all regions and people is needed for sustainable existence and to avoid regional disunity.", "explanation": "Agar resources sirf kuch logon ke paas reh gaye to baaki vanchit reh jaayenge aur society baant jaayegi. Isliye sabko barabar (equitable) hissa milna chahiye - tabhi sustained acchi zindagi aur ekta rahegi. Hook: 'Sabka saath = sabka resource'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "G1-290", "chapter_code": "G1", "chapter_name": "Resources and Development", "discipline": "Geography", "topic": "Resource planning", "question": "Explain the various stages of resource planning and its need in India.", "answer": "Stages: (1) identification and inventory of resources (surveying, mapping, estimation); (2) evolving a planning structure with appropriate technology, skill and institutions; (3) matching resource plans with overall national development plans. Needed due to uneven distribution and resources' key role in development.", "explanation": "Resource planning ke 3 stage: (1) resources dhundo aur list banao (survey, mapping), (2) sahi technology aur skill ka structure banao, (3) usse national development plan se jodo. India mein zaroori kyunki resources unequal hain. Hook: '1-Dhundo, 2-Tayyari, 3-Jodo'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G2-306", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Forest classification (Reserved/Protected/Unclassed)", "question": "Arrange the following categories of forests in India from the largest to the smallest in terms of area and choose the correct option : I. Reserved II. Protected III. Unclassed", "answer": "(B) I, II, III — i.e. Reserved > Protected > Unclassed forests by area.", "explanation": "Area ke hisaab se sequence: Reserved sabse bada, phir Protected, phir Unclassed sabse chhota. Memory hook: 'R-P-U' alphabetically bhi aur size-wise bhi same order. Bas isi tarah ratt lo - Reserved hamesha number one.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G2-309", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Wildlife (Protection) Act 1972", "question": "Which of the following characteristics of the Indian Wild Life (Protection) Act are correct ? Choose the most appropriate option. Characteristics : I. To make provisions for habitat for wild animals. II. To publish list of protected species. III. To ban hunting to save endangered species. IV. To include important subjects like forests and wildlife in the Union List. Options : (A) Only I, II and III are correct. (B) Only I, II and IV are correct. (C) Only II, III and IV are correct. (D) Only I, III and IV are correct.", "answer": "(A) Only I, II and III are correct — habitat provision, listing protected species, and banning hunting are true; IV is wrong (forests/wildlife are in the Concurrent List, not Union List).", "explanation": "Act ke teen sahi kaam: habitat dena, protected species ki list banana, shikaar band karna. Trap ye hai ki 'Union List' galat hai - forest aur wildlife to Concurrent List mein aate hain (1976 ke 42nd amendment ke baad). Memory hook: 'Forest = Concurrent, na ki Union'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G2-323", "chapter_code": "G2", "chapter_name": "Forest and Wildlife Resources", "discipline": "Geography", "topic": "Map/Match - National Parks and States", "question": "Match Column I with Column II and choose the correct option : Column I a. Sariska Wildlife Sanctuary b. Manas Tiger Reserve c. Periyar Tiger Reserve d. Corbett National Park Column II i. Uttarakhand ii. Rajasthan iii. Assam iv. Kerala", "answer": "(B) a–ii, b–iii, c–iv, d–i — Sariska–Rajasthan, Manas–Assam, Periyar–Kerala, Corbett–Uttarakhand.", "explanation": "Jodi banao: Sariska-Rajasthan, Manas-Assam, Periyar-Kerala, Corbett-Uttarakhand. Memory hook: 'SR-MA-PK-CU'. Sariska bhi Rajasthan mein hai (jaise Bhairodev Sonchuri), aur Periyar hamesha Kerala. Ratt lo.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 3}, {"key": "G3-350", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Dams & rivers (matching)", "question": "Match Column I with Column II and choose the correct option : Column I (Dam) Column II (River) a. Hirakud i. Chambal b. Gandhi Sagar ii. Krishna c. Nagarjuna Sagar iii. Kaveri d. Mettur iv. Mahanadi", "answer": "(C) a–iv, b–i, c–ii, d–iii → Hirakud–Mahanadi, Gandhi Sagar–Chambal, Nagarjuna Sagar–Krishna, Mettur–Kaveri.", "explanation": "Jodi: Hirakud–Mahanadi, Gandhi Sagar–Chambal, Nagarjuna Sagar–Krishna, Mettur–Kaveri. Hook: 'Gandhi Sagar par Chambal' aur 'Mettur par Kaveri (South)'. Bas yeh char pakka, option C apne aap aa jaayega.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 3}, {"key": "G3-351", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Inter-state water disputes", "question": "Choose the correct option regarding major states involved in the Krishna Godavari issue :", "answer": "(B) Maharashtra, Karnataka and Andhra Pradesh.", "explanation": "Krishna-Godavari paani vivad mein teen states involved hain: Maharashtra, Karnataka aur Andhra Pradesh. Yeh inter-state water dispute ka example hai. Hook: 'MA-KA-AP' – teen padosi states paani ke liye aapas mein bidding kar rahe hain.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G3-352", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Groundwater overuse & sustainability", "question": "How has the overuse of underground water created a serious crisis in many parts of India ? Explain with examples in the context of sustainable development.", "answer": "Over-extraction (by farmers, industries, cities) lowers the water table, causes wells/borewells to dry up, reduces water availability for future generations and threatens food security – going against sustainable development; e.g. falling water tables in Punjab, Haryana, Rajasthan.", "explanation": "Hum zameen ke andar ka paani zarurat se zyada kheech rahe hain – kheti, industry, sheher sab. Isse water table neeche chala jaata hai, kuein-borewell sookhne lagte hain, aur aane wali peedhi ke liye paani nahi bachta – yahi 'unsustainable' hai. (Ek printed answer galti se 'income' ka tha – ignore karo.) Hook: 'Zyada kheechoge toh table girega'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G3-353", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Dams & rivers (matching)", "question": "Match Column I with Column II and choose the correct option : Column I (River) Column II (Dam) a. Chambal i. Salal b. Ganga ii. Bhakra Nangal c. Chenab iii. Gandhi Sagar d. Satluj iv. Tehri", "answer": "(C) a–iii, b–iv, c–i, d–ii → Chambal–Gandhi Sagar, Ganga–Tehri, Chenab–Salal, Satluj–Bhakra Nangal.", "explanation": "Jodi: Chambal–Gandhi Sagar, Ganga–Tehri, Chenab–Salal, Satluj–Bhakra Nangal. Hook: 'Chenab par Salal, Satluj par Bhakra' – ek baar yeh dono yaad ho gaye toh baaki match khud lag jaate hain.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 3}, {"key": "G3-354", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Sardar Sarovar / Narmada project", "question": "Choose the correct option of the states that have been majorly benefitted by the Sardar Sarovar Dam.", "answer": "(B) Maharashtra, Madhya Pradesh, Gujarat and Rajasthan.", "explanation": "Sardar Sarovar Dam (Narmada par) se char states ko fayda: Maharashtra, Madhya Pradesh, Gujarat aur Rajasthan. Hook: 'MA-MP-GU-RAJ' – char padosi states jinko Narmada ka paani milta hai. Gujarat sabse zyada benefit leta hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G3-355", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Water pollution & conservation", "question": "How have industrialisation and urbanisation impacted water supply ? Explain.", "answer": "They put huge pressure on water resources – over-exploiting and depleting groundwater, diverting water for energy/industry, and adding untreated effluents that pollute and increase water toxicity.", "explanation": "Jaise-jaise factories (industrialisation) aur sheher (urbanisation) badhe, paani ki maang aur pradushan dono bade. Groundwater zyada nikala gaya, aur factories ka ganda paani nadiyon ko zehrila bana raha hai. Hook: 'Zyada log + zyada factory = kam aur ganda paani'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "G3-356", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Traditional water harvesting", "question": "Describe any three ways of water conservation used in ancient India.", "answer": "Any three: sophisticated hydraulic structures – stepwells (baolis), reservoirs/lakes (e.g. Bhopal Lake), embankments and canals, dams of stone rubble – used for irrigation and storage.", "explanation": "Note: yeh bhi ancient-India water conservation wala sawaal hai. Teen tareeke: stepwells (baoli), lakes/reservoirs, aur embankments/canals. Yeh dikhata hai ki hamare purvaj engineering mein bohot aage the. Hook: 'Baoli, Lake, Canal' – teen purane water-tools.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "G3-357", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Government water schemes", "question": "Explain any three aims of Jal Jeevan Mission (JJM).", "answer": "Aims: provide regular potable piped water to every rural household (55 litres per capita per day), improve rural quality of life and ease of living, and ensure functional household tap connections.", "explanation": "Jal Jeevan Mission ka sapna: har gaon ke ghar mein nal se saaf peene ka paani (55 litre per person per day). Isse gaon ki life aur health behtar ho. Hook: 'Har Ghar Jal' – yeh slogan hi mission ka aim bata deta hai.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "G3-358", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Traditional water harvesting", "question": "Choose the correct option to fill the blank. An artificial lake built in the 11th century for water conservation is __________.", "answer": "(C) Bhopal Lake.", "explanation": "11th century mein banayi gayi artificial jheel = Bhopal Lake, jo Raja Bhoj ne banwayi thi. Yeh ancient water conservation ka best example hai. Hook: 'Bhopal Lake = Raja Bhoj ki jheel, 11th century'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G3-359", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Dams & rivers (matching)", "question": "Match Column-I with Column-II and choose the correct option : Column-I (Dam) Column-II (River) a. Sardar Sarovar i. Mahanadi b. Salal ii. Chambal c. Gandhi Sagar iii. Narmada d. Hirakud iv. Chenab", "answer": "(C) a–iii, b–iv, c–ii, d–i → Sardar Sarovar–Narmada, Salal–Chenab, Gandhi Sagar–Chambal, Hirakud–Mahanadi.", "explanation": "Jodi: Sardar Sarovar–Narmada, Salal–Chenab, Gandhi Sagar–Chambal, Hirakud–Mahanadi. Yeh wahi 4 famous jodiyan hain jo ghoom-phir ke aati hain. Hook: 'SS-Narmada, Salal-Chenab' – do pakke karo, baaki easy.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 3}, {"key": "G3-360", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Dams & rivers (matching)", "question": "Choose the correctly matched pair : I (Multi-purpose River Project) (A) Gandhi Sagar (B) Hirakud (C) Nagarjuna Sagar (D) Salal II (River) Chambal Godavari Kaveri Beas", "answer": "(A) Gandhi Sagar – Chambal (the correctly matched pair).", "explanation": "Sirf ek pair sahi hai: Gandhi Sagar–Chambal. Baaki galat hain (Hirakud–Mahanadi hota, Godavari nahi; Nagarjuna Sagar–Krishna, Kaveri nahi; Salal–Chenab, Beas nahi). Hook: 'Gandhi Sagar par Chambal' yaad rakho, baaki distractors pakad lo.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 3}, {"key": "G3-361", "chapter_code": "G3", "chapter_name": "Water Resources", "discipline": "Geography", "topic": "Water pollution & conservation", "question": "Explain any three factors responsible for water pollution.", "answer": "Any three: industrial effluents (dyes, chemicals, heavy metals, acids) from paper/textile/chemical industries, agricultural run-off (pesticides & fertilizers), and solid wastes like fly ash and phosphogypsum dumped into water bodies.", "explanation": "Paani gandagi ke teen mukhya kaaran: (1) factory ka kachra – dyes, chemicals, heavy metals; (2) kheti ka run-off – pesticide aur fertilizer; (3) solid waste jaise fly ash aur phosphogypsum. Hook: 'Factory + Farm + Fly ash' – teen F yaad rakho.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "G4-393", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "'Slash and Burn' system of agriculture comes under which type of farming?", "answer": "Primitive Subsistence Farming.", "explanation": "Slash and burn = jungle saaf karke jalao, fir kheti karo. Yeh Primitive Subsistence Farming ke andar aata hai. Hook: 'jhoom kheti' bhi isi ka naam hai, ekdum prachin/primitive tareeka.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "G4-394", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Why is productivity low in ‘Slash and Burn' system ?", "answer": "Productivity is low because farmers do not use fertilizers or other modern inputs, relying only on traditional methods and natural replenishment of soil fertility.", "explanation": "Slash and burn mein paidawar kam kyun? Kyunki na khaad, na modern inputs - sab kuch nature par chhoda hua hai. Hook: bina fertilizer ke mitti thak jaati hai, isliye output kam.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "G4-395", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Describe any two features of 'Slash and Burn' system of agriculture.", "answer": "Slash-and-burn is practised on small land patches with primitive tools, depends on monsoon and natural soil fertility, and involves shifting cultivation so nature can replenish the soil. It is known by different names in different regions.", "explanation": "Slash and burn ki do khaasiyat: chhoti zameen + purane tools, aur shifting cultivation (mitti thak jaaye toh nayi jagah). Hook: India mein iske alag-alag naam hain - jhoom, podu, etc.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "G4-396", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Identify the type of agriculture being practised by Rinjha's family and explain any two of its characteristics.", "answer": "Type: Primitive subsistence farming (slash-and-burn). Characteristics: practised on small land patches with primitive tools (hoe, dao, digging sticks) and family/community labour; depends on monsoon and natural soil fertility.", "explanation": "Rinjha ki family wali kahani = Primitive Subsistence (slash and burn) farming. Pehchaan: chhoti zameen, hoe-dao jaise tools, ghar ke log, monsoon par depend. Hook: kahani mein 'jungle saaf karke kheti' likha ho toh seedha primitive subsistence likho.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "G4-397", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Types of farming", "question": "Mrs. Monica, along with her family, clears a piece of land and grows crops. When the fertility of the soil decreases, she prepares another piece of land for agriculture. Which of the following methods of agriculture does she use ?", "answer": "(B) Slash and burn farming.", "explanation": "Monica zameen saaf karke kheti karti hai, fir fertility girne par nayi jagah chali jaati hai - yeh classic Slash and Burn farming hai. Hook: 'jagah badalna jab mitti thak jaaye' = slash and burn, option B.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G4-399", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Government reforms", "question": "The Government of India has invited some suggestions for institutional reforms in agriculture. Propose any five institutional reforms to the Government for the betterment of agriculture.", "answer": "Five institutional reforms: (1) crop insurance against calamities, (2) Grameen Banks/Cooperative Societies for low-interest loans, (3) Kisan Credit Card (KCC), (4) Personal Accident Insurance Scheme (PAIS), and (5) Minimum Support Price (MSP) with special weather bulletins.", "explanation": "Paanch institutional reforms propose karne hain: crop insurance, Grameen banks, KCC, PAIS aur MSP. Hook: yeh wahi institutional reforms hain bas 5 likhne hain. 'Insurance-Bank-KCC-PAIS-MSP' ratte maaro!", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G4-400", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Government reforms", "question": "The Government of India has invited some suggestions for technological reforms in agriculture. Propose any five technological reforms to the Government for the betterment of agriculture.", "answer": "Five technological reforms: HYV (high-yielding variety) seeds, chemical fertilizers and pesticides, modern irrigation (drip/sprinkler), farm mechanisation (tractors, harvesters), and Green/White Revolutions with soil testing and weather forecasting.", "explanation": "Technological reforms = naye tareeke aur machines. Yaad rakho: HYV seeds, khaad-dawaai, drip irrigation, tractor-machine, Green Revolution. Hook: institutional = system/paisa, technological = technology/machine - dono ko mix mat karna!", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G4-401", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Government reforms", "question": "Examine the measures taken by the government to make agriculture profitable in India.", "answer": "Measures include land reforms, crop insurance, Grameen banks/cooperatives for low-interest loans, Kisan Credit Card (KCC), Personal Accident Insurance Scheme (PAIS), special weather bulletins/agricultural media programmes, and announcement of Minimum Support Prices (MSP).", "explanation": "Agriculture ko profitable banane ke liye sarkaar ke kadam: land reforms, crop insurance, sasta loan (KCC, PAIS), weather bulletins aur MSP. Hook: yeh institutional reforms ka hi bada version hai - kisaan ki jeb bhare iss tarah.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "G4-411", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop identification", "question": "Imagine you are travelling from Delhi to Chandigarh to attend a wedding, by road in January. Which of the following crops will you notice prominently in the fields during the journey ?", "answer": "(C) Wheat - January is the Rabi season in Punjab/Haryana, where wheat is the dominant standing crop.", "explanation": "January mein Delhi se Chandigarh ke khet = lehlahaata gehu! Punjab-Haryana Rabi season mein wheat ke liye famous hain. Hook: 'January + Punjab side = Wheat', option C.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G4-414", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop identification", "question": "Identify the crop with the help of information given in the box. • This crop is a major cash crop in India. • It is cultivated mainly in the states of Karnataka and Tamil Nadu. • It is known for its aroma.", "answer": "(b) Coffee - a major cash crop grown mainly in Karnataka and Tamil Nadu, famous for its aroma.", "explanation": "Clues: cash crop + Karnataka-Tamil Nadu + khushboo (aroma) = Coffee! Hook: South India ki pahaadiyon ki coffee ki mehak yaad karo, option (b).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G4-415", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop identification", "question": "With the help of following information identify the agricultural crop from the given options: I. It requires more than 200 cm. rainfall and temperature above 25 °C. II. It is mainly used as raw material in industries. III. It is primarily a crop of the equatorial region.", "answer": "(B) Rubber - needs more than 200 cm rainfall and temperature above 25°C, used as industrial raw material, and is an equatorial-region crop.", "explanation": "Clues: 200 cm+ baarish + 25°C se zyada garmi + industry ka raw material + equatorial = Rubber! Hook: bahut baarish + garmi = rubber tree, option B.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G4-417", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop conditions and requirements", "question": "Swapna is a small farmer. Swapna wants to cultivate cotton. What kind of geographical conditions will be suitable for this ? Choose the most appropriate option.", "answer": "(B) Black soil, light rainfall, high temperature and bright sunshine - the ideal conditions for growing cotton.", "explanation": "Cotton ke liye chahiye: kaali mitti (black soil), halki baarish, garmi aur tez dhoop. Hook: 'kapaas = kaali mitti + dhoop', isliye option B. Maharashtra-Gujarat ki black soil cotton ke liye best.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G4-419", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop identification", "question": "Which among the following crop is known as ‘Golden Fibre'?", "answer": "(C) Jute - known as the 'Golden Fibre'.", "explanation": "'Golden Fibre' = Jute (paat)! Iske golden (sunehre) rang aur chamak ki wajah se yeh naam mila. Hook: 'Golden Fibre = Jute', West Bengal isme No.1. Option C.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G4-420", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop conditions and requirements", "question": "Suppose you are a farmer. You want to cultivate rice in India. Describe any three geographical conditions which will be suitable for rice cultivation in India and write the names of two leading rice producing states of India.", "answer": "Rice needs high temperature (above 25°C), high humidity and hea
