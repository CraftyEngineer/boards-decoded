vy rainfall above 100 cm (or assured irrigation), grown on level land with clayey soil that holds water. Leading rice states: West Bengal and Uttar Pradesh (also Punjab, Andhra Pradesh).", "explanation": "Rice ke liye 3 conditions: zyada garmi (25°C+), zyada nami aur 100 cm+ baarish, aur paani rokne wali chiknee mitti. Leading states: West Bengal aur UP. Hook: chawal = paani wali fasal, isliye sab kuch 'high' chahiye.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G4-422", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Crop conditions and requirements", "question": "Suppose you are a farmer. You want to cultivate tea in India. Describe any three geographical conditions which will be conducive for tea cultivation in India and write the names of two major tea-producing states of India.", "answer": "Tea needs warm, frost-free climate (20-30°C), heavy well-distributed rainfall (150-300 cm), and deep, fertile, well-drained loamy soil on hill slopes. Major tea states: Assam and West Bengal (Darjeeling); also Tamil Nadu and Kerala.", "explanation": "Tea ki 3 conditions: garam mausam, khoob aur faili-hui baarish, aur slope wali achhi nikaas-wali mitti. Major states: Assam aur West Bengal (Darjeeling). Hook: chai ka pahaad par bagaan, paani ruke na - isliye dhalaan zaroori.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G4-423", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Map work", "question": "Leading state in production of Jute", "answer": "West Bengal is the leading producer of jute in India.", "explanation": "Map par Jute ka leading state = West Bengal! Hook: 'Golden Fibre Jute = West Bengal', ganga-brahmaputra delta ki namee jute ke liye perfect. Map mein WB par tick.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["Map"], "score": 3}, {"key": "G4-424", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Map work", "question": "Name the leading state in coffee production.", "answer": "Karnataka is the leading producer of coffee in India.", "explanation": "Coffee ka leading state map par = Karnataka! Hook: Karnataka ki Coorg/Chikmagalur coffee ke liye famous. Coffee = Karnataka, map mein South India par mark karo.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Map"], "score": 3}, {"key": "G4-425", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Map work", "question": "Leading state in production of rice", "answer": "West Bengal is the leading producer of rice in India.", "explanation": "Map par Rice ka leading state = West Bengal! Hook: West Bengal namee aur baarish wala, isliye chawal mein No.1. Rice = WB, map mein east India par tick.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["Map"], "score": 3}, {"key": "G4-428", "chapter_code": "G4", "chapter_name": "Agriculture", "discipline": "Geography", "topic": "Cropping seasons", "question": "Describe the features of cropping patterns in India.", "answer": "India has three cropping seasons - Rabi (winter; Oct-Dec sown, Apr-Jun harvested: wheat, gram, mustard), Kharif (monsoon; Jun-Jul sown, Sept-Oct harvested: paddy, maize, cotton) and Zaid (short summer: watermelon, cucumber, fodder).", "explanation": "India ke cropping patterns = teen seasons! Rabi (sardi - gehu), Kharif (barsaat - paddy), Zaid (garmi - tarbooz). Hook: 'Rabi-Kharif-Zaid' ka trio yaad rakho, har season ke crops alag.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G5-444", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Energy conservation", "question": "“It would be beneficial to develop sustainable way to meet the growing energy demand in India.\" Support the statement by giving suitable arguments.", "answer": "India's energy demand is rising steadily, so a sustainable path is essential: promote energy conservation, increase renewable sources (solar, wind, geothermal), run energy-efficiency programmes, raise public awareness, use resources judiciously and adopt small saving steps like public transport and power-saving devices.", "explanation": "India ki energy ki bhookh din-ba-din badh rahi hai, par coal-petrol limited hain. Toh solution? Sustainable raasta - solar/wind badhao, energy-efficient programs chalao, logon ko aware karo, aur soch-samajh ke energy kharch karo. Public transport aur power-saving devices jaise chhote kadam bhi help karte hain.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G5-449", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Solar energy", "question": "Two statements are given below. They are Assertion (A) and Reason (R). Read both the statements and choose the correct option : Assertion (A) : India has enormous possibilities of production of solar energy. Reason (R) : Most of the land area of India falls under the cold zone.", "answer": "(C) (A) is true but (R) is false. India does have enormous solar potential, but it lies mostly in the tropical (hot) zone, not the cold zone, so the reason is wrong.", "explanation": "Trap question! Assertion sahi hai - India mein solar ka bahut scope hai. Par Reason galat - India 'cold zone' mein nahi, balki tropical (garam) zone mein aata hai, isliye toh itni dhoop milti hai! Answer: A true, R false. Reason hi ulta likha tha.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "G5-464", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Occurrence of minerals", "question": "Two statements are given below. They are Assertion (A) and Reason (R). Read both the statements and choose the correct option. Assertion (A): Certain minerals may occur as alluvial deposits in sands of valley floors and the base of hills. Reason (R) : These are usually minerals, that are not corroded by water.", "answer": "(A) Both (A) and (R) are true and (R) is the correct explanation of (A). Such alluvial 'placer deposits' (e.g., gold, platinum, tin) occur in valley sands precisely because these minerals are not corroded/dissolved by water.", "explanation": "Placer deposits wala concept! Kuch minerals (gold, platinum, tin) nadi ki ret mein jama hote hain - kyunki yeh paani se corrode nahi hote. Isi wajah se bahkar aate hain par nasht nahi hote. A true, R true, aur R hi sahi explanation. 'Paani se na ghule, isliye ret mein mile'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "G5-467", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Conservation of minerals", "question": "Suggest any two ways for the conservation of minerals.", "answer": "Two ways: (1) use minerals in a planned and sustainable manner avoiding wastage; (2) recycle metals and use scrap metals/substitutes. Improving technology to use low-grade ores economically also helps conserve minerals.", "explanation": "Minerals bachane ke do simple tareeke: pehla - planned aur sustainable tareeke se use karo (waste mat karo); doosra - metals recycle karo aur scrap dobara use karo. Iske alawa low-grade ore ko technology se kaam mein lao. Recycle karo, planned raho!", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "G5-470", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Iron ore", "question": "In which iron ore is the maximum iron content found ?", "answer": "Magnetite. It is the finest iron ore with the highest iron content (up to about 70%) and excellent magnetic properties.", "explanation": "Maximum iron kis ore mein? Magnetite! Ismein lagbhag 70% tak iron - sabse zyada. Naam mein hi 'magnet' hai, toh magnetic bhi. Yaad rakho: 'Magnetite = Maximum iron'. Dono M se shuru, link ban gaya!", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "G5-471", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Iron ore", "question": "Which is the most important industrial iron ore ?", "answer": "Hematite. Though it has slightly less iron than magnetite, it is the most important industrial iron ore because it is found in large quantities and is widely used.", "explanation": "Industry ke liye sabse important iron ore? Hematite! Iron content magnetite se thoda kam, par yeh bahut zyada matra mein milta hai isliye industries ismein hi use karti hain. Magnetite = max iron, par Hematite = industry ka favourite (zyada available).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "G5-472", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Iron ore", "question": "Mention any two states which are the leading producers of iron ore in India.", "answer": "Odisha and Chhattisgarh are leading iron-ore producing states (others include Jharkhand and Karnataka). Iron ore is a basic mineral, abundantly available with good-quality reserves, forming the backbone of industrial development.", "explanation": "Iron ore ke top producers: Odisha aur Chhattisgarh (Jharkhand, Karnataka bhi aage). Iron ore 'basic mineral' hai - khoob milta hai, quality achhi, aur industries ki reedh ki haddi. Note: id 2304 ka text source mein missing tha par yeh isi 2-mark iron-ore producers set ka hissa hai (same official answer).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "G5-473", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Coal", "question": "Read the characteristics given in the box and identify the type of coal from the option given below : • This is low grade brown coal. • The principal reserves are in Neyveli in Tamilnadu. • It is soft with high moisture content.", "answer": "(C) Lignite Coal. It is a low-grade brown coal, soft with high moisture content, with principal reserves at Neyveli, Tamil Nadu.", "explanation": "Clues padho: low grade, brown, soft, high moisture, Neyveli (Tamil Nadu) - yeh sab Lignite coal ki nishaniyaan! Lignite sabse ghatiya quality ka coal hai, geela-geela sa. Yaad rakho: 'Neyveli = Lignite ka adda'. Brown + soft + Neyveli = Lignite, pakka!", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G5-483", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Mineral producers (MCQ)", "question": "Which one of the following states is the leading producer of Manganese ?", "answer": "Keyed answer in these papers: (B) Rajasthan. (Note: by NCERT, Madhya Pradesh/Odisha lead manganese; follow the paper's official key in the exam.)", "explanation": "Iss MCQ set mein answer key (B) Rajasthan deti hai (id 2000 me galti se 'bauxite' likha hai par option-key same hai). NCERT ke hisaab se manganese mein MP/Odisha aage hain - par exam mein paper ki key follow karo. Note: yahan keyed answer (B).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G5-486", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Mineral-mine matching", "question": "Match Column I with Column II and choose the correct option : Column I (Minerals) Column II (Major Mines) a. Iron ore i. Gaya b. Mica ii. Singarauli c. Bauxite iii. Chandrapur d. Coal iv. Maikala", "answer": "(A) a-iii, b-i, c-iv, d-ii. Iron ore-Chandrapur, Mica-Gaya, Bauxite-Maikala, Coal-Singrauli.", "explanation": "Mineral ko uski mine se jodo - answer (A) a-iii, b-i, c-iv, d-ii. Yaad rakho: Iron ore-Chandrapur, Mica-Gaya (Bihar), Bauxite-Maikala range, Coal-Singrauli. Exam mein aata rehta hai!", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 3}, {"key": "G5-487", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Power plant-state matching", "question": "Match Column I with Column II and choose the correct option : Column I (Thermal Power Plant) Column II (State) a. Talcher i. Telangana b. Ramagundam ii. Odisha c. Bhusawal iii. Andhra Pradesh d. Vijayawada iv. Maharashtra", "answer": "(A) a-ii, b-i, c-iv, d-iii. Talcher-Odisha, Ramagundam-Telangana, Bhusawal-Maharashtra, Vijayawada-Andhra Pradesh.", "explanation": "Thermal power plants ko state se jodo - answer (A) a-ii, b-i, c-iv, d-iii. Yaad rakho: Talcher-Odisha, Ramagundam-Telangana, Bhusawal-Maharashtra, Vijayawada-Andhra. Location-based, map mein dekh ke yaad karo.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 3}, {"key": "G5-488", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Power plant-state matching", "question": "Match Column-I with Column-II and choose the correct option : Column-I (Atomic Power Plants) a. Kakrapara b. Rawat Bhata c. Kaiga d. Tarapur Column-II (State) i. Rajasthan ii. Karnataka iii. Maharashtra iv. Gujarat", "answer": "(C) a-iv, b-i, c-ii, d-iii. Kakrapara-Gujarat, Rawatbhata-Rajasthan, Kaiga-Karnataka, Tarapur-Maharashtra.", "explanation": "Atomic power plants ka state match - answer (C) a-iv, b-i, c-ii, d-iii. Yaad rakho: Kakrapara-Gujarat, Rawatbhata-Rajasthan, Kaiga-Karnataka, Tarapur-Maharashtra. Nuclear plants ki locations exam mein bahut poochhi jaati hain!", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 3}, {"key": "G5-489", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Mineral uses matching", "question": "Match Column-I with Column-II and choose the correct option : Column-I (Minerals) A. Copper B. Bauxite C. Mica D. Manganese Column-II (Features) (i) Used in manufacturing of steel and paints (ii) Used in electric and electronic industries (iii) Used in electric cables and utensils (iv) Used in aluminium production", "answer": "(d) Copper-(iii), Bauxite-(iv), Mica-(ii), Manganese-(i). Copper in cables/utensils, Bauxite in aluminium, Mica in electronics, Manganese in steel and paints.", "explanation": "Mineral ko uske use se jodo - answer (d) iii, iv, ii, i. Copper-cables/bartan, Bauxite-aluminium, Mica-electronics, Manganese-steel/paint. Logic: copper bijli ka conductor (cables), bauxite se aluminium - seedha link!", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 3}, {"key": "G5-490", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Conservation of energy", "question": "Study the given table and answer the question that follows : CRUDE OIL RESERVES Region/Country Reserves (2017) (Thousand Million Barrels) Number of Years Reserves will last Middle East 808 70 United States of America 50 10.5 World Average 1697 50.2 Read the following possible outcomes from the table and choose the correct option : I. If crude oil continues to be extracted at the present pace, it would be exhausted in about 50 years. II. In Middle Eastern Countries it may take longer than average of the world. III. To ensure the availability of crude oil in future, its reuse and recycle policy should be adopted. IV. In United States of America, Crude oil is likely to run out in just about 10 years.", "answer": "(D) Only I, II and IV are correct. Statement III is wrong because crude oil (a fossil fuel) cannot be reused/recycled. The table shows world reserves last ~50 years, Middle East ~70 years, USA ~10 years.", "explanation": "Table padho dhyaan se! I sahi (world ~50 saal), II sahi (Middle East 70 saal = world se zyada), IV sahi (USA sirf ~10 saal). Par III galat - crude oil ko reuse/recycle nahi kar sakte, yeh jal jaata hai! Answer (D) Only I, II and IV. Trap statement III tha.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G5-491", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Energy & environment", "question": "Explain the importance of National Thermal Power Corporation (NTPC) in India. Explain any three measures taken by NTPC to preserve the natural environment and resources.", "answer": "NTPC is a major power-generating company committed to the environment. Three measures: (1) optimum utilisation of equipment by adopting latest techniques and upgrading existing ones; (2) minimum waste generation and using ash for productive purposes; (3) ecological monitoring, reviews and online databases to control pollution.", "explanation": "NTPC India ki sabse badi power company hai jo environment ka bhi khayal rakhti hai. Teen measures: (1) latest technology se equipment ka best use; (2) kam se kam waste, ash (raakh) ka productive use; (3) ecological monitoring aur pollution control. Note: source ka official answer galti se 'air pollution by industries' wala chhap gaya tha, par yeh sahi NTPC answer hai.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G5-499", "chapter_code": "G5", "chapter_name": "Minerals and Energy Resources", "discipline": "Geography", "topic": "Map work - coal mines", "question": "Coal-mines located in Tamil Nadu", "answer": "Neyveli (lignite coal mines) is located in Tamil Nadu.", "explanation": "Tamil Nadu ka coal-mine = Neyveli (lignite, brown coal)! Yaad rakho: 'Neyveli = Tamil Nadu ka lignite'. South India mein coal kam hai par Neyveli ka lignite famous hai. Map pe Tamil Nadu mein dot.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["Map"], "score": 3}, {"key": "G6-516", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Cotton textile industry", "question": "Study the given flow chart and answer the question that follows : Fibre Production -> Spinning -> Weaving knitting -> Dyeing and Finishing -> Garment Manufacturing Raw Fibre -> Yarns -> Fabric -> Garments Explain the added value product in the textile industry on the bases of above flowchart.", "answer": "Value addition in textiles: raw fibre is spun into yarn, yarn is woven/knitted into fabric, fabric is dyed and finished, and finally stitched into garments — at each stage value is added, so the final garment is worth far more than the raw fibre.", "explanation": "Textile mein value kaise badhti hai? Fibre -> yarn -> fabric -> garment. Har step pe cheez mehngi hoti jaati hai — kachcha cotton sasta, banı hui shirt mehngi. Yahi 'value addition' hai. Flowchart ke har arrow ko ek line mein explain kar do.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G6-518", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Iron & Steel industry", "question": "Study the given flowchart and answer the question that follows : Transport of raw material to plant -> Blast Furnace Melted -> Pig Iron -> Steel Making -> Shaping Metal Explain the steel manufacturing process on the bases of the above flowchart.", "answer": "Steel making: raw materials (iron ore, coke, limestone) are transported to the plant and melted in a blast furnace to give molten pig iron; pig iron is refined in the steel-making stage to remove impurities, then the metal is shaped (rolled/cast) into finished steel products.", "explanation": "Steel banne ka order yaad rakho: raw material -> blast furnace (melt) -> pig iron -> steel making -> shaping. Pehle ore-coke-limestone pighlate hain, pig iron banta hai, fir saaf karke steel, fir shape. Flowchart question mein har step ko ek line mein samjha do.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G6-520", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Jute industry", "question": "Assertion (A) : Most of the jute industry in India is located in a narrow belt along the banks of Hugli river. Reason (R) : India is the second largest exporter of jute.", "answer": "(B) Both (A) and (R) are true, but (R) is not the correct explanation of (A). The Hugli-belt location is due to raw material, water and port facilities, not because India is the second-largest jute exporter.", "explanation": "Dono sahi hain par jute Hugli ke kinare isliye nahi hai ki India 2nd largest exporter hai — woh to raw material aur port ki wajah se hai. Isliye Reason, Assertion ko explain nahi karta. Answer (B). (Bangladesh sabse bada jute exporter, India doosra.)", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "G6-527", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Air pollution", "question": "Explain any three factors responsible for air pollution.", "answer": "Air pollution is caused by a high proportion of undesirable gases such as sulphur dioxide and carbon monoxide, airborne particulate matter (dust, smoke, mist), and smoke emitted by factories (chemical, paper, brick kilns) and the burning of fossil fuels.", "explanation": "Air pollution ke 3 main cause: (1) zehrili gases — SO2, CO, (2) particulate matter — dhool-dhuआn, (3) factories aur fossil fuel jalne se nikla smoke. Memory hook: 'Gas, dust, garam factory smoke'. Teen point, teen marks.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "G6-529", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Thermal pollution", "question": "How do industries increase thermal pollution ? Suggest any three measures to reduce thermal pollution.", "answer": "Thermal pollution occurs when factories and thermal plants discharge hot water and untreated waste into rivers/ponds, raising water temperature and harming aquatic life. Measures: cool the hot water before discharge, reuse/recycle it, and treat effluents before releasing them.", "explanation": "Thermal pollution matlab garmi se paani ka pollution — factory aur thermal plant garam paani nadi mein chod dete hain, jisse machhliyan mar jaati hain. Bachao: paani ko thanda karke chodo, reuse karo, treat karo. Memory hook: garam paani = thermal pollution.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G6-534", "chapter_code": "G6", "chapter_name": "Manufacturing Industries", "discipline": "Geography", "topic": "Map work - Industry locations", "question": "Iron and Steel Plant located in Jharkhand", "answer": "Jamshedpur (TISCO) — an Iron and Steel Plant located in Jharkhand. (Bokaro is another steel plant in Jharkhand.)", "explanation": "Jharkhand ka iron-steel plant = Jamshedpur (TISCO), ya Bokaro. Map mein east India (Jharkhand) mein point karo. Yaad rakho: 'Tata ka steel = Jamshedpur, Jharkhand'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["Map"], "score": 3}, {"key": "G7-539", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Road Transport - Types", "question": "Explain the role of different types of roads in the economic development of India.", "answer": "Different roads aid development at different levels: National Highways link major cities/states, State Highways connect state capitals to districts, district and rural roads link villages to markets, and Border/Golden Quadrilateral roads boost trade and strategic movement.", "explanation": "Sadkon ke alag-alag types alag kaam karti hain - National Highway badi cities jodti hai, State Highway zile, aur village roads gaon ko mandi se. Sab milke economy ko jodti hain. Hook: 'NH > SH > district > village' - upar se neeche ka ladder.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G7-542", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Railways", "question": "Explain the importance of railways as the principal mode of transportation for freight and passengers in India. Explain the statement.", "answer": "Railways are India's principal mode for both freight and passengers: they transport bulky goods over long distances cheaply, carry millions of passengers daily, and support trade, industry, tourism and national integration.", "explanation": "Freight matlab maal aur passenger matlab log - dono mein railway number one. Bhaari saaman ho ya lambi yatra, rail sabse economical. Hook: 'freight + passenger = rail ka double role.'", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G7-558", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Map work - Karnataka Port", "question": "Major sea port located in Karnataka", "answer": "The major sea port in Karnataka is New Mangalore, on the west coast.", "explanation": "Karnataka ka major sea port = New Mangalore, West coast par. Yeh iron-ore, coffee aur petroleum products handle karta hai. Hook: 'Mangalore in Karnataka' - West coast ka southern port.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["Map"], "score": 3}, {"key": "G7-565", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Communication - Assertion-Reason", "question": "Two Statements-I and II are given below. Read both the statements and choose the correct option. Statement-I : In recent times technology in the areas of computer and internet has been changing rapidly. Statement-II: Internet allows us to send instant electronic mail (e-mail) and talk (voice-mail) across the world at negligible costs.", "answer": "Option (D): Both Statement-I and II are true and II is the correct explanation of I.", "explanation": "Dono baatein sahi hain - computer/internet tezi se badal raha hai (I), aur internet hi instant e-mail/voice-mail sasta karta hai (II), to II asal mein I ko explain karta hai. Hook: 'reason internet hi technology change ki wajah hai' - isliye option D.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "G7-567", "chapter_code": "G7", "chapter_name": "Lifelines of National Economy", "discipline": "Geography", "topic": "Unidentified (truncated stem)", "question": "Justify the statement.", "answer": "Question stem is truncated in the source ('Justify the statement.') with no statement given, so the specific point cannot be determined. It is a 5-mark LA (q_no 31, 2025) that fits this chapter's Transport/Trade justify-type questions.", "explanation": "Yeh question adha kata hua hai - sirf 'Justify the statement' likha hai, statement gayab. Is chapter mein aise justify questions transport ki importance ya roadways/railways par hote hain, to un par focus rakho.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "H1-583", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Revolutions of 1830 & 1848", "question": "Analyse the causes of the revolt of 1830 in Europe.", "answer": "The 1830 revolts were caused by resentment against the conservative order of 1815, the spread of liberal-nationalist ideas among the educated middle class, demand for constitutions and an end to autocracy, and economic distress. In France the July Revolution (1830) overthrew the Bourbon king and sparked uprisings elsewhere, including Belgium's break from the Netherlands.", "explanation": "1830 ke revolts ki wajah - 1815 ke conservative raaj se naraazgi, middle class mein liberal-nationalist ideas, aur economic pareshani. France mein July Revolution (1830) ne Bourbon raja ko utaar diya, aur isse Belgium jaisi jagah bhi uprisings hue. Hook: 1830 = liberals ka pehla bada dhakka conservatism ko.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "H1-604", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Unification of Italy", "question": "Which one of the following regions became a part of unified Italy in 1866 ?", "answer": "(B) Venetia. Venetia was added to unified Italy in 1866 (taken from Austria); Rome was added in 1870, completing unification.", "explanation": "Italy mein Venetia 1866 mein juda (Austria se cheen kar), aur Rome 1870 mein - tab Italy poori bani. Toh 1866 ka answer Venetia. Hook: 1866 = Venetia, 1870 = Rome (last pieces).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "H1-605", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Concept of nation & state", "question": "How is the idea of 'nation' different from the idea of 'state' ? Explain by giving two arguments.", "answer": "A 'state' is a political/legal unit with a defined territory, government and sovereignty. A 'nation' is a community of people who feel united by a shared sense of history, culture, language and identity. A state can exist without being a single nation, and a nation may aspire to its own state (a nation-state).", "explanation": "'State' matlab ek political-legal entity - zameen, sarkar aur sovereignty ke saath. 'Nation' matlab logon ka woh group jo apni common history, culture aur bhaasha se 'hum ek hain' feel karta hai. Hook: State = paperwork/sarkar, Nation = dil ka connection.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "H1-606", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Romanticism & culture", "question": "How did romanticism help in the development of nationalist feeling in Europe in the 19th century? Explain in the context of romanticism.", "answer": "Romanticism fostered nationalism by glorifying emotions, folk culture and the common people's spirit (volksgeist). Romantic artists, poets and collectors of folk songs and tales (e.g. Herder, the Grimm brothers) used vernacular language and folklore to build a shared cultural heritage and national consciousness, especially among people without their own state.", "explanation": "Romanticism ne nationalism ko emotions aur folk-culture se hawa di - poets, artists aur folk-song collectors (jaise Herder, Grimm Brothers) ne local bhasha aur kahaniyon se 'hum ek culture hain' wali feeling jagaayi. Hook: gaane-kahaniyaan + maatra-bhasha = nationalism ka emotional fuel.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "H1-607", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Making of Britain", "question": "Which of the following countries was not a part of the United Kingdom?", "answer": "(B) Ireland (as marked in the answer key among the given options). England and Scotland, joined by the Act of Union (1707), formed the core 'United Kingdom of Great Britain'; Ireland was incorporated only later (1801).", "explanation": "Sawaal ka core idea: 'Great Britain' to England + Scotland (1707 Act of Union) se bana, jabki Ireland baad mein aur alag tareeke se juda - isliye answer-key mein Ireland diya gaya hai. Hook: 1707 wala core = England + Scotland.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "H1-608", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Chronology", "question": "Arrange the following events in chronological order and choose the correct option : I. Defeat of Napoleon in the battle of Leipzig II. Beginning of struggle for Greek independence III. Formation of customs union Zollverein IV. Signing of Treaty of Vienna", "answer": "Intended order: Defeat of Napoleon at Leipzig (1813) -> Treaty of Vienna (1815) -> Greek independence struggle (1821) -> Zollverein (1834), i.e. I, IV, II, III. (CBSE awarded 1 mark to all who attempted, as no listed option was correct.)", "explanation": "Sahi sequence: Leipzig (1813) -> Vienna Treaty (1815) -> Greek struggle (1821) -> Zollverein (1834). Options galat the isliye CBSE ne sabko 1 mark de diya. Hook: Leipzig pehle, Zollverein last.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "H1-609", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Impact of nationalism", "question": "Explain the impact of nationalism on Europe in the 19th century.", "answer": "In the 19th century nationalism redrew Europe's map - it led to the unification of Germany and Italy, the break-up of multinational empires (Ottoman, later Austro-Hungarian), independence movements (Greece), and a strong sense of collective identity. By its close, aggressive nationalism allied with imperialism, fuelling rivalry that culminated in the First World War.", "explanation": "19th century mein nationalism ne Europe ka naksha hi badal diya - Germany aur Italy ek hue, Greece azaad hua, bade empires tootne lage. Par baad mein yahi nationalism aggressive ban kar imperialism se mil gaya aur World War I tak le gaya. Hook: nationalism = pehle 'jodne' wali, baad mein 'ladane' wali force.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "H1-610", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Visual culture & allegory", "question": "What does the image of 'Marianne' represent ?", "answer": "These are symbols used in national allegories. Marianne is the female allegory of the French nation (Liberty/Republic); a broken chain symbolises becoming free; and an olive branch around the sword signifies willingness to make peace. (The answer key marks option (C) 'Willingness to make peace'.)", "explanation": "In symbols ko alag-alag samjho: Marianne = France ki nation-symbol (Liberty), tooti chain = azaadi, aur talwaar ke around olive branch = shanti ki khwahish. Yahi reason hai option (C). Hook: olive = peace, chain-toot = freedom.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "H1-612", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Liberal nationalism", "question": "Mention any one political demand of the liberals.", "answer": "One political demand of the liberals was the creation of nation-states with government based on the consent of the people - i.e. an end to autocracy, a written constitution and a representative parliament.", "explanation": "Liberals ki ek political demand thi - nation-states banao jahan sarkar janta ki marzi (consent) se chale, autocracy khatam ho aur constitution + parliament ho. Hook: liberals = 'janta ki sarkar, raja ki nahi'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "H1-613", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Liberal nationalism", "question": "Mention the main cause for the rise of secret societies in European States.", "answer": "After 1815 the conservative monarchical order (set up by the Congress of Vienna) repressed liberal-nationalists. Fearing this repression they went underground and formed secret societies to train revolutionaries and spread the idea of nation-states.", "explanation": "1815 ke baad conservative raja-raaj ne liberal-nationalists ko dabaaya, toh wo darr ke maare underground chale gaye aur secret societies banaayi - taaki revolutionaries train karein aur nation-state ka idea chupke failaayein. Hook: dabaav = secret clubs (jaise Mazzini ki Young Italy).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "H1-614", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Liberal nationalism", "question": "Analyse the reasons for many liberal-nationalists going underground after 1815.", "answer": "Many liberal-nationalists went underground after 1815 because the conservative regimes set up by the Congress of Vienna were autocratic and repressive - they did not tolerate dissent and used censorship. Fearing persecution, they formed secret societies to continue their struggle for nation-states.", "explanation": "1815 ke baad ki conservative sarkaarein autocratic thi aur dissent bilkul bardaasht nahi karti thi - censorship aur repression chalti thi. Isliye liberal-nationalists pakde jaane ke darr se underground ho gaye aur secret societies banaayi. Hook: repression ke kaaran open se chhup-chhup kar kaam.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "H1-615", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Chronology", "question": "Arrange the following events in the chronological order and choose the correct option : I. The Treaty of Vienna II. The beginning of Napoleonic wars III. Proclamation of the Prussian King William I as German Emperor IV. Proclamation of Victor Emmanuel II as the King of Italy", "answer": "(c) II, I, IV, III - Beginning of Napoleonic Wars -> Treaty of Vienna (1815) -> Victor Emmanuel II proclaimed King of Italy (1861) -> William I proclaimed German Emperor (1871).", "explanation": "Order: pehle Napoleonic wars, phir Vienna Treaty (1815), uske baad Victor Emmanuel II Italy ka raja (1861), aur aakhir William I German Emperor (1871). Hook: Napoleon -> Vienna -> Italy ka raja -> Germany ka emperor (II,I,IV,III).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "H1-616", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Napoleonic Code & reforms", "question": "Read the following facts related to ‘Napoleonic Code' carefully and choose the correct option : I. Abolition of privileges based on birth. II. Establishing equality before the law. III. Securing property rights. IV. Imposing manorial dues on the peasants.", "answer": "(A) Only I, II and III are correct. The Napoleonic Code abolished privileges based on birth, established equality before law and secured the right to property; it did NOT impose manorial dues - in fact it freed peasants from feudal dues and serfdom.", "explanation": "Napoleonic Code ne teen achhi cheezein ki - janm-based privileges khatam, sab barabar kanoon ke saamne, property right pakka (I,II,III sahi). Magar IV galat - Code ne manorial dues 'thopi nahi', balki kisanon ko inse azaad kiya! Hook: Code = kisaanon ka dost, dushman nahi.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "H1-617", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "French Revolution & nation-making", "question": "\"The political and constitutional changes that came in the wake of the French Revolution led to the transfer of sovereignty from monarchy to a body of French Citizens.\" Explain the statement.", "answer": "The French Revolution shifted sovereignty from the king to the people: it proclaimed that the nation and its laws rested on the will of the people (le citoyen). The Estates General was renamed the National Assembly elected by citizens, a constitution limited royal power, and ideas like la patrie and equal citizenship made the people - not the monarch - the source of authority.", "explanation": "French Revolution ke baad sovereignty (sabse badi power) raja ke haath se nikalkar 'citizens' ke paas aa gayi - kaha gaya ki kanoon janta ki marzi se chalega (le citoyen). Estates General ko National Assembly bana diya jise log chunte the. Hook: 'King is boss' se 'We the citizens are boss'.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 3}, {"key": "H1-618", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Liberal nationalism", "question": "\"During 19th century, in the economic sphere, liberalisation stood for the freedom of markets and the abolition of state-imposed restrictions on the movement of goods and capital\". Explain the statement.", "answer": "Economically, liberalism stood for free markets - freedom for goods, capital and labour to move without state interference. It demanded abolition of the many state-imposed tariffs, customs duties and restrictions; the Zollverein (1834), which removed tariff barriers among German states, is a concrete example of this economic liberalism.", "explanation": "Economic liberalism ka matlab - market ko azaad chhodo, goods aur capital bina rok-tok ghoomein, aur state ki tariff/customs jaisi rukaawatein hata do. German states ka Zollverein (1834) iska perfect example hai. Hook: liberalism = 'free trade, no barriers'.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 3}, {"key": "H1-619", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Unification of Italy", "question": "Arrange the following regions of Italy in the order of their inclusion in the Unified Italy and choose the correct option : I. Venetia II. Savoy Sardinia III. Sicilies", "answer": "(B) II, III, I - Sardinia (Savoy/Sardinia-Piedmont, the core) -> Sicilies (the Two Sicilies, 1860, via Garibaldi) -> Venetia (1866).", "explanation": "Italy ke tukde jude is order mein: pehle Sardinia (Savoy) jo core tha, phir Garibaldi ne Sicilies (1860) jeeta, aur phir Venetia (1866) aaya. Hook: Sardinia -> Sicily -> Venetia (II,III,I).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "H1-620", "chapter_code": "H1", "chapter_name": "The Rise of Nationalism in Europe", "discipline": "History", "topic": "Conservatism after 1815", "question": "Explain the functioning of conservative regimes established in France in 1815.", "answer": "The conservative regimes set up in 1815 were autocratic and intolerant of dissent. They restored traditional institutions (monarchy, Church), imposed strict censorship to control ideas of liberty, and tried to curb any activity questioning their legitimacy - though the memory of the French Revolution kept inspiring liberals to resist.", "explanation": "1815 mein bani conservative sarkaarein autocratic thi - monarchy aur Church wapas laaya, dissent bardaasht nahi kiya, aur liberty ke ideas rokne ke liye sakht censorship lagaayi. Par French Revolution ki yaad liberals ko ladne ke liye prerit karti rahi. Hook: censorship + monarchy = conservative regime ka funda.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "H2-640", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Non-Cooperation Movement", "question": "Explain with examples the significance of the Non-cooperation Movement in the Indian national movement.", "answer": "The Non-Cooperation Movement (1920-22) was India's first mass anti-colonial movement: people surrendered titles, boycotted schools, courts, councils and foreign goods, and promoted khadi. Combined with the Khilafat cause, it united Hindus and Muslims and brought peasants, tribals, workers and students into the freedom struggle.", "explanation": "Non-Cooperation Movement India ka pehla bada mass movement tha - logon ne titles waapas kiye, school-court-council-videshi maal ka boycott kiya aur khadi apnaayi. Khilafat ke saath milkar Hindu-Muslim ekta bani. Hook: 'Na padhenge unke school mein, na khareedenge unka maal' - poora desh 'No' bola angrezon ko.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 3}, {"key": "H2-646", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Non-Cooperation Movement", "question": "Why did the Non-Cooperation Movement start slowing down in the cities? Analyse three causes.", "answer": "In cities the movement slowed because khadi cloth was costlier than mill cloth so poor could not sustain the boycott; British institutions (schools, courts) had no cheap Indian alternatives, so students and lawyers drifted back; and the boycott of foreign goods hurt Indian traders too.", "explanation": "Sheher mein movement dheema isliye pada - khadi mehngi thi (gareeb afford nahi kar paaye), bachchon ke liye Indian school nahi the to wapas angrezi school gaye, aur vakeel bhi court lautay. Hook: 'Khadi mehngi, school nahi, vakeel wapas' - teen reasons set.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "H2-647", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Non-Cooperation Movement", "question": "Why did Mahatma Gandhi decide to withdraw the Non-Cooperation Movement ? Analyse any three reasons.", "answer": "Gandhi withdrew the NCM in February 1922 after the Chauri Chaura incident (a mob burned a police station), as the movement was turning violent. He also felt satyagrahis needed better training for non-violent mass struggle, and some Congress leaders wanted to contest council elections.", "explanation": "Gandhi ji ne NCM kyun rok diya? Chauri Chaura mein bheed ne police station jala diya - movement violent ho gaya, jo Gandhi ji ke ahinsa ke usool ke khilaaf tha. Hook: 'Chauri Chaura ki aag = movement par brake'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "H2-649", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Growth of nationalism (general)", "question": "Explain the role of anti-colonial movements in the development of nationalism.", "answer": "Anti-colonial movements united people of different classes and regions against a common oppressor - the British. Shared experience of repression and humiliation created a sense of being one nation, so the freedom struggle itself nurtured and strengthened Indian nationalism.", "explanation": "Anti-colonial andolan ne alag-alag log ek common dushman (angrez) ke khilaaf joda. Jab sab milke daman jhelte aur ladte hain, to 'hum ek desh hain' wali bhaavna majboot hoti hai. Hook: 'Common dushman = ekta ka glue'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "H2-650", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Different meanings of Swaraj (workers, peasants, tribals)", "question": "Explain the statement in the context of Non-Cooperation Movement.", "answer": "For tribal peasants Swaraj meant freedom from colonial forest laws and forced labour (begar). In the Gudem Hills, Alluri Sitaram Raju - inspired by Gandhi but believing force was needed - led a militant guerrilla revolt against the British, showing how different groups read Swaraj in their own way.", "explanation": "Aadivaasi kisaano ke liye Swaraj = jungle ke kanoon aur begar se aazaadi. Gudem hills mein Alluri Sitaram Raju ne (Gandhi se prerit par hathiyaar mein vishwaas rakhte hue) guerrilla bagaawat ki. Hook: 'Har group ka apna Swaraj - kisi ke liye jungle, kisi ke liye gate'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "H2-651", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Civil Disobedience Movement - social groups", "question": "Explain the contribution of women in the context of the national movement.", "answer": "Women took part in protest marches, made and sold salt, picketed foreign-cloth and liquor shops, and went to jail. They came largely from high-caste urban and rich peasant families and regarded national service as a sacred duty, becoming a visible force in the freedom struggle.", "explanation": "National movement mein auratein protest marches mein chalin, namak banaya-becha, dukaano par picketing ki aur jail gayin. Inke liye ye 'pavitra kartavya' tha. Hook: 'Ghar se bahar, sadak par - desh-seva ka irada pakka'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "H2-652", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Civil Disobedience Movement - later phase", "question": "Analyse the impacts of Gandhi-Irwin pact on the Indian freedom struggle.", "answer": "By the Gandhi-Irwin Pact (March 1931) Gandhi agreed to suspend the Civil Disobedience Movement and attend the Second Round Table Conference, while the government agreed to release political prisoners. It gave Congress recognition as a key negotiating party, though the talks in London later failed.", "explanation": "Gandhi-Irwin Pact (1931) ek deal thi - Gandhi ji ne Civil Disobedience rok di aur Second Round Table Conference jaane ko maan gaye, badle mein sarkaar ne political prisoners chhode. Congress ko bada negotiator maana gaya. Hook: 'Andolan pause, kaidi release, London ki baat' - ye teen yaad rakho.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "H2-653", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Different meanings of Swaraj (workers, peasants, tribals)", "question": "Analyse the role of Alluri Sitaram Raju in the Indian National Movement.", "answer": "Alluri Sitaram Raju led the Gudem (Rampa) tribal rebellion in the Andhra hills. Inspired by Gandhi's NCM he urged people to wear khadi and give up drinking, but believed India could be freed only by force - leading guerrilla attacks on the British until he was captured and executed in 1924.", "explanation": "Alluri Sitaram Raju ne Gudem hills mein aadivaasiyon ka netritva kiya. Gandhi se prerit hokar khadi aur sharab-tyaag ki baat ki, par maante the ki azaadi sirf force se milegi - to guerrilla attacks kiye. Hook: 'Khadi bhi, bandook bhi' - mixed style ka tribal hero.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "H2-654", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Civil Disobedience Movement - later phase", "question": "How did the colonial government suppress the 'Civil Disobedience Movement'? Explain.", "answer": "The colonial government suppressed the CDM brutally: it arrested Congress leaders including Gandhi and Abdul Ghaffar Khan, banned the Congress, attacked peaceful satyagrahis (lathi-charge), fired on crowds, and jailed about 100,000 people to crush the movement.", "explanation": "Angrezon ne CDM ko kuchalne ke liye sakhti ki - Gandhi aur leaders ko jail mein daala, Congress ko ban kiya, shanti se baithe satyagrahiyon par lathicharge aur goli chalayi, aur lakhon ko jail bheja. Hook: 'Giraftari, ban, lathi, goli' - daman ke 4 hathiyaar.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "H2-655", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Jallianwala Bagh & its aftermath", "question": "How did Indians react to the Jallianwala Bagh massacre ? Explain.", "answer": "After the Jallianwala Bagh massacre (13 April 1919), people across north India reacted with strikes (hartals), clashes with police and attacks on government buildings. The widespread anger and martial-law brutality deepened anti-British feeling and pushed Gandhi towards the Non-Cooperation Movement.", "explanation": "Jallianwala Bagh ke baad (13 April 1919) poore north India mein gussa phut pada - hartalein, police se jhadap, sarkaari building par hamle. Is dard ne logon ko aur bhadkaaya aur Non-Cooperation Movement ki neev rakhi. Hook: 'Bagh ka khoon = aazaadi ki aag'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "H2-656", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Swaraj (case-based source)", "question": "Why was Swaraj considered as an inalienable right of the India ?", "answer": "Swaraj (self-rule) was seen as an inalienable right because it was essential for every Indian's freedom, dignity and full development - letting people enjoy the fruits of their labour and the necessities of life, which colonial rule denied.", "explanation": "Swaraj ko 'inalienable right' (jo cheen nahi sakte) isliye kaha kyunki har Indian ke vikaas aur azaadi ke liye apna raaj zaroori tha - apni mehnat ka phal aur zaroorat ki cheezein bhogne ka haq. Hook: 'Apna raaj = apni mehnat ka phal'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "H2-657", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Swaraj (case-based source)", "question": "Which type of government is supported in the source ?", "answer": "The source supports a democratic and independent government - one chosen by and answerable to the Indian people, rather than foreign colonial rule.", "explanation": "Source mein democratic aur independent sarkar ki baat hai - matlab janta dwaara chuni hui apni sarkaar, na ki bahar se thopi gayi angrezi hukoomat. Hook: 'Apni janta, apni sarkaar = democracy'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "H2-658", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Swaraj (case-based source)", "question": "Explain any two effects of British rule in India.", "answer": "British rule deprived Indians of their freedom and exploited the masses; it ruined India economically, politically, culturally and spiritually - draining wealth, destroying handicrafts and leaving people poor and powerless.", "explanation": "Angrezi raaj ne do bade nuksan kiye - azaadi cheen li aur janta ka shoshan kiya; India ko economically, politically, culturally har tarah se barbaad kiya. Hook: 'Aazaadi gayi, daulat gayi' - British rule ki do maar.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "H2-674", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Caste, leaders & MCQs", "question": "Which among the following newspapers is related to Bal Gangadhar Tilak ?", "answer": "(D) Kesari - the Marathi newspaper started by Bal Gangadhar Tilak (he also ran the English paper 'Mahratta').", "explanation": "Bal Gangadhar Tilak ka Marathi akhbaar tha 'Kesari' (English mein 'Mahratta'). Answer: (D) Kesari. Hook: 'Tilak ka Kesari = sher ki dahaad'.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "H2-675", "chapter_code": "H2", "chapter_name": "Nationalism in India", "discipline": "History", "topic": "Caste, leaders & MCQs", "question": "Look at the given picture and identify the name of the painter of this painting from the following options :", "answer": "(b) Abanindranath Tagore - he painted the famous image of Bharat Mata (an ascetic, calm and spiritual figure).", "explanation": "Famous 'Bharat Mata' wali painting Abanindranath Tagore ne banayi thi - shaant, aध्यa  "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "H5-768", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Colonial control / censorship of the press", "question": "Why did the colonial administration keep an eye on books and newspapers ?", "answer": "Because many books and newspapers criticised British misrule, encouraged nationalist activity and fostered unity among Indians—so the government wanted to suppress print and control the press.", "explanation": "Angrez isliye books-newspapers par nazar rakhte the kyunki ye British raj ki burai karte, nationalism badhate aur Indians ko jodte the. Hook: print ne ekta jagaayi, isliye sarkar dar gayi.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "H5-769", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print Revolution in Europe", "question": "Assume you are doing research on 15th century print culture. Which of the following would be the most significant advantage for your research ?", "answer": "(D) Increased speed and accuracy of print. The 15th-century press allowed faster, more accurate reproduction of texts.", "explanation": "15th century print ka sabse bada faayda = tezi aur sahi-sahi (accuracy) chhapai. Pehle haath se galtiyan hoti thi, machine se sab same aur fast. Hook: speed + accuracy = print ka power.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "H5-770", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print and the French Revolution", "question": "What impact did the ideas of Enlightenment thinkers have on society ?", "answer": "Enlightenment thinkers gave critical commentary on tradition, superstition and despotism, and advocated reason and rationality—eroding the legitimacy of the old social order by challenging Church authority and state power.", "explanation": "Enlightenment thinkers ne andhvishwas aur raja ke zulm par sawaal uthaye aur 'reason' (tark) ko aage rakha. Isse purana order kamzor pad gaya. Hook: 'tark bनाम parampara'—Enlightenment ka naara.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "H5-771", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print and the French Revolution", "question": "How did print culture affect religion in France ?", "answer": "Through print, Enlightenment writers attacked the sacred authority of the Church and inspired people to view the world with questioning, critical and rational eyes, challenging religious dogma.", "explanation": "Print ke zariye Enlightenment lekhakon ne Church ki pavitra satta par chot ki aur logon ko sawaal poochhna sikhaya. Hook: print = Church ki authority ko challenge.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "H5-772", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Print and the French Revolution", "question": "How did print culture contribute to the social revolution in France ?", "answer": "Print created a new culture of dialogue and debate, making people re-evaluate values and institutions through reason; awareness of reason's power led to questioning old beliefs and the emergence of new ideas of social revolution.", "explanation": "Print ne bahas aur charcha ka mahaul banaya, jisse log purani values par sawaal uthane lage—yahi social revolution ki neev bana. Hook: 'debate culture' ne revolution ka raasta khola.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "H5-773", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", n World", "discipline": "History", "topic": "Print and new forms of writing", "question": "How did the printing press contribute to the emergence of new genres of writing in the 18th century ? Explain.", "answer": "Cheap print created a wide reading public, encouraging new genres like the novel, lyric poetry, essays and periodicals/newspapers that catered to ordinary readers' tastes and everyday experiences.", "explanation": "Print saste hone se naye padhne wale aaye, aur unke liye naye 'genres' bane—novel, essays, newspapers. Hook: nayi public = naye style ki writing.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "H5-776", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Authors and their books", "question": "Which among the following newspapers is related to Bal Gangadhar Tilak ?", "answer": "(D) Kesari. Bal Gangadhar Tilak edited the Marathi newspaper Kesari.", "explanation": "Tilak ka newspaper tha Kesari (Marathi). Hook: Tilak = Kesari (sher) = garjti nationalist awaaz.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "H5-777", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Gutenberg and the printing press", "question": "Analyse the contribution of Johann Gutenberg in the development of the printing press.", "answer": "Gutenberg adapted goldsmith skills, lead moulds and the olive/wine press to invent and perfect the printing press; his first printed book was the Bible, starting the Print Revolution and the boom in book production.", "explanation": "Gutenberg ne goldsmith ka hunar aur olive-press ka idea jodkar printing press banaya, aur pehli Bible chhapi—isi se Print Revolution shuru hua. Hook: Gutenberg = jugaad ka baap (purani cheezein jod ke press banayi).", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, p sakti thi, isliye Raja Ravi Varma jaise painters mass ke liye images bana paaye. Hook: print = ek image ki hazaar copies.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "H5-781", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Visual culture in India", "question": "How did Raja Ravi Varma contribute to the mass circulation of art in India?", "answer": "Raja Ravi Varma's press produced innumerable mythological paintings as cheap prints and calendars, making art available even to the poor to decorate their homes.", "explanation": "Raja Ravi Varma ne apni press se saste mythological prints aur calendars banaye, jo gareebon ke ghar tak pahunche. Hook: Ravi Varma = bhagwan ki tasveerein har ghar mein.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "H5-782", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Visual culture in India", "question": "How did visual culture shape the memory of the 19th century social landscape ? Explain.", "answer": "Caricatures and cartoons in journals commented on social and political issues—ridiculing Indians' fascination with Western ways, expressing fear of social change, while nationalist cartoons criticised imperial rule.", "explanation": "19th century mein cartoons aur caricatures ne samaj aur rajneeti par chot ki—kabhi Western nakal ka mazaak, kabhi imperial raj par taana. Hook: cartoon = halke-fulke andaaz mein gehri baat.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "H5-783", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Gutenberg and the printing press", "question": "Mention the contribution of Gutenberg in the field of printing.", "answer": "Johann Gutenberg invented the first mechanical printing press in the 1430s, shifting from hand printing to mechanical printing and initiating the Print Revolution.", "explanation": "Gutenberg ne 1430s mein pehla mechanical printing press banaya—haath ki chhapai se machine ki chhapai ka daur shuru. Hook: 1430s + Gutenberg = Print Revolution ka jhanda.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "H5-784", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Manuscripts and illumination", "question": "How were the books borders painted and illuminated ?", "answer": "The borders of books were carefully designed, painted and illuminated by hand by artists (Gutenberg printed text in black and left spaces for hand-colouring).", "explanation": "Books ke borders haath se artists design, paint aur illuminate karte the. Gutenberg kaala text chhapta tha aur rang bharne ke liye jagah chhod deta tha. Hook: machine ne text di, haath ne rang.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "H5-785", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Manuscripts and illumination", "question": "Describe any two benefits of colouring in the letters.", "answer": "Colouring added aesthetic appeal to the page and highlighted holy words to emphasise their significance; Gutenberg left spaces in his black print for colour to be added by hand.", "explanation": "Letters mein rang bharne ke do faayde: page sundar dikhta tha aur pavitra shabd alag se ubhar kar dikhte the. Hook: rang = khoobsurati + zaroori shabdon par spotlight.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "H5-786", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Growth of the press in India", "question": "Identify the appropriate reason for the slow growth of the English Language Press during the 18th century from the following options :", "answer": "(C) Increase in the demand for the regional/vernacular press in the market, which slowed the growth of the English-language press.", "explanation": "18th century mein English press dheere isliye badhi kyunki logon ne apni regional (vernacular) bhasha ke akhbaar zyada maange. Hook: apni bhasha apnapan—isliye regional press aage.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "H5-787", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Changes in Indian printing (19th c.)", "question": "Analyse the changes in Indian printing by the end of the 19th century.", "answer": "By the late 19th century India saw cheap printed books, more vernacular newspapers and journals, a new visual culture (Raja Ravi Varma prints, cheap calendars), women's and reform writings, and print reaching the poor—replacing the old expensive manuscript tradition.", "explanation": "19th century ke ant tak India mein saste books, vernacular newspapers, Ravi Varma ke prints aur reform writings chha gaye—mehngi manuscript wali duniya peeche chhoot gayi. Hook: print = gyaan ka loktantra, sabke liye.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 3}, {"key": "H5-789", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Authors and their books", "question": "Match the Column-I with Column-II and choose the correct option from the following: Column-I (Publications) a. Bengal Gazette b. Kesari c. Ramcharitmanas d. Samvad Kaumudi Column-II (Authors) i. Tulsidas ii. James August Hickey iii. Ram Mohan Roy iv. Bal Gangadhar Tilak", "answer": "(C) a-ii, b-iv, c-i, d-iii: Bengal Gazette–Hickey, Kesari–Tilak, Ramcharitmanas–Tulsidas, Samvad Kaumudi–Ram Mohan Roy.", "explanation": "Jodi yaad rakho: Bengal Gazette–Hickey, Kesari–Tilak, Ramcharitmanas–Tulsidas, Sambad Kaumudi–Rammohan Roy. Hook: 'Hickey-Tilak-Tulsidas-Roy' ek line mein ratt lo.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Match"], "score": 3}, {"key": "H5-790", "chapter_code": "H5", "chapter_name": "Print Culture and the Modern World", "discipline": "History", "topic": "Women writers and print", "question": "How did printing technology affect the lives of Indian women ? Analyse.", "answer": "Print increased women's reading—liberal families educated them at home or school, journals carried women's writings and championed education. Despite conservative opposition, rebel women learned secretly, and authors like Rashsundari Debi and Tarabai Shinde wrote about confinement and injustice.", "explanation": "Print se Indian mahilaayein zyada padhne-likhne lagi—journals unki baat uthate the. Roohani opposition ke bawajood, Rashsundari aur Tarabai jaisi rebel auraton ne apni ghutan likh daali. Hook: print ne aurat ko awaaz di.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "P1-814", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Horizontal Power Sharing", "question": "Which of the following is an example of horizontal power sharing in Indian democracy?", "answer": "(d) Division of power among Legislative, Executive and Judiciary.", "explanation": "Horizontal power sharing ka best example = Legislature, Executive aur Judiciary ke beech baatwara. Ye teeno same level pe hote hain. Yaad rakho: horizontal = 'side by side' organs, isliye L-E-J wala option pakdo.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P1-822", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Self-Government & Participation", "question": "Explain the meaning of 'participatory democracy'.", "answer": "Participatory democracy means the direct involvement or participation of citizens in the decision-making process.", "explanation": "Participatory democracy = janta seedhe faisle mein hissa le, sirf vote dekar chup na baithe. Jaise Gram Sabha mein log khud bolte hain. Hook: 'participate' = hissa lena, isliye direct involvement.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "P1-823", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Self-Government & Participation", "question": "In the context of separation of powers, the given example defines which type of government ?", "answer": "Local Self Government.", "explanation": "Jab example mein log local level pe khud shaasan chalate dikhein, toh wo 'Local Self Government' hai (jaise Panchayat/Municipality). Hook: gaon/sheher ke apne chhote rule = local self government.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "P1-824", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Self-Government & Participation", "question": "Describe the structure of the system in India which is almost similar to the above example of Brazil.", "answer": "India's Local Self Government (Panchayati Raj, Municipalities, Municipal Corporations) is similar. These bodies are elected by the people, and the Gram Sabha in Gram Panchayats allows direct participation of local residents in decision-making.", "explanation": "Brazil ke participatory budget jaisa India mein hai apna Local Self Government - Panchayati Raj aur Municipalities. Inme log vote bhi karte hain aur Gram Sabha mein seedhe hissa lete hain. Hook: India ka 'Panchayat + Gram Sabha' = local janta ka direct role.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "P1-834", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - Power Sharing Model", "question": "Belgium took some measures to solve its problem. Read the following measures and choose the correct option : I. Formation of community government. II. Following majoritarian policy. III. By providing equal representation of language groups. IV. By providing additional powers to local governments.", "answer": "(B) I, III and IV are correct. Belgium formed a community government, gave equal representation to language groups and additional powers to local governments; it did NOT follow majoritarian policy.", "explanation": "Belgium ne majoritarian policy NAHI apnayi - ye statement II galat hai. Baaki teeno (community govt, equal language representation, local govt ko power) sahi. Hook: Belgium = anti-majoritarian, isliye 'majoritarian' wala point hamesha cross.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P1-838", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - Power Sharing Model", "question": "Belgium solved its problem of majoritarianism by strengthening which of the following types of government ?", "answer": "(C) Federal.", "explanation": "Belgium ne majoritarianism ka ilaaj 'Federal' government strengthen karke kiya - states ko power di, sab centre ke gulaam nahi. Hook: Federal = power upar-neeche baat di, isliye majoritarianism khatam.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P1-839", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - Power Sharing Model", "question": "Which of the following countries is an example of sharing of power between the national and state governments to account for internal diversity ?", "answer": "(C) Belgium.", "explanation": "National aur state govt ke beech power baatkar internal diversity sambhalne ka example = Belgium. Hook: Belgium = diversity ko federal tareeke se manage karne wala star example.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P1-840", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - General", "question": "Which one of the following organisations has its headquarter in Brussels ?", "answer": "(B) European Union.", "explanation": "Brussels mein European Union ka headquarter hai (NATO ka bhi). Hook: Brussels = Europe ki 'capital city' jaisa, isliye EU ka HQ wahi.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P1-842", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium vs Sri Lanka", "question": "The Belgian leaders took a different path than Sri Lanka. They recognised the existence of regional differences and __________.", "answer": "(C) Cultural diversities.", "explanation": "Belgian leaders ne Sri Lanka se ulta kaam kiya - unhone 'regional differences' aur 'cultural diversities' ko maana aur respect kiya. Hook: Belgium = diversity accept ki, Sri Lanka = diversity ignore ki.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P1-844", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Belgium - Ethnic Composition", "question": "Assertion (A): The French speaking community was rich in comparison to Dutch speaking community in Belgium. Reason (R) : Dutch speaking community got the benefit of economic development and education much later.", "answer": "(a) Both (A) and (R) are true and (R) is the correct explanation of (A). The French-speaking minority was richer because the Dutch-speaking majority got economic development and education only later.", "explanation": "Interesting baat - Belgium mein French bolne wale (minority) zyada ameer the kyunki Dutch wale (majority) ko development aur padhai ka fayda baad mein mila. Isi se tension badha. Hook: 'minority ameer, majority pichde' - ulta scene, isliye dono sahi.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "P1-849", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Sri Lanka - Ethnic Composition", "question": "Which of the following group is in majority in Sri Lanka ?", "answer": "(B) Sinhala-speakers.", "explanation": "Sri Lanka mein majority = Sinhala-speakers (around 74%). Tamils minority hain (~18%). Hook: 'Sinhala = bada group = majority', isi taakat ka unhone galat faayda uthaya.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "P1-852", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Sri Lanka - Majoritarianism", "question": "Assertion (A): There was civil war in Sri Lanka. Reason (R) : An Act was passed in 1956 to secure dominance of Sinhala community on the government.", "answer": "(A) Both Assertion and Reason are correct and (R) is the correct explanation of (A). The 1956 Act securing Sinhala dominance led to Tamil alienation and civil war.", "explanation": "Sri Lanka mein civil war hua - kyun? Kyunki 1956 ka Act Sinhala ki dominance pakka karne aaya, jisse Tamils naraz hue. Dono sahi, R hi A ka kaaran. Hook: '1956 Sinhala dominance -> Tamil gussa -> civil war'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "P1-854", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Sri Lanka - Majoritarianism", "question": "“The law enacted in 1956 and other Constitutional Provisions led to major conflict between the two communities in Sri Lanka.” Support the statement.", "answer": "The 1956 Act made Sinhala the sole official language, government policies favoured Sinhala applicants for jobs/universities, and the constitution protected Buddhism. These majoritarian measures denied Tamils equal political rights and opportunities, alienating them and leading to major conflict (civil war).", "explanation": "1956 ka kanoon + constitution ke provisions ne Tamils ko deewar se laga diya - Sinhala official bhasha, naukri-college mein Sinhala ko preference, Buddhism ko protection. Tamils ko laga 'hamare rights chheen liye', aur conflict bhadak gaya. Hook: 'Bhasha-Naukri-Dharm' teeno majority ke favour = Tamil revolt.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 3}, {"key": "P1-859", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Vertical Power Sharing", "question": "Explain 'Community Government' in the context of India.", "answer": "Note: 'Community Government' is a Belgian institution, not Indian. In India, the comparable arrangement is vertical power sharing where the Constitution clearly divides powers among the Central, State and Local governments, increasing grassroots participation and improving governance.", "explanation": "Dhyan do - 'Community Government' asal mein Belgium ka concept hai (bhasha ke aadhar pe chuni sarkar), India mein aisa nahi hota. India mein iske jagah vertical power sharing hai - Centre, State, Local ke beech power baant. Hook: Community Govt = Belgium special, India = Centre-State-Local tier.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "P1-860", "chapter_code": "P1", "chapter_name": "Power Sharing", "discipline": "Political Science", "topic": "Power Sharing among Social Groups", "question": "How is the distribution of power among different social groups beneficial for democracy ? Explain.", "answer": "It promotes equality, accommodates diversity, prevents domination by the majority, and gives minorities a fair share (e.g. reserved constituencies), strengthening democracy.", "explan
