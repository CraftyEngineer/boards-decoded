, "years": 4, "concepts": 44, "topics": [{"topic": "Combined figures", "count": 51}, {"topic": "Find angle/radius from sector", "count": 27}, {"topic": "Shaded region", "count": 27}, {"topic": "Sector area", "count": 17}, {"topic": "Sector perimeter", "count": 16}, {"topic": "Arc length", "count": 15}, {"topic": "Grazing area (quarter circle)", "count": 15}, {"topic": "Segment area", "count": 14}, {"topic": "Clock hands", "count": 11}, {"topic": "Circumference & radius", "count": 7}, {"topic": "Semicircle area", "count": 4}, {"topic": "Circle area", "count": 2}, {"topic": "Wheel revolutions", "count": 1}, {"topic": "Wiper / sweep area", "count": 1}]}]}, {"name": "Statistics & Probability", "marks": 11, "chapters": [{"code": "S1", "name": "Statistics", "marks_per_paper": 5.9, "importance": "MEDIUM", "total_q": 195, "total_q_raw": 195, "papers": 21, "years": 4, "concepts": 21, "topics": [{"topic": "Empirical relation", "count": 34}, {"topic": "Median", "count": 32}, {"topic": "Mean (assumed/step-deviation)", "count": 25}, {"topic": "Missing frequency", "count": 16}, {"topic": "Mean (ungrouped)", "count": 15}, {"topic": "Concept of central tendency", "count": 15}, {"topic": "Cumulative frequency", "count": 15}, {"topic": "Modal/median class (MCQ)", "count": 14}, {"topic": "Mean (direct)", "count": 13}, {"topic": "Effect of change on average", "count": 9}, {"topic": "Mode", "count": 7}]}, {"code": "S2", "name": "Probability", "marks_per_paper": 5.1, "importance": "MEDIUM", "total_q": 254, "total_q_raw": 254, "papers": 21, "years": 4, "concepts": 50, "topics": [{"topic": "Numbered tickets - number property", "count": 52}, {"topic": "Cards - cards removed/lost", "count": 21}, {"topic": "Coloured balls - find unknown", "count": 17}, {"topic": "Complement / theory", "count": 13}, {"topic": "Valid probability range", "count": 13}, {"topic": "Two dice - sum", "count": 13}, {"topic": "Cards - single draw category", "count": 13}, {"topic": "Two-stage outcomes / game", "count": 12}, {"topic": "Coins - two coins", "count": 9}, {"topic": "Coins - three coins", "count": 9}, {"topic": "Pie chart / context", "count": 9}, {"topic": "Single die", "count": 8}, {"topic": "Complement / context", "count": 8}, {"topic": "Empirical / frequency table", "count": 8}, {"topic": "Two dice - both faces condition", "count": 7}, {"topic": "Calendar / leap year", "count": 6}, {"topic": "Lottery / find count from P", "count": 6}, {"topic": "Two dice - difference", "count": 4}, {"topic": "Two dice - same/different", "count": 4}, {"topic": "Cards - union (or)", "count": 3}, {"topic": "Coloured balls - direct", "count": 3}, {"topic": "Coloured balls - neither/not", "count": 3}, {"topic": "Calendar / birthday", "count": 3}, {"topic": "Lottery / prize-blank", "count": 2}, {"topic": "Coloured balls - ratio", "count": 2}, {"topic": "Defective / acceptance items", "count": 2}, {"topic": "Two dice - product", "count": 1}, {"topic": "Two dice - even product", "count": 1}, {"topic": "Letters of a word", "count": 1}, {"topic": "Percentages / context", "count": 1}]}]}], "concepts": [{"key": "N1-436", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Irrationality proofs", "question": "Prove that √3 is an irrational number.", "answer": "Method: proof by contradiction. Assume √n = p/q with p,q coprime. Square → p² = n·q², so n | p² ⇒ n | p. Put p = n·a → q² = n·a², so n | q too. Then n divides both p and q, contradicting coprimality. Hence √n is irrational (same for √2, √3, √5).", "explanation": "Yeh classic contradiction proof hai. Maano √n = p/q with p,q coprime; dono taraf square karo aur dikhao p aur q dono n se divisible ho jaate hain — jo coprime hone ke khilaaf hai. Memory hook: 'square karo, factor pakdo, contradiction'. Shuru me 'p,q coprime hain' likhna mat bhoolna.", "years": ["2023", "2024", "2025", "2026"], "papers": 14, "raw": 40, "marks": 3, "types": ["SA"], "score": 35}, {"key": "G1-182", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Find length by BPT", "question": "[FIGURE: Triangle ABC with line segment DE parallel to BC] In the given figure, DE || BC. If AD = 2 units, DB = AE = 3 units and EC = x units, then the value of x is :", "answer": "Method: A line parallel to one side gives equal ratios on the other two sides (BPT). Set the two ratios equal and solve for the unknown length. e.g. DE||BC with AD=2, DB=3, AE=3 => 2/3 = 3/EC => EC = 9/2. Same idea for AC, AQ, AE, YR, CY:YB etc. - always write the BPT proportion first, then cross-multiply.", "explanation": "Jab line kisi ek side ke parallel ho (DE||BC type), turant BPT lagao: AD/DB = AE/EC. Unknown ko ek taraf rakh ke cross-multiply karke nikaalo. Tip: ratio likhte waqt corresponding parts match karo (upar-upar, neeche-neeche), warna answer ulta aa jaata hai.", "years": ["2023", "2024", "2025", "2026"], "papers": 13, "raw": 36, "marks": 1, "types": ["MCQ"], "score": 30}, {"key": "S1-465", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Empirical relation", "question": "If the mean and mode of a data are 12 and 21 respectively, then its median is :", "answer": "Method: use Mode = 3*Median - 2*Mean (equivalently 3 Median = Mode + 2 Mean). Substitute the two known values and solve for the third. E.g. Mean=12, Mode=21 -> 21 = 3*Median - 24 -> Median = 15. Variable forms ('x median + y mean = z mode') compare to 3 median = 1 mode + 2 mean, giving e.g. x+y+z=2. Representative answer: median = 15.", "explanation": "Ek hi formula yaad rakho: Mode = 3 Median - 2 Mean. Jo do diye wahi daalo, teesra nikaalo. Mean=12, Mode=21 -> Median=15. 'x median + y mean = z mode' type mein bhi yahi rishta lagao -> x+y+z=2. Hook: '3-median = mode + 2-mean'.", "years": ["2023", "2024", "2025", "2026"], "papers": 12, "raw": 31, "marks": 1, "types": ["MCQ"], "score": 34}, {"key": "T1-536", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Standard-angle evaluation", "question": "Evaluate (5 cos²60° + 4 sec²30° – tan²45°)/(sin²30° + cos²30°)", "answer": "Method: substitute exact standard-angle values (sin30=1/2, cos30=tan45 etc.), then simplify. Representative: (5cos²60+4sec²30−tan²45)/(sin²30+cos²30)=(5/4+16/3−1)/1=67/12.", "explanation": "Standard angles ki value table (0,30,45,60,90 ke sin/cos/tan) ratto. Bas value daalo aur simplify — koi identity nahi chahiye. Hook: '1/2, 1/√2, √3/2' = sin30,45,60. Galti: sin²30=(1/2)²=1/4, square lagana mat bhoolo.", "years": ["2023", "2024", "2025", "2026"], "papers": 12, "raw": 34, "marks": 2, "types": ["MCQ", "VSA"], "score": 30}, {"key": "T1-538", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Simplify expression using identities (MCQ)", "question": "(sec²θ – 1) (cosec²θ – 1) is equal to :", "answer": "Method: convert to sin/cos or use Pythagorean identities (sec²−tan²=1, cosec²−cot²=1) to collapse the expression to one value/ratio. Representative: (sec²θ−1)(cosec²θ−1)=tan²θ·cot²θ=1.", "explanation": "Expression ko ek identity se chhota karo: sin²+cos²=1, sec²−tan²=1, cosec²−cot²=1. Sab sin/cos me convert kar do toh answer saaf dikhega. (2tan30)/(1+tan²30)=sin60 jaisi double-angle forms bhi pehchaano. Hook: 'identity lagao, cancel karo'.", "years": ["2023", "2025", "2026"], "papers": 11, "raw": 31, "marks": 1, "types": ["MCQ"], "score": 31}, {"key": "S1-481", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Mean (assumed/step-deviation)", "question": "The following table shows the ages of the patients admitted in a hospital during a year ... Find the mode and mean of the data given above. [grouped frequency table]", "answer": "Method: Mean = Sum f_i x_i/Sum f_i (direct or assumed/step-deviation Mean = a + h*(Sum f u/Sum f)); Mode = L + ((f1-f0)/(2f1-f0-f2))*h for the modal class. Patients(5-15..55-65): Mean = 2830/80 = 35.375 yrs, modal class 35-45 -> Mode = 36.81 yrs. If one frequency is missing, get it from the total count first (apples x=40, fruits x=30). Representative: Mean ~35.4, Mode ~36.8.", "explanation": "LA ka favourite jodaa: Mean (Σf x/Σf ya assumed-mean a + h*Σf u/Σf) aur Mode (L + ((f1-f0)/(2f1-f0-f2))*h). Patients: Mean 35.375, Mode 36.81. Missing freq total se nikaalo phir dono. Hook: 'mean = average, mode = modal-class formula'.", "years": ["2023", "2024", "2025", "2026"], "papers": 10, "raw": 19, "marks": 5, "types": ["LA"], "score": 31}, {"key": "T1-563", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Prove identity by eliminating theta (m,n / p,q)", "question": "If a cos θ + b sin θ = m and a sin θ – b cos θ = n, then prove that a^2 + b^2 = m^2 + n^2.", "answer": "Method: square and add/subtract the two given relations (or substitute) so θ cancels; sin²+cos²=1 finishes. Representative: a cosθ+b sinθ=m, a sinθ−b cosθ=n ⇒ m²+n²=a²+b².", "explanation": "Jab do expressions m,n (ya p,q) diye hon, unhe square karke add/subtract karo — θ cancel ho jaata hai (sin²+cos²=1). m²−n² wale me 4√(mn) type aata hai, multiply ka dhyan. Hook: 'square karo aur jodo, theta gayab'.", "years": ["2023", "2024", "2025", "2026"], "papers": 10, "raw": 25, "marks": 3, "types": ["SA", "VSA"], "score": 29}, {"key": "T1-562", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Prove identity (general: convert to sin/cos & simplify)", "question": "Prove that (1 + sec A) / sec A = sin²A / (1 – cos A).", "answer": "Method: take the more complex side, convert all terms to sin/cos (or apply sec²−tan²=1), simplify step by step to the other side. Representative: (1+secA)/secA = 1+cosA = sin²A/(1−cosA).", "explanation": "Identity prove karte waqt ek side (complex wali) lo aur sab sin/cos me badal ke simplify karo — dono ko ek saath mat chhedo. Hook: 'ek side pakdo, sin-cos me badlo, simplify'. sec²−tan²=1 ready rakho.", "years": ["2023", "2024", "2025", "2026"], "papers": 10, "raw": 14, "marks": 3, "types": ["SA", "VSA"], "score": 27}, {"key": "G1-180", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "BPT / Thales", "question": "State and prove Basic Proportionality theorem.", "answer": "Method: State the Basic Proportionality Theorem (Thales) and prove it. Given a line parallel to one side of a triangle cutting the other two sides, draw the two extra segments (join the parallel-line endpoints to the opposite vertices) and use that triangles on the same base between the same parallels have equal area; the area ratios give AD/DB = AE/EC. Several variants then APPLY this proof to a rider (3 parallel lines cut by transversals -> AB/BC = DE/EF; angle-bisector CE||AD -> BD/DC = BA/AC; LM||CB & LN||CD -> AM/MB = AN/ND).", "explanation": "BPT yaad rakho: triangle ki ek side ke parallel line baaki do sides ko SAME ratio mein kaatti hai (AD/DB = AE/EC). Proof mein construction zaroori hai - dono endpoints ko opposite vertex se join karo aur 'same base + same parallel => equal area' waala trick lagao. Figure aur 'Given/To Prove/Construction' likhna mat bhoolo, warna marks katte hain.", "years": ["2023", "2024", "2025", "2026"], "papers": 10, "raw": 23, "marks": 5, "types": ["LA"], "score": 25}, {"key": "C1-169", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Circle (distance)", "question": "The end-points of a diameter of a circle are (2, 4) and (-3, -1). The radius of the circle is", "answer": "Method: radius=½·distance between diameter ends (=distance from centre); centre=midpoint of diameter. Ends (2,4),(-3,-1): r=5√2/2. Ends (5,-2),(5,2) → r=2. Centre (2,0),end (6,0) → other (-2,0). Centre (1,2) through O → diameter 2√5. Rectangle diagonal²=20; missing vertex by coords.", "explanation": "Diameter ke do end pata to radius = beech ki doori ka aadha (ya centre se doori). Centre=diameter ka midpoint. Hook: radius=(½)·diameter. Doosra end chahiye to centre ko midpoint maano. Rectangle ka diagonal distance se.", "years": ["2023", "2024", "2025", "2026"], "papers": 9, "raw": 19, "marks": 1, "types": ["MCQ"], "score": 20}, {"key": "G1-222", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity (medians)", "question": "Sides AB and BC and median AD of a triangle ABC are respectively proportional to sides PQ and QR and median PM of ∆ PQR. Show that ∆ABC ~ △ PQR.", "answer": "Method: Two triangles with two pairs of sides and the included median proportional are similar. Since AD, PM are medians, BD=BC/2 and QM=QR/2, so triangle ABD ~ triangle PQM (SSS) => angle B = angle Q; then with AB/PQ = BC/QR and equal included angle, triangle ABC ~ triangle PQR (SAS). (Related: medians/angle-bisectors of similar triangles satisfy triangle ADC ~ triangle PSR, and AB/PQ = AD/PM.)", "explanation": "Median proportional ho to pehle chhote triangles (ABD~PQM) ko SSS se similar dikhao, isse ek angle (B=Q) milta hai. Phir SAS se poore triangles similar. Yaad rakho: median aadhi side banata hai (BD=BC/2), wahi ratio carry hota hai.", "years": ["2023", "2024", "2025", "2026"], "papers": 9, "raw": 24, "marks": 5, "types": ["LA", "VSA"], "score": 19}, {"key": "A3-73", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Find k for given roots", "question": "Find the value of 'p' for which the quadratic equation px(x – 2) + 6 = 0 has two equal real roots.", "answer": "For equal roots set discriminant D=b²−4ac=0 and solve for the parameter. E.g. px(x−2)+6=0 ⇒ px²−2px+6=0, D=4p²−24p=0 ⇒ p=6 (reject p=0). Method is identical for k, m, c, a (e.g. 4x²+kx+1=0 gives k=±4).", "explanation": "Equal roots ka matlab discriminant zero: D=b²−4ac=0. Equation ko standard form me laao, a, b, c pehchaano, phir D=0 ka equation solve karo. Common mistake: jo value 'a' ko zero kar de (jaise p=0) usse reject karna padta hai, warna quadratic hi nahi rahegi.", "years": ["2023", "2024", "2025", "2026"], "papers": 8, "raw": 22, "marks": 1, "types": ["LA", "MCQ", "SA", "VSA"], "score": 23}, {"key": "T1-547", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Multiple-angle / complementary-angle MCQ", "question": "tan 2A = 3 tan A is true, when the measure of ∠ A is :", "answer": "Method: use standard values, complementary relation sin=cos(90−θ), or double/half-angle reasoning. Representative: sin(α+β)=1 ⇒ α+β=90° ⇒ half-angle 45°.", "explanation": "Angle khud nikaalna hota hai ya half/double angle use hota hai. sin(α+β)=1 ⇒ α+β=90°, aadha=45°. sinθ=cos(90−θ) yaad rakho. Hook: 'angle pehchaano, phir aadha/dugna'.", "years": ["2024", "2025", "2026"], "papers": 8, "raw": 17, "marks": 1, "types": ["MCQ"], "score": 23}, {"key": "A3-87", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Word problem: numbers, fractions & reciprocals", "question": "In a 2-digit number, the digit at the unit's place is 5 less than the digit at the ten's place. The product of the digits is 36. Find the number.", "answer": "Assign a variable, turn each condition into an equation, substitute to get one quadratic, solve and keep the valid (natural/negative as required) root. Two-digit (units = tens−5, product 36): x(x−5)=36 ⇒ x²−5x−36=0 ⇒ x=9 ⇒ number 94. (Consecutive negatives, squares sum 481: x²+(x+1)²=481 ⇒ x=−16 ⇒ −16,−15. Sum/reciprocal & fraction problems form the same way.)", "explanation": "Number problems me variable rakho (digit, ya numerator/denominator), har sentence ko equation me badlo, phir ek quadratic banao. Reciprocal ka matlab 1/x. Answer me condition check karo — 'natural number' ho to positive, 'negative integers' ho to negative root lo. Baaki root reject.", "years": ["2023", "2024", "2025", "2026"], "papers": 8, "raw": 18, "marks": 5, "types": ["LA", "SA"], "score": 22}, {"key": "C1-165", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Type of figure", "question": "Find the type of triangle ABC formed whose vertices are A(1, 0), B(–5, 0) and C(-2, 5).", "answer": "Method: find all side lengths and compare. Equal pair → isosceles; a²=b²+c² → right. (-2,3),(8,3),(6,7): 100=20+80 → right. (-4,0),(4,0),(0,3): isosceles. Right ∆ at P → x²+y²=13, x=±3 at y=2. tan A=BC/AB=3.", "explanation": "Triangle ka type: saari sides distance formula se nikaalo. Do barabar → isosceles; badi side²=baaki do ka² → right. Diagram banake sides label karo. Right ∆ me ratio (tan) bhi sides se milta hai.", "years": ["2023", "2024", "2025", "2026"], "papers": 8, "raw": 19, "marks": 2, "types": ["Case-based", "MCQ", "SA", "VSA"], "score": 20}, {"key": "A1-9", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Solve for zeroes", "question": "The zeroes of the polynomial p(x) = x² + 4x + 3 are given by :", "answer": "Method: factorise by splitting the middle term and set each factor to zero (for fractional/√ coeffs, clear denominators first). Representative x²+4x+3=(x+1)(x+3): zeroes -1, -3. (Case-based 'find zeroes' e.g. 20t-16t² → t=0, 5/4; -5t²+25t → 0,5; -x²+2x+8 → -2,4.)", "explanation": "Zeroes nikaalna = factorise karke har factor ko 0 rakhna. Fraction ya √ ho to pehle denominators hatao (e.g. x²+(4/3)x-4/3 → 3x²+4x-4). Word/graph wale (ball, dolphin, arch) me bhi same: p(t)=0 rakho aur solve karo. Middle-term split master karo!", "years": ["2023", "2024", "2025", "2026"], "papers": 8, "raw": 19, "marks": 1, "types": ["Case-based", "MCQ", "VSA"], "score": 17}, {"key": "S2-500", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Two dice - sum", "question": "Two dice are rolled together. What is the probability of getting a sum greater than 10 ?", "answer": "Total outcomes = 36. Count (a,b) pairs for the sum condition. sum>10 ⇒ 3/36=1/12; sum=5 ⇒4/36=1/9; 'at most 10'=1−1/12=11/12; 'at least 4'=1−P(sum<4)=11/12; sum divisible by 6 (6 or 12) ⇒6/36=1/6; even sum ⇒18/36=1/2; 'at most 12' is sure ⇒1.", "explanation": "Do dice = 36 outcomes (6×6). Sum waale sawaal mein favourable (a,b) pairs ginto; dimaag mein 6×6 grid banao. 'At most/at least' ke liye complement use karo. Sab 36 outcomes equally likely.", "years": ["2023", "2024", "2025", "2026"], "papers": 7, "raw": 13, "marks": 1, "types": ["MCQ", "SA"], "score": 20}, {"key": "A3-84", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Word problem: speed, time & distance", "question": "A train travels a distance of 480 km at a uniform speed. If the speed had been 8 km/h less, then it would have taken 3 hours more to cover the same distance. Find the speed of the train.", "answer": "Let the speed be x, write each time as distance/speed, form the time-difference (or total-time) equation, clear denominators to a quadratic and reject the negative speed. 480 km, 8 km/h less, 3 h more: 480/(x−8)−480/x=3 ⇒ x²−8x−1280=0 ⇒ x=40 km/h.", "explanation": "Speed-distance-time me hamesha Time = Distance/Speed se equation banao. 'Itni der zyada/kam lagi' ka matlab do time ka difference. Denominators hata ke quadratic banao aur −ve speed reject karo. Units same rakhna (minutes ho to /60 karke hours banao!).", "years": ["2023", "2024", "2025", "2026"], "papers": 7, "raw": 17, "marks": 5, "types": ["LA"], "score": 19}, {"key": "N1-437", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Irrationality of combinations", "question": "Prove that 2 + √3 is an irrational number, given that √3 is an irrational number.", "answer": "Method: assume the expression (2+√3, 5−2√3, (2−√3)/5, 2+3√5, 1/√5, …) is rational = p/q, then isolate the surd. The surd becomes a rational combination = rational, contradicting that √n is given irrational. Hence the expression is irrational.", "explanation": "Trick same: jo bhi diya ho (jaise 2 + 3√5) usko rational maan lo, fir √n ko akela (isolate) karo. Jaise hi √n = rational expression aaya, contradiction — kyunki √n irrational diya hai. Memory hook: '√ ko akela karo, baaki rational'. 'Given' fact zaroor use karo.", "years": ["2023", "2024", "2025", "2026"], "papers": 7, "raw": 18, "marks": 2, "types": ["SA", "VSA"], "score": 19}, {"key": "N1-458", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Ending digit / unit digit (FTA)", "question": "Which of the following cannot be the unit digit of 8ⁿ, where n is a natural number?", "answer": "Method: unit digit depends on prime factors / the power's cyclic pattern. 6ⁿ always ends in 6; 5ⁿ always ends in 5; (2·5)ⁿ ends in 0; 8ⁿ cycles 8,4,2,6 so never 0; 3ⁿ is odd ⇒ never even. For (−1)ⁿ+(−1)⁸=0 ⇒ (−1)ⁿ=−1 ⇒ n odd. These restate: ends in 0 needs both 2 and 5.", "explanation": "Unit digit prime factors aur power ke cycle se decide hota hai. Yaad rakho: 6ⁿ→6, 5ⁿ→5, (2·5)ⁿ→0, 8ⁿ kabhi 0 nahi (cycle 8,4,2,6), 3ⁿ hamesha odd. Memory hook: '0 chahiye to 2 aur 5 dono'. (−1)ⁿ waale me odd/even check karo.", "years": ["2023", "2025", "2026"], "papers": 7, "raw": 18, "marks": 1, "types": ["Assertion-Reason", "MCQ"], "score": 19}, {"key": "T1-539", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Given one ratio -> find another", "question": "If sinA = 2/3, then value of cotA is :", "answer": "Method: from the given ratio build the right triangle, find the third side by Pythagoras, then read off the required ratio. Representative: cosA=4/5 ⇒ opposite=3 ⇒ tanA=3/4.", "explanation": "Ek ratio diya ho toh perpendicular-base-hypotenuse maan ke teesri side Pythagoras se nikaalo, phir maanga ratio likho. Hook: 'triangle banao, missing side nikaalo'. Acute angle me sab positive. sec=hyp/base, cot=base/perp.", "years": ["2023", "2024", "2025", "2026"], "papers": 7, "raw": 17, "marks": 1, "types": ["MCQ", "SA", "VSA"], "score": 19}, {"key": "S1-474", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Median", "question": "Find the median of the given data.  [grouped frequency distribution]", "answer": "Method: cumulative frequencies -> N/2 -> median class (c.f. first >= N/2) -> Median = L + ((N/2 - cf)/f)*h (L=lower limit of median class, cf=c.f. of preceding class, f=its frequency, h=class size). 'Write the median class' = just identify it. With mid-values given, first reconstruct class limits. Representative: median rainfall ~ 771.4 mm = 600 + ((12-6)/7)*200.", "explanation": "Median: cumulative banao, N/2 nikaalo, median class dhoondho (jahan c.f. pehli baar N/2 cross kare), phir Median = L + ((N/2 - cf)/f)*h. cf = pichhli class ka cumulative. Hook: 'N/2 wali class pakdo, formula thoko'. Galti: cf preceding class ka lo, median class ka nahi.", "years": ["2023", "2024", "2025", "2026"], "papers": 7, "raw": 20, "marks": 2, "types": ["Case-based", "LA"], "score": 17}, {"key": "C1-162", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Distance from axis", "question": "The distance of the point (-1, 7) from x-axis is :", "answer": "Method: distance from x-axis=|y|, from y-axis=|x|, from origin=√(x²+y²). (-1,7) from x-axis=7; (-6,8) from origin=10; (-4,3) from y-axis=4; (4,0) from x-axis=0.", "explanation": "x-axis se doori=|y|, y-axis se=|x|, origin se=√(x²+y²). Sign hata do, mod lagao. Concept MCQ aur assertion-reason me yahi rule. Origin waale me dono coordinate ka square jodke root.", "years": ["2023", "2025", "2026"], "papers": 7, "raw": 19, "marks": 1, "types": ["Assertion-Reason", "MCQ"], "score": 16}, {"key": "C1-161", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Distance formula", "question": "The distance between the points (0, 2√5) and (-2√5, 0) is", "answer": "Method: d=√[(x2-x1)²+(y2-y1)²]. (0,2√5),(-2√5,0) → 2√10. (0,5),(-3,1) → 5. (a cosθ,-a sinθ),(a sinθ,a cosθ) → a√2. Case-based PQ,QR,AC computed the same way.", "explanation": "Distance formula: d=√[(x₂-x₁)²+(y₂-y₁)²]. Difference ka square jodo aur root le lo. Trig waale me (cos²+sin²)=1 use hota hai. Minus-minus plus ban jaata hai, sign sambhaalo.", "years": ["2023", "2024", "2026"], "papers": 7, "raw": 11, "marks": 1, "types": ["Case-based", "MCQ"], "score": 13}, {"key": "C1-159", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Section formula", "question": "Find the coordinates of the points of trisection of the line segment joining the points A(-1, 4) and B(-3, – 2).", "answer": "Method: turn the length-condition into a ratio, then apply section/midpoint. AC=2BC, C on AB produced → B midpoint of AC → C=(9,-13). PR=2QR → R divides PQ 2:1 → (4/3,3). Trisection: 1:2 and 2:1. 4 equal parts: repeated midpoints. Treasure 3:1 → (6,7). Prove P (3:2) on line → P=(2,1), PA=3√5, PB=2√5.", "explanation": "'AC=2BC', 'PR=2QR', trisection, 4 equal parts — sab section formula ke roop. Pehle length-condition ko ratio me badlo, fir formula. Diagram banao taaki point kahaan padega samajh aaye.", "years": ["2024", "2025", "2026"], "papers": 6, "raw": 14, "marks": 3, "types": ["SA", "VSA"], "score": 20}, {"key": "C1-168", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Type of figure", "question": "The fourth vertex D of a parallelogram ABCD whose three vertices are A(-2, 3), B(6, 7) and C(8, 3) is :", "answer": "Method: diagonals of a parallelogram bisect each other → midpoint of one diagonal = midpoint of other; solve unknown vertex. ABCD A(-2,3),B(6,7),C(8,3) → D=(0,-1). Rhombus → S=(-6,-7). Square: diagonals meet at their common midpoint P; side via distance (P(5,2), side 8). Rectangle-check: compare diagonal lengths.", "explanation": "Parallelogram/rhombus/square ka chautha vertex ya centre: 'diagonals ek doosre ko bisect karte hain' → dono diagonal ka midpoint barabar karo. Centre = diagonals ka midpoint. Side/rectangle ke liye distance formula se length compare.", "years": ["2024", "2025", "2026"], "papers": 6, "raw": 21, "marks": 2, "types": ["Case-based", "MCQ", "SA", "VSA"], "score": 19}, {"key": "G2-254", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents and centre", "question": "[FIGURE: Circle with center O and two tangents AB and AC from external point A] In the given figure, O is the centre of the circle. AB and AC are tangents drawn to the circle from point A. If ∠ BAC = 65°, then find the measure of ∠ BOC.", "answer": "Angle between two tangents and the central angle are supplementary: angle at external point + angle at centre between radii = 180. E.g. angle BAC=65 gives angle BOC=115; angle AOB=130 gives angle APB=50; angle POQ=120 gives angle PTQ=60; reflex angle AOB=210 gives angle APB = 360-210-90-90 = 30.", "explanation": "Do tangent wale problem me yaad rakho: bahar ka angle + centre wala angle = 180 (OAPB me do 90 hote hain). Ek diya to doosra 180 me se ghatao. Reflex ho to pehle 360 me se ghatao. Hook: P + O = 180.", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 16, "marks": 1, "types": ["Case-based", "MCQ", "VSA"], "score": 17}, {"key": "A1-13", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Find parameter from zero conditions", "question": "If α and β are the zeroes of the polynomial p(x) = kx² – 30x + 45k and α + β = αβ, then the value of k is :", "answer": "Method: write α+β=-b/a and αβ=c/a in terms of the unknown, then apply the given relation (e.g. α+β=αβ, or sum/product equals a number) and solve. Representative kx²-30x+45k with α+β=αβ: 30/k = 45k/k = 45 → 30/k = 45 → k = 2/3.", "explanation": "Trick: α+β = -b/a aur αβ = c/a likho (parameter ke saath), phir di gayi condition (jaise α+β=αβ) me daal ke equation solve karo. Direct zeroes nikaalne ki zaroorat nahi. Coefficient ke signs sabse zyada galti karwaate hain — dhyaan se!", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 12, "marks": 1, "types": ["MCQ", "VSA"], "score": 15}, {"key": "A3-83", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Word problem: area & dimensions", "question": "The sum of the areas of two squares is 52 cm² and difference of their perimeters is 8 cm. Find the lengths of the sides of the two squares.", "answer": "Translate the geometry into an area equation, expand to standard form ax²+bx+c=0, solve (factorise/formula), and reject the impossible (negative) value. Two squares: x²+y²=52 with x−y=2 ⇒ y²+2y−24=0 ⇒ sides 6 cm & 4 cm. (Photo: (18+x)(12+x)=2·216 ⇒ x²+30x−216=0, x=6. Tiles: 200x²=128(x+1)² ⇒ 9x²−32x−16=0, x=4. Walkway: (12+2x)(10+2x)=360 ⇒ x²+11x−60=0, x=4.)", "explanation": "Pehle situation ka diagram socho, area ka equation banao (length×breadth ya side²), phir standard form me laao aur solve karo. Hamesha negative/illogical answer reject karo (length kabhi −ve nahi hoti!). Common mistake: dimensions ko 'increase by x' me x ko original me add karna bhoolna — (18+x)(12+x) likho, sirf 18×12 nahi.", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 36, "marks": 1, "types": ["Case-based", "LA"], "score": 15}, {"key": "G1-226", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Ratio of perimeters / sides", "question": "If ∆PQR ~ ∆ABC; PQ = 6 cm, AB = 8 cm and the perimeter of ∆ABC is 36 cm, then the perimeter of ∆PQR is (A) 20.25 cm (B) 27 cm (C) 48 cm (D) 64 cm", "answer": "Method: For similar triangles, ratio of perimeters = ratio of any pair of corresponding sides. e.g. PQR~ABC with PQ=6,AB=8 => ratio 3/4, so perimeter PQR = (3/4)*36 = 27 cm. Same ratio finds an unknown side (ABC~QPR, AC=6,QR=3,PR=x: BC/PR... => x=2.5) or PQ+QR from ABC~PQR with PR=6.", "explanation": "Similar triangles: perimeter ka ratio = sides ka ratio = ek constant scale factor. Ek known pair se scale nikaalo, phir wahi scale perimeter/side dono pe lagao. Corresponding sides theek se match karo (letter order!).", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 20, "marks": 1, "types": ["MCQ", "VSA"], "score": 15}, {"key": "S1-468", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Mean (ungrouped)", "question": "If the mean of five observations x, x + 2, x + 4, x + 6 and x + 8 is 11, then the value of x is :", "answer": "Method: Mean = (sum)/(count). Unknown: set sum/n = mean (5x+20=55 -> x=7). Combined/missing observation: total = mean*n then add/subtract knowns (third obs = 3*14+3*17-5*15 = 18; included number = 6*17-5*15 = 27). Mean of first n naturals = (n+1)/2 (so Assertion (n-1)/2 is FALSE, Reason true). Also Sum f_i(x_i - mean)=0. Representative: x = 7.", "explanation": "Mean = total / count. Unknown ho toh sum/n = mean solve karo. Combined-mean mein total = mean*n nikaal ke overlap adjust karo. Pehle n naturals ka mean (n+1)/2 - (n-1)/2 galat. Sum f(x-mean)=0 hamesha. Hook: 'total banao, count se bhaag'.", "years": ["2024", "2025", "2026"], "papers": 6, "raw": 15, "marks": 1, "types": ["Assertion-Reason", "MCQ"], "score": 15}, {"key": "T1-537", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Find constant from standard-angle equation", "question": "If 4 cot^2 45° – sec^2 60° + sin^2 60° + p = 3/4, then find the value of p.", "answer": "Method: put standard-angle values into the equation, simplify, then solve the simple algebra for the unknown. Representative: 4cot²45−sec²60+sin²60+p=3/4 ⇒ 4−4+3/4+p=3/4 ⇒ p=0.", "explanation": "Pehle standard angles ki value daalo, phir bachi equation se unknown (p/k/x) nikaalo — 1-2 step algebra. Hook: 'value daalo, phir solve karo'. cot45=1, sec60=2 me galti mat karna.", "years": ["2023", "2024", "2025"], "papers": 6, "raw": 16, "marks": 2, "types": ["MCQ", "VSA"], "score": 15}, {"key": "A2-30", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Condition for solutions (k)", "question": "The value of k for which the system of equations 3x – y + 8 = 0 and 6x – ky + 16 = 0 has infinitely many solutions, is", "answer": "Method: for infinitely many solutions all three coefficient-ratios are equal: a1/a2 = b1/b2 = c1/c2. Compare and solve for the unknown. For 3x–y+8=0 & 6x–ky+16=0: 3/6 = 1/k = 8/16 ⇒ k = 2. (For kx=y+2 & 6x=2y+3 the required common ratio fails, so such k 'does not exist'; for 2x+3y=7 & 2ax+(a+b)y=28: a=4, b=8.)", "explanation": "Infinite solutions ka matlab dono lines bilkul ek hi (coincident) hain. Formula yaad rakho: a1/a2 = b1/b2 = c1/c2 — teeno ratio barabar hone chahiye. Pehle equations ko ax+by+c=0 form mein laao, phir ratios bana ke unknown nikaalo. Common galti: sirf do ratio barabar kar dena (woh to 'no solution' / unique hota) — teeno check karo, warna kabhi 'k exist hi nahi karta' bhi aata hai.", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 18, "marks": 1, "types": ["MCQ", "SA"], "score": 14}, {"key": "A2-32", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Consistency", "question": "The pair of linear equations 2x = 5y + 6 and 15y = 6x – 18 represents two lines which are :", "answer": "Method: write both in ax+by+c=0 form and compare ratios. a1/a2 ≠ b1/b2 ⇒ intersecting (unique sol, consistent); = and = c-ratio ⇒ coincident (infinite); = but ≠ c-ratio ⇒ parallel (no sol, inconsistent). e.g. 2x=5y+6 & 15y=6x–18 give equal ratios throughout ⇒ coincident.", "explanation": "Yeh pehchaan ka sawaal hai: lines intersecting, parallel ya coincident? Dono ko ax+by+c=0 mein likho, phir a1/a2, b1/b2, c1/c2 compare karo. Rule: alag a/b = unique (intersecting), teeno barabar = coincident (infinite), do barabar teesra alag = parallel (no solution). Tip: x=const aur y=const hamesha intersecting (perpendicular) hote hain.", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 12, "marks": 1, "types": ["MCQ"], "score": 14}, {"key": "A2-35", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Line geometry & equation", "question": "Equation of another line parallel to the line represented by 2x - 6y = 7 is :", "answer": "Concepts: x=a & y=b are vertical/horizontal lines meeting at (a,b). A line ax+by=c meets the y-axis where x=0 (e.g. 3x–y=3 meets y-axis at (0,–3)). x–y=0 passes through origin (no constant term). Parallel line ⇒ same a:b ratio, different constant (2x–6y=7 ∥ x–3y=7); coincident ⇒ all coefficients proportional (2.5x–2y=3 ≡ 5x–4y–6=0).", "explanation": "Yeh chhote geometry/concept sawaal hain. Yaad rakho: x=a seedhi khadi line, y=b seedhi leti line, dono (a,b) par milti. Y-axis ka point nikalne ke liye x=0 rakho; X-axis ke liye y=0. Parallel banani ho to a aur b ka ratio same rakho bas constant badlo; coincident ke liye poori equation ko number se multiply kar do.", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 14, "marks": 1, "types": ["MCQ"], "score": 14}, {"key": "N1-463", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Number definitions & HCF/LCM facts", "question": "If 'p' and 'q' are natural numbers and 'p' is the multiple of 'q', then what is the HCF of 'p' and 'q'?", "answer": "Method: use definitions/basic facts. If p is a multiple of q ⇒ HCF=q (and LCM=p). Least composite=4, least prime=2 ⇒ HCF:LCM = 2:4 = 1:2. Least prime(2) & least odd composite(9) ⇒ LCM=18; smallest 2-digit(10) & smallest composite(4) ⇒ LCM=20. Natural number 2 is prime; 1 is neither prime nor composite.", "explanation": "Yeh definition-based hain — ratta nahi, samajh ke yaad karo. Agar p, q ka multiple hai to HCF=q. Least composite=4, least prime=2, least odd composite=9, smallest 2-digit=10, smallest composite=4. 1 → na prime na composite; 2 → smallest prime (aur eklauta even prime). Memory hook: 'ye chhote facts har saal aate hain'.", "years": ["2023", "2024", "2026"], "papers": 6, "raw": 13, "marks": 1, "types": ["MCQ"], "score": 13}, {"key": "S1-484", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Missing frequency", "question": "Following distribution shows the marks of 230 students in a particular subject. If the median marks are 46, then find the values of x and y. [grouped table, total given]", "answer": "Method: use total frequency to get one equation (sum of all = N), and the median formula Median = L + ((N/2 - cf)/f)*h (with cf written in terms of the unknown) to get a second; solve simultaneously. E.g. median 46, N=230 -> x=34, y=46; median 137, N=68 -> x=13, y=8; median 50, N=90 -> p=5, q=7. Representative answer: x=34, y=46.", "explanation": "Median diya, frequencies missing: ek equation total se (sab ka jod = N), doosra median formula se Median = L + ((N/2-cf)/f)*h (cf mein unknown rakho). Dono ko simultaneously solve. Hook: 'total + median-formula = do equations'. cf median class ke pehle tak ka.", "years": ["2025", "2026"], "papers": 5, "raw": 10, "marks": 5, "types": ["LA"], "score": 19}, {"key": "G1-225", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Similarity criteria (which not true)", "question": "If in two triangles Δ DEF and Δ PQR, ∠ D = ∠ Q and ∠ R = ∠ E, then which of the following is not true?", "answer": "Method: Write the correct correspondence from the equal angles, then test each option. e.g. angle D = angle Q and angle E = angle R => correspondence D<->Q, E<->R, F<->P, so DE/QR = EF/RP = DF/QP; any option breaking this correspondence is the false one. (For angle B=angle E, angle C=angle F, AB=3DE => triangles are similar but not congruent; SAS with angle C=angle R proves the included-side proportion.)", "explanation": "Pehle equal angles se SAHI correspondence likho (kaun-sa vertex kis se match). Phir har option ki ratio check karo - jo correspondence todta hai wahi 'not true'. Correspondence galat to poora ratio galat. Order is everything.", "years": ["2025", "2026"], "papers": 5, "raw": 14, "marks": 1, "types": ["MCQ"], "score": 18}, {"key": "T2-569", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "One triangle (hypotenuse: rope/string/wire)", "question": "A kite is flying at a height of 150 m from the ground. It is attached to a string inclined at an angle of 30° to the horizontal. The length of the string is :", "answer": "Method: jab string/rope/wire (hypotenuse) involved ho, sinθ = height/length aur cosθ = base/length use karo. Kite: sin30° = 150/L ⇒ L = 300 m. (Rope: pole = 30·sin60° = 15√3 m; wire AB=5√3, length = AB/cos60° = 10√3 m; observer 1.8 m + chimney at 45° over 38.2 m ⇒ 38.2+1.8 = 40 m.)", "explanation": "Yahaan triangle ka hypotenuse (string/rope/wire/ladder) hi nikalna ya use karna hota hai. Height ke saath hypotenuse → sinθ = height/hyp. Base ke saath hypotenuse → cosθ = base/hyp. Kite 150 m, 30°: sin30°=1/2 ⇒ string = 2×150 = 300 m. Observer ki height ho to last me add karna mat bhoolna.", "years": ["2025", "2026"], "papers": 5, "raw": 12, "marks": 1, "types": ["MCQ"], "score": 17}, {"key": "G1-227", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Similarity facts (always similar?)", "question": "Which of the following statements is incorrect?", "answer": "Method: Recall which figures are always similar: all squares, all equilateral triangles, all circles are similar; congruent figures are similar; but two right triangles, or a square & rhombus of equal area, are NOT necessarily similar. For the 'are these similar' figures, test SAS/AA correspondence with the given sides/angles (e.g. AC found via similar triangle proportion).", "explanation": "Yaad rakho: saare squares, saare equilateral triangles, saare circles ALWAYS similar. Lekin do right triangles ya square-vs-rhombus zaroori nahi. 'Always similar?' MCQ mein shape ka type dekho. Side-angle wale mein SAS/AA se check karo.", "years": ["2025", "2026"], "papers": 5, "raw": 13, "marks": 1, "types": ["MCQ"], "score": 16}, {"key": "M1-336", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Find angle/radius from sector", "question": "The area of the sector of a circle of radius 12 cm is 60π cm². The central angle of this sector is :", "answer": "Method: Use Area = (θ/360)πr² and solve for θ = (Area×360)/(πr²). r=12, area=60π → θ = (60π×360)/(144π) = 150°. (area 198,r18→70°; area 55/3,r10→21°; area=7/20 of circle→θ=7/20×360=126°; minor sector 7 cm² with 30°→full circle = 7×(360/30)=84 cm².)", "explanation": "Ulta sector: area de rakha hai, angle nikaalna. Formula palto: θ = (Area × 360)/(πr²). Agar 'area circle ka X fraction hai' kahe to θ = fraction × 360 (jaise 7/20 → 126°). Memory hook: angle = (sector/whole) × 360.", "years": ["2024", "2026"], "papers": 5, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 16}, {"key": "M1-338", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Find angle/radius from sector", "question": "The length of an arc of a circle with radius 12 cm is 10π cm. The angle subtended by the arc at the centre of the circle, is :", "answer": "Method: arc = (θ/360)2πr → θ = (arc×360)/(2πr). r=12, arc=10π → θ = (10π×360)/(24π) = 150°. (PQ=11,r=6.3→100°; arc 2.2,r 2.8→45°; wire 20 cm, r=60/π→60°.) For 'area 54π, r36' first get θ then arc = 3π cm.", "explanation": "Arc se angle: formula ulta karo, θ = (arc × 360)/(2πr). Tar/wire ko mod ke arc banaya ho to wire ki lambai hi arc length hai. Tip: jab arc me π aur r me π/1 ho, π cancel ho jaata hai — calculation easy. Units check karo.", "years": ["2024", "2025", "2026"], "papers": 5, "raw": 13, "marks": 1, "types": ["MCQ"], "score": 16}, {"key": "N1-448", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "HCF & LCM by prime factorisation", "question": "The HCF of 960 and 432 is :", "answer": "Method: prime-factorise and apply HCF=lowest common powers / LCM=highest powers (or HCF×LCM=product). HCF(960,432)=48; LCM(960,240)=960; HCF(40,110,360)=10; LCM(28,44,132)=924. Nested: x=LCM(4,6,8)=24, y=LCM(3,5,7)=105 ⇒ LCM(x,y)=840=35x ⇒ p=35x.", "explanation": "MCQ me bhi base method wahi: primes me todo, HCF chhota power, LCM bada power. Chhote numbers mental factorisation se. Nested LCM (LCM ke andar LCM) me pehle andar waale nikaalo. Memory hook: 'HCF ≤ numbers, LCM ≥ numbers'.", "years": ["2024", "2025", "2026"], "papers": 5, "raw": 13, "marks": 1, "types": ["MCQ"], "score": 16}, {"key": "S2-504", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Two dice - both faces condition", "question": "Two dice are tossed simultaneously. The probability of getting odd numbers on both the dice is :", "answer": "Total = 36; multiply per-die favourable counts. Both odd: 3×3=9 ⇒1/4; both <4: 3×3=9 ⇒1/4; both vowels (A,E of A–F): 2×2=4 ⇒1/9; (x>y): 15 ⇒5/12; multiple of 2 on one & 3 on other ⇒11/36; product a perfect square ⇒8/36=2/9.", "explanation": "36 outcomes. Jab dono dice par condition ho, har die ke favourable count multiply karo (dono odd: 3×3=9 ⇒ 1/4). 'Ek par 2 ka multiple, doosre par 3 ka' mein dono orders jodo, overlap hatao. Grid banao toh aasaan.", "years": ["2024", "2025", "2026"], "papers": 5, "raw": 7, "marks": 1, "types": ["MCQ", "SA"], "score": 16}, {"key": "T1-556", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Prove identity: rationalise a surd/radical", "question": "Prove that : √(sec A - 1)/(sec A + 1) + √(sec A + 1)/(sec A - 1) = 2 cosec A", "answer": "Method: rationalise (multiply by conjugate) or write the surd as a single fraction; use sec²−1=tan², 1−sin² = cos². Representative: √((secA−1)/(secA+1))+√((secA+1)/(secA−1)) = 2cosecA.", "explanation": "Surd wali proofs me conjugate se rationalise karo ya ek hi fraction banao; sec²−1=tan², 1−sin²=cos² use hota hai. √((1−sinθ)/(1+sinθ))=secθ−tanθ bhi isi tarah. Hook: 'rationalise karo, identity lagao'.", "years": ["2023", "2025", "2026"], "papers": 5, "raw": 10, "marks": 2, "types": ["SA", "VSA"], "score": 15}, {"key": "A1-10", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Form polynomial from zeroes", "question": "Which of the following is a quadratic polynomial having zeroes -2/3 and 2/3 ?", "answer": "Method: a polynomial with zeroes α, β is k[x² − (α+β)x + αβ]. Compute the sum and product, then build it (any nonzero k works). Representative zeroes -2/3, 2/3: sum 0, product -4/9, so k(x²-4/9) = 5(9x²-4) for k=45. (If a zero is irrational like 2+√5, its conjugate is the other zero.)", "explanation": "Formula: x² − (sum)x + (product), phir kisi bhi constant se multiply karke options match karo. Zeroes diye ho to seedha sum aur product nikaalo. Agar ek zero irrational (a+√b) ho aur sum given ho, to dusra conjugate (a−√b) hota hai. k bhula mat — infinitely many polynomials possible.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 8, "marks": 1, "types": ["MCQ", "VSA"], "score": 14}, {"key": "A2-33", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Consistency", "question": "If the pair of linear equations : a1x + b1y + c1 = 0 and a2x + b2y + c2 = 0 is consistent and dependent, then", "answer": "Concept recall: consistent ⇒ lines intersect or coincide (at least one solution); consistent & dependent (coincident) ⇒ a1/a2 = b1/b2 = c1/c2 (infinite solutions); inconsistent ⇒ parallel (a1/a2 = b1/b2 ≠ c1/c2); unique solution ⇒ a1/a2 ≠ b1/b2 (e.g. ax+by=c, lx+my=n unique ⇒ am ≠ bl).", "explanation": "Theory wale definitions pakke karo: Consistent = solution milta hai (intersecting YA coincident). Dependent/coincident = ek hi line, infinite solutions, teeno ratio barabar. Inconsistent = parallel, no solution. Unique solution = a1/a2 ≠ b1/b2. Memory hook: 'consistent = dosti ho jaati hai, inconsistent = kabhi milte hi nahi'.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 8, "marks": 1, "types": ["MCQ"], "score": 14}, {"key": "C1-170", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Circle (distance)", "question": "The centre of a circle is (2a, a – 7). Find the values of 'a' if the circle passes through the point (11, –9). Radius of the circle is 5√2 cm.", "answer": "Method: distance from centre to point = radius; square and solve. Centre (2a,a-7) through (11,-9), r=5√2 → a=3,5. Centre (x-7,2x) through (-9,11) → x=3,5. Chord: OA=OB → K, then AB by distance (K=4 or -2; AB=2√17 or 8√2).", "explanation": "Circle centre se point tak doori = radius. Distance formula = radius likho, square karke unknown solve karo. r=5√2 ho to r²=50. Do unknowns me OA=OB lagao, fir AB distance se.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 11, "marks": 2, "types": ["SA", "VSA"], "score": 14}, {"key": "T2-575", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Two angles / two positions", "question": "A person standing on the bank of a river observes that the angle of elevation of the top of a tower on the opposite bank is 60°. When he moves 30 m away from the bank, he finds the angle of elevation to be 30°. Find the height of the tower and width of the river. (Take √3 = 1.732)", "answer": "Method: let height = h, nearer distance = x. From near point tan(big θ)=h/x; from far point tan(small θ)=h/(x+d). Two equations, eliminate h. River: tan60°=h/x, tan30°=h/(x+30) ⇒ x=15 m (width), h=15√3≈25.98 m. (Move 24 m: h≈20.76 m, A at 36 m. Girl 30 m tower: walks 20√3 m. Q 10 m above P: tower=15 m. Two observers 100 m: h=50√3 m.)", "explanation": "Do alag points se do angle — yahi sabse common 5-marker hai. Maan lo height h aur nazdeek wali doori x. Do equation banao: tan(bada angle)=h/x aur tan(chhota angle)=h/(x+distance). h ko cancel karke x nikaalo, fir h. Yaad: paas wala point = bada angle. Diagram me dono triangle same height par banao, √3=1.73 lagao.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 9, "marks": 5, "types": ["LA"], "score": 14}, {"key": "A1-18", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Evaluate p(x) at a point", "question": "If a polynomial p(x) is given by p(x) = x² – 5x + 6, then the value of p(1) + p(4) is :", "answer": "Method: substitute the given x-value(s) into p(x) and compute. Representative p(x)=x²-5x+6: p(1)=2, p(4)=2, so p(1)+p(4)=4. (Case-based: 'height of arch'=p(1)=9; 'max height' use vertex t=-b/2a then p there =31.25 m; 'h at t=3/2' = -6; check p(100) vs p(-100).)", "explanation": "Sirf value daal ke nikaalo — x ki jagah number rakho aur arithmetic karo. Word problems (ball/arch ki height) me bhi p(diya hua x) hi nikaalna hota hai. Max height ke liye vertex x = -b/2a par value lo. Signs aur squares dhyaan se calculate karo.", "years": ["2023", "2024", "2026"], "papers": 5, "raw": 16, "marks": 2, "types": ["Case-based", "MCQ"], "score": 13}, {"key": "C1-164", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Equidistant point", "question": "Find a relation between x and y such that the point P(x, y) is equidistant from the points A(7, 1) and B(3, 5).", "answer": "Method: PA²=PB²; expand, x²,y² cancel, get a linear relation. From (7,1),(3,5): x-y-2=0. From (5,1),(1,5): x=y. From (3,5),(7,1): x-y=2 → x-axis pt (2,0), y-axis pt (0,-2). On x+y=5 equidistant from (6,4),(5,2): (-3/2,13/2).", "explanation": "Equidistant matlab PA²=PB². Expand karo — x² aur y² cancel ho jaate, ek seedhi line ki relation bachti hai. abscissa=x, ordinate=y. Distance ka square use karo, root nahi.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 15, "marks": 2, "types": ["SA", "VSA"], "score": 13}, {"key": "C1-166", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Midpoint", "question": "The mid-point of the line segment joining the points P(-4, 5) and Q(4, 6) lies on:", "answer": "Method: midpoint=((x1+x2)/2,(y1+y2)/2). Mid of (-4,5),(4,6)=(0,5.5) → y-axis. Mid of (5,-4),(6,4)=(5.5,0) → x-axis. x/4+y/6=1 cuts axes (4,0),(0,6) → (2,3). R(2,5) mid of P(0,y),Q(x,0) → P(0,10),Q(4,0).", "explanation": "Midpoint = dono coordinates ka average: ((x₁+x₂)/2,(y₁+y₂)/2). y-axis pe ho to x=0, x-axis pe y=0. Jod ke 2 se divide — average lena hai, ghabrana nahi.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 11, "marks": 1, "types": ["Case-based", "MCQ", "VSA"], "score": 13}, {"key": "C1-171", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Distance formula", "question": "Find the length of the median through the vertex B of ∆ABC with vertices A(9, – 2), B(–3, 7) and C(–1, 10).", "answer": "Method: median to a side = distance from vertex to MIDPOINT of opposite side. ∆ A(5,-6),B(6,4),C(0,0), AD to BC: D=(3,2), AD=√68. Median through B, A(9,-2),C(-1,10): √58. A(-2,4),B(4,3),C(1,-6): BD=√145/2. D divides BC 1:2 then AD=√130/3.", "explanation": "Median: pehle samne wali side ka midpoint nikaalo, fir vertex se us midpoint tak distance. Do step: midpoint, phir distance. D ratio me ho to pehle section formula se D, fir distance.", "years": ["2024", "2025", "2026"], "papers": 5, "raw": 7, "marks": 1, "types": ["MCQ", "SA", "VSA"], "score": 13}, {"key": "M1-329", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Arc length", "question": "What is the length of the arc of the sector of a circle with radius 14 cm and of central angle 90° ?", "answer": "Method: Length of arc = (θ/360)·2πr. r=14, θ=90° → (90/360)(2)(22/7)(14) = 22 cm. (r=21,60°→22 cm; dia=10,144°→4π cm; r=32,45°→8π cm; r=42,60°→44 cm; brooch r=35/2,36°→11 mm.)", "explanation": "Arc ki length = (θ/360)·2πr — yaani circumference ka utna hi fraction jitna angle 360 ka hai. Diameter diya ho to pehle r = d/2 karo. Tip: jab θ aur r 'achhe' numbers hote hain to answer round aata hai (jaise 90° aur r=14 → 22 cm). Units same rakhna.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 13, "marks": 1, "types": ["Case-based", "MCQ", "VSA"], "score": 13}, {"key": "S2-511", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Cards - cards removed/lost", "question": "All the face cards are removed from the pack of 52 cards and a card is drawn at random from the remaining cards. Find the probability that the card so drawn is (i) a spade. (ii) not an ace.", "answer": "Recompute total after removal, then favourable/new total. Remove 12 face cards ⇒40 left; spade=10⇒1/4; not an ace=36/40=9/10. One card lost ⇒51 left; queen of heart=1/51.", "explanation": "Cards hatne par sabse pehle naya total (52 − removed) nikaalo, phir bachi category gino. Face cards (12) hatao ⇒ 40 bache. Purana 52 use mat karo — naya total lo. Diagram se gino.", "years": ["2024", "2025"], "papers": 5, "raw": 9, "marks": 2, "types": ["MCQ", "SA", "VSA"], "score": 13}, {"key": "T1-540", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Given ratio -> value of expression", "question": "If 2 tan A = 3, then the value of (4 sin A + 3 cos A) / (4 sin A - 3 cos A) is", "answer": "Method: divide num & den by cosθ to bring in tanθ (or build the triangle / use the conjugate), then substitute. Representative: 2tanA=3 ⇒ (4sinA+3cosA)/(4sinA−3cosA)=(4tanA+3)/(4tanA−3)=9/3=3. Also secθ−tanθ=m ⇒ secθ+tanθ=1/m since (sec−tan)(sec+tan)=1.", "explanation": "Expression me upar-neeche cosθ se divide karo taaki tanθ aa jaye, phir value daalo. (secθ−tanθ)(secθ+tanθ)=1 ek favourite trick hai. Hook: 'cos se divide → tan banao' / 'product = 1'.", "years": ["2023", "2025", "2026"], "papers": 5, "raw": 19, "marks": 1, "types": ["MCQ", "VSA"], "score": 13}, {"key": "C1-157", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Section formula", "question": "Two of the vertices of Δ PQR are P(−1, 5) and Q(5, 2). The coordinates of a point which divides PQ in the ratio 2:1 are:", "answer": "Method: P dividing A(x1,y1),B(x2,y2) in m:n = ((m·x2+n·x1)/(m+n),(m·y2+n·y1)/(m+n)). P(-1,5),Q(5,2) in 2:1 → (3,3). A(4,-5),B(1,2) in 5:2 → (13/7,0). Ratio 1:3 / 2:1 internally → plug into formula.", "explanation": "Section formula: P=((m·x2+n·x1)/(m+n),(m·y2+n·y1)/(m+n)). Ratio m:n me cross-multiply karke jodo. Hook: 'pehle point ko n, doosre ko m'. Ratio diya ho to seedha formula laga do.", "years": ["2024", "2025"], "papers": 5, "raw": 18, "marks": 2, "types": ["Case-based", "MCQ", "VSA"], "score": 12}, {"key": "N1-439", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Rational vs irrational classification", "question": "√0.4 is a/an (A) natural number (B) whole number (C) rational number (D) irrational number", "answer": "Method: simplify and check whether the surd fully cancels. p²=32/50=16/25 ⇒ p=4/5 rational; √0.4=√(2/5) irrational; √3·√27=9 (rational pair); √20·√5=10; (1+√3)²−(1−√3)²=4√3 irrational; (√3+2)²+(√3−2)²=14 rational.", "explanation": "Pehle simplify karo, fir dekho √ poori cancel hui ya nahi — surd bacha to irrational, warna rational. Yaad: (a+b)²−(a−b)²=4ab aur (a+b)²+(a−b)²=2(a²+b²); plus waala rational, minus waala surd chhodta hai. √(decimal) ko fraction banakar test karo.", "years": ["2023", "2024", "2025"], "papers": 5, "raw": 14, "marks": 1, "types": ["MCQ"], "score": 12}, {"key": "S2-507", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Coins - three coins", "question": "Three coins are tossed simultaneously. What is the probability of getting (i) at least one head ? (ii) exactly two tails ? (iii) at most one tail ?", "answer": "Three coins ⇒ 8 outcomes. At least one head=7/8; exactly two tails=3/8; at most one tail=4/8=1/2; exactly one head=3/8; exactly one tail=3/8; two heads & one tail=3/8; at most two heads=7/8.", "explanation": "Teen sikke = 8 outcomes (2×2×2): HHH...TTT. 'At least one head' = 1 − P(TTT) = 7/8. 'Exactly two tails' = 3/8. Hook: poora 8-list banao phir match karo. Common galti — outcomes 4 ya 6 ginna; hamesha 8.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 9, "marks": 3, "types": ["MCQ", "SA"], "score": 12}, {"key": "S2-514", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Numbered tickets - number property", "question": "A box contains 90 discs, numbered from 1 to 90. If one disc is drawn at random from the box, the probability that it bears a prime number less than 23 is", "answer": "List favourable (prime / odd-prime / even-prime / composite) numbers in range and divide. Primes <23 in 1–90: {2,3,5,7,11,13,17,19}=8 ⇒8/90=4/45. Odd prime in 1–9: {3,5,7}=3 ⇒1/3. Even prime 1–30: only 2 ⇒1/30. Composite 1–25: 15 ⇒15/25.", "explanation": "Prime, composite, even-prime sab number-properties. Favourable numbers list karke total se divide. Even prime sirf 2 hota hai (akela!). Composite = na prime na 1. Range aur '<23' jaisi condition miss mat karna.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 11, "marks": 1, "types": ["MCQ"], "score": 12}, {"key": "T1-548", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Solve two angle equations for A & B", "question": "If 2 sin (A + B) = √3 and cos (A – B) = 1, then find the measures of angles A and B. 0 ≤ A, B, (A + B) ≤ 90°.", "answer": "Method: convert each given (e.g. sin(A−B)=1/2, cos(A+B)=1/2) into A±B = a standard angle, then solve the two linear equations. Representative: A−B=30°, A+B=60° ⇒ A=45°, B=15°.", "explanation": "Do equations milti hain — har ek ko standard angle me badlo, phir A+B aur A−B se A,B nikaalo (add/subtract). Hook: 'A+B aur A−B nikaalo phir solve'.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 13, "marks": 2, "types": ["SA", "VSA"], "score": 12}, {"key": "T1-552", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Prove identity: tanθ/(1−cotθ)+cotθ/(1−tanθ) (a³−b³)", "question": "Prove that : tan θ/(1-cot θ) + cot θ/(1-tan θ) = 1 + sec θ cosec θ", "answer": "Method: write tan & cot as sin/cos, take common denominators; the numerators give a sin³−cos³, factor with a³−b³=(a−b)(a²+ab+b²) and cancel (sinθ−cosθ). Result: 1+secθ·cosecθ (or 1+tanθ+cotθ).", "explanation": "Yeh classic proof hai: tan,cot ko sin/cos banao, common denominator lo, upar sin³−cos³ banta hai — a³−b³ formula se factor karke (sinθ−cosθ) cancel karo. Hook: 'a³−b³ wali identity yaad rakho'. Answer 1+secθcosecθ.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 11, "marks": 3, "types": ["SA"], "score": 12}, {"key": "T1-553", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Prove identity: (num±1)/(den±1) using sec²−tan²=1", "question": "Prove that (1 + sec θ - tan θ) / (1 + sec θ + tan θ) = (1 - sin θ) / cos θ.", "answer": "Method: in expressions like (1+secθ−tanθ)/(1+secθ+tanθ), replace the '1' using sec²−tan²=1=(secθ−tanθ)(secθ+tanθ), factor, and cancel a common bracket. Representative: simplifies to (1−sinθ)/cosθ.", "explanation": "In proofs me '1' ko sec²θ−tan²θ se replace karo (=( secθ−tanθ)(secθ+tanθ)), phir factor karke common bracket cancel. cosA+sinA−1 wale me cosecA−cotA aata hai. Hook: '1 ko sec²−tan² banao, factor karo'.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 8, "marks": 3, "types": ["SA"], "score": 12}, {"key": "A2-49", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "The sum of the digits of a 2-digit number is 14. The number obtained by interchanging its digits exceeds the given number by 18. Find the number.", "answer": "Method: let tens digit = x, units = y; the number = 10x+y, reversed = 10y+x. Form two equations from the conditions and solve. e.g. x+y=14 and (10y+x)–(10x+y)=18 ⇒ x=6, y=8 ⇒ number 68.", "explanation": "Two-digit number ka golden rule: number = 10×(tens digit) + (units digit), aur reverse = 10×units + tens. x = tens, y = units lo. Digit-sum aur reverse-difference se do equations banao. Common galti: number ko sidha 'xy' likh dena — nahi! 10x+y likhna. Reverse 'exceeds by 18' matlab reversed – original = 18.", "years": ["2023", "2024", "2026"], "papers": 5, "raw": 5, "marks": 5, "types": ["LA", "SA"], "score": 11}, {"key": "C1-155", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Ratio of division", "question": "Find the ratio in which y-axis divides the line segment joining the points (5, – 6) and (– 1, – 4).", "answer": "Method: y-axis means x=0. Ratio k:1, set section-formula x=(k·x2+x1)/(k+1)=0, solve k. (5,-6)&(-1,-4): k=5 → 5:1, point (0,-13/3). P(-4,-2),Q(10,4) divided by y-axis → 2:5.", "explanation": "y-axis pe x=0 hota hai. Ratio k:1 lekar section formula ka x-coordinate=0 karo, k mil jaayega. Trick: 'jis axis pe kaat raha hai uska doosra coordinate 0'. Phir ratio aur point dono.", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 11, "marks": 3, "types": ["MCQ", "SA", "VSA"], "score": 11}, {"key": "S2-506", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Coins - two coins", "question": "Two coins are tossed simultaneously. The probability of getting atleast one head is", "answer": "Two coins ⇒ {HH,HT,TH,TT}=4. At least one head=3/4; at least one tail=3/4; at most one head=3/4; at most one tail=3/4; a head and a tail={HT,TH}=2/4=1/2.", "explanation": "Do sikke = 4 outcomes: HH, HT, TH, TT. 'At least one head' mein HH bhi chalega — 3 ⇒ 3/4. 'At most one head' = HT,TH,TT = 3/4. Pehle 4 outcomes likho, phir gino. 3 outcomes mat ginna!", "years": ["2023", "2024", "2025", "2026"], "papers": 5, "raw": 9, "marks": 1, "types": ["MCQ", "SA", "VSA"], "score": 11}, {"key": "A1-2", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Zeroes ↔ coefficients", "question": "If α, β are the zeroes of a polynomial p(x) = x² + x − 1, then 1/α + 1/β equals to", "answer": "Method: for ax²+bx+c, sum α+β = -b/a and product αβ = c/a. Then 1/α + 1/β = (α+β)/(αβ). Representative p(x)=x²+x-1: (α+β)=-1, αβ=-1, so 1/α+1/β = -1/-1 = 1.", "explanation": "Pehle α+β = -b/a aur αβ = c/a nikaalo. Phir 1/α+1/β = (α+β)/(αβ) — yaani sum upar, product neeche. Sign ka dhyaan rakhna (-b/a me minus bhoolna sabse common galti hai!).", "years": ["2023", "2024", "2026"], "papers": 5, "raw": 8, "marks": 1, "types": ["MCQ", "VSA"], "score": 10}, {"key": "T1-555", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Prove identity: product of brackets -> sin/cos", "question": "Prove that (cosec A – sin A) (sec A – cos A) = 1 / (cot A + tan A)", "answer": "Method: convert each bracket to sin/cos, multiply, simplify with sin²+cos²=1. Representative: (cosecA−sinA)(secA−cosA)=(cos²A/sinA)(sin²A/cosA)=sinAcosA = 1/(cotA+tanA).", "explanation": "Har bracket ko sin/cos me kholo, multiply karo, sin²+cos²=1 se simplify. cosec−sin=cos²/sin jaise reduce hota hai. Hook: 'sab sin/cos, phir guna karo'.", "years": ["2023", "2024", "2025"], "papers": 5, "raw": 8, "marks": 3, "types": ["SA"], "score": 10}, {"key": "T2-566", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Shadow problems", "question": "The length of the shadow of a tower on the plane ground is √3 times the height of the tower. Find the angle of elevation of the sun.", "answer": "Method: ek hi right triangle banao, tanθ = height / shadow. Shadow = √3·h ⇒ tanθ = 1/√3 ⇒ θ = 30°. (Pole 6 m, shadow 2√3 ⇒ tanθ=6/2√3=√3 ⇒ 60°; shadow = height ⇒ tanθ=1 ⇒ 45°; pole:shadow = 1:√3 ⇒ 30°). Representative: shadow = √3·h ⇒ Sun's elevation = 30°.", "explanation": "Shadow wale sawaal me hamesha tanθ = perpendicular(height)/base(shadow) lagao. Jo bhi ratio mile, standard values yaad rakho: tan30°=1/√3, tan45°=1, tan60°=√3. Shadow lambi (√3 guna) matlab Sun neeche (30°), shadow choti matlab Sun upar. Diagram zaroor banao taaki height aur shadow confuse na ho.", "years": ["2023", "2024", "2026"], "papers": 5, "raw": 14, "marks": 1, "types": ["MCQ", "VSA"], "score": 10}, {"key": "T2-578", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Observer at a height (two parts)", "question": "The angles of depression of the top and the bottom of a 50 m high building from the top of a tower are 45° and 60°, respectively. Find the height of the tower. (Use √3 = 1.73)", "answer": "Method: observer height H, horizontal gap x. Depression to BOTTOM gives tan(θ_bottom)=H/x; depression to TOP gives tan(θ_top)=(H−h)/x (h = other building's height). Two equations ⇒ H and x. 50 m building, 45°&60°: H=√3·x and x=H−50 ⇒ H≈118.25 m. (8 m building 30°&45° ⇒ H=4(3+√3); building→cable tower elev60°+depr30° from 7 m ⇒ tower=28 m; window 15 m ⇒ opp house 23.66 m.)", "explanation": "Observer khud kisi height (tower/building/window) par hai. Neeche wale (bottom/foot) ka angle poori height H deta hai: tanθ = H/x. Upar wale (top) ka angle (H−h) deta hai. Dono se x cancel karke answer. Building-se-tower me: top ka elevation + foot ka depression — bas tan ratios jod do. Hamesha horizontal gap x ko bridge banao.", "years": ["2023", "2024", "2025"], "papers": 5, "raw": 10, "marks": 5, "types": ["LA"], "score": 10}, {"key": "C1-154", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Ratio of division", "question": "Find the ratio in which the line segment joining the points A(6, 3) and B(-2, -5) is divided by x-axis.", "answer": "Method: x-axis means y=0. Let it divide AB in k:1 and set section-formula y=(k·y2+y1)/(k+1)=0, solve k. A(6,3),B(-2,-5): (-5k+3)/(k+1)=0 → k=3/5, ratio 3:5. (2,-3)&(5,6) → 1:2, point (3,0). (-6,5)&(-4,-1) → 5:1, point (-13/3,0).", "explanation": "x-axis pe point ka y=0 hota hai. Ratio k:1 maano aur section formula ka y-coordinate=0 set karke k nikaalo. Hook: 'x-axis → y=0'. Ratio = k:1, fir chaaho to intersection point bhi nikaal lo.", "years": ["2023", "2024", "2026"], "papers": 5, "raw": 10, "marks": 3, "types": ["MCQ", "SA"], "score": 9}, {"key": "S1-475", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Mean (direct)", "question": "Find the mean rainfall in this season.  [grouped frequency distribution]", "answer": "Method: class-marks x_i=(lower+upper)/2, compute Sum f_i x_i and Sum f_i, then Mean = Sum f_i x_i / Sum f_i (direct method). Rainfall: 20400/24 = 850 mm; marks data: 2400/100 = 24; race time: 1720/40 = 43. If one frequency is missing it follows from the total count, then proceed. Representative answer: 850 mm.", "explanation": "Grouped mean (direct): har class ka mid-point nikaalo, f*x jodo, Mean = Σf x/Σf. Rainfall 850, marks 24, race 43. Missing freq ho toh total se nikaalo phir mean. Hook: 'mid-point, f se guna, sab jodo, total se bhaag'.", "years": ["2023", "2024", "2025"], "papers": 5, "raw": 13, "marks": 2, "types": ["Case-based", "LA", "SA"], "score": 9}, {"key": "T1-554", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Prove identity: add two fractions over common denominator", "question": "Prove that : sin θ / (1 + cos θ) + (1 + cos θ) / sin θ = 2 cosec θ", "answer": "Method: take the two fractions over a common denominator; numerator simplifies via sin²+cos²=1. Representative: sinθ/(1+cosθ)+(1+cosθ)/sinθ = (sin²θ+(1+cosθ)²)/((1+cosθ)sinθ) = 2/sinθ = 2cosecθ.", "explanation": "Do fractions ko common denominator pe lao, numerator ko sin²+cos²=1 se simplify karo. (a/b+b/a) wale me numerator a²+b² banta hai. Hook: 'common denominator, phir identity'.", "years": ["2023", "2024", "2025"], "papers": 5, "raw": 7, "marks": 3, "types": ["SA"], "score": 9}, {"key": "T1-557", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Prove identity: power reduction (sin⁴/sin⁶, 2sin³)", "question": "Prove that sin⁶ θ + cos⁶ θ = 1 – 3 sin² θ cos² θ.", "answer": "Method: use a³±b³ / (a²+b²)=(a+b)²−2ab on sin/cos powers, or factor 1−2sin²θ=cos2θ. Representative: sin⁶θ+cos⁶θ=1−3sin²θcos²θ; (sinA−2sin³A)/(2cos³A−cosA)=tanA after factoring.", "explanation": "Higher-power proofs me a³+b³=(a+b)(a²−ab+b²) aur (a²+b²)=(a+b)²−2ab use karo. (sinA−2sin³A) me sinA(1−2sin²A) factor karo, 1−2sin²A=2cos²A−1. Hook: 'factor karo, sin²+cos²=1'.", "years": ["2023", "2024", "2025"], "papers": 5, "raw": 9, "marks": 3, "types": ["SA"], "score": 9}, {"key": "T2-577", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Angle of depression (two objects)", "question": "As observed from the top of a 75 m high lighthouse from the sea-level, the angles of depression of two ships are 30° and 60°. If one ship is exactly behind the other on the same side of the lighthouse, find the distance between the two ships. (Use √3 = 1.73)", "answer": "Method: depression angle = elevation angle at the object. Same height H, two ground triangles. Far object distance = H/tan(small θ), near = H/tan(big θ). Same side ⇒ subtract; opposite sides ⇒ add. Lighthouse 75 m: 75√3 − 25√3 = 50√3 ≈ 86.5 m. (Opposite-side ships/cars: add. Given distance ⇒ solve for height, e.g. 100 m.)", "explanation": "Upar se do object dekhna — har object ka depression angle uske elevation ke barabar (alternate angle). Ek hi height H se do triangle: distance = H/tanθ (chhota angle = door object). SAME side ⇒ doorian ghatao (bada − chhota); OPPOSITE side ⇒ jodo. Yahi same/opposite waala step sabse zyada galti karwata hai — diagram dekh ke decide karo.", "years": ["2023", "2024", "2025"], "papers": 5, "raw": 11, "marks": 5, "types": ["LA"], "score": 9}, {"key": "A1-20", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Sum/product of zeroes", "question": "The sum of the zeroes of the polynomial p(x) = 5x – 7x² + 3 is :", "answer": "Method: arrange in standard form ax²+bx+c, then sum = -b/a, product = c/a. Representative -7x²+5x+3: a=-7, b=5, sum = -5/-7 = 5/7. (For x²-1: sum=0. Ratio sum:product = (-b/a):(c/a) = -b:c.)", "explanation": "Standard form me likho (powers ghatte kram me!), phir sum = -b/a, product = c/a. Sabse badi galti: term ko reorder kiye bina coefficient utha lena. -b/a ka minus aur sign sambhaalo. Ratio poochhe to (-b):(c).", "years": ["2023", "2024", "2025"], "papers": 5, "raw": 8, "marks": 1, "types": ["MCQ"], "score": 8}, {"key": "A1-0", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Zeroes from graph", "question": "The graph of y = p(x) is given, for a polynomial p(x). The number of zeroes of p(x) from the graph is [FIGURE: graph of a parabola intersecting x-axis at two points]", "answer": "Method: number of zeroes = number of points where the curve CUTS/touches the x-axis. A parabola cutting the x-axis at two points has 2 zeroes; touching at one point gives 1; not meeting it gives 0. Representative (parabola cutting x-axis twice): 2 zeroes.", "explanation": "Zeroes = jitni baar curve x-axis ko cut/touch karti hai, utne hi zeroes. Do baar cut kare to 2, ek jagah chhue to 1, naa chhue to 0. Yaad rakho: y-axis se confuse mat hona, sirf x-axis ke intersection ginne hain!", "years": ["2023", "2026"], "papers": 4, "raw": 9, "marks": 1, "types": ["MCQ"], "score": 13}, {"key": "A1-11", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Form polynomial from sum & product", "question": "If the sum and the product of zeroes of a quadratic polynomial are 2√3 and 3 respectively, then a quadratic polynomial is :", "answer": "Method: polynomial = k[x² − (sum)x + (product)]. Plug the given sum and product directly. Representative sum 2√3, product 3: x² − 2√3 x + 3 = (x−√3)². (For 'sum=product' type, pick a poly where -b/a = c/a, e.g. 3x²-2x+2.)", "explanation": "Sum aur product diye ho to direct: x² − (sum)x + (product). Bas values daalo. Sign yaad rakho — middle term me sum ka MINUS aata hai. 'Sum = product' wale me condition -b/a = c/a check karke option chuno.", "years": ["2024", "2025", "2026"], "papers": 4, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 13}, {"key": "A3-89", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Word problem: geometry (Pythagoras)", "question": "The perimeter of a right triangle is 60 cm and its hypotenuse is 25 cm. Find the lengths of other two sides of the triangle.", "answer": "Express the sides in one variable, apply Pythagoras (a²+b²=hyp²) or area=½·base·height, simplify to a quadratic and reject the negative length. Perimeter 60, hyp 25: x+y=35 & x²+y²=625 ⇒ x²−35x+300=0 ⇒ sides 15 cm & 20 cm. (Circular park, PA=PB+35, AB diameter 65: x²+(x+35)²=65² ⇒ x=25 ⇒ 25 m & 60 m.)", "explanation": "Right-triangle word problems me sabse pehle Pythagoras lagao: (perpendicular)²+(base)²=(hypotenuse)². Sides ko ek variable me likho, equation banao, quadratic solve karo. Diagram zaroor banao! Negative length reject. Tip: angle in semicircle = 90°, isliye park wale me bhi right angle banta hai.", "years": ["2025", "2026"], "papers": 4, "raw": 10, "marks": 5, "types": ["LA"], "score": 13}, {"key": "G2-255", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents and centre", "question": "In the given figure, PA is a tangent from an external point P to a circle with centre O. If ∠ POB = 115°, then ∠ APO is equal to :[FIGURE: Circle with center O. Point P outside the circle. PA is a tangent to the circle at A. OB is a radius. Line segment OA is also a radius. Line segment PO is drawn. Angle POB is 115 degrees.]", "answer": "Use right triangle OAP (angle OAP=90). E.g. angle POB=115 gives angle POA=65 so angle APO = 90-65 = 25. angle APB=80 gives angle AOP = 90 - half(APB) so angle POA=50. The POA=120 case uses angle AOB then halving.", "explanation": "Tangent point par 90 banta hai, isliye right triangle OAP me baaki angle 90 me se aate hain (angle APO = 90 - angle AOP). Diye angle ka complement lo. Hook: right triangle me 90 baaki do me baant-ta hai.", "years": ["2025", "2026"], "papers": 4, "raw": 12, "marks": 1, "types": ["Case-based", "MCQ"], "score": 13}, {"key": "S1-483", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Missing frequency", "question": "The following distribution shows the daily pocket allowance of children of a locality. The mean daily pocket allowance is Rs 36.10. Find the missing frequency, f. [grouped table]", "answer": "Method: form Mean = Sum f_i x_i / Sum f_i, substitute the given mean and the unknown frequency, and solve. With two unknowns add the total-frequency equation and solve simultaneously. E.g. mean 36.10 -> f = 6; mean 35 & total 25 -> x=3, y=5; mean 28 & total 100 -> p=18, q=17. If asked 'hence find mode', then apply the mode formula. Representative answer: f = 6.", "explanation": "Mean diya, frequency missing: Mean = Σf x/Σf banao, mean ki value daal ke unknown solve karo. Do unknown ho toh total wali equation bhi banao aur simultaneously solve. Hook: 'mean ka equation banao, frequency nikaalo'. Phir mode poochein toh modal-class formula.", "years": ["2024", "2025", "2026"], "papers": 4, "raw": 5, "marks": 5, "types": ["LA"], "score": 13}, {"key": "A2-40", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Graphical method", "question": "Solve the following system of equations graphically : x – 2y = 3, 3x – 8y = 7", "answer": "Method: for each equation make a table of ≥2 points (put x=0, y=0 etc.), plot both straight lines on graph paper; their intersection point is the solution. e.g. x–2y=3 & 3x–8y=7 meet at (5, 1); 3x+y+4=0 & 3x–y+2=0 at (–1, –1); 2x+3y=5 & –3x+y=–2 at (1, 1).", "explanation": "Graphical method: har equation ke liye 2-3 points ki table banao (x=0 daalo y nikaalo, y=0 daalo x nikaalo), phir dono lines graph paper par kheecho. Jahan lines KAATTI hain wahi (x,y) solution hai. Tip: points integer rakho taaki plotting easy ho, aur scale clearly likho. Intersection point graph se padho aur verify karo.", "years": ["2024", "2026"], "papers": 4, "raw": 11, "marks": 5, "types": ["LA", "SA"], "score": 12}, {"key": "A1-19", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Form polynomial: transformed zeroes", "question": "Obtain the zeroes of the polynomial 7x² + 18x – 9. Hence, write a polynomial each of whose zeroes is twice the zeroes of given polynomial.", "answer": "Method: find old zeroes (or use α+β, αβ); transform each zero by the rule (2α, α-1, α+2, 3α, 1/α, etc.); compute the NEW sum and product; build k[x² − (new sum)x + (new product)]. Representative 7x²+18x-9 (zeroes -3, 3/7): new zeroes -6, 6/7 → x²+(36/7)x-(36/7) i.e. 7x²+36x-36.", "explanation": "Do-step game: (1) purane zeroes (ya unka sum/product) lo, (2) rule lagao (double, +1, reciprocal...) phir NAYA sum-product nikaal ke x²−(sum)x+(product) banao. Tip: scaling/shifting me poore expression par rule lagao. Reciprocal me coefficients ulat jaate hain.", "years": ["2024", "2025"], "papers": 4, "raw": 12, "marks": 3, "types": ["MCQ", "SA"], "score": 11}, {"key": "G1-203", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Geometric mean / CPCT relation", "question": "D is a point on the side BC of a triangle ABC such that ∠ADC = ∠BAC, prove that CA² = CB.CD", "answer": "Method: angle ADC = angle BAC (or angle APC = angle BAC) and common angle C => triangle CAD ~ triangle CBA (AA). Corresponding sides give CA/CB = CD/CA, hence CA^2 = CB.CD (i.e. AC^2 = BC.CP).", "explanation": "Jab ek angle equal ho aur ek angle common ho, AA similarity lagao. Phir corresponding sides ka ratio likho aur cross-multiply -> CA^2 = CB.CD (geometric-mean type). Yeh 'square = product' result similarity se hi aata hai.", "years": ["2023", "2025", "2026"], "papers": 4, "raw": 5, "marks": 2, "types": ["LA", "VSA"], "score": 11}, {"key": "S2-524", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Coloured balls - find unknown", "question": "A jar contains 54 marbles, each of which is blue, green or white. The probability of selecting a blue marble at random is 1/3, and a green marble is 4/9. How many white marbles does this jar contain ?", "answer": "Use P(white)=1−P(blue)−P(green) (or 1−P(other)), then white = P×total. 1−1/3−4/9=2/9 ⇒ white=2/9×54=12. Green/yellow: P(other)=1−given, count = P×total (e.g. 2/5×25=10). Guess x/12 with P(wrong)=5/6 ⇒ x=2.", "explanation": "Find-unknown with ek di hui probability: complement se baaki probability nikaalo, phir count = P × total. White = (1 − 1/3 − 4/9)×54 = 2/9×54 = 12. Guessing waale (x/12) mein x/12 + P(galat) = 1 ⇒ x nikaalo.", "years": ["2024", "2025", "2026"], "papers": 4, "raw": 9, "marks": 2, "types": ["MCQ", "SA", "VSA"], "score": 11}, {"key": "T2-579", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Moving object (speed / time)", "question": "The angle of elevation of an aircraft from a point A on the ground is 60°. After a flight of 30 seconds, the angle of elevation changes to 30°. The aircraft is flying
