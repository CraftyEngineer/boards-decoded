ectangle = π(5²) − (8×6) = 78.5 − 48 = 30.5 cm². (π=3.14.)", "explanation": "Rectangle circle ke andar fit hai → rectangle ka diagonal = circle ka diameter. Diagonal = √(l²+b²) = √(64+36) = 10, to r = 5. Shaded = circle area − rectangle area. Memory hook: 'inscribed rectangle → diagonal = diameter'. Phir πr² − l×b.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "M1-352", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Shaded region", "question": "A design consists of a triangle AOB and a quadrant ODCO (radius 7 cm) cut from it. Answer: (i) area of the quadrant ODCO, (ii) area of ΔAOB, (iii) total cost of silver-plating the shaded part ABCD at ₹20/cm², (iii-OR) length of arc CD.", "answer": "Method: Quadrant ODCO = (90/360)πr² = (1/4)(22/7)(49) = 38.5 cm². ΔAOB = (1/2)(10)(10) = 50 cm². Shaded ABCD = ΔAOB − quadrant = 50 − 38.5 = 11.5 cm²; cost = 11.5×20 = ₹230. Arc CD = (90/360)2πr = (1/4)(2)(22/7)(7) = 11 cm. (Several rows here carry mismatched OCR answers — use these values.)", "explanation": "Case study ko tukdo me todo: (1) quadrant = (1/4)πr², (2) triangle = (1/2)×base×height, (3) shaded = triangle − quadrant, cost = shaded × rate, (4) arc CD = (1/4)×2πr. Tip: 'cost' me area ko rate se multiply karna. Yaad: quadrant matlab 90° wala sector.", "years": ["2023"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "M1-353", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Combined figures", "question": "A playground has a semi-circular parking area (radius 7/2) with two small quadrants. Answer: total perimeter of the parking area; total area of parking and the two quadrants; ratio of playground area to parking area; cost of fencing at ₹2 per unit.", "answer": "Method: Perimeter of semicircular parking = πr + 2r = (22/7)(7/2)+2(7/2) = 18 units. Area = semicircle (1/2)πr² + 2 quadrants. Ratio playground:parking = 98:(77/4) = 56:11. Fencing perimeter = 2(l+b)+πr = 2(14+7)+11 = 53 units → cost = 53×2 = ₹106.", "explanation": "Combined figure ko part-by-part lo: semicircle ka perimeter = πr + 2r (diameter wali seedhi line + curved part). Areas alag-alag jod do. Ratio = playground area ÷ parking area, simplify. Fencing me sirf bahar wali boundary lo. Memory hook: semicircle perimeter me 2r (diameter) jodna mat bhoolo.", "years": ["2023"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "M1-357", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Sector area", "question": "In a circle of radius 21 cm, an arc subtends an angle of 60° at the centre. Find the area of the sector formed by the arc. Also, find the length of the arc.", "answer": "Method: Area of sector = (θ/360)πr² = (60/360)(22/7)(21²) = 231 cm². Length of arc = (θ/360)2πr = (60/360)(2)(22/7)(21) = 22 cm.", "explanation": "Do cheezein ek saath: sector area = (θ/360)πr² aur arc = (θ/360)·2πr. Dono me wahi θ/360 fraction hai — ek baar nikaal lo to dono jaldi ho jaate hain. r=21, 60° → area 231, arc 22. Tip: area me r², length me r (ek hi r).", "years": ["2023"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 1}, {"key": "M2-369", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of a single solid (cylinder)", "question": "Curved surface area of a cylinder of height 5 cm is 94.2 cm². Radius of the cylinder is (Take π = 3.14)", "answer": "Method: use CSA of cylinder = 2πrh (and TSA = 2πr(r+h) for a closed cylinder). From 2πrh = 94.2 with h=5, π=3.14 → r = 3 cm. For the closed hollow cylinder (h=2.4 m, r=0.7 m), area of sheet = 2πr(r+h) = 13.64 m².", "explanation": "Cylinder me do hi formula yaad rakho: CSA = 2πrh aur TSA = 2πr(r+h). Jo diya hai usme se r ya area nikaalna hota hai — bas formula me daalo aur solve karo. Tip: 'closed' cylinder maange to TSA (dono circle add), warna sirf CSA.", "years": ["2023"], "papers": 1, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "M2-370", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of a single solid (cone)", "question": "The curved surface area of a cone having height 24 cm and radius 7 cm, is", "answer": "Method: slant height l = √(r²+h²), then CSA of cone = πrl. With r=7, h=24 → l=25, CSA = (22/7)(7)(25) = 550 cm².", "explanation": "Cone me pehle slant height nikaalo: l = √(r²+h²) — yeh sabse common galti hai, log h ko hi l maan lete hain. Phir CSA = πrl. Yaad rakho 7-24-25 ek Pythagoras triplet hai.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "M2-373", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Volume of combination (ice-cream cone + hemisphere)", "question": "An empty cone is of radius 3 cm and height 12 cm. Ice-cream is filled in it so that lower part of the cone which is (1/6)th of the volume of the cone is unfilled but hemisphere is formed on the top. Find volume of the ice-cream. (Take π = 3.14) [FIGURE: cone with a hemisphere on top]", "answer": "Method: cone volume = (1/3)πr²h = 36π. Filled cone part = (5/6)(36π)=30π. Hemisphere on top = (2/3)πr³ = 18π. Total ice-cream = 30π+18π = 48π = 150.72 cm³.", "explanation": "Ice-cream wale me cone ka filled part + upar ka hemisphere jodo. Pehle pura cone volume (1/3)πr²h, phir jitna bhara hai uska fraction lo (yahan 5/6), aur uppar hemisphere (2/3)πr³ add karo. Units aur π same rakhna.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 1}, {"key": "M2-374", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of a single solid (cylinder)", "question": "Find the area of the base of the cylindrical cup.", "answer": "Method: area of circular base = πr². With diameter 7 cm, r=3.5 → πr² = (22/7)(3.5)² = 38.5 cm². (Note: id 306–309 are an OCR-garbled set whose printed answers refer to a triangle/sector painting problem, but the asked text is the cup's base area.)", "explanation": "Base of a cylinder ek circle hai, to area = πr². Diameter diya ho to aadha karke r lo. Bas (22/7) ya 3.14 use karke multiply. Simple — par diameter ko radius samajhne ki galti mat karna.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "M2-375", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Capacity / volume of a single solid", "question": "What is the capacity of the hemispherical cup ?", "answer": "Method: capacity of hemisphere = (2/3)πr³; capacity of cylinder = πr²h. E.g. hemisphere r=10.5 → (2/3)π(10.5)³ = 2425.5 cm³; cylinder r=3.5,h=14 → πr²h = 539 cm³.", "explanation": "Capacity matlab volume (kitna paani aayega). Hemisphere ka (2/3)πr³, cylinder ka πr²h. Question 'hemispherical' ya 'cylindrical' bol raha hai — uska formula uthao. ml aur cm³ same cheez hoti hai.", "years": ["2023"], "papers": 1, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 1}, {"key": "M2-376", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of a single solid (cylinder)", "question": "What is the curved surface area of the cylindrical cup ?", "answer": "Method: CSA of cylinder = 2πrh. With r=3.5, h=14 → 2(22/7)(3.5)(14) = 308 cm².", "explanation": "Cylinder ka curved surface area = 2πrh (sirf paaslon wala part, upar-neeche ke circle nahi). Diameter se radius nikaalo, phir formula me daalo.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "M2-378", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Volume of combination of solids", "question": "A student was asked to make a model shaped like a cylinder with two cones attached to its ends by using a thin aluminium sheet. The diameter of the model is 3 cm and its total length is 12 cm. If each cone has a height of 2 cm, find the volume of air contained in the model.", "answer": "Method: volume = cylinder + 2 cones = πr²h_cyl + 2·(1/3)πr²h_cone. r=1.5, cylinder length=12−2(2)=8, cone h=2 → 18π + 2(1.5π) = 21π = 66 cm³.", "explanation": "Combination ka volume = beech ka cylinder + dono cones. Pehle cylinder ki height nikaalo = total length − 2×(cone height). Phir πr²h + 2×(1/3)πr²h. Radius dono ke liye same hai, isliye easy.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "M2-379", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (solid with a cavity)", "question": "From a solid cylinder of height 20 cm and diameter 12 cm, a conical cavity of height 8 cm and radius 6 cm is hallowed out. Find the total surface area of the remaining solid.", "answer": "Method: TSA = CSA of cylinder + area of top base ring/circle + CSA of cone (the cavity's slant surface). l=√(6²+8²)=10. TSA = 2πrh + πr² + πrl = πr(2h+r+l) = (22/7)(6)(40+6+10) = 1056 cm².", "explanation": "Cavity wale me bahar ka surface + andar ka exposed surface jodo, par jo face cut hua usko ghata do/uska circle dhyaan se lo. Yahan cylinder ki CSA + niche/upar ka circle + cone ki CSA (slant). Slant l=√(r²+h²) zaroor nikaalo.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "M2-381", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Capacity / flow rate problems", "question": "Water in a river which is 3 m deep and 40 m wide is flowing at the rate of 2 km/h. How much water will fall into the sea in 2 minutes?", "answer": "Method: volume per time = (cross-section area)×(distance flowed). Distance in 2 min at 2 km/h = 2000×(2/60) m. Volume = 3×40×(2000/30) = 8000 m³.", "explanation": "Flow problems me: volume = depth × width × (speed × time). Speed ko same unit me laao (km/h ko m/min). 2 km/h matlab 2000/60 m per min. Phir cross-section area × distance. Units consistent rakhna sabse important.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "M2-382", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of a single solid (hemisphere)", "question": "Find the surface area of one such dimple.", "answer": "Method: a dimple is a hemispherical depression, curved SA = 2πr². With r=2 mm → 2(22/7)(4) = 176/7 ≈ 25.1 mm².", "explanation": "Dimple ek hemisphere ka gaddha hai, to uska curved surface = 2πr². Sirf radius chahiye. (22/7) use karo. Yeh wahi hemisphere formula hai bas chhote scale par.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "M2-383", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Capacity / volume of a single solid", "question": "Find the volume of the material dug out to make one dimple.", "answer": "Method: material dug = volume of hemisphere = (2/3)πr³. With r=2 → (2/3)(22/7)(8) = 352/21 ≈ 16.76 mm³.", "explanation": "Jitna material nikla = hemisphere ka volume = (2/3)πr³. Bas radius daalo. Yaad rakho hemisphere volume sphere ((4/3)πr³) ka aadha hota hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "M2-384", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (sphere with depressions)", "question": "Find the total surface area exposed to the surroundings.", "answer": "Method: golf ball = big sphere with N hemispherical dimples. SA exposed = 4πR² − N·(πr²) + N·(2πr²) = 4πR² + N·πr². With R=21, r=2, N=315 → 9504 mm². Volume = (4/3)πR³ − N·(2/3)πr³ = 33528 mm³.", "explanation": "Golf ball pe har dimple ek circle (πr²) hata kar uski jagah hemisphere ki curved (2πr²) laga deta hai — net me +πr² per dimple. SA = 4πR² + N·πr². Volume me dimples GHATAO: (4/3)πR³ − N(2/3)πr³. Add vs subtract dhyaan se.", "years": ["2023"], "papers": 1, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 1}, {"key": "N1-450", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "LCM–HCF word problems", "question": "Find the least number which when divided by 12, 16 and 24 leaves remainder 7 in each case.", "answer": "Method: same remainder r ⇒ number = LCM(divisors) + r. LCM(12,16,24)=48 ⇒ 48+7=55.", "explanation": "Jab har divisor se EK HI remainder bache → LCM nikaalo aur usme remainder JOD do. Memory hook: 'same remainder → LCM + r'. Yeh ulta hai remainder-subtract waale se (wahan HCF, yahan LCM).", "years": ["2023"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "S1-485", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Missing frequency", "question": "The mode of the following frequency distribution is 55. Find the missing frequencies 'a' and 'b'. [grouped table, total given]", "answer": "Method: locate the modal class from the given mode (the mode lies in it), apply Mode = L + ((f1-f0)/(2f1-f0-f2))*h with the unknown frequency to get one equation, and use the total frequency for the second; solve. Here a = 5, b = 8. Representative answer: a=5, b=8.", "explanation": "Mode diya, frequencies missing: mode kis class mein hai usse modal class pakdo, phir Mode = L + ((f1-f0)/(2f1-f0-f2))*h mein unknown daal ke ek equation; total se doosra. Solve -> a=5, b=8. Hook: 'mode formula + total = do equations'.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "S2-486", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Complement / theory", "question": "Probability of happening of an event is denoted by p and probability of non-happening of the event is denoted by q. Relation between p and q is", "answer": "P(E)+P(not E)=1, so p+q=1. Answer: p+q=1.", "explanation": "Yaad rakho: event ke hone (p) aur na hone (q) ki probability ka sum hamesha 1, kyunki dono milke saari outcomes cover karte hain. Toh p+q=1. Yeh complement rule hai — ek line ka theory question.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "S2-502", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Two dice - product", "question": "In a single throw of two dice, the probability of getting 12 as a product of two numbers obtained is :", "answer": "Total = 36. Product=12 ⇒ {(2,6),(6,2),(3,4),(4,3)} = 4 ⇒ 4/36 = 1/9.", "explanation": "36 outcomes. Product = a×b. 12 ke pairs: (2,6),(6,2),(3,4),(4,3) = 4 ⇒ 4/36 = 1/9. Har pair ka order ginna.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "S2-516", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Numbered tickets - number property", "question": "Balls numbered 1 to 15. What is the probability that the drawn ball bears number 8? (ii) an even number (iii) a multiple of 3 (iv) solid-coloured and even.", "answer": "Total = 15. P(8)=1/15; even {2,4,6,8,10,12,14}=7 ⇒7/15; multiples of 3 {3,6,9,12,15}=5 ⇒1/3; solid-coloured even (1–8 → 2,4,6,8)=4 ⇒4/15.", "explanation": "15 balls ⇒ total 15. Specific number ⇒ 1/15. Even/multiple-of-3 waale favourable list karo (even=7, mult of 3=5). 'Solid-coloured even' mein pehle solid range (1–8) ka even count. Total pehle fix karo.", "years": ["2023"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "S2-520", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Coloured balls - direct", "question": "A bag contains 4 red, 3 blue and 2 yellow balls. One ball is drawn at random from the bag. Find the probability that drawn ball is (i) red (ii) yellow.", "answer": "Total = 4+3+2 = 9. (i) P(red)=4/9. (ii) P(yellow)=2/9.", "explanation": "Pehle total balls jodo: 4+3+2 = 9. Phir P(red)=red/total=4/9, P(yellow)=2/9. Bag waale sawaal mein hamesha saare colours jodke total nikaalo.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "S2-527", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Complement / context", "question": "In a group of 20 people, 5 can't swim. If one person is selected at random, then the probability that he/she can swim, is", "answer": "Can swim = 20−5 = 15 ⇒ 15/20 = 3/4 (or 1 − 5/20).", "explanation": "20 mein se 5 swim nahi kar sakte ⇒ 15 kar sakte hain ⇒ P(swim) = 15/20 = 3/4. Complement se: 1 − 5/20 = 3/4. Total se 'na kar sakne waale' ghatao.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "S2-531", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Empirical / frequency table", "question": "Find the probability that the school chosen at random has more than 100 computers. (Frequency table of 1000 schools by number of computers.)", "answer": "Empirical probability = frequency/total. Total = 1000. >100 computers = 80 ⇒0.08; 50 or fewer = 740 ⇒0.74; no more than 20 = 450 ⇒0.45; 10 or fewer = 250 ⇒0.25.", "explanation": "Empirical probability = (us category ki frequency)/(total). Total schools = 1000. >100 = 80 ⇒ 80/1000 = 0.08. Table se sahi rows jodo (jaise '50 or fewer' = kai rows ka sum). Frequency dhyaan se add karo.", "years": ["2023"], "papers": 1, "raw": 8, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "S2-533", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Two-stage outcomes / game", "question": "A colour game: list all possible outcomes; find P('Making Purple'); and compute the fund collected over 99 participants.", "answer": "List the 9 equally likely outcomes {RR,RG,RB,GR,GB,GG,YR,YB,YG}. P(Making Purple)=favourable(RB)/9=1/9. With 99 players: winners=99×1/9=11, losers=88; fund = 88×5 − 11×10 = ₹330 (or 88×5 − 11×5 = ₹385).", "explanation": "Do-stage game ke saare outcomes list karo (yahan 9). Purple banana = RB ⇒ P = 1/9. Fund waale part mein: winners = P × players, losers = baaki; phir (losers×paisa) − (winners×inaam). Outcomes pehle likho, phir gino.", "years": ["2023"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "T1-542", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Compute ratios from given values", "question": "If sin α = 1/√2 and cot β = √3, then find the value of cosec α + cosec β.", "answer": "Method: read each ratio off its value via reciprocal / 1+cot²=cosec². Representative: sinα=1/√2 ⇒ cosecα=√2; cotβ=√3 ⇒ cosecβ=2; sum accordingly.", "explanation": "Reciprocal aur 1+cot²=cosec² se seedha values nikaalo. cosec=1/sin, sec=1/cos. Hook: 'reciprocal lo ya cot se cosec banao'.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "T1-560", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Prove identity: secA(1−sinA)(secA+tanA)=1", "question": "Prove that sec A (1 – sin A) (sec A + tan A) = 1.", "answer": "Method: convert to sin/cos: secA(1−sinA)(secA+tanA)= (1/cosA)(1−sinA)((1+sinA)/cosA)=(1−sin²A)/cos²A=1.", "explanation": "secA,tanA ko 1/cosA, sinA/cosA banao; (1−sinA)(1+sinA)=1−sin²A=cos²A, cos²A se cancel ⇒ 1. Hook: '(1−sin)(1+sin)=cos²'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 1}, {"key": "T2-568", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Shadow problems", "question": "Find the length of the shadow on the ground of a pole of height 18 m when angle of elevation θ of the sun is such that tan θ = 6/7.", "answer": "Method: tanθ = pole-height / shadow-length ⇒ shadow = height / tanθ. Yahaan tanθ = 6/7, height = 18 ⇒ 6/7 = 18/AP ⇒ shadow AP = 18×7/6 = 21 m.", "explanation": "Yeh ulta hai — angle ya tanθ diya hai, shadow nikalni hai. tanθ = height/shadow, isliye shadow = height ÷ tanθ. tanθ=6/7 ko cross-multiply karo: shadow = 18×7/6 = 21 m. Bas height upar, shadow neeche — fraction ulta mat karna.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "T2-574", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Special right-triangle proofs", "question": "A spherical balloon of radius r subtends an angle of 60° at the eye of an observer. If the angle of elevation of its centre is 45° from the same point, then prove that height of the centre of the balloon is √2 times its radius.", "answer": "Method: balloon subtends 60° ⇒ half-angle 30° at the eye. In right triangle (eye–centre O–tangent point), sin30° = r/OB ⇒ OB = 2r. Centre's elevation is 45°, so height OA = OB·sin45° = 2r·(1/√2) = √2 r. Hence proved.", "explanation": "Yeh thoda alag proof-type hai. Balloon jo 60° banata hai uska aadha (30°) center tak ki line banata hai — tangent radius par perpendicular hota hai, isliye sin30° = r/(eye se center doori) ⇒ doori = 2r. Phir elevation 45° se height = 2r·sin45° = √2·r. Memory hook: subtended angle ka aadha lo, fir sin se distance, fir height.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "T2-580", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Two angles / two positions", "question": "An aeroplane when flying at a height of 3000 m from the ground passes vertically above another aeroplane at an instant when the angles of elevation of the two planes from the same point on the ground are 60° and 45° respectively. Find the vertical distance between the aeroplanes at that instant. Also, find the distance of first plane from the point of observation. (Take √3 = 1.73)", "answer": "Method: both planes share the same horizontal distance x from the observer. Higher plane: tan60°=3000/x ⇒ x=3000/√3=1000√3. Lower plane height = x·tan45° = 1000√3. Vertical gap = 3000 − 1000√3 ≈ 1270 m. Distance of first plane = 3000/sin60° = 2000√3 ≈ 3460 m.", "explanation": "Ek plane doosre ke theek upar hai, isliye dono ki horizontal doori x same! Bade angle se upar wale plane ki x nikaalo, fir chhote angle se neeche wale ki height (x·tan45°). Vertical antar = upar height − neeche height. Pehle plane ki seedhi (slant) doori sin se: 3000/sin60°. Same-x ka idea pakad lo to aasaan.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "T2-581", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Special right-triangle proofs", "question": "A ladder set against a wall at an angle 45° to the ground. If the foot of the ladder is pulled away from the wall through a distance of 4 m, its top slides a distance of 3 m down the wall making an angle 30° with the ground. Find the final height of the top of the ladder from the ground and length of the ladder.", "answer": "Method: ladder length L is constant in both positions. Initial: height = L·sin45°, base = L·cos45°. After: height = L·sin30° = (initial−3), base = L·cos30° = (initial+4). Set up the two relations and eliminate to solve. Final height = 3(√2+1) m, ladder length L = 6(√2+1) m.", "explanation": "Yeh special hai: ladder ki lambai L dono baar same rehti hai — wahi key hai. Pehle aur baad ki height/base ko L·sinθ aur L·cosθ se likho, fir 'top 3 m neeche' aur 'foot 4 m door' wali shart se equation banao. L ko constant treat karke solve karo. Diagram me dono positions overlap karke banao.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "T2-585", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: tower sections & wire", "question": "Find the height of the Section A from the base of the tower. [angle of elevation of A from O is 45°, OP = 36 cm]", "answer": "Method: AP = OP·tan45° = OP·1 = OP. With OP = 36 ⇒ height of Section A = 36 cm. (Note: in some series this slot prints the area answer 216√3 cm² instead.)", "explanation": "Section A ka angle 45° hai, aur tan45°=1, isliye height = base = OP = 36 cm. Bahut seedha — 45° dikhe to perpendicular = base yaad aa jaaye. Bas OP ki value daal do.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}]};
const UL={"Number Systems":"N","Algebra":"A","Coordinate Geometry":"C","Geometry":"G","Trigonometry":"T","Mensuration":"M","Statistics & Probability":"S"};
const esc=s=>(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const app=document.getElementById('app');
document.getElementById('ft').textContent=DATA.meta.sets;
let curChapter=null, filters={year:null,marks:null,type:null};

function go(v,arg){window.scrollTo(0,0);
 document.getElementById('n-home').className=v=='home'?'on':'';
 document.getElementById('n-hy').className=v=='hy'?'on':'';
 if(v=='home')renderHome();else if(v=='hy')renderHY();else if(v=='chapter'){curChapter=arg;filters={year:null,marks:null,type:null};renderChapter();}}

function conceptsFor(code){return DATA.concepts.filter(c=>c.chapter_code==code).sort((a,b)=>b.papers-a.papers||b.score-a.score);}

function renderHome(){
 let h=`<div class="stats">
  <div class="stat"><b>${DATA.meta.sets}</b><span>official papers analysed</span></div>
  <div class="stat"><b>4</b><span>exam years (2023–26)</span></div>
  <div class="stat"><b>${DATA.meta.total_questions.toLocaleString()}</b><span>questions classified</span></div>
  <div class="stat"><b>${DATA.meta.canonical_questions.toLocaleString()}</b><span>canonical Qs</span></div></div>`;
 h+=`<p style="color:var(--mut);margin:0 0 6px">Chapters ranked by <b style="color:var(--ink)">marks per paper</b> (official blueprint: Number Systems 6 · Algebra 20 · Coordinate Geometry 6 · Geometry 15 · Trigonometry 12 · Mensuration 10 · Statistics &amp; Probability 11). Maths repeats by <b style="color:var(--ink)">problem type</b> — tap a chapter for the question types that recur, the method, and an answer.</p>`;
 for(const d of DATA.units){const L=UL[d.name]||'A';
  h+=`<h2 class="sec"><span class="dot" style="background:var(--u-${L})"></span>${d.name} · ${d.marks} marks</h2><div class="cards">`;
  for(const c of d.chapters){
   h+=`<a class="ch" style="border-left-color:var(--u-${L})" onclick="go('chapter','${c.code}')">
    <div class="nm">${esc(c.name)}</div>
    <div class="meta"><span><span class="bigmark">${c.marks_per_paper}</span> mk/paper</span>
    <span class="badge ${c.importance}">${c.importance}</span></div>
    <div class="meta" style="margin-top:8px"><span>${c.total_q} Qs · ${c.years}/4 yrs</span><span>${c.concepts} key Qs ›</span></div>
   </a>`;}
  h+=`</div>`;}
 app.innerHTML=h;}

function pills(c){let y=c.years.map(x=>`<span class="pill yr">${x}</span>`).join('');
 return `<span class="pill freq">🔁 ${c.papers} papers</span>${y}<span class="pill">${c.marks} mark${c.marks>1?'s':''}</span>${(c.types[0]?`<span class="pill">${esc(c.types[0])}</span>`:'')}`;}

function qcard(c,i,star){const id='a'+Math.random().toString(36).slice(2,9);
 return `<div class="qcard${star?' star':''}">
  <div class="qtop">${star?'<span class="star-tag">⭐ MUST-DO · yeh type baar baar aata hai</span>':''}${pills(c)}</div>
  <div class="qtext">${esc(c.question)}</div>
  <span class="toggle" onclick="t('${id}',this)">▸ Show method & answer</span>
  <div class="ans" id="${id}">
   <div class="lab">Answer / Method</div><div class="ansbox">${esc(c.answer)||'—'}</div>
   ${c.explanation?`<div class="lab">Samajh le (Hinglish)</div><div class="expl">${esc(c.explanation)}</div>`:''}
  </div></div>`;}
function t(id,el){const e=document.getElementById(id);e.classList.toggle('open');
 el.textContent=(e.classList.contains('open')?'▾ Hide':'▸ Show method & answer');}

function renderChapter(){let list=conceptsFor(curChapter);
 const ch=DATA.units.flatMap(d=>d.chapters).find(x=>x.code==curChapter)||{name:curChapter,topics:[]};
 const L=curChapter[0];
 const years=[...new Set(list.flatMap(c=>c.years))].sort();
 const marks=[...new Set(list.map(c=>c.marks))].sort((a,b)=>a-b);
 const types=[...new Set(list.flatMap(c=>c.types))].filter(Boolean).sort();
 const f=l=>l.filter(c=>(!filters.year||c.years.includes(filters.year))&&(!filters.marks||c.marks==filters.marks)&&(!filters.type||c.types.includes(filters.type)));
 const shown=f(list);
 const topics=ch.topics||[];const maxt=topics.length?topics[0].count:1;
 const tid=s=>'t-'+(s||'x').replace(/[^a-z0-9]/gi,'');
 let h=`<div class="crumb"><a onclick="go('home')">Home</a> › <b>${esc(ch.name)}</b></div>
  <h2 class="sec" style="margin-top:4px"><span class="dot" style="background:var(--u-${L})"></span>${esc(ch.name)}</h2>
  <p style="color:var(--mut);margin:0 0 12px">${ch.marks_per_paper||''} marks/paper · <b style="color:var(--ink)">${ch.total_q_raw||list.length}</b> questions across ${DATA.meta.sets} papers · ${list.length} canonical question types (methods below)</p>`;
 if(topics.length){h+=`<div class="card-sec"><div class="lab">Question-type breakdown · all ${ch.total_q_raw} questions (raw count)</div>`;
  topics.forEach(t=>{h+=`<div class="toprow" onclick="jump('${tid(t.topic)}')"><span class="tname">${esc(t.topic)}</span>
   <span class="tbarwrap"><span class="tbar" style="width:${Math.max(4,Math.round(100*t.count/maxt))}%;background:var(--u-${L})"></span></span>
   <span class="tcount">${t.count}</span></div>`;});h+=`</div>`;}
 const cf=(lab,key,vals,fmt)=>`<div class="chips"><span style="color:var(--mut);font-size:12px;align-self:center">${lab}:</span>`+
  `<span class="chip ${!filters[key]?'on':''}" onclick="setF('${key}',null)">All</span>`+
  vals.map(v=>`<span class="chip ${filters[key]==v?'on':''}" onclick="setF('${key}','${v}')">${fmt?fmt(v):v}</span>`).join('')+`</div>`;
 h+=`<div class="lab" style="margin-top:16px">Most-repeated question types · method + official answer + Hinglish</div>`;
 h+=cf('Year','year',years)+cf('Marks','marks',marks,v=>v+'m')+(types.length?cf('Type','type',types):'');
 if(!shown.length){h+='<div class="empty">No questions match these filters.</div>';app.innerHTML=h;return;}
 const groups={};shown.forEach(c=>{(groups[c.topic]=groups[c.topic]||[]).push(c);});
 const seen=new Set();
 topics.forEach(t=>{const g=groups[t.topic];if(!g)return;seen.add(t.topic);
  h+=`<div class="tsub" id="${tid(t.topic)}">${esc(t.topic)} · ${g.length} type${g.length>1?'s':''}</div>`;
  g.sort((a,b)=>b.papers-a.papers).forEach((c,i)=>h+=qcard(c,i,c.papers>=5));});
 Object.keys(groups).forEach(tp=>{if(seen.has(tp))return;
  h+=`<div class="tsub">${esc(tp||'Other')}</div>`;groups[tp].forEach((c,i)=>h+=qcard(c,i,c.papers>=5));});
 app.innerHTML=h;}
function jump(id){const e=document.getElementById(id);if(e)e.scrollIntoView({behavior:'smooth',block:'start'});}
function setF(k,v){filters[k]=v;renderChapter();}

function renderHY(){const top=[...DATA.concepts].sort((a,b)=>b.score-a.score||b.papers-a.papers).slice(0,60);
 let h=`<h2 class="sec">⭐ High-Yield for 2027 <span style="font-size:11px;color:var(--mut);text-transform:none;letter-spacing:0">· recency-weighted (2026×4 … 2023×1)</span></h2>
  <p style="color:var(--mut);margin:0 0 10px">If time is short, start here. These question types repeated most — and most recently. Practise the <b style="color:var(--ink)">method</b>; the numbers will change in your paper.</p>`;
 top.forEach((c,i)=>{h+=`<div class="chlabel">${i+1}. <span style="color:var(--accent)">${esc(c.chapter_name)}</span> · ${c.unit}</div>`+qcard(c,i,i<5);});
 app.innerHTML=h;}

function search(v){v=v.trim().toLowerCase();if(!v){go('home');return;}
 document.getElementById('n-home').className='';document.getElementById('n-hy').className='';
 const r=DATA.concepts.filter(c=>(c.question+' '+c.key+' '+c.chapter_name+' '+c.topic+' '+(c.answer||'')).toLowerCase().includes(v)).sort((a,b)=>b.papers-a.papers).slice(0,80);
 let h=`<h2 class="sec">🔍 ${r.length} results for “${esc(v)}”</h2>`;
 if(!r.length)h+='<div class="empty">Kuch nahi mila — try another keyword.</div>';
 r.forEach((c,i)=>h+=`<div class="chlabel"><span style="color:var(--accent)">${esc(c.chapter_name)}</span> · ${c.unit}</div>`+qcard(c,i,false));
 app.innerHTML=h;}
renderHome();
</script></body></html>
