at a constant height of 3500√3 m at a uniform speed. Find the speed of the aircraft.", "answer": "Method: constant height H. First position x₁ = H/tan(big θ), later x₂ = H/tan(small θ); distance covered = x₂−x₁; speed = distance/time. Aircraft H=3500√3: x₁=3500, x₂=10500 ⇒ 7000 m in 30 s ⇒ speed=233.3 m/s. (Jet 3600√3 ⇒ 240 m/s; heli 2000 m, 15 s ⇒ 97.6 m/s; boat/friend: y=2x ⇒ remaining time = half ⇒ 3 min / 15 s.)", "explanation": "Plane/boat ek constant height par chalti hai. Do position ki horizontal doori nikaalo: door = H/tanθ (chhota angle = zyada door). Dono ka antar = covered distance, fir speed = distance ÷ time. Two aeroplanes me bhi vertical gap = 3000 − x. Boat wale me ratio se time: agar y=2x to baaki aadha time lagega. Units (m/s ya km/h) ka dhyaan rakho.", "years": ["2024", "2025", "2026"], "papers": 4, "raw": 5, "marks": 5, "types": ["LA"], "score": 11}, {"key": "N1-443", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "HCF & LCM by prime factorisation", "question": "If two positive integers p and q can be expressed as p = 18a²b⁴ and q = 20a³b², where a and b are prime numbers, then LCM (p, q) is :", "answer": "Method: write each in prime-power form; LCM = highest power of each prime, HCF = lowest. p=2·3²a²b⁴, q=2²·5a³b² ⇒ LCM=180a³b⁴. To find a missing power (x, m+n, 3n−2m), match exponents with the GIVEN LCM/HCF.", "explanation": "Jab numbers prime-powers me ho (a²b⁴ type), seedha exponents pe kaam karo: LCM = har prime ka sabse bada exponent, HCF = sabse chhota. Memory hook: 'LCM→max power, HCF→min power'. Missing power di hui LCM ke exponents se match karke nikaalo.", "years": ["2024", "2025"], "papers": 4, "raw": 11, "marks": 1, "types": ["MCQ"], "score": 10}, {"key": "N1-449", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "LCM–HCF word problems", "question": "Find the greatest number which divides 85 and 72 leaving remainders 1 and 2 respectively.", "answer": "Method: subtract each remainder, then take HCF. HCF(84,70)=14. (281,1249 rem 5,7 ⇒ HCF(276,1242)=138; 764,1198 rem 8,10 ⇒ HCF(756,1188)=108; 70,125 rem 5,8 ⇒ HCF(65,117)=13.) Euclid form HCF(210,55)=210×5+55m: HCF=5 ⇒ m=−19.", "explanation": "'Remainder chhodke divide' → pehle har number me se uska remainder GHATAO, fir HCF lo. Memory hook: 'remainder hatao, fir HCF'. Greatest/maximum divide = HCF. Euclid form me pehle HCF nikaalo, fir m solve karo.", "years": ["2023", "2024", "2025", "2026"], "papers": 4, "raw": 9, "marks": 2, "types": ["MCQ", "SA", "VSA"], "score": 10}, {"key": "S1-469", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Concept of central tendency", "question": "The middle most observation of every data arranged in order is called :", "answer": "Method: recall definitions. Median = middle-most value of ordered data; Mode = most frequently occurring value (marks of maximum students -> mode; 52 by maximum -> 52 is mode). Even count of ungrouped data: median = average of the two middle observations, located via cumulative frequencies (e.g. -> '28 and 29'). Representative answer: median.", "explanation": "Definitions pakki: Median = beech wali value (sort karke); Mode = sabse zyada baar aane wali. Even terms ho toh median = do beech walon ka average (cumulative se locate karo). Hook: 'Median = middle, Mode = most'.", "years": ["2024", "2025"], "papers": 4, "raw": 12, "marks": 1, "types": ["MCQ"], "score": 10}, {"key": "T1-550", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Assertion-Reason (identities)", "question": "Assertion (A) : If sin A = 1/3 (0° < A < 90°), then the value of cos A is 2√2/3. Reason (R) : For every angle θ, sin² θ + cos² θ = 1.", "answer": "Method: test Assertion and Reason independently, then whether R explains A. Representative: sinA=1/3 ⇒ cosA=2√2/3 (A true); sin²+cos²=1 (R true, explains A) ⇒ (A).", "explanation": "Assertion aur Reason alag-alag jaancho; dono sahi + R se A explain ho ⇒ (A). Yaad: cosecθ≥1, sec²θ=1+tan² (na ki 1−tan²!). Hook: 'dono check karo, phir relation'.", "years": ["2023", "2024", "2025", "2026"], "papers": 4, "raw": 12, "marks": 1, "types": ["Assertion-Reason"], "score": 10}, {"key": "A1-22", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Assertion–Reason: zeroes & degree", "question": "Assertion (A): The polynomial p(y) = y² + 4y + 3 has two zeroes. Reason (R): A quadratic polynomial can have at most two zeroes.", "answer": "Method: judge A and R separately, then whether R explains A. Check discriminant for 'number of real zeroes'; recall degree-n ⇒ at most n zeroes, zero polynomial's degree is undefined, constant poly has degree 0. Representative (y²+4y+3 has D=4>0, two real zeroes; R true and explains): both true. (For y²+3y+3, D<0 ⇒ A false.)", "explanation": "Assertion aur Reason ko alag-alag jaancho, phir dekho R, A ko explain karta hai ya nahi. 'Kitne real zeroes' ke liye discriminant b²-4ac dekho. Yaad rakho: degree n ⇒ max n zeroes; zero polynomial ka degree undefined; non-zero constant ka degree 0.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 10, "marks": 1, "types": ["Assertion-Reason"], "score": 9}, {"key": "A3-72", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Nature of roots (discriminant)", "question": "The roots of the quadratic equation 4x² – 5x + 4 = 0 are", "answer": "Compute D=b²−4ac. D>0 ⇒ real & distinct; D=0 ⇒ real & equal; D<0 ⇒ not real. E.g. 4x²−5x+4: D=25−64<0 ⇒ not real. For x²+bx+b=0 distinct roots need b²−4b>0 ⇒ b=−3 works.", "explanation": "Bas discriminant D=b²−4ac nikaalo aur uska sign dekho: D>0 to do alag real roots, D=0 to do barabar roots, D<0 to roots real nahi. Memory hook: 'D ka sign hi sab kuch batata hai'. Calculation me −ve sign dhyaan se.", "years": ["2023", "2024", "2025"], "papers": 4, "raw": 10, "marks": 1, "types": ["Assertion-Reason", "MCQ"], "score": 9}, {"key": "C1-158", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Section formula", "question": "Find the ratio in which the point (8/5, y) divides the line segment joining the points (1, 2) and (2, 3). Also, find the value of y.", "answer": "Method: turn the given (point coord or length-fraction) into ratio k:1, equate via section formula, solve, then the other value. (8/5,y) on (1,2),(2,3): (2k+1)/(k+1)=8/5 → 3:2, y=13/5. P(-4,6) on (-6,10),(3,-8) → 2:7. AP:AB=2:5 → AP:PB=2:3 → P(4,-1).", "explanation": "Dividing point ka coordinate ya AP:AB jaisa fraction pata ho: pehle ratio k:1 (ya AP:PB) banao, section-formula equation se k nikaalo, fir baaki value. AP:AB=2:5 ko AP:PB=2:3 me badlo.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 10, "marks": 2, "types": ["SA", "VSA"], "score": 9}, {"key": "G1-205", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove right angle from altitude relation", "question": "In ∆ABC, if AD ⊥ BC and AD² = BD × DC, then prove that ∠BAC = 90°.", "answer": "Method: When the altitude to a side satisfies AD^2 = BD.DC (or PN.NR = QN^2), the two sub-triangles triangle ADB ~ triangle CDA, giving equal angles that sum to make angle BAC = 90 deg. (MCQ form: AD^2 = BD.DC with BC=16, DC=4 => BD=12 => AD = sqrt(48) = 4√3, value of x.)", "explanation": "Altitude par AD^2 = BD.DC ho to wo right-angle ki nishaani hai (angle BAC = 90). Proof: dono chhote triangles similar -> angles add hokar 90 dete hain. MCQ mein AD = sqrt(BD x DC) seedha lagao. 'Square = product of segments' = right angle, yaad rakho.", "years": ["2023", "2024", "2025"], "papers": 4, "raw": 8, "marks": 5, "types": ["LA", "MCQ"], "score": 9}, {"key": "M1-325", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Segment area", "question": "A chord of a circle of radius 14 cm subtends an angle of 60° at the centre. Find the area of the corresponding minor segment of the circle. Also find the area of the major segment of the circle.", "answer": "Method: Area of segment = Area of sector − Area of triangle OAB. Sector = (θ/360)πr²; triangle = (1/2)r²sinθ (for 60° it is equilateral, (√3/4)r²). Major segment = πr² − minor segment. For r=14, θ=60°: minor segment = (308/3 − 49√3) ≈ 17.9 cm²; major segment = (1540/3 + 49√3) ≈ 598.1 cm². (For r=10, 90°: 28.5 cm²; formula MCQ 60° → πr²/6 − (√3/4)r².)", "explanation": "Segment matlab chord ke ek taraf ka hissa. Formula yaad rakho: Segment ka area = Sector ka area − Triangle ka area. Sector = (θ/360)πr², aur triangle = (1/2)r²sinθ. 60° pe triangle equilateral ban jaata hai to (√3/4)r² lagao. Major segment chahiye to poore circle ka area (πr²) me se minor segment ghata do. Tip: minor/major dono maange to pehle minor nikaalo, fir πr² − minor.", "years": ["2023", "2025", "2026"], "papers": 4, "raw": 10, "marks": 3, "types": ["LA", "MCQ", "SA"], "score": 9}, {"key": "M2-371", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of a single solid (hemisphere)", "question": "What is the total surface area of a solid hemisphere of diameter 'd' ?", "answer": "Method: TSA of solid hemisphere = 3πr² (curved 2πr² + flat circle πr²). For diameter d, r=d/2 → TSA = 3π(d/2)² = 3πd²/4. Ratio TSA:r² = 3π:1. Sphere cut into 2 hemispheres: SA(sphere):SA(2 hemispheres) = 4πr² : 2(3πr²) = 2:3.", "explanation": "Solid hemisphere ka TSA = 3πr² (curved 2πr² + neeche ka circle πr²). Sirf curved chahiye to 2πr². Diameter diya ho to r=d/2 pehle nikaalo. Memory hook: sphere ko kaato to extra do circle aa jaate hain, isliye 2 hemisphere ka SA sphere se zyada (ratio 2:3).", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 9, "marks": 1, "types": ["MCQ"], "score": 9}, {"key": "N1-445", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "HCF × LCM = product of numbers", "question": "If the HCF (2520, 6600) = 40 and LCM (2520, 6600) = 252 × k, then the value of k is", "answer": "Identity: HCF × LCM = product of the two numbers ⇒ LCM = a·b/HCF, then solve for the unknown. LCM=2520·6600/40=415800=252k ⇒ k=1650. (HCF(98,28)=14, LCM=196 ⇒ n−7m=98; HCF(65,104)=13, LCM=520=40x ⇒ x=13.)", "explanation": "Sabse important: HCF × LCM = pehla × doosra number (sirf 2 numbers!). Isi se missing value nikaalo. Memory hook: 'HCF×LCM = a×b'. 3 numbers ke liye yeh formula KAAM NAHI karta — yaad rakhna.", "years": ["2024", "2025"], "papers": 4, "raw": 11, "marks": 1, "types": ["MCQ"], "score": 9}, {"key": "T2-572", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Object on top of another (two elevations from one point)", "question": "From a point on the ground, the angle of elevation of the bottom and top of a transmission tower fixed at the top of 30 m high building are 30° and 60°, respectively. Find the height of the transmission tower. (Use √3 = 1.73)", "answer": "Method: same base distance x. Lower angle gives the lower height: tan(θ₁) = (lower height)/x ⇒ find x. Upper angle gives total: tan(θ₂) = (total height)/x. Subtract. E.g. building 30 m: x = 30/tan30° = 30√3; total = x·tan60° = 90 ⇒ tower = 90−30 = 60 m. (Pole 6 m on tower, 45° & 60°: h=3(√3+1)≈8.19 m.)", "explanation": "Jab ek cheez doosri ke upar ho (building pe tower/flagstaff, ya pole pe pole) aur ek hi point se do angle diye ho — base (x) dono ke liye same hota hai! Pehle chhote angle se neeche wali height nikaalo aur x, phir bade angle se poori height. Upar ka part = total − neeche. Diagram me dono triangle ek hi base par banao.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 5, "marks": 5, "types": ["LA"], "score": 9}, {"key": "A1-14", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Find parameter: reciprocal zeroes", "question": "If one zero of the polynomial 6x² + 37x – (k – 2) is reciprocal of the other, then find the value of k.", "answer": "Method: if zeroes are reciprocals (α and 1/α), their product αβ = 1, so c/a = 1. Solve for the unknown. Representative 6x²+37x-(k-2): -(k-2)/6 = 1 → k-2 = -6 → k = -4.", "explanation": "Reciprocal zeroes ka matlab: product = 1. Bas c/a = 1 rakho aur solve karo (sum ki zaroorat hi nahi!). 'ax²+bx+c me reciprocal' aaye to seedha c = a wali condition. Sign aur bracket kholne me savdhaan raho.", "years": ["2023", "2025"], "papers": 4, "raw": 9, "marks": 1, "types": ["MCQ", "VSA"], "score": 8}, {"key": "A4-95", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find unknown / property using 2b=a+c", "question": "If k + 2, 4k – 6 and 3k – 2 are three consecutive terms of an A.P., then the value of k is :", "answer": "Method: three terms in AP satisfy 2(middle)=first+third. e.g. 2(4k-6)=(k+2)+(3k-2) -> 8k-12=4k -> k=3. (For p-1,p+1,2p+3: 2(p+1)=(p-1)+(2p+3) -> p=0.)", "explanation": "Jab teen terms AP mein hon to seedha rule lagao: 2b = a + c (middle ka double = baaki dono ka sum). Bas equation banao aur unknown nikaalo. Memory hook: 'middle ka 2 guna = kinaaron ka jod'. Sign-galti se bacho jab terms mein minus ho.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 5, "marks": 1, "types": ["MCQ"], "score": 8}, {"key": "C1-163", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Distance formula", "question": "If the distance between the points (3, – 5) and (x, – 5) is 15 units, then the values of x are :", "answer": "Method: put unknown in distance formula, square, solve. dist((3,-5),(x,-5))=15 → x=-12,18. Point on x-axis 10 from (11,-8): x=5,17. Q(0,1) equidistant from P(5,-3),R(x,6) → x=±4. dist((4,p),(1,0))=5 → p=±4.", "explanation": "Unknown coordinate ho aur distance diya ho: distance formula me daalo, dono taraf square karo, solve karo. Aksar do answer (±). Square karna mat bhoolna warna root atak jaayega.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 9, "marks": 1, "types": ["MCQ", "SA", "VSA"], "score": 8}, {"key": "C1-173", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Type of figure", "question": "In the given figure, Δ ABC is an equilateral triangle. AD is a median of the triangle joining the points A(0, 5√3/2), D(0, 0). Points B and C are (in same order) : [FIGURE: Equilateral triangle ABC with median AD. Coordinates A(0, 5√3/2) and D(0,0) are given.]", "answer": "Method: use the figure's symmetry/right angles with distance & section formulas. Square P(-200,0),Q(200,0) → R(200,400),S(-200,400); area=160000, diagonal PR=400√2; S divides CA 1:1 → K=1. Equilateral A(0,5√3/2),D(0,0) → B(-5/2,0),C(5/2,0); third vertex of equilateral with side 10 → (0,3-5√3). ΔPQR with A as origin → read off coordinates.", "explanation": "Figure ke vertices/measurements: shape ki property (square ki barabar bhujaayein, right angle, symmetry) use karke baaki coordinates nikaalo. Equilateral ka base median ke around symmetric. Phir area=side², diagonal/length distance formula se.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 20, "marks": 1, "types": ["Case-based", "MCQ", "SA"], "score": 8}, {"key": "G1-187", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Find length by similarity", "question": "In the given figure, Δ AHK ~ Δ ABC. If AK = 8 cm, BC = 3.2 cm and HK = 6.4 cm, then find the length of AC. [FIGURE: Two similar triangles AHK and ABC, with H on AC and K on AB.]", "answer": "Method: triangle AHK ~ triangle ABC so corresponding sides are proportional: AK/AC = HK/BC. With AK=8, HK=6.4, BC=3.2 => AC = AK*BC/HK = 8*3.2/6.4 = 4 cm (similarly AK=10,HK=7,BC=3.5 => AC=5).", "explanation": "Similar triangles mein corresponding sides ka ratio barabar hota hai. AHK~ABC -> AK/AC = HK/BC. Unknown side ke liye cross-multiply. Trick: pehle correspond karne waale vertices match karo (A<->A, H<->B, K<->C).", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 9, "marks": 2, "types": ["MCQ", "VSA"], "score": 8}, {"key": "G2-274", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Parallelogram/quad circumscribing to rhombus", "question": "Prove that a parallelogram circumscribing a circle is a rhombus.", "answer": "Prove a parallelogram circumscribing a circle is a rhombus. Equal tangents give AB + CD = AD + BC. In a parallelogram AB=CD and AD=BC, so 2AB = 2AD giving AB=AD, all sides equal, a rhombus.", "explanation": "Circumscribing parallelogram me opposite sides ka sum barabar (equal tangents se): AB+CD = AD+BC. Parallelogram me AB=CD, AD=BC, to AB=AD, saari sides barabar, rhombus. Hook: circumscribed matlab opposite sides ka sum equal.", "years": ["2023", "2024", "2025"], "papers": 4, "raw": 10, "marks": 3, "types": ["LA", "SA"], "score": 8}, {"key": "S1-480", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Median", "question": "A student noted the number of cars passing through a spot on a road for 100 periods each of 3 minutes ... Find the mean and median of the following data. [grouped frequency table]", "answer": "Method: compute Mean = Sum f_i x_i / Sum f_i (class-marks; direct or assumed-mean) AND Median = L + ((N/2-cf)/f)*h (via cumulative frequencies). For 'difference', subtract the two. Cars: Mean 40.7, Median 42. Milk (find x from total=200 -> 28): Median = Rs 2553.6, Mean = Rs 2662.5. Weights: Mean 45.8, Median 46.5, difference 0.7 kg. Representative: Mean 40.7, Median 42.", "explanation": "Dono ek saath: Mean = Σf x/Σf (mid-points se) aur Median = L + ((N/2-cf)/f)*h (cumulative banake). 'Difference' poochein toh ghata do. Missing freq ho toh total se nikaalo. Hook: 'mean ke liye f*x, median ke liye cumulative'.", "years": ["2023", "2025"], "papers": 4, "raw": 8, "marks": 5, "types": ["LA"], "score": 8}, {"key": "S2-526", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Complement / context", "question": "If the probability of a player winning a game is 0.79, then the probability of his losing the same game is :", "answer": "Use P(not E)=1−P(E). Lose=1−0.79=0.21. NOT having a vehicle=1−1/5=4/5. Not hitting boundary=1−7/42=5/6. Good eggs: (1−0.045)×400=382.", "explanation": "Complement everywhere: P(nahi hone) = 1 − P(hone). Lose = 1 − 0.79 = 0.21. 'Vehicle nahi' = 1 − 1/5 = 4/5. Good eggs = (1 − bad prob) × total. Pehle event ki probability, phir 1 se ghatao.", "years": ["2023", "2024", "2025"], "papers": 4, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 8}, {"key": "A2-36", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Line geometry & equation", "question": "If x = 1 and y = 2 is a solution of the pair of linear equations 2x – 3y + a = 0 and 2x + 3y – b = 0, then :", "answer": "Method: a given (x, y) satisfies the equation(s) — substitute and simplify to get the required relation/value. Sub x=1, y=2: a=4 and b=8 ⇒ 2a=b. (For solution-form questions like x+y=a+b & ax–by=a²–b² ⇒ x=a, y=b; ax+by=a²–b², bx+ay=0 ⇒ x+y=a–b; 2x+3y=15 & 3x+2y=25 ⇒ x–y=10 by subtracting.)", "explanation": "Agar koi (x,y) solution diya hai, toh woh equation ko satisfy karega — bas value daal do (substitute) aur relation nikaalo. Symmetric systems mein (a+b, a²–b² wale) sidha guess/verify karo x=a, y=b. Aur jab sirf x–y ya x+y poocha ho, toh do equations ko jod/ghata ke turant nikal sakte ho — pura solve karne ki zaroorat nahi.", "years": ["2023", "2024", "2025"], "papers": 4, "raw": 7, "marks": 1, "types": ["MCQ"], "score": 7}, {"key": "G1-212", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove proportional segments (parallelogram)", "question": "Through the mid-point M of the side CD of a parallelogram ABCD, the line BM is drawn intersecting AC in L and AD (produced) in E. Prove that EL = 2BL.", "answer": "Method: Through midpoint M of CD, line BM meets AC at L and AD produced at E. Using AD||BC, triangle ALE ~ triangle CLB and the midpoint condition (CM = MD) gives EL/BL = AE/CB = 2, so EL = 2BL. (Same parallelogram-similarity idea proves DF.EF = FB.FA for diagonal BD meeting AE at F: triangle DFA ~ triangle BFE.)", "explanation": "Parallelogram mein parallel sides se similar triangles (ALE~CLB). Midpoint ki wajah se ratio 2 aa jaata hai -> EL = 2BL. Product type (DF.EF=FB.FA) bhi isi similar-triangle se. Pehle parallel se equal angles, phir ratio, phir result.", "years": ["2023", "2024", "2025"], "papers": 4, "raw": 10, "marks": 5, "types": ["LA", "SA"], "score": 7}, {"key": "S2-508", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Cards - single draw category", "question": "A card is drawn at random from a well shuffled deck of 52 playing cards. The probability of getting a face card is", "answer": "52 cards = 26 red+26 black, 12 face, 4 of each rank. P(face)=12/52=3/13; P(queen)=4/52=1/13; P(red ace)=2/52=1/26; P(red face card)=6/52=3/26.", "explanation": "52 cards ka structure ratto: 26 red + 26 black, 12 face (J,Q,K × 4 suit), har rank ke 4. P = favourable/52. Face = 12/52 = 3/13. Table banao phir count karo.", "years": ["2023", "2024", "2025"], "papers": 4, "raw": 7, "marks": 1, "types": ["MCQ"], "score": 7}, {"key": "N1-442", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "HCF & LCM by prime factorisation", "question": "Find by prime factorisation the LCM of the numbers 18180 and 7575. Also, find the HCF of the two numbers.", "answer": "Method: write each number as product of primes. HCF = common primes to LOWEST power; LCM = all primes to HIGHEST power. 18180=2²·3²·5·101, 7575=3·5²·101 ⇒ HCF=1515, LCM=90900. (96&120→24,480; 72&120→24,360; 26,65,117→HCF 13, LCM 1170.)", "explanation": "Har number ko primes me todo (factor tree). HCF = common primes ka SABSE CHHOTA power; LCM = saare primes ka SABSE BADA power. Memory hook: 'HCF chhota power, LCM bada power'. Check: HCF×LCM = product (sirf 2 numbers). Powers galat uthana common mistake hai.", "years": ["2023", "2025"], "papers": 4, "raw": 14, "marks": 2, "types": ["SA", "VSA"], "score": 6}, {"key": "S1-482", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Median", "question": "The marks obtained by 80 students of class X in a mock test of Mathematics are given below ... Find median and the mode of the data. [grouped / 'and above' table]", "answer": "Method: (convert 'and above' to ordinary frequencies if needed), then Median = L + ((N/2-cf)/f)*h and Mode = L + ((f1-f0)/(2f1-f0-f2))*h. Mock-test: N=80, median class 50-60 -> Median = 52; modal class 50-60 -> Mode = 55. SBI ages: Median ~35.7, Mode ~36.7. Representative: Median 52, Mode 55.", "explanation": "Median aur Mode ek saath: 'and above' ho toh pehle normal frequency banao. Median = L + ((N/2-cf)/f)*h, Mode = L + ((f1-f0)/(2f1-f0-f2))*h. Mock-test: Median 52, Mode 55. Hook: 'cumulative se median, modal-class se mode'.", "years": ["2026"], "papers": 3, "raw": 4, "marks": 5, "types": ["LA"], "score": 12}, {"key": "A1-7", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Zeroes ↔ coefficients", "question": "If α, β are the zeroes of the quadratic polynomial px² + qx + r, then find the value of α³β + β³α.", "answer": "Method: take out common factor (αβ), then use α²+β²=(α+β)²−2αβ. e.g. α³β+β³α = αβ(α²+β²) = αβ[(α+β)²−2αβ]. Representative px²+qx+r: α+β=-q/p, αβ=r/p, giving (r/p³)(q²−2pr). For (1-p)(1-q)=1-(p+q)+pq type, expand and substitute (e.g. 21y²-y-2 → 6/7).", "explanation": "Bade powers dekh ke ghabrao mat — common cheez bahar nikaalo (jaise αβ), phir α²+β² = (α+β)²−2αβ laga do. Sab kuch sum aur product me convert ho jaata hai. (1−α)(1−β) jaise products ko pehle expand karo, phir values daalo.", "years": ["2025", "2026"], "papers": 3, "raw": 6, "marks": 2, "types": ["VSA"], "score": 10}, {"key": "G2-256", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents and centre", "question": "In the given figure, PA and PB are tangents to a circle centred at O. If ∠ OAB = 15°, then ∠ APB equals :[FIGURE: circle with center O, two tangents PA and PB from external point P, A and B are points of tangency]", "answer": "Given a base angle of the isosceles triangle of two tangents, find the apex/contact angle. E.g. angle OAB=15 gives angle AOB=150 so angle APB = 180-150 = 30. Tangents AB=AC with angle ABC=42 give angle BAC = 180 - 2(42) = 96.", "explanation": "Do barabar tangent matlab isosceles triangle, base angles equal. Ek base angle diya to apex = 180 - 2 x base. Zarurat ho to P + O = 180 laga do. Hook: tangents barabar matlab base angle barabar.", "years": ["2024", "2026"], "papers": 3, "raw": 7, "marks": 1, "types": ["MCQ"], "score": 10}, {"key": "A2-41", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Graphical method", "question": "Solve the pair of equations x = 3 and y = -4 graphically.", "answer": "Method: x=a is a vertical line, y=b is a horizontal line; they always intersect at (a, b) — that's the solution. e.g. x=3 & y=–4 ⇒ (3,–4); x=4 & 3x–2y=6 ⇒ (4,3); 3x+y=14 & y=2 ⇒ (4,2). Draw both and read the meeting point.", "explanation": "x = koi number matlab y-axis ke parallel khadi line; y = koi number matlab x-axis ke parallel leti line. Yeh hamesha ek point par milti hain — bas (x-value, y-value). Jab ek line x=const aur doosri normal ho (jaise 3x–2y=6), pehle const line kheecho, phir doosri ki table banao. Diagram zaroor banao, warna marks katenge.", "years": ["2023", "2026"], "papers": 3, "raw": 9, "marks": 3, "types": ["SA", "VSA"], "score": 9}, {"key": "A3-86", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Word problem: pipes & work-rate", "question": "Two water taps together can fill a tank in 8 8/9 hours. The tap of larger diameter takes 4 hours less than the smaller one to fill the tank separately. Find the time in which each tap can separately fill the tank.", "answer": "Work rates add: 1/x + 1/(other) = 1/(together time). Form the equation, clear denominators to a quadratic, reject the value that makes a time negative/too small. Taps, 80/9 h together, larger 4 h less: 1/x+1/(x−4)=9/80 ⇒ x=20 ⇒ smaller 20 h, larger 16 h.", "explanation": "Pipe/tap problems me 'rate' me socho: 1 ghante me kitna bharta hai. Dono ka rate jodo = combined rate (1/total time). Equation banao, denominators hatao, quadratic solve karo. Common mistake: time ko jodna (galat) — rate jodte hain, time nahi!", "years": ["2023", "2026"], "papers": 3, "raw": 5, "marks": 5, "types": ["LA"], "score": 9}, {"key": "G1-228", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Similar triangles application (shadow/pole)", "question": "A 1.5 m tall boy is walking away from the base of a lamp post which is 12 m high, at the speed of 2.5 m/sec. Find the length of his shadow after 3 seconds.", "answer": "Method: Object and its shadow form similar right triangles with the light source, so height/shadow is constant. Boy 1.5 m, lamp 12 m: distance in 3 s = 7.5 m; by similar triangles shadow s satisfies 1.5/12 = s/(7.5+s) => s = 15/7 m. (Pole-shadow MCQ: 7.5/5 = h/24 => h = 36 m.)", "explanation": "Lamp-post aur aadmi ki parchhai similar triangles banati hain: height/shadow ka ratio same. Equation: (aadmi ki height)/(lamp ki height) = shadow/(distance+shadow). Pehle distance = speed x time nikaalo. Units same rakho (m aur m)!", "years": ["2024", "2025", "2026"], "papers": 3, "raw": 6, "marks": 5, "types": ["LA", "MCQ", "VSA"], "score": 9}, {"key": "N1-453", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "LCM–HCF word problems", "question": "In a teachers' workshop, the number of teachers teaching French, Hindi and English are 48, 80 and 144 respectively. Find the minimum number of rooms required if in each room the same number of teachers are seated and all of them are of the same subject.", "answer": "Method: 'max equal per group / min number of groups' ⇒ HCF (=group size); number of groups = total÷HCF, summed. HCF(48,80,144)=16 ⇒ 3+5+9=17 rooms. (Books 144,180,192 ⇒ HCF 12 ⇒ 12+15+16=43 stacks; oils 870,812,638 ⇒ HCF 58 ⇒ 40 containers.)", "explanation": "'Barabar number har group me, minimum groups/maximum size' → HCF nikaalo (ek group ka size), fir har quantity÷HCF karke groups jodo. Memory hook: 'barabar baatna → HCF, groups = total÷HCF'. Sirf HCF likhna adhoora — groups bhi nikaalo.", "years": ["2024", "2025", "2026"], "papers": 3, "raw": 5, "marks": 3, "types": ["SA"], "score": 9}, {"key": "S2-487", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Complement / theory", "question": "For an event E, if P(E) + P(E̅) = q, then the value of q² – 3 is :", "answer": "P(E)+P(not E)=1, so q=1. Substitute: q²−3 = 1−3 = −2 (or q²−4 = −3).", "explanation": "Trick: P(E)+P(E̅) hamesha 1 hota hai, toh poora bracket = 1. Ab us 1 ko expression mein daalo — q²−3 = 1−3 = −2. Value hamesha 1, baaki sirf substitution hai.", "years": ["2024", "2025", "2026"], "papers": 3, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 9}, {"key": "T1-549", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Verify sum formula; express ratios in one variable", "question": "If A = 60° and B = 30°, verify that : sin (A + B) = sin A cos B + cos A sin B", "answer": "Method: plug A,B into both sides of sin(A+B)=sinAcosB+cosAsinB and check; or use it for sin15°=sin(45−30)=(√6−√2)/4; or express cosA,tanA via sin²+cos²=1.", "explanation": "Formula verify karo (dono side ki value barabar dikhao) ya sin15°=sin(45−30) nikaalo. 'In terms of y': cosA=√(1−y²), tanA=y/√(1−y²). Hook: 'formula me values daalo, dono taraf milao'.", "years": ["2024", "2025", "2026"], "papers": 3, "raw": 10, "marks": 2, "types": ["VSA"], "score": 9}, {"key": "A1-8", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Find zeroes & verify relationship", "question": "Find the zeroes of the quadratic polynomial x² + 7x + 10, and verify the relationship between the zeroes and its coefficients.", "answer": "Method: factorise (split the middle term), set each factor = 0 to get the zeroes, then check α+β = -b/a and αβ = c/a. Representative x²+7x+10 = (x+2)(x+5): zeroes -2, -5; sum -7 = -7/1, product 10 = 10/1. ✓ (For x²-15: zeroes ±√15.)", "explanation": "Do step: (1) factorise karke zeroes nikaalo, (2) verify karo sum = -b/a aur product = c/a. Middle term split karna seekho. Verify likhna zaroori hai — warna full marks nahi milte. x²-15 jaise me directly √ se zeroes ±√15 aate hain.", "years": ["2024", "2026"], "papers": 3, "raw": 7, "marks": 3, "types": ["SA", "VSA"], "score": 8}, {"key": "A1-15", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Find parameter: zeroes in given relation", "question": "If one zero of the polynomial x² – 3kx + 4k be twice the other, then the value of k is :", "answer": "Method: let zeroes be α and mα (e.g. m=2). Use α+β=-b/a and αβ=c/a to get two equations, eliminate α, solve for the parameter. Representative x²-3kx+4k with one zero twice the other (α, 2α): 3α=3k and 2α²=4k → α=k, 2k²=4k → k=2. (Ratio 3:4 → 'prove 12a²=49b' uses the same setup.)", "explanation": "Ek zero dusre ka multiple ho (jaise 2 guna ya ratio 3:4) to zeroes ko α aur mα maano. Phir sum aur product se do equations banao, α hata ke parameter nikaalo. Ratio-proof wale me bhi yahi method — assume karke prove karo.", "years": ["2023", "2025", "2026"], "papers": 3, "raw": 3, "marks": 2, "types": ["MCQ", "VSA"], "score": 8}, {"key": "A3-76", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Solve by factorisation", "question": "The roots of the equation x² + 3x – 10 = 0 are :", "answer": "Solve by factorisation (split the middle term) or by taking square roots for (x−h)²=k forms. x²+3x−10=0 ⇒ (x+5)(x−2)=0 ⇒ x=2,−5. (x−1)²=16 ⇒ x−1=±4 ⇒ x=5,−3. x/12−3/x=0 ⇒ x²=36 ⇒ x=±6.", "explanation": "Factorisation me middle term ko aise todo ki product = a·c aur sum = b ho. (x−h)²=k type ho to dono taraf square-root le lo (±!). Common mistake: ± dono signs likho, sirf positive likhna galti hai.", "years": ["2023", "2025", "2026"], "papers": 3, "raw": 8, "marks": 1, "types": ["MCQ"], "score": 8}, {"key": "G1-181", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Converse of BPT", "question": "If a line drawn parallel to one side of triangle intersecting the other two sides in distinct points divides the two sides in the same ratio, then it is parallel to third side. State and prove the converse of the above statement.", "answer": "Method: Converse of BPT - if a line divides two sides of a triangle in the same ratio, it is parallel to the third side. State it, prove by contradiction (assume a different point gives parallelism, then show points coincide). Application: in a trapezium AB||DC||EF, EF divides the non-parallel sides proportionally (AE/ED = BF/FC); with AE/ED = 2/3, BF/FC = 2/3 and EF = (3*AB + 2*DC)/5-type weighted value (here EF = 12 cm for AB=10, DC=15).", "explanation": "Converse BPT: agar ek line do bhujaon ko SAME ratio mein baant de, to wo teesri side ke PARALLEL hoti hai. Trapezium mein parallel sides ke beech ki line non-parallel sides ko proportionally kaatti hai. Assertion-Reason mein yahi reason hota hai - dono true aur reason sahi explanation. Ratio likho, cross-multiply karo.", "years": ["2024", "2025"], "papers": 3, "raw": 6, "marks": 5, "types": ["Assertion-Reason", "LA"], "score": 8}, {"key": "M2-389", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (joined cubes/cuboids)", "question": "Two identical solid cubes of side 'a' are joined end-to-end. The total surface area of the resulting cuboid is :", "answer": "Method: joining two cubes of side a makes a cuboid 2a×a×a; TSA = 2(lb+bh+hl) = 2(2a²+a²+2a²) = 10a². For a=10 → 1000 cm² (so the '1200 cm²' assertion is false). For a=4 → 160 cm².", "explanation": "Do cube jodne par ek lamba cuboid banta hai (2a×a×a), TSA = 10a² (12a² nahi — do faces chhup jaate hain). Memory hook: jodne se 2 faces gayab, isliye 12a²−2a²=10a². Cuboid TSA formula = 2(lb+bh+hl).", "years": ["2024", "2026"], "papers": 3, "raw": 10, "marks": 1, "types": ["Assertion-Reason", "Case-based", "MCQ"], "score": 8}, {"key": "N1-451", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "LCM–HCF word problems", "question": "Find the greatest 3-digit number which is divisible by 18, 24 and 36.", "answer": "Method: find LCM of divisors, then the greatest/least multiple in the bound. LCM(18,24,36)=72 ⇒ 72×13=936. <10000 divisible by 48,60,65: LCM=3120 ⇒ 3120×3=9360. Least perfect square divisible by 16,20,50: take LCM, then raise each prime exponent to make it even.", "explanation": "'Sab se divisible' → LCM nikaalo, fir us LCM ke multiples me se jo limit (3-digit, <10000) me fit ho. Greatest ke liye limit÷LCM ka neeche wala whole, fir wापस multiply. Perfect-square waale me har prime ka power EVEN karo.", "years": ["2023", "2025", "2026"], "papers": 3, "raw": 5, "marks": 1, "types": ["MCQ", "SA", "VSA"], "score": 8}, {"key": "N1-459", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Composite / prime via factorisation", "question": "Show that the number 5×11×17+3×11 is a composite number.", "answer": "Method: take out the common factor to show the number has a factor other than 1 and itself ⇒ composite. 5·11·17+3·11=11(5·17+3)=11·88; 7·11·13+13=13·78; 3·11·13+3=3(11·13+1). All have ≥3 factors ⇒ composite.", "explanation": "'Composite dikhana' → common factor bahar nikaalo (factor out). Agar 1 aur khud ke alawa koi factor mila to woh composite hai. Memory hook: 'common term bahar nikaalo, factor mil gaya = composite'. Sirf calculate mat karo — factorised form dikhana zaroori.", "years": ["2024", "2026"], "papers": 3, "raw": 7, "marks": 2, "types": ["MCQ", "VSA"], "score": 8}, {"key": "T1-546", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Find theta from an equation", "question": "The value of θ for which 2 sin² θ = 1/2; 0° ≤ θ ≤ 90° is :", "answer": "Method: simplify to a single standard ratio and read the angle. Representative: 2sin²θ=1/2 ⇒ sinθ=1/2 ⇒ θ=30°.", "explanation": "Equation ko ek ratio = known value tak laao, phir table se θ pehchaano. Hook: 'sinθ=1/2 ⇒ θ=30°'. Answer 0°–90° me; root lete waqt positive.", "years": ["2024", "2025"], "papers": 3, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 8}, {"key": "A2-38", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Solve algebraically", "question": "If 217x + 131y = 913 and 131x + 217y = 827, then solve the equations for the values of x and y.", "answer": "Method (symmetric/'criss-cross' coefficients): ADD the two equations and DIVIDE → x+y; SUBTRACT them → x–y; then solve these two easy equations. e.g. 217x+131y=913 & 131x+217y=827 ⇒ x+y=5, x–y=1 ⇒ x=3, y=2. (101x+102y=304 & 102x+101y=305 ⇒ x=2, y=1.)", "explanation": "Jab coefficients ulte-seedhe same ho (jaise 217 & 131 dono equations mein swap), to seedha mat uljho. Trick: dono ko JOD do → bada simplify ho ke x+y mil jaata; dono ko GHATAO → x–y mil jaata. Phir yeh do simple equations solve karo. Time bachta hai — yeh CBSE ka favourite shortcut hai!", "years": ["2023", "2025"], "papers": 3, "raw": 8, "marks": 2, "types": ["SA", "VSA"], "score": 7}, {"key": "A2-52", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "Tara scored 40 marks in a test, getting 3 marks for each right answer and losing 1 mark for each wrong answer. Had 4 marks been awarded for each correct answer and 2 marks been deducted for each wrong answer, then Tara would have scored 50 marks. Assuming that Tara attempted all questions, find the total number of questions in the test.", "answer": "Method: let x = right answers, y = wrong answers. Score = (marks/right)·x – (penalty)·y. Form two equations from the two scoring schemes and solve; total questions = x+y. e.g. 3x–y=40 & 4x–2y=50 ⇒ x=15, y=5 ⇒ 20 questions. (Veer/Kevin marks: V=2K+6 & V+K+4=40 ⇒ 26 and 10.)", "explanation": "Marks/scoring problems: x = sahi jawab, y = galat jawab. Score = (sahi ke marks)×x − (galat ki penalty)×y. Do alag scoring schemes se do equations banao. Total questions poocha ho to x+y do. Dhyaan: galat answers ke marks MINUS hote hain (–y). Ek-ek term dhyaan se likho, sign mat galat karo.", "years": ["2023", "2024", "2026"], "papers": 3, "raw": 6, "marks": 3, "types": ["LA", "SA"], "score": 7}, {"key": "C1-156", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Ratio of division", "question": "Find the ratio in which line y = x divides the line segment joining the points (6, -3) and (1, 6).", "answer": "Method: ratio k:1, write P by section formula, substitute P into the line equation, solve k. y=x on (6,-3)&(1,6): set x=y → k=9/5 (9:5). 3x+y-9=0 on (1,3)&(2,5): k=3/2 (3:2), point (8/5,21/5). y=2x on (-3,5)&(7,-4): 11:18.", "explanation": "Jab koi line (jaise y=x ya 3x+y-9=0) segment ko kaate: ratio k:1 lo, section formula se P likho, fir P ko line ke equation me daal do aur k solve karo. Bas line ki condition satisfy karaani hai!", "years": ["2023", "2024", "2026"], "papers": 3, "raw": 9, "marks": 2, "types": ["SA", "VSA"], "score": 7}, {"key": "G1-223", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Angles in similar triangles", "question": "If ∆ABC ~ △ PQR with ∠ A = 32° and ∠ R = 65°, then the measure of ∠ B is:", "answer": "Method: Corresponding angles of similar triangles are equal; remaining angle by angle sum. ABC~PQR with angle A=32, angle R=65 => angle C=65 => angle B = 180-32-65 = 83 deg. (Also: angle A=30, angle Q=90 => angle B=90, angle R=30 etc., so angle R + angle B = 120; case-study angle AOB = 60 from such angle relations.)", "explanation": "Similar triangles mein corresponding angles barabar (A=P, B=Q, C=R). Pehle correspondence se ek angle transfer karo, phir angle-sum 180 se baaki nikaalo. Letters ka order dekh kar hi angles match karo, warna galti.", "years": ["2023", "2025"], "papers": 3, "raw": 7, "marks": 1, "types": ["Case-based", "MCQ"], "score": 7}, {"key": "N1-444", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Prime factorisation – exponents", "question": "If 3825 = 3ˣ × 5ʸ × 17ᶻ, then the value of x + y – 2z is :", "answer": "Method: prime-factorise, read exponents, compute the asked combination. 3825=3²·5²·17 ⇒ x+y−2z=2. (4004=2²·7·11·13 ⇒ sum 5; 1080=2³·3³·5 ⇒ p−q=0; 2520=2³·3²·5·7 ⇒ a+2b=12.) aᵇ=32=2⁵ ⇒ a=2,b=5 then evaluate.", "explanation": "Number ko primes me todo, exponents likho, fir jo poochha (sum, p−q, x+y−2z) nikaalo. Memory hook: 'pehle factor tree, fir exponent ginti'. aᵇ=32 me 32=2⁵ pehchaano. Exponent ki value galat uthana yahan main galti hai.", "years": ["2024", "2025"], "papers": 3, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 7}, {"key": "S2-488", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Valid probability range", "question": "Which of the following numbers cannot be the probability of happening of an event ?", "answer": "A probability must satisfy 0 ≤ P ≤ 1. Any value <0, >1 or like 1/0.89 (>1) cannot be a probability; pick that option.", "explanation": "Rule: probability hamesha 0 aur 1 ke beech (0 ≤ P ≤ 1). Jo number 1 se bada ho (jaise 1/0.89) ya negative ho, woh galat. Bas range ke bahar wala option dhoondo.", "years": ["2023", "2024", "2026"], "papers": 3, "raw": 7, "marks": 1, "types": ["MCQ"], "score": 7}, {"key": "S2-523", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Coloured balls - find unknown", "question": "A bag contains 5 red balls and n green balls. If the probability of drawing a green ball is three times that of a red ball, then the value of n is :", "answer": "Set up an equation from the given probability and solve. n/(5+n)=3·5/(5+n) ⇒ n=15. (Red = black+10, P(red)=3/5 ⇒ total 50; red=black+3, P=12/23 ⇒ total 69.)", "explanation": "Unknown waale sawaal: di hui probability se equation banao. P(green)=3·P(red) ⇒ n green, 5 red ⇒ n=15. Hamesha favourable/total = di hui value rakho, phir solve. Total ko variable mein express karo.", "years": ["2023", "2025"], "papers": 3, "raw": 5, "marks": 1, "types": ["MCQ", "VSA"], "score": 7}, {"key": "T2-567", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "One triangle (elevation)", "question": "The angle of elevation of the top of a tower from a point on the ground which is 30 m away from the foot of the tower, is 30°. Find the height of the tower.", "answer": "Method: ek right triangle, tan(angle) = height / horizontal-distance ⇒ height = distance × tan(angle). Yahaan height = 30·tan30° = 30/√3 = 10√3 m. (60° wale me 30·tan60° = 30√3 m; 45° & 60 m base ⇒ 60 m.)", "explanation": "Seedha formula: height = base × tanθ. Diagram banao — observer point, foot, top. Distance base hai, height perpendicular. tan30°=1/√3 (rationalise karke 10√3), tan45°=1, tan60°=√3. Bas value bhar do, units (m) likhna mat bhoolna.", "years": ["2023", "2024", "2026"], "papers": 3, "raw": 9, "marks": 1, "types": ["MCQ", "VSA"], "score": 7}, {"key": "A3-80", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Nature of roots (discriminant)", "question": "Find the discriminant of the quadratic equation 4x² – 5 = 0 and hence comment on the nature of roots of the equation.", "answer": "Discriminant D=b²−4ac; then state nature (D>0 real distinct, D=0 equal, D<0 not real). 4x²−5=0: a=4,b=0,c=−5 ⇒ D=80>0 ⇒ real & distinct. For bx²+ax+c=0, D=a²−4bc. If D is given, set b²−4ac=D and solve for the unknown (3x²−2x+c=0, D=16 ⇒ c=−1).", "explanation": "Discriminant ka formula D=b²−4ac (general form me a,b,c sahi pehchaano — kabhi b=0 bhi hota hai). D ka value nikaal ke nature bolo: positive=do alag, zero=barabar, negative=real nahi. Agar D diya ho to ulta chalo: D=b²−4ac me daal ke unknown solve karo.", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 6, "marks": 2, "types": ["MCQ", "VSA"], "score": 6}, {"key": "A4-109", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "nth term from the end", "question": "The 11th term from the end of the A.P. : 10, 7, 4, ......., - 62 is :", "answer": "Method: nth term from end = l-(n-1)d where l is last term. e.g. l=-62,d=-3: 11th from end = -62-10(-3) = -32. (Equivalently reverse the AP: first term l, common difference -d.)", "explanation": "End se nth term nikaalne ke liye AP ko ulta socho: last term ab 'pehla', aur d ka sign badal jaata hai. Formula: l-(n-1)d. Hook: 'end se chalo to l pehla aur d ulta'. Saavdhaani: original d ka sign flip karna mat bhoolo.", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 5, "marks": 1, "types": ["MCQ"], "score": 6}, {"key": "A4-114", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "First term/term from Sn formula", "question": "If the sum of the first n terms of an A.P be 3n^2 + n and its common difference is 6, then its first term is", "answer": "Method: a_1 = S_1. e.g. S_n=3n^2+n -> S_1=4, so a_1=4. (S_n=3n^2+4n -> a_1=7; S_n=2m^2+3m -> a_2=S_2-S_1=14-5=9.)", "explanation": "Pehla term = S_1 (n=1 daal do). Doosra term chahiye to a_2=S_2-S_1. Hook: 'a_1 = S_1 bas'. Diya hua d distract karne ke liye hota hai — first term ke liye sirf S_1 kaafi hai!", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 5, "marks": 1, "types": ["MCQ"], "score": 6}, {"key": "A4-115", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Sum of special numbers", "question": "Find the sum of all 3-digit natural numbers which are divisible by 11.", "answer": "Method: identify the AP of qualifying numbers (first, last, common diff), find n via a_n=l, then S_n=n/2(a+l). e.g. 3-digit multiples of 11: 110,...,990, n=81, sum=81/2(110+990)=44550. (Sum first 200 naturals = 200*201/2 = 20100; 'not divisible' = total sum - divisible sum.)", "explanation": "Range/divisibility wale sum mein pehle qualifying numbers ki AP banao (pehla, aakhri, common difference). n nikaalo a_n=l se, phir S_n=n/2(a+l). 'Not divisible' = (poora sum) - (divisible sum). Hook: 'pehla-aakhri-kitne, phir n/2(a+l)'.", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 3, "marks": 5, "types": ["LA", "MCQ", "SA"], "score": 6}, {"key": "G1-209", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "1/x + 1/z = 1/y (perpendiculars)", "question": "[FIGURE: Triangle ABC with PA, QB, RC perpendicular to AC] In the given figure PA, QB and RC are each perpendicular to AC. If AP = x, BQ = y and CR = z, then prove that 1/x + 1/z = 1/y", "answer": "Method: PA, QB, RC all perpendicular to AC means PA||QB||RC. triangle CQB ~ triangle CPA gives y/x = BC/AC; triangle AQB ~ triangle ARC gives y/z = AB/AC. Adding: y(1/x+1/z) = (AB+BC)/AC = 1, hence 1/x + 1/z = 1/y.", "explanation": "Teen perpendiculars matlab teen parallel lines. Do jodi similar triangles banao: y/x aur y/z ko BC/AC aur AB/AC ke barabar likho, phir ADD karo - AC/AC = 1 milta hai. Isliye 1/x + 1/z = 1/y. Adding-the-ratios trick yaad rakho.", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 7, "marks": 5, "types": ["LA"], "score": 6}, {"key": "G2-235", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents (proof)", "question": "Two tangents TP and TQ are drawn to a circle with centre O from an external point T. Prove that ∠PTQ = 2∠OPQ. [FIGURE: circle with center O, external point T, tangents TP and TQ]", "answer": "Prove angle PTQ = 2 angle OPQ. TP=TQ so triangle TPQ is isosceles, angle TPQ = 90 - half(PTQ). Since OP perp TP, angle OPT=90, so angle OPQ = 90 - (90 - half PTQ) = half PTQ. Hence PTQ = 2 OPQ.", "explanation": "Do tangents barabar to triangle TPQ isosceles. angle OPT=90 (radius perp tangent). Thoda angle ghata-jod karke angle OPQ = aadha angle PTQ aata hai. Pehle isosceles ke base angle likho, fir 90 wala use karo.", "years": ["2023", "2026"], "papers": 3, "raw": 7, "marks": 3, "types": ["LA", "SA"], "score": 6}, {"key": "G2-239", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangents at diameter ends parallel (proof)", "question": "Prove that the tangents drawn at the ends of a diameter of a circle are parallel.", "answer": "Prove tangents at the ends of a diameter are parallel. Both tangents are perpendicular to the same diameter (radius perp tangent), so they make equal angles of 90 with the diameter, hence they are parallel.", "explanation": "Diameter ke dono sire par tangent dono us diameter par 90 banate hain. Ek hi line par do perpendicular lines aapas me parallel hoti hain. Hook: same line pe dono perpendicular matlab dono parallel.", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 7, "marks": 2, "types": ["VSA"], "score": 6}, {"key": "N1-447", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Ratio with HCF/LCM", "question": "Two numbers are in the ratio 2 : 3 and their LCM is 180. What is the HCF of these numbers ?", "answer": "Method: numbers = ax, bx with a:b coprime, so HCF=x and LCM=abx. 6x=180 ⇒ x=30 ⇒ HCF=30 (60,90). Ratio 4:5, HCF 11 ⇒ 44,55 ⇒ LCM=220. Product of coprimes ⇒ HCF=1.", "explanation": "Ratio waale numbers ax, bx likho (a:b coprime ⇒ HCF=x, LCM=abx). Di hui LCM se x nikaalo, fir HCF=x. Memory hook: 'coprime ratio me common multiplier x hi HCF hai'. Coprime numbers ka HCF hamesha 1.", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 8, "marks": 2, "types": ["MCQ", "VSA"], "score": 6}, {"key": "S1-473", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Modal/median class (MCQ)", "question": "Write the modal class.  [grouped frequency case-study]", "answer": "Method: modal class = interval with the maximum frequency - read it off (no formula). Rainfall data -> 600-800. Asking only the lower limit of the modal class (e.g. 19.5) is the same skill. Representative answer: 600-800.", "explanation": "'Modal class likho' = sabse zyada frequency wali class chuno, koi formula nahi. Rainfall mein 600-800. Sirf lower limit poochein toh us class ka chhota number (19.5). Hook: 'sabse lambi frequency = modal class'.", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 9, "marks": 1, "types": ["Case-based"], "score": 6}, {"key": "S2-513", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Numbered tickets - number property", "question": "A bag contains 100 cards numbered 1 to 100. A card is drawn at random from the bag. What is the probability that the number on the card is a perfect cube ?", "answer": "Total = (last−first+1). List favourable numbers and divide. Perfect cubes 1–100: {1,8,27,64}=4 ⇒1/25. Perfect squares 6–55: 5 ⇒5/50=1/10. Perfect squares 5–100 (96 cards): 8 ⇒1/12; 2-digit numbers=90/96=15/16.", "explanation": "Numbered cards mein total = last − first + 1. Phir perfect square/cube waale numbers list karke gino. Cubes 1–100: 1,8,27,64 = 4 ⇒ 1/25. Range ka first/last dhyaan se padho — yahin marks katte hain.", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 6, "marks": 1, "types": ["MCQ", "VSA"], "score": 6}, {"key": "S2-521", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Coloured balls - neither/not", "question": "A bag contains 5 pink, 8 blue and 7 yellow balls. One ball is drawn at random from the bag. What is the probability of getting neither a blue nor a pink ball ?", "answer": "Total = sum of all. 'Neither blue nor pink' = the remaining colour. 5+8+7=20; neither blue nor pink = yellow = 7 ⇒7/20. (3 red,5 white,7 black: neither red nor black = white 5 ⇒1/3; ratio 2:3:4 not blue = (2+4)/9 = 2/3.)", "explanation": "Total jodo. 'Neither A nor B' = baaki colour ki balls. 5+8+7=20, neither blue nor pink = yellow = 7 ⇒ 7/20. Tip: jo colour bachte hain unhe jodo, ya complement 1 − P(A or B).", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 6}, {"key": "T1-565", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "sinθ=cosθ ⇒ θ=45° then evaluate", "question": "If sin θ = cos θ, (0° < θ < 90°), then value of (sec θ · sin θ) is :", "answer": "Method: sinθ=cosθ ⇒ tanθ=1 ⇒ θ=45°; substitute. Representative: secθ·sinθ = √2·(1/√2)=1; sin⁴θ+cos⁴θ = 1/4+1/4 = 1/2; tan²θ+cot²θ−2 = 1+1−2 = 0.", "explanation": "sinθ=cosθ ka matlab tanθ=1, yaani θ=45°. Phir 45° ki values daal do. Hook: 'sin=cos ⇒ 45°'. tan²+cot²−2 jaise me dono 1 ban jaate hain.", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 6, "marks": 1, "types": ["MCQ", "VSA"], "score": 6}, {"key": "A2-48", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "Half of the difference between two numbers is 2. The sum of the greater number and twice the smaller number is 13. Find the numbers.", "answer": "Method: let the two numbers be x (greater) and y; translate each sentence into a linear equation, then solve. e.g. (x–y)/2=2 & x+2y=13 ⇒ x=7, y=3; sum 105 & difference 45 ⇒ 75 and 30; quotient–remainder type 3x=4y+3 & 7y=5x+1 ⇒ x=4, y=3 etc.", "explanation": "Do numbers wale word problems: x ko bada, y ko chhota maano, phir har line ka equation banao ('half of difference' = (x–y)/2, 'sum' = x+y, etc.). Quotient-remainder mein Dividend = Divisor×Quotient + Remainder use karo. Phir elimination se solve. Memory hook: 'sentence padho, turant equation likho' — variables clearly define karna sabse zaroori.", "years": ["2023", "2024"], "papers": 3, "raw": 6, "marks": 2, "types": ["LA", "SA", "VSA"], "score": 5}, {"key": "A3-70", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Nature of roots (discriminant)", "question": "If the quadratic equation ax² + bx + c = 0 has two real and equal roots, then 'c' is equal to", "answer": "Equal roots ⇒ D=b²−4ac=0 ⇒ c=b²/4a (equivalently b²=4ac, ac=b²/4). Answer: c = b²/4a.", "explanation": "Equal (barabar) roots ke liye discriminant zero hota hai: b²−4ac=0. Isse seedha relation nikaalo c=b²/4a ya b²=4ac. Yaad rakho: 'equal roots ⇒ D=0', bas isi se saare options derive ho jaate hain.", "years": ["2023", "2024"], "papers": 3, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "A3-75", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Find k for given roots", "question": "Value of k for which x = 2 is a solution of the equation 5x² - 4x + (2 + k) = 0, is", "answer": "Substitute the given root into the equation and solve for the unknown. x=2 in 5x²−4x+(2+k)=0 ⇒ 20−8+2+k=0 ⇒ k=−14. Same method: x=0.3 in x²−0.9k=0 ⇒ k=0.1; y=1 in py²+py+3=0 ⇒ p=−3/2.", "explanation": "Agar koi value root/solution di hai, to use seedha equation me 'plug' kar do aur baaki variable solve karo. Memory hook: 'root daalo, equation = 0 banao'. Decimal ya fraction aaye to ghabrana nahi — sirf substitute aur simplify.", "years": ["2023", "2024"], "papers": 3, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "A3-78", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Form a quadratic from given roots", "question": "A quadratic equation whose roots are (2 + √3) and (2 – √3) is :", "answer": "If roots are α,β then equation is x²−(α+β)x+αβ=0. Roots (2±√3): sum=4, product=4−3=1 ⇒ x²−4x+1=0. Roots 7 & 1/7: sum=50/7, product=1 ⇒ 7x²−50x+7=0. (Surd roots of a rational-coefficient quadratic occur in conjugate pairs, so 5+√7 ⇒ other root 5−√7.)", "explanation": "Roots se equation banane ka formula: x²−(sum)x+(product)=0. Conjugate surds (a+√b, a−√b) me sum rational aur product me √ gaayab ho jaata hai. Yaad rakho: rational coefficients ho to irrational/surd roots hamesha jodi (conjugate pair) me aate hain.", "years": ["2023", "2025"], "papers": 3, "raw": 8, "marks": 1, "types": ["Assertion-Reason", "MCQ"], "score": 5}, {"key": "M2-380", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (solid with hemispherical scoops)", "question": "A wooden article was made by scooping out a hemisphere from each end of a solid cylinder, as shown in the figure. If the height of the cylinder is 10 cm and its base is of radius 3.5 cm, find the total surface area of the article. [FIGURE: a cylinder with hemispheres scooped out from both ends]", "answer": "Method: scooping doesn't add flat circles — TSA = CSA of cylinder + CSA of 2 hemispheres = 2πrh + 2(2πr²) = 2πr(h+2r). E.g. h=10, r=3.5 → 374 cm²; h=5.8, r=2.1 → 132 cm². (id 880 'wooden toy' is the same scoop-from-each-end TSA type.)", "explanation": "Hemisphere scoop karne par flat circle gayab ho jaata hai, sirf curved (2πr² × 2) reh jaata hai. To TSA = cylinder ki CSA (2πrh) + 2 hemisphere ki curved = 2πr(h+2r). 'Scooped/depression' sune to circle add NAHI karna.", "years": ["2023", "2024"], "papers": 3, "raw": 3, "marks": 5, "types": ["LA", "SA"], "score": 5}, {"key": "S1-478", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Mode", "question": "Find mode of the given data.  [grouped frequency distribution]", "answer": "Method: identify modal class (max frequency), then Mode = L + ((f1-f0)/(2f1-f0-f2))*h (f1=modal-class freq, f0=preceding, f2=succeeding, h=class size). Modal class 45-60 -> Mode = 45 + ((12-10)/(24-10-9))*15 = 51; apples modal class 120-140 -> 125 g. Representative answer: 51.", "explanation": "Mode: modal class pehchaano (max freq), phir Mode = L + ((f1-f0)/(2f1-f0-f2))*h. f1=modal, f0=pehle, f2=baad. -> 51. Hook: 'modal class pakdo, f1-f0 upar, 2f1-f0-f2 neeche'. f0/f2 ulta mat karna.", "years": ["2023", "2024"], "papers": 3, "raw": 7, "marks": 2, "types": ["Case-based", "LA"], "score": 5}, {"key": "T1-551", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Identify the true/false identity (MCQ)", "question": "Which of the following is true for all values of θ (0° ≤ θ ≤ 90°) ?", "answer": "Method: check each option against the three Pythagorean identities. Representative: only sec²θ−tan²θ=1 holds for all θ (tan²θ−sec²θ=−1).", "explanation": "Har option ko teen identities se test karo. Common trap: tan²θ−sec²θ=−1 (not +1). Hook: 'sec²−tan²=+1, ulta galat'.", "years": ["2023", "2025"], "papers": 3, "raw": 7, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "A1-3", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Zeroes ↔ coefficients", "question": "If α, β are zeroes of a polynomial p(x) = 2x² - x - 1 then α² + β² is equal to", "answer": "Method: α²+β² = (α+β)² - 2αβ. Use α+β=-b/a, αβ=c/a. Representative p(x)=2x²-x-1: α+β=1/2, αβ=-1/2, so α²+β² = (1/2)² - 2(-1/2) = 1/4 + 1 = 5/4.", "explanation": "Identity yaad rakho: α²+β² = (α+β)² − 2αβ. Direct square karke add karne ki zaroorat nahi — sirf sum aur product chahiye. −2αβ wala minus mat bhoolna, warna answer galat aayega!", "years": ["2023", "2024"], "papers": 3, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "N1-452", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "LCM–HCF word problems", "question": "Three bells ring at intervals of 6, 12 and 18 minutes. If all the three bells rang at 6 a.m., when will they ring together again ?", "answer": "Method: 'together again' ⇒ LCM of intervals, then add to start time. LCM(6,12,18)=36 min ⇒ 6:36 a.m. (Lights 48,72,108 s ⇒ LCM 432 s = 7 min 12 s ⇒ 7:07:12; bells 9,12,15 ⇒ LCM 180 min.)", "explanation": "Ghanti/light 'phir saath' → intervals ka LCM nikaalo, start time me jodo. Memory hook: 'saath-saath → LCM'. Units same rakhna (sec/min) aur answer time-format me. LCM minutes me aaye to hours-minutes me todna.", "years": ["2023", "2024"], "papers": 3, "raw": 8, "marks": 3, "types": ["SA", "VSA"], "score": 4}, {"key": "N1-457", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Ending digit / unit digit (FTA)", "question": "Show that 6ⁿ can not end with digit 0 for any natural number 'n'.", "answer": "Method: a number ends in 0 only if its prime factorisation contains BOTH 2 and 5. 6ⁿ=(2·3)ⁿ has no 5; 4ⁿ=2²ⁿ and 8ⁿ=2³ⁿ have no 5; 15ⁿ=(3·5)ⁿ has no 2. By the Fundamental Theorem of Arithmetic, none can end in 0.", "explanation": "Koi number 0 par tabhi khatam hota hai jab uske prime factors me 2 AUR 5 dono ho. 6ⁿ, 4ⁿ, 8ⁿ me 5 nahi; 15ⁿ me 2 nahi — isliye 0 par khatam nahi ho sakte. Memory hook: '0 ke liye 2 aur 5 dono chahiye'. FTA ka naam likhna marks ke liye zaroori.", "years": ["2023", "2024"], "papers": 3, "raw": 6, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "S1-467", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Effect of change on average", "question": "If the value of each observation of a statistical data is increased by 3, then the mean of the data", "answer": "Method: adding/subtracting a constant k to every observation shifts the mean and the median by the same k (spread unchanged). +3 each -> mean increases by 3; -2 each -> mean decreases by 2; +2 each -> median increases by 2. Representative answer: increases by 3.", "explanation": "Rule: har value mein +k karo toh mean aur median dono +k (ghatao toh -k); spread same. Hook: 'sabko shift karo, average bhi utna shift'. +3 -> mean +3.", "years": ["2023", "2024"], "papers": 3, "raw": 9, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "T1-541", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Given relation -> find value (square it)", "question": "If sin θ + cos θ = √3, then find the value of sin θ ⋅ cos θ.", "answer": "Method: square the given relation (or substitute) and use sin²+cos²=1 to reach the target. Representative: sinθ+cosθ=√3 ⇒ squaring, 1+2sinθcosθ=3 ⇒ sinθcosθ=1. cosA+cos²A=1 ⇒ cosA=sin²A ⇒ sin²A+sin⁴A=1.", "explanation": "Di hui equation ko square karo, phir sin²+cos²=1 lagao — target value mil jaati hai. cosA+cos²A=1 me cosA=sin²A wali trick. sinθ=cosθ ⇒ θ=45°. Hook: 'square karo, identity lagao'.", "years": ["2023", "2024"], "papers": 3, "raw": 8, "marks": 2, "types": ["SA", "VSA"], "score": 4}, {"key": "A1-25", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Evaluate p(x) at a point", "question": "Write the co-ordinates of point A. (point where the curve meets the y-axis)", "answer": "Method: the y-axis intercept is at x=0, so compute p(0) = constant term; the point is (0, p(0)). Representative: p(0)=8 ⇒ (0, 8); or p(0)=136 ⇒ A=(0,136).", "explanation": "Y-axis ko curve x=0 par milta hai, to bas p(0) nikaalo — wo constant term hota hai. Point likho (0, p(0)). 'Point A' ya 'y-axis intersection' dono ka matlab same: x=0 daalo. Aasaan ek-step question hai!", "years": ["2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 8}, {"key": "A1-26", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Zeroes from graph", "question": "Find the span of the arch on the stage floor.", "answer": "Method: the span = horizontal distance between the two x-intercepts (zeroes) of p(x). Find the zeroes, then span = |α − β| (sum the distances to each side of the origin). Representative stage arch p(x)=-x²+2x+8 (zeroes -2, 4): span = 4-(-2) = 6 ft. Other arch (zeroes 228.5, -238.5): span = 238.5 + 228.5 = 467 units.", "explanation": "Span = do x-intercepts ke beech ki doori = |α − β|. Origin ke dono taraf zeroes ho to unki distances jod do (jaise 228.5 + 238.5). Pehle zeroes nikaalo, phir difference/sum lo. Units likhna mat bhoolna!", "years": ["2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 8}, {"key": "A3-94", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Word problem: per-unit cost", "question": "A person on tour has ₹5,400 for his expenses. If he extends his tour by 5 days, he has to cut down his daily expenses by ₹180. Find the original duration of the tour and daily expense.", "answer": "Daily/per-unit cost = total ÷ quantity; write the changed situation as another fraction, take the difference, clear denominators to a quadratic and reject the negative root. ₹5400, +5 days, −₹180/day: 5400/x − 5400/(x+5) = 180 ⇒ x²+5x−150=0 ⇒ x=10 days, ₹540/day. (₹4200, +3 days, −₹70: x²+3x−180=0 ⇒ 12 days; cloth ₹2100, +2 m, −₹120: x²+2x−35=0 ⇒ 5 m, ₹420/m.)", "explanation": "Yeh 'total fixed, per-unit badalta hai' type hai: per-day kharcha = total/din. Naye case me bhi total/quantity likho, dono ka difference equation banao (jitna kam/zyada hua). Denominators hata ke quadratic banao, −ve days/length reject. Yaad rakho: total amount same rehta hai, sirf baat-na badalta hai.", "years": ["2026"], "papers": 2, "raw": 6, "marks": 5, "types": ["LA"], "score": 8}, {"key": "G1-188", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Find length by BPT", "question": "In the given figure, XY || QR, PQ/XQ = 7/3 and PR = 6.3 cm. Find the length of YR.[FIGURE: triangle PQR with a line segment XY parallel to QR, X on PQ and Y on PR]", "answer": "Method: A line parallel to one side -> BPT ratios. e.g. XY||QR with PQ/XQ = 7/3 means PX/XQ = 4/3, so PY/YR = 4/3 along PR; from PR=6.3 split it to get YR. Same idea: PQ||YZ with XP:PY = 2:3 and PQ=5 => YZ = PQ*(XY/XP) = 5*(5/2) = 12.5 cm.", "explanation": "Parallel line = BPT. Diye gaye ratio ko corresponding side pe transfer karo, phir poori side ko us ratio mein baant kar chhota tukda (YR/YZ) nikaalo. Ratio ko pehle simplify kar lo (7/3 ko 4/3 banao) tab apply karo.", "years": ["2026"], "papers": 2, "raw": 5, "marks": 2, "types": ["MCQ", "VSA"], "score": 8}, {"key": "G1-231", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Find length by similarity", "question": "ABCD is a parallelogram such that AF = 7 cm, FB = 3 cm and EF = 4 cm, length FD = equals [FIGURE: Parallelogram ABCD with point E on CD and F on AB, and line segment EF]", "answer": "Method: EF parallel/within the parallelogram makes triangle with AB similar to triangle with EF, so corresponding segments are proportional. With AF=7, FB=3, EF=4 the proportion AF/FB = FD/?(or EF/AB) gives FD; AB||EF with AB=24, EF=36, DA=7 gives AE by AB/EF = DA/DE-type proportion (AE = 10.5 cm).", "explanation": "Parallel line se similar triangles -> corresponding segments proportional. Ratio bana ke unknown (FD ya AE) nikaalo. Parallelogram/parallel ki properties + similarity ko combine karo. Corresponding parts theek match karo.", "years": ["2026"], "papers": 2, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 8}, {"key": "A1-21", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Degree & number of zeroes", "question": "Which of the following statements is true for a polynomial p(x) of degree 3?", "answer": "Method: a polynomial of degree n has AT MOST n real zeroes (n>1). Representative degree 3: 'at most three distinct zeroes'. ((x-2)(x+3) is degree 2 → at most/has 2 zeroes.)", "explanation": "Rule: degree n wale polynomial ke at most n zeroes hote hain. Degree 3 → max 3 zeroes. Factored form (x-2)(x+3) dekho to do brackets = degree 2 = 2 zeroes. 'At most' shabd important hai — exactly nahi!", "years": ["2025", "2026"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 7}, {"key": "A2-34", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Consistency", "question": "Assertion (A): The pair of linear equations px + 3y + 59 = 0 and 2x + 6y + 118 = 0 will have infinitely many solutions if p = 1. Reason (R): If the pair of linear equations px + 3y + 19 = 0 and 2x + 6y + 157 = 0 has a unique solution, then p ≠ 1.", "answer": "Method: test A and R separately using ratio conditions, then judge if R explains A. For px+3y+59=0 & 2x+6y+118=0, infinite solutions need p/2=3/6=59/118 ⇒ p=1 (A true); R also true but is a separate fact ⇒ (B) both true, R not correct explanation. (For 3x–5y+7=0 & –6x+10y+14=0: A true (parallel/inconsistent) but R false since non-unique can also be coincident ⇒ (C).)", "explanation": "Assertion-Reason mein dono statements ko alag-alag jaancho pehle. Ratio condition lagao (infinite = teeno barabar; parallel = do barabar teesra alag). Phir socho: kya R, A ka sahi reason hai? Common trap: R kehta hai 'non-unique = hamesha parallel' — galat, kyunki coincident bhi non-unique hai. Isiliye R false ho sakta hai.", "years": ["2025", "2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["Assertion-Reason"], "score": 7}, {"key": "A3-74", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Find k for given roots", "question": "Find the smallest value of p for which the quadratic equation x² - 2(p + 1)x + p² = 0 has real roots. Hence, find the roots of the equation so obtained.", "answer": "For real roots set D=b²−4ac≥0 and solve the inequality. x²−2(p+1)x+p²=0 ⇒ [−2(p+1)]²−4p²≥0 ⇒ 4(2p+1)≥0 ⇒ p≥−1/2; smallest p=−1/2 gives 4x²−4x+1=0 ⇒ x=1/2,1/2. For 'verify equal roots' problems, substitute the given condition into D and show D=0.", "explanation": "Real roots ke liye D≥0 (inequality), equal ke liye D=0. Smallest value maanga ho to inequality solve karke boundary uthao. 'Verify' wale me condition ko D me daalo aur dikhao ki D ek perfect square ban ke 0 ho jaata hai. Tip: inequality ka sign flip na ho jaaye dhyaan rakho.", "years": ["2025", "2026"], "papers": 2, "raw": 6, "marks": 5, "types": ["LA", "VSA"], "score": 7}, {"key": "G1-194", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity", "question": "In the given figure, OA . OB = OC . OD. Show that ∠ A = ∠ C and ∠ B = ∠ D.[FIGURE: Two triangles AOC and BOD sharing vertex O, with A, O, B collinear and C, O, D collinear]", "answer": "Method: OA.OB = OC.OD rearranges to OA/OC = OD/OB; with the included vertically opposite angle equal, triangle AOD ~ triangle COB by SAS, hence angle A = angle C and angle B = angle D.", "explanation": "Product form OA.OB=OC.OD ko ratio mein todo: OA/OC = OD/OB. Vertically opposite angle barabar -> SAS similarity. Similar triangles ke corresponding angles barabar hote hain, isliye angle A=C, B=D. Product ko ratio banana key step hai.", "years": ["2025", "2026"], "papers": 2, "raw": 3, "marks": 2, "types": ["MCQ", "VSA"], "score": 7}, {"key": "G1-196", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity", "question": "In the given figure, Δ ABE ≅ Δ ACD. Prove that Δ ADE ~ Δ ABC.[FIGURE: triangle ABC with points D and E on AB and AC respectively, forming triangle ADE]", "answer": "Method: From the congruence AB=AC and AE=AD, so AD/AB = AE/AC; angle A common => triangle ADE ~ triangle ABC by SAS.", "explanation": "Congruent triangles se equal sides nikaalo (AB=AC, AD=AE). Inse ratio AD/AB = AE/AC banao, common angle A ke saath SAS similarity. Congruency ka fayda equal sides ke liye uthao.", "years": ["2025", "2026"], "papers": 2, "raw": 2, "marks": 2, "types": ["VSA"], "score": 7}, {"key": "M1-327", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Sector area", "question": "Find the area of each sector of the brooch.", "answer": "Method: Each sector area = (θ/360)πr² with θ = 360°/10 = 36° and r = 35/2 mm. = (36/360)(22/7)(35/2)² = 96.25 mm². (Note: a few of these OCR rows carry the wire-length answer 285 mm by mistake; the sector-area value is 96.25 mm².)", "explanation": "Brooch 10 barabar sectors me bata hai, to har sector ka angle = 360/10 = 36°. Phir simple sector area formula: (θ/360)·πr², r = vyaas/2 = 35/2 mm. Answer 96.25 mm². Memory hook: 'equal pieces → angle = 360/number of pieces', uske baad wahi (θ/360)πr².", "years": ["2025", "2026"], "papers": 2, "raw": 8, "marks": 2, "types": ["Case-based"], "score": 7}, {"key": "M1-354", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Combined figures", "question": "A circular brooch of diameter 35 (mm/cm) has 5 diameters as spokes. Find: the radius of the circle, the circumference of the brooch, and the total length of silver wire required.", "answer": "Method: Radius = diameter/2 = 35/2 = 17.5. Circumference = 2πr = 2(22/7)(35/2) = 110. Total silver wire = circumference + 5 diameters (the 5 straight spokes) = 110 + 5×35 = 285. (Units cm for 2026 brooch, mm for 2025 brooch.)", "explanation": "Brooch case: radius = diameter ÷ 2. Circumference = 2πr. Total taar = bahar ka circle (circumference) + andar ki seedhi tar (yahan 5 diameter = 5×35). Total = 110 + 175 = 285. Tip: spokes seedhi lines hain, inhe circumference me alag se jodo.", "years": ["2025", "2026"], "papers": 2, "raw": 10, "marks": 1, "types": ["Case-based"], "score": 7}, {"key": "M2-406", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (cuboid + half-cylinder)", "question": "A shed is in the form of cuboid surmounted by a half cylinder. The length, breadth, height of cuboid are 10 m, 7 m, 3 m; diameter of cylindrical portion is 7 m. Find the cost of tin sheets at ₹70 per m², given the shed is open from the front and closed at the back.", "answer": "Method: tin/cloth area = (relevant cuboid faces) + 2×(CSA of half-cylinder) or curved + semicircle ends as required. For the protect-plants shed (14×25×16): four walls 2(l+b)h = 1248 + cylindrical part (πrh+πr²) = 704 → 1952 m². For the flood shed: area = 841/4 m², cost = ₹14717.50.", "explanation": "Cuboid + half-cylinder roof: cuboid ke jo faces dikhte hain unhe jodo (open side chhodo, back band ho to woh add), phir half-cylinder ki curved (πrh) + zaroorat ho to semicircle ends. Cost = total area × rate. Diagram se decide karo kaunsa face count karna hai.", "years": ["2025", "2026"], "papers": 2, "raw": 4, "marks": 3, "types": ["LA", "SA"], "score": 7}, {"key": "N1-464", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Number definitions & HCF/LCM facts", "question": "Assertion (A) : For any two prime numbers p and q, their HCF is 1 and LCM is p + q. Reason (R) : For any two natural numbers, HCF × LCM = product of numbers.", "answer": "Method: judge A and R using HCF/LCM facts. Two primes: HCF=1 but LCM=p·q (not p+q) ⇒ A false, R true. HCF(x,y)≤smaller number is always true; HCF×LCM=product is true; LCM is a multiple of HCF is true. HCF(36m²,18m)=18m for prime m (true). Match to the option.", "explanation": "In Assertion-Reason me HCF/LCM ke pakke facts use karo: do primes ka HCF=1, LCM=p·q (p+q NAHI). HCF hamesha chhote number se ≤ hota hai; HCF×LCM=product (2 numbers); LCM hamesha HCF ka multiple. Memory hook: 'do primes ka LCM = product, sum nahi'. Counter se A/R check karo.", "years": ["2025", "2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["Assertion-Reason"], "score": 7}, {"key": "S2-510", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Cards - union (or)", "question": "A card is drawn at random from a pack of 52 cards. What is the probability that the card drawn is a spade or a king ?", "answer": "Union: spades(13)+kings(4)−king of spades(1)=16 ⇒16/52=4/13. Ten or king: 4+4=8 ⇒8/52=2/13.", "explanation": "'A ya B' mein union: A ke cards + B ke cards − dono (overlap). Spade(13)+King(4)−KingOfSpade(1)=16 ⇒ 4/13. Sabse badi galti — overlapping card double mat ginna!", "years": ["2025", "2026"], "papers": 2, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 7}, {"key": "T2-571", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Angle of depression (single object)", "question": "A peacock sitting on the top of a tree of height 10 m observes a snake moving on the ground. If the snake is 10√3 m away from the base of the tree, then angle of depression of the snake from the eye of the peacock is", "answer": "Method: angle of depression = alternate angle of elevation at the object. tanθ = (height of observer) / (horizontal distance). Peacock: tanθ = 10/(10√3) = 1/√3 ⇒ θ = 30°. (Car 10√3 m from 30 m tower ⇒ tanθ = 30/10√3 = √3 ⇒ 60°.)", "explanation": "Depression ka angle banane ke liye horizontal se neeche dekho — par woh object ke elevation angle ke barabar hota hai (alternate angles). Phir simple: tanθ = height/distance. 10 m ped, 10√3 door ⇒ tan=1/√3 ⇒ 30°. Yaad rakho: upar se neeche dekhna = neeche se upar wala same angle.", "years": ["2025", "2026"], "papers": 2, "raw": 5, "marks": 1, "types": ["MCQ"], "score": 7}, {"key": "A1-5", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Zeroes ↔ coefficients", "question": "α and β are the zeroes of the polynomial 5x² – 16x – 10. Find the value of α/β + β/α.", "answer": "Method: α/β + β/α = (α²+β²)/(αβ) = ((α+β)² − 2αβ)/(αβ). For 1/α²+1/β² use ((α+β)²−2αβ)/(αβ)². Representative 5x²-16x-10: α+β=16/5, αβ=-2, so value = ((16/5)²+4)/(-2) = (256/25+100/25)/(-2) = (356/25)/(-2) = -178/25.", "explanation": "α/β+β/α ko ek fraction banao: (α²+β²)/(αβ). Upar wala (α+β)²−2αβ se nikaalo. Pura kaam sum aur product se hota hai — alag-alag zeroes nikaalne ki zaroorat nahi. Fraction simplify dhyaan se karna.", "years": ["2024", "2026"], "papers": 2, "raw": 6, "marks": 2, "types": ["SA", "VSA"], "score": 6}, {"key": "A2-51", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "Three years ago, Rashmi was thrice as old as Nazma. Ten years later, Rashmi will be twice as old as Nazma. How old are Rashmi and Nazma now?", "answer": "Method: let present ages be x and y. 'n years ago' ⇒ (x–n), 'n years later' ⇒ (x+n). Form two equations and solve. e.g. x–3=3(y–3) and x+10=2(y+10) ⇒ Rashmi 42, Nazma 16. (Adil/Bharat: 50 and 20.)", "explanation": "Age problems: present ages x aur y lo. '3 saal pehle' = (x–3), '10 saal baad' = (x+10) — sabki age utni hi badhti/ghatti hai. 'Thrice as old' = ek age = 3 × doosri. Equations bana ke solve karo. Common galti: sirf ek person ki age mein years add karna — DONO ki age change hoti hai!", "years": ["2024", "2026"], "papers": 2, "raw": 3, "marks": 5, "types": ["LA", "SA"], "score": 6}, {"key": "A2-58", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "Vijay invested certain amounts of money in two schemes A and B, which offer interest at the rate of 8% per annum and 9% per annum, respectively. He received ₹1,860 as the total annual interest. However, had he interchanged the amounts of investments in the two schemes, he would have received ₹20 more as annual interest. How much money did he invest in each scheme ?", "answer": "Method: let amounts be x and
