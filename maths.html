 y; interest = rate×amount. One equation for actual interest, one for interchanged rates. 0.08x+0.09y=1860 and 0.09x+0.08y=1880 ⇒ x=₹12000, y=₹10000. (10%/15% type ⇒ ₹10000 & ₹6000.)", "explanation": "Interest/investment problems: x aur y rupaye invest hue. Interest = rate × amount (8% = 0.08). Pehla equation seedha interest, doosra jab rates 'interchange' ho jaate (x par doosra rate, y par pehla). '₹20 zyada' wala part second equation ko thoda bada deta. Decimal mein rate lo aur dono equations solve karo.", "years": ["2025"], "papers": 2, "raw": 3, "marks": 5, "types": ["LA"], "score": 6}, {"key": "A3-90", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Word problem: profit & loss", "question": "A dealer sells an article for ₹75 and gains as much percent as the cost price of the article. Find the cost price of the article.", "answer": "Let CP=x; write gain%/loss% as a function of x, form SP equation and solve the quadratic. Gain% = x: x + x·x/100 = 75 ⇒ x²+100x−7500=0 ⇒ x=50, CP=₹50. (Loss% = x/2: x − x²/200 = 48 ⇒ x²−200x+9600=0 ⇒ CP=₹120 or ₹80.)", "explanation": "Yahan trick: gain% ya loss% khud cost price (x) pe depend karta hai. Gain = (x/100)·x. SP = CP ± profit/loss ka equation banao, quadratic solve karo. Percentage ko /100 karna mat bhoolo. Dono valid roots aa sakte hain — context dekho.", "years": ["2024", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["LA", "SA"], "score": 6}, {"key": "A4-130", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find n & d given Sn and last term", "question": "The first term of an A.P. is 5, the last term is 45 and the sum of all the terms is 400. Find the number of terms and the common difference of the A.P.", "answer": "Method: S_n=n/2(a+l)=400 with a=5,l=45 -> n=16. Then l=a+(n-1)d -> 45=5+15d -> d=8/3. (For a=32,l=-10,d=-2: n=22, sum=242.)", "explanation": "a, last term aur Sum diye ho to pehle n nikaalo S_n=n/2(a+l) se, phir d ko l=a+(n-1)d se. Hook: 'n pehle (sum formula se), d baad mein (term formula se)'. Agar d diya ho to ulta: n term-formula se nikaalo phir sum.", "years": ["2024", "2026"], "papers": 2, "raw": 6, "marks": 3, "types": ["SA", "VSA"], "score": 6}, {"key": "A4-147", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find common difference from term gap", "question": "The common difference of an A.P. in which a_15 - a_11 = 48, is", "answer": "Method: a_p - a_q = (p-q)d. e.g. a_15-a_11=4d=48 -> d=12. (a_20-a_15=5d=20 -> d=4; a_14-a_8=6d=24 -> d=4; a_16-a_12=4d.)", "explanation": "Do terms ka antar = (number of steps) x d. a_15-a_11 mein 4 steps, to 4d=48 -> d=12. Hook: 'a_p - a_q = (p-q)d, bas steps gino'. a hata kar seedha d mil jaata hai.", "years": ["2024", "2026"], "papers": 2, "raw": 5, "marks": 1, "types": ["MCQ"], "score": 6}, {"key": "C1-167", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Midpoint", "question": "If the mid-point of the line segment joining the points A(3, 4) and B(k, 6) is P(x, y) and x + y – 10 = 0, then find the value of k.", "answer": "Method: write midpoint with unknown, use the extra condition. Mid of (3,4),(k,6)=(x,y), x+y-10=0 → k=7. Mid of (a,4),(2,2b)=(2,6) → a+b=6. Mid of (10,-6),(k,4), a-2b=18 → k=22.", "explanation": "Midpoint nikaalo unknown ke saath, fir di hui condition (jaise x+y-10=0) me daal ke unknown solve karo. Midpoint formula + ek extra equation = answer.", "years": ["2025"], "papers": 2, "raw": 7, "marks": 3, "types": ["MCQ", "SA"], "score": 6}, {"key": "G1-184", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Find length by similarity", "question": "In the given figure ∆ABC is shown. DE is parallel to BC. If AD = 5 cm, DB = 2.5 cm and BC = 12 cm, then DE is equal to [FIGURE: triangle ABC with line DE parallel to BC]", "answer": "Method: DE||BC => triangle ADE ~ triangle ABC, so DE/BC = AD/AB. With AD=5, DB=2.5 (AB=7.5), BC=12 => DE = (5/7.5)*12 = 8 cm. (Reverse: given DE find BC the same way.)", "explanation": "DE||BC matlab chhota triangle ADE bada triangle ABC ke SIMILAR hai. To DE/BC = AD/AB. Bas ratio bithao aur DE (ya BC) nikaalo. Yaad rakho AB = AD+DB pura lena hai, sirf AD nahi.", "years": ["2024", "2026"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 6}, {"key": "G1-200", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Diagonals proportional => trapezium", "question": "The diagonals of a quadrilateral ABCD intersect each other at the point O such that AO/OC = BO/OD. Show that quadrilateral ABCD is a trapezium.", "answer": "Method: If diagonals of a quadrilateral cut each other in the same ratio (AO/OC = BO/OD), draw a line through O parallel to a side; by converse of BPT one pair of sides is parallel, so the quadrilateral is a trapezium.", "explanation": "Agar diagonals ek dusre ko same ratio mein kaatein (AO/OC=BO/OD), to quadrilateral TRAPEZIUM hota hai. Proof: O se parallel line khinch kar converse-BPT lagao. MCQ mein seedha answer trapezium.", "years": ["2024", "2026"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ", "VSA"], "score": 6}, {"key": "G2-247", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent length (trig)", "question": "In the given figure, PQ and PR are tangents to a circle with centre O and radius 3 cm. If ∠ QPR = 60°, then the length of each tangent is : [FIGURE: Circle with center O, radius 3cm, and two tangents PQ and PR from external point P. Angle QPR is 60 degrees.]", "answer": "Two tangents inclined at 60 to a circle of radius 3 (or angle QPR=60). OP bisects the angle so angle QPO=30. In right triangle OQP, tan30 = OQ/PQ so the length of each tangent PQ = r/tan30 = 3 tan60? = 3sqrt3 cm. (Equivalently tan30 = r/AP gives AP = 3sqrt3 cm.)", "explanation": "Do tangents ke beech angle aadha karo (OP bisector), fir tan se length: PQ = r/tan30 = 3sqrt3 cm. Inclined-at-60 wala bhi yahi hai. Hook: angle aadha karo, phir radius/tan.", "years": ["2024", "2026"], "papers": 2, "raw": 5, "marks": 2, "types": ["MCQ", "VSA"], "score": 6}, {"key": "G2-298", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Concentric circles chord", "question": "In the adjoining figure, AB is the chord of the larger circle touching the smaller circle. The centre of both the circles is O. If AB = 2 r and OP = r, then the radius of larger circle is :[FIGURE: Two concentric circles with center O. A chord AB of the larger circle is tangent to the smaller circle at point P. OP is the radius of the smaller circle.]", "answer": "Concentric-circle relations via Pythagoras R^2 = r^2 + (half-chord)^2. E.g. chord AB=2r tangent to inner radius OP=r gives half-chord=r, so R = r sqrt2. For sum of radii=16 and chord 16 (half=8): R+r=16, R^2 = r^2 + 64 gives (R-r)(R+r)=64, so R-r = 4 cm.", "explanation": "Concentric circles me hamesha right triangle: R^2 = r^2 + (aadha chord)^2. Values daal ke R ya R-r nikalo. Hook: bada-radius^2 = chhota-radius^2 + aadha-chord^2.", "years": ["2025"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 6}, {"key": "M1-326", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Sector area", "question": "Find the area of the sector of a circle of radius 42 cm and of central angle 30°. Also, find the area of the corresponding major sector. [Use π = 22/7]", "answer": "Method: Area of (minor) sector = (θ/360)πr². Major sector = πr² − minor sector = ((360−θ)/360)πr². For r=42, θ=30°: minor = 462 cm², major = 5082 cm². (For r=10, 90° major sector with π=3.14: 235.5 cm².)", "explanation": "Sector ka area = (θ/360)·πr² — yahi base formula hai. Major sector maange to ya poore circle (πr²) me se minor ghata do, ya seedha ((360−θ)/360)πr² use karo. π=22/7 ya 3.14 jo bola ho wahi lena. Yaad rakho: angle/360 ka fraction hi pura kaam karta hai.", "years": ["2024", "2026"], "papers": 2, "raw": 4, "marks": 3, "types": ["SA"], "score": 6}, {"key": "M1-334", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Sector perimeter", "question": "The perimeter of a certain sector of a circle of radius 5.6 m is 20.0 m. Find the area of the sector.", "answer": "Method: From perimeter = 2r + arc, get arc = perimeter − 2r. Then arc = (θ/360)2πr gives θ; area = (1/2)·r·arc = (θ/360)πr². r=5.6, P=20 → arc=8.8, θ=90°, area=24.64 m². (P=15.6 case → arc=4.4 cm, θ=45°.)", "explanation": "Ulta sawaal: perimeter de rakha hai, arc/angle/area nikaalna hai. Pehle arc = perimeter − 2r. Phir arc = (θ/360)2πr se θ nikaalo. Area chahiye to mast shortcut: Area = (1/2)×r×arc. Tip: 2r hamesha pehle minus karo.", "years": ["2024", "2026"], "papers": 2, "raw": 3, "marks": 5, "types": ["LA", "SA"], "score": 6}, {"key": "M1-339", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Find angle/radius from sector", "question": "If a large circular pizza is divided into 5 equal sectors, then the central angle of each sector will be :", "answer": "Method: When a circle is split into n equal sectors, each central angle = 360°/n. 5 sectors → 72°; brooch 10 sectors → 36°.", "explanation": "Barabar tukde → har ka angle = 360/number of tukde. Pizza 5 me kata → 72°. Brooch 10 spokes → 36°. Bas itna: total 360° ko equal pieces me baant do. Yeh sabse easy marks hain.", "years": ["2025"], "papers": 2, "raw": 5, "marks": 1, "types": ["Case-based", "MCQ"], "score": 6}, {"key": "M2-399", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Largest solid carved out (cone from cube)", "question": "The volume of the largest right circular cone that can be carved out from a solid cube of edge 2 cm is :", "answer": "Method: largest cone in a cube of edge a has radius a/2 and height a. Volume = (1/3)π(a/2)²a = πa³/12. For a=2 → 2π/3 cm³; general edge l → πl³/12.", "explanation": "Cube me sabse bada cone: radius = aadhi side (a/2), height = poori side (a). Volume = (1/3)π(a/2)²·a = πa³/12. Yeh formula ratta maaro — har baar derive karne ki zaroorat nahi. Edge ko a maan ke daal do.", "years": ["2024", "2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 6}, {"key": "M2-402", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Ratio of volumes / surface areas", "question": "If the radii of the bases of a cylinder and a cone are in the ratio 3 : 4 and their heights are in the ratio 2 : 3, find the ratio of their volumes.", "answer": "Method: V_cyl/V_cone = (πr1²h1)/((1/3)πr2²h2) = 3·(r1/r2)²·(h1/h2) = 3·(9/16)·(2/3) = 9:8. (id 2020: sphere & cone same r, equal volumes → (4/3)πr³ = (1/3)πr²h → h = 4r.)", "explanation": "Ratio wale me numbers daalne ki zaroorat nahi — formula ka ratio banao. Cylinder:cone = (πr1²h1):((1/3)πr2²h2). '1/3' ko 3 banake upar le aao. Phir radii ka square aur height ka ratio multiply. Equal-volume me formulae barabar rakho.", "years": ["2025"], "papers": 2, "raw": 2, "marks": 3, "types": ["MCQ", "SA"], "score": 6}, {"key": "N1-454", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "LCM–HCF word problems", "question": "In a school, there are two sections of class X. There are 40 students in the first section and 48 students in the second section. Determine the minimum number of books required for their class library so that they can be distributed equally among students of both sections.", "answer": "Method: 'distributed equally among either group' ⇒ LCM of the two counts. LCM(40,48)=240 books. (Sections 28,30 ⇒ LCM=420.)", "explanation": "'Dono sections me barabar baant sake' → counts ka LCM nikaalo. Memory hook: 'minimum books jo dono me poora baate → LCM'. Yahan HCF nahi LCM — har student ko poori books milni chahiye.", "years": ["2024", "2026"], "papers": 2, "raw": 2, "marks": 2, "types": ["MCQ", "VSA"], "score": 6}, {"key": "N1-460", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Composite / prime via factorisation", "question": "State true or false for each of the following statements and justify in each case: (i) 2 × 3 × 5 × 7 + 7 is a composite number. (ii) 2 × 3 × 5 × 7 + 1 is a composite number.", "answer": "Method: check for a common factor. (i) 2·3·5·7+7=7(2·3·5+1)=7·211 ⇒ composite (True). (ii) 2·3·5·7+1=211 is prime ⇒ statement 'composite' is False. For p·q·r+q=q(pr+1) ⇒ composite; p·q·r+1 may be prime or composite (give examples).", "explanation": "Pehle common factor dhoondho. Agar bach jaata hai (jaise +7 me 7 common) → composite=True. Agar +1 type ho aur koi common factor na ho, value nikaalo — 211 prime nikla to 'composite' False. Memory hook: '+(same prime) → composite; +1 → check karna padega'.", "years": ["2025"], "papers": 2, "raw": 6, "marks": 3, "types": ["SA"], "score": 6}, {"key": "S2-503", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Two dice - same/different", "question": "Two dice are thrown together. The probability that they show different numbers is :", "answer": "Total = 36. Doubles (same) = 6 ⇒ P(same)=1/6; P(different)=1−1/6=5/6.", "explanation": "36 outcomes. 'Same' = doubles (1,1)...(6,6) = 6 ⇒ 1/6. 'Different' = 1 − 1/6 = 5/6. Complement se time bachao.", "years": ["2024", "2026"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ", "SA"], "score": 6}, {"key": "T2-570", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "One triangle (hypotenuse: rope/string/wire)", "question": "A ladder 14 m long leans against a wall. If the foot of the ladder is 7 m from the wall, then the angle of elevation of the top of the wall is :", "answer": "Method: ladder = hypotenuse, wall = perpendicular, floor-gap = base. cosθ = base/ladder ya use Pythagoras for the third side. Yahaan cosθ = 7/14 = 1/2 ⇒ θ = 60°. (Assertion: base 6, wall 8 ⇒ ladder = √(36+64)=10 m TRUE, par angle = 60° galat kyunki tanθ=8/6≠√3, isliye option C.)", "explanation": "Ladder ko hypotenuse maano. Do side pata ho to teesri Pythagoras (a²+b²=c²) se, aur angle ke liye cos/sin/tan use karo. 7 base, 14 ladder ⇒ cosθ=1/2 ⇒ 60°. Assertion-Reason me dono alag-alag check karo: 3-4-5 wala 6-8-10 ladder sahi par uska angle 60° nahi hota.", "years": ["2025"], "papers": 2, "raw": 3, "marks": 1, "types": ["Assertion-Reason", "MCQ"], "score": 6}, {"key": "A1-1", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Zeroes from graph", "question": "The graph of y = p(x) is given in the adjoining figure. Zeroes of the polynomial p(x) are [FIGURE: Parabola opening upwards, intersecting x-axis at (-5,0) and (7,0), and y-axis at (0, -5/2)]", "answer": "Method: the zeroes are the x-coordinates of the points where the graph meets the x-axis (y=0). Read them off directly. Representative: x-intercepts at -5 and 7 (the y-intercept is NOT a zero), so zeroes are -5, 7.", "explanation": "Zeroes wahi x-values hain jahan graph x-axis ko cut karta hai (y=0). Bas wahan ke x padho. Common galti: y-axis wala intercept (0, c) ko zero samajh lena — wo zero NAHI hai. Sirf x-intercepts likho.", "years": ["2023", "2026"], "papers": 2, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "A1-6", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Zeroes ↔ coefficients", "question": "If α, β are zeroes of the polynomial p(x) = 5x² – 6x + 1, then find the value of α + β + αβ.", "answer": "Method: compute α+β=-b/a and αβ=c/a, then plug into the given expression (α+β+αβ, or 1/α+1/β−2αβ, etc.). Representative 5x²-6x+1: α+β=6/5, αβ=1/5, so α+β+αβ = 6/5+1/5 = 7/5.", "explanation": "Yeh sab expression-evaluation hain: bas α+β aur αβ nikaalo, phir formula me daal do. Jo bhi expression ho (α+β+αβ ya 1/α+1/β−2αβ), pehle sum-product, phir substitute. Calculation me sign aur fraction sambhaalo!", "years": ["2024", "2025"], "papers": 2, "raw": 6, "marks": 2, "types": ["MCQ", "VSA"], "score": 5}, {"key": "A2-31", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Condition for solutions (k)", "question": "Which out of the following type of straight lines will be represented by the system of equations 3x + 4y = 5 and 6x + 8y = 7?", "answer": "Method: lines are parallel / system inconsistent (no solution) when a1/a2 = b1/b2 ≠ c1/c2. Check or solve the unknown from this condition. e.g. ax+2y=9 & 3x+by=18 are parallel ⇒ a/3 = 2/b ≠ 9/18 ⇒ ab = 6; for x/2+y/3=5 & 2x+ky=7 inconsistent ⇒ k = 4/3.", "explanation": "Parallel/inconsistent yaani lines milti hi nahi — koi solution nahi. Condition: a1/a2 = b1/b2 par c1/c2 alag. Toh pehle do ratio barabar rakho (k nikaalne ke liye), aur dhyaan rakho teesra ratio alag rahe. Memory hook: 'do barabar, teesra alag = parallel'. Coefficients fraction mein ho to pehle saaf karo.", "years": ["2023", "2026"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "A2-37", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Solve algebraically", "question": "Solve the following system of linear equations algebraically : 2x + 5y = − 4; 4x – 3y = 5", "answer": "Method: elimination (make one variable's coefficients equal, add/subtract) or substitution. e.g. 2x+5y=–4 & 4x–3y=5 ⇒ x=1/2, y=–1; 7x–2y=5 & 8x+7y=15 ⇒ x=1, y=1; 2p+3q=13 & 5p–4q=–2 ⇒ p=2, q=3. Always verify by putting values back.", "explanation": "Standard solve: elimination ya substitution. Elimination mein kisi ek variable ke coefficient barabar banao (LCM lo), phir jod ya ghata do — ek variable udd jaata hai. Phir doosri value nikalo. Last mein dono values ko original equations mein daal ke verify karna na bhoolo — exam mein verification ke marks milte hain!", "years": ["2024", "2025"], "papers": 2, "raw": 4, "marks": 2, "types": ["VSA"], "score": 5}, {"key": "A2-39", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Solve algebraically", "question": "If 2x + y = 13 and 4x – y = 17, find the value of (x - y).", "answer": "Method: solve by elimination (or the add/subtract trick), then compute the asked quantity. 2x+y=13 & 4x–y=17 ⇒ add ⇒ x=5, then y=3 ⇒ x–y=2. Surd systems (√2x+√3y=5, √3x–√8y=–√6) — eliminate by suitable multiplication ⇒ x=√2, y=√3.", "explanation": "Pehle system solve karo, phir jo poocha (jaise x–y) woh nikaalo — seedha x–y maang rahe ho to kabhi jod/ghata ke turant aa jaata hai. Surd (root) wale equations se daro mat: √ ko aam coefficient maano, LCM-type multiply karke ek variable hatao. Answer mein bhi √2, √3 jaise aate hain — galat nahi hai.", "years": ["2024", "2025"], "papers": 2, "raw": 6, "marks": 2, "types": ["VSA"], "score": 5}, {"key": "A2-57", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "If the length of a rectangle is reduced by 5 cm and its breadth is increased by 2 cm, then the area of the rectangle is reduced by 80 cm². However, if we increase the length by 10 cm and decrease the breadth by 5 cm, its area is increased by 50 cm². Find the length and breadth of the rectangle.", "answer": "Method: let length=x, breadth=y; write new area (x±a)(y±b) and compare with xy±change; the xy and constant terms simplify to a LINEAR equation each. Solve the pair. e.g. ⇒ length 40 cm, breadth 30 cm. (Perimeter type: 2(x+y)=70 & x=2y+5 ⇒ 25 cm, 10 cm.)", "explanation": "Rectangle dimension problems: length = x, breadth = y. Naya area = (x−5)(y+2) jaisa likho aur '80 kam ho gaya' matlab original xy se 80 ghata. Expand karne par xy cancel ho jaata aur LINEAR equation bachta — yahi trick hai! Perimeter = 2(length+breadth). Do equations bana ke solve. Units (cm) likhna na bhoolo.", "years": ["2024", "2025"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA", "SA"], "score": 5}, {"key": "A3-69", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Nature of roots (discriminant)", "question": "The least positive value of k, for which the quadratic equation 2x² + kx − 4 = 0 has rational roots, is", "answer": "For rational roots the discriminant D=b²−4ac must be a perfect square (≥0). For 2x²+kx−4=0, D=k²+32; least positive integer k making it a perfect square is k=2 (gives 36). For x²−px+6=0 rational roots, D=p²−24 must be a perfect square, giving p=−5 (D=1). Answer: k=2 / p=−5.", "explanation": "Rational roots chahiye to discriminant D=b²−4ac ko perfect square banana padta hai (aur ≥0). Pehle D likho, phir aisa value dhoondo jisse D ek poora square ban jaaye. Memory hook: 'rational = perfect square discriminant'. Least positive value maanga ho to chote numbers try karo.", "years": ["2023", "2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "A4-99", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find n given Sn", "question": "How many terms of the arithmetic progression 45, 39, 33, ...... must be taken so that their sum is 180 ? Explain the double answer.", "answer": "Method: put S_n=n/2[2a+(n-1)d] equal to given sum, form a quadratic in n and solve. e.g. a=45,d=-6,S=180 -> n^2-16n+60=0 -> n=10 or 6; both valid as later terms turn negative. (21,18,15 sum 0 -> n=15.)", "explanation": "Itne terms ka sum X chahiye -> S_n formula ko X ke barabar rakho, quadratic in n banegi. Hook: agar dono roots positive hon to dono valid ho sakte hain (kyunki baad ke terms negative ho jaate hain, sum wapas gir jaata hai). Reject sirf negative/fraction n.", "years": ["2023", "2026"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA", "VSA"], "score": 5}, {"key": "A4-107", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Word problems", "question": "Rohan repays his total loan of ₹ 1,18,000 by paying every month starting with the first instalment of ₹ 1,000. If he increases the instalment by ₹ 100 every month, what amount will be paid by him in the 30th instalment ? What amount of loan has he paid after 30th instalment ?", "answer": "Method: instalments form AP a=1000, d=100. 30th instalment a_30=1000+29(100)=₹3900; 40th (last) a_40=₹4900. Total of 30 = S_30=15[2000+2900]=₹73,500; amount still to pay=1,18,000-73,500=₹44,500.", "explanation": "Loan ki kistein (instalments) AP banti hain: pehli kist = a, har baar badhne wali raqam = d. Ek-particular-kist ke liye a_n=a+(n-1)d, total-jama ke liye S_n. Bacha hua loan = kul loan - S_n. Hook: 'kist = a_n, jama = S_n, bacha = total - S_n'.", "years": ["2023", "2026"], "papers": 2, "raw": 13, "marks": 1, "types": ["Case-based", "SA"], "score": 5}, {"key": "A4-112", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find term/nth-term from Sn", "question": "In an A.P., the sum of the first n terms is given by S_n = 6n – n^2. Find its 30th term.", "answer": "Method: a_n = S_n - S_(n-1). e.g. S_n=6n-n^2 -> a_n=7-2n -> a_30=7-60=-53. (S_n=2n^2+13n -> a_n=4n+11, a_10=51.) Also '15th exceeds 8th by 21, S10=55, form AP' OR-variant: d=3, a=-8, AP -8,-5,-2,...", "explanation": "Agar Sn ka formula diya ho to a_n = S_n - S_(n-1) lagao (ya a_1=S_1, a_2=S_2-S_1 se d nikaalo). Hook: 'term = is sum minus pichla sum'. Phir maangi hui term ya nth-term likho. Sn polynomial se hamesha linear a_n milta hai.", "years": ["2023", "2026"], "papers": 2, "raw": 7, "marks": 3, "types": ["SA"], "score": 5}, {"key": "A4-125", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find a, d from ratio & sum", "question": "The ratio of the 10th term to its 30th term of an A.P. is 1 : 3 and the sum of its first six terms is 42. Find the first term and the common difference of A.P.", "answer": "Method: a10/a30=1/3 -> 3(a+9d)=a+29d -> a=d. S_6=42 -> 2a+5d=14 -> with a=d, 7d=14 -> d=2,a=2.", "explanation": "Pehle ratio se ek rishta (a aur d ke beech) nikaalo, phir sum se doosra equation. Dono milake a,d solve karo. Hook: 'ratio se relation, sum se equation'. a10:a30 ko cross-multiply karna mat bhoolo.", "years": ["2024", "2025"], "papers": 2, "raw": 4, "marks": 3, "types": ["LA", "SA"], "score": 5}, {"key": "A4-126", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Three terms in AP", "question": "Three numbers in A.P. have the sum 30. What is its middle term ?", "answer": "Method: take terms a-d, a, a+d; their sum = 3a = 30 -> middle term a = 10.", "explanation": "Teen consecutive AP terms ko a-d, a, a+d maano — inka sum hamesha 3a hota hai (d gayab!). To middle term = sum/3 = 30/3 = 10. Hook: 'teen terms ka sum = 3 x beech wala'. Yeh trick exams mein bahut kaam aati hai.", "years": ["2024", "2025"], "papers": 2, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "G1-183", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Find length by BPT", "question": "In the given figure, ABC is a triangle in which DE||BC. If AD = x, DB = x - 2, AE = x + 2 and EC = x – 1, then find the value of x. [FIGURE: Triangle ABC with line DE parallel to BC, AD=x, DB=x-2, AE=x+2, EC=x-1]", "answer": "Method: DE||BC so by BPT AD/DB = AE/EC. Substitute the algebraic lengths x/(x-2) = (x+2)/(x-1), cross-multiply, the x^2 terms cancel and you get a linear equation giving x = 4.", "explanation": "Yahan lengths algebra mein di hain (x, x-2 ...). BPT se AD/DB = AE/EC banao aur cross-multiply karo - x^2 dono taraf cancel ho jaata hai, seedha x mil jaata hai (x=4). Ghabrao mat, expand karke dekho.", "years": ["2023", "2026"], "papers": 2, "raw": 6, "marks": 2, "types": ["VSA"], "score": 5}, {"key": "G1-210", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity (parallelogram)", "question": "E is a point on the side AD produced of a parallelogram ABCD and BE intersects CD at F. Show that Δ ABE ~ Δ CFB.", "answer": "Method: In parallelogram ABCD, AD||BC and AB||DC. With E on AD produced and BE meeting DC at F: angle AEB = angle CBF (alternate, AD||BC) and angle A = angle BCF (alternate, AB||DC), so triangle ABE ~ triangle CFB by AA.", "explanation": "Parallelogram mein dono jodi opposite sides parallel -> bahut saare alternate angles barabar. Do equal angles dhoondo aur AA similarity likho (ABE~CFB). Parallel lines = alternate angles, har proof ki jaan.", "years": ["2024", "2025"], "papers": 2, "raw": 6, "marks": 5, "types": ["LA", "VSA"], "score": 5}, {"key": "G2-252", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Perpendicular tangents (square)", "question": "In the given figure, tangents PA and PB to the circle centred at O, from point P are perpendicular to each other. If PA = 5 cm, then length of AB is equal to [FIGURE: circle with center O and external point P, tangents PA and PB perpendicular to each other]", "answer": "Two tangents from P with angle APB=90: OAPB is a square (PA=PB tangents, OA=OB radii, all 90). So tangent length = radius and AB = PA sqrt2 (diagonal). E.g. PA=5 gives AB=5sqrt2; AB=3sqrt2 gives PA=3 and diameter = 6 cm.", "explanation": "Jab do tangents 90 pe milein, OAPB square banta hai: tangent length = radius. Chord AB = diagonal = PA sqrt2. Hook: perpendicular tangents matlab square, diagonal = side x sqrt2.", "years": ["2024", "2025"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "G2-287", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Triangle and circle (tangent lengths)", "question": "A circle touches the side BC of a ∆ABC at a point P and touches AB and AC when produced at Q and R respectively. Show that AQ = 1/2 (Perimeter of ∆ABC). [FIGURE: Triangle ABC, circle touching BC at P, AB produced at Q, AC produced at R]", "answer": "Excircle touching side QR at S and extended sides at M,N: prove PM = half(perimeter). Equal tangents give PM=PN, QM=QS, RN=RS. Then PM+PN = (PQ+QM)+(PR+RN) = PQ+QS+PR+SR = PQ+PR+QR; since PM=PN, 2PM = perimeter, so PM = half(PQ+QR+PR).", "explanation": "Excircle me bhi tangents barabar: PM=PN, side ke tukde transfer karo. Sab jod ke 2PM = perimeter, PM = aadha perimeter. Hook: PM=PN, baaki tangents se perimeter ban jaata hai.", "years": ["2023", "2026"], "papers": 2, "raw": 5, "marks": 3, "types": ["LA", "SA"], "score": 5}, {"key": "G2-297", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Concentric circles chord", "question": "Two concentric circles are of radii 5 cm and 3 cm. Find the length of the chord of the larger circle which touches the smaller circle.", "answer": "Concentric circles radii R and r; a chord of the larger touches the smaller. The radius to the contact point is perpendicular to the chord and bisects it, so half-chord = sqrt(R^2 - r^2). E.g. R=5,r=3 gives chord 8 cm; R=5,r=4 gives chord 6 cm.", "explanation": "Bada circle ka chord chhote ko touch karta hai; contact par radius perp chord aur usko aadha karta hai. Aadha chord = sqrt(R^2 - r^2), pura double. Hook: concentric matlab Pythagoras se aadha chord, fir x2.", "years": ["2023", "2026"], "papers": 2, "raw": 5, "marks": 3, "types": ["SA", "VSA"], "score": 5}, {"key": "M1-330", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Clock hands", "question": "The hour-hand of a clock is 6 cm long. The angle swept by it between 7:20 a.m. and 7:55 a.m. is :", "answer": "Method: Hour hand sweeps 360° in 12 h = 30°/hour = 0.5°/minute. In 35 min → 35×0.5 = 17.5° (=35/2°). For 7:00→8:10 (70 min) → 70×0.5 = 35°.", "explanation": "Clock ka concept: ghanta-hand (hour hand) 12 ghante me 360° ghoomta hai, matlab 0.5° har minute. To minute count karo aur 0.5 se multiply. Minute hand: 60 min me 360° = 6° per minute. Memory hook: 'hour hand → half degree per minute, minute hand → 6 degree per minute'.", "years": ["2023", "2026"], "papers": 2, "raw": 5, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "M1-342", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Semicircle area", "question": "What is the area of a semi-circle of diameter 'd' ?", "answer": "Method: Radius = d/2; semicircle area = (1/2)πr² = (1/2)π(d/2)² = πd²/8. Option (C).", "explanation": "Semicircle = aadha circle. Area = (1/2)πr². Diameter d diya hai to r = d/2 daalo: (1/2)π(d/2)² = πd²/8. Memory hook: 'd² wala formula → πd²/8 for half'. Galti se πd²/4 (jo poore circle ka d-form hai) mat likhna.", "years": ["2023", "2026"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "N1-441", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Rational vs irrational classification", "question": "Assertion (A) : (√3 + √5) is an irrational number. Reason (R) : Sum of any two irrational numbers is always irrational.", "answer": "Method: judge A and R separately. √3+√5 is irrational (A true) but 'sum of two irrationals is always irrational' is false, e.g. √2+(−√2)=0 (R false). For the right-triangle perimeter (legs 2,3 ⇒ hyp √13): perimeter 5+√13 irrational ⇒ A false, R true ⇒ option (D).", "explanation": "Assertion-Reason me A aur R ko ALAG check karo, fir relation. Yaad: do irrational ka sum hamesha irrational nahi (√2+(−√2)=0!). Triangle waale me hypotenuse Pythagoras se (√13 irrational ⇒ perimeter irrational). Counter-example dhoondhna sabse tez trick.", "years": ["2023", "2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["Assertion-Reason"], "score": 5}, {"key": "S1-471", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Mean (assumed/step-deviation)", "question": "Find the mean of the following frequency distribution :  Classes 25-30 ... Frequency ...  (using assumed-mean / step-deviation method)", "answer": "Method: pick an assumed mean a (a class-mark, usually the middle one), let u_i = (x_i - a)/h (step-deviation) where h=class size. Then Mean = a + h*(Sum f_i u_i / Sum f_i). The MCQ u = (x-a)/h, e.g. (64-62.5)/5 = 0.3. SA examples: classes 25-30..55-60 -> Mean = 36.86; classes 0-15..75-90 with a=52.5 -> Mean = 41.1. Representative answer: Mean = 36.86.", "explanation": "Assumed-mean/step-deviation: ek a chuno (beech ka class-mark), u = (x-a)/h banao, phir Mean = a + h*(Σf u/Σf). u khud (64-62.5)/5 = 0.3 jaise. Bade numbers ho toh yahi method aasaan. Hook: 'a pakdo, u banao, wapas a mein jodo'.", "years": ["2023", "2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ", "SA"], "score": 5}, {"key": "S2-490", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Calendar / leap year", "question": "Assertion (A) : The probability that a leap year has 53 Sundays is 2/7. Reason (R) : The probability that a non-leap year has 53 Sundays is 5/7.", "answer": "Leap year = 366 days = 52 weeks + 2 extra days ⇒ P(53 Sundays)=2/7 (Assertion TRUE). Non-leap has 1 extra day ⇒ P(53 Sundays)=1/7, NOT 5/7 (Reason FALSE). Answer: (C).", "explanation": "Leap year mein 366 din = 52 hafte + 2 extra; un 2 dino ke 7 pairs mein se 2 mein Sunday ⇒ 2/7 (Assertion sahi). Non-leap mein 1 extra din ⇒ 1/7, 5/7 nahi (Reason galat). Hook: leap=2/7, non-leap=1/7.", "years": ["2023", "2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["Assertion-Reason"], "score": 5}, {"key": "S2-494", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Lottery / find count from P", "question": "A girl calculates that the probability of her winning the first prize in a lottery is 0.08. If 6000 tickets are sold, how many tickets has she bought ?", "answer": "Tickets bought = P × total. 0.08×6000 = 480 (for 800 sold ⇒ 0.08×800 = 64).", "explanation": "Formula: tickets bought = probability × total tickets, kyunki P = apne tickets / total. 0.08 × 6000 = 480. Bas total se multiply karo.", "years": ["2023", "2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ"], "score": 5}, {"key": "T1-561", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Prove identity: √(sec²θ+cosec²θ)=tanθ+cotθ", "question": "Prove that √sec² θ + cosec² θ = tan θ + cot θ.", "answer": "Method: sec²+cosec²=1/cos²+1/sin²=(sin²+cos²)/(sin²cos²)=1/(sin²cos²)=(tanθ+cotθ)² since tanθ+cotθ=1/(sinθcosθ). Take root.", "explanation": "sec²+cosec² ko ek fraction banao = 1/(sin²cos²) = (tanθ+cotθ)². Root lene par tanθ+cotθ. Hook: 'tanθ+cotθ=1/(sinθcosθ)'.", "years": ["2024", "2025"], "papers": 2, "raw": 2, "marks": 3, "types": ["SA"], "score": 5}, {"key": "T2-583", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: tower sections & wire", "question": "Find the length of the wire from the point O to the top of Section B. [Tower with sections A and B observed from point O; angle to B = 30°, OP = 36 cm (or 6 m)]", "answer": "Method: the wire is the hypotenuse, OP (horizontal) is the base, so cosθ = OP/(wire). For Section B (30°): OB = OP/cos30°. With OP=36 ⇒ OB = 36/(√3/2) = 24√3 cm. For Section A (60°): OA = OP/cos60° = 2·OP (= 12 m when OP=6 m).", "explanation": "Wire = hypotenuse, OP = base ⇒ cosθ = base/hypotenuse, isliye wire = OP ÷ cosθ. B ke liye cos30°=√3/2 (OB=24√3), A ke liye cos60°=1/2 (OA = 2·OP). Yaad rakho: wire/string maange to cos (base ke saath) ya sin (height ke saath) — tan nahi, kyunki hypotenuse chahiye.", "years": ["2023", "2026"], "papers": 2, "raw": 9, "marks": 1, "types": ["Case-based"], "score": 5}, {"key": "T2-584", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: tower sections & wire", "question": "Find the distance AB. [From point O, OP = 36 cm; angle to A's top = 45°, angle to B's top = 30°]", "answer": "Method: heights from base OP via tan. AP = OP·tan45° = OP; PB = OP·tan30° = OP/√3. AB = AP − PB. With OP=36: AB = 36 − 12√3 = 12(3−√3) cm. Area of ΔOPB = ½·OP·PB = ½·36·12√3 = 216√3 cm². (OP=6 m ⇒ AB = 6√3 − 2√3 = 4√3 m.)", "explanation": "Yahaan har section ki height tan se: height = OP × tanθ. A (45°) ⇒ AP=OP, B (30°) ⇒ PB=OP/√3. Beech ki doori AB = AP − PB. Area maange to ½×base×height = ½×OP×PB. Diagram me O point par dono angle aur OP base clearly mark karo.", "years": ["2023", "2026"], "papers": 2, "raw": 12, "marks": 2, "types": ["Case-based"], "score": 5}, {"key": "A2-42", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Graphical method", "question": "Using graphical method, find whether following system of linear equations is consistent or not : x = 0 and y = -7", "answer": "Method: plot both lines; if they intersect (or coincide) the system is CONSISTENT. e.g. x=0 (y-axis) & y=–7 intersect at (0,–7) ⇒ consistent. For 'check then solve' types: first state consistency via ratios (a1/a2 ≠ b1/b2 ⇒ consistent), then draw and read the intersection (e.g. x+3y=6 & 3y–2x=–12 ⇒ (6,0); x–2y=0 & 2x+y=0 ⇒ (0,0)).", "explanation": "Consistency check graph se: agar lines kaatti ya overlap karti hain → consistent (solution hai); agar bilkul parallel → inconsistent. Pehle ratios se andaaza lo (a1/a2 ≠ b1/b2 hua to zaroor kaatengi = consistent), phir graph bana ke intersection point likho. x=0 toh khud y-axis hi hai — yeh chhota sa twist yaad rakhna.", "years": ["2023", "2025"], "papers": 2, "raw": 6, "marks": 2, "types": ["SA", "VSA"], "score": 4}, {"key": "C1-174", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Area of triangle", "question": "The area of the triangle formed by the line x/a + y/b = 1 with the coordinate axes is :", "answer": "Method (de-emphasised in 2026 syllabus): line x/a+y/b=1 meets axes at (a,0),(0,b); area=½·a·b. Perimeter of (0,0),(2,0),(0,2)=4+2√2.", "explanation": "Line x/a+y/b=1 axes ko (a,0) aur (0,b) pe kaatti hai — right triangle, area=½·a·b. Perimeter ke liye teeno sides distance formula se jod do. (Note: area-of-triangle ab kam aata hai.)", "years": ["2023", "2025"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "C1-175", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Lines & axes", "question": "The equation of a line parallel to the x-axis and at a distance of 3 units below x-axis is :", "answer": "Method: parallel to x-axis is y=c (below by 3 → y=-3); parallel to y-axis is x=c (right by 5 → x=5); x-y=0 passes through origin; line crosses x-axis where y=0: 2y=4x+5 → (-5/4,0).", "explanation": "x-axis ke parallel: y=constant (neeche 3 → y=-3). y-axis ke parallel: x=constant (right 5 → x=5). x-axis kaatne ka point: y=0 rakho. Origin se guzre to (0,0) satisfy kare.", "years": ["2023", "2025"], "papers": 2, "raw": 5, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "C1-176", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Section formula", "question": "Assertion (A) : The point which divides the line segment joining the points A (1, 2) and B(−1, 1) internally in the ratio 1 : 2 is (-1/3, 5/3). Reason (R) : The coordinates of the point which divides the line segment joining the points A (x1, y1) and B(x2, y2) in the ratio m1 : m2 are (m1x2 + m2x1)/(m1 + m2), (m1y2 + m2y1)/(m1 + m2).", "answer": "Method: verify by applying the section formula. Point dividing (1,2),(-1,1) in 1:2 is (1/3,5/3) not (-1/3,5/3) → assertion false, reason (formula) true. Midpoint divides 1:1 (true); check the (-3,k) ratio separately.", "explanation": "Assertion-reason me formula khud laga ke check karo. Section formula: ((m₁x₂+m₂x₁)/(m₁+m₂),…). Midpoint hamesha 1:1 me baatta. Statement sach ya nahi — calculation se confirm, ratta nahi.", "years": ["2024"], "papers": 2, "raw": 6, "marks": 1, "types": ["Assertion-Reason"], "score": 4}, {"key": "G2-237", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents (proof)", "question": "Prove that the angle between the two tangents drawn from an external point to a circle is supplementary to the angle subtended by the line-segment joining the points of contact at the centre.", "answer": "Prove angle APB + angle AOB = 180. In quadrilateral OAPB, angle OAP = angle OBP = 90 (radius perp tangent). Angle sum of quadrilateral = 360, so APB + AOB = 360 - 90 - 90 = 180.", "explanation": "Quadrilateral OAPB me do corner 90 ke (dono radius perp tangent). Saare angle 360, to bache angle APB aur AOB ka sum 180. Hook: do 90 kha gaye, baaki 180 bacha.", "years": ["2023", "2025"], "papers": 2, "raw": 5, "marks": 3, "types": ["SA"], "score": 4}, {"key": "G2-284", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent-chord angle (proof)", "question": "[FIGURE: Circle with center O, tangent QPR at P, and line segment QA] In the given figure, O is the centre of the circle and QPR is a tangent to it at P. Prove that ∠ QAP + ∠ APR = 90°.", "answer": "Prove angle QAP + angle APR = 90 (tangent at P, chord AP). OA=OP (radii) so angle OAP=angle OPA. Tangent perp radius gives angle OPA + angle APR = 90. Substituting angle OAP for angle OPA gives angle QAP + angle APR = 90. (Same idea for angle BAC + angle ACD = 90.)", "explanation": "OA=OP isosceles se angle OAP = angle OPA. Tangent perp radius se angle OPA + angle APR = 90. Bas OPA ko OAP se badal do. Hook: isosceles plus tangent ka 90 = magic 90.", "years": ["2023", "2025"], "papers": 2, "raw": 6, "marks": 3, "types": ["SA"], "score": 4}, {"key": "M1-333", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Sector perimeter", "question": "The perimeter of the sector of a circle of radius 21 cm which subtends an angle of 60° at the centre of circle, is :", "answer": "Method: Perimeter of a sector = 2r + arc length = 2r + (θ/360)2πr. For r=21, θ=60°: 2(21) + (60/360)(2)(22/7)(21) = 42 + 22 = 64 cm. (For r=7, 90°: 14 + 11 = 25 cm.)", "explanation": "Sector ka perimeter = do radii + ek arc = 2r + (θ/360)·2πr. Sabse common galti: arc ke saath 2r jodna bhool jaana — sector band karne ke liye dono seedhi side (radii) bhi chahiye. r=21,60° → 42+22 = 64 cm.", "years": ["2024"], "papers": 2, "raw": 5, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "M1-347", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Shaded region", "question": "If in the given figure, ∠C = ∠D = 90°, ∠B = 60° and AP = 3 cm, then the area of the shaded region is : [FIGURE: Quadrilateral ABCD with right angles at C and D; a sector with centre P, radius AP=3 cm is shaded; angle B = 60°.]", "answer": "Method: The shaded region is a sector. Its central angle = 360 − (90+90+60) = 120° (angle of quadrilateral at the sector vertex). Area = (θ/360)πr². With r=3, θ=120° → (120/360)π(9) = 3π cm². (943 is a 'find area of shaded region' part solved the same sector/segment way.)", "explanation": "Figure wale shaded sector me angle quadrilateral ke angle-sum se nikaalo (angles ka jod 360°). Phir wahi (θ/360)πr². AP yaani radius = 3, angle 120° → 3π cm². Tip: figure me jo angle missing hai use pehle nikaalo, baaki seedha sector formula.", "years": ["2024"], "papers": 2, "raw": 2, "marks": 1, "types": ["LA", "MCQ"], "score": 4}, {"key": "M2-372", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Volume of combination (find dimension from given volume)", "question": "A room is in the form of cylinder surmounted by a hemi-spherical dome. The base radius of hemisphere is one-half the height of cylindrical part. Find total height of the room if it contains (1408/21) m³ of air. (Take π = 22/7)", "answer": "Method: total volume = cylinder + hemisphere = πr²h + (2/3)πr³. Put h=2r → (8/3)πr³ = 1408/21 → r=2 m, h=4 m, total height h+r = 6 m.", "explanation": "Combination ka volume = alag-alag tukdo ka volume jod do. Yahan cylinder + hemisphere, aur condition h=2r daalo to ek hi variable r bachega. Volume = diya hua, equation banao aur r nikaalo. Tip: 'total height' = cylinder ki height + hemisphere ki radius.", "years": ["2023", "2025"], "papers": 2, "raw": 5, "marks": 3, "types": ["SA"], "score": 4}, {"key": "M2-385", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Volume of combination (cone + hemisphere)", "question": "A solid is in the shape of a right-circular cone surmounted on a hemisphere, the radius of each of them being 7 cm and the height of the cone is equal to its diameter. Find the volume of the solid.", "answer": "Method: volume = cone + hemisphere = (1/3)πr²h + (2/3)πr³. r=7, h=14 → (1/3)π(49)(14) + (2/3)π(343) = 4312/3 ≈ 1437.33 cm³. (id 728: total height 9.5, r=3.5 → h=6 → 166.8 cm³; id 2051: r=2,h=2,π=3.14 → 25.12 cm³.)", "explanation": "Cone-on-hemisphere ka volume = cone (1/3)πr²h + hemisphere (2/3)πr³. Radius dono ka same hota hai. Agar 'total height' diya ho to cone ki height = total height − r (radius). Method same, sirf numbers badalte hain.", "years": ["2023", "2025"], "papers": 2, "raw": 4, "marks": 5, "types": ["LA"], "score": 4}, {"key": "M2-392", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (tent: cylinder + cone)", "question": "A circus tent is cylindrical upto a height of 8 m and conical above it. The diameter of the base is 28 m and total height of tent is 18.5 m. Find area of the cloth used for making tent.", "answer": "Method: cloth = CSA cylinder + CSA cone = 2πrh + πrl. r=14,h=8,l=17.5 → 704+770 = 1474 m². Volume of air = πr²h + (1/3)πr²H = 4928+2156 = 7084 m³. (id 1524: r=3,h=3.5,l=4.2 → canvas 105.6 m², cost ₹52800.)", "explanation": "Tent ka cloth/canvas = cylinder ki CSA (2πrh) + cone ki CSA (πrl) — floor count nahi karte (tent ki niche zameen hoti hai). Volume of air maange to πr²h + (1/3)πr²H. Slant l pehle nikaalo. Cost = area × rate.", "years": ["2024"], "papers": 2, "raw": 7, "marks": 2, "types": ["Case-based", "LA"], "score": 4}, {"key": "S1-476", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Cumulative frequency", "question": "If sub-division having at least 1000 mm rainfall during monsoon season, is considered good rainfall sub-division, then how many sub-divisions had good rainfall ?", "answer": "Method: 'at least X' = add the frequencies of all classes from X upwards. >=1000 mm -> 2+3+1+1 = 7; >=800 mm -> 4+3+3 = 10. Representative answer: 7 sub-divisions.", "explanation": "'Kam se kam X' -> X se upar ki saari frequencies jodo. >=1000 mm -> 7; >=800 mm -> 10. Hook: 'at least = upar se jodo'. Koi class chhoote na.", "years": ["2023", "2025"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "S1-479", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Cumulative frequency", "question": "How many students took time less than 60 seconds ?", "answer": "Method: 'less than X' = cumulative frequency up to (and including) the class ending at X (add frequencies of all classes below X). Race data -> 31; 'less than 50 years' -> 361. Representative answer: 31 students.", "explanation": "'X se kam' -> X tak ki saari frequencies ka jod (cumulative). Race -> 31, age <50 -> 361. Hook: 'less than = neeche se jodo'. Table se cumulative pe pahuncho.", "years": ["2024"], "papers": 2, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "S2-495", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Lottery / prize-blank", "question": "In a lottery, there are 5 prizes and 20 blanks. The probability of getting a prize is :", "answer": "P(prize)=prizes/(prizes+blanks)=5/25=1/5 (for 10 prizes,30 blanks ⇒10/40=1/4).", "explanation": "Total = prizes + blanks. P(prize)=prizes/total=5/25=1/5. Dhyaan: blanks ko bhi total mein jodo, sirf prizes mat ginna.", "years": ["2023", "2025"], "papers": 2, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "S2-501", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Two dice - difference", "question": "Two dice are thrown together. The probability of getting the difference of numbers on their upper faces equals to 3 is :", "answer": "Total = 36. |a−b|=3 ⇒ {(1,4),(2,5),(3,6),(4,1),(5,2),(6,3)} = 6 ⇒ 6/36=1/6 (difference 2 ⇒ 8/36=2/9).", "explanation": "36 outcomes. Difference = |a−b|. Diff 3 ke pairs: (1,4),(4,1),(2,5),(5,2),(3,6),(6,3) = 6 ⇒ 1/6. Dono order (a,b) aur (b,a) alag count karo.", "years": ["2023", "2025"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ", "SA"], "score": 4}, {"key": "A3-77", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Relation between roots and coefficients", "question": "Find the sum and product of the roots of the quadratic equation 2x² – 9x + 4 = 0.", "answer": "For ax²+bx+c=0: sum α+β=−b/a, product αβ=c/a. For 2x²−9x+4=0: sum=9/2, product=2. (Ratio sum:product for 5x²−6x+21=0 is (6/5):(21/5)=2:7.)", "explanation": "Do formula yaad rakho: α+β = −b/a aur αβ = c/a. Bas a, b, c pehchaano aur values daal do. Sabse badi galti: sum me '−b/a' ka minus bhool jaana. 'Sum = −b/a, product = c/a' — ye ratte maar lo.", "years": ["2023", "2024"], "papers": 2, "raw": 4, "marks": 2, "types": ["MCQ", "VSA"], "score": 3}, {"key": "A4-102", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Surd APs", "question": "The next term of the A.P. : √6, √24, √54 is :", "answer": "Method: simplify surds to k√m form (√6, 2√6, 3√6,...) so it's an AP in multiples of √6; next term = 4√6 = √96. (√7,√28,√63 -> next √112; √18,√50,√98 -> next √162.)", "explanation": "Surd wale AP ko simplest form mein likho: √6=√6, √24=2√6, √54=3√6 — yani 1,2,3 guna √6. Agla term 4√6 = √96. Hook: har surd ko sabse chhote root ke multiple mein todo, pattern saaf dikh jaayega.", "years": ["2023", "2024"], "papers": 2, "raw": 5, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "A4-108", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Common difference from nth-term formula", "question": "nth term of an A.P. is 7n + 4. The common difference is :", "answer": "Method: in a_n=An+B the coefficient of n is the common difference d=A (and a_1=A+B). e.g. a_n=7n+4 -> d=7; a_n=3n+7 -> d=3; a_n=5n-7 -> d=5.", "explanation": "Jab a_n = (number)n + (number) ho, to 'n ka coefficient' hi common difference d hota hai. Bas n ke aage wala number dekho! a_n=7n+4 -> d=7. Hook: 'n ke saath jo, wahi d'. Pehla term chahiye to n=1 daal do.", "years": ["2023", "2024"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "A4-124", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find sum from two sum conditions", "question": "If the sum of first 7 terms of an A.P. is 49 and that of first 17 terms is 289, find the sum of its first 20 terms.", "answer": "Method: S_7=49 -> 2a+6d=14; S_17=289 -> 2a+16d=34. Solve -> a=1,d=2. Then S_20=10[2+38]=400. (S_6=36 & S_16=256 -> a=1,d=2 -> S_10=100.)", "explanation": "Do diye hue sums se do equations (2a aur (n-1)d wale) banao, a aur d solve karo, phir maanga gaya sum. Hook: 'S_n=n/2[2a+(n-1)d] do baar, phir teesre sum mein daalo'. Yeh classic two-equation type hai.", "years": ["2023", "2024"], "papers": 2, "raw": 4, "marks": 3, "types": ["LA", "SA"], "score": 3}, {"key": "G1-201", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity (trapezium diagonals)", "question": "Diagonals AC and BD of trapezium ABCD with AB||DC intersect each other at point O. Show that OA/OC = OB/OD. [FIGURE: Trapezium ABCD with AB parallel to DC, diagonals AC and BD intersecting at O]", "answer": "Method: In trapezium AB||DC, diagonals meet at O; triangle OAB ~ triangle OCD (AA, alternate angles), so OA/OC = OB/OD. If DO/OB = 1/2 then CD/AB = OD/OB = 1/2, i.e. AB = 2CD.", "explanation": "Trapezium ke diagonals point O pe milte hain; AB||DC se alternate angles barabar -> triangle OAB ~ OCD. Corresponding sides ka ratio -> OA/OC = OB/OD. Ratio diya ho to side nikaal lo (AB=2CD). Alternate angles likhna zaroori.", "years": ["2023", "2024"], "papers": 2, "raw": 4, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "G2-258", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent-chord angle", "question": "In the given figure, O is the centre of the circle and PQ is the chord. If the tangent PR at P makes an angle of 50° with PQ, then the measure of ∠POQ is : [FIGURE: Circle with center O, chord PQ, and tangent PR at P]", "answer": "Tangent-chord angle: central angle POQ = 2 x (angle between tangent and chord). Tangent PR makes 50 with chord PQ gives angle POQ = 100. For chord subtending 65 at centre, angle QPT = half(65) = 32.5.", "explanation": "Tangent aur chord ka angle = aadha central angle us chord ka. Ya angle OPQ = 90 - tangent-chord angle, OP=OQ isosceles se POQ nikalo. Hook: tangent-chord angle = aadha arc ka central angle.", "years": ["2023", "2024"], "papers": 2, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G2-319", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents and centre", "question": "In the given figure, if PT is a tangent to a circle with centre O and ∠TPO = 35°, then the measure of ∠x is : [FIGURE: Circle with center O, tangent PT, chord PX, angle TPO is 35 degrees, angle POX is x]", "answer": "Find x (angle POX or angle x at centre/quadrilateral) given angle TPO with PT tangent. Tangent perp radius gives angle OTP=90; in the configuration x = 90 + angle TPO. E.g. angle TPO=35 gives x=125; angle TPO=25 gives x=115.", "explanation": "Tangent point par 90; diye angle TPO me 90 jod do (straight-line/exterior angle se): x = 90 + angle TPO. 35 se 125, 25 se 115. Hook: tangent ka 90 plus diya angle.", "years": ["2023", "2024"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "S2-509", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Cards - single draw category", "question": "A card is drawn at random from a well-shuffled pack of 52 cards. The probability that the card drawn is not an ace is :", "answer": "P(not an ace)=1−4/52=48/52=12/13; queen of hearts=1/52; not a jack=48/52=12/13.", "explanation": "Complement use karo: P(not ace) = 1 − 4/52 = 48/52 = 12/13. 'Queen of hearts' sirf 1 card ⇒ 1/52. 52 ka breakdown yaad ho toh seconds mein.", "years": ["2023", "2024"], "papers": 2, "raw": 6, "marks": 1, "types": ["MCQ", "VSA"], "score": 3}, {"key": "S2-515", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Numbered tickets - number property", "question": "One ticket is drawn at random from a bag containing tickets numbered 1 to 40. The probability that the selected ticket has a number which is a multiple of 7 is :", "answer": "List multiples in range, divide by total. Multiples of 7 in 1–40: {7,14,21,28,35}=5 ⇒5/40=1/8. Multiple of 4 in 1–15: 3 ⇒3/15. Even numbers among cards 3–20: 9 ⇒9/18=1/2.", "explanation": "Multiple/divisible waale: range mein woh multiples list karo aur total se divide. 1–40 mein 7 ke multiple: 7,14,21,28,35 = 5 ⇒ 1/8. Chhote multiple se start karke last tak likho.", "years": ["2023", "2024"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "T1-564", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "secθ−tanθ=m -> secθ+tanθ (reciprocal trick)", "question": "If sec θ - tan θ = m, then the value of sec θ + tan θ is :", "answer": "Method: since (secθ−tanθ)(secθ+tanθ)=sec²θ−tan²θ=1, the two are reciprocals. Representative: secθ−tanθ=1/3 ⇒ secθ+tanθ=3; if =m then answer 1/m.", "explanation": "Yaad rakho (secθ−tanθ)(secθ+tanθ)=1 — yeh dono ek doosre ke reciprocal hain. Toh secθ−tanθ=m ⇒ secθ+tanθ=1/m. Hook: 'product hamesha 1 hota hai'. cosec-cot ka bhi same: (cosec−cot)(cosec+cot)=1.", "years": ["2023", "2024"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "T2-576", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Two angles / two positions", "question": "Two pillars of equal lengths stand on either side of a road which is 100 m wide, exactly opposite to each other. At a point on the road between the pillars, the angles of elevation of the tops of the pillars are 60° and 30°. Find the length of each pillar and distance of the point on the road from the pillars. (Use √3 = 1.732)", "answer": "Method: point splits road width W into x and (W−x). tan(θ₁)=h₁/x, tan(θ₂)=h₂/(W−x). For equal pillars set h₁=h₂ and solve; for unequal use the given height-difference. Equal pillars, 100 m road: h=25√3≈43.3 m, distances 25 m and 75 m. (Unequal 80 m road, diff 20 m: heights 49.56 m & 29.56 m, points 28.65 m & 51.35 m.)", "explanation": "Do pillar do taraf, beech me khade ho — road width do hisson me bat-ti hai: x aur (W−x). Har pillar ke liye alag triangle: tanθ = pillar-height/uske paas wali doori. Equal pillar ho to dono height barabar rakho aur ek equation me jodo. Trick: dono base ka jod = poori road width. √3=1.73 use karo.", "years": ["2023", "2024"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA"], "score": 3}, {"key": "A1-12", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Form polynomial from zeroes", "question": "The number of quadratic polynomials having zeroes –5 and −3 is (A) 1 (B) 2 (C) 3 (D) more than 3", "answer": "Method: a polynomial with given zeroes is k(x−α)(x−β); since k can be any nonzero constant, there are INFINITELY many (more than 3). Representative zeroes -5,-3: answer 'more than 3 / infinite'.", "explanation": "Ek hi zeroes ke INFINITE polynomials hote hain, kyunki k(x−α)(x−β) me k kuch bhi nonzero ho sakta hai. Isliye answer hamesha 'infinite / more than 3'. Yeh ek-line concept question hai — bas yaad rakho!", "years": ["2023"], "papers": 2, "raw": 5, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "A3-81", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Relation between roots and coefficients", "question": "Find the value of 'p' for which one root of the quadratic equation px² – 14x + 8 = 0 is 6 times the other.", "answer": "Take roots as α and (k·α), then use α+β=−b/a and αβ=c/a to form two equations and eliminate α. px²−14x+8=0 with roots α,6α: sum 7α=14/p, product 6α²=8/p ⇒ p=3. For 'p is a root of x²−(p+q)x+k=0', product of roots = k ⇒ k=pq.", "explanation": "Jab roots ka aapas me relation diya ho (ek dusre ka k guna), to roots ko α aur kα maan lo. Phir α+β=−b/a aur αβ=c/a — do equations banao aur α udaa do. Memory hook: 'sum aur product dono use karo, ek se kaam nahi chalega'.", "years": ["2023"], "papers": 2, "raw": 3, "marks": 3, "types": ["MCQ", "SA"], "score": 2}, {"key": "A4-97", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Ratio of terms and sums", "question": "The ratio of the 11th term to 17th term of an A.P. is 3 : 4. Find the ratio of 5th term to 21st term of the same A.P. Also, find the ratio of the sum of first 5 terms to that of first 21 terms.", "answer": "Method: from a_m/a_n use a=a+(m-1)d to get a in terms of d (e.g. (a+10d)/(a+16d)=3/4 -> a=8d). Then a5/a21=(a+4d)/(a+20d)=3/7 and S5/S21 = [5(2a+4d)]/[21(2a+20d)] = 25/189.", "explanation": "Pehle di hui ratio se 'a' ko 'd' ke terms mein nikaalo (cross-multiply karke). Phir poochi hui term/sum ratio mein wahi daal do — d cancel ho jaata hai. Formula: a_n=a+(n-1)d, S_n=n/2[2a+(n-1)d]. Hook: 'a ko d mein convert karo, baaki khud cancel'.", "years": ["2023"], "papers": 2, "raw": 4, "marks": 5, "types": ["LA"], "score": 2}, {"key": "A4-100", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find n given Sn", "question": "Solve the equation for x : 1 + 4 + 7 + 10 + .... + x = 287", "answer": "Method: here x is the last term l. Use n=(l-a)/d+1 and S_n=n/2(a+l)=given. Substitute to get a quadratic in x and solve, taking x>0. e.g. 1+4+...+x=287 -> x^2+3x-1720=0 -> x=40. (-4+...+x=437 -> x=50.)", "explanation": "Yahan 'x' last term hai, n nahi. Pehle n ko x ke through likho: n=(x-a)/d+1. Phir S_n=n/2(a+x)=given mein daalo -> x ki quadratic. Hook: positive x hi lo. Common galti: x ko n samajh lena — dhyan rakho!", "years": ["2023"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA"], "score": 2}, {"key": "M2-377", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Capacity / volume of a single solid", "question": "The volume of a right circular cone whose area of the base is 156 cm² and the vertical height is 8 cm, is", "answer": "Method: volume of cone = (1/3)(base area)(height) = (1/3)πr²h. With base 156, h=8 → (1/3)(156)(8) = 416 cm³. If base area & volume given, back-solve height: h = 3V/base = 3(85)/51 = 5 cm.", "explanation": "Cone ka volume = (1/3) × base area × height. Agar base area seedha diya hai to πr² dobara mat nikaalo — bas (1/3)(area)(h). Height maangi ho to ulta karke h = 3V/area. '1/3' bhoolna sabse badi galti hai.", "years": ["2023"], "papers": 2, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "S1-470", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Modal/median class (MCQ)", "question": "The distribution below gives the marks obtained by 80 students on a test ... The modal class of this distribution is :  [less-than cumulative table]", "answer": "Method: convert a 'less than/below' cumulative table to ordinary class frequencies (subtract consecutive cumulative values), then modal class = class of max frequency, median class = class where c.f. first reaches N/2. 80-students data -> frequencies 3,9,15,30,18,5 -> modal class 30-40; 'sum of lower limits of median and modal class' -> add the two lower limits (=25). Representative answer: 30-40.", "explanation": "'Less than' table mile toh pehle consecutive ghatao -> normal frequency. Phir modal class = max frequency wali, median class = jahan c.f. N/2 cross kare. 80 students: 3,9,15,30,18,5 -> 30-40. Hook: 'cumulative? pehle difference, phir max'.", "years": ["2023"], "papers": 2, "raw": 5, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "T2-573", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Object on top of another (two elevations from one point)", "question": "The angle of elevation of the top of a tower 30 m high from the foot of another tower in the same plane is 60° and the angle of elevation of the top of the second tower from the foot of the first tower is 30°. Find the distance between the two towers and also the height of the other tower.", "answer": "Method: let distance between towers = d. From foot of tower-2, tan60° = 30/d ⇒ d = 30/√3 = 10√3 m. From foot of tower-1, tan30° = H/d ⇒ H = d·tan30° = 10√3·(1/√3) = 10 m. So distance = 10√3 m, height of other tower = 10 m. (Id 36: 24 m tower ⇒ d=8√3, H=8, wire=8√7.)", "explanation": "Do tower, do alag foot-points, par beech ki doori d dono triangle me common hai. Ek tower ki height pata hai — usse d nikaalo (tan60° = known-height/d). Phir d ko doosre triangle me daalo (tan30° = H/d) taaki doosre tower ki height mile. Trick: pehle jis triangle me 2 cheezein pata ho wahi se shuru karo.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 5, "types": ["LA"], "score": 2}, {"key": "A1-24", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Find zeroes & verify relationship", "question": "Write the zeroes of the polynomial using diagram and verify the relationship between sum of zeroes and coefficients.", "answer": "Method: read zeroes from the diagram (x-intercepts), then check sum of zeroes = -b/a. Representative arch with zeroes 228.5 and -238.5: sum = -10 = -(coeff of x)/(coeff of x²). ✓", "explanation": "Diagram se zeroes (x-intercepts) padho, phir verify karo sum = -b/a. Arch wale questions me numbers bade hote hain par concept wahi. Sum nikaal ke -b/a se match karao — verification likhna marks ke liye zaroori hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "A2-43", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Graphical method", "question": "Determine graphically, the coordinates of vertices of a triangle whose equations are 2x – 3y + 6 = 0; 2x + 3y – 18 = 0 and x = 0. Also, find the area of this triangle.", "answer": "Method: plot the given lines (and the axis); their pairwise intersections are the triangle's vertices. Take the side lying on the axis as base and the perpendicular distance to the opposite vertex as height; Area = ½ × base × height. e.g. lines + x-axis give base 3, height 4 ⇒ Area = 6 sq. units.", "explanation": "Triangle wala graph sawaal: teeno lines (ya 2 lines + axis) kheecho, do-do lines ke intersection se 3 vertices nikaalo. Area ke liye axis par padi side ko base lo, aur saamne wale vertex ki perpendicular doori ko height — Area = ½ × base × height. Vertices ko clearly mark karo aur coordinates likho, tabhi method ke marks milte hain.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 4}, {"key": "A2-44", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Graphical method", "question": "Two sections, A and B, of class X contributed a total of ₹ 1500 for the Uttarakhand flood victims. The contribution from X-A was ₹ 100 less than that of X-B. Graphically, find the amounts contributed by both sections.", "answer": "Method: turn the word problem into two linear equations, then solve graphically (plot both, read intersection). Here x+y=1500 and y–x=100 ⇒ intersection (700, 800): X-A = ₹700, X-B = ₹800.", "explanation": "Word problem ko graphical se hal karna: pehle do equations banao (total = 1500, difference = 100). Phir dono lines ki table bana ke graph par kheecho aur intersection point padho. Yahi (x,y) answer hai. Word problem ho ya na ho, graphical method same hai — bas equations theek banao aur diagram saaf rakho.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "A2-46", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Graphical method", "question": "Represent the following pair of linear equations graphically and hence comment on the condition of consistency of this pair : x – 5y = 6; 2x – 10y = 12", "answer": "Method: plot both lines; if they fall on each other (coincident) the system is consistent with infinitely many solutions. x–5y=6 & 2x–10y=12 are the same line (all ratios equal) ⇒ coincident ⇒ consistent, infinite solutions.", "explanation": "Yahan graph bana ke batana hai consistency. Agar dono equations ki table same points de rahi hain, to lines ek hi (coincident) hain — matlab consistent aur infinite solutions. Pehle ratios check kar lo (teeno barabar = coincident), phir graph se confirm karo. Comment likhna na bhoolo — 'consistent, infinitely many solutions'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "A3-85", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Word problem: speed, time & distance", "question": "Venkat can row a boat in still water at the speed of 12 km/h. He ferries tourists 15 km upstream and 18 km downstream in 3 hours. Find the speed of the stream.", "answer": "Upstream speed = (boat−stream), downstream = (boat+stream). Form total-time equation and solve. 15/(12−x)+18/(12+x)=3 ⇒ x²−x−12=0 ⇒ x=4 km/h (reject −3).", "explanation": "Stream wale me yaad rakho: upstream (ulta) speed = boat − stream, downstream (seedha) = boat + stream. Phir Time=Distance/Speed se total time ka equation banao. Speed of stream −ve nahi ho sakti, isliye negative root reject.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 4}, {"key": "A4-116", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Number of terms in an AP", "question": "The number of multiples of 4 lying between 12 and 250 is :", "answer": "Method: list the multiples as an AP and use n=(l-a)/d + 1. e.g. multiples of 4 between 12 and 250: 16,...,248 -> n=(248-16)/4+1=59. (Multiples of 6 between 25 and 363: 30,...,360 -> n=56.)", "explanation": "'Kitne multiples' poocha ho to qualifying numbers ki AP banao aur n=(last-first)/d + 1 lagao. 'Between' ho to end-points include karne hain ya nahi, dhyaan se dekho. Hook: '(aakhri-pehla)/d phir +1'. Yeh count hai, sum nahi.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "A4-139", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Surd APs", "question": "The common difference of the AP : √2, 2√2, 3√2, 4√2, ..... is :", "answer": "Method: d = 2√2 - √2 = √2.", "explanation": "Surd AP mein bhi d = doosra term - pehla term. √2, 2√2 ka antar = √2. Hook: 'd=a_2-a_1, surd ho ya number'. Yeh AP √2 ke multiples hain: 1√2, 2√2, 3√2...", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "A4-140", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Case study - nth term & sum", "question": "In a potato race, distances to pick each potato form an AP. (i) Distance for first potato? (ii) For second potato? (iii) Total distance the competitor runs (and time at 5 m/s).", "answer": "Method: each potato is twice the run (go+return). Distances 10,16,22,... (a=10,d=6). 1st=10 m, 2nd=16 m; total S_10=10/2[2(10)+9(6)]=370 m; time=370/5=74 s.", "explanation": "Potato-race mein har baar do guna doori (jaana + aana). Distances AP banti hai (a=10, d=6). Ek potato = a_n, total = S_n. Hook: 'aana-jaana = 2x doori, phir AP'. Time chahiye to total distance / speed.", "years": ["2026"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "A4-141", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find nth term", "question": "The first term of an AP is p and the common difference is q, then its 10th term is :", "answer": "Method: a_10 = a+9d = p+9q.", "explanation": "General nth term formula a_n=a+(n-1)d ka seedha use. 10th term = a+9d = p+9q. Hook: 'n-1 hota hai, n nahi — 10th ke liye 9d jodo'. Variables ho to bhi formula same.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "A4-142", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Identify an AP", "question": "Which of the following sequence is not an A.P. ?", "answer": "Method: a sequence is an AP only if consecutive differences are equal. 1^2,3^2,5^2,... = 1,9,25,... has differences 8,16,... (not constant), so it is NOT an AP. Answer: (D).", "explanation": "AP pehchaanne ka rule: consecutive terms ka antar constant hona chahiye. 1,9,25,... mein antar 8,16,... badalta hai — to yeh AP nahi. Hook: 'antar barabar = AP, warna nahi'. Squares kabhi AP nahi bante.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "A4-143", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find nth term", "question": "The n^th term of the A.P. -1/3, 2/3, 5/3, 8/3, ... is :", "answer": "Method: a=-1/3, d=1. a_n=a+(n-1)d = -1/3+(n-1) = n - 4/3. (Closest standard form n - 3 type in options; exact = n - 4/3.)", "explanation": "nth term ka general formula a_n=a+(n-1)d lagao. Yahan a=-1/3, d=1, to a_n = n - 4/3. Hook: 'a_n=a+(n-1)d, fraction ho to bhi'. Options mein simplified form se match karo, d=1 hone se n ka coefficient 1.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "A4-144", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Common difference from nth-term formula", "question": "The nth term of an A.P. is √2n + 1. Its common difference is", "answer": "Method: in a_n = (√2)n + 1 the coefficient of n is d = √2. (If read as √(2n)+1 it would not be an AP; standard answer treats coefficient = √2, but the printed option here is 1.)", "explanation": "a_n mein 'n ka coefficient' hi common difference hota hai. a_n=(√2)n+1 -> d=√2. Hook: 'n ke saath wala number = d'. Linear-in-n formula hamesha AP deta hai, coefficient hi d.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "A4-145", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Case study - nth term & sum", "question": "A pattern of dots forms squares: 4, 8, 12, ... dots. (i) Show the dots form an AP; write first term and common difference. (ii) Write the nth term. (iii) If 220 dots used, number of squares; can n squares be made with 100 dots?", "answer": "Method: dots 4,8,12,... AP with a=4,d=4; a_n=4n. For total dots use S_n: S_n=n/2[8+(n-1)4]=2n^2+2n=220 -> n^2+n-110=0 -> n=10 squares. For 100 dots: 2n^2+2n=100 -> n^2+n-50=0 has no positive integer root, so not possible.", "explanation": "Dots ka pattern AP banta hai (a=4, d=4), nth term a_n=4n. 'Total dots' diye ho to S_n use karo (S_n=2n^2+2n) aur quadratic solve karo. Hook: 'ek shape = a_n, kul dots = S_n'. n integer na aaye to 'possible nahi'.", "years": ["2026"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "A4-146", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find term using Sn", "question": "In an A.P., a = −3 and S17 = 357. The value of a17 is", "answer": "Method: S_17=17/2(a+a_17)=357 -> a+a_17=42 -> -3+a_17=42 -> a_17=45.", "explanation": "Jab a aur S_n dono ho to S_n=n/2(a+a_n) sabse seedha: a_n nikaalo. Yahan a_17=45. Hook: 'pehla + aakhri = 2S_n/n'. Bina d nikaale bhi last term mil jaata hai.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "A4-152", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Sum of n terms", "question": "If sum of first ten terms of an A.P. is zero with a as the first term and d, the common difference, which of the following relation is true ?", "answer": "Method: S_10=10/2[2a+9d]=0 -> 2a+9d=0 -> a = -9d/2 (i.e. 2a+9d=0).", "explanation": "S_n=0 ka matlab uska bracket [2a+(n-1)d]=0. S_10=0 -> 2a+9d=0. Hook: 'sum zero to bracket zero'. Isse a aur d ka rishta nikal aata hai (a=-9d/2).", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "A4-153", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find sum from nth-term formula", "question": "Find the sum of the first 28 terms of an A.P. whose n^th term is given by a_n = 3n – 2.", "answer": "Method: from a_n=3n-2 get a_1=1 and a_28=3(28)-2=82, then S_28=n/2(a_1+a_28)=28/2(1+82)=1162.", "explanation": "nth-term ka formula diya ho to pehla aur aakhri term nikaalo (n=1 aur n=N daalke), phir S_n=n/2(pehla+aakhri). Hook: 'a_1 aur a_N nikaalo, phir n/2(a_1+a_N)'. Yahan a_1=1, a_28=82, S_28=1162.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "C1-172", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Collinearity", "question": "Using distance formula, prove that the points A(2, 3), B(–7, 0) and C(-1, 2) are collinear.", "answer": "Method: collinear if longest distance = sum of other two. A(2,3),B(-7,0),C(-1,2): AB=3√10,BC=2√10,AC=√10; AC+BC=AB → collinear.", "explanation": "Collinear check: teen doori nikaalo. Sabse badi doori = baaki do ka jod → points ek hi line par. Distance formula laga ke jod milao — bas yahi trick.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "C1-178", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Distance formula", "question": "Advocate Rehana stays at Heera Bagh. How much distance she has to cover daily to go to the court and coming back home?", "answer": "Method: combine distance and section. Daily distance = 2·AC, AC=√65 → 2√65. Crossing on x-axis divides AD: set y=0 → ratio 1:1 (midpoint).", "explanation": "Case-study ke parts alag tool maangte hain. 'Roz kitni doori' → distance × 2 (jaana-aana). 'x-axis kis ratio me kaatta' → section formula me y=0 daalo. Tukdo me todo, har part ka apna formula.", "years": ["2026"], "papers": 1, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "C1-179", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Equidistant point", "question": "Is Birla Mandir equidistant from Heera Bagh and Amar Jawan Jyoti? Justify your answer.", "answer": "Method: compute the two distances and compare. Birla Mandir equidistant from Heera Bagh and Amar Jawan Jyoti iff the distances are equal — justify by distance formula.", "explanation": "Equidistant poochha ho to dono doori distance formula se nikaalo aur barabar hain ya nahi batao. 'Justify' = kaam dikhana, sirf haan/naa nahi. PA²=PB² waala logic.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "G1-199", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity", "question": "In the given figure, AB || DE and AC || DF. Show that ∆ABC ~ ∆DEF. If BC = 10 cm, EB = CF = 5 cm and AB = 7 cm, then find the length DE. [FIGURE: Two triangles ABC and DEF, with AB || DE and AC || DF]", "answer": "Method: AB||DE and AC||DF make corresponding angles equal, so triangle ABC ~ triangle DEF (AA). Then DE/AB = (corresponding ratio): with BC=10, EB=CF=5 the ratio gives DE = AB*(scale); here DE = 21 cm (using EF/BC = DE/AB after computing the scale from the parallels).", "explanation": "Parallel lines se angles barabar -> AA similarity (ABC~DEF). Phir corresponding sides ka ratio bana kar unknown (DE) nikaalo. Parallel = equal corresponding angles, yeh base hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "G1-207", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Geometric mean / CPCT relation", "question": "[FIGURE: Two right triangles PRQ and PSQ are drawn on the same hypotenuse PQ, with PR and QS intersecting at T.] Two right triangles PRQ and PSQ are drawn on the same hypotenuse PQ. If PR and QS intersect at T, prove that ST × TQ = PT × TR.", "answer": "Method: Two right triangles on the same hypotenuse PQ; PR and QS meet at T; triangle PTR ~ triangle STQ (AA, equal vertical angles + right angles in same segment), so PT/ST = TR/TQ => ST.TQ = PT.TR.", "explanation": "Same hypotenuse par bani do right triangles mein intersecting lines se vertically opposite angle milta hai -> AA similarity. Corresponding sides cross-multiply -> ST.TQ = PT.TR. Product relations similarity se nikaalo.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 2, "types": ["
