r_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent properties (Assertion-Reason)", "question": "Assertion (A): A line drawn perpendicular to the tangent at point of contact passes through the centre of the circle. Reason (R) : Lengths of tangents drawn from external point to a circle are equal.", "answer": "A: a line perpendicular to the tangent at the point of contact passes through the centre (true). R: lengths of tangents from an external point are equal (true) but does not explain A. Answer: (b).", "explanation": "A sahi (tangent ke 90 wali line centre se guzarti hai), R bhi sahi par related nahi. Isliye (b). Hook: converse of tangent perp radius true, R alag baat.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "G2-275", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Parallelogram/quad circumscribing to rhombus", "question": "Rectangle ABCD circumscribes the circle of radius 10 cm. Prove that ABCD is a square. Hence, find the perimeter of ABCD.", "answer": "Rectangle ABCD circumscribes a circle of r=10, so all sides equal (opposite-sides-sum rule), hence a square; side = diameter = 20 cm, perimeter = 80 cm.", "explanation": "Rectangle agar circle ko circumscribe kare to square ban jaata hai. Side = diameter = 2r = 20 cm, perimeter = 80 cm. Hook: circumscribed rectangle matlab square, side = diameter.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "G2-276", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Parallelogram/quad circumscribing to rhombus", "question": "A parallelogram having one of its sides 5 cm circumscribes a circle. The perimeter of parallelogram is :", "answer": "A parallelogram circumscribing a circle is a rhombus, so all sides equal. One side = 5 cm, perimeter = 20 cm.", "explanation": "Circumscribing parallelogram = rhombus, saari sides barabar. Ek side 5 cm, perimeter 4x5 = 20 cm. Hook: circumscribed parallelogram = rhombus.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G2-278", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Quadrilateral circumscribing circle", "question": "Prove that opposite sides of a quadrilateral circumscribing a circle subtend supplementary angles at the centre of the circle.", "answer": "Prove opposite sides of a quadrilateral circumscribing a circle subtend supplementary angles at the centre: angle AOB + angle COD = 180 (and BOC + DOA = 180) using congruent triangles formed by radii to the contact points.", "explanation": "Wahi proof: contact points par radii se bane triangle congruent; opposite sides ke central angle ka sum 180. Hook: circumscribing quad matlab opposite sides ke centre-angle supplementary.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "G2-279", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Quadrilateral circumscribing circle", "question": "In the adjoining figure, XY and X'Y' are parallel tangents to a circle with centre O. Another tangent AB touches the circle at C intersecting XY at A and X'Y' at B. Prove that AB subtends right angle at the centre of the circle; or ∠AOB = 90°. [FIGURE: Circle with center O, parallel tangents XY and X'Y', and another tangent AB intersecting XY at A and X'Y' at B]", "answer": "Parallel tangents XY, X'Y' and tangent AB at C cutting them at A,B. OA bisects angle XAB and OB bisects angle Y'BA; the co-interior angles at A and B sum to 180, so angle OAB + angle OBA = 90, hence angle AOB = 90.", "explanation": "Do parallel tangents ke beech ek aur tangent AB; OA aur OB bisector ban-te hain. A aur B ke angle milke 180 (co-interior), to OAB + OBA = 90, AOB = 90. Hook: parallel tangents, co-interior 180, AOB = 90.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "G2-295", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Chord and central angle", "question": "If the length of a chord of a circle is equal to its radius, then the angle subtended by chord at the centre is :", "answer": "Chord length = radius makes the triangle of two radii and the chord equilateral, so the central angle = 60.", "explanation": "Agar chord radius ke barabar ho to do radii plus chord equilateral triangle banate hain, central angle 60. Hook: chord = radius matlab equilateral matlab 60.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G2-306", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent facts (MCQ statement)", "question": "For a circle with centre O and radius 5 cm, which of the following statements is true ? P : Distance between every pair of parallel tangents is 5 cm. Q : Distance between every pair of parallel tangents is 10 cm. R : Distance between every pair of parallel tangents must be between 5 cm and 10 cm. S : There does not exist a point outside the circle from where length of tangent is 5 cm.", "answer": "For r=5, the distance between any pair of parallel tangents = 2r = 10 cm (statement Q is true).", "explanation": "Parallel tangents ke beech doori hamesha = diameter = 2r = 10 cm. Hook: parallel tangents ka gap = diameter.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G2-307", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent facts (MCQ statement)", "question": "Which of the following statements is false ? (A) Infinite number of tangents can be drawn to a circle. (B) Infinite number of tangents can be drawn to a circle from a point outside the circle. (C) Infinite number of secants can be drawn to a circle from a point outside the circle. (D) Angle between tangent and diameter at point of contact is 90°.", "answer": "Identify the false statement: from an external point only 2 tangents (not infinite) can be drawn, so the option claiming infinite tangents from an external point is false (option B).", "explanation": "Bahar ke point se sirf 2 tangents bante hain, infinite nahi, isliye woh statement galat. Hook: external point matlab exactly 2 tangents.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G2-308", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent facts (MCQ statement)", "question": "The tangents drawn at the extremities of the diameter of a circle are always :", "answer": "Tangents drawn at the extremities of a diameter are always parallel (both perpendicular to the same diameter).", "explanation": "Diameter ke dono sire par tangents dono us diameter par 90, isliye parallel. Hook: diameter ends matlab parallel tangents.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G2-309", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents and centre", "question": "In the adjoining figure, TP and TQ are tangents drawn to a circle with centre O. If ∠OPQ = 15° and ∠PTQ = θ, then find the value of sin 2θ. [FIGURE: Circle with center O, tangents TP and TQ from external point T, and chord PQ. Angle OPQ is 15 degrees, angle PTQ is theta.]", "answer": "TP,TQ tangents, angle OPQ=15, angle PTQ=theta. Using angle PTQ = 2 angle OPQ gives theta=30, so 2theta=60 and sin2theta = sin60 = sqrt3/2.", "explanation": "Yaad rakho angle PTQ = 2 angle OPQ, to theta = 30, 2theta = 60, sin60 = sqrt3/2. Hook: pehle theta = 2 x 15, fir sin.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "G2-310", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent-chord angle", "question": "In the adjoining figure, TS is a tangent to a circle with centre O. The value of 2x° is [FIGURE: Circle with center O, tangent TS, and angles 3x° and x° formed by a chord and tangent]", "answer": "Tangent TS at S with marked angles 3x and x; using the right angle at the contact (radius perp tangent) and the angle-sum relation, solve for x and hence 2x.", "explanation": "Tangent point par radius perp tangent ka 90 use karke angle equation (3x, x) banao, solve karke 2x nikalo. Hook: tangent par 90 lagao, fir angle-sum equation.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G2-311", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents and centre", "question": "In the adjoining figure, AP and AQ are tangents to the circle with centre O. If reflex ∠POQ = 210°, the value of 2x is [FIGURE: Circle with center O, tangents AP and AQ from external point A. Angle POQ is 210 degrees (reflex angle). Angle PAQ is x.]", "answer": "AP,AQ tangents, reflex angle POQ=210 so the non-reflex angle POQ=150; then angle PAQ = 180-150 = 30, so 2x = 60.", "explanation": "Reflex angle diya hai to pehle normal nikalo: 360-210 = 150. Fir tangents supplementary: angle A = 180-150 = 30, 2x = 60. Hook: reflex hatao (360 minus), fir P + O = 180.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G2-312", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent-chord angle (find angles)", "question": "In the given figure, PC is a tangent to the circle at C. AOB is the diameter which when extended meets the tangent at P. Find ∠ CBA and ∠ BCO, if ∠ PCA = 110°.[FIGURE: Circle with center O, diameter AOB, tangent PC at C, P is external point on extended diameter]", "answer": "PC tangent at C, diameter AOB extended to P, angle PCA=110. angle ACB=90 (angle in semicircle), and by the alternate segment theorem angle PCA relates to the inscribed angles, giving angle CBA=20 and angle BCO=20.", "explanation": "Diameter matlab angle ACB=90 (semicircle). Tangent-chord (alternate segment) se PCA relate hota hai. Diagram se CBA aur BCO nikalo. Hook: semicircle 90 plus alternate segment theorem.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 3}, {"key": "G2-313", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent length", "question": "In the given figure, PB is a tangent to the circle with centre O at B. AB is a chord of the circle of length 24 cm and at a distance of 5 cm from the centre of the circle. If the length PB of the tangent is 20 cm, find the length of OP. [FIGURE: Circle with center O. Chord AB of length 24 cm. Perpendicular from O to AB is M, with OM = 5 cm. Tangent PB from external point P to B. PB = 20 cm. OP is to be found.]", "answer": "PB tangent at B=20; chord AB=24 at distance 5 from O gives radius OB = sqrt(12^2 + 5^2) = 13. Then OP = sqrt(OB^2 + PB^2) = sqrt(169+400) = sqrt569 ~ 23.85 cm. Method = chord-to-radius Pythagoras then tangent-perp-radius Pythagoras.", "explanation": "Do baar Pythagoras: pehle radius OB = sqrt(12^2 + 5^2) = 13 (aadha chord 12, distance 5), fir OP = sqrt(OB^2 + PB^2) = sqrt569. Hook: chord se radius, fir radius plus tangent se OP.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "G2-314", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Chord and central angle", "question": "At point A on the diameter AB of a circle of radius 10 cm, tangent XAY is drawn to the circle. Find the length of the chord CD parallel to XY at a distance of 16 cm from A.[FIGURE: Circle with diameter AB, tangent XAY at A, and chord CD parallel to XY]", "answer": "Tangent XAY at A on diameter AB (r=10), chord CD parallel to XY at distance 16 from A. Distance of CD from centre O = 16-10 = 6. Half-chord = sqrt(10^2 - 6^2) = 8, so CD = 16 cm.", "explanation": "Tangent se distance 16, centre se distance = 16 - radius = 6. Phir aadha chord = sqrt(r^2 - 6^2) = 8, CD = 16 cm. Hook: centre se chord ki doori nikalo, fir sqrt(r^2 - d^2) x2.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "M1-332", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Clock hands", "question": "The length of the hour hand of a clock is 10 cm. Find the area of the minor sector swept by the hour hand of the clock between 5 a.m. to 8 a.m. Also, find the area of the major sector.", "answer": "Method: Hour hand sweeps 30°/hour; 5→8 a.m. = 3 h → 90°. Minor sector = (90/360)π(10²) = 550/7 ≈ 78.57 cm². Major sector = πr² − minor = 1650/7 ≈ 235.71 cm².", "explanation": "Yahan hour hand 3 ghante chali to angle = 3×30 = 90°. Minor sector = (90/360)πr², major = poora circle − minor. Tip: ghante ko 30 se multiply karke angle nikaalna, phir wahi sector area formula. r=10, π=22/7.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "M1-335", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Sector perimeter", "question": "In the given figure, the shape of the top of a table is that of a sector of a circle with centre O and ∠AOB = 90°. If AO = OB = 42 cm, then find the perimeter of the top of the table. [FIGURE: Sector of a circle AOB with centre O and angle 90 degrees]", "answer": "Method: The table top is the MAJOR sector, so its arc uses reflex angle 360−90 = 270°. Perimeter = 2r + (270/360)2πr = 2(42) + (270/360)(2)(22/7)(42) = 84 + 198 = 282 cm.", "explanation": "Dhyaan: table-top wala part bada (major) sector hai, isliye arc ka angle 360−90 = 270° lena hai, 90° nahi. Perimeter = 2r + major arc. Common mistake: minor angle laga dena — figure dekh ke decide karo kaunsa part chahiye. r=42 → 282 cm.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "M1-337", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Find angle/radius from sector", "question": "If a sector of a circle has an area of 40π sq. units and a central angle of 72°, the radius of the circle is :", "answer": "Method: Area = (θ/360)πr² → r² = (Area×360)/(πθ). For area=40π, θ=72°: r² = (40π×360)/(72π) = 200 → r = 10√2. (arc 5π & area 20π → r = 2×area/arc = 8 cm.)", "explanation": "Yahan radius dhoondhna hai. Sector area formula me se r² alag karo: r² = (Area×360)/(πθ), phir root. Jab arc aur area dono diye ho, super shortcut: Area = (1/2)·r·arc ⇒ r = 2·Area/arc. r² = 200 → r = 10√2.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "M1-343", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Wheel revolutions", "question": "The diameter of a wheel is 63 cm. The distance travelled by the wheel in 100 revolutions is :", "answer": "Method: Distance in one revolution = circumference = πd = (22/7)(63) = 198 cm. In 100 revolutions = 100×198 = 19800 cm = 198 m. Option (B).", "explanation": "Pahiya ek baar ghoomta hai to itni doori = circumference = πd (ya 2πr). N chakkar me total = N × circumference. 100×198 cm = 19800 cm = 198 m. Tip: end me cm ko m me badalna (÷100) — yahin number marks jaate hain.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "M1-349", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Shaded region", "question": "Find the area of shaded region R₁ (a circle with two unshaded segments cut by chords subtending 60°, radius 7 m). Also find the length of rope around the unshaded regions.", "answer": "Method: Shaded R₁ = area of circle − 2 segments; each segment = (60/360)πr² − (√3/4)r². With r=7: R₁ = (308/3 + 49√3/2) ≈ 145.05 m². Rope around unshaded = 8 × arc, arc = (60/360)2πr → 8×(60/360)(2)(22/7)(7) = 176/3 ≈ 58.66 m. (r found from circumference 2πr=44 → r=7; ∠AOB = 60°.)", "explanation": "Multi-part: pehle circumference 2πr=44 se r=7 nikla, angle 60°. Shaded = poora circle − 2 segments (segment = sector − triangle, 60° pe triangle equilateral). Rope = kitne arcs hai (yahan 8) × ek arc ki length. Tip: har bar 'segment = sector − triangle' yaad rakho.", "years": ["2025"], "papers": 1, "raw": 9, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "M1-355", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Combined figures", "question": "A farmer has a circular piece of land (radius 35 m) and builds the largest possible square inside it. Find: the length of wire to fence the entire land; the side of the square; the cost of growing grass on the shaded region (two segments) at ₹50/m²; and the ratio of the square's area to the remaining circular area.", "answer": "Method: Fence = circumference = 2πr = 2(22/7)(35) = 220 m. Largest square inscribed → diagonal = 2r = 70, side = 70/√2 = 35√2 m, area = 2450 m². Shaded (grass) = circle − square split as 2 segments = 2[(90/360)πr² − (1/2)r²] = 700 m²; cost = 700×50 = ₹35000. Ratio square:remaining = 2450:(3850−2450) = 7:4.", "explanation": "Farmer-square case: fence = circumference (2πr). Largest inscribed square ka diagonal = diameter (2r), side = diagonal/√2. Bachi hui jagah = circle − square. Grass area cost me area×rate. Ratio = square ÷ (circle − square) = 7:4. Memory: inscribed square diagonal = 2r, side = r√2.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "M1-356", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Combined figures", "question": "A piece of land (radius 35 m) has a region where saplings of a mango tree are planted, bounded by a chord subtending 120° at the centre. Find: the length of wire to fence the entire piece of land; the area of the sapling region; and the length of wire to fence region III.", "answer": "Method: Fence whole land = arc + 2r = (120/360)2πr + 2r = (with r=35) 180 m. Sapling region (segment) = sector − triangle = (120/360)π(35²) − (1/2)(35²)sin120° = (1925/3 − 1225√3/4) ≈ 111.89 m². Wire round region III = arc + chord = (220/3 + 35√3) ≈ 133.8 m.", "explanation": "Yeh bhi segment ka khel: sapling area = sector − triangle, 120° pe triangle = (1/2)r²sin120°. Boundary/wire me curved arc + seedhi line (chord ya 2r) dono jodo. r=35. Tip: 'fence/wire = arc + straight part', 'sapling/segment = sector − triangle'.", "years": ["2025"], "papers": 1, "raw": 9, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "M1-361", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Shaded region", "question": "In the given figure, three sectors of a circle of radius 5 cm, making angles 35°, 50° and 95° at the centre are shaded. Find the area of the shaded region. [Use π = 22/7] [FIGURE: circle with three shaded sectors]", "answer": "Method: Sectors with the same radius add by angle: total shaded = ((35+50+95)/360)πr² = (180/360)(22/7)(5²) = 275/7 ≈ 39.29 cm².", "explanation": "Same radius ke kai sectors ho to unke angle jod do, phir ek hi sector ki tarah area: (sum of angles/360)πr². 35+50+95 = 180°, r=5 → 275/7 ≈ 39.29 cm². Tip: alag-alag area nikaalne ki zaroorat nahi, angles add karke ek baar me karo.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "M1-362", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Combined figures", "question": "A rectangular lawn is surrounded by a uniform walkway. (a) If the cost of paving the walkway at ₹50 per square metre is ₹12,000, calculate the area of the walkway. (b) Find the perimeter of the lawn.", "answer": "Method: Area of walkway = total cost ÷ rate = 12000 ÷ 50 = 240 m². (Setting outer − inner area = 240 gives walkway width 4 m.) Perimeter of lawn = 2(l+b) = 2(12+10) = 44 m. (Some rows OCR a quadratic x²+11x−60=0 → width 4 m.)", "explanation": "Walkway area seedha cost se: area = total cost ÷ rate per m². Lawn ka perimeter = 2(lambai+chaudai). Agar width nikaalni ho to (bahar ka area − andar ka area) = walkway area waala equation banao. Tip: 'cost ÷ rate = area' yeh ulta relation yaad rakho.", "years": ["2025"], "papers": 1, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "M1-363", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Circumference & radius", "question": "Find the radius of each circular ring (given the circumference / semicircle boundary = 44 m).", "answer": "Method: Circumference = 2πr = 44 → r = 44/(2×22/7) = 7 m. (This is the radius sub-part of the R₁ rings case study.)", "explanation": "Circumference de rakhi hai, radius chahiye: 2πr = 44 → r = 44 ÷ (44/7) = 7 m. Formula palto: r = C/(2π). Yeh same trick har 'circumference se radius' sawaal me.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "M2-400", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Largest solid carved out (cone from cylinder)", "question": "If a cone of greatest possible volume is hollowed out from a solid wooden cylinder, then the ratio of the volume of remaining wood to the volume of cone hollowed out is", "answer": "Method: largest cone in a cylinder has same r and h → cone = (1/3)πr²h, cylinder = πr²h. Remaining = πr²h − (1/3)πr²h = (2/3)πr²h. Ratio remaining:cone = (2/3):(1/3) = 2:1.", "explanation": "Cylinder ka volume cone ka teen guna hota hai (same r,h). To cone hatane par bacha hua = 2/3, cone = 1/3 → ratio 2:1. Memory hook: 'cone cylinder ka tihaai (1/3)'. Yeh fact bohot kaam aata hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "M2-401", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Melting & recasting / displacement (find number)", "question": "A vessel is in the form of an inverted cone. Its height is 8 cm and the radius of its top is 5 cm. It is filled with water up to the brim. When lead shots, each a sphere of radius 0.5 cm, are dropped, one-fourth of the water flows out. Find the number of lead shots dropped.", "answer": "Method: n = (volume of water displaced) ÷ (volume of one shot). Water out = (1/4)(1/3)π(5²)(8) = 50π/3; one shot = (4/3)π(0.5)³ = π/6. n = (50π/3)/(π/6) = 100.", "explanation": "Number-of-objects wale me: n = total displaced volume ÷ ek object ka volume. Yahan paani ka 1/4 nikla = (1/4)×cone volume; har lead shot sphere (4/3)πr³. Bhaag do. π cancel ho jaata hai, tension mat lo.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 3}, {"key": "M2-403", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Largest solid carved out (max number of depressions)", "question": "On the top face of the wooden cube of side 7 cm, hemispherical depressions of radius 0.35 cm are to be formed by taking out the wood. The maximum number of depressions that can be formed is :", "answer": "Method: along one edge, number = side ÷ diameter = 7 ÷ (2×0.35) = 10; on a square face = 10×10 = 100.", "explanation": "Ek face par kitne hemisphere fit honge = (side ÷ diameter) har taraf, phir square (kyunki face square hai). 7÷0.7 = 10, to 10×10 = 100. Diameter use karna (radius nahi) — gaddha apni poori chaudai jagah leta hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "M2-404", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (cube with depressions)", "question": "A wooden cubical die is formed by forming hemispherical depressions on each face... sum on opposite faces is 7. Edge 5 cm, each depression diameter 1.4 cm, find total surface area.", "answer": "Method: total depressions = 1+2+3+4+5+6 = 21. TSA = TSA of cube − 21·(πr²) + 21·(2πr²) = 6a² + 21πr². With a=5, r=0.7 → 150 + 32.34 = 182.34 cm².", "explanation": "Har gaddha ek circle (πr²) hata kar curved (2πr²) jodta hai → net +πr² per depression. Total depressions = 1+2+..+6 = 21. TSA = 6a² + 21×πr². Opposite faces ka sum 7 sirf total ginne ke liye hint hai.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "M2-405", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (solid minus carved parts)", "question": "(a) From one of the faces of a solid wooden cube of side 14 cm, maximum number of hemispheres of diameter 1.4 cm are scooped out. Find the total number of hemispheres and the total surface area of the remaining solid. / (b) From a solid cylinder of height 24 cm and radius 5 cm, two cones of height 12 cm and radius 5 cm are hollowed out. Find the volume and surface area of the remaining solid.", "answer": "Method: (a) number = (14/1.4)² = 100; TSA = 6(14²) + 100·πr² = 1176+154 = 1330 cm². (b) remaining = cylinder − 2 cones = πr²(24) − 2(1/3)πr²(12) = 400π = 8800/7 cm³; SA = CSA cyl + 2 CSA cone (l=13) = 8140/7 cm².", "explanation": "Do alag question ek hi 'remaining solid' family se hain. Cube wala: 6a² + N×πr² (depressions). Cylinder−2 cones wala: volume me cones ghatao, SA me dono faces ke circle hat jaate hain, CSA cone (slant l=√(r²+h²)) add. Add/subtract carefully.", "years": ["2025"], "papers": 1, "raw": 6, "marks": 5, "types": ["LA"], "score": 3}, {"key": "M2-407", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Volume of combination of solids", "question": "The dimensions of a bat in the form of a cuboid with a cylindrical handle: length 2 m, width 0.5 m, thickness 0.1 m, diameter of cylinder 0.1 m, height of cylinder 0.7 m. Find the volume of wood and the total surface area.", "answer": "Method: volume = cuboid + cylinder = (2×0.5×0.1) + π(0.05)²(0.7) ≈ 0.1055 m³. TSA = TSA of cuboid + CSA of cylinder ≈ 2.72 m².", "explanation": "Combination ka volume = cuboid (l×b×h) + cylinder (πr²h), bas jodo. TSA me cuboid ke faces + cylinder ki CSA (jahan jude hain wahan thoda adjust). Radius = diameter/2. Units same (sab meter me) rakhna.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "M2-408", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Slant height / dimension of a cone", "question": "A cone of height 12 cm and slant height 13 cm is surmounted on a hemisphere having radius equal to that of cone. The entire height of the solid is", "answer": "Method: cone radius r = √(l²−h²) = √(13²−12²) = 5; hemisphere radius = 5. Entire height = cone height + hemisphere radius = 12 + 5 = 17 cm.", "explanation": "Pehle cone ki radius nikaalo r=√(l²−h²) (5-12-13 triplet). Hemisphere ki radius bhi wahi. Poori height = cone height + hemisphere ki radius (hemisphere apni radius jitni neeche jaata hai). 12+5 = 17.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "M2-409", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of a single solid (sphere)", "question": "Assertion (A): If we join two hemispheres of same radius along their bases, then we get a sphere. Reason (R): Total Surface Area of a sphere of radius r is 3πr².", "answer": "Method: Assertion is true (two hemispheres → sphere), but Reason is false — TSA of a sphere is 4πr², not 3πr² (3πr² is a solid hemisphere). Answer: (C).", "explanation": "Sphere ka surface area = 4πr² (yaad rakho '4'). 3πr² to solid hemisphere ka hota hai. Do hemisphere jodne se sphere banta hai (Assertion sahi), par Reason ka formula galat. Assertion-Reason me dono ko alag se check karo.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "M2-414", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Ratio of volumes / surface areas", "question": "If the volumes of two cubes are in the ratio 8 : 125, then the ratio of their surface areas is :", "answer": "Method: side ratio = cube-root of volume ratio = 2:5; surface area ratio = (side ratio)² = 4:25.", "explanation": "Cube me: volume ka ratio → side ka ratio (cube root) → surface area ka ratio (side ka square). 8:125 → sides 2:5 → areas 4:25. Hamesha length(1) → area(square) → volume(cube) dimension chain yaad rakho.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "M2-415", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (solid minus carved cone)", "question": "From one face of a solid cube of side 14 cm, the largest possible cone is carved out. Find the volume and surface area of the remaining solid. (Use π = 22/7, √5 = 2.2)", "answer": "Method: cone r=7, h=14, l=7√5≈15.4. Volume remaining = a³ − (1/3)πr²h = 14³ − (1/3)π(49)(14) = 6076/3 cm³. SA = 6a² − πr² + πrl = 6(196) − π(49) + π(7)(15.4) ≈ 1360.8 cm².", "explanation": "Cube me sabse bada cone: r = side/2, height = side. Bacha volume = cube − cone ((1/3)πr²h). SA me: cube ka 6a², jahan cone ka mooh hai woh circle (πr²) ghatao, aur cone ki andar ki slant CSA (πrl) jodo. l=√(r²+h²).", "years": ["2025"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 3}, {"key": "M2-416", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (cylinder + 2 cones)", "question": "Riya sharpened her pencil from both ends... The diameter of the cylindrical and conical part of the pencil is 4.2 mm. If the height of each conical part is 2.8 mm and length of entire pencil is 105.6 mm, find the total surface area of the pencil. [FIGURE: pencil sharpened at both ends]", "answer": "Method: r=2.1, slant l=√(2.1²+2.8²)=3.5. Cylinder length = 105.6 − 2(2.8) = 100. TSA = CSA cylinder + 2×CSA cone = 2πrh + 2πrl = 1320 + 46.2 = 1366.2 mm².", "explanation": "Dono taraf chhili pencil = beech cylinder + dono sire pe cone. TSA = cylinder ki CSA (2πrh) + 2× cone ki CSA (πrl) — koi circle add nahi (cone ne base dhak rakha hai). l=√(r²+h²) pehle. Cylinder length = total − 2×(cone height).", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "M2-417", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Volume of combination (cylinder + cone, with wet surface)", "question": "Fermentation tanks are in the form of cylinder mounted on a cone. Total height 3.3 m, height of conical part 1.2 m, diameter 1 m. Find the capacity of the tank. If the level of liquid is 0.7 m from the top, find the surface area of the tank in contact with liquid. [FIGURE: cylinder mounted on a cone]", "answer": "Method: capacity = cone + cylinder = (1/3)πr²h_cone + πr²h_cyl ≈ 1.96 m³. Wetted SA = CSA of cone + CSA of cylinder up to liquid level (full height − 0.7 m) = πrl + 2πr(h_cyl−0.7) ≈ 6.44 m².", "explanation": "Capacity = cone ka volume + cylinder ka volume. 'Liquid se chhua hua surface' me: cone poora doob raha hai (πrl) + cylinder ka jitna part liquid me hai (2πr × wet-height). Top se level diya ho to wet height = total − that gap. Slant l zaroor nikaalo.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "M2-419", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Capacity / volume of a single solid", "question": "Find the volume of the bigger cylindrical part.", "answer": "Method: volume of cylinder = πr²h. r=3.5, h=12 → (22/7)(3.5²)(12) = 462 cm³.", "explanation": "Cylinder ka volume = πr²h. Diameter se radius (aadha) lo, phir formula. 462 cm³ aata hai. Yeh ek standard 1-mark case-based step hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "M2-420", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of a single solid (cylinder)", "question": "Find the curved surface area of the bigger cylindrical part.", "answer": "Method: CSA of cylinder = 2πrh. r=3.5, h=12 → 2(22/7)(3.5)(12) = 264 cm².", "explanation": "Cylinder ki curved surface = 2πrh. Sirf paaslon ka part. 264 cm² aata hai. Radius diameter ka aadha — confuse mat hona.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "M2-421", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Ratio of volumes / surface areas", "question": "Find the ratio of the volume of the bigger cylindrical part to the total volume of the two smaller (identical) cylindrical parts. / Find the sum of the curved surface areas of the two identical smaller cylindrical parts.", "answer": "Method: compute each cylinder's volume (πr²h) and CSA (2πrh). Bigger volume 462; two smaller together 34.65 cm³ → ratio = 3080:231. Sum of CSA of two smaller = 2(2πrh) = 66 cm².", "explanation": "Har cylinder ka apna πr²h aur 2πrh nikaalo, phir jo poocha — ratio ya sum — laga do. Ratio me units cancel, sum me bas jod do (×2 for 'two identical'). Numbers chhote chhote, dhyaan se substitute karo.", "years": ["2025"], "papers": 1, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "N1-440", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Rational vs irrational classification", "question": "Which of the following is a rational number between √3 and √5 ?", "answer": "Note √3≈1.732, √5≈2.236. Method: convert options to decimals; the rational one between 1.732 and 2.236 is the answer (1.857142, option D).", "explanation": "√3 ≈ 1.73 aur √5 ≈ 2.24 — inke beech ka koi bhi terminating/repeating decimal rational hai. Surds ki approx value nikaalo, fir us range me jo option rational ho wahi. Memory hook: '√3 ~1.7, √5 ~2.2'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "N1-446", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "HCF × LCM = product of numbers", "question": "Let x and y be two distinct prime numbers and p = x²y³, q = xy⁴, r = x²y². Find the HCF and LCM of p, q and r. Further check if HCF (p, q, r) × LCM (p, q, r) = p × q × r or not.", "answer": "Method: from prime-power forms, HCF=lowest power of each prime, LCM=highest. HCF=xy², LCM=x⁵y⁴ ⇒ HCF×LCM=x⁶y⁶, but p·q·r=x⁸y⁹. So for THREE numbers HCF×LCM ≠ product.", "explanation": "Special: 3 numbers ke liye 'HCF×LCM = product' TOOT jaata hai. Prime-powers se HCF (min) aur LCM (max) nikaalo, dono products compare karo — barabar NAHI honge. Memory hook: 'yeh rule sirf 2 numbers ke liye'. Exam ka favourite trap.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "N1-461", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Prime divisibility property", "question": "For any prime number p, if p divides a², where a is any real number then p also divides", "answer": "Theorem (Euclid's lemma / FTA consequence): if a prime p divides a², then p divides a. Answer: a.", "explanation": "Yeh ek standard theorem hai: agar prime p, a² ko divide karta hai, to p, a ko bhi divide karega. Memory hook: 'prime square ko baate to base ko bhi baatega'. Yahi property √n irrational proof me bhi use hoti hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "S1-472", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Cumulative frequency", "question": "The cumulative frequency for calculating median is obtained by adding the frequencies of all the :", "answer": "Method: cumulative frequency of a class = frequency of that class + all preceding classes; used to find the median class (where c.f. first crosses N/2). Representative answer: classes preceding the median class.", "explanation": "Cumulative frequency = us class tak ki saari frequencies ka jod. Isi se median class milti hai (jahan c.f. N/2 paar kare). Hook: 'cumulative = chalta-firta total'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "S2-489", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Complement / theory", "question": "In an experiment of throwing a die, Assertion (A) : Event E₁ : getting a number less than 3 and Event E₂ : getting a number greater than 3 are complementary events. Reason (R) : If two events E and F are complementary events, then P(E) + P(F) = 1.", "answer": "Reason (P(E)+P(F)=1 for complements) is TRUE. But 'less than 3' and 'greater than 3' both omit the number 3, so they are NOT complementary — Assertion FALSE. Answer: (D).", "explanation": "Complementary events milke saari outcomes cover karein aur overlap na karein. Yahan 'less than 3' aur 'greater than 3' dono 3 ko chhod dete hain — complementary nahi! Reason (definition) sahi, Assertion galat.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "S2-491", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Valid probability range", "question": "Assertion (A): The probability of selecting a number at random from the numbers 1 to 20 is 1. Reason (R): For any event E, if P(E) = 1, then E is called a sure event.", "answer": "Selecting some number from 1–20 is certain, so P=1; and P(E)=1 means a sure event. Both true; Reason explains Assertion. Answer: (A).", "explanation": "Agar 1 se 20 mein se koi bhi number uthaoge toh kuch zaroor aayega — sure event, P=1. Aur P(E)=1 ho toh use sure event kehte hain. Dono sahi aur Reason hi Assertion ka kaaran.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "S2-498", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Single die", "question": "A die is thrown once. The probability of getting a number which is not a factor of 36, is :", "answer": "Factors of 36 in 1–6: 1,2,3,4,6 (five); only 5 is NOT a factor ⇒ 1/6.", "explanation": "36 ke factors 1–6 mein: 1,2,3,4,6 (5 numbers). Sirf 5 factor nahi. Toh P(factor nahi) = 1/6. Pehle factors gino, jo bache woh favourable.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "S2-499", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Single die", "question": "The probability of getting a composite number greater than 3 on throwing a die is", "answer": "Composite numbers >3 on a die: {4,6}=2 ⇒ 2/6 = 1/3.", "explanation": "Composite = 1 aur khud ke alawa bhi factor ho. Die par '3 se bada composite' = 4 aur 6 ⇒ 2/6 = 1/3. (5 prime hai, count mat karo.)", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "S2-517", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Numbered tickets - number property", "question": "Cards numbered 11 to 75. (i) probability of an even number (ii) an odd number less than 30 (iii) a prime number between 50 and 74 / an even number divisible by 5.", "answer": "Total = 65 (11 to 75). Even numbers=33 ⇒33/65; odd <30 {11,13,...,29}=10 ⇒10/65=2/13; primes 50–74 {53,59,61,67,71,73}=6 ⇒6/65; even divisible by 5 (10s) {20,30,...,70}=6 ⇒6/65.", "explanation": "11 se 75 ⇒ total = 75 − 11 + 1 = 65. Phir condition ke numbers gino: even=33, odd<30=10, primes 50–74=6. P = favourable/65. Range ki ginti mein dhyaan — start 11 se hai, 1 se nahi.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "S2-522", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Coloured balls - ratio", "question": "A bag contains red balls and black balls in the ratio 3 : 7. A ball is drawn at random. The probability that ball so drawn is black in colour, is", "answer": "Ratio parts give probabilities. Black = 7/(3+7) = 7/10 = 0.7 (₹2 coins 9:11 ⇒ 11/20 = 0.55).", "explanation": "Ratio waale mein total parts jodo (3+7=10). P(black) = black ka part / total parts = 7/10 = 0.7. Coins 9:11 ⇒ 11/20 = 0.55. Ratio ko hi counts maan lo.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "S2-528", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Percentages / context", "question": "If 65% of the population has black eyes, 25% have brown eyes and the remaining have blue eyes, what is the probability that a person selected at random has : (a) blue eyes ? (b) brown or black eyes ?", "answer": "Percentages are probabilities. Blue = 100−65−25 = 10% = 1/10. Brown or black = 65+25 = 90% = 9/10.", "explanation": "Percentage hi probability hai (÷100). Blue = 100 − 65 − 25 = 10% = 1/10. Brown ya black = 65+25 = 90% = 9/10. Remaining nikaalne ke liye 100 se ghatao.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 3}, {"key": "S2-529", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Calendar / birthday", "question": "Two friends Anil and Ashraf were born in December 2010. Find the probability that : (i) they share same date of birth. (ii) they have different dates of birth.", "answer": "Number of days in that month/year = total. Same date = 1/days; different = 1 − 1/days. December (31) ⇒ 1/31 & 30/31; June (30) ⇒ 1/30 & 29/30; leap-year (366) ⇒ 1/366 & 365/366.", "explanation": "Same birthday waale: us mahine/saal ke total din = denominator. Same date = 1/din, different = 1 − 1/din. December = 31 din ⇒ 1/31 aur 30/31. Leap year = 366. Pehle din gino (mahina/leap dekh ke).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "S2-535", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Numbered tickets - number property", "question": "A bag contains balls numbered 2 to 91 such that each ball bears a different number. A ball is drawn at random. Find the probability that (i) it bears a 2-digit number (ii) it bears a multiple of 1.", "answer": "Total = 90 (2 to 91). (i) 2-digit numbers (10–91) = 82 ⇒82/90=41/45. (ii) Every number is a multiple of 1 ⇒ 90/90 = 1 (sure event).", "explanation": "2 se 91 ⇒ total = 91 − 2 + 1 = 90. (i) 2-digit = 10 se 91 = 82 ⇒ 82/90 = 41/45. (ii) Har number 1 ka multiple hai ⇒ P = 1 (sure event!). Trick question — multiple of 1 sab hote hain.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "T1-543", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Prove tan²A+1=sec², then find a ratio", "question": "Use the identity : sin²A + cos²A = 1 to prove that tan²A + 1 = sec²A. Hence, find the value of tan A, when sec A = 5/3, where A is an acute angle.", "answer": "Method: divide sin²+cos²=1 by cos² to get tan²A+1=sec²A; use it with the given value. Representative: secA=5/3 ⇒ tan²A=25/9−1=16/9 ⇒ tanA=4/3.", "explanation": "sin²+cos²=1 ko cos² se divide ⇒ tan²A+1=sec²A. Phir sec value daal ke tanA nikaalo. Hook: 'cos² se divide = tan-sec identity'. tanA positive (acute).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "T1-544", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Find x in (sinA+cosecA)²+(cosA+secA)²", "question": "Find the value of x for which (sin A + cosec A)² + (cos A + sec A)² = x + tan² A + cot² A", "answer": "Method: expand squares; sin²+cos²=1 and cross terms 2+2=4, plus cosec²+sec² gives cot²+tan². Result: 7+tan²A+cot²A ⇒ x=7.", "explanation": "Dono squares expand karo: constant part 1+2+2+... jud ke 7 banta hai, baaki tan²+cot². Toh x=7. Hook: 'expand karo, identities se constants jodo'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "T2-582", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Shadow by similar triangles", "question": "A 1.5 m tall boy is walking away from the base of a lamp post which is 12 m high, at the speed of 2.5 m/sec. Find the length of his shadow after 3 seconds.", "answer": "Method: lamp post and boy form similar triangles (AA). With lamp height H, boy height h, boy's distance D and shadow s: H/(D+s) = h/s ⇒ s = D·h/(H−h). After 3 s, D=7.5 m: shadow = 7.5×1.5/(12−1.5) = 1.07 m.", "explanation": "Yeh trig nahi, similar triangles ka shadow hai! Lamp post aur ladka dono vertical — unke top se shadow-tip tak ki kiran similar triangles banati hai. Ratio: badi-height/(doori+shadow) = chhoti-height/shadow. Pehle doori = speed×time, fir cross-multiply. Galti: tanθ mat lagana, yahaan height-ratio chahiye.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "T2-586", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: lighthouse & boat", "question": "If CD is h metres, find the distance BD in terms of 'h'. [angle of depression/elevation 45° from D to top of CD]", "answer": "Method: in the right triangle, tan45° = CD/BD = h/BD = 1 ⇒ BD = h m.", "explanation": "45° wala fix formula: tan45°=1, isliye perpendicular = base ⇒ BD = h. Inme bas variable 'h' ke terms me answer dena hai, number nahi. 45° = height aur base barabar — yeh seedha yaad rakho.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "T2-587", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: lighthouse & boat", "question": "Find distance BC in terms of 'h'. [BC is the line of sight (hypotenuse) at 45°, CD = h]", "answer": "Method: BC is the hypotenuse, so sin45° = CD/BC = h/BC = 1/√2 ⇒ BC = √2·h m.", "explanation": "BC line-of-sight (hypotenuse) hai, isliye sin lagao: sin45° = height/hypotenuse = 1/√2 ⇒ BC = √2·h. Hypotenuse maange = sin/cos, perpendicular/base maange = tan. 45° pe √2 aata hai — yaad rakho.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "T2-588", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: lighthouse & boat", "question": "Find the height CE of the lighthouse. [tan 60° relates total height (h+40) to base h; Use √3 = 1.73]", "answer": "Method: at A, tan60° = (h+40)/h = √3 ⇒ √3·h = h+40 ⇒ h = 40/(√3−1) = 20(√3+1) ≈ 54.6 m. So CE = h+40 ≈ 94.6 m. For AE with AC=100: cos60° = AE/AC ⇒ AE = 100·½ = 50 m.", "explanation": "Pehle h nikaalo: tan60°=(h+40)/h=√3 se h = 20(√3+1) ≈ 54.6, fir CE = h+40 ≈ 94.6 m. Distance AE maange to cos60° = AE/AC ⇒ AE = AC/2 = 50 m. √3=1.73 lagao. Trick: jab 'in terms of h' diya ho to equation banakar h solve karo.", "years": ["2025"], "papers": 1, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "T2-589", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: lighthouse & ship", "question": "Find the distance of the ship from the base of the lighthouse when it is at point Q, where the angle of depression is 45°. [lighthouse AB = 50 m]", "answer": "Method: tan45° = AB/AQ = 50/AQ = 1 ⇒ AQ = 50 m.", "explanation": "Depression 45° matlab elevation bhi 45° (alternate angle). tan45°=1 ⇒ base = height ⇒ AQ = AB = 50 m. Seedha sa — 45° dikhe to base aur height equal.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "T2-590", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: lighthouse & ship", "question": "Find the measures of ∠PBA and ∠QBA. [angles of depression to ship at P and Q are 60° and 45°]", "answer": "Method: the angle of elevation at the ship equals the angle of depression from the top (alternate interior angles). So ∠PBA = 60° and ∠QBA = 45°.", "explanation": "Depression angle = elevation angle at object (alternate interior angles, kyunki horizontal aur ground parallel hain). Isliye ∠PBA = 60°, ∠QBA = 45°. Yeh concept har depression sawaal me kaam aata hai — ratta maar lo.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "T2-591", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: lighthouse & ship", "question": "Find the distance travelled by the ship between points P and Q. [from base, AP via 30°, AQ via 45°, AB = 50 m]", "answer": "Method: AP = AB/tan30° = 50√3 m; AQ = 50 m. PQ = AP − AQ = 50(√3−1) ≈ 36.5 m. Speed Q→A = AQ/time = (50 m)/(10 min) = 5 m/min = 0.3 km/h (using AQ=50 m).", "explanation": "Door wale point P (chhota angle 30°) ki doori AP = AB/tan30° = 50√3. PQ = AP − AQ = 50(√3−1) ≈ 36.5 m. Speed = doori ÷ time, units km/h chahiye to m ko km aur min ko hour me badlo. Chhota angle = zyada door — yaad rakho.", "years": ["2025"], "papers": 1, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "T2-592", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: ambulance & drone", "question": "Represent the above situation with the help of a diagram. [drone at height 100 m, angle of depression 30° to accident site P / ambulance]", "answer": "Method: draw a right triangle with vertical PQ = 100 m (drone height), horizontal base PR (= distance to ambulance), and the angle of depression 30° marked at the top (equal to the elevation 30° at R).", "explanation": "Diagram wala 1-marker — drone upar (PQ=100 m), ambulance/site neeche, horizontal base, aur 30° ka depression angle top par (jo R par elevation 30° ke barabar). Saaf-suthra right triangle banao, sab labels (P, Q, R, angle) likho — yahi number deta hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "T2-593", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: ambulance & drone", "question": "Find the distance between the ambulance and the site of accident (P) at the particular instant. (Use √3 = 1.73) [drone height 100 m, depression 30°]", "answer": "Method: tan30° = PQ/d = 100/d ⇒ d = 100/tan30° = 100√3 = 173 m.", "explanation": "tan30° = height/base = 100/d ⇒ d = 100√3 ≈ 173 m. √3=1.73 use karo. Depression 30° ko triangle me elevation 30° ki tarah lagao. Seedha tan ka use — base nikalna hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "T2-594", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: ambulance & drone", "question": "Find the time (in seconds) in which the angle of depression changes from 30° to 45°. [drone 100 m; speed of ambulance given]", "answer": "Method: at 45°, distance = 100/tan45° = 100 m; at 30°, distance = 173 m. Distance covered = 173 − 100 = 73 m; time = distance/speed (≈ 4.4 s). OR for 60°: distance y = 100/tan60° = 100/√3 ≈ 57.7 m, time ≈ 3.5 s.", "explanation": "Naya angle (45° ya 60°) par nayi doori nikaalo: distance = 100/tanθ. Covered distance = purani − nayi doori. Time = distance ÷ speed (m/s me convert karke). 45° ⇒ 100 m, fark 73 m; 60° ⇒ 100/√3. Speed ke units dhyaan se badalna.", "years": ["2025"], "papers": 1, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "T2-595", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: boarding stairs", "question": "Find the angle at which stairs are inclined to reach the door sill 15 feet high above the ground. [base 15 ft, height 15 ft]", "answer": "Method: tanθ = height/base = 15/15 = 1 ⇒ θ = 45°.", "explanation": "Stairs ka jhukav = angle. tanθ = height/base = 15/15 = 1 ⇒ θ = 45°. Jab height aur base barabar ho, angle hamesha 45°. Seedha pehchano.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "T2-596", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: boarding stairs", "question": "Find the length of stairs used to reach the door sill. [height 15 ft, angle 45°]", "answer": "Method: stairs = hypotenuse, so sin45° = height/length ⇒ length = 15/sin45° = 15√2 ≈ 21.21 ft.", "explanation": "Stairs (hypotenuse) ki lambai = height ÷ sinθ. sin45°=1/√2 ⇒ length = 15√2 ≈ 21.21 ft. Hypotenuse maange to sin/cos, tan nahi. √2 ≈ 1.41 yaad rakho.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "T2-597", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: boarding stairs", "question": "If the 20 feet long stairs is inclined at an angle of 60° to reach the door sill, then find the height of the door sill above the ground. (use √3 = 1.732) [OR: shortest stairs for 20 ft sill if angle ≤ 30°]", "answer": "Method: height = length·sinθ ⇒ h = 20·sin60° = 10√3 ≈ 17.32 ft. OR for sill 20 ft with max angle 30°: shortest length = 20/sin30° = 40 ft, and base distance = 20/tan30° = 20√3 ≈ 34.64 ft.", "explanation": "Height nikaalni ho aur hypotenuse pata ho: height = length × sinθ ⇒ 20·sin60° = 10√3. Doosre part me sill height fix (20 ft) aur angle max 30° ⇒ sabse chhoti stairs = 20/sin30° = 40 ft, base = 20/tan30° = 20√3. Chhota angle = lambi stairs — logic samajh lo.", "years": ["2025"], "papers": 1, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "T2-598", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: statue on pedestal", "question": "Represent the Situation – I (and Situation – II) with the help of a diagram. [building/pedestal with statue; angles of elevation 30° to top of base and 60° to top of statue]", "answer": "Method: draw a right triangle from the observer to the foot of the pedestal; mark the angle of elevation to the top of the base/pedestal and the (larger) angle to the top of the statue, plus the horizontal distance.", "explanation": "Diagram-marks: observer se pedestal ke foot tak base, fir do elevation angle — base ke top tak (chhota) aur statue ke top tak (bada). Situation II me horizontal distance bhi mark karo. Saaf triangle + saare labels = pura number.", "years": ["2025"], "papers": 1, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "T2-599", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: statue on pedestal", "question": "Calculate the height of Statue excluding the base and the height including the base (Situation I). [tan 60° to top of statue; pedestal/base height given]", "answer": "Method: in ΔACQ, tan60° = QC/AC = √3 ⇒ total height QC = 240 m. Height excluding base = 240 − 58 = 182 m. (Situation II: QR = 200 m, RB = QR/tan30° = 200√3 m, and tan α = PR/BR = 18/(200√3) = 3√3/100.)", "explanation": "Statue+base ki poori height tan60° se: QC = AC·√3 = 240 m. Sirf statue = total − base (240−58=182). Doosri situation me horizontal doori RB = QR/tan30° = 200√3, aur naye angle ka tan α = perpendicular/base. Total aur 'excluding base' me confuse mat hona — base ghatana hai.", "years": ["2025"], "papers": 1, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 3}, {"key": "A1-4", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Zeroes ↔ coefficients", "question": "If α and β (α > β) are the zeroes of the polynomial -x² + 8x + 9, then (α – β) is equal to", "answer": "Method: (α−β)² = (α+β)² − 4αβ, then take square root (positive, since α>β). Here α+β=8, αβ=-9, so (α−β)²=64+36=100, giving α−β=10.", "explanation": "Difference ke liye trick: (α−β)² = (α+β)² − 4αβ (yahan 4αβ, 2 nahi!). Phir √ lo. α>β diya hai isliye positive value lena. Sum-product nikaalna pehla step hamesha.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "A1-17", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Substitute a zero into p(x)", "question": "What should be subtracted from the polynomial x² – 16x + 30, so that 15 is the zero of the resulting polynomial ?", "answer": "Method: compute p(r) at the required value r; that value must be removed (subtract p(r), or add −p(r)) so the result is 0. Representative p(15)=225-240+30=15, so subtract 15. (For 'add': add the amount that makes p(r)=0.)", "explanation": "Pehle p(r) nikaalo us number par jise zero banana hai. Jitna p(r) aaya, utna subtract karo (ya add karo agar p(r) negative ho). Idea simple: result me r daalne par 0 aana chahiye. Calculation seedha p(15) jaisa.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "A2-47", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Graphical method", "question": "[FIGURE: graph of two intersecting lines] In the given figure, graphs of two linear equations are shown. The pair of these linear equations is :", "answer": "Method: read the given graph — if the two lines intersect at exactly one point, the pair is consistent with a unique solution; if parallel ⇒ inconsistent; if same line ⇒ infinite solutions. Here the lines intersect ⇒ (a) consistent with unique solution.", "explanation": "Diagram-based sawaal: graph dekh ke batao kaisi lines hain. Ek hi point par kaat rahi hain → consistent, unique solution. Bilkul parallel → inconsistent (no solution). Ek doosre ke upar → infinite solutions. Bas dhyaan se dekho lines mil rahi hain ya nahi — figure padhna hi poora kaam hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "A2-54", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "In a chemistry lab, there is some quantity of 50% acid solution and some quantity of 25% acid solution. How much of each should be mixed to make 10 litres of 40% acid solution ?", "answer": "Method: let x, y litres of the two solutions. One equation for total volume, one for the pure-acid amount. x+y=10 and 0.5x+0.25y=0.40·10=4 ⇒ x=6 L, y=4 L.", "explanation": "Mixture problems: x aur y litre maano. Pehla equation total quantity (x+y = total), doosra pure cheez (acid) ki — concentration × quantity jod do. Jaise 0.5x + 0.25y = 0.40×10. Percentages ko decimal mein badlo. Tip: 'kitna pure acid' wali line hi second equation deti hai.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 2}, {"key": "A2-55", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "Rehana went to a bank to withdraw ₹ 2,000. She asked the cashier to give her ₹ 50 and ₹ 100 notes only. Rehana got 25 notes in all. Find how many notes of ₹ 50 and ₹ 100 did she receive.", "answer": "Method: let x = number of ₹50 notes, y = number of ₹100 notes. One equation for count, one for total value. x+y=25 and 50x+100y=2000 ⇒ x=10, y=15.", "explanation": "Notes/coins problems: x = ek tarah ke notes ki ginti, y = doosre ki. Pehla equation total NUMBER of notes (x+y), doosra total VALUE (50x+100y = total rupaye). Common galti: dono equations ko ek hi maan lena — ek count ka, ek paise ka, alag-alag. Phir elimination se hal.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 2}, {"key": "A2-56", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "A part of monthly hostel charges is fixed and the remaining depends on the number of days one has taken food in the mess. When a student A takes food for 20 days, she has to pay ₹ 1,500 as hostel charges while another student B, who takes food for 26 days, pays ₹ 1,800. Find the fixed charges and the cost of food.", "answer": "Method: let fixed charge = x and per-day food cost = y; total = x + (days)·y. Form two equations and subtract to eliminate x. x+20y=1500 and x+26y=1800 ⇒ y=50, x=500. Fixed ₹500, food ₹50/day.", "explanation": "Fixed + variable charge problems: x = fixed part (jo hamesha lagta hai), y = per unit/day rate. Total = x + (number)×y. Do situations se do equations banao. Kyunki x dono mein same hai, ghata do (subtract) to x udd jaata aur y mil jaata. Yeh 'fixed + per-day' pattern pakka yaad rakho.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 2}, {"key": "A2-66", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Case-based application", "question": "If the number of children visited be x and the number of adults visited be y, then write the given situation algebraically. [Amusement park: 300 people total; ₹150 per child, ₹250 per adult, total ₹55000] (i) form equations (ii) how many children / adults (iii) collection if 250 children + 100 adults.", "answer": "Method: let x = children, y = adults. Form x+y=300 and 150x+250y=55000; solve ⇒ x=200 children, y=100 adults. Collection for 250 children + 100 adults = 250(150)+100(250)=₹62500.", "explanation": "Amusement park case study: x = bachche, y = adults. Pehla equation total log (x+y=300), doosra total paisa (150x+250y=55000). Solve karke x=200, y=100. Last part mein nayi sankhya ka collection bas multiply-add karke nikaalo. Pattern wahi: 'count ka equation + money ka equation'.", "years": ["2024"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "A3-88", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Word problem: ages", "question": "The age of a man is twice the square of the age of his son. Eight years hence, the age of the man will be 4 years more than three times the age of his son. Find their present ages.", "answer": "Let the son's age be x; express the man's age, write the 'years hence' condition and form a quadratic. man=2x², 3(x+8)+4=2x²+8 ⇒ 2x²−3x−20=0 ⇒ x=4 ⇒ son 4 yr, man 32 yr.", "explanation": "Age problems me ek age ko x maano, baaki uske terms me likho. '8 saal baad' = sabki age me +8. Equation banao, quadratic solve karo, aur −ve/decimal age reject karo (umar poori aur positive hoti hai). Diagram/table banao to confusion nahi hogi.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 2}, {"key": "A3-91", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Word problem: projectile / height", "question": "A ball is thrown in the air so that t seconds after it is thrown, its height h metre above its starting point is given by the polynomial h = 25t – 5t². [FIGURE: graph of a parabola h(t) vs t, with zeroes at (0,0) and (5,0), vertex at (5/2, 31.25)] After throwing upward, how much time did the ball take to reach a height of 30 m?", "answer": "Set the height polynomial equal to the required height and solve the quadratic for t. h=30: −5t²+25t=30 ⇒ t²−5t+6=0 ⇒ t=2 or 3 s. h=20 ⇒ t²−5t+4=0 ⇒ t=1 or 4 s. Maximum height = vertex: t=−b/2a=2.5 s ⇒ h=31.25 m.", "explanation": "Height di ho to h(t) ko us value ke barabar rakho aur t ke liye quadratic solve karo — do answers aate hain (upar jaate aur neeche aate waqt!). Maximum height ke liye vertex nikaalo: t=−b/2a, phir h me daalo. Dono t values valid hote hain, dono likho.", "years": ["2024"], "papers": 1, "raw": 7, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "A4-117", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Number of terms in an AP", "question": "The number of terms in the A.P. 3, 6, 9, 12, ..., 111 is :", "answer": "Method: n=(l-a)/d+1 = (111-3)/3+1 = 37.", "explanation": "Kisi AP mein total terms = (last-first)/d + 1. Yahan (111-3)/3+1=37. Hook: 'difference se divide, phir +1 (kyunki pehla term bhi gino)'.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "A4-119", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find n given Sn and last term", "question": "In an A.P., if the first term a = 7, nth term a_n = 84 and the sum of first n terms s_n = 2093/2, then n is equal to :", "answer": "Method: S_n=n/2(a+a_n) -> 2093/2 = n/2(7+84) -> n=2093/91=23.", "explanation": "a aur a_n dono pata ho to sabse seedha S_n=n/2(a+a_n) use karo aur n nikaalo. Hook: 'jab pehla aur aakhri dono hon to n/2(a+l) sabse fast'. Bas ek equation, ek unknown.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "A4-120", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find a, d from sum & product", "question": "The sum of first and eighth terms of an A.P. is 32 and their product is 60. Find the first term and common difference of the A.P. Hence, also find the sum of its first 20 terms.", "answer": "Method: a+a8=32 -> 2a+7d=32; a*a8=60. Solve simultaneously -> (a=2,d=4) or (a=30,d=-4). Then S_20=10[2a+19d]: 800 or -160.", "explanation": "Do terms ka sum aur product diya ho to ek linear (sum) aur ek quadratic (product) equation banao, solve karo — do (a,d) jode mil sakte hain. Phir S_20 nikaalo. Hook: 'sum=linear, product=quadratic'. Dono valid answers likho.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 2}, {"key": "A4-121", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find a, d from two sum conditions", "question": "In an A.P. of 40 terms, the sum of first 9 terms is 153 and the sum of last 6 terms is 687. Determine the first term and common difference of A.P. Also, find the sum of all the terms of the A.P.", "answer": "Method: S_9=153 -> a+4d=17; sum of last 6 = S_40-S_34=687 -> 2a+73d=229. Solve -> a=5,d=3. Then S_40=20[2(5)+39(3)]=2540.", "explanation": "Do sum-conditions se do equations banao (S_9 se ek, last-6-ka-sum = S_40-S_34 se doosra). Solve karke a,d nikaalo, phir poora sum. Hook: 'last 6 ka sum = S_n minus S_(n-6)'. Formula S_n=n/2[2a+(n-1)d].", "years": ["2024"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 2}, {"key": "A4-122", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Sum of n terms", "question": "In an A.P., if the first term (a) = -16 and the common difference (d) = -2, then the sum of first 10 terms is :", "answer": "Method: S_n=n/2[2a+(n-1)d] = 10/2[2(-16)+9(-2)] = 5(-50) = -250.", "explanation": "a aur d diye ho to seedha S_n=n/2[2a+(n-1)d] mein daal do. Hook: 'do bracket: 2a aur (n-1)d, jod ke n/2 se guna'. Negative d ho to terms ghat rahe hain, sum bhi negative ho sakta hai.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "A4-123", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Common difference (general terms)", "question": "The common difference of the A.P. 1/(2x), (1-4x)/(2x), (1-8x)/(2x) ...............is :", "answer": "Method: d = (2nd term)-(1st term) = (1-4x)/(2x) - 1/(2x) = -4x/(2x) = -2.", "explanation": "Common difference hamesha = doosra term - pehla term. Algebraic/fraction terms ho to bhi yahi karo, x cancel ho jaayega. Hook: 'd = a_2 - a_1, hamesha'. Ghabrao mat, subtract karte hi simplify ho jaata hai.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "A4-127", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Case study - nth term & sum", "question": "A set of numbered spots follows an AP. (i) Which number is on first spot? (ii) Which spot is numbered as 112? What is the sum of all the numbers on the first 10 spots? (iii) Which number is on the (n-2)th spot ?", "answer": "Method: spot value = 20+4n (a=24,d=4). 1st spot=24; 112=20+4n -> n=23; S_10=10/2[2(24)+9(4)]=420; (n-2)th = 20+4(n-2)=12+4n.", "explanation": "Case-study mein pehle pattern se AP pehchaano (yahan a_n=20+4n). 'Kaunsa number' = a_n; 'kaunsa spot=value' to a_n=value rakhke n; 'sum' ke liye S_n. Hook: 'value chahiye -> a_n; position chahiye -> equation solve; total -> S_n'.", "years": ["2024"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "A4-128", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Word problems", "question": "A man starts his job with a certain monthly salary and earns a fixed increment every year. If his salary was ₹ 15,000 after 4 years of service and ₹ 18,000 after 10 years of service, what was his starting salary and what was the annual increment ?", "answer": "Method: salaries form an AP. a+3d=15000 (after 4 yrs i.e. 4th term) and a+9d=18000 (10th term). Subtract -> 6d=3000 -> d=500; a=13500. Starting salary ₹13,500, increment ₹500.", "explanation": "Salary + fixed increment = AP. Diye hue do saalon ko terms banao, do equations, ghatao to increment (d) milega, phir starting salary (a). Hook: 'increment = d, shuruaati salary = a'. Saavdhaani: 'after 4 years' kaunsa term hai, soch ke likho.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 2}, {"key": "A4-129", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find term using Sn", "question": "If the sum of the first 14 terms of an A.P. is 1050 and the first term is 10, then find the 20th term and the n^th term.", "answer": "Method: S_14=14/2[2(10)+13d]=1050 -> 140+91d=1050 -> d=10. Then a_20=a+19d=200 and a_n=10+(n-1)10=10n.", "explanation": "S_n aur a diye ho to S_n formula se d nikaalo, phir a_20 aur general a_n likho. Hook: 'Sn -> d -> phir koi bhi term'. nth term ko simplify karke saaf form mein likho (yahan 10n).", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 2}, {"key": "A4-149", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Which term is X / find n given term", "question": "Which term of the A.P. –29, –26, -23, ...... 61 is 16?", "answer": "Method: a_n=a+(n-1)d=16 -> -29+(n-1)3=16 -> (n-1)=15 -> n=16, i.e. the 16th term.", "explanation": "'Konsa term X hai' poocha ho to a_n=X rakhke n nikaalo: -29+(n-1)3=16. Hook: 'value do, a_n formula mein daalo, n solve karo'. Agar n decimal aaye to woh term AP mein nahi hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "A4-150", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Proof / general term", "question": "If the sum of first m terms of an A.P. is same as sum of its first n terms (m ≠ n), then show that the sum of its first (m + n) terms is zero.", "answer": "Method: S_m=S_n with S_k=k/2[2a+(k-1)d]. Simplify (m-n)[2a+(m+n-1)d]=0; since m≠n, 2a+(m+n-1)d=0. Then S_(m+n)=(m+n)/2[2a+(m+n-1)d]=0. (OR three terms a-d,a,a+d: sum 24 -> a=8; sum of squares 194 -> d=±1 -> numbers 7,8,9.)", "explanation": "Proof mein S_m=S_n likho, S_n formula daalo, simplify karke dikhao 2a+(m+n-1)d=0, phir S_(m+n) mein yahi bracket aata hai = 0. Hook: 'jo bracket zero, wahi S_(m+n) mein'. 3-terms wale OR mein a-d,a,a+d set karo (d cancel ho jaata hai).", "years": ["2024"], "papers": 1, "raw": 6, "marks": 3, "types": ["SA"], "score": 2}, {"key": "G1-189", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Find length by similarity", "question": "In ΔABC, altitudes AD and BE are drawn. If AD = 7 cm, BE = 9 cm and EC = 12 cm then, find the length of CD. [FIGURE: triangle ABC with altitudes AD and BE]", "answer": "Method: Both altitudes subtend the same angle C, so triangle BEC ~ triangle ADC (AA). Hence BE/AD = EC/CD => CD = AD*EC/BE = 7*12/9 = 28/3 cm.", "explanation": "Do altitudes ek hi angle (C) banati hain, to triangles similar (AA). BE/AD = EC/CD. Cross-multiply karke CD nikaalo. Right-angle wale similar triangles mein corresponding sides dhyaan se match karo.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G1-193", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity", "question": "In the given figure, EA/EC = EB/ED, prove that ∆EAB ~ ∆ECD [FIGURE: Two triangles EAB and ECD sharing vertex E, with A, C on one line from E and B, D on another line from E]", "answer": "Method: angle AEB = angle CED (vertically opposite / common), and given EA/EC = EB/ED, so the sides about the equal angle are proportional => triangle EAB ~ triangle ECD by SAS.", "explanation": "Jab do lines ek point pe cross karein, vertically opposite angles barabar. Agar us angle ko ghere sides ka ratio bhi barabar (EA/EC = EB/ED), to SAS se similar. Diagram mein equal angle mark karo.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G1-195", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity", "question": "[FIGURE: Quadrilateral ABCD with diagonal BD bisecting angles B and D] In the given figure, ABCD is a quadrilateral. Diagonal BD bisects ∠B and ∠D both. Prove that: (i) ∆ABD ~ ACBD (ii) AB = BC", "answer": "Method: BD bisects angle B and angle D so angle ABD = angle CBD and angle ADB = angle CDB; with common BD, triangle ABD ~ (in fact congruent ASA) triangle CBD => AB = BC.", "explanation": "Bisector se do equal angles mil gaye, common side BD bhi hai - AA/ASA se similar (aur congruent) triangles. Congruent hone se corresponding sides barabar => AB=BC. Bisect ka matlab equal-equal angles, mark zaroor karo.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G1-197", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity", "question": "In the given figure, ∆ FEC ≅ ∆ GDB and ∠ 1 = ∠ 2. Prove that △ ADE ~ ∆ ABC.[FIGURE: A large triangle FGC with a smaller triangle ADE inside it. Lines FE and GD intersect at A. Angles 1 and 2 are marked.]", "answer": "Method: congruence FEC = GDB gives AB=AC; angle1=angle2 gives AD=AE; dividing, AD/AB = AE/AC, so by converse of BPT DE||BC and triangle ADE ~ triangle ABC.", "explanation": "Do equalities se AB=AC aur AD=AE nikaalo, phir divide karke AD/AB = AE/AC. Yeh converse-BPT condition hai -> DE||BC -> ADE~ABC. Multi-step proof hai, har equality ko reason ke saath likho.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 2}, {"key": "G1-202", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity", "question": "AB and CD are two chords of a circle intersecting at P. Choose the correct statement from the following : [FIGURE: circle with two intersecting chords AB and CD]", "answer": "Method: Two chords AB, CD meet at P; angle APD = angle CPB (vertically opposite) and angles in same segment equal, so triangle ADP ~ triangle CBP (AA).", "explanation": "Circle ki do chords andar mile to vertically opposite angle + same segment ke angle barabar -> triangle ADP ~ CBP. MCQ ka correct option yahi similarity statement hota hai. Same-segment angle rule yaad rakho.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "G2-238", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Equal tangents (proof)", "question": "From an external point P, two tangents PA and PB are drawn to the circle with centre O. Prove that OP is the perpendicular bisector of chord AB.", "answer": "Prove OP is the perpendicular bisector of chord AB. PA=PB (equal tangents), OA=OB (radii), OP common, so triangle OAP congruent triangle OBP, giving angle APO=angle BPO. Then the triangles APM and BPM (M = AB meet OP) give AM=BM and angle AMP=90. Hence OP bisects AB at right angles.", "explanation": "PA=PB aur OA=OB se OP line AB ko beech me 90 pe kaat-ti hai. Pehle bade triangle congruent karke equal angle lao, fir chhote triangle se midpoint aur 90 prove karo. Hook: do barabar tangent matlab OP hi symmetry axis.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 2}, {"key": "G2-240", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent-chord angle (proof)", "question": "Prove that the tangents drawn at the end points of a chord of a circle makes equal angles with the chord.", "answer": "Prove the tangents at the ends of a chord make equal angles with the chord. By the alternate segment theorem each tangent-chord angle equals the inscribed angle in the alternate segment, and both equal the same inscribed angle, so the two tangent-chord angles are equal (also follows from the isosceles triangle of two equal tangents).", "explanation": "Chord ke dono ends par tangent chord ke saath barabar angle banate hain. Reason: alternate segment theorem ya dono tangents barabar hone se isosceles triangle. Hook: symmetry ke wajah se dono taraf same angle.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 2}, {"key": "G2-260", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent-chord angle", "question": "In the given figure, AT is tangent to a circle centred at O. If ∠CAT = 40°, then ∠CBA is equal to [FIGURE: circle with center O, tangent AT, chord AC, and point B on the circle]", "answer": "Alternate segment theorem: angle CBA (alternate segment) = tangent-chord angle CAT. So angle CAT=40 gives angle CBA=40.", "explanation": "Alternate segment theorem: tangent aur chord ka angle = doosre segment ke inscribed angle ke barabar. CAT=40 deta hai CBA=40. Hook: tangent-chord angle = alternate segment angle.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "G2-261", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent-chord angle", "question": "In the given figure, O is the centre of the circle. MN is the chord and the tangent ML at point M makes an angle of 70° with MN. The measure of ∠MON is : [FIGURE: Circle with center O, chord MN, tangent ML at M, angle LMN is 70 degrees]", "answer": "Find angle MON from tangent-chord angle 70. angle OMN = 90-70 = 20, isosceles triangle OMN gives angle MON = 180 - 2(20) = 140.", "explanation": "Tangent perp radius se angle OMN = 90-70 = 20, fir OM=ON isosceles se MON = 180 - 2x20 = 140. Hook: radius se 90, isosceles se centre angle.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "G2-267", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent properties (Assertion-Reason)", "question": "Assertion (A) : The tangents drawn at the end points of a diameter of a circle, are parallel. Reason (R) : Diameter of a circle is the longest chord.", "answer": "A: tangents at ends of a diameter are parallel (true).
