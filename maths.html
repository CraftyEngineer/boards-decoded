VSA"], "score": 4}, {"key": "G1-208", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Geometric mean / CPCT relation", "question": "In the given figure, DEFG is a square. ∆ABC is right angle triangle with ∠A = 90°. Prove that AG × DG = AF × DB. [FIGURE: right-angled triangle ABC with a square DEFG inscribed, D on AB, E on AC, F on BC, G on AB]", "answer": "Method: With square DEFG inscribed and angle A = 90, the small triangles AGF and DBE (or similar pairs) are similar, giving AG/DB = AF/DG, hence AG.DG = AF.DB.", "explanation": "Right triangle mein square fit ho to bani choti triangles similar hoti hain. Corresponding sides ka ratio banao aur cross-multiply -> AG.DG = AF.DB. Square ki saari sides barabar - is fact ko use karo.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "G1-214", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove proportional segments (median)", "question": "In Δ ABC, AD is a median. X is a point on AD such that AX : XD = 2 : 3. BX is extended so that it intersects AC at Y. Prove that BX = 4 XY. [FIGURE: Triangle ABC with median AD. Point X is on AD. Line BX is extended to intersect AC at Y.]", "answer": "Method: AD is a median, X on AD with AX:XD = 2:3, BX extended meets AC at Y. Draw DZ||BX(BY); by BPT in triangle CBY, Z is midpoint-type so DZ = (1/2)BY; by similarity triangle AXY ~ triangle ADZ, DZ = (5/2)XY. Equate => BY = 5XY, so BX = BY - XY = 4XY.", "explanation": "Construction zaroori: DZ||BY khincho. BPT (triangle CBY) se DZ = 1/2 BY, aur similarity (AXY~ADZ) se DZ ko XY se jodo. Dono equate karke BX = 4XY. Parallel line draw karna is type ki master-key hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G1-215", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Apply BPT (double parallel)", "question": "In the given figure, DE || AC and DF || AE. Prove that : BF / FE = BE / EC. [FIGURE: Triangle ABC with points D, E, F on sides, and lines DE and DF]", "answer": "Method: In triangle, DE||AC gives BD/DA = BE/EC; DF||AE (in triangle ABE) gives BF/FE = BD/DA. Combining the two equal ratios: BF/FE = BE/EC.", "explanation": "Do alag parallel lines, do alag BPT. Dono se same ratio BD/DA nikaalo aur barabar kar do -> BF/FE = BE/EC. Jab do parallel di ho, dono ka BPT likho phir link karo.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "G1-220", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity (midpoint/median)", "question": "D is the mid-point of side BC of ∆ABC. CE and BF intersect at O, a point on AD. AD is produced to G such that OD = DG. Prove that (i) OBGC is a parallelogram. (ii) EF || BC (iii) ∆AEF ~ ∆ABC [FIGURE: Triangle ABC with median AD, cevians BF and CE intersecting at O, AD extended to G]", "answer": "Method: D midpoint of BC and OD = DG make OBGC a parallelogram (diagonals bisect). So BF||CG and CE||BG; in triangle these give AE/EB = AF/FC, hence EF||BC and triangle AEF ~ triangle ABC.", "explanation": "Diagonals ek dusre ko bisect karein to parallelogram (OBGC). Parallelogram ke parallel sides se EF||BC (converse BPT) aur phir AEF~ABC. Multi-part proof - har part previous pe build karta hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G1-221", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove proportional segments (parallelogram)", "question": "Through the mid-point Q of side CD of a parallelogram ABCD, the line AR is drawn which intersects BD at P and produced BC at R. Prove that (i) AQ = QR (ii) AP = 2PQ (iii) PR = 2AP [FIGURE: Parallelogram ABCD with Q as midpoint of CD, line AR intersecting BD at P and produced BC at R]", "answer": "Method: In parallelogram ABCD, Q is midpoint of CD; line AR meets BD at P and BC produced at R. triangle AQD ~ triangle RQC (AA, AD||CR) with QD=QC => AQ = QR. triangle APD ~ triangle RPB gives AP/PR ratio; using AD=BC, AP = 2PQ and PR = 2AP.", "explanation": "Midpoint Q se bani similar triangles (AQD~RQC) + QD=QC se AQ=QR. Diagonal ke intersection pe doosri similar pair se baaki ratios. Parallelogram + midpoint = predictable ratios, diagram bana ke segments label karo.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G1-229", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Case study: similarity (reflection)", "question": "Prove that ∆PQR ~ ∆CBR given that PQ is perpendicular to AB.", "answer": "Method: A reflection case study. Law of reflection (angle PRT = angle CRT) gives equal angles so theta = alpha. With PQ perp AB and CB perp AB, PQ||CB => triangle PQR ~ triangle CBR (AA). Then PQ/CB = QR/BR gives x by proportion, and the area relation ar(PQR)/ar(CBR) = PQ^2/CB^2 = (QR/BR)^2 confirms/solves x.", "explanation": "Mirror/periscope case study: reflection se angles barabar (theta = alpha). Dono perpendiculars parallel -> PQR~CBR (AA). Phir corresponding sides ka ratio se x nikaalo. Area ratio = (sides ratio)^2 - yeh hamesha square hota hai. Diagram samjho pehle.", "years": ["2026"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "G2-233", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent perpendicular radius (proof)", "question": "(a) Prove that the tangent at any point of a circle is perpendicular to the radius through the point of contact.", "answer": "Theorem: the tangent at any point of a circle is perpendicular to the radius through the point of contact. Proof: any other point on the tangent lies outside the circle, so the radius is the shortest distance from centre to the line, and the shortest distance is perpendicular. Hence OP perpendicular to tangent at P.", "explanation": "Yeh circle ka basic theorem hai: tangent radius pe HAMESHA 90 degree pe hoti hai. Idea: centre se tangent par sabse chhoti doori radius hi hai, aur shortest distance perpendicular hoti hai. Yaad rakho: tangent radius pe perpendicular hota hai.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 4}, {"key": "G2-234", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Equal tangents (proof)", "question": "Prove that the lengths of tangents drawn from an external point to a circle are equal.", "answer": "Theorem: lengths of tangents from an external point are equal. In triangles OAP and OBP: OA=OB (radii), angle OAP=angle OBP=90 (radius perp tangent), OP common, so by RHS they are congruent, giving PA=PB.", "explanation": "Bahar ke ek point se do tangent kheencho, dono ki length barabar (PA=PB). Proof RHS se: dono radius 90 degree banate hain, radii equal, OP common. Hook: do tangent, do barabar lengths.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 4}, {"key": "G2-236", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents (proof)", "question": "Two tangents PA and PB are drawn to a circle with centre O from an external point P. Prove that ∠ APB = 2 ∠ OAB.", "answer": "Prove angle APB = 2 angle OAB. PA=PB so triangle PAB isosceles, base angle = 90 - half APB. OA perp PA so angle OAP=90, hence angle OAB = 90 - (90 - half APB) = half APB, giving APB = 2 OAB.", "explanation": "Same idea jaisa PTQ=2OPQ. PA=PB se isosceles, base angle = 90 - half APB; phir radius wala 90 use karke OAB = half APB. Hook: P par angle = 2 x chhota radius wala angle.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "G2-241", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents (proof)", "question": "In the given figure, O is the centre of the circle. PQ and PR are tangents. Show that the quadrilateral PQOR is cyclic.[FIGURE: circle with center O, two tangents PQ and PR from external point P, Q and R are points of tangency]", "answer": "Show quadrilateral PQOR is cyclic. angle OQP = angle ORP = 90 (radius perp tangent), so they add to 180. A quadrilateral with opposite angles summing to 180 is cyclic, so PQOR is cyclic.", "explanation": "Tangent points par dono angle 90, inka sum 180. Jis quadrilateral ke opposite angle ka sum 180 ho woh cyclic. Hook: do 90 matlab 180 matlab cyclic.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "G2-244", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent length", "question": "In the given figure, PA is the tangent to the circle with centre O such that OA = 10 cm, AB = 8 cm and AB ⊥ OP. Find the length of PB. [FIGURE: Circle with center O. PA is a tangent to the circle at A. Line segment OP passes through B. AB is perpendicular to OP. OA=10cm, AB=8cm.]", "answer": "Find PB where PA tangent, OA=10, AB=8, AB perp OP at M. AM = AB/2 = 4. Use radius perp tangent (OA perp PA) and AB perp OP to set up right triangles and apply Pythagoras twice to get PB. Method = repeated Pythagoras with perpendiculars.", "explanation": "Tangent perp radius aur AB perp OP do right triangle dete hain, Pythagoras do baar lagao. Pehle chhoti lengths (AM=AB/2), fir OP, fir PB. Hook: jahan perpendicular dikhe wahan Pythagoras.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "G2-248", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent length (trig)", "question": "In the given figure, PT is a tangent to the circle with centre O and radius r. If ∠ POT = 45°, then the length of OP is : [FIGURE: Circle with center O and radius r. PT is a tangent to the circle at T. Line segment OP connects O to P. Angle POT is 45 degrees.]", "answer": "Find OP given angle POT=45, radius r. In right triangle OPT (angle OTP=90): cos(POT)=OT/OP so OP = r/cos45 = r sqrt2.", "explanation": "Hypotenuse OP chahiye to cos: OP = radius/cos(angle). 45 pe OP = r sqrt2. Hook: OT/OP = cos(POT), radius adjacent hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G2-249", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent length (trig)", "question": "If PQ and PR are tangents to the circle with centre O and radius 4 cm such that ∠QPR = 90°, then the length OP is [FIGURE: Circle with center O, tangents PQ and PR from external point P]", "answer": "PQ,PR tangents, angle QPR=90, r=4, find OP. OP bisects giving angle QPO=45. sin45 = OQ/OP so OP = r/sin45 = 4sqrt2 cm (OQPR is a square, OP its diagonal).", "explanation": "angle QPR=90 ko aadha karke 45; OP = radius/sin45 = 4sqrt2 cm. Square OQPR ka diagonal OP. Hook: aadha angle plus sin/cos.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G2-250", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent length", "question": "PQ is tangent to a circle with centre O. If OQ = a, OP = a + 2 and PQ = 2b, then relation between a and b is", "answer": "From radius perp tangent: OP^2 = OQ^2 + PQ^2, so (a+2)^2 = a^2 + (2b)^2, giving 4a+4 = 4b^2, i.e. b^2 = a+1 (option b = a+1).", "explanation": "Radius perp tangent matlab Pythagoras: OP^2 = OQ^2 + PQ^2. Values daal ke simplify karo. Hook: OP hypotenuse, OQ radius, PQ tangent.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G2-263", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent-chord angle", "question": "PQ is tangent to a circle with centre O. If ∠POR = 65°, then m∠PTR is [FIGURE: Circle with center O, tangent PQ, chord PR, and point S on the circle]", "answer": "Find m angle PTR from angle POR=65 (PQ tangent at P, PR chord, T on circle). angle POR is the central angle on chord PR, so inscribed angle PTR = half(65) = 32.5.", "explanation": "Central angle POR=65 chord PR ka hai; us chord par circumference (T) ka angle aadha = 32.5. Hook: central angle ka aadha = inscribed angle.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G2-264", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent-chord angle", "question": "In the given figure, PQ is tangent to the circle with centre O. S is a point on the circle such that ∠SQT = 55°. The m ∠QPS is [FIGURE: Circle with tangent PQ and chord QS, angle SQT is 55 degrees]", "answer": "Find m angle QPS from angle SQT=55 (PQ tangent at Q, S on circle). Tangent-chord angle SQT=55 equals the inscribed angle in the alternate segment; reading the figure (alternate segment theorem) gives m angle QPS.", "explanation": "Tangent QT aur chord QS ka angle 55 = alternate segment ke angle ke barabar. Diagram dekh ke angle QPS map karo. Hook: tangent-chord = alternate segment angle.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G2-272", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent properties (Assertion-Reason)", "question": "Assertion (A): Radius is the smallest distance of a tangent from the centre of the circle. Reason (R) : Radius is perpendicular to the tangent.", "answer": "A: radius is the smallest distance of a tangent from the centre (true). R: radius perp tangent (true) and IS the reason (perpendicular distance is shortest). Answer: (a).", "explanation": "Radius sabse chhoti doori hai kyunki woh tangent par perpendicular hai (perpendicular = shortest). Isliye R hi A ki wajah, (a). Hook: perpendicular distance hamesha shortest.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 4}, {"key": "G2-280", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Polygon circumscribing circle", "question": "(b) If a regular hexagon ABCDEF circumscribes a circle, then prove that AB + CD + EF = BC + DE + FA.", "answer": "Regular hexagon ABCDEF circumscribes a circle: equal tangents from each vertex give AB + CD + EF = BC + DE + FA (alternate sides sum equal, each side split into two equal tangent segments).", "explanation": "Hexagon circumscribe kare to har vertex se barabar tangents; alternate sides ka sum barabar: AB+CD+EF = BC+DE+FA. Hook: tangent segments barabar matlab alternate sides ka sum same.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 4}, {"key": "G2-291", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Inscribed circle in triangle (find radius)", "question": "In the given figure, ∆ ABC is a right triangle in which ∠ B = 90°, AB = 4 cm and BC = 3 cm. Find the radius of the circle inscribed in the triangle ABC. [FIGURE: right triangle ABC with inscribed circle]", "answer": "Right triangle, angle B=90, AB=4, BC=3, so AC=5. Tangents: BD=BE=r, AD=AF=4-r, CE=CF=3-r. AF+CF=AC gives (4-r)+(3-r)=5, so r=1 cm. (Or inradius r = (a+b-c)/2 = (3+4-5)/2 = 1.)", "explanation": "Right triangle ka inradius: r = (perpendicular + base - hypotenuse)/2 = (3+4-5)/2 = 1 cm. Tangent lengths se bhi prove hota hai. Hook: right triangle inradius = (a+b-c)/2.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "G2-292", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Inscribed circle in triangle (find angle)", "question": "In the given figure, a circle with centre O is inscribed inside ∆ LMN. A and B are the points of tangency. Find ∠ANB. [FIGURE: Triangle LMN with an inscribed circle centered at O. Points A and B are tangency points on LM and MN respectively. Angle LOM is 240 degrees.]", "answer": "Incircle of triangle LMN, contact points A,B, given angle LOM=240 (reflex) so angle AOB=360-240=120. In quad AOBM angle A=angle B=90, so angle AMB = 360-90-90-120 = 60.", "explanation": "Contact points par 90; quadrilateral AOBM ke angle ka sum 360. Diye angle se baaki = 60. Hook: do 90 plus diya angle, 360 me se ghatao.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "G2-299", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Concentric circles chord", "question": "From an external point P, a tangent PT has been drawn to a circle with centre at O and radius 3 cm, intersecting its concentric circle at A and B. If AB = 8 cm and OA = AP, the length PQ equals. [FIGURE: two concentric circles, tangent PT to the inner circle, intersecting the outer circle at A and B, with O as center]", "answer": "External point P, tangent to inner circle (r=3) meets outer at A,B with AB=8 (half=4), and OA=AP. Outer radius OA = sqrt(3^2 + 4^2) = 5; with OA=AP find OP, then tangent length = sqrt(OP^2 - r^2). Method = concentric Pythagoras plus tangent length.", "explanation": "Concentric circle plus tangent ka mix: pehle outer radius sqrt(r^2 + aadha-chord^2) = 5, fir OA=AP se OP, fir tangent length Pythagoras. Hook: do baar Pythagoras, chord ke liye aur tangent ke liye.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "G2-303", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Two circles (tangent lengths, LA)", "question": "In the given figure, TP and TQ are tangents to a circle with centre M, touching another circle with centre N at A and B respectively. It is given that MQ = 13 cm, NB = 8 cm, BQ = 35 cm and TP = 80 cm. (i) Name the quadrilateral MQBN. 1 (ii) Is MN parallel to PA? Justify your answer. 1 (iii) Find length TB. 1 (iv) Find length MN. 2 [FIGURE: Two circles with centers M and N, and common tangents TP and TQ. Points A and B are tangency points on the second circle. Dimensions are given.]", "answer": "TP,TQ tangents to circle (centre M) touching second circle (centre N) at A,B; MQ=13, NB=8, BQ=35, TP=80. (i) MQBN is a trapezium (MQ parallel NB, both perp TQ). (ii) MN not parallel to PA. (iii) TB=45 cm. (iv) MN = sqrt(BQ^2 + (MQ-NB)^2) = sqrt(35^2 + 5^2) = 25sqrt2 cm.", "explanation": "Radii tangent par 90 matlab MQ parallel NB matlab trapezium. TB = 45 cm. MN ke liye right triangle: MN = sqrt(35^2 + (13-8)^2) = 25sqrt2 cm. Hook: perpendicular giraao, right triangle banao, Pythagoras.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 4}, {"key": "G2-304", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Two circles (tangent lengths, LA)", "question": "Name the quadrilateral MQBN.", "answer": "Sub-parts of the two-circles problem (MQ=13, NB=8, BQ=35, TP=80): (i) MQBN is a trapezium; (ii) MN is NOT parallel to PA; (iii) TB=45 cm; (iv) MN = sqrt(35^2 + (13-8)^2) = 25sqrt2 cm.", "explanation": "Yeh usi two-circles question ke chhote parts hain: trapezium pehchaano, parallel check (nahi), TB=45, fir Pythagoras se MN=25sqrt2 cm. Hook: radii perp tangent matlab trapezium; baaki Pythagoras.", "years": ["2026"], "papers": 1, "raw": 4, "marks": 1, "types": ["LA"], "score": 4}, {"key": "G2-305", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent length and circumscribed config (LA)", "question": "PQ and PR are two tangents to a circle with centre O and radius 5 cm. AB is another tangent to the circle at C which lies on OP. If OP = 13 cm, then find the length AB and PA. [FIGURE: Circle with center O, tangents PQ, PR, and AB. C is on AB and OP]", "answer": "PQ,PR tangents and AB tangent at C (C on OP), OP=13, r=5. PQ = sqrt(13^2 - 5^2) = 12, and OC=5 so PC=8. AB is tangent at C perpendicular to OP with A on PQ, B on PR; using equal tangents (CA=QA, CB=RB) and similar right triangles, find AB and PA from PC=8 and PQ=12.", "explanation": "Pehle PQ = sqrt(OP^2 - r^2) = 12. AB tangent C par OP ke perpendicular; equal tangents se CA=QA, CB=RB. PC=8 use karke AB aur PA nikalo. Hook: tangent length plus equal tangents plus similar triangles.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 4}, {"key": "M1-328", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Sector area", "question": "A circle is divided into 16 identical sectors. If radius of the circle is 7 cm, area of each sector is", "answer": "Method: Angle of each = 360/16 = 22.5°; area each = (22.5/360)πr² = (1/16)πr² = (1/16)(22/7)(49) = 77/8 ≈ 9.625 cm².", "explanation": "Jab circle ko n barabar tukdo me baata jaata hai, har tukde ka area = (1/n)·πr² (kyunki har ka angle 360/n hota hai). 16 sectors, r=7 → (1/16)(22/7)(49) = 9.625 cm². Shortcut: total area πr² ko number of sectors se divide kar do.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "M1-364", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Sector perimeter", "question": "In the given figure, chord AB subtends an angle of 120° at the centre of the circle with radius 7 cm. Find (i) perimeter of major sector OACB, and (ii) area of the shaded segment, if area of ΔOAB = 21.2 cm². [FIGURE: Circle, centre O, radius 7 cm, chord AB subtending 120°, major sector OACB]", "answer": "Method: (i) Major sector uses reflex angle 360−120 = 240°; perimeter = 2r + (240/360)2πr = 14 + 88/3 = 130/3 ≈ 43.3 cm. (ii) Shaded (minor) segment = minor sector − ΔOAB = (120/360)(22/7)(49) − 21.2 = 51.33 − 21.2 ≈ 30.1 cm².", "explanation": "Major sector ka perimeter: angle reflex (360−120 = 240°) lena, perimeter = 2r + (240/360)2πr. Segment area = minor sector − triangle (triangle yahan diya hua hai, 21.2). r=7. Tip: 'major' suno to angle ulta (reflex) karo; segment = sector − triangle.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "M1-365", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Segment area", "question": "Chord AB of a circle with centre O and radius 21 mm subtends an angle of 120° at the centre. Find the perimeter of the shaded (minor) segment. (Use √3 = 1.73) [FIGURE: Circle with centre O, chord AB, shaded segment]", "answer": "Method: Perimeter of segment = chord AB + minor arc. Drop perpendicular OM: AM = r·sin60°, AB = 2r·sin60° = r√3. Minor arc = (120/360)2πr. For r=21: AB = 21√3 ≈ 36.33, arc = 44 → perimeter = (44 + 21√3) ≈ 80.33 mm. (r=21/2 → 22 + 21√3/2 ≈ 39.85 cm.)", "explanation": "Segment ka perimeter = chord + arc (curved part). Chord nikaalne ke liye centre se perpendicular giraao: AB = 2r·sin(θ/2). 120° pe sin60° = √3/2 → AB = r√3. Arc = (θ/360)2πr. Tip: segment perimeter me chord + arc dono jodo, sirf arc nahi.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 4}, {"key": "M1-366", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Segment area", "question": "A chord of a circle, of radius 14 cm, subtends an angle of 60° at the centre. Find the area of the smaller sector and perimeter of the smaller segment.", "answer": "Method: Smaller sector area = (60/360)π(14²) = 308/3 ≈ 102.67 cm². At 60° ΔOAB is equilateral so chord AB = 14. Minor arc = (60/360)2π(14) = 44/3. Perimeter of smaller segment = chord + arc = 14 + 44/3 = 86/3 ≈ 28.67 cm.", "explanation": "Smaller sector area = (θ/360)πr². Smaller segment ka perimeter = chord + arc. 60° pe triangle equilateral, isliye chord = r = 14. Arc = (60/360)2πr. Tip: 60° = equilateral, to chord seedha radius ke barabar — yeh shortcut yaad rakho.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 4}, {"key": "M1-367", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Sector perimeter", "question": "A circle of diameter 20 cm is equally divided into five sectors. Find the area and perimeter of one of the sectors.", "answer": "Method: r=10; angle = 360/5 = 72°. Area = (72/360)π(10²) = 20π ≈ 62.8 cm² (or 440/7 with π=22/7). Perimeter = 2r + (72/360)2πr = 20 + 4π ≈ 32.57 cm (or 228/7).", "explanation": "Pehle equal pieces ka angle = 360/5 = 72°, r = d/2 = 10. Area = (θ/360)πr², perimeter = 2r + (θ/360)2πr (do radii + arc). Tip: perimeter me 2r jodna na bhoolna; π=3.14 ya 22/7 jo bola ho wahi.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 4}, {"key": "M2-386", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (cone + hemisphere)", "question": "A toy is in the form of a cone mounted on a hemisphere of radius 7 cm. The total height of the toy is 31 cm. Find the total surface area of the toy. [FIGURE: A toy consisting of a cone mounted on a hemisphere.]", "answer": "Method: surface = CSA of cone + CSA of hemisphere = πrl + 2πr². Cone height = total − r = 31−7 = 24, l=√(7²+24²)=25 → π(7)(25)+2π(49) = 858 cm².", "explanation": "Cone+hemisphere ka TSA me sirf bahar dikhne wale curved surfaces: cone ki πrl + hemisphere ki 2πr². Niche/beech ka circle count NAHI hota (woh joda hua hai). Cone ki height = total height − radius, phir l=√(r²+h²).", "years": ["2026"], "papers": 1, "raw": 2, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "M2-410", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Capacity / volume of a single solid (sphere)", "question": "The radius of a sphere (in cm) whose volume is 36 π cm³, is :", "answer": "Method: volume of sphere = (4/3)πr³ = 36π → r³ = 27 → r = 3 cm.", "explanation": "Sphere ka volume = (4/3)πr³. r nikaalna ho to π cancel karo, (4/3) ko ult-palट karo, phir cube-root lo. 36π → r³=27 → r=3. Cube root yaad: 27→3, 8→2, 64→4.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "M2-411", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Volume of a hollow solid (hemisphere)", "question": "A hemispherical bowl is made of steel of thickness 1 cm. The outer radius of the bowl is 6 cm. The volume of steel used (in cm³) is :", "answer": "Method: volume of steel = (2/3)π(R³−r³) with R=6, r=5 → (2/3)π(216−125) = (2/3)π(91) = 182π/3 cm³.", "explanation": "Hollow hemisphere ka material = (2/3)π(R³−r³) — bahar ka minus andar ka. Inner radius = outer − thickness (6−1=5). R³ aur r³ alag nikaalo phir ghatao. (Sahi option 182π/3 hai; kuchh keys me '182/π' typo hai.)", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "M2-412", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Ratio of volumes / surface areas", "question": "A right circular cylinder and a right circular cone have equal bases and equal heights. If their curved surface areas are in the ratio 8 : 5, then find the ratio between the radius of their bases to their height.", "answer": "Method: (2πrh)/(πrl) = 8/5 → 2h/l = 8/5 → l = 5h/4. With l²=r²+h² → 25h²/16 = r²+h² → r² = 9h²/16 → r/h = 3/4.", "explanation": "CSA ratio do: cylinder 2πrh, cone πrl. Ratio banao, r cancel ho jayega. Phir l ko √(r²+h²) se replace karke square karo aur r/h nikaalo. Trig jaisa nahi — bas algebra aur Pythagoras. r:h = 3:4.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 4}, {"key": "M2-413", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Volume of combination (cylinder + 2 hemispheres)", "question": "A solid is in the form of a cylinder with hemispherical ends. The total height of the solid is 20 cm and the diameter of the cylinder is 7 cm. Find the total volume of the solid. (Use π = 22/7)", "answer": "Method: r=3.5, cylinder height = 20 − 2(3.5) = 13. Volume = πr²h + (4/3)πr³ (two hemispheres = one sphere) ≈ 500.5 + 179.7 ≈ 680.1 cm³.", "explanation": "Cylinder + dono taraf hemisphere = cylinder + ek poora sphere. Cylinder ki height = total − 2×radius. Volume = πr²h + (4/3)πr³. Do hemisphere ko ek sphere maan lo to formula aasaan. Height adjust karna sabse zaroori.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 4}, {"key": "M2-418", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (hollow hemisphere + cone)", "question": "The internal and external radii of a hollow hemisphere are 5√2 cm and 10 cm respectively. A cone of height 5√7 cm and radius 5√2 cm is surmounted on the hemisphere. Find the total surface area of the object in terms of π. (Use √2 = 1.4) [FIGURE: hollow hemisphere surmounted by a cone]", "answer": "Method: slant l = √(r²+h²) = √((5√2)²+(5√7)²) = √(50+175)=15. TSA = outer hemisphere 2πR² + cone CSA πrl + top ring π(R²−r²) = 2π(100) + π(5√2)(15) + π(100−50) = 355π cm².", "explanation": "Hollow hemisphere + cone: bahar ki hemisphere curved (2πR²) + cone ki slant CSA (πrl) + upar ka ring π(R²−r²) jahan dono radii milte hain. Slant l=√(r²+h²) pehle. 'Hollow' hai isliye ring (R²−r²) zaroor jodna.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "M2-422", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Diagonal of a cuboid/cube", "question": "Find the length of the diagonal of Rubik's cube if each edge measures 6 cm.", "answer": "Method: body diagonal of a cube = √3·a. With a=6 → 6√3 cm.", "explanation": "Cube ki sabse lambi (body) diagonal = √3 × side. 6 → 6√3. Cuboid ke liye √(l²+b²+h²). Yeh diagonal cube ke ek kone se opposite kone tak hoti hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "M2-423", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Capacity / volume of a single solid (cube)", "question": "Find the volume of Rubik's cube if the length of the edge is 7 cm.", "answer": "Method: volume of cube = (side)³ = 7³ = 343 cm³.", "explanation": "Cube ka volume = side ka cube (a³). 7³ = 343. Bas teen baar side multiply. Cube me lambai-chaudai-unchai sab barabar isliye a³.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "M2-424", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of a single solid (hemisphere)", "question": "What is the curved surface area of hemisphere (ice-cream) if the base radius is 7 cm ?", "answer": "Method: CSA of hemisphere = 2πr². r=7 → 2(22/7)(49) = 308 cm².", "explanation": "Hemisphere ka curved surface = 2πr² (poore sphere 4πr² ka aadha). r=7 → 308 cm². Sirf curved poocha hai to flat circle add mat karna.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "M2-425", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Combination dimension (add component heights)", "question": "Determine the total height of the fountain.", "answer": "Method: total height = sum of component heights (cylinder + hemisphere etc.) = 14 + 21 = 35 cm.", "explanation": "Combination ki total height = sare tukdo ki heights jod do (yahan 14+21=35). Diagram dekho kaunse parts ek ke upar ek hain. Simple addition par parts pehchaan na zaroori.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "M2-426", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Capacity / volume of a single solid (sphere)", "question": "Find the volume of the ball.", "answer": "Method: volume of sphere = (4/3)πr³. r=10.5 → (4/3)(22/7)(10.5³) = 4851 cm³.", "explanation": "Ball ek sphere hai, volume = (4/3)πr³. Diameter se radius lo. 4851 cm³. '(4/3)' aur cube dono lagana — yahi sphere ki pehchaan.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "M2-427", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Volume of combination (vessel with submerged sphere)", "question": "If one-third of the ball is submerged in the water, find the volume of the water filled in the pool. / Find the sum of the outer curved surface area of the cylindrical part and surface area of the ball.", "answer": "Method: water = volume of inner (upper) cylindrical part − (1/3)(volume of ball) = 7183 cm³. The CSA-sum part = outer CSA of cylinder (2πrh) + surface area of ball (4πr²).", "explanation": "Paani ka volume = bartan (cylinder) ka volume − doobe hue ball ka hissa ((1/3) of sphere). Jitna ball andar hai utni jagah paani ki kam. Doosra part me 2πrh (cylinder CSA) + 4πr² (ball ka poora surface) jodo. Submerged part GHATAO.", "years": ["2026"], "papers": 1, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "M2-428", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Volume of combination (large sphere minus small spheres)", "question": "1000 small thermocol balls of radius 0.5 cm are kept in a spherical balloon of radius 20 cm. Find the volume of air in the balloon.", "answer": "Method: air = volume of big sphere − 1000×volume of small sphere = (4/3)π(20³) − 1000(4/3)π(0.5³) ≈ 33510 − 524 ≈ 33000 cm³ (using π=22/7).", "explanation": "Air = bade sphere ka volume − sare chhote balls ka volume. Dono (4/3)πr³, bas N (1000) se multiply karke ghatao. Same formula, alag radius. Subtract karna na bhoolo.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "M2-429", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Volume of combination (cylinder minus spheres)", "question": "Three tennis balls are just packed in a cylindrical jar. If radius of each ball is r, volume of air inside the jar is [FIGURE: cylindrical jar containing three stacked balls]", "answer": "Method: jar radius = r, jar height = 3(2r) = 6r. Air = πr²(6r) − 3(4/3)πr³ = 6πr³ − 4πr³ = 2πr³.", "explanation": "Jar ki radius = ball ki radius r; height = 3 balls = 6r. Air = cylinder volume (πr²·6r) − 3 balls ((4/3)πr³ each). 6πr³ − 4πr³ = 2πr³. 'Just packed' matlab dimensions balls se hi banti hain.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "M2-430", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Ratio of volumes / surface areas", "question": "An ice-cream cone of radius r and height h is completely filled by two spherical scoops of ice-cream. If radius of each spherical scoop is r/2, then h : 2r equals", "answer": "Method: cone volume = 2×scoop volume → (1/3)πr²h = 2(4/3)π(r/2)³ = (1/3)πr³ → h = r → h:2r = 1:2.", "explanation": "Cone ka volume = 2 scoops ka volume. (1/3)πr²h = 2×(4/3)π(r/2)³. r ki powers cancel karo, h nikal aayega (= r). Phir h:2r = 1:2. Equal-volume condition se ratio aata hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "M2-431", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Largest solid carved out (cone from hemisphere)", "question": "A conical cavity of maximum volume is carved out from a wooden solid hemisphere of radius 10 cm. Curved surface area of the cavity carved out is (use π = 3.14) [FIGURE: hemisphere with a cone carved out]", "answer": "Method: max cone in a hemisphere has radius = height = R = 10. Slant l = √(R²+R²) = R√2 = 10√2. CSA = πrl = π(10)(10√2) = 100√2·π = 314√2 cm².", "explanation": "Hemisphere me sabse bada cone: radius = height = hemisphere ki radius R. Slant l = R√2 (kyunki r=h). CSA = πrl = πR·R√2 = πR²√2. R=10 → 314√2. Yaad rakho r=h=R yahan.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "M2-432", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of a single solid (hemisphere)", "question": "A camping tent in hemispherical shape of radius 1.4 m, has a door opening of area 0.50 m². Outer surface area of the tent is", "answer": "Method: outer SA = curved SA of hemisphere − door area = 2πr² − 0.5 = 2(22/7)(1.4²) − 0.5 = 12.32 − 0.5 = 11.82 m².", "explanation": "Tent hemisphere hai to bahar ka curved = 2πr², phir door ka area ghata do (wahan cloth nahi). 2πr²−0.5 = 11.82. Floor count nahi karte (tent zameen pe khula). Subtract the opening.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "M2-433", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of a single solid (sphere)", "question": "Find the surface area of the bulb.", "answer": "Method: surface area of sphere = 4πr². r=3.5 → 4(22/7)(3.5²) = 154 cm².", "explanation": "Bulb sphere hai, surface area = 4πr². r=3.5 → 154 cm². '4' lagana zaroori (hemisphere se confuse mat hona, woh 2πr²/3πr² hai).", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "M2-434", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Largest solid fitting inside (max dimension)", "question": "What could be the maximum diameter of the bulb if at least 1 cm space is left from each side ?", "answer": "Method: max diameter = smallest box dimension − 2×(gap each side) = 12 − 2(1) = 10 cm.", "explanation": "Box me sphere fit karna ho to max diameter = sabse chhoti side − 2×gap (dono taraf 1-1 cm). 12−2 = 10. Gap dono sides se ghatana — isliye ×2. Smallest dimension hi limit set karti hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "M2-435", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (cuboid fabric & space)", "question": "Find the area of the fabric used if there is a fold of 2 cm on top and bottom edges. / Find the space available inside the lamp.", "answer": "Method: fabric = lateral surface area of cuboid = 2(l+b)h with adjusted dimensions 24×12×21 → 2(24+12)(21) = 1512 cm². Space available = volume of box − volume of sphere = 24·12·17 − (4/3)π(3.5³) = 14149/3 ≈ 4716.3 cm³.", "explanation": "Fabric = cuboid ki lateral surface = 2(l+b)×h (top-bottom fold ke saath height adjust). Space bachi = box ka volume − sphere (bulb) ka volume. Ek part area ka, doosra volume ka — question dhyaan se padho. Dimensions adjust karna mat bhoolna.", "years": ["2026"], "papers": 1, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "N1-455", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "LCM–HCF word problems", "question": "Find the length of the plank that can be used to measure the lengths 4 m 20 cm and 5 m 4 cm exactly, in the least time.", "answer": "Method: 'longest measuring length that fits exactly' ⇒ HCF (same unit first). 420 cm & 504 cm ⇒ HCF=84 cm.", "explanation": "'Sabse lambi cheez jo dono ko poora maape' → HCF (pehle units same karo, m→cm). Memory hook: 'exact measure / largest tile → HCF'. 4 m 20 cm = 420 cm — convert mat bhoolna.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 4}, {"key": "N1-456", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "LCM–HCF word problems", "question": "The dimensions of a window are 156 cm × 216 cm. Arjun wants to put grill on the window creating complete squares of maximum size. Determine the side length of the square and hence find the number of squares formed.", "answer": "Method: side of largest square = HCF of the two sides; number of squares = area/side². HCF(156,216)=12 cm ⇒ 156·216/144=234 squares.", "explanation": "Sabse bade square tile ki side = dono lengths ka HCF; squares ki ginti = area÷side². Memory hook: 'maximum square → HCF, count = area/side²'. Side nikaalkar rukna mat — number of squares bhi poochha jaata hai.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "S2-493", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Valid probability range", "question": "Assertion (A) : If probability of happening of an event is 0.2p, p > 0, then p can't be more than 5. Reason (R) : P(E) = 1 − P(E̅) for an event E.", "answer": "Since probability ≤ 1, 0.2p ≤ 1 ⇒ p ≤ 5, so Assertion TRUE; Reason states the complement identity correctly. Answer: (A).", "explanation": "Probability max 1 hoti hai, toh 0.2p ≤ 1 ⇒ p ≤ 5. Isliye p 5 se zyada nahi — Assertion sahi. Reason complement formula, theek. Range rule yaad rakho: 0 ≤ P ≤ 1.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 4}, {"key": "S2-496", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Single die", "question": "A die is thrown once. Probability of getting a number other than 3 is :", "answer": "Die has 6 faces; 'other than 3' = 5 favourable ⇒ 5/6.", "explanation": "Die ke 6 faces. 'Other than 3' = 3 chhod ke 5 numbers ⇒ 5/6. Complement se: 1 − 1/6 = 5/6.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "S2-505", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Two dice - even product", "question": "Two different dice are thrown together. Find the probability that the numbers obtained have : (i) even sum, (ii) even product.", "answer": "Total = 36. (i) Even sum = 18 ⇒ 1/2. (ii) Even product = 1 − P(both odd) = 1 − 9/36 = 27/36 = 3/4.", "explanation": "36 outcomes. Even sum: dono even ya dono odd ⇒ 9+9=18 ⇒ 1/2. Product tabhi odd jab dono odd (9), toh even product = 1 − 9/36 = 27/36 = 3/4. Complement smart trick.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 4}, {"key": "S2-512", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Cards - cards removed/lost", "question": "Find the probability that the drawn card is a face card. (Three cards were dropped from the cards; 101 cards remain.)", "answer": "After 3 cards dropped, total = 101 (from 104, a double deck). P(face)=23/101; P(king or queen)=15/101; P(jack)=8/101 vs 8/104 — compare to decide which is higher.", "explanation": "Case-based mein bhi: pehle bacha total (101) note karo, phir category count ⇒ P = favourable/101. Comparison part mein fractions compare karo (8/101 vs 8/104): bada denominator = chhoti probability. Total dhyaan se padho.", "years": ["2026"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "S2-525", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Coloured balls - find unknown", "question": "A bag contains 30 balls out of which 'm' balls are blue. (i) Find P(ball not blue). (ii) If 6 more blue balls are added, P(blue) becomes 5/4 times the first P(blue). Find m.", "answer": "(i) P(not blue)=(30−m)/30. (ii) Set (m+6)/36 = (5/4)·(m/30) and solve ⇒ m=12.", "explanation": "(i) P(not blue) = (30−m)/30. (ii) 6 balls add karne par total 36, P(blue) = (m+6)/36. Equation: (m+6)/36 = (5/4)×(m/30). Solve ⇒ m=12. Step-by-step equation banao, fraction ghabraana mat.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "T1-545", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "(k cosec θ+1)/(k cosec θ−1) type", "question": "For an acute angle θ, if sin θ = 1/9, then value of (9 cosec θ + 1)/(9 cosec θ - 1) is", "answer": "Method: sinθ=1/9 ⇒ cosecθ=9 ⇒ 9cosecθ=81; substitute. Representative: (81+1)/(81−1)=82/80=41/40.", "explanation": "sinθ=1/9 ⇒ cosecθ=9, toh 9·cosecθ=81. Substitute karke fraction simplify. cosθ=1/8 ⇒ secθ=8 wala bhi same. Hook: 'cosec=1/sin, value daalo'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 4}, {"key": "T1-558", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Prove identity: sec³/(sec²−1) + cosec³/(cosec²−1)", "question": "Prove that : sec^3 θ / (sec^2 θ - 1) + cosec^3 θ / (cosec^2 θ - 1) = sec θ . cosec θ (sec θ + cosec θ)", "answer": "Method: sec²−1=tan², cosec²−1=cot²; reduce each term to secθ/tan²·... then combine to secθcosecθ(secθ+cosecθ).", "explanation": "sec²−1=tan² aur cosec²−1=cot² lagao, har term simplify karke secθcosecθ(secθ+cosecθ) banao. Hook: 'sec²−1=tan² yaad rakho'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "T1-559", "chapter_code": "T1", "chapter_name": "Introduction to Trigonometry", "unit": "Trigonometry", "topic": "Prove identity: (sinA+secA)²+(cosA+cosecA)² square-expand", "question": "Prove that : (sin A + sec A)^2 + (cos A + cosec A)^2 = (1 + sec A cosec A)^2.", "answer": "Method: expand both squares; group sin²+cos²=1, sec²+cosec², and cross terms 2(tanA+cotA)... to reach (1+secAcosecA)².", "explanation": "Dono squares expand karo, sin²+cos²=1 aur cross-terms ko jodte jao — RHS (1+secAcosecA)² ban jaata hai. Hook: 'expand, group, identity'.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 4}, {"key": "T2-600", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: car & building", "question": "What is the height of the building? [angle of elevation 60° from a point, base BC = 25 m]", "answer": "Method: in ΔABC, tan60° = AB/BC ⇒ AB = 25·√3 = 25√3 m.", "explanation": "Building height = base × tan60° = 25√3 m. Sidha tan ka use — perpendicular nikalna hai aur base (25 m) pata hai. tan60°=√3 yaad rakho.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "T2-601", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: car & building", "question": "What is the distance between the two positions of the car? [building AB = 25√3 m; angles of depression/elevation 30° and 60°]", "answer": "Method: at the farther position, tan30° = AB/BD ⇒ BD = AB·√3 = 25√3·√3 = 75 m. Nearer position BC = 25 m. Distance between positions = BD − BC = 50 m. (Distance of observer at 60° = BC = 25 m... actually slant = AB/sin60°; the printed answer uses BD−BC = 50 m.)", "explanation": "Door wali position ki doori BD = AB/tan30° = 75 m, paas wali BC = 25 m. Do positions ke beech = BD − BC = 50 m. Building height pehle nikaal lo, fir use karke base nikaalo. Chhota angle (30°) = car door — yaad rakho.", "years": ["2026"], "papers": 1, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "T2-602", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: car & building", "question": "What would be the total time taken by the car to reach the foot of the building from the starting point? [car covers 50 m in 6 s]", "answer": "Method: speed is uniform, so time ∝ distance. Car covers 50 m in 6 s ⇒ to cover 75 m (full distance BD): time = (6/50)×75 = 9 s.", "explanation": "Uniform speed me time distance ke proportional hota hai. 50 m me 6 s lage, to 75 m (poori doori) me = (6/50)×75 = 9 s. Unitary method lagao: pehle 1 m ka time, fir multiply. Distance pehle trig se nikaalo.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "T2-603", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: window & water tank", "question": "Write a relation between d (the height of window) and y. [line of sight y at 30°, vertical height d]", "answer": "Method: sin30° = d/y = 1/2 ⇒ y = 2d.", "explanation": "Line of sight y (hypotenuse), height d ⇒ sin30° = d/y = 1/2 ⇒ y = 2d. Relation maange to formula likho, number nahi. sin30°=1/2 yaad rakho — isse y = 2d turant.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "T2-604", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: window & water tank", "question": "Determine the value of h. [tan 45° = h/WX, WX = 54 m]", "answer": "Method: tan45° = h/WX = h/54 = 1 ⇒ h = 54 m.", "explanation": "tan45°=1 ⇒ h = WX = 54 m. 45° matlab perpendicular = base. Bas value daalo. Seedha sa step.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 4}, {"key": "T2-605", "chapter_code": "T2", "chapter_name": "Some Applications of Trigonometry", "unit": "Trigonometry", "topic": "Case study: window & water tank", "question": "Determine the height of the water tank. [tan 30° = d/54; total height = h + d]", "answer": "Method: tan30° = d/54 ⇒ d = 54/√3 = 18√3 m. Height of tank = h + d = 54 + 18√3 m. OR: WC = 54·tan30° = 18√3 m; window height x from sin45° = h/x ⇒ x = 54√2 m.", "explanation": "Upar wala part d = 54·tan30° = 18√3 m, fir poori tank height = h + d = 54 + 18√3 m. Doosre part me window ki tirchi doori x = h/sin45° = 54√2. Sections ko jodo (h + d) — yahi tank ki poori height. √3, √2 ke values lagao.", "years": ["2026"], "papers": 1, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 4}, {"key": "A1-16", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Substitute a zero into p(x)", "question": "If – 4 is a zero of the polynomial p(x) = x² − x − (2 + 2k), then the value of k is:", "answer": "Method: if r is a zero then p(r)=0. Substitute the given value and solve for the unknown. Representative p(-4)=0 for x²-x-(2+2k): 16+4-(2+2k)=0 → 18-2k=0 → k=9.", "explanation": "Agar koi number 'zero' hai to wahan p(x)=0 hota hai. Bas us value ko x me daal ke equation solve karo. 'What to add/subtract so that r becomes a zero' bhi yahi: p(r) nikaalo, jitna extra hai utna subtract (ya zaroorat ho to add) karo.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "A1-29", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Zeroes from graph", "question": "Two polynomials are shown in the graph below. The number of distinct zeroes of both the polynomials is : [FIGURE: Graph showing two parabolas, each intersecting the x-axis at two points]", "answer": "Method: count the DISTINCT points on the x-axis where either curve meets it (shared x-intercepts are counted once). Representative: both parabolas share the same two x-intercepts ⇒ 2 distinct zeroes.", "explanation": "'Distinct zeroes' = x-axis par alag-alag points jahan koi bhi curve milta hai (common point ek hi baar ginta hai). Dono parabolas agar same do jagah cut karein to distinct zeroes = 2. Repeat points double mat ginna — yahi twist hai!", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "A2-45", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Graphical method", "question": "Solve the following system of equations graphically : 2x + y = 5 and 4x – y = 7. Hence, write the coordinates of the points where given lines meet y-axis.", "answer": "Method: solve graphically (plot, find intersection) AND read where each line cuts the y-axis (put x=0). e.g. 2x+y=5 & 4x–y=7 ⇒ solution (2,1); y-intercepts (0,5) and (0,–7); their ordinate difference = |5–(–7)| = 12 / sum as asked.", "explanation": "Yeh graphical solve + thoda extra hai: intersection point to nikaalo hi, saath mein har line jahan y-axis ko kaate (x=0 daalo) woh point bhi likho. Phir ordinates (y-values) ka difference ya sum poocha jaata hai — bas subtract/add kar do. Diagram par y-axis ke points clearly dikhao.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 3}, {"key": "A2-59", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "The monthly incomes of two persons are in the ratio 9 : 7 and their monthly expenditures are in the ratio 4 : 3. If each saved ₹ 5,000, express the given situation algebraically as a system of linear equations in two variables. Hence, find their respective monthly incomes.", "answer": "Method: introduce a common multiplier for the ratio (incomes 9x, 7x; expenditures 4y, 3y). Saving = income – expenditure. 9x–4y=5000 and 7x–3y=5000 ⇒ x=5000 ⇒ incomes ₹45000 and ₹35000. (Angles 2:3 with x+y=90 ⇒ 36° and 54°.)", "explanation": "Ratio word problems: ratio 9:7 ko 9x aur 7x likho (common multiplier x). Saving = Income − Expenditure. Toh 9x−4y=5000 jaisa banta. Do equations solve karke x, y nikaalo, phir asli income = 9x, 7x. Memory hook: 'ratio dikhe to x daal do'. Angle ratio mein x+y=90° (right triangle) ka extra fact use karo.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 3}, {"key": "A2-60", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "In a pair of supplementary angles, the greater angle exceeds the smaller by 50°. Express the given situation as a system of linear equations in two variables and hence obtain the measure of each angle.", "answer": "Method: let angles be x and y. Supplementary ⇒ x+y=180°; 'greater exceeds smaller by 50' ⇒ x–y=50. Solve ⇒ x=115°, y=65°.", "explanation": "Angle problems: do angles x aur y lo. Supplementary matlab x+y=180° (complementary hota to 90°). 'Bada chhote se 50 zyada' = x−y=50. Bas yeh do equations jod/ghata ke solve karo. Common galti: supplementary (180) aur complementary (90) mein confuse ho jaana — yaad rakho 'Supp = 180, Comp = 90 (C for Corner/90)'.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "A2-61", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "A bag contains some red and blue balls. Ten percent of the red balls, when added to twenty percent of the blue balls, give a total of 24. If three times the number of red balls exceeds the number of blue balls by 20, find the number of red and blue balls.", "answer": "Method: let red=x, blue=y; translate each condition. 0.10x+0.20y=24 (i.e. x+2y=240) and 3x–y=20 ⇒ x=40 red, y=100 blue.", "explanation": "Counting word problem: red = x, blue = y. 'Ten percent of red' = 0.10x, etc. — percentages ko decimal banao. 'Three times red exceeds blue by 20' = 3x − y = 20. Do equations bana ke solve. Tip: percentage wali equation ko ×10 karke simple integers (x+2y=240) bana lo, calculation aasaan.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "A2-62", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "The students of a class are made to stand equally in rows. If 3 students are extra in each row, there would be 1 row less. If 3 students are less in a row, there would be 2 more rows. Find the number of students in the class.", "answer": "Method: let students-per-row=x, number of rows=y; total = xy stays constant. (x+3)(y–1)=xy and (x–3)(y+2)=xy; expand and simplify to linear equations x–3y+3=0 and 2x–3y–6=0 ⇒ x=9, y=4 ⇒ 36 students.", "explanation": "Rows/arrangement problem: ek row mein x students, total y rows, total students = xy (constant rehta hai). '3 extra per row, 1 row kam' ⇒ (x+3)(y−1)=xy. Expand karo to xy cancel ho jaata aur linear equation banta. Do conditions = do equations. Final mein total = x×y. Yeh 'product constant' trick rectangle jaisa hi hai.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "A2-63", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Consistency", "question": "(a) The cost of 2 kg apples and 1 kg of grapes on a day was found to be ₹ 320. The cost of 4 kg apples and 2 kg grapes was found to be ₹ 600. If cost of 1 kg of apples and 1 kg of grapes is x and y respectively, represent the given situation algebraically as a system of equations and check whether the system so obtained is consistent or not.", "answer": "Method: first FORM the equations from the prices, then test consistency by ratios. 2x+y=320 and 4x+2y=600 ⇒ a1/a2=b1/b2=1/2 but c1/c2=320/600≠1/2 ⇒ a1/a2=b1/b2≠c1/c2 ⇒ inconsistent (no solution).", "explanation": "Yeh do-kaam wala sawaal: pehle word problem se equations banao (2x+y=320, 4x+2y=600), phir consistency check karo ratios se. Yahan a1/a2 = b1/b2 par c1/c2 alag — matlab parallel, INCONSISTENT, no solution. Memory hook: 'pehle equation banao, phir teen ratio compare karo'. Yahan solve karna possible hi nahi.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "A2-67", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Case-based application", "question": "If the school rents 'x' chairs and 'y' tables, answer the following questions : (i) Write down the pair of linear equations representing the given information. [300 items total; chairs ₹50, tables ₹200; budget ₹30000] (ii) number of chairs and tables (iii) max tables if no chairs.", "answer": "Method: let x = chairs, y = tables. Form x+y=300 and 50x+200y=30000 (i.e. x+4y=600); solve ⇒ x=200 chairs, y=100 tables. Max tables with no chairs = 30000/200 = 150.", "explanation": "Chairs-tables case study: x = chairs, y = tables. Pehla equation total items (x+y=300), doosra budget (50x+200y=30000, simplify x+4y=600). Solve ⇒ 200 chairs, 100 tables. 'Sirf tables, no chairs' ho to budget ÷ table-price = max tables. Equation simplify karke calculation halka karo.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "A3-71", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Standard form of a quadratic", "question": "Which of the following equations is a quadratic equation?", "answer": "Expand each option and simplify; the equation that reduces to the form ax²+bx+c=0 with a≠0 (highest power exactly 2) is quadratic. E.g. (x+√x)²=2x√x simplifies to x²+x=0, which is quadratic.", "explanation": "Har option ko expand karke simplify karo. Jis equation me x ka highest power exactly 2 bache (aur a≠0) wahi quadratic hai. Common trap: x³ wale terms cancel ho jaate hain — pehle poora khol ke dekho, jaldbaazi mat karo.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "A3-92", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Find k for given roots", "question": "Find the value(s) of p for which the quadratic equation (p + 4)x² – (p + 1)x + 1 = 0 has real and equal roots. Also, find the roots of the equation(s) so obtained.", "answer": "Set D=b²−4ac=0 to find the parameter, then substitute each value back to find the equal roots. (p+1)²−4(p+4)=0 ⇒ p²−2p−15=0 ⇒ p=5 or −3. For p=5 roots are 1/3,1/3; for p=−3 roots are −1,−1.", "explanation": "Pehle equal roots ke liye D=0 lagao aur parameter (p) nikaalo — yahan do values mil sakti hain. Phir har p ko wapas equation me daal ke roots nikaalo (equal roots me x=−b/2a). Dono cases likho, ek bhi chhodna nahi. Sign ka dhyaan!", "years": ["2025"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 3}, {"key": "A3-93", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Solve by factorisation", "question": "Express the equation (x-2)/(x-3) + (x-4)/(x-5) = 10/3 ; (x ≠ 3,5) as a quadratic equation in standard form. Hence, find the roots of the equation so formed.", "answer": "Take LCM, cross-multiply to clear all denominators, simplify to ax²+bx+c=0, then factorise. The given equation reduces to 2x²−19x+42=0 ⇒ (x−6)(2x−7)=0 ⇒ x=6 or 7/2.", "explanation": "Fraction wale equations ko pehle common denominator/LCM le ke ek single quadratic me badlo (cross-multiply). Phir standard form banao aur factorise/formula se solve karo. Excluded values (x≠3,5) check karna — agar answer wahi aaya to reject. Arithmetic me jaldbaazi mat karna.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 3}, {"key": "A4-110", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "nth term from the end", "question": "Assertion (A) : For an A.P., 3,6,9, ..., 198, 10th term from the end is 168. Reason (R) : If 'a' and 'l' are the first term and last term of an A.P. with common difference 'd', then nth term from the end of the given A.P. is l - (n - 1) d.", "answer": "Method/answer: R is the correct general formula (true). Check A: 10th from end = 198-9(3)=171, not 168, so A is false. Answer: (D) A is false, R is true.", "explanation": "Formula (R) bilkul sahi: end se nth term = l-(n-1)d. Ab Assertion ko isi formula se check karo — 198-9(3)=171, diya tha 168, to A galat. Hook: 'pehle formula sahi maano, phir number verify karo'. Answer (D).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "A4-131", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Case study - nth term & sum", "question": "A runner's round distances form an AP. Write the 4th, 5th and 6th terms; find the distance of the 8th round; find the total distance after all 10 rounds; and after only the first 6 rounds.", "answer": "Method: AP 300,350,400,... (a=300,d=50). a4,a5,a6=450,500,550; a8=300+7(50)=650; S_10=5[600+450]=5250 m; S_6=3[600+250]=2550 m.", "explanation": "Round-distance ko AP banao (a=300, d=50). 'Konsa round' = a_n; 'kul distance' = S_n. Hook: 'ek round = a_n, kai rounds = S_n'. Formula a_n=a+(n-1)d, S_n=n/2[2a+(n-1)d]. Numbers chahe alag hon, tareeka wahi.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "A4-132", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find nth term", "question": "The 10th term of the AP 5, 19/4, 9/2, 17/4, ... is :", "answer": "Method: a=5, d=19/4-5=-1/4. a_10=a+9d=5+9(-1/4)=5-9/4=11/4.", "explanation": "Fraction wale AP mein bhi a aur d nikaalo (d=doosra-pehla), phir a_n=a+(n-1)d. Hook: 'fraction se daro mat, d=a_2-a_1 wahi rehta hai'. Yahan d=-1/4, so a_10=11/4. LCM dhyaan se lo.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "A4-133", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Assertion-Reason", "question": "Assertion (A) : Common difference of the AP : 5, 1, -3, -7, ... is 4. Reason (R): Common difference of the AP a1, a2, ..., an is obtained by d = a_n - a_(n-1).", "answer": "Answer: (D). R is the correct formula (true). But A's value is wrong: d=1-5=-4, not 4 -> A is false.", "explanation": "Reason sahi: d = koi term - usse pehla term. Par Assertion check karo: 1-5=-4, na ki 4, to A galat. Hook: 'd hamesha aage-peeche ka antar, sign sameshut'. Answer (D): A false, R true.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "A4-134", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Word problems", "question": "A sum of ₹ 2,000 is invested at 7% per annum simple interest. Calculate the interests at the end of 1st, 2nd and 3rd year. Do these interests form an AP ? If so, find the interest at the end of the 27th year.", "answer": "Method: SI per year = 2000*7/100 = 140; cumulative SI: 140,280,420,... is an AP with a=140,d=140. a_27=140+26(140)=₹3780.", "explanation": "Simple interest har saal barabar badhta hai isliye cumulative interest ek AP banta hai (a=d=ek saal ka interest). 27th saal ka interest = a_27. Hook: 'SI ka pattern hamesha AP, kyunki har saal same interest jodta hai'. Compound interest mein yeh nahi hota!", "years": ["2025"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 3}, {"key": "A4-135", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find a, d from sum & product", "question": "The sum of the third term and the seventh term of an AP is 6 and their product is 8. Find the sum of the first sixteen terms of the AP.", "answer": "Method: a3+a7=6 -> 2a+8d=6 -> a+4d=3; a3*a7=8. Solve -> (a=1,d=1/2) or (a=5,d=-1/2). S_16=8[2a+15d]: 76 or 20. (Painting OR-variant: a=8, d=1/3, S_n=168 -> n=16, eldest a_16=13 yrs.)", "explanation": "Do terms ka sum aur product diya ho to ek linear (sum) aur ek quadratic (product) banao, a aur d solve karo, phir S_16. Hook: 'sum se linear, product se quadratic, dono cases likho'. Age-wala word problem bhi isi tarah AP banake solve hota hai.", "years": ["2025"], "papers": 1, "raw": 4, "marks": 5, "types": ["LA"], "score": 3}, {"key": "A4-136", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find n given Sn and last term", "question": "An AP consists of 'n' terms whose nth term is 4 and the common difference is 2. If the sum of 'n' terms of AP is –14, then find 'n'. Also, find the sum of the first 20 terms.", "answer": "Method: a_n=a+(n-1)2=4 and S_n=n/2(a+4)=-14. From these a=6-2n; substitute -> n(10-2n)/2=-14 -> n^2-5n-14=0 -> n=7. Then a=6-14=-8, and S_20=10[2(-8)+19(2)]=220.", "explanation": "Yahan a_n, d aur S_n diye hain. a_n aur S_n=n/2(a+a_n) ke do rishton se 'a' ko hatao, n ki quadratic banao. Hook: 'a_n=a+(n-1)d aur S_n=n/2(a+l) — do equations, n nikaalo'. Positive integer n hi lo.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 3}, {"key": "A4-137", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Case study - nth term & sum", "question": "Poles along a cable-car route are at distances forming an AP. (i) Distance of the 10th pole from base. (ii) Distance between 15th and 25th pole. (iii)(a) Time for cable car to reach 15th pole from top at 5 m/s; (b) total number of poles.", "answer": "Method: AP a=200,d=150. a_10=200+9(150)=1550 m; gap a_25-a_15=10d=1500 m; 15th from top distance=300+14(150)=2400 m, time=2400/5=480 s; last pole 4700=200+(n-1)150 -> n=31.", "explanation": "Pole-distances ko AP banao (a=200, d=150). 'Konsa pole' = a_n; 'do poles ka antar' = (farak ke terms)d; 'kitne poles' = a_n=value solve. Hook: 'antar nikaalna ho to a_p - a_q = (p-q)d'. Time = distance/speed alag se.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "A4-138", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Case study - nth term & sum", "question": "In an equilateral triangle, small triangles form rows: 1 in row 1, 3 in row 2, 5 in row 3 and so on (10 rows). (i) Triangles in bottom row? (ii) In 4th row from bottom? (iii)(a) Total till 8th row; (b) how many more from 5th–10th row than first 4 rows? [FIGURE: large equilateral triangle of small triangles in rows]", "answer": "Method: AP 1,3,5,... (a=1,d=2). Bottom (10th) row a_10=19; 4th from bottom=7th term=13; S_8=8/2[2+14]=64; from 5th–10th = S_10-S_4=100-16=84, minus first 4 (S_4=16) -> 84-16=68.", "explanation": "Rows ki triangle-ginti AP hai (1,3,5,... a=1,d=2). 'Konsi row' = a_n; 'X row tak total' = S_n; 'beech ke rows ka sum' = S_bada - S_chhota. Hook: 'odd numbers ki AP, S_n=n^2 bhi yaad rakho'. 'From bottom' ho to ulti ginti karo.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "A4-148", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find common difference from term gap", "question": "The 11th and 13th term of an AP are 39 and 45, respectively. What is the common difference of the AP?", "answer": "Method: a_13-a_11=2d=45-39=6 -> d=3.", "explanation": "Do alag terms diye ho to a_p-a_q=(p-q)d use karo. 13th-11th=2d=6 -> d=3. Hook: 'antar / steps = d'. Yahan 2 steps the (11 se 13), isliye 6/2=3.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "A4-151", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Case study - nth term & sum", "question": "Lengths of running lanes form an AP. (i) Length of the 6th lane? (ii) How much longer is the 8th lane than the 4th? (iii) Total distance for one round in first six lanes (or lanes 4 to 8).", "answer": "Method: AP a=400,d=7.6. a_6=400+5(7.6)=438 m; a_8-a_4=4d=30.4 m; S_6=3[800+38]=2514 m; lanes 4–8 = S_8-S_3=2190 m.", "explanation": "Lane-lengths ko AP banao (a=400, d=7.6). 'Konsi lane' = a_n; 'farak' = (steps)d; 'kai lanes ka total' = S_n ya S_bada-S_chhota. Hook: 'lane 4 se 8 = S_8 - S_3 (3 tak hata do)'. Decimal d se ghabrao mat.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 3}, {"key": "C1-160", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Ratio of division", "question": "In the figure given below, points P, Q, R divides the line segment AB in four equal parts. [FIGURE: Line segment AB with points P, Q, R dividing it into four equal parts] The point Q divides PB in the ratio", "answer": "Method: mark equal segments on the line and count parts. P,Q,R make 4 equal parts → Q divides PB as 1:2. P divides AB 3:1 → AB/PB=4. P,Q trisection → AB/PB=1.5.", "explanation": "Figure me line ke barabar tukde gino. 4 equal parts hain to har tukda barabar — fir poochha gaya ratio ginti se nikaalo. AB/PB = total tukde / chhote tukde. Diagram dhyaan se padho.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G1-192", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity", "question": "In the given figure, QR/QS = QT/PR and ∠ 1 = ∠ 2, show that ∆ PQS ~ ∆ TQR.[FIGURE: Triangle TQR with point P on TQ and point S on TR. Line segment PS is drawn. Angle 1 is ∠ PQS and Angle 2 is ∠ R.]", "answer": "Method: angle1 = angle2 gives a common/equal included angle and the given ratio QR/QS = QT/PR (i.e. QT/QR = QR/QS after using equal sides from the isosceles part) makes the sides about that angle proportional, so triangle PQS ~ triangle TQR by SAS.", "explanation": "SAS similarity: ek angle barabar AUR us angle ko ghere do sides ka ratio barabar. Diya hua ratio aur angle1=angle2 ko milao. Pehle equal angles se equal sides nikaalo, phir ratio set karo. Correspondence sahi rakhna.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "G1-198", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity", "question": "In the given figure, PS/SQ = PT/TR and ∠ PST = ∠ PRQ. Prove that Δ PQR is an isosceles triangle.[FIGURE: triangle PQR with point S on PQ and T on PR, and line ST]", "answer": "Method: PS/SQ = PT/TR => by converse of BPT ST||QR, so angle PST = angle PQR (corresponding). Given angle PST = angle PRQ, hence angle PQR = angle PRQ => triangle PQR is isosceles (PQ = PR).", "explanation": "Ratio barabar -> converse BPT -> ST||QR. Parallel se corresponding angles barabar. Isse do base angles equal nikaal kar isosceles prove karo. Parallel banane ke baad angle-chasing karo.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "G1-206", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove right angle from altitude relation", "question": "In the adjoining figure, ∆CAB is a right triangle, right angled at A and AD ⊥ BC. Prove that ∆ADB ~ ∆CDA. Further, if BC = 10 cm and CD = 2 cm, find the length of AD. [FIGURE: Right triangle ABC with right angle at A, and altitude AD to hypotenuse BC]", "answer": "Method: In right triangle (right angle at A) with AD perp hypotenuse BC, triangle ADB ~ triangle CDA (AA). AD^2 = BD.CD; with BC=10, CD=2 => BD=8 => AD = sqrt(16) = 4 cm.", "explanation": "Right angle se hypotenuse par altitude girane par teeno triangles similar ho jaate hain. AD^2 = BD x DC. BD = BC - CD nikaalo, phir AD = sqrt(BD x DC) = 4 cm. Yeh altitude-on-hypotenuse ka classic result hai.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G1-216", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity", "question": "In the adjoining figure, AD/BD = AE/EC and ∠BDE = ∠CED, prove that ΔABC is an isosceles triangle. [FIGURE: Triangle ABC with a line segment DE parallel to BC]", "answer": "Method: AD/BD = AE/EC => by converse of BPT DE||BC, so angle BDE = angle DBC and angle CED = angle ECB (alternate). Given angle BDE = angle CED => angle DBC = angle ECB => triangle ABC is isosceles (AB=AC).", "explanation": "Ratio barabar -> converse BPT -> DE||BC. Parallel se alternate angles barabar. Diye gaye equal angles ko base angles se jodo -> isosceles. Parallel banana pehla kadam hai.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "G1-217", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity & find length", "question": "In the adjoining figure, AP = 1 cm, BP = 2 cm, AQ = 1.5 cm and AC = 4.5 cm. [FIGURE: Triangle ABC with point P on AB and Q on AC. Line segment PQ is drawn.] Prove that ∆APQ ~ ∆ABC. Hence find the length of PQ, if BC = 3.6 cm.", "answer": "Method: AP/AB = 1/3 and AQ/AC = 1.5/4.5 = 1/3; common angle A => triangle APQ ~ triangle ABC (SAS). Then PQ/BC = 1/3 => PQ = 3.6/3 = 1.2 cm.", "explanation": "Pehle do ratios barabar dikhao (AP/AB = AQ/AC = 1/3) + common angle A -> SAS similarity. Phir SAME ratio se third side PQ = BC/3 = 1.2 cm. Prove karo, fir length nikaalo.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "G1-218", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Area ratio of similar triangles", "question": "The corresponding sides of ∆ABC and ∆PQR are in the ratio 3 : 5. AD⊥BC and PS⊥QR as shown in the following figures :[FIGURE: Two triangles, ABC and PQR. AD is an altitude in ABC, PS is an altitude in PQR.](i) Prove that ∆ADC ~ ∆PSR(ii) If AD = 4 cm, find the length of PS.(iii) Using (ii) find ar (∆ABC) : ar (∆PQR)", "answer": "Method: Sides in ratio 3:5 => triangle ABC ~ triangle PQR; altitudes satisfy triangle ADC ~ triangle PSR so AD/PS = 3/5 => PS = (5/3)*AD = 20/3 cm; ratio of areas = (ratio of sides)^2 = 9:25.", "explanation": "Similar triangles ke areas ka ratio = (sides ke ratio)^2. Yahan 3:5 -> areas 9:25. Altitudes bhi same ratio mein hote hain (AD/PS = 3/5). Square karna mat bhoolna - area ratio mein hamesha square aata hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 3}, {"key": "G1-232", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Pythagoras application", "question": "Assertion (A) : A ladder leaning against a wall, stands at a horizontal distance of 6 m from the wall. If the height of the wall up to which the ladder reaches is 8 m, then the length of the ladder is 10 m. Reason (R): The ladder makes an angle of 60° with the ground.", "answer": "Method: Pythagoras theorem in the right triangle formed by wall, ground and ladder: ladder^2 = height^2 + base^2 = 8^2 + 6^2 = 100 => ladder = 10 m (Assertion TRUE). The Reason that the ladder makes 60 deg is FALSE (it does not), so the correct option is 'A true, R false'.", "explanation": "Right triangle mein Pythagoras: (hypotenuse)^2 = base^2 + height^2. Ladder = sqrt(6^2+8^2) = 10 m. Assertion sahi, par 60 degree waala reason galat hai (angle 60 nahi banta). 6-8-10 ek Pythagorean triplet hai, yaad rakho.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "G2-243", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent length", "question": "A person is standing at P outside a circular ground at a distance of 26 m from the centre of the ground. He found that his distances from the points A and B on the ground are 10 m (PA and PB are tangents to the circle). Find the radius of the circular ground.[FIGURE: Circle with center O. Point P outside the circle. PA and PB are tangents from P to the circle. PA = 10m. PO = 26m. OA is the radius.]", "answer": "Word problem, tangent length via Pythagoras. PA perp OA, so radius OA = sqrt(OP^2 - PA^2) = sqrt(26^2 - 10^2) = sqrt(576) = 24 m.", "explanation": "Ground ke bahar khade hone wala word problem bhi same Pythagoras: radius = sqrt(PO^2 - PA^2) = sqrt(26^2 - 10^2) = 24 m. Diagram banao, radius tangent par 90. Hook: distance^2 - tangent^2 = radius^2.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 3}, {"key": "G2-262", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent-chord angle", "question": "In the given figure, RS is the tangent to the circle at the point L and MN is the diameter. If ∠ NML = 30°, then ∠ RLM is :[FIGURE: Circle with tangent RS at L and diameter MN, angle NML is 30 degrees]", "answer": "angle RLM with diameter MN, tangent RS at L, angle NML=30. angle MLN=90 (angle in semicircle) and tangent-chord gives angle NLR = 30, so angle RLM = 90 + 30 = 120.", "explanation": "Diameter MN matlab angle MLN=90 (semicircle). Tangent-chord se angle RLN = angle NML = 30. angle RLM = 90 + 30 = 120. Hook: semicircle 90 plus tangent-chord angle.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 3}, {"key": "G2-269", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent properties (Assertion-Reason)", "question": "Assertion (A): If two tangents are drawn to a circle from an external point, then they subtend equal angles at the centre of the circle. Reason (R): A parallelogram circumscribing a circle is a rhombus.", "answer": "A: two tangents from an external point subtend equal angles at the centre (true). R: a parallelogram circumscribing a circle is a rhombus (true) but unrelated. Answer: (b).", "explanation": "Dono true par R ka A se lena-dena nahi (alag facts). Isliye (b). Hook: unrelated true statements matlab (b).", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "G2-270", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent properties (Assertion-Reason)", "question": "Assertion (A): Tangents drawn at the end points of a diameter of a circle are always parallel to each other. Reason (R) : The lengths of tangents drawn to a circle from a point outside the circle are always equal.", "answer": "A: tangents at ends of a diameter are parallel (true). R: lengths of tangents from an external point are equal (true) but does not explain A. Answer: (b).", "explanation": "Dono sahi par equal-tangents wali baat parallel-tangents ko explain nahi karti. Isliye (b). Hook: true plus true, link nahi matlab (b).", "years": ["2025"], "papers": 1, "raw": 2, "marks": 1, "types": ["Assertion-Reason"], "score": 3}, {"key": "G2-271", "chapte
