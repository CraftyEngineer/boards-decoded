 R: diameter is the longest chord (true) but does not explain A. Answer: (b).", "explanation": "Dono true par longest-chord wali baat parallel-tangents ko explain nahi karti. Isliye (b). Hook: sach hai par wajah nahi matlab (b).", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 2}, {"key": "G2-277", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Quadrilateral circumscribing circle", "question": "In the given figure, AB, BC, CD and DA are tangents to the circle with centre O forming a quadrilateral ABCD. Show that ∠AOB + ∠COD = 180°. [FIGURE: quadrilateral ABCD circumscribing a circle with center O]", "answer": "Show angle AOB + angle COD = 180 (ABCD circumscribes a circle). Joining O to contact points, congruent triangles bisect the angles at O; the angles around O sum to 360, giving 2(AOB + COD) = 360, so AOB + COD = 180.", "explanation": "Centre se contact points jodo; tangents ki congruence se centre ke around angle banate hain. Opposite vertex wale angle ka sum 180. Hook: opposite sides matlab opposite central angle supplementary.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 2}, {"key": "G2-282", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Inscribed circle in quadrilateral (find length)", "question": "[FIGURE: Quadrilateral ABCD with inscribed circle, center O, radius 8 cm, and points of contact P, Q, R, S] A circle with centre O and radius 8 cm is inscribed in a quadrilateral ABCD in which P, Q, R, S are the points of contact as shown. If AD is perpendicular to DC, BC = 30 cm and BS = 24 cm, then find the length DC.", "answer": "Circle r=8 inscribed in quad ABCD, AD perp DC, BC=30, BS=24, find DC. Equal tangents: BR=BS=24 so CR=6=CQ; at the right-angle corner D, DQ=radius=8. DC = DQ + QC = 8 + 6 = 14 cm.", "explanation": "Equal tangents se BR=BS=24, fir CR=6=CQ. Right-angle wale corner par tangent segment = radius = 8. DC = 8 + 6 = 14 cm. Hook: right angle corner matlab tangent piece = radius.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 2}, {"key": "G2-283", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent properties (proof)", "question": "[FIGURE: Circle with diameter AB, center O, and tangents AQ, BP, PQ] In the given figure, AB is a diameter of the circle with centre O. AQ, BP and PQ are tangents to the circle. Prove that ∠POQ = 90°.", "answer": "Prove angle POQ=90 (AB diameter; AQ, BP, PQ tangents). QA=QR and PB=PR (equal tangents) make triangle AOQ congruent ROQ and triangle BOP congruent ROP, so OQ and OP bisect angle AOR and angle BOR. Since angle AOB=180, half AOR + half BOR = 90, so angle POQ = 90.", "explanation": "Equal tangents se OQ aur OP angle bisector ban-te hain. AB diameter matlab angle AOB=180. Aadhe-aadhe angle milke POQ=90. Hook: bisectors ka aadha-aadha 180 ka = 90.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 2}, {"key": "G2-285", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent-chord angle (proof)", "question": "In the given figure, PQ is tangent to a circle centred at O and ∠BAQ = 30°; show that BP = BQ. [FIGURE: circle with center O, tangent PQ, and chord AB]", "answer": "Show BP=BQ (PQ tangent, angle BAQ=30). OA=OB so triangle isosceles; tangent perp radius and the given angle make the two base angles at B equal (angle BQP=angle BPQ), so triangle BPQ is isosceles and BP=BQ.", "explanation": "Radii barabar se isosceles; tangent ke 90 aur diye angle se B ke do angle barabar, BP=BQ. Hook: barabar base angle matlab barabar sides.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 2}, {"key": "G2-286", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent-chord angle (proof)", "question": "In the given figure, AB and CD are tangents to a circle centred at O. Is ∠BAC = ∠DCA? Justify your answer. [FIGURE: circle with center O and two tangents AB and CD]", "answer": "Justify angle BAC = angle DCA (AB,CD tangents, AC chord). OA=OC so angle OAC=angle OCA. Also angle OAB=angle OCD=90 (radius perp tangent). Subtracting, angle BAC = angle DCA. Yes, equal.", "explanation": "OA=OC se angle OAC = angle OCA; dono jagah radius perp tangent ka 90. 90 me se equal angle ghatao, BAC = DCA. Haan barabar. Hook: equal radii plus equal 90 matlab equal leftover angle.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G2-289", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Triangle circumscribing circle (find sides)", "question": "In the given figure, △ ABC is circumscribing a circle. Find the length of BC, if AR = 4 cm, BR = 3 cm and AC = 11 cm.[FIGURE: Triangle ABC circumscribing a circle. Points of tangency are R on AB, P on BC, Q on AC. AR=4cm, BR=3cm, AC=11cm.]", "answer": "Triangle ABC circumscribes circle, AR=4, BR=3, AC=11, find BC. Equal tangents: AR=AQ=4 so QC=7=PC; BR=BP=3. BC = BP + PC = 3 + 7 = 10 cm.", "explanation": "Equal tangents se AQ=AR=4, QC=7=PC, BP=BR=3. BC = BP + PC = 10 cm. Hook: har vertex se barabar tangents, sides ke tukdo me todo.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G2-293", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Chord and central angle", "question": "In the given figure, a circle centred at origin O has radius 7 cm, OC is median of ΔOAB. Find the length of median OC. [FIGURE: Circle centered at origin O, with points A, B, C. OC is median of triangle OAB.]", "answer": "Circle r=7, OC median of triangle OAB with angle AOB=90. AB = sqrt(49+49) = 7sqrt2; C midpoint so AC = 7sqrt2/2; OC = median to hypotenuse = half AB = 7sqrt2/2 cm.", "explanation": "angle AOB=90 matlab AB = radius x sqrt2 = 7sqrt2. Median to hypotenuse = aadhi hypotenuse, OC = 7sqrt2/2 cm. Hook: right triangle me median to hypotenuse = aadhi hypotenuse.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G2-294", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Chord and central angle", "question": "A chord of a circle of radius 10 cm subtends a right angle at its centre. The length of the chord (in cm) is :[FIGURE: Circle with a chord subtending a right angle at the center, radius 10 cm shown]", "answer": "Chord subtends a right angle at the centre, r=10. The two radii and chord form an isosceles right triangle, so chord = r sqrt2 = 10sqrt2 cm.", "explanation": "Chord agar centre par 90 banaye to chord = radius x sqrt2 (do radii ka right triangle). Yahan 10sqrt2 cm. Hook: central angle 90 matlab chord = r sqrt2.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "G2-296", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Chord and central angle", "question": "In the given figure, O is the centre of the circle. If ∠ AOB = 145°, then find the value of x. [FIGURE: Circle with center O, points A, B, C on circumference. Angle AOB is 145 degrees. Angle ACB is x.]", "answer": "Given angle AOB=145, find x = angle ACB. Inscribed angle = half the central angle = 72.5, then by the straight-line / cyclic property x = 180 - 72.5 = 107.5.", "explanation": "Central angle ka aadha = circumference par angle (72.5), fir cyclic/straight-line se x = 180 - 72.5 = 107.5. Hook: centre ka aadha, fir 180 me se ghata-jod.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "G2-301", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Two circles (common chord/tangent)", "question": "In the given figure, QR is a common tangent to the two given circles touching externally at A. The tangent at A meets QR at P. If AP = 4.2 cm, then the length of QR is : [FIGURE: Two circles touching externally at A, with common tangent QR. Another tangent at A meets QR at P.]", "answer": "Two circles touch externally at A; common tangent QR, tangent at A meets QR at P. Equal tangents from P give PQ=PA and PR=PA, so QR = 2 PA = 2(4.2) = 8.4 cm.", "explanation": "Touching point se common tangent QR ko cut karne wale P se dono tangents barabar: PQ=PR=PA. QR = 2 x 4.2 = 8.4 cm. Hook: P se teen tangents barabar, QR = 2 x AP.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "G2-302", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Two circles (number of tangents)", "question": "Maximum number of common tangents that can be drawn to two circles intersecting at two distinct points is :", "answer": "Maximum number of common tangents to two circles intersecting at two distinct points = 2 (two direct common tangents only).", "explanation": "Do circles jo do points pe cut karein unke sirf 2 common tangents hote hain. (Touching = 3, separate = 4, intersecting = 2.) Hook: intersecting = 2 tangents.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "G2-317", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Inscribed circle (case-based)", "question": "Find the length of AR in terms of x.", "answer": "Case-based incircle: AR=x (tangent from A). BQOR is a square (two radii perp two tangents at the right-angle corner B). PC = 8+x (equal tangents). Apply Pythagoras in right triangle ABC: AC^2 = (8+2x)^2 = 49+225 = 274, so x = (-8 + sqrt274)/2 ~ 4.28; radius r = 7 - x ~ 2.72 m.", "explanation": "Case-study: equal tangents se AR=x, PC=8+x; right-angle corner par BQOR square (side = radius). Phir Pythagoras se AC equation, x aur r nikalo. Hook: equal tangents plus right-angle corner square plus Pythagoras.", "years": ["2024"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "G2-318", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Chord and central angle", "question": "(i) find the length of the chord AB.", "answer": "Find the length of chord AB (figure-based). Drop a perpendicular from the centre to AB (it bisects the chord) and apply Pythagoras: half-chord = sqrt(r^2 - d^2), AB = 2 x half-chord, using the figure's radius and distance.", "explanation": "Chord ki length: centre se perpendicular giraao (chord ko aadha karta hai), fir sqrt(radius^2 - distance^2) x2. Hook: centre perp chord matlab chord aadha matlab Pythagoras.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 2, "types": ["LA"], "score": 2}, {"key": "M1-331", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Clock hands", "question": "The minute hand of a clock is 14 cm long. Find the area on the face of the clock described by the minute hand in 5 minutes.", "answer": "Method: Minute hand sweeps 6°/min → in 5 min = 30°. Area swept = (θ/360)πr² = (30/360)(22/7)(14²) = 154/3 ≈ 51.33 cm². (These rows also pair with an OR arc-length part = 44 cm.)", "explanation": "Minute hand area = jitna ghoomi utna sector ka area. Pehle angle nikaalo: 6° per minute × minutes. 5 min → 30°. Phir (θ/360)πr². r = hand ki lambai. Yaad: minute hand 1 ghante (60 min) me poora 360° — to 5 min me 30°.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "M1-340", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Circumference & radius", "question": "Assertion (A): If the circumference of a circle is 176 cm, then its radius is 28 cm. Reason (R): Circumference = 2π × radius of a circle.", "answer": "Method: Circumference = 2πr → r = C/(2π) = 176/(2×22/7) = 176×7/44 = 28 cm. Both A and R true and R correctly explains A → option (A).", "explanation": "Seedha formula: C = 2πr, to r = C/(2π). 176 ÷ (44/7) = 28 cm. Assertion-Reason me yeh true hai aur Reason (C=2πr) hi iska sahi karan hai. Yaad: circumference ka rishta radius se 2π ka hai, area se nahi.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 2}, {"key": "M1-346", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Grazing area (quarter circle)", "question": "Four horses are tied at the four corners of a square grass field. Find the area of the total field in which these horses can graze, the area grazed by one horse if the rope is increased from 7 m to 10 m, and the ungrazed area. (square field, side 20 m)", "answer": "Method: Square area = side² = 20² = 400 m². Each corner horse grazes a quarter circle; 4 horses (r=7) → 4×(1/4)π(7²) = 154 m². Ungrazed = 400 − 154 = 246 m². If r increased to 10 m, one horse grazes (1/4)π(10²) = 78.5 m². (Some sub-parts here have blank/mismatched official answers; values from the method.)", "explanation": "Case study: pehle square ka area = side². Har corner pe quarter circle (1/4)πr². 4 horses → 4 quarter = ek poora circle πr² (r=7 → 154 m²). Ungrazed = square − grazed. Rope 10 ho to ek horse ka (1/4)π(10²)=78.5. Tip: 4 quarter milke 1 full circle.", "years": ["2024"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "M1-351", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Combined figures", "question": "The area of the square inscribed in a circle of radius 5√2 cm is :", "answer": "Method: For a square inscribed in a circle, diagonal = diameter = 2r. Side = diagonal/√2 = 2r/√2 = r√2. Area = (r√2)² = 2r². r=5√2 → 2(50) = 100 cm². Option (B).", "explanation": "Square circle me inscribed → square ka diagonal = circle ka diameter (2r). Side = diagonal/√2. Area = side² = 2r². Shortcut yaad rakho: inscribed square ka area = 2r². r=5√2 → 2×50 = 100 cm².", "years": ["2024"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "M1-358", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Segment area", "question": "An arc of a circle of radius 21 cm subtends an angle of 60° at the centre. Find : (i) the length of the arc. (ii) the area of the minor segment of the circle made by the corresponding chord.", "answer": "Method: (i) arc = (60/360)2π(21) = 22 cm. (ii) Minor segment = sector − triangle = (60/360)π(21²) − (√3/4)(21²) = (231 − 441√3/4) ≈ 40.05 cm².", "explanation": "Pehle arc = (θ/360)2πr. Phir minor segment = sector − triangle; 60° pe triangle equilateral (√3/4)r². r=21 → arc 22 cm, segment ≈ 40.05 cm². Yaad: segment maange to hamesha 'sector − triangle'.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "M1-359", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Arc length", "question": "If an arc subtends an angle of 90° at the centre of a circle, then the ratio of its length to the circumference of the circle is :", "answer": "Method: Arc length = (θ/360)×circumference, so arc:circumference = θ:360 = 90:360 = 1:4. Option (B).", "explanation": "Arc poori circumference ka (θ/360) hissa hota hai. To arc:circumference = θ:360. 90° → 90:360 = 1:4. Bas angle ko 360 se ratio me likho aur simplify karo — radius ki zaroorat hi nahi.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "M1-360", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Sector area", "question": "A sector is cut from a circle of radius 21 cm. The central angle of the sector is 150°. Find the length of the arc of this sector and the area of the sector.", "answer": "Method: Arc = (150/360)2π(21) = 55 cm. Area = (150/360)π(21²) = 577.5 cm².", "explanation": "Wahi jodi: arc = (θ/360)2πr, area = (θ/360)πr². 150° aur r=21 → arc 55 cm, area 577.5 cm². Memory hook: θ/360 ek baar nikaal ke dono me laga do.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 2}, {"key": "M1-368", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Circle area", "question": "A circus tent is cylindrical up to a height of 8 m and conical above it. The diameter of the base is 28 m. Determine the floor area of the tent.", "answer": "Method: Floor is a circle of radius = 28/2 = 14 m. Floor area = πr² = (22/7)(14²) = 616 m².", "explanation": "Floor circle hai, to area = πr². Diameter 28 → r = 14. (22/7)(196) = 616 m². Tip: 'floor/base area' ka matlab seedha circle ka area πr²; diameter diya ho to pehle aadha karo.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "M2-387", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Volume of a hollow solid (find dimensions)", "question": "The difference between the outer and inner radii of a hollow right circular cylinder of length 14 cm is 1 cm. If the volume of the metal used in making the cylinder is 176 cm³, find the outer and inner radii of the cylinder.", "answer": "Method: volume of metal = π(R²−r²)h. With R−r=1, h=14, vol=176 → π(R²−r²)(14)=176 → R²−r²=4 → (R−r)(R+r)=4 → R+r=4. Solve R=2.5, r=1.5 cm.", "explanation": "Hollow cylinder ka metal volume = π(R²−r²)h (bahar ka cylinder minus andar ka). R²−r² ko (R−r)(R+r) likho — difference diya hota hai, to doosra factor nikal jaata hai. Phir do simple equations solve.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 2}, {"key": "M2-388", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (hollow vessel)", "question": "A vessel is in the form of a hollow hemisphere mounted by a hollow cylinder. The diameter of the hemisphere is 14 cm and the total height of the vessel is 13 cm. Find the inner surface area and the volume of the vessel.", "answer": "Method: inner SA = CSA cylinder + CSA hemisphere = 2πrh + 2πr²; volume = πr²h + (2/3)πr³. r=7, h=13−7=6 → SA=572 cm², vol=4928/3≈1642.67 cm³. (id 930: hollow cylinder on hollow hemisphere, TSA inner+outer+ring ≈ 795.14 cm².)", "explanation": "Hollow vessel ka inner surface = cylinder ki CSA (2πrh) + hemisphere ki CSA (2πr²). Volume bhi dono jodo. Cylinder ki height = total height − radius (kyunki hemisphere neeche jagah leta hai). Hollow me andar-bahar dono surface aa sakte hain — question padho.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA", "SA"], "score": 2}, {"key": "M2-390", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Slant height / dimension of a cone", "question": "A circus tent is cylindrical upto a height of 8 m and conical above it. The diameter of the base is 28 m and total height of tent is 18.5 m. Find slant height of the conical part.", "answer": "Method: cone height = total − cylinder height = 18.5−8 = 10.5 m; radius = 14 m; slant l = √(h²+r²) = √(10.5²+14²) = 17.5 m.", "explanation": "Slant height nikaalne ke liye pehle cone ki height (= total − cylinder height) aur radius chahiye, phir l=√(h²+r²). Tent problems me yeh first step hota hai. 10.5-14-17.5 bhi ek triplet (3.5×(3-4-5)).", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "M2-391", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of a single solid (circle/base)", "question": "Determine the floor area of the tent.", "answer": "Method: floor is a circle, area = πr². r=14 → (22/7)(196) = 616 m².", "explanation": "Floor ek circle hai, area = πr². Diameter se radius nikaalo. Bas (22/7)×r². Simple step jo case-based me 1 mark deta hai.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "M2-393", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Volume of combination (mass from density)", "question": "A solid iron pole consists of a solid cylinder of height 200 cm and base diameter 28 cm, which is surmounted by another cylinder of height 50 cm and radius 7 cm. Find the mass of the pole, given that 1 cm³ of iron has approximately 8 g mass.", "answer": "Method: total volume = πR²H + πr²h = π(14²)(200)+π(7²)(50) = 130900 cm³. Mass = volume×density = 130900×8 = 1047200 g = 1047.2 kg.", "explanation": "Do cylinder ka volume jodo (πr²h har ek ka), phir mass = volume × density (yahan ×8 g/cm³). Answer ko kg me convert karna na bhoolo (÷1000). Density wale me 'kitna bhaari' = volume × per-unit mass.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 2}, {"key": "M2-394", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area of combination (capsule: cylinder + 2 hemispheres)", "question": "A medicine capsule is in the shape of a cylinder with two hemispheres stuck to each of its ends. The length of the entire capsule is 14 mm and the diameter of the capsule is 4 mm, find its surface area. Also, find its volume. [FIGURE: capsule, total length 14 mm and diameter 4 mm]", "answer": "Method: r=2, cylinder length = 14−2(2)=10. SA = 2πrh + 2(2πr²) = CSA cyl + 2 hemispheres = 176 mm². Volume = πr²h + 2(2/3)πr³ = 3344/21 ≈ 159.24 mm³.", "explanation": "Capsule = cylinder + dono taraf hemisphere. Cylinder length = total length − 2×radius. SA = 2πrh + 2×(2πr²); volume = πr²h + 2×(2/3)πr³. Dono hemisphere milke ek poora sphere ban jaate hain — shortcut: 4πr² aur (4/3)πr³.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 2}, {"key": "M2-395", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Capacity / volume of a single solid (cuboid)", "question": "Find the volume of the cuboidal carton.", "answer": "Method: volume of cuboid = l×b×h = 30×32×15 = 14400 cm³.", "explanation": "Cuboid ka volume = lambai × chaudai × unchai (l×b×h). Bas teeno multiply. Carton/box ka volume hamesha yahi. Units cube me (cm³).", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "M2-396", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Surface area & packing of cuboids", "question": "Find the total surface area of a milk packet.", "answer": "Method: TSA of cuboid = 2(lb+bh+hl) = 2(15·8+8·5+5·15) = 470 cm². Number of packets = volume of carton ÷ volume of packet = (30·32·15)/(15·8·5) = 24.", "explanation": "Milk packet ek chhota cuboid — TSA = 2(lb+bh+hl). Kitne packet aayenge = bade carton ka volume ÷ ek packet ka volume. Packing me hamesha volume÷volume karo, surface area se nahi.", "years": ["2024"], "papers": 1, "raw": 6, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "M2-397", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Capacity / volume of a single solid", "question": "How much milk can the cup (as shown in the figure) hold ?", "answer": "Method: capacity of cylindrical cup = πr²h. r=5, h=7 → (22/7)(25)(7) = 550 cm³ = 550 ml.", "explanation": "Cup cylinder hai to capacity = πr²h. cm³ = ml hota hai. Radius (diameter ka aadha) aur height daalo, (22/7) se multiply. Yeh 'kitna bharega' wala simple volume hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "M2-398", "chapter_code": "M2", "chapter_name": "Surface Areas and Volumes", "unit": "Mensuration", "topic": "Volume of combination (vessel with hemispherical cavity)", "question": "A juice seller was serving his customers using glasses... inner diameter of the cylindrical glass was 5.6 cm, but the bottom had a hemispherical raised portion which reduced the capacity. If the height of the glass was 10 cm, find the apparent and actual capacity. [FIGURE: cylindrical glass with hemispherical raised portion at the bottom]", "answer": "Method: apparent capacity = πr²h (full cylinder); actual = πr²h − (2/3)πr³ (subtract the raised hemisphere). r=2.8, h=10 → apparent ≈ 246.4 cm³, actual ≈ 200.5 cm³.", "explanation": "Glass me niche ka hemisphere jagah ghera leta hai, isliye actual capacity = cylinder ka volume − hemisphere ka volume. Apparent = poora cylinder πr²h. 'Raised portion' matlab GHATAO. Subtract karna na bhoolo.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 2}, {"key": "N1-438", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Irrationality of combinations", "question": "Prove that (√2 + √3)² is an irrational number, given that √6 is an irrational number.", "answer": "Method: expand/simplify first, then apply contradiction on the leftover surd. (√2+√3)² = 5 + 2√6; assume rational ⇒ √6 rational, contradiction. Hence irrational.", "explanation": "Pehle expand karo: (√2+√3)² = 5 + 2√6 (formula (a+b)² = a²+2ab+b²). Ab jo surd bacha (√6) usi pe contradiction lagao. Memory hook: 'pehle khol do, fir bachi √ pe contradiction'. 2ab term hi irrational banata hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 2}, {"key": "N1-462", "chapter_code": "N1", "chapter_name": "Real Numbers", "unit": "Number Systems", "topic": "Prime factorisation – exponents", "question": "[Case-based] A number 173250 is formed. (i) What is the least prime number used by students? (ii) How many students are in the class? (iii) What is the highest prime number used? (iv) Which prime number has been used maximum times?", "answer": "Method: prime-factorise 173250 = 2·3²·5³·7·11. Least prime = 2; highest prime = 11; prime used most times = 5 (power 3); number of distinct primes = 5; sum of exponents = 1+2+3+1+1 = 8 (per the figure's interpretation, count as required).", "explanation": "Case-based me poora number prime-factorise karo: 173250 = 2·3²·5³·7·11. Fir har sub-question seedha padho — sabse chhota prime (2), sabse bada (11), jo sabse zyada baar aaya (5, power 3). Memory hook: 'ek hi factorisation, saare answers usi me'. Exponents dhyan se ginna.", "years": ["2024"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "S1-466", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Empirical relation", "question": "The empirical relation between the mode, median and mean of a distribution is :", "answer": "Method: state the standard empirical relationship: Mode = 3 Median - 2 Mean, i.e. 3 Median = Mode + 2 Mean. Representative answer: Mode = 3 Median - 2 Mean.", "explanation": "Sirf relation likhna hai: Mode = 3 Median - 2 Mean (ya 3 Median = Mode + 2 Mean). Hook: 'teen median = mode + do mean'. Har saal aata hai, ratta pakka.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "S1-477", "chapter_code": "S1", "chapter_name": "Statistics", "unit": "Statistics & Probability", "topic": "Concept of central tendency", "question": "Observe the pie chart and answer ... Which is most favourite mode of transport and how many people used it ?  [FIGURE: pie chart of transport modes]", "answer": "Method: pie-chart count = (sector angle/360)*total; largest sector is most favourite. Car = 177 deg of 120 -> (177/360)*120 = 59. Representative answer: Car, 59 people.", "explanation": "Pie chart: sector ke log = (angle/360)*total. Sabse bada angle = sabse popular. Car 177 deg -> 59. Hook: 'angle ka hissa, total se guna'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "S2-492", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Complement / theory", "question": "Assertion (A) : In a cricket match, a batsman hits a boundary 9 times out of 45 balls he plays. The probability that in a given ball, he does not hit the boundary is 4/5. Reason (R) : P(E) + P(not E) = 1", "answer": "P(boundary)=9/45=1/5 ⇒ P(not boundary)=1−1/5=4/5 (Assertion TRUE) via P(E)+P(not E)=1 (Reason TRUE, explains it). Answer: (A).", "explanation": "Pehle P(boundary)=9/45=1/5. Phir complement: P(boundary nahi)=1−1/5=4/5. Reason wahi complement formula hai jo Assertion sahi karta hai. Dono true, Reason correct explanation.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 2}, {"key": "S2-497", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Single die", "question": "The probability of throwing a number greater than 2 with a fair die is :", "answer": "Numbers >2 are {3,4,5,6}=4 ⇒ 4/6 = 2/3.", "explanation": "Die ke 6 faces. '2 se bada' = 3,4,5,6 (4 numbers) ⇒ 4/6 = 2/3. Pehle favourable list karo, phir 6 se divide.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "S2-518", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Numbered tickets - number property", "question": "A box contains 90 discs which are numbered 1 to 90. If one disc is drawn at random from the box, find the probability that it bears a : (i) 2-digit number less than 40. (ii) number divisible by 5 and greater than 50. (iii) a perfect square number.", "answer": "Total = 90. (i) 2-digit <40 (10–39)=30 ⇒1/3. (ii) divisible by 5 & >50 {55,60,...,90}=8 ⇒4/45. (iii) perfect squares 1–90 {1,4,...,81}=9 ⇒1/10.", "explanation": "90 discs ⇒ total 90. (i) 2-digit aur <40 = 10 se 39 = 30 ⇒ 1/3. (ii) 5 ke multiple aur >50 = 55,60...90 = 8 ⇒ 4/45. (iii) perfect squares 1–81 = 9 ⇒ 1/10. Har condition ke favourable alag se gino.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 2}, {"key": "S2-519", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Letters of a word", "question": "From the letters of the word “MOBILE\", a letter is selected at random. The probability that the selected letter is a vowel, is :", "answer": "MOBILE has 6 letters; vowels O,I,E = 3 ⇒ 3/6 = 1/2.", "explanation": "MOBILE mein 6 letters (M,O,B,I,L,E). Vowels = O,I,E = 3. P = 3/6 = 1/2. Total letters gino, phir vowels gino — repeated letters ho toh dhyaan, yahan koi nahi.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 2}, {"key": "S2-530", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Defective / acceptance items", "question": "A carton consists of 60 shirts of which 48 are good, 8 have major defects and 4 have minor defects. One shirt is drawn at random. Find the probability that it is acceptable to Anmol (who rejects only major-defect shirts).", "answer": "Acceptable to Anmol = not major-defect = 60−8 = 52 ⇒ 52/60 = 13/15.", "explanation": "Pehle 'acceptable' ki ginti karo: Anmol sirf major-defect reject karta hai, toh good + minor = 60 − 8 = 52 acceptable ⇒ 52/60 = 13/15. Condition dhyaan se padho — kaunse items chalenge.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 2, "types": ["VSA"], "score": 2}, {"key": "S2-532", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Pie chart / context", "question": "In a survey on holidays, 120 people stated their transport, shown in a pie chart [FIGURE: pie chart — Train, Bus (36°), Car (177°), Aeroplane, Ship (33°)]. (i) Find P(bus or ship). (iii) Given P(not train)=4/5, find number who used train / given P(aeroplane)=7/60 find air revenue at ₹5000/person.", "answer": "Pie-chart probability = angle/360. Bus or ship = (36+33)/360 = 69/360 = 23/120. P(train)=1−4/5=1/5 ⇒ people = 1/5×120 = 24. Aeroplane: (7/60)×120 = 14 ⇒ revenue = 14×5000 = ₹70,000.", "explanation": "Pie chart mein P = (sector angle)/360. Bus+Ship = (36+33)/360 = 23/120. 'Not train = 4/5' ⇒ P(train)=1/5 ⇒ log = 1/5×120 = 24. Count chahiye toh P × total people karo. Angle aur complement dono use hote hain.", "years": ["2024"], "papers": 1, "raw": 9, "marks": 2, "types": ["Case-based"], "score": 2}, {"key": "S2-534", "chapter_code": "S2", "chapter_name": "Probability", "unit": "Statistics & Probability", "topic": "Numbered tickets - number property", "question": "Numbers 1 to 75 are called. When the first ball was picked, what was the probability of calling out an even number ?", "answer": "Total = 75. Even numbers 1–75 = 37 ⇒ 37/75.", "explanation": "1 se 75 ⇒ total 75. Even numbers = 37 (2,4,...,74) ⇒ 37/75. Even count = floor(75/2) = 37. Range fix karke even gino.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 2}, {"key": "A1-23", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Identify graph of a polynomial", "question": "Which of the following types of graph represents p(t) ? [FIGURE: four graphs of height vs time; parabolas opening up/down with zeroes at 0 and 5/4]", "answer": "Method: match the sign of the leading coefficient (a<0 ⇒ opens downward, a>0 ⇒ upward) and the zeroes (x-intercepts). For h = 20t-16t² (a=-16<0), the graph opens DOWNWARD with zeroes at 0 and 5/4.", "explanation": "Graph pehchaano: leading coefficient negative ho to parabola NEECHE khulta hai (∩), positive ho to upar (∪). Saath me zeroes (x-intercepts) match karo. Height-time wale me a negative hota hai, isliye downward — yahi sabse common option hota hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "A1-27", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Find parameter from given zeroes", "question": "If the zeroes of the quadratic polynomial x² + (a + 1) x + b are 2 and −3, then", "answer": "Method: if the zeroes are given, use sum of zeroes = -b/a and product = c/a to set up equations and solve for the unknown coefficient(s); or substitute a known zero into p(x)=0. Representative x²+(a+1)x+b with zeroes 2,-3: sum -1 = -(a+1) ⇒ a=0; product -6 = b ⇒ b=-6.", "explanation": "Zeroes diye hain to unka sum (= -b/a) aur product (= c/a) bana ke unknown nikaalo. Ek hi zero diya ho to seedha p(zero)=0 me daal do. Do equations, do unknowns — substitute karke solve. Coefficient ke saath +1 jaise terms dhyaan se kholna!", "years": ["2023"], "papers": 1, "raw": 4, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "A1-28", "chapter_code": "A1", "chapter_name": "Polynomials", "unit": "Algebra", "topic": "Form polynomial: transformed zeroes", "question": "If α and β are roots of the quadratic equation x² – 7x + 10 = 0, find the quadratic equation whose roots are α² and β².", "answer": "Method: from the given equation get α+β and αβ; compute the NEW sum (α²+β² = (α+β)²-2αβ) and NEW product (α²β² = (αβ)²); then write x² − (new sum)x + (new product). Representative x²-7x+10 (α+β=7, αβ=10): α²+β²=29, α²β²=100, so x² − 29x + 100 = 0.", "explanation": "Naye roots (α², β²) ke liye: pehle α+β aur αβ nikaalo. Naya sum = (α+β)²−2αβ, naya product = (αβ)². Phir x²−(sum)x+(product). Yeh bhi 'transformed zeroes' hi hai — bas square wali transformation. Identity yaad rakhna key hai!", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "A2-50", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "A fraction becomes 1/3 when 1 is subtracted from the numerator. It becomes 1/4 when 8 is added to the denominator. Find the fraction.", "answer": "Method: let the fraction be x/y; convert each condition into an equation by cross-multiplying. (x–1)/y = 1/3 ⇒ 3x–3=y; x/(y+8)=1/4 ⇒ 4x=y+8. Solve ⇒ x=5, y=12 ⇒ fraction 5/12.", "explanation": "Fraction problems mein numerator = x, denominator = y maano (fraction = x/y). Har condition ko cross-multiply karke linear equation banao (jaise (x–1)/y = 1/3 ⇒ 3(x–1)=y). Do equations solve karke x, y nikaalo. Tip: '1/3 ban jaata hai' wala part hamesha cross-multiplication maangta hai — seedha = mat lagao.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "A2-53", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Word problems", "question": "Two people are 16 km apart on a straight road. They start walking at the same time. If they walk towards each other with different speeds, they will meet in 2 hours. Had they walked in the same direction with same speeds as before, they would have met in 8 hours. Find their walking speeds.", "answer": "Method: let speeds be x and y. Towards each other ⇒ relative speed (x+y); same direction ⇒ (x–y); use distance = speed × time. 2(x+y)=16 and 8(x–y)=16 ⇒ x+y=8, x–y=2 ⇒ x=5, y=3 km/hr.", "explanation": "Speed wale meeting problems: dono ki speed x aur y lo. Aamne-saamne aa rahe ho to speeds JUDTI hain (x+y), ek hi direction mein ho to GHATTI hain (x–y). Distance = speed × time lagao. Yahan 2(x+y)=16 aur 8(x–y)=16. Memory hook: 'opposite = add, same = subtract'. Phir simple solve.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "A2-64", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Case-based application", "question": "Represent the following information algebraically (in terms of x and y). [Prize money: 5 hockey + 4 cricket players got ₹9500; 4 hockey + 3 cricket got ₹7370] (i) form the equations (ii) find the prize for hockey (iii) total for 2 students of each game.", "answer": "Method: let x = prize per hockey player, y = per cricket player. Form 5x+4y=9500 and 4x+3y=7370; solve by elimination ⇒ x=₹980, y=₹1150. Sub-parts: cricket is ₹170 more; total for 2 of each = 2(x+y)=₹4260.", "explanation": "Case-based prize problem: x = hockey ka prize, y = cricket ka. 'Itne hockey + itne cricket = total' se do equations banao (5x+4y=9500, 4x+3y=7370). Elimination se x, y nikaalo. Aage ke chhote parts (kaunsa zyada, 2-2 ka total) bas in values ko use karte hain. Ek baar solve, phir saare sub-parts aasaan.", "years": ["2023"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "A2-65", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Case-based application", "question": "Represent the information given above in terms of x and y. [Monthly fees: batch with 20 poor + 5 other children collected ₹9000; 5 poor + 25 other collected ₹26000] (i) form equations (ii) fee paid by a poor child / difference (iii) total collection for 10 poor + 20 rich.", "answer": "Method: let x = fee of a poor child, y = fee of another child. Form 20x+5y=9000 and 5x+25y=26000; solve ⇒ x=₹200, y=₹1000. Difference = ₹800; total for 10 poor + 20 rich = 10(200)+20(1000)=₹22000.", "explanation": "Case-based fees problem: x = poor child ki fee, y = doosre ki. Do batches ki info se do equations (20x+5y=9000, 5x+25y=26000). Elimination se x=200, y=1000. Baaki parts (difference, total collection) bas in values ko daal ke nikaalo. Tip: ek baar system theek se solve kar lo, saare sub-questions easy.", "years": ["2023"], "papers": 1, "raw": 12, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "A2-68", "chapter_code": "A2", "chapter_name": "Pair of Linear Equations in Two Variables", "unit": "Algebra", "topic": "Case-based application", "question": "3 chairs and 1 table cost ₹ 900; whereas 5 chairs and 3 tables cost ₹ 2,100. If the cost of 1 chair is x and the cost of 1 table is y, then the situation can be represented algebraically as", "answer": "Method: just translate each buying-statement into a linear equation (count×price). '3 chairs + 1 table = ₹900' ⇒ 3x+y=900; '5 chairs + 3 tables = ₹2100' ⇒ 5x+3y=2100. (Answer: 3x+y=900, 5x+3y=2100.)", "explanation": "Yeh sirf equation banane wala sawaal hai (solve nahi karna). x = chair ka daam, y = table ka. Har line ko seedha equation mein badlo: '3 chairs aur 1 table ₹900' = 3x+y=900. Order galat mat karo (chair pehle, table baad). MCQ mein options dhyaan se padho — coefficients match karo.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "A3-79", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Relation between roots and coefficients", "question": "Which of the following quadratic equations has sum of its roots as 4?", "answer": "Use sum of roots = −b/a for each option and pick the one equal to the required value. For −x²+4x+4=0: −b/a=−4/−1=4. Answer: −x²+4x+4=0.", "explanation": "Har option ka sum = −b/a nikaal ke check karo kaunsa diya hua value (4) match karta hai. Sign ka dhyaan: agar a negative hai to −b/a ka calculation careful karo. Shortcut: sum maango to sirf b/a dekho, poora solve mat karo.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "A3-82", "chapter_code": "A3", "chapter_name": "Quadratic Equations", "unit": "Algebra", "topic": "Form a quadratic from given roots", "question": "If α and β are roots of the quadratic equation x² – 7x + 10 = 0, find the quadratic equation whose roots are α² and β².", "answer": "Find α+β and αβ from the given equation, then compute the new sum and product. x²−7x+10=0: α+β=7, αβ=10 ⇒ α²+β²=(α+β)²−2αβ=29, α²β²=100 ⇒ new equation x²−29x+100=0.", "explanation": "Naye roots ka equation banane ke liye pehle purane equation se α+β aur αβ nikaalo. Phir naya sum aur product in identities se: α²+β²=(α+β)²−2αβ. Bas x²−(naya sum)x+(naya product)=0 likh do. Identity yaad rakhna ye game-changer hai.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "A4-96", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find unknown / property using 2b=a+c", "question": "If a, b, c form an A.P. with common difference d, then the value of a - 2b - c is equal to", "answer": "Method: write b=a+d, c=a+2d. Then a-2b-c = a-2(a+d)-(a+2d) = -2a-4d. Answer: -2a-4d.", "explanation": "AP property yaad rakho: agla term = pichla + d. To b=a+d, c=a+2d likho aur expression mein daal do. Bas substitute karke simplify karna hai. Hook: 'a, a+d, a+2d' — har term ko a aur d mein likho, kaam aasaan.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "A4-98", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Word problems", "question": "250 logs are stacked in the following manner : 22 logs in the bottom row, 21 in the next row, 20 in the row next to it and so on. In how many rows, are the 250 logs placed and how many logs are there in the top row ? [FIGURE: stack of logs in decreasing rows]", "answer": "Method: a=22, d=-1, S_n=250. Solve n/2[2(22)+(n-1)(-1)]=250 -> n^2-45n+500=0 -> (n-20)(n-25)=0. Take n=20 (n=25 gives negative logs). Top row a_20=22+19(-1)=3.", "explanation": "Logs/rows wale problem ko AP samjho: bottom row pehla term, har row mein -1. S_n=250 rakhke quadratic banao. Hook: do answer aayein to physically valid wala lo (rows mein negative logs nahi ho sakte!). Formula S_n=n/2[2a+(n-1)d].", "years": ["2023"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 1}, {"key": "A4-101", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Word problems", "question": "Prerna saves ₹ 32 during the first month, ₹ 36 in the second month and ₹ 40 in the third month. If she continues to save in this manner, in how many months will she save ₹ 2,000?", "answer": "Method: a=32, d=4, S_n=2000. Solve n/2[2(32)+(n-1)4]=2000 -> 2n^2+30n-2000=0 -> n^2+15n-1000=0 -> (n-25)(n+40)=0 -> n=25 months.", "explanation": "Bachat (savings) bhi AP hai: pehle mahine ka amount = a, har mahine ka extra = d. Total saving = S_n, isse n nikaalo. Hook: months/quantity hamesha positive integer hota hai — negative root chhod do. Formula S_n=n/2[2a+(n-1)d].", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "A4-103", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Assertion-Reason", "question": "Assertion (A) : a, b, c are in A.P. if and only if 2b = a + c. Reason (R) : The sum of first n odd natural numbers is n².", "answer": "Both statements are true (2b=a+c is the AP condition; 1+3+5+...+(2n-1)=n^2), but R does not explain A. Answer: (b) both true, R is not the correct explanation of A.", "explanation": "Dono statements alag-alag sahi hain: 2b=a+c AP ki pehchaan hai, aur pehle n odd numbers ka sum n^2 hota hai. Par Reason, Assertion ko explain nahi karta — isliye option (b). Hook: 'dono sach par jodne waala rishta nahi'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 1}, {"key": "A4-104", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find n given last term", "question": "How many terms are there in an A.P. whose first and fifth terms are – 14 and 2, respectively and the last term is 62.", "answer": "Method: from a=-14, a5=a+4d=2 get d=4. Then last term a_n=a+(n-1)d=62 -> -14+(n-1)4=62 -> n=20.", "explanation": "Pehle do shartों se 'd' nikaalo (a aur a5 se), phir last term ko a+(n-1)d=l rakhke n nikaalo. Hook: jab last term diya ho to 'n nikaalna' = a_n=l solve karna. Formula a_n=a+(n-1)d.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 1}, {"key": "A4-105", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "First negative term", "question": "Which term of the A.P. : 65, 61, 57, 53, ............ is the first negative term ?", "answer": "Method: solve a+(n-1)d < 0 for n. e.g. 65+(n-1)(-4)<0 -> n>17.25 -> first negative term is the 18th.", "explanation": "First negative term ke liye inequality lagao: a_n<0 yani a+(n-1)d<0, n solve karo. Jo decimal aaye usse agla integer lo (17.25 -> 18th). Hook: '<0 solve karo, phir round UP karo'. d negative hai isliye terms ghat rahe hain.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 3, "types": ["SA"], "score": 1}, {"key": "A4-106", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find term using Sn", "question": "The sum of first 15 terms of an A.P. is 750 and its first term is 15. Find its 20th term.", "answer": "Method: use S_15=15/2[2(15)+14d]=750 to get d=5, then a_20=a+19d=15+19(5)=110.", "explanation": "Sn aur a diya ho to pehle S_n formula se 'd' nikaalo, phir maangi hui term a_n=a+(n-1)d se. Do-step kaam. Hook: 'Sn se d, phir a_n'. Formula S_n=n/2[2a+(n-1)d].", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "A4-111", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Proof / general term", "question": "If pth term of an A.P. is q and qth term is p, then prove that its nth term is (p + q – n).", "answer": "Method: a+(p-1)d=q and a+(q-1)d=p. Subtract -> (p-q)d=q-p -> d=-1. Substitute -> a=p+q-1. Then a_n=a+(n-1)d=(p+q-1)+(n-1)(-1)=p+q-n. Proved.", "explanation": "Do shartें likho a+(p-1)d=q aur a+(q-1)d=p, ghatao to d=-1 milega, phir a=p+q-1. Ab a_n=a+(n-1)d daalo -> p+q-n. Hook: 'do equations ghatao, d=-1 ka jaadu'. Proof-type mein har step likhna zaroori.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "A4-113", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Find d / n given Sn and last term", "question": "Find the common difference of an A.P. whose first term is 8, the last term is 65 and the sum of all its terms is 730.", "answer": "Method: S_n=n/2(a+l)=730 with a=8,l=65 -> n=20. Then l=a+(n-1)d -> 65=8+19d -> d=3.", "explanation": "a, last term l aur Sn diye ho to pehle n nikaalo S_n=n/2(a+l) se, phir d ko l=a+(n-1)d se. Hook: 'n pehle, d baad mein'. Do alag formula yaad rakho: sum ke liye n/2(a+l), term ke liye a+(n-1)d.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "A4-118", "chapter_code": "A4", "chapter_name": "Arithmetic Progressions", "unit": "Algebra", "topic": "Form an AP from sum & term conditions", "question": "The sum of first seven terms of an A.P. is 182. If its 4th term and the 17th term are in the ratio 1: 5, find the A.P.", "answer": "Method: use S_7=182 -> a+3d=26 and a4/a17=1/5 -> 5(a+3d)=a+16d -> a+16d=130; solve a=2,d=8 -> AP 2,10,18,26,... (For S_q=63q-3q^2: a_1=S_1=60, d=-6; a_p=-60 -> p=21; a_11=0.)", "explanation": "Sum aur term-conditions se 'a' aur 'd' ke do equations banao, solve karo, phir AP likho. Sn polynomial wale mein a_1=S_1, a_2=S_2-S_1 se d nikaalo. Hook: 'do shartें -> do equations -> a,d'. Formula a_n=a+(n-1)d, S_n=n/2[2a+(n-1)d].", "years": ["2023"], "papers": 1, "raw": 2, "marks": 5, "types": ["LA"], "score": 1}, {"key": "C1-177", "chapter_code": "C1", "chapter_name": "Coordinate Geometry", "unit": "Coordinate Geometry", "topic": "Circle (distance)", "question": "Assertion (A): If the points A(4, 3) and B(x, 5) lie on a circle with centre O(2, 3), then the value of x is 2. Reason (R) : Centre of a circle is the mid-point of each chord of the circle.", "answer": "Method: A,B on a circle centre O(2,3); equal radii give x=2 (assertion true). But the centre is the midpoint only of a DIAMETER, not of every chord → reason false.", "explanation": "Circle pe do point barabar doori (radius) par. OA=OB laga ke unknown nikaalo. Par centre sirf DIAMETER ka midpoint hota hai, har chord ka nahi — isliye reason galat ho sakta hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Assertion-Reason"], "score": 1}, {"key": "G1-185", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Find length by similarity", "question": "[FIGURE: Triangle AOB with line segment PQ parallel to AB] In the given figure, AB || PQ. If AB = 6 cm, PQ = 2 cm and OB = 3 cm, then the length of OP is :", "answer": "Method: AB||PQ across vertex O makes triangle OAB ~ triangle OPQ (AA), so OP/OB = PQ/AB. With AB=6, PQ=2, OB=3 => OP = (2/6)*3 = 1 cm.", "explanation": "Do triangles vertex pe mile hue ho aur unki opposite sides parallel ho (AB||PQ), to wo similar hote hain (alternate/vertically opposite angles). Corresponding sides ka ratio barabar - OP/OB = PQ/AB. Sidha ratio se length.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G1-186", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Find length by similarity", "question": "In the given figure, AB = BC = 10 cm. If AC = 7 cm, then the length of BP is : [FIGURE: Triangle ABC with point P on AC and Q on BC, and line PQ parallel to AB]", "answer": "Method: PQ||AB in triangle with given sides; by BPT/similarity the parallel line through the relevant point gives BP. With AB=BC=10, AC=7, P on AC and PQ||AB, BP = 6.5 cm (P is positioned so CP/CA = CQ/CB and BP follows).", "explanation": "Parallel line ho to ya BPT ya similarity. Diagram dekh kar corresponding sides pehchaano, ratio banao aur unknown length nikaalo. Isosceles property (AB=BC) ko bhi use karo.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G1-190", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Find length by similarity", "question": "In the given figure, ABCD is a parallelogram. AE divides the line segment BD in the ratio 1 : 2. If BE = 1.5 cm, then find the length of BC. [FIGURE: Parallelogram ABCD with diagonal BD. Point E on BD such that AE is a line segment.]", "answer": "Method: Diagonals/segments in the parallelogram give triangle OBE ~ triangle ODA (AA, since AD||BC), so BE/AD = ratio 1:2; with AD=BC and BE=1.5 => BC = 2*1.5 = 3 cm.", "explanation": "Parallelogram mein opposite sides parallel hone se alternate angles barabar -> similar triangles ban-te hain. Ratio (yahan 1:2) ka use karke required side nikaalo. AD=BC (opposite sides) ka fact lagana mat bhoolo.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "G1-191", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity", "question": "In the given figure, E is a point on the side CB produced of an isosceles triangle ABC with AB = AC. If AD ⊥ BC and EF ⊥ AC, then prove that ∆ABD ~ ∆ECF. [FIGURE: Isosceles triangle ABC (AB=AC), AD perpendicular to BC, E on CB produced, EF perpendicular to AC]", "answer": "Method: AB=AC => angle B = angle C; both right angles AD perp BC and EF perp AC are equal. So triangle ABD ~ triangle ECF by AA similarity.", "explanation": "Do triangles similar dikhane ke liye AA sabse aasaan: do angles barabar dikhao. Isosceles se base angles barabar, aur dono perpendiculars se 90 degree barabar. AA ho gaya. 'Given/figure' use karke equal angles point-out karo.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 1}, {"key": "G1-204", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Geometric mean / CPCT relation", "question": "In the given figure, ∠ADC = ∠BCA ; prove that ∆ACB ~ ∆ADC. Hence find BD if AC = 8 cm and AD = 3 cm. [FIGURE: Triangle ABC with point D on AB such that CD is drawn]", "answer": "Method: angle ADC = angle BCA and common angle A => triangle ACB ~ triangle ADC (AA). So AC/AD = AB/AC => AB = AC^2/AD = 64/3; BD = AB - AD = 64/3 - 3 = 55/3 cm.", "explanation": "Equal angle + common angle = AA similarity. Ratio AC/AD = AB/AC se AB nikaalo (AC^2/AD). Phir BD = AB - AD. Pehle similarity likho, fir length, fir subtract.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "G1-211", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove similarity (parallelogram)", "question": "In the given figure ABCD is a parallelogram, P is a point on side BC and DP when produced meets AB produced at L. Prove that (i) DP/PL = DC/BL (ii) DL/DP = AL/DC (iii) If LP : PD = 2 : 3 then find BP : BC. [FIGURE: Parallelogram ABCD. P is on BC. DP is extended to meet AB extended at L.]", "answer": "Method: In parallelogram ABCD with P on BC, DP meets AB produced at L. triangle DPC ~ triangle LPB (AA) => DP/PL = DC/BL. triangle LPB ~ triangle LDA => DL/DP = AL/DC. If LP:PD = 2:3 then using AD=BC, BP:BC = 2:5.", "explanation": "Parallelogram + extended line se kai similar triangles. Alternate angles se DPC~LPB aur LPB~LDA. Ratios likh kar parts solve karo; AD=BC ka fact (iii) mein lagao. Step-by-step alag-alag similar pair pakdo.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "G1-213", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Prove proportional segments", "question": "In the given figure, CD is the perpendicular bisector of AB. EF is perpendicular to CD. AE intersects CD at G. Prove that CF/CD = FG/DG. [FIGURE: triangle ABC with CD perpendicular bisector of AB, EF perpendicular to CD, and AE intersecting CD at G]", "answer": "Method: CD is perpendicular bisector of AB (so AD=BD) and EF perp CD. triangle EFG ~ triangle ADG and triangle EFC ~ triangle BDC; combining with AD=BD gives CF/CD = FG/DG.", "explanation": "Do jodi similar triangles (EFG~ADG, EFC~BDC) banao aur perpendicular-bisector se AD=BD use karo. Ratios ko combine karke CF/CD = FG/DG. Equal segments (AD=BD) wala fact key hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 1}, {"key": "G1-219", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Area ratio (same base)", "question": "In the given figure, ∆ABC and ∆DBC are on the same base BC. If AD intersects BC at O, prove that ar(∆ABC) / ar(∆DBC) = AO / DO [FIGURE: two triangles ABC and DBC sharing base BC, with AD intersecting BC at O]", "answer": "Method: triangle ABC and triangle DBC share base BC; drop altitudes AL, DM. triangle AOL ~ triangle DOM (AA) => AL/DM = AO/DO. Since area ratio = (1/2 . BC . AL)/(1/2 . BC . DM) = AL/DM = AO/DO.", "explanation": "Same base wali do triangles ka area ratio = unki heights ka ratio. Heights ko AO/DO se similar triangles (AOL~DOM) ke through jodo. Base common hone se sirf height ka ratio bachta hai.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "G1-224", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Similarity criteria (which makes similar)", "question": "In Δ ABC and Δ DEF, AB/DE = BC/FD. Which of the following makes the two triangles similar ?", "answer": "Method: Given AB/DE = BC/FD, the two sides are about angles B and D respectively (B in first, D between the proportional sides of second), so the included angle condition angle B = angle D makes them similar by SAS.", "explanation": "SAS similarity ke liye proportional sides ke BEECH waala angle barabar hona chahiye. Diye ratio mein corresponding included angle dhoondo (yahan angle B = angle D). Sirf koi bhi angle nahi - included angle.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G1-230", "chapter_code": "G1", "chapter_name": "Triangles", "unit": "Geometry", "topic": "Find length by similarity (case study)", "question": "Based on above information : OR find the length of PQ. [FIGURE: Circle with center O, radius 75 cm. Tangent AB. Angle ABO = 30°. Line PQ parallel to OA.]", "answer": "Method: Circle case study with PQ||OA. (96) Since OQ=OA=75 and OB=150, Q is the midpoint of OB; by midpoint theorem P is the midpoint of AB so AP = AB/2 = (75√3)/2 cm. (97) triangle BPQ ~ triangle BOA gives PQ/OA = BQ/BO = 1/2 => PQ = 37.5 cm.", "explanation": "PQ||OA hone se ya midpoint theorem ya similar triangles (BPQ~BOA) lagao. Midpoint mile to opposite side ka aadha; similarity mile to corresponding sides ka ratio. Case study mein figure ki values dhyaan se uthao.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 2, "types": ["Case-based"], "score": 1}, {"key": "G2-242", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent length", "question": "The length of tangent drawn to a circle of radius 9 cm from a point 41 cm from the centre is :", "answer": "Tangent length from external point = sqrt(d^2 - r^2), d=distance from centre, r=radius. Here sqrt(41^2 - 9^2)=sqrt(1600)=40 cm.", "explanation": "Tangent length ka formula: sqrt(distance^2 - radius^2). Yahan sqrt(41^2 - 9^2)=40 cm. Radius perp tangent se right triangle banta hai. Hook: OP^2 = radius^2 + tangent^2.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G2-245", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent length (trig)", "question": "[FIGURE: Circle with center O, tangent TA, radius OT, and angle OTA] In the given figure, TA is a tangent to the circle with centre O such that OT = 4 cm, ∠OTA = 30°, then length of TA is :", "answer": "Tangent length using trig in right triangle OTA (angle OTA=30, OT=4, angle OAT=90): TA = OT cos30 = 4(sqrt3/2) = 2sqrt3 cm.", "explanation": "Jab radius ke saath angle diya ho, trig lagao (radius perp tangent). TA = OT cos(angle) = 2sqrt3 cm. Hook: ratio dekh ke sin/cos/tan chuno.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G2-246", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent length (trig)", "question": "PQ is tangent to a circle centered at O. If the radius of the circle is 5 cm, then the length of the tangent PQ is : [FIGURE: Circle with center O, tangent PQ, and radius OP forming a 30° angle at P with PQ]", "answer": "PQ tangent, radius 5, radius makes 30 with tangent. In right triangle, tan30 = r/PQ so PQ = r/tan30 = 5sqrt3 cm.", "explanation": "Radius perp tangent se right triangle; diye angle se tan ratio: PQ = radius/tan(angle) = 5sqrt3 cm. Hook: radius/tan(angle) = tangent length.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G2-251", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent length (trig)", "question": "In the given figure, AB is a tangent to the circle centered at O. If OA = 6 cm and ∠ OAB = 30°, then the radius of the circle is : [FIGURE: circle with center O, tangent AB, and radius OA]", "answer": "Find radius given OA=6, angle OAB=30 (AB tangent at B, angle OBA=90). sin(OAB)=OB/OA so OB = 6 sin30 = 3 cm.", "explanation": "Tangent point par 90; right triangle me radius = OA sin(angle) = 6 sin30 = 3 cm. Hook: radius opposite angle matlab sin use karo.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G2-253", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents and centre", "question": "In the given figure, PQ is tangent to the circle centred at O. If ∠AOB = 95°, then the measure of ∠ABQ will be [FIGURE: circle with center O, tangent PQ, points A, B on circle]", "answer": "Find angle ABQ given angle AOB=95 (PQ tangent at B). In triangle OAB, OA=OB so angle OBA = (180-95)/2 = 42.5. Tangent perp radius gives angle OBQ=90, so angle ABQ = 90 - 42.5 = 47.5.", "explanation": "Isosceles triangle OAB ke base angle (= (180-central)/2) nikalo, fir tangent ke 90 me se ghata do. angle ABQ = 90 - 42.5 = 47.5. Hook: tangent par 90, isosceles base angle ghata do.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G2-257", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents and centre", "question": "In the given figure, PA and PB are tangents from external point P to a circle with centre C and Q is any point on the circle. Then the measure of ∠AQB is [FIGURE: Circle with center C, external point P, tangents PA and PB, point Q on circle, angle APB = 55°] (A) 62½° (B) 125° (C) 55° (D) 90°", "answer": "Find angle AQB (Q on circle) given angle APB=55. Central angle ACB = 180-55 = 125 (tangents supplementary), then inscribed angle AQB = half ACB = 62.5.", "explanation": "Pehle centre wala angle ACB = 180 - APB nikalo, fir inscribed angle = aadha central. 55 deta hai centre 125, Q par 62.5. Hook: centre ka angle, circumference par aadha.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G2-259", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent-chord angle", "question": "In the given figure, PQ is a chord of the circle centered at O. PT is a tangent to the circle at P. If ∠ QPT = 55°, then find ∠ PRQ.[FIGURE: circle with center O, chord PQ, tangent PT at P, point R on the circle, angle QPT = 55°]", "answer": "Find angle PRQ from angle QPT=55 (R on circle). angle OPQ = 90-55 = 35, isosceles triangle OPQ gives angle POQ = 180 - 2(35) = 110. Reflex POQ = 250, so inscribed angle PRQ = half(250) = 125.", "explanation": "Tangent-chord se angle OPQ = 90-55 = 35, isosceles se POQ = 110. R major arc par hai to reflex ka aadha lo, 125. Hook: pehle POQ, fir reflex ka aadha.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "G2-265", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent perpendicular radius (proof)", "question": "[FIGURE: Circle with center O, tangent PQ, and angles x and y] In the given figure, PQ is a tangent to the circle with centre O. If ∠OPQ = x, ∠POQ = y, then x + y is :", "answer": "In right triangle OPQ, angle OPQ=x, angle POQ=y, angle OQP=90 (radius perp tangent). Angle sum gives x + y + 90 = 180, so x + y = 90.", "explanation": "Tangent point par 90; triangle ke baaki do angle x aur y ka sum 90. Hook: ek 90 fix, baaki do milke 90.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G2-266", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent properties (Assertion-Reason)", "question": "Assertion (A): A tangent to a circle is perpendicular to the radius through the point of contact. Reason (R) : The lengths of tangents drawn from an external point to a circle are equal.", "answer": "A: tangent perp radius at contact (true). R: tangents from an external point are equal (true). R does not explain A. Answer: (b).", "explanation": "Dono sahi par ek doosre ko explain nahi karte; tangent perp radius alag baat hai, equal tangents alag. Isliye (b). Hook: dono true par link nahi matlab (b).", "years": ["2023"], "papers": 1, "raw": 2, "marks": 1, "types": ["Assertion-Reason"], "score": 1}, {"key": "G2-268", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent properties (Assertion-Reason)", "question": "Assertion (A) : If PA and PB are tangents drawn from an external point P to a circle with centre O, then the quadrilateral AOBP is cyclic. Reason (R): The angle between two tangents drawn from an external point to a circle is supplementary to the angle subtended by the line segment joining the points of contact at the centre.", "answer": "A: AOBP (tangents PA,PB) is cyclic (true). R: angle between two tangents is supplementary to the central angle (true) and IS the reason. Answer: (a).", "explanation": "Yahan R hi A ki wajah hai: P + O = 180 hone se AOBP cyclic banta hai. Isliye (a). Hook: supplementary angle matlab cyclic, R sahi explanation.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 1, "types": ["Assertion-Reason"], "score": 1}, {"key": "G2-273", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Quadrilateral circumscribing circle", "question": "[FIGURE: Quadrilateral PQRS circumscribing a circle] In the given figure, the quadrilateral PQRS circumscribes a circle. Here PA + CS is equal to :", "answer": "Quadrilateral PQRS circumscribes a circle; using equal tangents from each vertex, PA + CS = PS (the two tangent segments make up a whole side).", "explanation": "Circumscribing quadrilateral me har corner se do barabar tangents. Inhe jod ke side ban jaati hai: PA + CS = PS. Hook: har vertex se barabar tangents, sides me todo.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G2-281", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Inscribed circle in quadrilateral (find length)", "question": "In the given figure, a circle is inscribed in a quadrilateral ABCD in which ∠B = 90°. If AD = 17 cm, AB = 20 cm and DS = 3 cm, then find the radius of the circle. [FIGURE: quadrilateral ABCD with inscribed circle, center O, points of tangency P, Q, R, S]", "answer": "Circle inscribed in quad ABCD, angle B=90, AD=17, AB=20, DS=3. Equal tangents: DR=DS=3 so AR=14, AQ=AR=14, QB=AB-AQ=6. Since angle B=90, OQBP is a square, so radius = QB = 6 cm.", "explanation": "Equal tangents se lengths transfer karo (DR=DS, AQ=AR), QB nikalo. angle B=90 hone se OQBP square banta hai, radius = QB = 6 cm. Hook: 90 wale corner par radius = tangent segment.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["SA"], "score": 1}, {"key": "G2-288", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Triangle circumscribing circle (find sides)", "question": "A triangle ABC is drawn to circumscribe a circle of radius 4 cm such that the segments BD and DC are of lengths 10 cm and 8 cm respectively. Find the lengths of the sides AB and AC, if it is given that area Δ ABC = 90 cm^2. [FIGURE: triangle ABC circumscribing a circle with center O and radius 4 cm, with D on BC such that BD=10cm and DC=8cm]", "answer": "Triangle ABC circumscribes circle r=4, BD=10, DC=8, area=90. Equal tangents: BD=BF=10, CD=CE=8, AF=AE=x. Sides AB=x+10, AC=x+8, BC=18. Area = half r perimeter = half(4)(2x+36) = 90 gives 2x+36=45, x=4.5. So AB=14.5 cm, AC=12.5 cm.", "explanation": "Equal tangents se sides ko x me likho, fir Area = half x r x perimeter lagao. x nikal ke AB=14.5, AC=12.5 cm. Hook: Area = half x r x perimeter (inscribed circle).", "years": ["2023"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 1}, {"key": "G2-290", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Triangle and circle (tangent lengths)", "question": "In the given figure, AB = BC = 10 cm. If AC = 7 cm, then the length of BP is : [FIGURE: circle with center R, tangent BPC, and secant AQC]", "answer": "AB=BC=10, AC=7, find BP. Tangent length from a vertex = (sum of two adjacent sides - opposite side)/2 = (10+10-7)/2 = 6.5 cm.", "explanation": "Tangent length from vertex = (do adjacent sides ka sum - opposite side)/2 = (10+10-7)/2 = 6.5 cm. Hook: tangent from vertex = s - opposite side (s = semi-perimeter).", "years": ["2023"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G2-300", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Two circles (common chord/tangent)", "question": "Two circles with centres O and O' of radii 6 cm and 8 cm, respectively intersect at two points P and Q such that OP and O'P are tangents to the two circles. Find the length of the common chord PQ. [FIGURE: two intersecting circles with centers O and O', intersecting at P and Q. OP and O'P are tangents to the respective circles.]", "answer": "Two circles centres O,O', radii 6,8 intersect at P,Q with OP perp O'P. OO' = sqrt(36+64) = 10. Common chord PQ perp OO'; PM = (OP x O'P)/OO' = 48/10 = 4.8, so PQ = 2(4.8) = 9.6 cm.", "explanation": "Dono radii ek doosre ke perpendicular matlab right triangle, OO'=10. PQ perp OO', PM = legs ka product / hypotenuse = 4.8, PQ = 9.6 cm. Hook: right triangle me altitude = legs product / hypotenuse.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 1}, {"key": "G2-315", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent length (trig)", "question": "Based on above information : (a) find the length of AB. [FIGURE: Circle with center O, radius 75 cm. Tangent AB. Angle ABO = 30°. Line PQ parallel to OA.]", "answer": "Case-based: circle r=75, tangent AB, angle ABO=30. AB: tan30 = OA/AB gives AB = 75sqrt3 cm. OB: sin30 = OA/OB gives OB = 150 cm.", "explanation": "Right triangle OAB me trig: AB = OA/tan30 = 75sqrt3 cm, OB = OA/sin30 = 150 cm. Hook: radius perp tangent matlab right triangle matlab sin/cos/tan.", "years": ["2023"], "papers": 1, "raw": 6, "marks": 1, "types": ["Case-based"], "score": 1}, {"key": "G2-316", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent length (midpoint)", "question": "find the length of AP.", "answer": "Case-based: PQ parallel OA and Q is midpoint of OB, so P is midpoint of AB (midpoint theorem). AP = AB/2 = 75sqrt3/2 cm; PQ = OA/2 = 75/2 cm (mid-segment is half the parallel side).", "explanation": "PQ parallel OA aur Q midpoint matlab P bhi midpoint (midpoint theorem). AP = aadha AB = 75sqrt3/2; PQ = aadha OA. Hook: midpoint theorem, mid-segment = aadhi parallel side.", "years": ["2023"], "papers": 1, "raw": 4, "marks": 2, "types": ["Case-based"], "score": 1}, {"key": "G2-320", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Equal tangents (proof)", "question": "From an external point, two tangents are drawn to a circle. Prove that the line joining the external point to the centre of the circle bisects the angle between the two tangents.", "answer": "Prove the line joining the external point to the centre bisects the angle between the two tangents. In triangles OPA and OPB: OA=OB (radii), PA=PB (equal tangents), OP common, so by RHS/SSS they are congruent, giving angle OPA=angle OPB. Hence OP bisects angle APB.", "explanation": "Bahar ke point ko centre se jodne wali line do tangents ke beech ka angle aadha karti hai. Proof: triangle OPA aur OPB congruent (RHS), to angle OPA = angle OPB. Hook: equal tangents plus equal radii matlab OP angle bisector.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "G2-321", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents and centre", "question": "In the given figure, AC and AB are tangents to a circle centered at O. If ∠ COD = 120°, then ∠ BAO is equal to : [FIGURE: circle with center O, tangents AC and AB, and chord CD]", "answer": "Find angle BAO given angle COD=120 (AB,AC tangents, CD a chord/diameter angle). Using the isosceles triangle and tangent perp radius (angle OAB=half of the relevant central relation), angle BAO = 30.", "explanation": "Tangents wale figure me central angle (120) se isosceles aur tangent ke 90 use karke angle BAO = 30 nikalta hai. Hook: tangent perp radius plus isosceles triangle.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "G2-322", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Tangent-secant (power of a point)", "question": "In the given figure, PT is a tangent to the circle centered at O. OC is perpendicular to chord AB. Prove that PA . PB = PC^2 – AC^2. [FIGURE: circle with center O, tangent PT, chord AB, and OC perpendicular to AB]", "answer": "Prove PA.PB = PC^2 - AC^2. OC perp chord AB so C is the midpoint, AC=BC. Then PA.PB = (PC-AC)(PC+CB) = (PC-AC)(PC+AC) = PC^2 - AC^2.", "explanation": "OC perp AB matlab C midpoint, to AC=BC. Phir PA.PB = (PC-AC)(PC+AC) = PC^2 - AC^2 (a-b)(a+b) wali identity. Hook: perpendicular se chord aadha, fir difference-of-squares.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "G2-323", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents and centre", "question": "In the given figure, PA is a tangent to the circle drawn from the external point P and PBC is the secant to the circle with BC as diameter. If ∠AOC = 130°, then find the measure of ∠APB, where O is the centre of the circle. [FIGURE: Circle with center O, tangent PA from external point P, secant PBC, diameter BC, angle AOC = 130°]", "answer": "Find angle APB where PA tangent and PBC secant with BC a diameter, angle AOC=130. Then angle AOB=180-130=50, angle OAP=90 (radius perp tangent), so in triangle OAP angle APB = 180-(50+90) = 40.", "explanation": "PA tangent plus diameter BC: angle AOB = 180-130 = 50; angle OAP=90; triangle me angle APB = 180-(50+90) = 40. Hook: diameter se supplementary angle, fir triangle angle-sum.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 2, "types": ["VSA"], "score": 1}, {"key": "G2-324", "chapter_code": "G2", "chapter_name": "Circles", "unit": "Geometry", "topic": "Angle between tangents (find angle)", "question": "In the given figure, tangents PQ and PR are drawn to a circle such that ∠RPQ = 30°. A chord RS is drawn parallel to the tangent PQ. Find the measure of ∠RQS. [FIGURE: Circle with center O, tangents PQ and PR from external point P. Angle RPQ is 30 degrees. Chord RS is parallel to PQ.]", "answer": "Tangents PQ,PR with angle RPQ=30, chord RS parallel to PQ. PQ=PR so angle PQR=angle PRQ=(180-30)/2=75. With RS parallel to PQ and the tangent-chord/isosceles relations, angle RQS = 30.", "explanation": "PQ=PR se base angle 75 (=(180-30)/2). RS parallel PQ aur tangent-chord relations se angle RQS = 30 nikalta hai. Hook: isosceles base angle plus parallel-line alternate angle.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 5, "types": ["LA"], "score": 1}, {"key": "M1-341", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Circumference & radius", "question": "The circumferences of two circles are in the ratio 4 : 5. What is the ratio of their radii ?", "answer": "Method: C = 2πr, so C₁/C₂ = r₁/r₂. Circumference ratio equals radius ratio → 4:5. Option (D).", "explanation": "Circumference radius ke seedhe proportional hai (C = 2πr, 2π constant). To circumference ka ratio = radii ka ratio = 4:5. Dhyaan: AGAR area ka ratio poochhe to woh radius² ka ratio hota hai — yeh confuse mat karna.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["MCQ"], "score": 1}, {"key": "M1-344", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Wiper / sweep area", "question": "A car has two wipers which do not overlap. Each wiper has a blade of length 21 cm sweeping through an angle of 120°. Find the total area cleaned at each sweep of the two blades.", "answer": "Method: Each blade sweeps a sector of angle 120°, radius = blade length 21 cm. One blade = (120/360)π(21²) = 462 cm². Two non-overlapping blades = 2×462 = 924 cm².", "explanation": "Wiper jitna ghoomta hai utna sector saaf karta hai: area = (θ/360)πr², r = blade ki lambai. Do blades (jo overlap nahi karte) → ek ka area ×2. r=21, 120° → 462, ×2 = 924 cm². Yaad: 'do wiper, isliye double'.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "M1-345", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Grazing area (quarter circle)", "question": "A horse is tied to a peg at one corner of a square shaped grass field of side 15 m by means of a 5 m long rope. Find the area of that part of the field in which the horse can graze. Also, find the increase in grazing area if length of rope is increased to 10 m. (Use π = 3·14)", "answer": "Method: At a corner the animal grazes a quarter circle, area = (1/4)πr². r=5 → 19.625 m²; r=10 → 78.5 m². Increase = 78.5 − 19.625 = 58.875 m². (Use π=3.14.)", "explanation": "Corner pe bandha jaanwar 90° (quarter) circle me ghaas khaata hai: area = (1/4)πr², r = rope ki lambai. Rope badhe to nayi area − purani area = increase. r=5 aur r=10 ka quarter-circle nikaal ke ghatao. Memory hook: 'corner = chauthai (1/4) circle'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 5, "types": ["LA"], "score": 1}, {"key": "M1-348", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Shaded region", "question": "In the given figure, AB and CD are diameters of a circle with centre O perpendicular to each other. If OA = 7 cm, find the area of shaded region. [FIGURE: circle with centre O, perpendicular diameters AB and CD, and shaded segments]", "answer": "Method: Each shaded part = quadrant − triangle (a 90° segment). Quadrant = (1/4)πr² = 77/2; triangle OBC = (1/2)r² = 49/2. One segment = 77/2 − 49/2 = 14; two such = 2×14 = 28 cm².", "explanation": "Perpendicular diameters 4 barabar quadrant banate hain. Shaded part = quadrant − usme banne wala right triangle (yeh ek 90° segment hai). Ek segment = (1/4)πr² − (1/2)r². Figure me jitne shaded segment hain utne se multiply. r=7 → 28 cm². Memory hook: 'segment = sector − triangle'.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["SA"], "score": 1}, {"key": "M1-350", "chapter_code": "M1", "chapter_name": "Areas Related to Circles", "unit": "Mensuration", "topic": "Combined figures", "question": "Reeti prepares a Rakhi for her brother Ronit. The Rakhi consists of a rectangle of length 8 cm and breadth 6 cm inscribed in a circle as shown in the figure. Find the area of the shaded region. (Use π = 3·14) [FIGURE: Circle with an inscribed rectangle, showing shaded region]", "answer": "Method: Diameter of circle = diagonal of rectangle = √(8²+6²) = 10 → r = 5. Shaded = circle − r
