2023", "2024", "2026"], "papers": 5, "raw": 9, "marks": 3, "types": ["Literature-SA"], "score": 13}, {"key": "GR5-219", "chapter_code": "GR5", "chapter_name": "Determiners", "unit": "Grammar", "topic": "Demonstratives/possessives", "question": "Fill in the blank by choosing the correct option from the bracket, to complete the sentence : Attached are the departmental performance reports and ______ (it / these / them) should be reviewed by each department head.", "answer": "Singular noun → it/this/that (the report → it); plural noun → these/those/they (reports → these). For specific plural 'proposals' use 'these' (or 'the'). Relative: 'which' for things, 'who' for people.", "explanation": "Pointer word ko noun ke number se match karo. EK cheez (report, policy) → it/this/that. ZYADA cheezein (reports, guidelines) → these/those. Subject position me 'they/it', object me 'them'. Relative pronoun me cheez ke liye 'which', insaan ke liye 'who'. Hook: singular = it/this, plural = these — number kabhi mat bhoolna.", "years": ["2024", "2025", "2026"], "papers": 5, "raw": 13, "marks": 1, "types": ["Grammar"], "score": 13}, {"key": "PM5-289", "chapter_code": "PM5", "chapter_name": "The Ball Poem", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[The Ball Poem] Describe the boy's grief after losing his ball. Was the poet delighted? Is consoling futile? Explain 'all his young days into the harbour' and 'no one buys a ball back'.", "answer": "Key extract answers: the lines show the boy's grief over the lost ball (not delight — True/False = False); consoling him with 'other balls' is futile/inappropriate, so the feeling is despair. 'All his young days into the harbour' = childhood memories flashing as he moves from childhood to maturity. 'No one buys a ball back' = irreplaceable things (memories, relationships) can't be regained; the boy feels realisation and becomes indifferent to material wealth, knowing 'Money is external'.", "explanation": "Ye RTC extract-bundle hai — chhote MCQ/SA jawaab ratne hain: poet delighted tha? False. Console karna? Futile/inappropriate. Feeling? Despair → phir realisation. 'Young days into harbour' = bachpan ki yaadein, childhood se maturity. 'No one buys a ball back' = jo gaya wo paise se wapas nahi. Hook: 'extract padh ke har line ka emotion pakad — grief → realisation → acceptance.'", "years": ["2023", "2024", "2026"], "papers": 5, "raw": 31, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 13}, {"key": "FW7-160", "chapter_code": "FW7", "chapter_name": "The Necklace", "unit": "Footprints Without Feet", "topic": "Central theme / message", "question": "Those who are satisfied with what they have are happy in life. Those who aspire more than what they can afford ruin their life. Matilda was one such person. If she were content with her life she would have led a happy life. Elaborate on the basis of the chapter ‘The Necklace.’", "answer": "The story shows that discontent and over-aspiration ruin life. Matilda, a clerk's wife, was never satisfied; she always craved luxury she could not afford. Her dissatisfaction made her borrow a necklace, lose it, and spend ten years in poverty repaying the debt. Had she been content, she would have lived happily. Message: be happy with what you have; greed and refusal to accept your circumstances bring suffering.", "explanation": "Yaad rakh: yeh kahani ka core message hai — 'jo hai usme khush raho, warna zindagi barbaad'. Matilda ko jo mila tha usse kabhi santushti nahi thi, aur isi lalach ne use dukh diya. Jab bhi question 'contentment / discontentment / circumstances accept karna' pe ho, isi theme se likho. Memory hook: 'Santushti = sukh, lalach = dukh'. Matilda ka naam aur fake necklace ka anjaam zaroor mention karo.", "years": ["2023", "2025", "2026"], "papers": 5, "raw": 11, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 12}, {"key": "GR3-210", "chapter_code": "GR3", "chapter_name": "Subject–Verb Concord", "unit": "Grammar", "topic": "Singular subjects that look plural / uncountables", "question": "Economics _____________ difficult for the students of grade nine. (a) is (b) are (c) has (d) were", "answer": "Some subjects LOOK plural (end in -s) or are uncountable but take a SINGULAR verb: subject names (Economics IS), 'No news IS good news', uncountable 'The information APPLIES'. A gerund/-ing phrase as subject is singular: 'Writing this book HAS BEEN a journey' (error: have→has). A singular phrase-subject is singular: 'A bird in the hand IS worth two' (error: are→is).", "explanation": "Kuch words 's' me end hote hain par hote singular hain — Economics, Mathematics, Physics, News — sab 'is/has' lete hain! 'Information' uncountable hai → 'applies'. Aur jab koi kaam (gerund/-ing) subject ho — 'Writing this book' — to woh ek cheez hai → 'has been'. Hook: '-s' dekhke plural mat samajh lena, soch ke dekho ek cheez hai ya many.", "years": ["2023", "2025", "2026"], "papers": 5, "raw": 12, "marks": 1, "types": ["Grammar"], "score": 12}, {"key": "FP5-54", "chapter_code": "FP5", "chapter_name": "Glimpses of India", "unit": "First Flight: Prose", "topic": "Key incident / plot (Tea from Assam)", "question": "Explain the reasons for Rajvir's excitement on seeing the plantation and Pranjol's lack of enthusiasm. (Glimpses of India – Tea from Assam)", "answer": "During the train journey Pranjol kept reading his detective book while Rajvir gazed at the scenery. Pranjol, an Assam native raised on a tea plantation, was used to the sight, so he felt no excitement. Rajvir, a first-time visitor from Delhi, was thrilled by the endless green tea bushes and eagerly shared tea facts.", "explanation": "Yaad rakho: same cheez, do alag reactions. Pranjol Assam ka local hai, tea gardens uske liye 'daily wali baat' — boring. Rajvir pehli baar dekh raha hai, isliye uska excitement aur curiosity sky-high hai. Memory hook: 'Local bored, Tourist thrilled.' Answer mein dono ka contrast zaroor likhna — wahi marks dilata hai.", "years": ["2023", "2025"], "papers": 5, "raw": 11, "marks": 3, "types": ["Literature-SA"], "score": 11}, {"key": "GR8-234", "chapter_code": "GR8", "chapter_name": "Gap-filling / Transformation", "unit": "Grammar", "topic": "Gap-filling (cloze)", "question": "Fill in the blank by using the correct form of the word in the brackets, for the given portion of a letter. Kindly pay heed to our request and provide the students with __________ (adequacy) support on their project.", "answer": "Method: change the bracketed root into the part of speech the sentence needs (noun/adjective/verb form). Sample: adequacy -> 'adequate' (adjective before noun 'support'). Others: indicate->indication, construct->constructing, damage->damaged, cooperate->cooperation, assist->assistance.", "explanation": "Bracket me diya word galat form me hota hai — usse sentence ke hisaab se sahi part of speech me badlo. Noun chahiye toh -tion/-ance/-ity lagao (cooperate->cooperation, assist->assistance), adjective chahiye toh -ate/-ed (adequacy->adequate, damage->damaged). Hook: blank ke aage/peeche ka shabd batata hai noun chahiye ya adjective. Spelling double-check zaroor karo, wahin marks katte hain.", "years": ["2023", "2024", "2025"], "papers": 5, "raw": 10, "marks": 1, "types": ["Grammar"], "score": 11}, {"key": "GR3-207", "chapter_code": "GR3", "chapter_name": "Subject–Verb Concord", "unit": "Grammar", "topic": "Collective nouns / 'bread and butter'", "question": "Select the correct option to fill in the blank for the given line : Bread and butter ______ my favourite breakfast. (a) is (b) am (c) are (d) has been", "answer": "Two nouns joined by 'and' = SINGULAR verb if they name ONE unit/idea or one person; PLURAL verb if they are two separate things. One unit: 'Bread and butter IS' (one dish); 'treasurer and secretary HAS' (one person, no second 'the'). Separate things: flowers and grass reflect; leaves share; seagulls and sky signal; snowflakes and ice crave; Drinking and smoking ARE injurious.", "explanation": "'And' wala rule do tarah ka hai. Agar do cheezein milke EK hi cheez/idea banati hain (bread and butter = ek nashta, treasurer and secretary = ek hi banda) to verb SINGULAR — 'is/has'. Lekin agar do alag-alag cheezein hain (flowers and grass, drinking and smoking) to verb PLURAL — 'are/reflect'. Hook: ek plate me aaye to is, do plate me aaye to are. Note: ek hi insaan ho to dusra 'the' nahi lagta.", "years": ["2023", "2024", "2026"], "papers": 5, "raw": 8, "marks": 1, "types": ["Grammar"], "score": 10}, {"key": "PM3-257", "chapter_code": "PM3", "chapter_name": "A Tiger in the Zoo", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[A Tiger in the Zoo] Substitute 'quiet rage'. What word is opposite of 'loud'? Find a word meaning 'to walk with measured, stiff strides'.", "answer": "Opposite of 'loud' = quiet. Word for walking with stiff, haughty strides = stalk. 'Clear and bright' = vivid. 'Quiet rage' ≈ suppressed anger. Stalking on 'pads of velvet' = soft / silent / stealthy movement.", "explanation": "Ye saari word-meaning wali questions ek hi skill test karti hain: extract ke andar se sahi shabd dhoondna. 'Quiet'=loud ka opposite, 'stalk'=akadkar chalna, 'vivid'=clear & bright, 'quiet rage'=dabaa hua gussa (suppressed anger). Memory hook: answer hamesha extract ke andar diya hota hai, bahar se mat socho.", "years": ["2023", "2024", "2025"], "papers": 5, "raw": 15, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 9}, {"key": "PM2-250", "chapter_code": "PM2", "chapter_name": "Fire and Ice", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "In what ways do the symbols of 'Fire' and 'Ice' in the poem 'Fire and Ice' serve as metaphors for opposing human impulses? How do they contribute to the exploration of destructive capabilities of human beings?", "answer": "Fire and ice are metaphors for two opposing destructive human emotions. Fire stands for desire - greed, lust, fury, passion - which can consume and destroy the world. Ice stands for hatred, coldness and indifference, equally capable of ending it ('would suffice'). Frost's contemplative, ironic tone warns that these unchecked inner emotions, not natural forces, bring humanity's ruin.", "explanation": "Poem ka core ek line mein: Fire = desire (greed/lust/passion), Ice = hate (coldness/indifference) - dono extreme emotions duniya ko khatam kar sakte hain. Yaad rakh: ye natural disaster ki baat nahi, insaan ke andar ki emotions ki baat hai. Memory hook: 'FIRE = desire, ICE = hate'. Jab bhi 'how does fire/ice destroy', 'what do they symbolise', 'why both destroy equally', 'perish twice', ya tone/attitude pucha jaaye - dono ka matlab + 'both destroy equally' + 'contemplative, ironic tone' likh dena.", "years": ["2026"], "papers": 4, "raw": 8, "marks": 3, "types": ["Extract-SA", "Literature-SA"], "score": 16}, {"key": "FP6-75", "chapter_code": "FP6", "chapter_name": "Mijbil the Otter", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "'Mijbil the Otter' sensitises human beings especially city people to wildlife. What emotions are conveyed through the association of Mijbil and Maxwell?", "answer": "The Maxwell–Mijbil bond conveys the warmth of friendship, joy and the thrill of exploring wildlife, and a deep, affectionate connection with nature. It is full of emotion and humour—their games, shared sleep and Maxwell's worry during Mij's injury. It also shows every creature's instinct for freedom and how human ignorance often turns the unfamiliar into fear, sensitising city people to wildlife.", "explanation": "Central theme = insaan aur jaanwar ka pyaar bhara rishta (human-animal bond) + nature se judaav. Story emotion, humour aur freedom ka instinct dono dikhati hai. Hook: 'dosti + nature + aazadi'. Yahan 'A Tiger in the Zoo' se compare bhi aa sakta hai — dono mein freedom ki chahat common hai, wahi link likhna.", "years": ["2025", "2026"], "papers": 4, "raw": 4, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 14}, {"key": "FP7-80", "chapter_code": "FP7", "chapter_name": "Madam Rides the Bus", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "Why was Valli's excitement on the bus dampened on her return journey?", "answer": "On the way to town a young cow had run merrily in front of the bus and made Valli laugh. On the return journey she saw the same cow lying dead by the road, killed by some vehicle. The sight shocked and saddened her, draining away her joy and exposing her for the first time to the harsh reality of death. (The conductor's earlier cheerful teasing had, by contrast, made the outward trip a happy adventure.)", "explanation": "Plot ka turning point: jaate waqt cow bhaagti hui dikhi (hasi aayi), aate waqt wahi cow MAR gayi (dukh hua). Yeh ironic contrast hi kahani ka dil hai. Memory hook: 'Wahi gaay - pehle hasi, baad mein aansoo'. Ek question conductor ke cheerful role par bhi hai - wo return se pehle journey ko yaadgaar banata hai.", "years": ["2025", "2026"], "papers": 4, "raw": 5, "marks": 3, "types": ["Literature-SA"], "score": 14}, {"key": "FW8-179", "chapter_code": "FW8", "chapter_name": "Bholi", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "Bholi is sent to school for an uncommon reason, leading to a distinctive twist in her story. Elucidate.", "answer": "Bholi was sent to school for an unusual reason - not for her future, but because her parents thought her ugly, pockmarked and dim-witted with no marriage prospects, so school was a way to be rid of a burden (and Ramlal could not disobey the Tehsildar's order to send his daughters). She was frightened, fearing mockery for her stammer and even thinking she might be sold like a cow. Yet the school proved better than home: she was bathed, given a clean dress, oiled hair and, above all, a kind teacher. Ironically, this 'getting rid of her' became the twist that transformed her life through education.", "explanation": "Irony yaad rakho: jis school ko 'bojh hatao' samajh ke bheja, wahi Bholi ki kismat badal gaya. Reasons sent: ugly/pockmarked, no rishta, Tehsildar ka order. Dar kyun: mazaak ka, 'gaay ki tarah bik jaungi'. Par school > ghar (saaf kapde, pyaari teacher). Memory hook: 'bojh' bana 'gift'. Sab school-entry wale Q yahan.", "years": ["2025", "2026"], "papers": 4, "raw": 6, "marks": 3, "types": ["Literature-SA"], "score": 14}, {"key": "PM3-269", "chapter_code": "PM3", "chapter_name": "A Tiger in the Zoo", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "Explore the contrasting images of the tiger in 'A Tiger in the Zoo' and the tiger in 'How to Tell Wild Animals'. / Examine the similarities and differences between the tiger in 'A Tiger in the Zoo' and the dragon in 'The Tale of Custard the Dragon'.", "answer": "Vs 'How to Tell Wild Animals': the zoo tiger is confined, restless, an object of gaze with 'quiet rage', while the wild tiger roams, roars, hunts and is feared — free in its habitat. Vs 'Custard the Dragon': both are powerful creatures kept in unnatural spaces, but the tiger is forcibly caged and tragic (sympathy), whereas Custard chooses his 'cage' and comically proves real courage — showing appearances can deceive.", "explanation": "Ye 6-marks ki tulna wali LA questions hain. 'How to Tell Wild Animals' ka tiger = aazaad, dahaadta, darawna; is poem ka tiger = qaid, 'quiet rage', sirf tamasha. Custard se: dono powerful, par tiger zabardasti caged (tragic, sympathy) aur Custard khud apni jagah chunta + asli bahaduri dikhata (comic, appearances deceptive). Hook: comparison answer = pehle similarity, phir point-by-point difference, dono poems ka naam zaroor likho.", "years": ["2025", "2026"], "papers": 4, "raw": 12, "marks": 6, "types": ["Literature-LA"], "score": 14}, {"key": "FP3-31", "chapter_code": "FP3", "chapter_name": "Two Stories about Flying", "unit": "First Flight: Prose", "topic": "Character sketch", "question": "Flying is a natural act in birds. Then why was the young seagull 'exhausted by the strange exercise'? Justify the given statement with reference to baby seagull's fear. (His First Flight)", "answer": "Though flight is natural, the seagull was crippled by fear, not by physical effort. He was certain his wings would never support him, so the mere thought of the plunge over the vast sea terrified him. His hesitation, self-doubt and the panic of being left alone drained him mentally, making the 'strange exercise' of attempting to fly exhausting. Here 'plunge' literally means his leap off the ledge and metaphorically a bold step into independence despite fear.", "explanation": "Point clear hai: seagull thaka shareer se nahi, DAR se. Wings to theek thi, par confidence zero tha aur akela chhod diya gaya tha. 'Plunge' ka double meaning bhi important - literal = cliff se chhalaang, metaphorical = darr ke bawajood independence ki taraf bada kadam. Exam mein fear + self-doubt + loneliness teeno likhna, marks pakke.", "years": ["2024", "2025", "2026"], "papers": 4, "raw": 7, "marks": 3, "types": ["Literature-SA"], "score": 13}, {"key": "FP5-64", "chapter_code": "FP5", "chapter_name": "Glimpses of India", "unit": "First Flight: Prose", "topic": "Central theme / message (A Baker from Goa)", "question": "Why is the baker very important to the village folk? / How are the cultural and social fabric of Goa closely knit with the traditional baker and his bread? (Glimpses of India – A Baker from Goa)", "answer": "Bread is woven into Goan culture, so the baker remains essential. No celebration is complete without it — sweet bread (bol) for marriage gifts, sandwiches for engagements, cakes and bolinhas for Christmas and festivals. Baking is a hereditary, time-honoured profession (a Portuguese legacy), and bread is a daily staple, making the baker a symbol of community, continuity and social bonding.", "explanation": "Theme: Goa mein har khushi bread ke bina adhoori — shaadi mein bol, engagement mein sandwich, Christmas pe cakes & bolinhas. Yeh Portuguese virasat hai aur baking khaandani peshaa. Hook: 'Bol, Bolinhas, Bonding.' 'Importance/culture' wale sab questions mein yahi celebration-examples likho — specific cheezein naam se likhna marks badhata hai.", "years": ["2023", "2025", "2026"], "papers": 4, "raw": 6, "marks": 3, "types": ["Literature-SA"], "score": 12}, {"key": "FP8-90", "chapter_code": "FP8", "chapter_name": "The Sermon at Benares", "unit": "First Flight: Prose", "topic": "Value / life-lesson", "question": "Explore the theme of loss as it is depicted in both the 'Ball Poem' and 'The Sermon at Benaras', highlighting the inevitable nature of this aspect in life.", "answer": "These comparative questions pair The Sermon at Benares with another text on shared themes of loss, grief, faith and love. Key links: like the boy losing his ball (The Ball Poem) or Lencho's ruined crop (A Letter to God), Kisa Gotami's loss teaches that suffering and impermanence are inevitable. Faith differs - Lencho's blind faith in God versus Kisa's path to self-enlightenment through Buddha. With For Anne Gregory, the shared idea is that clinging to the temporary (beauty, life, possessions) causes pain, while accepting reality and spiritual realisation bring true peace and love.", "explanation": "Yeh cross-text comparison wale 6-markers hain - Sermon + (Ball Poem / Letter to God / For Anne Gregory). Skill: dono texts ka common theme pakdo - loss, grief, faith ya love - aur dikhao dono use kaise treat karte hain. Tip: comparison answer mein BOTH texts barabar likhna, sirf Sermon pe focus mat karna warna aadhe marks chale jaayenge. Common thread: attachment = suffering, acceptance = peace.", "years": ["2024", "2025", "2026"], "papers": 4, "raw": 6, "marks": 6, "types": ["Literature-LA"], "score": 12}, {"key": "PM10-245", "chapter_code": "PM10", "chapter_name": "For Anne Gregory", "unit": "First Flight: Poems", "topic": "Title / symbolism", "question": "What is 'yellow hair' a symbol of in \"For Anne Gregory\"? Discuss.", "answer": "'Yellow hair' symbolises outer, physical beauty and the superficial attraction it draws. Young men love Anne only for her golden hair, not her true self. By offering to dye her hair brown, Anne shows that such beauty is changeable and temporary, proving that most people are drawn to appearance rather than inner worth.", "explanation": "'Yellow hair' = bahari (physical) beauty ka symbol. Yeh batata hai ki log sirf dikhawe se pyaar karte hai, asli insaan se nahi. Anne baal rangne ko taiyaar hai — matlab yeh beauty badal sakti hai, permanent nahi. Memory hook: 'yellow hair = upar wali sundarta, andar wali nahi'. Symbol wale question mein hamesha 'superficial vs true self' likho.", "years": ["2023", "2025", "2026"], "papers": 4, "raw": 6, "marks": 3, "types": ["Extract-SA", "Literature-SA"], "score": 12}, {"key": "PM3-267", "chapter_code": "PM3", "chapter_name": "A Tiger in the Zoo", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "Why is the tiger stalking the length of his cage? / Why does the tiger in the zoo ignore the visitors? / The length of his cage highlights the ___ (limited space) in which the tiger is confined.", "answer": "Locked in a concrete cell with his strength behind bars, the tiger paces the limited length of his cage out of restlessness and frustration. He ignores the visitors as a silent protest — they are part of the daily routine of his captivity; his natural instincts are dulled, so he shows quiet rage and longs for the freedom he has lost. ('The length of his cage' stresses the LIMITED space he is confined to.)", "explanation": "Cage mein band tiger baar-baar cage ki length naapta hai — ye restlessness aur frustration ki nishaani hai. Visitors ko ignore karna = silent protest, kyunki woh roz ka tamasha ban chuka hai aur uska natural instinct dab gaya hai. Hook: 'stalking the length' = bechaini; 'ignoring visitors' = khamosh virodh + lost identity.", "years": ["2024", "2025", "2026"], "papers": 4, "raw": 15, "marks": 1, "types": ["Extract-MCQ", "Extract-SA", "Literature-SA"], "score": 12}, {"key": "FW6-154", "chapter_code": "FW6", "chapter_name": "The Making of a Scientist", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "Justify how Ebright's mother played an important part in his becoming a scientist.", "answer": "After his father died, his mother was his whole life and sole companion. She took him on trips, bought him a microscope, telescope and other equipment, set him little problems to solve, and kept him busy and learning. Crucially she gifted him 'The Travels of Monarch X', which opened science to him, and she encouraged him even when he lost — fuelling his scientific temperament.", "explanation": "Maa Ebright ki sabse badi support thi — father ki death ke baad wahi sab kuch thi. Trips, microscope, books aur problems de kar uska dimaag tez kiya, aur 'Travels of Monarch X' gift karke science se introduce karaya. Memory hook: 'mother = first teacher + biggest cheerleader'. Haar ke baad bhi encourage karti thi — yeh point zaroor likhna.", "years": ["2024", "2025", "2026"], "papers": 4, "raw": 6, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 11}, {"key": "GR1-199", "chapter_code": "GR1", "chapter_name": "Tenses", "unit": "Grammar", "topic": "Conditionals (if-clauses) & polite 'would'", "question": "Complete the following sentence by choosing the correct option : If we had consulted the engineer, we _____ this mistake. (A) would avoid (B) will avoid (C) would have avoided (D) had avoided", "answer": "would have avoided — Third conditional (unreal past): 'If + had + V3, ... would have + V3' (If we had consulted... we would have avoided). First/zero conditional uses present in the if-clause (If we stand together, we'll be a team). 'Would' also softens requests politely (I would like to...).", "explanation": "Imaginary past (jo hua hi nahi) ke liye Third Conditional: 'If + had + third form, ... would have + third form' (If we HAD consulted, we WOULD HAVE avoided; If Hemant HAD taken...). Future-real shart ke liye if-clause mein present (If we stand together, we'll...). Aur politeness ke liye 'would like' use hota hai. Trap: 'had taken' wale half ke saath dusra half 'would have + V3' aata hai — 'would avoid' nahi.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 8, "marks": 1, "types": ["Grammar"], "score": 11}, {"key": "PM4-275", "chapter_code": "PM4", "chapter_name": "How to Tell Wild Animals", "unit": "First Flight: Poems", "topic": "Tone / mood", "question": "What kind of atmosphere/tone is created through these lines? (humorous, mysterious, aggressive, confusing, fearful) / The tone of the poet is __________ (playful and humorous / serious and confused).", "answer": "The tone/atmosphere is playful, humorous and light. The speaker's disposition while describing the chameleon is playful. The poet writes ‘a novice might nonplus’ instead of ‘might get confused’ because it rhymes (with ‘thus’) and adds humour. Two chameleon traits from the extract: it is small like a lizard, has no ears or wings, and changes colour to blend in.", "explanation": "Poem ka mood poori tarah mazaakiya aur playful hai - koi darr ya gambhirta nahi. Poet jaan-boojh ke bhaari shabd 'nonplus' use karta hai kyunki woh 'thus' ke saath rhyme karta hai aur hansi laata hai. Hook: agar tone poochhein toh 'humorous + playful' likho, aur reason mein rhyme ya wordplay zaroor mention karo.", "years": ["2023", "2024", "2026"], "papers": 4, "raw": 14, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 11}, {"key": "FP5-62", "chapter_code": "FP5", "chapter_name": "Glimpses of India", "unit": "First Flight: Prose", "topic": "Central theme / message (Coorg)", "question": "Coorg has been defined as a piece of heaven by the writer. Justify. (Glimpses of India – Coorg)", "answer": "Coorg is called a piece of heaven for its breathtaking natural beauty — rolling hills, evergreen rainforests and coffee plantations — rich wildlife, and a pleasant climate (September to March). The invigorating coffee-scented air, hospitable Kodava culture, and thrilling adventure sports like river-rafting, trekking and rock-climbing turn even laid-back visitors into adventure-lovers, making it truly heaven on earth.", "explanation": "'Piece of heaven', 'kingdom of heaven', 'tourist destination', 'surprises' — sab ek hi baat: Coorg kyun swarg jaisa hai. Points: nature (hills, rainforest, coffee), wildlife, mausam, aur adventure sports. Hook: 'Nature + Coffee + Adventure = Heaven.' 3-4 alag points doge to pura 3 marks pakka.", "years": ["2024", "2025"], "papers": 4, "raw": 7, "marks": 3, "types": ["Literature-SA"], "score": 10}, {"key": "FW3-125", "chapter_code": "FW3", "chapter_name": "The Midnight Visitor", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "How did Ausable get rid of Max without using a weapon. (The Midnight Visitor)", "answer": "Ausable, a clever spy, invented a story about a non-existent balcony under his window and a 'police' check for his secret papers. When the waiter Henry knocked, Ausable passed it off as the police. Terrified of arrest, Max leapt out of the window onto the imaginary balcony and fell to his death - all without Ausable firing a single shot.", "explanation": "Yaad rakh: Ausable ne koi gun nahi chalai, sirf dimaag chalaya. Do jhooth jode - ek fake balcony, ek fake police knock. Max dono pe yakeen kar gaya aur khidki se kood gaya. Memory hook: 'balcony + knock = Max gone'. Likhte waqt teeno cheezein zaroor likh: balcony ki kahani, Henry ka knock, aur Max ka khidki se koodna.", "years": ["2023", "2025"], "papers": 4, "raw": 9, "marks": 3, "types": ["Literature-SA"], "score": 10}, {"key": "GR5-217", "chapter_code": "GR5", "chapter_name": "Determiners", "unit": "Grammar", "topic": "Quantifiers (much/many/few/little)", "question": "Fill in the blank choosing the most appropriate option : The news about the retirement of my favourite character gave me ___________ disappointment. (A) many (B) few (C) little (D) much", "answer": "Uncountable nouns → much/little/less (much disappointment, the little help, less number); countable plurals → many/few/fewer (many universities). 'The little' = the small amount that exists.", "explanation": "Sabse pehle dekho noun GINTI me aata hai ya nahi. Count ho sakta hai (universities, people) → many/few/fewer. Count nahi hota (disappointment, knowledge, water, help) → much/little/less. 'A little' = thoda hai (positive), 'little' = na ke barabar. Hook: 'much/little' = liquid wale, 'many/few' = solid count wale. Note: 'less number' galat lagta hai par CBSE key 'less' maangti hai.", "years": ["2023", "2025"], "papers": 4, "raw": 12, "marks": 1, "types": ["Grammar"], "score": 10}, {"key": "PM5-281", "chapter_code": "PM5", "chapter_name": "The Ball Poem", "unit": "First Flight: Poems", "topic": "Title / symbolism", "question": "The poet says that money is external. What inference can be drawn from this statement? Answer in about 40 words.", "answer": "'Money is external' means wealth touches only the outside of life. A dime can buy 'another ball', but it cannot buy back the lost ball's sentimental value or the emotional attachment tied to it. The poet shows the boy is now 'indifferent' to material possessions — some losses are irreplaceable, so all possessions are ultimately temporary.", "explanation": "Yaad rakh: 'Money is external' = paisa bahar ki cheez hai, dil ke attachment ko replace nahi kar sakta. Naya ball mil jaayega par 'wahi' ball aur uski yaadein nahi. Isiliye 'no one buys a ball back' — kuch cheezein paise se wapas nahi aati. Common mistake: ise sirf 'paisa bura hai' mat samajhna; point hai emotional value > material value.", "years": ["2023", "2024", "2025", "2026"], "papers": 4, "raw": 9, "marks": 3, "types": ["Extract-MCQ", "Extract-SA", "Literature-SA"], "score": 10}, {"key": "PM5-283", "chapter_code": "PM5", "chapter_name": "The Ball Poem", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "In 'The Ball Poem', Berryman explores the themes of loss, growing up, and transformation. Mandela also experienced loss of freedom and suffering during his growing years on the basis of his race and colour. Compare and contrast the commonality of themes in both the texts.", "answer": "Common thread = loss and how one grows by accepting/confronting it. 'The Ball Poem' shows the boy accepting personal, material loss and learning impermanence; 'A Sermon at Benaras' (Kisa Gotami/Buddha) teaches acceptance of death's inevitability; 'Anne Frank' shows coping with loss of home/freedom; Mandela's text shows fighting collective loss of freedom. Contrast: the poem/Sermon teach acceptance, while Mandela/Anne show resilience against suffering.", "explanation": "Ye 6-marker comparison/speech format hai — ek saal Sermon at Benaras, ek saal Anne Frank, ek saal Mandela ke saath aata hai. Common point hamesha: LOSS aur usse grow karna. Format ke marks: greeting + body (dono texts ka loss-theme link) + conclusion. Word limit (~120) dhyan rakh. Hook: 'alag kahaniyan, ek hi dard — loss aur acceptance/resilience.'", "years": ["2024", "2025"], "papers": 4, "raw": 10, "marks": 6, "types": ["Literature-LA"], "score": 10}, {"key": "FW2-113", "chapter_code": "FW2", "chapter_name": "The Thief's Story", "unit": "Footprints Without Feet", "topic": "Central theme / message", "question": "Anil's love, trust and compassion influenced Hari Singh's inner conflict and played a crucial role in transforming him. Elucidate.", "answer": "The central message is that trust and compassion can reform even a hardened criminal. Anil never suspects or scolds Hari Singh despite his daily pilfering; he feeds him, pays him and teaches him to read and write. This kindness pricks Hari's conscience, so after stealing Anil's money he returns it and chooses an honest, educated life - proving faith and respect reform a person better than punishment.", "explanation": "Yaad rakh: is kahani ka theme ek line mein hai - 'pyaar aur trust insaan ko badalte hain, sazaa nahi'. Anil kabhi Hari ko daantta nahi, balki padhaana shuru karta hai, aur yahi cheez Hari ka dil pighla deti hai. Jab bhi 'transform/reform/compassion/empathy over punishment' wala question aaye, do textual proof do - (1) Anil padhaata-likhata hai, (2) chori ke baad bhi gussa nahi karta. Hook: 'Kindness is stronger than iron bars'.", "years": ["2023", "2025", "2026"], "papers": 4, "raw": 8, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 9}, {"key": "GR2-200", "chapter_code": "GR2", "chapter_name": "Modals", "unit": "Grammar", "topic": "Ability (can/could)", "question": "Fill in the blank by choosing the correct option. We _________ help the poor. (a) can (b) could (c) may (d) might", "answer": "'can' = present ability/capacity ('we CAN help', 'only we CAN save it', 'Can pick the look'); 'could' = past ability ('Earlier money COULD buy much more'). Rule: can/could express what someone is able to do.", "explanation": "Beta, 'can' ka matlab hai abhi karne ki kaabiliyat — 'we can help the poor', 'only we can save the planet'. Aur 'could' uska past hai: jo pehle ho sakta tha — 'Earlier money could buy much more'. Memory hook: CAN = aaj kar sakte hain, COULD = pehle kar sakte the. Agar sentence mein 'Earlier/used to' jaisa past ho toh could pakka.", "years": ["2023", "2025", "2026"], "papers": 4, "raw": 8, "marks": 1, "types": ["Grammar"], "score": 9}, {"key": "GR2-205", "chapter_code": "GR2", "chapter_name": "Modals", "unit": "Grammar", "topic": "Necessity (need/have to)", "question": "Complete the slogan, by filling in the blank with the correct option. Lets join hands, cultivate conservation, and _________ a greener tomorrow for generations to come. (A) ensuring (B) ensure (C) ensures (D) ensured", "answer": "Non-modal verb-form fillers inside the Modals set: use the base verb after 'and/to' in imperatives ('...and ENSURE a greener tomorrow'), and present simple where the subject acts ('Planting a tree... SAVES the earth'; 'future generation... HAS TO paint'; 'bosses EXPECT them'). Rule: match the verb form to the subject/structure, not a modal.", "explanation": "In sawaalon mein modal nahi, sahi verb-form chahiye hoti hai — trap hai! Imperative/slogan mein base verb: 'Lets join hands and ENSURE a greener tomorrow'. Jahan subject kaam kar raha ho, present simple: 'Planting a tree SAVES the earth', 'future generation HAS TO paint'. Memory hook: 'and/to' ke baad seedha base verb (ensure, not ensuring/ensures). Pehle dekho ki modal maanga hai ya normal verb.", "years": ["2024", "2025"], "papers": 4, "raw": 4, "marks": 1, "types": ["Grammar"], "score": 9}, {"key": "GR7-230", "chapter_code": "GR7", "chapter_name": "Editing / Error Correction", "unit": "Grammar", "topic": "Article/determiner error", "question": "Identify and correct the error in the given line taken from an agency’s advertisement. Tell us much about your project and we’ll select suitable candidates for you to hire. Use the given format for your response.", "answer": "Error: much -> Correction: more. Pick the right determiner/quantifier: countable plural needs more/most/fewer (not much/less); use a/an/the correctly and 'these/the' for plurals. 'much' (uncountable) is wrong before a count idea here.", "explanation": "Article/determiner: countable plural ke saath much/less NAHI - more/fewer aata hai. 'Tell us MUCH' galat kyunki info countable idea hai -> 'more/something'. a/an vague cheez ke liye, THE specific ke liye, plural ke saath 'these/the'. Hook: count kar sakte ho? -> many/more/fewer. Count nahi kar sakte (water, info)? -> much/less.", "years": ["2023", "2024", "2025"], "papers": 4, "raw": 7, "marks": 1, "types": ["Grammar"], "score": 9}, {"key": "FP1-3", "chapter_code": "FP1", "chapter_name": "A Letter to God", "unit": "First Flight: Prose", "topic": "Incident / plot point", "question": "In what manner did Lencho's cornfield suffer damage? Did he hold any expectations of receiving assistance? (A Letter to God)", "answer": "A heavy hailstorm fell on Lencho's ripe cornfield, and within minutes the whole crop was destroyed – not a leaf remained, leaving his family facing a year of hunger, so that night turned sorrowful. But Lencho did not lose hope: with deep faith that God would help, he wrote a letter to God asking for 100 pesos to feed his family and sow again.", "explanation": "Plot ka core scene: pehle achhi baarish, phir hailstorm (ole) ne poori fasal tabaah kar di. Lencho ko bhookh ka dar hai, par faith ke saath God ko letter likhta hai. Damage/sorrowful-night/why-he-wrote/will-help type sab questions mein yahi sequence – ole se fasal khatam, bhookh, phir kalam. Hook: 'ole gire, fasal gayi, kalam uthi'.", "years": ["2023", "2025"], "papers": 4, "raw": 8, "marks": 3, "types": ["Literature-SA"], "score": 8}, {"key": "FW2-116", "chapter_code": "FW2", "chapter_name": "The Thief's Story", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "Hari's character evolves from being deceitful and opportunistic to remorseful and seeking redemption. Describe how his decision to return the money signifies a moral awakening and a newfound appreciation for Anil's kindness and mentorship.", "answer": "Hari Singh begins as a cunning fifteen-year-old thief who lies and rationalises his stealing - telling himself Anil is careless, extravagant and underpays him. Working for Anil, who feeds, trusts and educates him, slowly awakens his conscience. After robbing Anil he cannot enjoy the money; the thought of losing Anil's affection and his chance to learn drags him back to return it. His genuine, relieved smile at the end - unlike his earlier scheming smiles - marks his moral awakening into an honest, hopeful person.", "explanation": "Hari ka safar dekho: shuru mein chalaak chor (jo apni chori ko bhi justify karta hai - 'Anil to paisa udaata hi hai'), ant mein imaandaar ladka. Uska 'appealing smile' pehle fake/manipulative tha, ant mein genuine khushi aur relief wala. Money lautana = moral awakening, kyunki ab use paisa nahi, education aur Anil ka pyaar zyada keemti lagta hai. Hook: 'chor se sachcha insaan'.", "years": ["2023", "2025"], "papers": 4, "raw": 8, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 8}, {"key": "FW8-172", "chapter_code": "FW8", "chapter_name": "Bholi", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "How did education transform Bholi into a fearless, bold and confident girl?", "answer": "Bholi (Sulekha) begins as a neglected child - a fall in infancy left her dull and stammering, smallpox left pockmarks, and her own family treated her as a burden. At school her teacher's love and patient encouragement cured her stammer and built her confidence. By the end she is a fearless young woman who refuses to marry the greedy Bishamber, stands up against her father's humiliation, and resolves to support her parents and become a teacher. Her arc moves from timid and rejected to bold, self-respecting and independent - true education in action.", "explanation": "Character arc matlab Bholi ka safar - shuru se ant tak ki transformation. Start: dull, stammering, pockmarked, ignored. End: confident, bold, dowry ko reject karne wali. Diary-entry wale questions bhi yahin aate hain - bas first person mein likhna ('Aaj maine...'). Memory hook: 'Sulekha = Bholi', and remember the THREE stages: rejected child -> nurtured student -> fearless woman.", "years": ["2023", "2024", "2025"], "papers": 4, "raw": 10, "marks": 6, "types": ["Literature-LA"], "score": 8}, {"key": "PM3-261", "chapter_code": "PM3", "chapter_name": "A Tiger in the Zoo", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "The poet's skillful use of imagery effectively depicts the confinement and frustration of the tiger. Elaborate in about 40 words. / Identify and name any one figure of speech in the above extract.", "answer": "Norris uses vivid imagery — 'vivid stripes', 'pads of velvet quiet', 'quiet rage', 'brilliant eyes/stars' — to show the tiger's majesty alongside his suppressed power and frustration in captivity. Devices include metaphor ('pads of velvet'), oxymoron ('quiet rage'), alliteration ('stalks…stripes…shadow') and personification. The contrast 'stalks' vs 'few steps' marks his confidence vs his confined reality.", "explanation": "Imagery = aise word-pictures jo dimaag mein scene bana dein. Yahan 'vivid stripes', 'velvet paws', 'brilliant stars' — saath hi 'quiet rage' jo uski andar ki ghutan dikhata hai. Devices yaad rakho: metaphor, oxymoron (quiet rage), alliteration, personification. 'Stalks' vs 'few steps' = confidence vs qaid ka contrast. Hook: imagery question = 2-3 phrases quote karke unka effect likho.", "years": ["2023", "2024", "2025"], "papers": 4, "raw": 21, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 8}, {"key": "RD1-333", "chapter_code": "RD1", "chapter_name": "Discursive Passage (skills)", "unit": "Reading", "topic": "Analogy", "question": "Complete the following analogy correctly with a word from paragraph 2. aroma : cooking ; fragrance : ....................................", "answer": "STRATEGY (skill-practice): First name the RELATIONSHIP in the given pair (e.g. aroma : cooking = a smell produced BY a thing). Then apply the exact same relationship to find the missing word, taking it from the stated paragraph when asked (fragrance : flowers). For 'select the option that corresponds to the relation', identify the logic (here: opposite directions up/down) and pick the option with the same logic (gather/disperse). Keep the order and type of relation identical.", "explanation": "Analogy mein pehle pair ka RISHTA samjho (aroma : cooking = khushboo jo cheez se aati hai), phir wahi rishta naye shabd pe lagao (fragrance : flowers). 'Relation corresponds' waale MCQ mein logic pakdo (jaise up/down = opposite directions) aur same logic waala option chuno (gather/disperse). Order aur type same rakhna - ulta-pulta nahi.", "years": ["2023", "2025"], "papers": 4, "raw": 12, "marks": 1, "types": ["Reading-MCQ", "Reading-SA"], "score": 6}, {"key": "FW5-147", "chapter_code": "FW5", "chapter_name": "Footprints Without Feet", "unit": "Footprints Without Feet", "topic": "Extract-based comprehension", "question": "[Footprints Without Feet] How is 'fire' or 'started' used? What does 'spirits' mean?", "answer": "Vocabulary-in-context sub-questions: 'spirits' = ghosts; 'fire' (destruction) matches 'The Amar Palace was destroyed by the fire'; 'started' (jolted/startled) matches 'the sleeping Raman started and jumped out of bed'; analogy Disappeared:Vanished :: Extraordinary:Remarkable; 'tongues wagging' = a source of gossip/idle speculation. Always pick the meaning that fits THIS passage's sense. (approx 45 words)", "explanation": "Yeh saare vocab-in-context aur analogy sub-questions hain - shabd ka matlab sentence ke hisaab se. 'started' yahan 'chaunk gaya' hai (movie 'started' nahi), 'fire' = aag se barbaadi, 'spirits' = bhoot. Hook: 'passage ka sense pakdo, dictionary ka pehla matlab nahi'. Analogy: synonym dhundo (Extraordinary = Remarkable).", "years": ["2023", "2024"], "papers": 4, "raw": 15, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 5}, {"key": "FP2-14", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "How did Nelson Mandela's understanding of freedom change over the course of time? In what way did his yearning for freedom alter the course of his life?", "answer": "As a boy Mandela thought he was free - free to run, swim and roam the fields. As a young man he wanted transitory freedoms - to stay out, earn, marry and raise a family. Slowly he realised these were illusions; he and all Blacks were not free. This 'hunger for freedom' transformed him from a frightened young man into a bold revolutionary who joined the ANC, seeing freedom as indivisible - no one is free until all are free.", "explanation": "Mandela ki freedom ki samajh stages mein badli: bachpan (khelne ki azaadi) -> jawani (apni zindagi jeene ki) -> adulthood (poori jaati ke liye azaadi). Memory hook: 'illusion of freedom -> hunger for freedom.' Yahi bhookh ne unhe law-abiding citizen se revolutionary bana diya. 'Freedom is indivisible' line zaroor likh.", "years": ["2025", "2026"], "papers": 3, "raw": 6, "marks": 3, "types": ["Literature-SA"], "score": 11}, {"key": "FW7-163", "chapter_code": "FW7", "chapter_name": "The Necklace", "unit": "Footprints Without Feet", "topic": "Central theme / message", "question": "In ‘The Necklace’, Madam Loisel spends years repaying a debt for a necklace that was never valuable. How does this irony expose the illusion of wealth and the consequences of chasing appearances?", "answer": "The cruel irony is that Matilda ruined ten years repaying a debt for a necklace that was fake — worth almost nothing. Her sacrifices were thus in vain, all for superficial show. A single honest confession to Madame Forestier could have saved her, but fear of judgement and false pride stopped her. The irony exposes the illusion of wealth and proves that honesty and contentment matter far more than appearances.", "explanation": "Yeh story ka sabse bada irony hai — jis necklace ke liye 10 saal barbaad kiye, woh tha hi nakli! Agar Matilda sach bol deti to itni takleef hoti hi nahi. Lesson: honesty + contentment > dikhawa. Hook: 'Nakli haar, asli barbaadi'. Jab bhi 'sacrifices in vain', 'confession', ya 'illusion of wealth' aaye — isi irony ko centre mein rakho.", "years": ["2025", "2026"], "papers": 3, "raw": 5, "marks": 6, "types": ["Literature-LA"], "score": 11}, {"key": "FW9-182", "chapter_code": "FW9", "chapter_name": "The Book that Saved the Earth", "unit": "Footprints Without Feet", "topic": "Central theme / message", "question": "The play, 'The Book that Saved the Earth', uses humour and misunderstandings between the Martians and Earthlings to explore the themes of perception and cultural differences. Comment.", "answer": "The play shows how misreading another culture breeds needless fear and conflict. The Martians, ignorant of human humour and poetry, take ordinary nursery rhymes and objects literally — mistaking a library for a barn, books for sandwiches/hats, and 'Mistress Mary' or 'Humpty Dumpty' for coded military threats. Their overconfidence and half-baked information turn harmless rhymes into imagined weapons, causing panic and a near-invasion. The message: understanding, awareness and humility prevent confusion and disaster that cultural ignorance creates.", "explanation": "Yaad rakh — yeh play ka core message hai: 'cultural misunderstanding se chaos aata hai.' Martians ko human humour aur poetry samajh hi nahi aati, isliye woh masoom rhymes ko hathiyaar samajh lete hain. Theme ek line mein: ignorance + arrogance = confusion. Memory hook: 'samajhne se pehle ghabra gaye!' Same answer bahut tareekon se poocha jaata hai (perception, cultural differences, awareness) — sab ek hi point pe aate hain.", "years": ["2025", "2026"], "papers": 3, "raw": 7, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 11}, {"key": "FW9-183", "chapter_code": "FW9", "chapter_name": "The Book that Saved the Earth", "unit": "Footprints Without Feet", "topic": "Central theme / message", "question": "In 'The Book That Saved the Earth', how does the play use humour and irony to comment on both futuristic technology and human assumptions? What message do you think the author conveys through the Martians' misinterpretation of a nursery rhyme?", "answer": "The play's central irony is that mighty, technologically advanced Martians are defeated not by weapons but by an old book of nursery rhymes they cannot understand. Think-Tank's arrogance and blind faith in technology make him misread innocent rhymes as Earth's secret military code. The humour exposes how overconfidence and 'wit over power' work: true strength lies in human intellect, creativity and imagination, not gadgets. The author's message — knowledge and humility matter more than pride, and even a simple book can save the world.", "explanation": "Irony pakad le: super-advanced Martians ek bachchon ki rhyme book se darr ke bhaag jaate hain! Yeh 'wit over power' theme hai — asli taakat dimaag aur creativity mein hai, technology mein nahi. Author keh raha hai: ghamand aur blind tech-bharosa khatarnaak hai, humility zaroori hai. Hook: 'book ne Earth bachaayi, missile ne nahi.' Books decline ho rahi hain par yahaan ek book hi hero hai — isi angle se bhi yeh question aata hai.", "years": ["2025", "2026"], "papers": 3, "raw": 8, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 11}, {"key": "PM8-313", "chapter_code": "PM8", "chapter_name": "Fog", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "What is the contribution of the extended metaphor in the poem \"Fog\"?", "answer": "The whole poem is built on one extended metaphor: the fog is compared to a cat. It 'comes on little cat feet', 'sits looking' on 'silent haunches' and then 'moves on'. This animal imagery makes the fog seem alive, soft, silent and graceful, capturing its quiet, almost stealthy arrival and departure. The cat image evokes softness (not roughness or hardness) and shows nature moving gently yet powerfully over the human world.", "explanation": "Poora poem ek hi metaphor par tika hai: fog = billi (cat). Sandburg kehte hain fog 'little cat feet' par aata hai, chup-chaap 'haunches' par baithta hai aur phir chala jaata hai. Yaani jaise billi bina awaaz ke aati-jaati hai, waise hi fog dheere se sheher ko dhak leta hai. Memory hook: 'Fog = silent cat' — soft, silent, graceful. Cat feet ka matlab hamesha SOFTNESS hota hai, rough/hard nahi. Yeh 'extended metaphor' kehlata hai kyunki ek hi comparison poore poem mein chalti rehti hai.", "years": ["2025", "2026"], "papers": 3, "raw": 8, "marks": 1, "types": ["Extract-MCQ", "Extract-SA", "Literature-SA"], "score": 11}, {"key": "FP1-8", "chapter_code": "FP1", "chapter_name": "A Letter to God", "unit": "First Flight: Prose", "topic": "Value-based / life-lesson", "question": "How do Lencho in ‘A Letter to God' and Kisa Gotami in ‘The Sermon at Benares' respond to their experiences of suffering and loss? How did they overcome their respective losses?", "answer": "Both face deep loss but respond differently. Lencho suffers a material loss – his crops – and responds with unwavering faith, writing to God and trusting in a miracle; faith and hope carry him through. Kisa Gotami suffers an emotional loss – her child's death – and at first refuses to accept it, but through Buddha's mustard-seed lesson she realises death is universal and overcomes grief through wisdom and acceptance. One heals through faith, the other through acceptance.", "explanation": "Yeh paired-text compare question hai (Lencho vs Kisa Gotami). Dono ka loss alag: Lencho ka maddi (fasal), Kisa ka emotional (beta). Lencho faith se sambhalta hai, Kisa acceptance/wisdom se. Compare mein hamesha similarity + difference dono likho. Hook: 'Lencho – vishwaas se, Kisa – sweekaar se'.", "years": ["2024", "2026"], "papers": 3, "raw": 9, "marks": 6, "types": ["Literature-LA"], "score": 10}, {"key": "FP1-9", "chapter_code": "FP1", "chapter_name": "A Letter to God", "unit": "First Flight: Prose", "topic": "Value-based / life-lesson", "question": "Analyse the similarities and differences between the young seagull from \"Two Stories About Flying\" and Lencho from “A Letter to God\", and provide a rationale for the significant role faith plays in challenging and adverse situations in life.", "answer": "These comparisons all show that in adversity, faith or trust becomes a lifeline. Lencho trusts God; the young seagull learns to trust himself (with his family's push) and flies; Mandela draws inner strength and faith in justice; the pilot in 'The Black Aeroplane' is saved by an unknown helper he trusts blindly. In each case a person faces a crisis, holds on to faith or hope, and receives help – often from an unexpected source. Faith turns helplessness into courage.", "explanation": "Yeh saare paired-text questions hain jahan Lencho ko kisi aur character se compare karte hain – seagull, Mandela, ya Black Aeroplane pilot. Common thread ek hi: musibat mein faith/hope insaan ko bacha leta hai, aur madad aksar unexpected jagah se aati hai. Compare mein: dono ka sankat + dono ka faith + result. Hook: 'sankat alag, sahaara ek – vishwaas'.", "years": ["2025", "2026"], "papers": 3, "raw": 7, "marks": 6, "types": ["Literature-LA"], "score": 10}, {"key": "FP6-70", "chapter_code": "FP6", "chapter_name": "Mijbil the Otter", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "Mijbil's transportation to England was no less than a nightmare for the author. Justify the statement using incidents from the lesson. (Mijbil the Otter)", "answer": "Mij was flown to England packed in a small box, which airline rules demanded. Left alone, he tore the box's lining to shreds and injured himself, so when Maxwell opened it there was an 'appalling spectacle'—dried blood and an exhausted, blood-splattered otter. On the plane Mij escaped, causing squawks and chaos, making the journey a nightmare.", "explanation": "Transport = sabse important incident. Sequence yaad rakh: chhota box → lining phaad di → khoon, injury (appalling spectacle) → plane mein bhaag gaya → hungama. Hook: 'box-blood-escape'. 'Appalling spectacle' wala question bhi isi incident ka part hai, toh same points kaam aayenge.", "years": ["2025", "2026"], "papers": 3, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 10}, {"key": "FW2-117", "chapter_code": "FW2", "chapter_name": "The Thief's Story", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "How did Hari Singh meet Anil? Why did Anil forgive Hari Singh and promise to pay him regularly? / How and when did Hari Singh meet Anil and why did he lie that he knew how to cook? / Why did Hari Singh approach Anil?", "answer": "Hari Singh, an experienced young thief, met Anil at a wrestling match and marked him as an easy-going, kind and trusting target. To get close he lied that he could cook, and when his cooking proved terrible Anil simply laughed and offered to teach him - giving Hari food, shelter and work. Later, aware of the theft, Anil forgave Hari and promised a regular salary, believing in his goodness and reposing trust in him.", "explanation": "Mulaqat ka scene yaad rakh: 'wrestling match' mein Anil ko easy target samajh kar Hari ne cooking ka jhooth bola taaki kaam mil jaaye. Yeh plot ka opening hai. Forgiveness wale part mein add karo - Anil sazaa nahi deta, salary ka vaada karta hai. Common mistake: meeting ki jagah 'wrestling match' bhoolna mat, aur jhooth ka reason 'kaam paane ke liye' likhna.", "years": ["2025", "2026"], "papers": 3, "raw": 3, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 10}, {"key": "FW2-118", "chapter_code": "FW2", "chapter_name": "The Thief's Story", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "How do Anil's initial reaction to Hari Singh's cooking and his subsequent actions reflect Anil's evolving relationship with Hari Singh? / Why does Hari Singh find it pleasant to work for Anil, though he was a thief? / What makes Hari Singh describe Anil as the most trusting person he had ever met?", "answer": "Though Hari's first meal is terrible, Anil only smiles, pats his head and offers to teach him to cook, read and write - turning from a casual master into a caring mentor. Hari finds working for him pleasant because Anil is gentle, affectionate and never overworks or suspects him. Anil is 'the most trusting person' Hari ever met: he believes Hari's lies, never checks the accounts, leaves money around and hands over his house key, despite Hari's daily pilfering. This easy trust makes Hari unable to rob him cheerfully.", "explanation": "Anil aur Hari ka rishta dosti aur mentorship mein badal jaata hai - khaana kharaab tha phir bhi Anil hasta hai aur padhaane lagta hai. Hari ko kaam pleasant lagta hai kyunki Anil bharosemand, naram aur kabhi shak nahi karta. 'Most trusting person' ke proofs ratt lo: jhooth maan leta hai, hisaab nahi poochta, paisa khula chhod deta hai, ghar ki chaabi de deta hai. Yahi trust Hari ko badalta hai.", "years": ["2025", "2026"], "papers": 3, "raw": 7, "marks": 3, "types": ["Literature-SA"], "score": 10}, {"key": "FW6-153", "chapter_code": "FW6", "chapter_name": "The Making of a Scientist", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "Richard Ebright’s mother gifted him a book which became the turning point in his life. Discuss.", "answer": "The book was 'The Travels of Monarch X'. It opened the whole world of science to Ebright by showing how monarch butterflies migrate. It invited readers to tag butterflies for Dr Urquhart, so Ebright began tagging (sticking light adhesive labels on the wings), connected with Urquhart, and started the research that eventually led to his cell theory.", "explanation": "Turning-point book ka naam yaad rakh: 'The Travels of Monarch X' — maa ne gift ki thi. Isi ne butterfly migration dikhayi aur Dr Urquhart se jodaa. Memory hook: ek kitaab ne future scientist bana diya. Tagging ka matlab: wings par halki sticky tag lagana taaki doosre researchers track kar sakein.", "years": ["2025", "2026"], "papers": 3, "raw": 3, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 10}, {"key": "FW7-167", "chapter_code": "FW7", "chapter_name": "The Necklace", "unit": "Footprints Without Feet", "topic": "Incident / plot point", "question": "How did Mr. & Mrs. Loisel replace the lost necklace? What kind of life did the Loisels lead thereafter?", "answer": "The Loisels found an identical necklace priced at thirty-six thousand francs. They paid using Loisel's eighteen-thousand-franc inheritance and the rest borrowed from moneylenders at ruinous interest. To repay the debt they led a horrible life of necessity for ten years: they dismissed the maid, changed to a cheap attic lodging, and Matilda did all the heavy housework, washing, bargaining and scrubbing, while Loisel took extra night jobs. The hardship aged her and destroyed her beauty.", "explanation": "Do cheezein puchi jaati hain — (1) naya haar kaise kharida (36,000 francs; 18,000 virasat + baaki udhaar), aur (2) uske baad ki 'horrible life of necessity' (naukrani hata di, sasta ghar, Matilda ne saara kaam khud kiya). Hook: '36,000 francs aur 10 saal ki ghulami'. Numbers aur do-teen hardship details daalo to answer poora lagta hai.", "years": ["2025", "2026"], "papers": 3, "raw": 5, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 10}, {"key": "FW8-175", "chapter_code": "FW8", "chapter_name": "Bholi", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "It is truly said that a good teacher is the light that helps one cross even the darkest of paths through honing their inherent qualities which enable them to shine bright and strong in life. In what ways does Sulekha's teacher epitomize this saying? How did she become the pillar of support and strength for Sulekha?", "answer": "Bholi's teacher is the guiding light of her life. On the first day, when Bholi was terrified, the teacher spoke gently, praised her small efforts, gave her a book and promised that one day she would be the most learned girl in the village so no one would mock her. With patience and compassion she cured Bholi's stammer, nurtured her hidden qualities and built her confidence. These very words and this support became the strength that later let Bholi find her voice, oppose the dowry and choose independence. The teacher truly honed Bholi's inner light until she could shine on her own.", "explanation": "Teacher = chapter ki real hero, 'guiding light'. Yaad rakho uske kaam: pyaar se baat ki, chhoti tareef ki, kitaab di, bola 'tum sabse zyada padhi-likhi banogi'. Yehi words Bholi ka turning point the. 'Teacher's words ka effect' aur 'teacher built confidence' - sab ek hi idea hai. Memory hook: teacher ne Bholi ko aawaaz di.", "years": ["2025", "2026"], "papers": 3, "raw": 9, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 10}, {"key": "FW9-186", "chapter_code": "FW9", "chapter_name": "The Book that Saved the Earth", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "How did Apprentice Noodle act smartly by suggesting something about the book without offending Think-Tank? (The Book That Saved The Earth)", "answer": "Noodle is the real intelligence of the team — tactful, humble and quick-witted. Knowing Think-Tank's huge ego, he never contradicts him openly. Instead he bows with extreme deference, flatters him, asks permission to speak, and offers his corrections as tiny, 'insignificant' suggestions or mere data. By letting Think-Tank take the credit, Noodle gently steers him toward the truth while protecting both his master's pride and his own position. His tact and intelligence quietly help save the situation.", "explanation": "Noodle ka character: asli smart bandaa, par bahut tactful aur vinamr. Boss ke ego ko hurt kiye bina, flattery aur 'permission lekar' apni baat rakhta hai — corrections ko 'chhoti si suggestion' bana ke. Hook: 'Noodle = silent genius, diplomacy ka master.' Inference clue '6b.i' wala (3466) bhi Noodle ke dangerous-civilisation samajhne se juda hai, isliye yahin.", "years": ["2024", "2026"], "papers": 3, "raw": 5, "marks": 3, "types": ["Extract-SA", "Literature-SA"], "score": 10}, {"key": "PM1-242", "chapter_code": "PM1", "chapter_name": "Dust of Snow", "unit": "First Flight: Poems", "topic": "Title / symbolism", "question": "In the poem 'Dust of Snow', the 'hemlock tree' and the 'crow' hold specific meanings. Elaborate on how these symbols are utilized within the context of the poem.", "answer": "The crow and hemlock tree are traditional symbols of darkness, death and sorrow (black). Snow is white — a symbol of purity, hope and renewal. Frost cleverly reverses the negative symbols: the gloomy crow and hemlock become the very source of a positive change, showing hope and inner renewal can emerge even from dark, despairing moments.", "explanation": "Symbolism wala question — yaad rakh: crow + hemlock = black, gloom, death, sadness; snow = white, purity, hope, renewal. Frost ka twist: negative symbols ko reverse karke unse hi positivity nikalta hai. Black-white contrast pe likhna ho toh dono colours ka deeper meaning batao. Hook: 'Andhere (black) mein se ujaala (white) — yahi poem ka magic hai.'", "years": ["2025", "2026"], "papers": 3, "raw": 7, "marks": 3, "types": ["Extract-MCQ", "Literature-SA"], "score": 10}, {"key": "PM4-279", "chapter_code": "PM4", "chapter_name": "How to Tell Wild Animals", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "Every creature possesses a unique characteristic that defines it, and this trait is closely linked to its nature. This concept is beautifully illustrated in ‘How to Tell Wild Animals.’ Elucidate. / What lesson does the poet convey about nature?", "answer": "Each animal is identified by a unique trait tied to its nature — the bear's crushing ‘hug’, the crocodile's false tears, the tiger's stripes, the leopard's leaping, the chameleon's camouflage. The poem's lesson is that nature is varied and unpredictable; we must observe closely and respect/be wary of wild creatures. (The wild tiger here is free and feared, unlike the caged, helpless tiger of ‘A Tiger in the Zoo’.)", "explanation": "Central theme: har jaanwar ki ek unique pehchaan hoti hai jo uski nature se judi hoti hai - bear ka hug, crocodile ke aansu, tiger ki stripes, chameleon ka camouflage. Seekh: prakriti vividh aur anpredictable hai, dhyaan se dekho aur wild animals ka samman/savdhani rakho. Hook: theme ek line mein - 'unique traits identify each animal, observe nature with care.'", "years": ["2025", "2026"], "papers": 3, "raw": 5, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 10}, {"key": "PM7-301", "chapter_code": "PM7", "chapter_name": "The Trees", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "The poet Adrienne Rich has used trees as a metaphor for human beings. What do they symbolize? Explain.", "answer": "The trees are a metaphor for human beings — most often read as women confined by a patriarchal society. Their movement from the house to the forest symbolizes liberation, the desire for independence and self-discovery, and the painful but necessary struggle to break free from confinement and reclaim their natural freedom.", "explanation": "Iss poem ka core theme ek line mein: 'trees = women/nature breaking free from confinement.' Ghar (house) = patriarchy/qaid, forest = aazaadi. Jab bhi 'central theme', 'symbolise', 'broader theme of ___', ya 'emotion and exhaustion' poocha jaye — yahi liberation/self-discovery wala point likhna. Hook: 'Ghar se jungle = qaid se aazaadi.'", "years": ["2024", "2026"], "papers": 3, "raw": 5, "marks": 1, "types": ["Extract-SA", "Literature-SA"], "score": 10}, {"key": "PM7-312", "chapter_code": "PM7", "chapter_name": "The Trees", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[The Trees] What do the roots work on all night? Describe the trees' struggle for freedom.", "answer": "Every part of the trees struggles for freedom: all night the roots work to disengage themselves from the cracks in the veranda floor, the leaves strain toward the glass, the small twigs stiffen with exertion, and the long-cramped boughs shuffle out under the roof. When they finally leave, the house is left empty and silent — cracked veranda, broken glass and only the smell of leaves remaining.", "explanation": "Ye extract trees ki mehnat dikhata hai — har part free hone ki koshish kar raha hai: roots cracks se nikalte hain, leaves glass ki taraf, twigs akad jaate hain, boughs roof ke neeche se shuffle karte hain. 'Shuffling' = half-dazed, disoriented, bahar nikalne ko betaab. Jab trees nikal jaate hain toh ghar khaali, cracked aur silent reh jaata hai. Hook: roots se boughs tak, sab aazaadi ke liye lad rahe hain.", "years": ["2025", "2026"], "papers": 3, "raw": 11, "marks": 1, "types": ["Extract-SA", "Literature-SA"], "score": 10}, {"key": "FP1-0", "chapter_code": "FP1", "chapter_name": "A Letter to God", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "Faith is like a ray of hope in a distressful situation. Discuss ‘A Letter to God' with reference to Lencho's unflinching faith in God. (A Letter to God)", "answer": "The story's central message is the power of unshakeable faith. Though a hailstorm destroys Lencho's only crop, his faith in God never wavers – he writes a letter asking for 100 pesos, certain God will provide. His trust is so absolute that on receiving only 70 pesos he never doubts God, only the post-office staff. Faith gives him hope and dignity in his darkest hour.", "explanation": "Is kahani ka dil ek line mein: 'faith over despair'. Lencho ki fasal barbaad ho jaati hai par Bhagwan par uska bharosa zara bhi nahi hilta. Jo bhi question faith/hope/unwavering belief pe ho, usme yahi point likhna – God ko letter likhna uski andhi shraddha ka proof hai. Yaad rakhne ka hook: 'kheti gayi, par vishwaas nahi gaya'.", "years": ["2025"], "papers": 3, "raw": 5, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 9}, {"key": "FP9-101", "chapter_code": "FP9", "chapter_name": "The Proposal (Drama)", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "How did Chubukov react when Lomov asked for the hand of his daughter in marriage? / What was Chubukov's reaction when he discovered the actual purpose of Lomov's visit?", "answer": "When Chubukov learns Lomov has come to propose to Natalya, he is overjoyed. He had first suspected Lomov wanted to borrow money, but on hearing the real purpose he is delighted — he embraces and kisses Lomov, sheds tears of joy, calls him a son, and blesses the union, having always wished for the match.", "explanation": "Chubukov ka reaction: pehle shak (paisa maangne aaya hoga?), phir proposal sunte hi khushi se phoola nahi samaata — gale lagata hai, chumta hai, aansoo bahata hai, 'beta' kehta hai. Hook: bahar se pyaar, par andar se woh bas beti ki shaadi (aur Lomov ki property) chahta hai.", "years": ["2023", "2026"], "papers": 3, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 9}, {"key": "FW1-109", "chapter_code": "FW1", "chapter_name": "A Triumph of Surgery", "unit": "Footprints Without Feet", "topic": "Incident / plot point", "question": "What does Mr. Herriot mean by \"happy period\" for himself and his partners? Explain. (A Triumph of Surgery)", "answer": "Once Tricki was hospitalised and 'convalescing', Mrs Pumphrey kept sending rich food for him - two dozen fresh eggs daily, bottles of wine and brandy 'to strengthen him'. Herriot and his partners ate and drank all these luxuries themselves. This made it a 'happy period' / a ceremonial lunch for them, and they almost wished Tricki could stay a permanent guest.", "explanation": "Yeh funny incident hai: Mrs Pumphrey 'convalescing' Tricki ke liye eggs, wine, brandy bhejti rehti hai, par woh sab Herriot aur uske dost kha-pee jaate hain! Isliye unke liye yeh 'happy period' / grand lunch ban jaata hai. Hook: 'Tricki ka khaana, doctor ki party.' Irony aur humour dono yahan hai.", "years": ["2024", "2025", "2026"], "papers": 3, "raw": 7, "marks": 3, "types": ["Literature-SA"], "score": 9}, {"key": "PM1-241", "chapter_code": "PM1", "chapter_name": "Dust of Snow", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "'Dust of Snow' highlights the poet's positive attitude towards nature. Comment on how Robert Frost presents the power of nature in his poem.", "answer": "The central message is the healing, transformative power of nature. Frost shows that even a tiny, simple act of nature — snow dusting off a crow — can renew the human spirit and turn a depressed mood into hope. (In contrast pieces like 'Fire and Ice' nature/emotion is destructive; in 'Fog' it is a mysterious, playful presence of change.) Small natural moments carry big emotional impact.", "explanation": "Yeh poem ka central theme hai: nature ki healing aur transformative power. Frost kehta hai ki nature ka ek tiny act bhi insaan ka mood aur spirit renew kar deta hai. Jab 'Fog' ya 'Fire and Ice' se compare karna ho: yahan nature positive/healing hai, 'Fire and Ice' mein emotions destructive, 'Fog' mein nature mysterious/playful. Theme ek line: 'Chhoti nature ki cheezein, bada emotional asar.'", "years": ["2025"], "papers": 3, "raw": 6, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 9}, {"key": "PM4-270", "chapter_code": "PM4", "chapter_name": "How to Tell Wild Animals", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[How to Tell Wild Animals] Crocodiles are identified by their _______. What confusion arises between hyenas and crocodiles?", "answer": "Crocodiles are identified by their tears (weeping). The two behavioural traits shown are the hyena's smiling and the crocodile's crying. A novice is confused because the hyena seems to laugh while the crocodile seems to weep; the crocodile's tears are false and deceptive.", "explanation": "Yeh stanza hyena aur crocodile ko pehchaanne ke baare mein hai. Trick simple hai: hyena hanste hue (merry smiles) aata hai, par jo 'rota' hai woh crocodile hai. Crocodile ke 'aansu' bilkul nakli/dhoka (false and deceptive) hote hain - isi se 'crocodile tears' muhavara aaya. Memory hook: 'Smile = Hyena, Cry = Crocodile.'", "years": ["2023", "2026"], "papers": 3, "raw": 15, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 9}, {"key": "PM6-292", "chapter_code": "PM6", "chapter_name": "Amanda!", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "What is the central idea of the poem as reflected in the lines above ? Answer in about 40 words.", "answer": "The poem contrasts CONTROL with FREEDOM. Amanda symbolises a child's longing for freedom, privacy and space, while her mother represents constant nagging and regulation. The poet shows that excessive control suffocates a child, pushing her to retreat into an imaginative dream-world that is the opposite of her restricted reality.", "explanation": "Central theme ek line mein yaad rakh: 'control vs freedom' - maa control, Amanda freedom. Reality mein tok-tok, daydream mein azaadi - bilkul ulta. Yeh poem batati hai ki zyada rok-tok bachche ko ghutan deti hai. Hook: 'nagging vs daydream'. Yeh hi line orphan/mermaid/Rapunzel sab questions mein kaam aati hai.", "years": ["2024", "2025", "2026"], "papers": 3, "raw": 7, "marks": 2, "types": ["Extract-SA", "Literature-SA"], "score": 9}, {"key": "PM6-299", "chapter_code": "PM6", "chapter_name": "Amanda!", "unit": "First Flight: Poems", "topic": "Value-based / life-lesson", "question": "Amanda from the poem 'Amanda' is a teenager like Anne Frank and lives in her fantasy world whereas Anne is a chatter box. What conversation will Anne Frank have with Amanda about different perspectives of life ? Write your answer in about 120 words.", "answer": "Cross-text comparison (freedom & acceptance): Amanda longs for freedom from parental control, escaping into fantasy. Compared with ANNE FRANK - Anne would advise Amanda to stop fantasising, face situations head-on and stay optimistic, while Amanda would tell Anne to fight for freedom and create her own space. With VALLI (Madam Rides the Bus) - both crave independence; Valli actively plans a bus journey to explore the world. With CUSTARD THE DRAGON - both yearn for acceptance and a life free of criticism, each retreating to a safe haven (fantasy / a 'nice safe cage').", "explanation": "Yeh comparison/long-answer questions hain - dono texts ka connection 'freedom + acceptance' par bana. Amanda = mann hi mann freedom chahti hai (passive). Anne/Valli ke saath: woldon active hain. Custard ke saath: dono criticism se bachna chahte hain. Hook: 'Amanda sochti hai, baaki karte hain'. LA mein dono characters ko barabar samay do aur theme link clearly likho.", "years": ["2024", "2025", "2026"], "papers": 3, "raw": 9, "marks": 6, "types": ["Literature-LA"], "score": 9}, {"key": "FP3-32", "chapter_code": "FP3", "chapter_name": "Two Stories about Flying", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "Family played a vital role in the first flight of the young seagull. Give examples to substantiate the above statement.", "answer": "The family used tough love to push the seagull. His parents scolded him and called shrilly; they praised his brothers and sister to make him jealous; they threatened to let him starve on the ledge. Finally his mother flew past with a piece of fish, dangling it just out of reach. Driven by hunger, he dived for it and thus took his first flight. The family's pressure was both a challenge and the catalyst for his growth.", "explanation": "Family ka role 'dono' tarah ka hai - challenge bhi aur push bhi. Taunting, ignoring, starving = challenge; maa ki fish = final push. Real-life support system bhi aisa hi hota hai - kabhi pyaar se, kabhi sakhti se aage badhata hai. Hook: 'tough love se independence aayi'.", "years": ["2023", "2025", "2026"], "papers": 3, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 8}, {"key": "FP8-84", "chapter_code": "FP8", "chapter_name": "The Sermon at Benares", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "What does the Buddha say about the world?", "answer": "The Buddha taught that the world is afflicted with death and decay - nothing is permanent. Just as ripe fruits are always in danger of falling, all mortals are in danger of death. Weeping and grieving bring no peace of mind; instead pain only grows and the body suffers. The wise are those who understand death is inevitable, do not lament, and pull out the 'arrow' of grief to regain calm. True peace comes from accepting life's truth and letting go of selfish attachment.", "explanation": "Buddha ka core message: duniya temporary hai aur maut sab ke liye pakki hai. 'Ripe fruits fall' line yaad rakh - jaise pake phal gir jaate hain, waise insaan kabhi bhi mar sakta hai. Wise men woh hain jo rote nahi, accept karte hain. Common mistake: sirf Kisa Gotami likhna - yahan Buddha ke teachings (death + decay + rone ka koi fayda nahi) clearly mention karne hain.", "years": ["2023", "2025", "2026"], "papers": 3, "raw": 4, "marks": 3, "types": ["Literature-SA"], "score": 8}, {"key": "FW1-108", "chapter_code": "FW1", "chapter_name": "A Triumph of Surgery", "unit": "Footprints Without Feet", "topic": "Incident / plot point", "question": "What was Mr. Herriot's strict advice? Did Mrs. Pumphrey agree to his advice?", "answer": "Dr Herriot strictly advised Mrs Pumphrey to cut down Tricki's food, stop the sweets and cakes, and give him plenty of exercise. She agreed but did not follow it. Worried that the dog was dangerously fat and unwell, Herriot had planned in advance to hospitalise Tricki - the only way to control his diet, away from Mrs Pumphrey's over-pampering.", "explanation": "Plot point: Herriot ki strict advice = 'kam khilao, mithai band, exercise badhao.' Mrs Pumphrey haan keh deti hai par karti nahi. Isliye Herriot pehle se plan kar leta hai ki Tricki ko hospital le jaana hi ek tareeka hai. Hook: 'Diet + exercise advice → ignored → hospital plan.' Yeh sequence yaad rakhna.", "years": ["2023", "2025", "2026"], "papers": 3, "raw": 5, "marks": 3, "types": ["Literature-SA"], "score": 8}, {"key": "GR3-209", "chapter_code": "GR3", "chapter_name": "Subject–Verb Concord", "unit": "Grammar", "topic": "Quantifiers (number/amount)", "question": "Complete the following newspaper report by filling in the blank : The number of road accidents _______ increased this year. (A) have (B) are (C) has (D) were", "answer": "'THE number of...' = SINGULAR (has/is); 'A number of...' = PLURAL (have/are). Also fractions/percentages take the verb from the noun after 'of': 'Two-thirds of the students WERE' (students plural). A collective noun acting as one body is singular: 'the group of students WAS excited'. So: The number of accidents HAS increased.", "explanation": "Yaad rakho: 'THE number of' = singular (has/was), 'A number of' = plural (have/were). Ekdum ulta lagta hai par yahi rule hai! Fractions (two-thirds, half) me verb 'of' ke baad wale noun se milta hai — 'two-thirds of the students were'. 'Group/team/jury' jab ek unit ho to singular ('group was'). Hook: THE number = THE total = ek number = singular.", "years": ["2023", "2025", "2026"], "papers": 3, "raw": 7, "marks": 1, "types": ["Grammar"], "score": 8}, {"key": "GR6-226", "chapter_code": "GR6", "chapter_name": "Prepositions", "unit": "Grammar", "topic": "Time (in/on/at/since/for)", "question": "Complete the given sentence with the correct option. It was a challenge to meet the expectations of the committee __________ the given time period. (A) along (B) within (C) between (D) into", "answer": "within (time period = inside a limit); upto → into (fit INTO the outlet), on → in (performed IN the theatre), into → in (common IN our country). Rule: within = before a deadline; in = inside a place/area; into = movement to inside.", "explanation": "Time/jagah ke prepositions: 'WITHIN the time period' = deadline ke andar (samay-seema ke bheetar). Plug 'fit INTO the outlet' = andar ghusna
