First Flight: Prose", "topic": "Central theme / message", "question": "How does Valli's journey to the city serve as her initiation into understanding the profound mysteries of life and death, and how does her inquisitive nature shape her perceptions as she encounters these aspects of human existence?", "answer": "The bus journey is Valli's first real encounter with the wider world and with life and death. Wonderstruck on the way out, she is forced to confront mortality when she sees the once-lively cow lying dead. Her curious, observant nature turns a simple outing into a moment of growing up - she moves from childish innocence to a deeper, sadder awareness of life's impermanence.", "explanation": "Yeh chapter ki CENTRAL THEME hai: ek choti bus ride bachpan se samajhdaari tak ka safar ban jaati hai - zindagi aur maut ka pehla saamna. Curiosity use bahar nikaalti hai, par mari gaay use sach dikha deti hai. Memory hook: 'Ek ride = innocence se maturity'. Theme ek line mein yaad rakh: growing up through curiosity, life & death.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 6, "types": ["Literature-LA"], "score": 3}, {"key": "FP9-92", "chapter_code": "FP9", "chapter_name": "The Proposal (Drama)", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Extract from The Proposal (Drama)] What is Lomov pleading for? (A) to be heard (B) bricks for his aunt's grandmother (C) documents of the Meadows (D) for two days time. What is the effect of the 'bake bricks' line on Natalya and why? What does 'can't make head or tail' mean? What is Lomov trying to prove?", "answer": "Lomov is pleading (A) to be heard. The 'bake bricks' line makes Natalya angry/lose her cool, because she believes Oxen Meadows belong to her family and Lomov is wrongly claiming them. 'Can't make head or tail' adds a sense of confusion. Lomov is trying to prove that the Meadows are his and Natalya is wrongly claiming them.", "explanation": "Dusra extract — Lomov bas 'sun lo mujhe' (to be heard) keh raha hai, par Natalya sunti hi nahi. Uska 'bricks' wala point Natalya ko gussa dila deta hai kyunki woh maanti hai Meadows unke hain. 'Can't make head or tail' = kuch samajh nahi aa raha = confusion. Tip: in choti sub-questions mein answer seedha extract se nikalta hai — overthink mat kar.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 3}, {"key": "FP9-94", "chapter_code": "FP9", "chapter_name": "The Proposal (Drama)", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "Engaging in discussions and disputes rarely leads to problem resolution. Support the statement with evidence from the text. (The Proposal)", "answer": "The play proves arguments rarely solve anything. Lomov comes to propose, yet he and Natalya plunge into heated, nonsensical quarrels over Oxen Meadows and over whose dog is better. The disputes only humiliate everyone, cause Lomov physical distress (palpitations, fainting), and nearly wreck the proposal. Nothing is settled by argument — the marriage happens only because Chubukov hastily joins their hands.", "explanation": "Message clear hai: bahas se kabhi masla hal nahi hota, ulta bigad jaata hai. Lomov shaadi ka proposal lekar aaya tha, par Meadows aur dogs ke faltu jhagde mein sab kuch kharab ho gaya — Lomov ko dil ka daura tak pad gaya. Common-mistake warning: yeh value-based question hai, toh text se 2 example (Meadows + dogs) zaroor likhna.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 3}, {"key": "FP9-96", "chapter_code": "FP9", "chapter_name": "The Proposal (Drama)", "unit": "First Flight: Prose", "topic": "Title / symbolism", "question": "Comment on the significance of the title 'The Proposal' in the play. Provide two examples to support your explanation.", "answer": "The title is ironic: the play centres on a marriage proposal that is announced but never actually completed on stage. Lomov arrives to propose to Natalya, yet (1) the proposal is repeatedly derailed by the Oxen Meadows quarrel, and (2) by the fight over the dogs. Chubukov finally forces their hands together amid fresh bickering. The 'proposal' thus drives the whole comic conflict over pride, property and status.", "explanation": "Title 'The Proposal' thoda ironic hai — proposal hota hi nahi, beech mein jhagde shuru ho jaate hain! Do example zaroor do (jaisa question maangta hai): Oxen Meadows ka jhagda aur dogs ka jhagda. Hook: title hi pure conflict ka centre hai — proposal ke chakkar mein hi sab drama.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 3}, {"key": "FW2-121", "chapter_code": "FW2", "chapter_name": "The Thief's Story", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "What led the narrator to believe that 'friends were more trouble than help'?", "answer": "The narrator (Hari Singh) believes friends are more trouble than help because, as a thief who constantly changes his name and moves from place to place to dodge the police, accomplices are a liability - they could recognise him later and reveal his identity. So he prefers to work alone and keeps no lasting friends, valuing his anonymity and safety over companionship.", "explanation": "Note: is question ke OCR answer mein galti se 'Horace' (doosre chapter ka chor) likha hai, par baat Hari Singh par lागू hoti hai - akela chor safe rehta hai. Reason simple hai: chor baar-baar naam aur jagah badalta hai, isliye dost pehchaan kar police ko bata sakte hain. Isliye Hari akela kaam karna pasand karta hai. Hook: 'akela chor, surakshit chor'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 3}, {"key": "FW2-123", "chapter_code": "FW2", "chapter_name": "The Thief's Story", "unit": "Footprints Without Feet", "topic": "Extract-based comprehension", "question": "[Extract from The Thief's Story] What does 'I think he knew I made a little money this way but he did not seem to mind' tell us about Anil? Which best describes Hari's realization while working for Anil? What did Anil promise to teach and how did Hari feel? Fill in the blank: profit/investment.", "answer": "From the 'patted me on the head' extract: (i) The line shows Anil is generous, careless about money and kind-hearted - he overlooks Hari's small daily profit rather than accuse him. (ii) MCQ: '(C) that he would be able to accomplish a lot if he gets educated.' (iii) Anil promised to teach him to cook, to write his name and whole sentences, and to add numbers; Hari felt grateful, believing education would open limitless opportunities. (iv) Fill in: 'profit'.", "explanation": "Yeh extract Anil ke ghar ka pleasant time dikhata hai. Anil ka character: udaar/generous, paise ki parwah nahi. Hari ki realisation MCQ ka answer (C) hai - padhega to bahut kuch kar paayega. Promise wale part mein teen cheezein: cooking, writing (naam + whole sentences), aur numbers; Hari grateful feel karta hai. Fill-in mein 'profit' (kyunki woh rozana thoda munafa kamaata tha). Hook: passage padho, fir option milao.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 3}, {"key": "FW2-124", "chapter_code": "FW2", "chapter_name": "The Thief's Story", "unit": "Footprints Without Feet", "topic": "Extract-based comprehension", "question": "[Extract from The Thief's Story] What feeling was UNLIKELY on seeing 'a fifty rupee note between his fingers'? How does the prospect of being paid regularly affect the narrator's motivation and hope? Fill in the blank: nobility/dishonesty. Compare 'My heart sank' and 'My spirits rose'.", "answer": "From the fifty-rupee-note extract: (i) MCQ - the UNLIKELY feeling is '(A) joyous' (the moment is tense, not joyful). (ii) The promise of a regular salary and Anil's offer to educate him lift Hari's motivation, giving him hope of an honest, respectable future. (iii) Fill in: 'nobility' - Anil hides that he knows about the theft, which reflects his noble character. (iv) 'My heart sank' = sudden disappointment or worry; 'My spirits rose' = a lift of hope and happiness - opposite emotional states.", "explanation": "Yeh extract climax ke aas-paas ka hai (damp note wapas dena). MCQ mein 'UNLIKELY feeling' = (A) joyous, kyunki scene tense hai khushi-bhara nahi. Regular pay se Hari ko ummeed milti hai - imaandaar zindagi ki. Fill-in 'nobility' yaad rakh - Anil ka chori chhupana noble hai. Idiom contrast: 'heart sank' = niraasha, 'spirits rose' = ummeed/khushi. Hook: do idioms ko opposite emotions ki tarah yaad rakh.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 3}, {"key": "FW7-169", "chapter_code": "FW7", "chapter_name": "The Necklace", "unit": "Footprints Without Feet", "topic": "Extract comprehension", "question": "[Extract from The Necklace] What can be inferred about Matilda's emotions and financial situation based on her husband's reaction and her response to not having a dress for the affair?", "answer": "Inference: Matilda is upset and dissatisfied because she cannot afford a suitable gown, showing the family's tight finances and her husband's thrifty, economical nature. Sub-answers: (i) she is distressed, not a card-name issue; the MCQ answer is (D) 'The card did not bear her name' (NOT a reason for her distress). (ii) She suggests her husband give the invitation card to a colleague whose wife is better dressed. (iii) 'Economical clerk' means a person careful with money due to limited means.", "explanation": "Reference-to-Context wala extract hai — 'no dress' wali baat-cheet par. Inference question mein Matilda ki feelings (upset, dissatisfied) + financial tangi dono likhna. MCQ trap: distress ka kaaran card ka naam NAHI hai, isliye answer (D). 'Economical clerk' = paisa soch-samajh ke kharchne wala. Hook: 'Extract ke answer extract ke andar hi milte hain' — line dhoondh ke likho.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 3}, {"key": "FW8-178", "chapter_code": "FW8", "chapter_name": "Bholi", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "Imagine you are Bholi and write a diary entry, explaining how you dare to take such a bold step of refusing to marry Bishamber.", "answer": "On the wedding day Bholi had agreed to marry the much older Bishamber only for her parents' sake. But when he greedily demanded five thousand rupees more and humiliated her father, who was ready to beg, something in her snapped. The confidence built by her education and her teacher made the refusal possible - she flung away the garland and declared she would not marry such a mean man. It was not easy, given her parents' reputation and her own timid past, but self-respect won. She resolved to stay unmarried, serve her parents and become a teacher. (As a diary entry: write in first person, with date and 'Dear Diary'.)", "explanation": "Yeh refusal ke peeche ki HIMMAT par focus karta hai - 'was it easy? what gave confidence?'. Answer: aasan nahi tha (parents ki izzat, purani jhijhak), par education + teacher ne himmat di + Bishamber ki greed ne gussa dilaya. Diary format: 'Dear Diary', date, first person ('Maine aaj...'), feelings zaroor likho. Format ke marks pakke.", "years": ["2025"], "papers": 1, "raw": 4, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 3}, {"key": "FW9-184", "chapter_code": "FW9", "chapter_name": "The Book that Saved the Earth", "unit": "Footprints Without Feet", "topic": "Value / life-lesson", "question": "Half-baked knowledge is always dangerous. Rushing to conclusions without going deep into the details of things always leads to uninvited chaos and disasters. Explain the above mentioned statements in the light of Think-Tank's interpretation of the rhymes in the book 'Mother Goose'. (The Book that saved the Earth)", "answer": "Think-Tank's behaviour proves half-baked knowledge is dangerous. Without truly understanding Earth's culture, he jumps to sweeping conclusions — mistaking books for sandwiches and reading 'Mistress Mary' as proof Earthlings grow rare metals and explosives. This shallow, hasty thinking convinces him Mars is under threat, triggering a panicked evacuation order. The lesson: never rush to judgement on incomplete information; superficial knowledge plus arrogance leads to unnecessary chaos, fear and self-defeating decisions.", "explanation": "Life-lesson type question hai — 'adhura gyaan khatarnaak hota hai.' Think-Tank bina gehrai mein gaye turant conclusion maar deta hai aur khud hi darr ke bhaag jaata hai. Iska seedha sabak: jaldi-jaldi judgement mat karo, poori baat samjho. Hook: 'Think-Tank = half-cooked dimaag.' Aise value questions mein hamesha incident ko lesson se jodna hai — example do, phir moral likho.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 6, "types": ["Literature-LA"], "score": 3}, {"key": "GR2-201", "chapter_code": "GR2", "chapter_name": "Modals", "unit": "Grammar", "topic": "Permission/possibility (may/might)", "question": "Fill in the blank by choosing the correct option, to complete the line given below : The roads have been widened so much that six lanes of vehicles ___________ (will/may/could) be accommodated.", "answer": "'may/could' = possibility (something is possible but not certain): 'six lanes MAY/COULD be accommodated'. Rule: may/might/could show that an outcome is possible, not guaranteed.", "explanation": "Jab kuch ho sakta hai par pakka nahi, tab 'may/might/could' aata hai — possibility batate hain. 'Six lanes may/could be accommodated' matlab ho sakta hai, sure nahi. Memory hook: MAY/MIGHT/COULD = shayad, ho sakta hai. Inko strong 'will' (pakka) se mat confuse karna.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Grammar"], "score": 3}, {"key": "GR6-223", "chapter_code": "GR6", "chapter_name": "Prepositions", "unit": "Grammar", "topic": "Prepositional verbs/phrases", "question": "Identify the error and supply the correction for the following instruction put up for safe use of elevators. Please refrain by standing near the door as it could lead to an accident. Error Correction", "answer": "by → from — 'refrain FROM doing something' is the fixed pattern (like stop/prevent/keep somebody from). 'by' is the error, 'from' the correction.", "explanation": "Refrain, stop, prevent, keep, prohibit — yeh sab 'rokne' wale verbs hain, aur inke baad hamesha FROM + -ing aata hai. 'Refrain BY standing' galat hai, 'refrain FROM standing' sahi. Hook: 'rokna = FROM'. Error-correction mein galat preposition pakdo aur FROM se badlo.", "years": ["2025"], "papers": 1, "raw": 2, "marks": 1, "types": ["Grammar"], "score": 3}, {"key": "GR6-224", "chapter_code": "GR6", "chapter_name": "Prepositions", "unit": "Grammar", "topic": "Prepositional verbs/phrases", "question": "Complete the given statement, by filling the blank with the correct option. A mask is used to hide the identity ________ a person. (A) of (B) for (C) being (D) at", "answer": "of — 'the identity OF a person' shows belonging/possession (X of Y). The noun 'identity' connects to its owner with 'of'.", "explanation": "Jab kisi cheez ka 'kiska' batana ho (belonging), tab OF use hota hai — 'identity OF a person', 'expectations OF the committee'. Hindi mein 'ka/ki/ke' = OF. Hook: maalik dikhana ho toh OF. Yahan mask kiski pehchaan chhupata hai? person ki → identity OF a person.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Grammar"], "score": 3}, {"key": "PM1-243", "chapter_code": "PM1", "chapter_name": "Dust of Snow", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[Dust of Snow] How do the crow, snow, and hemlock tree transform the speaker's emotions?", "answer": "Extract (RTC) sub-questions. Fill-in: the snow gave a change of heart by reminding the poet of nature's beauty and unexpectedly uplifting his spirits. 40-word answer: the crow shaking snow from a hemlock tree — normally negative symbols — unexpectedly acts as the catalyst for the poet's positive emotional transformation. MCQ: 'Dust of Snow' refers to (D) snowflakes.", "explanation": "Yeh Reference-to-Context (extract) sub-questions hain — stanza padh ke fill-in, short-answer aur MCQ aate hain. Tips: 'dust of snow' = snowflakes; jo cheezein negative lagti hain (crow, hemlock) wahi yahan positive change laati hain. RTC mein hamesha extract ke exact words se clue lo aur word-limit (yaha ~40 words) follow karo. Quick wins — yeh easy marks hain, miss mat karna.", "years": ["2025"], "papers": 1, "raw": 9, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 3}, {"key": "PM10-249", "chapter_code": "PM10", "chapter_name": "For Anne Gregory", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[For Anne Gregory] The speaker calls Anne 'my dear' because only God could love her for herself, not her appearance.", "answer": "'My dear' is a term of endearment showing affection and a close, familiar relationship. Compared to human love, God's love is selfless (the correct word in the blank). For the MCQ on what God does not love a person for, full marks are awarded to all who attempted it, as the given options do not contain the correct answer (it should be 'physical appearance / yellow hair').", "explanation": "Yeh extract (RTC) ke chhote sub-questions hai — text se seedha answer nikalo. 'My dear' = pyaar/apnapan dikhata hai. God ka love human ke comparison mein 'selfless' hai (selfish nahi). MCQ ka official note: sahi option diya hi nahi tha, isliye sabko marks mile. Tip: extract questions mein apni kahani mat banao, lines ke andar se hi answer dhoondo.", "years": ["2025"], "papers": 1, "raw": 9, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 3}, {"key": "PM2-251", "chapter_code": "PM2", "chapter_name": "Fire and Ice", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[Fire and Ice] What does the poet predict about the world's end?", "answer": "The poet predicts the world will end through human emotion, not nature. He favours fire - desire - as a powerful, intense force that, like a raging fire, can engulf and consume everything, leading to chaos. His evidence is his own personal experience: 'from what I've tasted of desire'.", "explanation": "Do milte-julte extract Qs ek saath: (a) 'prediction' = duniya desire (fire) se khatam hogi - intense, destructive, chaos laane wali; (b) 'evidence' = poet ka apna experience, 'I've tasted desire'. 40-word answer mein 'powerful + destructive + chaos' keywords daalna. Memory hook: poet khud bola 'maine desire chakkha hai', isliye fire pe yakeen. Dhyaan: prediction = full description; evidence = sirf 'tasted desire' wala reason.", "years": ["2025"], "papers": 1, "raw": 6, "marks": 1, "types": ["Extract-SA"], "score": 3}, {"key": "PM2-255", "chapter_code": "PM2", "chapter_name": "Fire and Ice", "unit": "First Flight: Poems", "topic": "Tone / mood", "question": "Comment on the overall mood of the extract.", "answer": "The mood is contemplative, introspective and somewhat pessimistic. The speaker calmly but seriously reflects on two contrasting theories of how the world will end, giving the poem a sombre, thought-provoking, philosophical tone.", "explanation": "Mood/tone ka jawaab: contemplative + introspective + thoda pessimistic/sombre. Poet shaant ho kar duniya ke ant pe soch raha hai - drama nahi, gehri soch. Memory hook: 'thoughtful & gloomy'. Tip: tone wale Qs mein 2-3 emotion-words do (contemplative, reflective, pessimistic) - ek single word kam padta hai.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Extract-SA"], "score": 3}, {"key": "PM3-264", "chapter_code": "PM3", "chapter_name": "A Tiger in the Zoo", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "Select the option that applies the same rhyme scheme as the first four lines of the given extract.", "answer": "The stanza follows an ABAB rhyme scheme (stripes–quiet / cage–rage: lines 2 and 4 rhyme). Choose the option whose 2nd and 4th lines rhyme (way / day) — option (B).", "explanation": "Rhyme scheme = line-endings ka pattern letters se. Is poem mein 2nd aur 4th line rhyme karti hain (cage–rage) = ABAB. Aise question mein har option ki line-endings check karo aur wahi chuno jiska pattern ABAB ho (way…day). Hook: pehle har line ke aakhri shabd suno, phir letter assign karo.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 1, "types": ["Extract-MCQ"], "score": 3}, {"key": "PM3-268", "chapter_code": "PM3", "chapter_name": "A Tiger in the Zoo", "unit": "First Flight: Poems", "topic": "Value / life-lesson", "question": "Is it ethical to enclose wild animals within cages? Discuss with reference to the poem, 'A Tiger in the Zoo'.", "answer": "No. Wild animals belong in their natural habitat where they roam, hunt and live freely. Caging them only for human display causes frustration and 'quiet rage', crushes their instincts and disturbs the ecological balance. The poem urges compassion — animals should not be objects of our entertainment.", "explanation": "Value-based question: apni opinion poem se justify karni hai. Answer: NAHI, janglee jaanwar ko cage karna galat hai — unki jagah jungle hai jahan woh aazaad ghoomein aur shikaar karein. Cage unhe frustrated aur restless banata hai. Hook: yahan 'I feel… because the poem shows…' format use karo, aur compassion + ecological balance jaise points daalo.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 3}, {"key": "PM7-311", "chapter_code": "PM7", "chapter_name": "The Trees", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[The Trees] Choose the option pairing the two meanings of 'open' in the poem.", "answer": "The word 'open' carries two meanings: (i) doors 'open to the veranda' = an entry point, allowing access and vision; and (ii) the sky 'still open' = vastness, an expanse of space. Answer: entry point – vastness / allowing access and vision – expanse of space. The poet also describes the night as fresh and bright (options 4 and 5).", "explanation": "Vocabulary-in-context MCQ: ek hi shabd 'open' do baar, do alag matlab. Doors open = andar jaane ka raasta (access/entry point). Sky open = khula, vishaal (vastness/expanse). Plus night = 'fresh' aur 'bright' (4 and 5). Tip: context dekho — same word, different shade of meaning.", "years": ["2025"], "papers": 1, "raw": 6, "marks": 1, "types": ["Extract-MCQ"], "score": 3}, {"key": "PM9-318", "chapter_code": "PM9", "chapter_name": "The Tale of Custard the Dragon", "unit": "First Flight: Poems", "topic": "Tone / mood", "question": "Discuss how the writers use language to create humour in the poem ‘The Tale of Custard the Dragon’ and the play ‘The Proposal’.", "answer": "Nash creates humour through contrasting characters (a cowardly dragon, boastful little pets), exaggerated descriptions, playful coined language ('realio, trulio', 'Percival'), and devices like irony, hyperbole and anthropomorphism. Chekhov's 'The Proposal' uses wit, irony, exaggeration, wordplay, repetitive arguments, asides and physical comedy (Lomov fainting) to satirise human folly. Both turn ordinary situations comic.", "explanation": "Yeh comparison question hai (poem + The Proposal), dono mein humour kaise banta hai. Nash: ulte characters (coward dragon), exaggeration, mazedaar shabd ('realio trulio'), irony aur anthropomorphism. Chekhov: wit, repetition, asides, Lomov ka behosh hona. Tip: 6-marker mein dono texts ke 2-2 humour techniques zaroor likhna, warna aadhe marks katenge.", "years": ["2025"], "papers": 1, "raw": 3, "marks": 6, "types": ["Literature-LA"], "score": 3}, {"key": "PM9-326", "chapter_code": "PM9", "chapter_name": "The Tale of Custard the Dragon", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[The Tale of Custard the Dragon] What does 'suddenly, suddenly' imply? Why did Custard want a cage? Identify the rhyme scheme and Custard's behavior.", "answer": "The repeated 'suddenly, suddenly' emphasises (C) that an unexpected noise was suddenly heard, building tension. Custard prefers a cage because he is bullied by the others and seeks safety, avoiding confrontation. The matching rhyme scheme is aabb (option A). In contrast to the others, Custard behaves like a 'coward'.", "explanation": "Yeh extract giggling + pirate ke aane se thik pehle ka hai. 'Suddenly, suddenly' repetition = achanak awaaz par zor (option C). Custard cage isliye chahta hai kyunki sab use bully karte hain. Rhyme scheme aabb hai. Custard = coward. Hook: repetition hamesha 'emphasis/zor' ke liye hota hai.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 3}, {"key": "PM9-327", "chapter_code": "PM9", "chapter_name": "The Tale of Custard the Dragon", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[The Tale of Custard the Dragon] Identify the poetic device in 'brave as a barrel full of bears'. Explain the irony of 'Percival'. What does 'unmerciful' imply about Belinda? What image of Custard is created?", "answer": "Poetic device in the first line ('as brave as a barrel full of bears') = simile (with alliteration). The irony of calling Custard 'Percival' is that Percival was a brave knight, whereas Custard was a coward. 'Unmerciful' implies Belinda is cruel/heartless/insensitive. The lines create the image of Custard as a timid coward.", "explanation": "Yeh extract tickling + 'Percival' wala hai. First line = simile + alliteration. Irony: 'Percival' ek bahadur knight tha, par Custard coward — ulta naam (mazaak). 'Unmerciful' = Belinda cruel/heartless. Custard ki image = coward. Hook: 'as brave as...' = simile; alliteration mein same letter repeat (Barrel...Bears).", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-SA"], "score": 3}, {"key": "FP1-7", "chapter_code": "FP1", "chapter_name": "A Letter to God", "unit": "First Flight: Prose", "topic": "Value-based / life-lesson", "question": "How far would you agree that one's positivity can bring in a spark of brightness even in adverse circumstances?", "answer": "I fully agree. Lencho is the perfect example: his crop is destroyed, yet his positive, hopeful outlook keeps him going – he trusts that help will come and acts on that hope by writing to God. A positive attitude lets us see possibilities instead of despair, builds resilience, and often draws help from others, turning even a dark situation into one with a spark of brightness.", "explanation": "Yeh 'opinion/value' question hai – agree karo aur Lencho ka example do. Positivity se musibat mein bhi raasta dikhta hai; Lencho ka hope hi use tootne nahi deta. Value questions ka formula: apni ray + chapter ka example + ek life-lesson line. Hook: 'umeed ho to andhere mein bhi roshni'.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "FP2-20", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Value-based / life-lesson", "question": "A desire is more personal whereas a vision has broader connotations. Present an analysis of Valli's desire and Mandela's vision and how they are respectively fulfilled, comparing the approaches of both.", "answer": "Both Valli and Mandela achieve their goals through courage, meticulous planning and determination. Valli's desire - a personal one - is to ride the bus alone; she plans carefully, saves money and shows bold independence. Mandela's vision is far broader - to end apartheid and build a non-discriminatory society as South Africa's first Black President. A personal desire and a national vision, yet both prove that planning, courage and passion turn dreams into reality. (about 120 words)", "explanation": "Yeh comparison/presentation question hai (Valli + Mandela). Difference yaad rakh: desire = personal (Valli ka bus ride), vision = bada/sabke liye (Mandela ka apartheid khatam karna). Par dono mein common: courage, planning, determination. Format note: presentation draft ~120 words, given opening line se shuru kar.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 6, "types": ["Literature-LA"], "score": 2}, {"key": "FP2-21", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Incident / plot point", "question": "Nelson Mandela in his inauguration speech says, 'We, who were outlaws not so long ago, have today been given the rare privilege to be host to the nations of the world on our own soil.' What is the significance of this statement with reference to the political system that prevailed before this?", "answer": "Mandela's inauguration marked South Africa's historic transformation from apartheid to democracy. Earlier, because of racial oppression, the country was an international outcast - boycotted and isolated. Now, hosting world leaders on its own soil was a triumph of justice, peace and human dignity, and a sign that South Africa had rejoined the family of nations as a free, equal society.", "explanation": "Significance question on the inauguration: pehle apartheid ki wajah se South Africa duniya se kata hua tha (outlaw/isolated). Ab world leaders ko host karna = democracy ki jeet, justice aur dignity ki jeet. Memory hook: 'outlaws se hosts - isolation se acceptance tak ka safar.'", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "FP2-23", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Nelson Mandela: Long Walk to Freedom] Explain Mandela's feelings on inauguration day. How has racial domination been replaced? Comment on apartheid's society. Substitute 'patched up'.", "answer": "'Overwhelmed with a sense of history' = Mandela felt joy at ending apartheid and was flooded by memories of past struggles and sacrifices. Racial domination was replaced by a system that recognises the rights and freedom of all people. 'Patched up' = repaired / mended / appeased.", "explanation": "Inauguration wala RTC: 'sense of history' matlab Mandela ko purane sangharsh aur kurbaaniyan yaad aa gayin. Naya system sabke rights pehchaanta hai. Vocab: 'patched up' = mended/repaired. RTC tip: 1-mark vocab aur True/False mein time waste mat kar, seedha answer.", "years": ["2024"], "papers": 1, "raw": 9, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 2}, {"key": "FP2-24", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Nelson Mandela: Long Walk to Freedom] Infer about the 'rainbow gathering'. Explain the shift from white supremacy. Substitute 'pleasantly besieged'. True/False about the amphitheatre.", "answer": "Inference: earlier South Africa was barred from hosting international gatherings; this was its first globally recognised one. Shift from white supremacy to rainbow gathering: decades of white-only rule, inequality and discrimination gave way to a non-racial government promoting equality and liberation for all races. 'Pleasantly besieged' = amicably surrounded. T/F (amphitheatre was earlier a seat for theatrical performances) = False (it was the seat of white supremacy).", "explanation": "Yeh RTC '10 May' inauguration din ka hai. 'Rainbow gathering' = sab rangon/jaatiyon ke log ek saath - non-racial government ka pratik. Vocab: 'pleasantly besieged' = amicably surrounded. Yaad rakh amphitheatre pehle white supremacy ki seat thi, theatre nahi - isliye T/F False.", "years": ["2024"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-SA"], "score": 2}, {"key": "FP2-25", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Nelson Mandela: Long Walk to Freedom] What can be inferred about Mandela? True/False: welfare only for Blacks. Define 'political emancipation'. Substitute 'glorious'.", "answer": "Inference: Mandela felt a sense of collective achievement and fulfilment - all the struggle was worthwhile. T/F (pledge was for only Black people) = False; it was for ALL people. 'Political emancipation' = freedom not just political, but also from poverty, deprivation, suffering and every form of discrimination, with hope for a free Africa. 'Glorious' = distinguished / outstanding / magnificent.", "explanation": "Yeh RTC Mandela ki pledge wali speech hai. Key trap: pledge sirf Blacks ke liye nahi tha - SABKE liye (gender, poverty, har discrimination). Isliye T/F mostly False. Vocab: glorious = magnificent/outstanding. 'Political emancipation' sirf rajneetik nahi - har tarah ki azaadi.", "years": ["2024"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 2}, {"key": "FP4-47", "chapter_code": "FP4", "chapter_name": "From the Diary of Anne Frank", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[From the Diary of Anne Frank] What can be inferred about Anne? Justify her talkative nature. What is the tone? Substitute 'ramble on'.", "answer": "Inference: Anne wanted to write an effective, logical, convincing piece, not just fill pages. Her justification: talking is a student's natural trait and one inherited from her talkative mother, so it is in her genes and hard to cure. The tone of the extract is persuasive. 'ramble on'=to talk continuously in a confused/aimless manner.", "explanation": "Yahan Anne apni talkative aadat ko logic se justify karti hai — 'student ka trait hai + maa se inherited hai'. Tone = persuasive (woh teacher ko convince kar rahi hai). 40-word answer me do points likho: student's nature + inherited from mother. 'ramble on' = bina matlab continuously bolna.", "years": ["2024"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 2}, {"key": "FP5-57", "chapter_code": "FP5", "chapter_name": "Glimpses of India", "unit": "First Flight: Prose", "topic": "Extract-based comprehension (Tea from Assam)", "question": "[Glimpses of India] What does Rajvir's interest in scenery, despite liking detective stories, infer about him?", "answer": "Inference: Although Rajvir loved detective stories, he chose the view over his book — showing he was a nature-lover, observant, and deeply curious, especially as he had never seen such greenery before. (RTC extract: 'The train pulled out of the station...doll-like figures.')", "explanation": "Inference matlab line ke peeche ki baat — yahan Rajvir nature-lover aur curious hai kyunki usne apni favourite book chhod ke scenery chuni. Extract questions mein passage zaroor padho, fir short-to-point answer do. Hook: 'Book chhodi, nazaara chuna = nature-lover.'", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Extract-SA"], "score": 2}, {"key": "FP5-58", "chapter_code": "FP5", "chapter_name": "Glimpses of India", "unit": "First Flight: Prose", "topic": "Extract-based comprehension (Tea from Assam)", "question": "[Glimpses of India] True or False: Rajvir preferred scenery because his detective book was uninteresting.", "answer": "False. Rajvir was an ardent fan of detective stories — the book was interesting. He looked outside because the never-before-seen greenery and the magnificent tea-garden view fascinated him, not because the book was dull.", "explanation": "Trap question hai! Book boring nahi thi — Rajvir ko detective stories bahut pasand thi. Wo bas scenery se zyada attract ho gaya. Isliye answer False. Hook: 'Book mast thi, par view mast-er tha.' True/False mein passage ki exact baat check karo, assume mat karo.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Extract-SA"], "score": 2}, {"key": "FP5-59", "chapter_code": "FP5", "chapter_name": "Glimpses of India", "unit": "First Flight: Prose", "topic": "Value / life-lesson (Tea from Assam)", "question": "People who live in big cities are always fascinated by the natural beauty and abundant greenery. Elaborate in about 40 words, with reference to the extract.", "answer": "City-dwellers, surrounded by concrete and crowds, rarely see open nature, so greenery delights them. Rajvir, from Delhi, was mesmerised by the endless tea bushes against densely wooded hills — a magnificent view utterly unlike his grey city life, filling him with wonder and joy.", "explanation": "Value-based answer mein text se example + apni soch dono chahiye. City wale concrete jungle mein rehte hain, isliye asli hariyaali unhe magic lagti hai — jaise Rajvir ko tea gardens. Hook: 'Concrete ki aadat, green ka shauk.' 40 words limit ka dhyaan rakhna.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 2, "types": ["Extract-SA"], "score": 2}, {"key": "FP5-60", "chapter_code": "FP5", "chapter_name": "Glimpses of India", "unit": "First Flight: Prose", "topic": "Extract-based comprehension (Tea from Assam)", "question": "[Glimpses of India] Which phrase can replace 'doll-like figures'?", "answer": "'Doll-like figures' refers to the tea pluckers / tiny workers seen moving among the bushes — they look small and doll-sized when viewed from a distance against the tall shade-trees.", "explanation": "Vocabulary-in-context: 'doll-like figures' = tea pluckers jo door se chhote-chhote, gudiya jaise dikh rahe hain. Hint hamesha aas-paas ki lines mein hota hai. Hook: 'Door se majdoor = gudiya.' Aise questions mein literal greenery nahi, logon ki baat ho rahi hoti hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Extract-SA"], "score": 2}, {"key": "FP5-65", "chapter_code": "FP5", "chapter_name": "Glimpses of India", "unit": "First Flight: Prose", "topic": "Value / life-lesson (cross-text: A Baker from Goa & Mandela)", "question": "In the chapter 'A Baker from Goa' the narrator talks about his childhood in Goa and his fond memories. In about 120 words write a presentation draft comparing the childhood of the narrator in 'A Baker from Goa' to that of Nelson Mandela. (Reference: A Baker from Goa and Nelson Mandela: Long Walk to Freedom)", "answer": "Both texts celebrate the carefree innocence and freedom of childhood. For the Goan narrator, that freedom was a lived reality — happy days of running after the baker, bread-bangles and warm village life. For young Mandela, the freedom of boyhood was only an illusion: as he grew, he realised that as a black South African he was never truly free under apartheid. Difference: real freedom vs an illusion of freedom; similarity: both cherish childhood's carefree, innocent joy.", "explanation": "Long answer + comparison — dono ka childhood likho. Similarity: dono carefree, innocent bachpan. Difference: Goan baccha sach mein aazaad tha; Mandela ki aazaadi sirf bhram (illusion) thi, kyunki rang-bhed (apartheid) ne use kaid kiya. Hook: 'Goa = real freedom, Mandela = illusion.' Format: presentation draft, ~120 words, intro line se shuru karo.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 6, "types": ["Literature-LA"], "score": 2}, {"key": "FP6-69", "chapter_code": "FP6", "chapter_name": "Mijbil the Otter", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Mijbil the Otter] Describe Mijbil's initial behavior. What happened in the bathroom? (MCQs + reason + trait)", "answer": "(i) Wrong reason: 'He wanted to play with Maxwell on his bed.' (ii) Mijbil was aloof because he was in a new, unfamiliar environment, away from his natural habitat, and needed time to adjust to his owner. (iii) Best description: 'A pet needs its own space and time to get adjusted to its owner's environment.' (Trait shown in bathroom: otters love water and are playful.)", "explanation": "Extract/RTC questions mein answer hamesha diye gaye paragraph se hi nikaalo — bahar ka gyaan mat ghusao. Pehle 24 ghante Mij 'aloof' tha kyunki naya ghar tha, adjust hone mein time lagta hai. MCQs mein 'NOT a reason' wale shabd ko underline karo — wahi trap hota hai. Hook: 'naya ghar = thoda time chahiye'.", "years": ["2024"], "papers": 1, "raw": 10, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 2}, {"key": "FP6-73", "chapter_code": "FP6", "chapter_name": "Mijbil the Otter", "unit": "First Flight: Prose", "topic": "Value / life-lesson", "question": "Maxwell decides to keep an otter as a pet. Elucidate with reference to the fact that owning a pet is a life of commitment.", "answer": "Owning Mij changed Maxwell's whole life. He had to understand the otter's strange ways, adapt his living space and daily routine, arrange special food and water-play, manage a difficult flight, and patiently face strangers' stares and comments. This shows that keeping a pet is a serious, full-time commitment, not just for fun.", "explanation": "Yeh value-based hai: pet rakhna = responsibility, full-time commitment. Maxwell ko apni life, ghar, routine sab badalna pada Mij ke liye. Hook: 'pet = pyaar + zimmedari'. Aise questions mein lesson + ek-do examples (routine badla, public comments jhele) likho, aur seedha message bol do.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "FP9-93", "chapter_code": "FP9", "chapter_name": "The Proposal (Drama)", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "The play 'The Proposal' is a farce. Justify this statement with reference to the characters and plot.", "answer": "'The Proposal' is a farce — a comedy built on exaggeration and absurd situations. A simple marriage proposal turns into ridiculous quarrels over Oxen Meadows and the dogs Guess and Squeezer. Lomov's hypochondria, fainting fits, the trivial reasons for fighting, and the hasty reconciliation amid continued bickering make it comic and far-fetched, satirising the petty pride of the landed gentry.", "explanation": "Farce matlab halki-phulki comedy jisme bilkul bewakoofi-bhari, exaggerated situations hoti hain. Yahan ek shaadi ka proposal land aur kutton ke jhagde mein badal jaata hai — yeh hi farce hai. Memory hook: 'badi baat par nahi, choti choti baaton par ladai' = satire on rich landowners. Theme ek line mein: trivial pride turns love into comedy.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "FP9-98", "chapter_code": "FP9", "chapter_name": "The Proposal (Drama)", "unit": "First Flight: Prose", "topic": "Character sketch", "question": "'What a burden, Lord, to be the father of a grown-up daughter!' Explain what this line conveys about Chubukov as a father.", "answer": "The line shows Chubukov as an anxious, exasperated father who finds marrying off his grown-up daughter a heavy responsibility. He is eager to get Natalya wedded and is frustrated by the constant quarrelling that threatens the match. It reveals his worldly, scheming nature — keen on the alliance — and the comic strain of dealing with a temperamental, unmarried daughter.", "explanation": "Yeh line Chubukov ki father ke roop mein pareshani dikhati hai — badi beti ki shaadi karana uske liye sar-dard hai. Woh chahta hai Natalya jaldi settle ho jaaye, isliye jhagdon se chid-chida ho jaata hai. Hook: Chubukov practical/scheming baap hai, shaadi karwane ke liye kuch bhi karega.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "FP9-100", "chapter_code": "FP9", "chapter_name": "The Proposal (Drama)", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "What argument do Lomov and Natalya give over the superiority of their dogs, Guess and Squeezer? (The Proposal)", "answer": "After patching up the land quarrel, Lomov and Natalya fight over whose hunting dog is better. Lomov praises his Guess as a fine, well-built dog and calls Natalya's Squeezer 'overshot' (a poor hunter). Natalya defends Squeezer as young, handsome and thoroughbred, and dismisses Guess as old and ugly. The trivial argument flares up again, showing both are equally obstinate.", "explanation": "Central incident #2: kutton ka jhagda — Guess (Lomov ka) vs Squeezer (Natalya ka). Lomov: mera Guess best, tumhara overshot; Natalya: mera Squeezer jawan aur thoroughbred, tumhara Guess buddha. Hook: ek faltu topic khatam hua toh doosra shuru — dono ki zid kabhi nahi rukti.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "FW2-119", "chapter_code": "FW2", "chapter_name": "The Thief's Story", "unit": "Footprints Without Feet", "topic": "Value / life-lesson", "question": "Imagine that Hari Singh from The Thief's Story writes a diary entry, exploring the theme of human values and relations that are essential in life and can transform a person in the context of his own experience. Write this diary entry as Hari Singh.", "answer": "Diary-entry format (Day, Date, time + 'Dear Diary'). Voice: Hari Singh, reflective and remorseful. Key content: I befriended Anil only to rob him, but his kindness - teaching me to cook, read, write, trusting me with money - changed me. After stealing his notes I felt hollow; I couldn't betray the one person who treated me with respect, so I returned the money. I have learnt that trust, compassion and human relations matter more than easy money, and I want to live honestly. Tone: heartfelt; end with resolve to reform.", "explanation": "Yeh ek diary entry hai - format ke marks pakke karo: upar din/date/samay + 'Dear Diary', first person (main = Hari), aur feelings-bhari bhasha. Content mein woh values daalo jo kahani sikhati hai: trust, kindness, education aur sachchi insaani rishte. Hook: diary = dil ki baat, isliye guilt aur badलाव dono clearly likho. Common mistake: format bhoolना aur essay jaisa likh dena.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 6, "types": ["Literature-LA"], "score": 2}, {"key": "FW2-122", "chapter_code": "FW2", "chapter_name": "The Thief's Story", "unit": "Footprints Without Feet", "topic": "Extract-based comprehension", "question": "[The Thief's Story] Why does Hari Singh think he can't write whole sentences? Why is his tone remorseful? What does 'whole sentences could one day bring me more' imply? True/False: his guilt was due to Anil's trust.", "answer": "These sub-questions all come from the 'clock tower at midnight' extract. Model responses: (i) MCQ - the option that is NOT a reason is '(D) He had no money to take admission in school.' (ii) Remorse/regret: listing the small daily acts he will lose (cooking, the bazaar, learning to write) shows he misses Anil's home and feels lonely and guilty for cheating a kind man. (iii) Inference: Hari realises education is more valuable than stolen money and can transform his future. (iv) True - his guilt stems from having betrayed Anil's trust.", "explanation": "Extract-based questions mein hamesha pehle passage dhyaan se padho, phir line ke aaspaas se jawab nikaalo. Yeh wala 'clock tower, aadhi raat' wala scene hai jahan Hari ko pachhtaava hota hai. MCQ mein 'NOT a reason' dhoondhna hai - admission ke paise wali baat passage mein nahi hai. Inference ka core: education > paisa. True/False mein trust = guilt ka kaaran. Hook: extract ke andar hi answer chhupa hota hai.", "years": ["2024"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 2}, {"key": "FW3-128", "chapter_code": "FW3", "chapter_name": "The Midnight Visitor", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "Who was Henry? What role did he play in Ausable's plan? (The Midnight Visitor)", "answer": "Henry was a waiter at the French hotel who came to deliver the drinks Ausable had ordered. Unknowingly he became key to the trick: his ordinary knock at the door was passed off by Ausable as the 'police' arriving. This terrified Max, who jumped onto the imaginary balcony and fell - making Henry's harmless knock decisive.", "explanation": "Henry koi hero nahi, sirf ek waiter tha jo drinks le ke aaya - par uska knock hi Ausable ke plan ki jaan tha. Ausable ne us knock ko 'police' bata diya aur Max dar gaya. Memory hook: 'Henry knocks, Max believes police'. Do part likhna: kaun tha (waiter) + kya role (knock = fake police).", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "FW5-142", "chapter_code": "FW5", "chapter_name": "Footprints Without Feet", "unit": "Footprints Without Feet", "topic": "Value / life-lesson", "question": "Imagine that Griffin's conscience pricks him and he decides to write a diary entry, about misusing science and endangering society, in the context of his own experience. Write this diary entry, as Griffin, in about 120 words.", "answer": "Diary format (Day, date, 'Dear Diary'), first-person as Griffin, ~120 words. Content: admit misusing invisibility - endangering lives, illegal acts, theft, arson. Express guilt, remorse and realisation that science must serve humanity, not selfish revenge. Resolve to take responsibility and use knowledge for the betterment of mankind. Reflective, regretful tone throughout. (approx 50 words)", "explanation": "Yeh diary-entry wala value question hai - guilt aur seekh dikhani hai. Format ke marks pakke hain: 'Dear Diary', date, first person 'main Griffin'. Pehle galtiyan kabool, phir pachhtava, phir resolution ki ab science achhe kaam ke liye. Lesson: knowledge bina zimmedari ke khatarnaak. Word limit (~120) ka dhyan rakhna.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 6, "types": ["Literature-LA"], "score": 2}, {"key": "FW5-146", "chapter_code": "FW5", "chapter_name": "Footprints Without Feet", "unit": "Footprints Without Feet", "topic": "Extract-based comprehension", "question": "[Footprints Without Feet] What can be inferred about Griffin? How did he explain his strange appearance to the Halls?", "answer": "From the Iping-inn arrival extract: Griffin convinced the Halls by saying an accident had affected his face, claiming he sought solitude for his work, and paying rent in advance. Inference: he was unfriendly, introverted and secretive, wanting to hide his true identity. (False: Mrs. Hall was NOT sceptical - she excused his odd habits.) (approx 45 words)", "explanation": "Griffin Iping pahुncha aur Halls ko teen baaton se manaya: chehre par 'accident', 'solitude' chahiye, aur advance rent. Inference: aadmi closed, secretive, alag-thalag rehne wala. Hook: 'accident + solitude + advance = no questions'. True/False mein dhyan: Mrs. Hall sceptical NAHI thi, isliye 'False'.", "years": ["2024"], "papers": 1, "raw": 10, "marks": 1, "types": ["Extract-SA"], "score": 2}, {"key": "FW6-151", "chapter_code": "FW6", "chapter_name": "The Making of a Scientist", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "How can one say that Ebright's curiosity / inquisitiveness drove him to become a scientist ?", "answer": "Ebright's curiosity made him collect all 25 species of butterflies near his home, then reach out to Dr Urquhart to study monarch migration. The same inquisitiveness led him to question the gold spots on a pupa and to research that produced a brand-new theory on how cells read their DNA.", "explanation": "Ebright ki sabse badi quality thi curiosity — har cheez ka 'why' aur 'how' jaanna. Isi ne use butterflies collect karwaayi, Dr Urquhart tak pahunchaaya, aur cell theory tak le gaya. Memory hook: 'Curiosity = engine of a scientist'. Answer mein hamesha 2-3 concrete examples likhna (butterflies, Urquhart, cell theory).", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "FW6-157", "chapter_code": "FW6", "chapter_name": "The Making of a Scientist", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "What is common about the role that Dr. Urquhart and Mr. Weiherer played in Richard Ebright's life? Describe any one commonality with evidence from the text.", "answer": "Both were mentors who valued and encouraged new ideas. Dr Urquhart opened up serious research by inviting readers (like Ebright) to study monarch butterflies and guiding his experiments, while Mr Weiherer constantly appreciated Ebright's fresh thinking and pushed him to think for himself — both nurtured the young scientist in him.", "explanation": "Common point: dono mentors the jinhone Ebright ke naye ideas ko encourage kiya. Urquhart ne research ka raasta khola, Weiherer ne nayi soch ko sarahaa. Memory hook: 'do guide — ek research mein, ek soch mein'. Answer mein ek commonality + uska evidence dono dena (question yahi maangta hai).", "years": ["2024"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "FW7-166", "chapter_code": "FW7", "chapter_name": "The Necklace", "unit": "Footprints Without Feet", "topic": "Incident / plot point", "question": "What is the twist at the end of the story ‘The Necklace’?", "answer": "The shocking twist comes when Madame Forestier reveals that the borrowed necklace was an imitation, worth at most five hundred francs. Matilda is stunned: she and her husband had wasted ten years and ruined their youth, beauty and savings to repay a fortune for a fake. The cruel irony is that all her suffering was completely unnecessary.", "explanation": "Yeh classic 'twist/shock ending' question hai. Twist: necklace nakli tha! Matilda ko jhatka isliye laga kyunki 10 saal ki mehnat bekaar gayi. Hook: 'Asli jhatka — haar tha nakli'. Short answer mein seedha twist + uska irony (bekaar ki kurbani) likho, ghoom-phir ke mat likho.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "FW8-174", "chapter_code": "FW8", "chapter_name": "Bholi", "unit": "Footprints Without Feet", "topic": "Value / life-lesson", "question": "Do you think Bholi could have confidently refused to marry Bishamber if she wasn't educated? Give reasons.", "answer": "No - without education Bholi could never have refused Bishamber so confidently. Earlier she was timid, voiceless and used to being ignored, ready to obey whatever her parents decided. It was schooling and her teacher's encouragement that gave her the clarity to reason, the courage to speak, and the self-respect to reject a greedy man and an unjust marriage. Education turned her fear into firmness, so her bold 'no' was really education speaking through her.", "explanation": "Opinion question hai - apna stand do ('No') phir REASONS do. Reason: bina padhai ke Bholi mein himmat aur soch nahi aati, wo chup-chap shaadi kar leti. Education = confidence + reasoning power. Tip: aise 'do you think' questions mein hamesha pehle clear answer, fir 2-3 reasons. Yahaan answer NO hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "FW9-188", "chapter_code": "FW9", "chapter_name": "The Book that Saved the Earth", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "A well known book of nursery rhymes saved the world from a Martian invasion. Comment with reference to 'The Book that Saved the Earth'.", "answer": "Apprentice Noodle found an old 'Mother Goose' book of nursery rhymes in the abandoned Earth library. When Omega read the rhymes aloud, Think-Tank misinterpreted them entirely — concluding Earthlings were powerful and advanced, had razor-sharp hearing, and could grow rare metals and high explosives. Terrified that Mars itself was being targeted, he hastily ordered the invasion fleet to retreat and the crew to flee Earth. Thus an innocent children's book, through sheer misunderstanding, saved the world.", "explanation": "Plot ka turning point: Noodle ko 'Mother Goose' mili, Omega ne padhi, Think-Tank ghabra gaya aur crew ko wapas bula liya. Isi galatfehmi se Earth bach gayi. Hook: 'nursery rhyme = Earth ki dhaal.' Yeh aur upar wala (interpretation) thoda alag hai — yeh poora 'book ne kaise bachaaya' sequence hai, woh sirf ek rhyme ka decoding.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "GR8-236", "chapter_code": "GR8", "chapter_name": "Gap-filling / Transformation", "unit": "Grammar", "topic": "Gap-filling (cloze)", "question": "Fill in the blank by choosing the correct option to complete the part of the pop up on a computer screen : We use essential cookies to make our site work. With your consent, we may also use non-essential cookies to ____ and analyze website traffic.", "answer": "Method: choose the phrase that fits the context and parallel structure ('to ____ and analyze'). Sample: 'improve user experience'. The two verbs must be parallel and meaning-appropriate.", "explanation": "Kabhi blank me poora phrase choose karna hota hai, single word nahi. Trick: dekho blank kis structure me fit ho raha hai — yahan 'to ____ and analyze' me dono part parallel hone chahiye, aur context (cookies/website) se meaning match kare. Poori line padho, fir option daal ke check karo ki padhne me natural lage.", "years": ["2024"], "papers": 1, "raw": 1, "marks": 1, "types": ["Grammar"], "score": 2}, {"key": "PM1-238", "chapter_code": "PM1", "chapter_name": "Dust of Snow", "unit": "First Flight: Poems", "topic": "Tone / mood", "question": "What mood of the poet is reflected in the poem 'Dust of Snow' initially? What images are used by the poet to bring about the effect? Comment.", "answer": "Initially the poet's mood is sad, depressed and hopeless. Frost conveys this through gloomy images of the 'crow' (an ill-omened black bird) and the 'hemlock tree' (a poisonous, joyless tree). These dark images set the negative emotional backdrop that the falling snow later transforms.", "explanation": "Poem ki shuruaat mein poet udaas aur depressed hai. Frost ne mood dikhane ke liye do dark images use ki: 'crow' aur 'hemlock tree' — dono negativity ke symbols. Memory hook: 'Crow + Hemlock = gloom' — yeh dono milke poet ka low mood paint karte hain, taaki baad mein snow ka chhota positive touch aur bhi shine kare.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "PM1-239", "chapter_code": "PM1", "chapter_name": "Dust of Snow", "unit": "First Flight: Poems", "topic": "Value / life-lesson", "question": "It is our attitude towards a situation that makes it positive or negative. Do you agree with it? Express your views with reference to the poem, 'Dust of Snow'.", "answer": "Yes, our attitude decides whether a situation feels positive or negative. In the poem, the very same crow and hemlock that stand for gloom end up gifting the poet a 'change of mood'. The snow's tiny touch lifted his sorrow — proving external negativity cannot dictate our outcome if we choose a positive outlook.", "explanation": "Yeh value-based question hai: 'attitude hi sab kuchh hai'. Answer mein hamesha 'Yes' bolo aur poem se jodo — jo crow aur hemlock negative the, unhi se poet ko khushi mili kyunki usne moment ko positively liya. Life-lesson ek line mein yaad rakh: 'Same situation, alag attitude = alag result.' Examiner justification + poem reference dono maangta hai.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "PM3-263", "chapter_code": "PM3", "chapter_name": "A Tiger in the Zoo", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "Identify the type of literary device used in the line 'But he's locked in a concrete cell'.", "answer": "Alliteration — the repeated hard 'c' sound in 'Concrete Cell'. The harsh consonant echoes the harshness of the tiger's imprisonment.", "explanation": "Alliteration = paas-paas wale shabdon ki shuruaat ek hi consonant sound se. Yahan 'Concrete Cell' mein 'c-c' sound repeat hota hai. Bonus: ye kathor 'c' sound cage ki kathorta ko bhi feel karwata hai. Hook: alliteration dhoondhne ke liye same starting sound wale do words paas mein dekho.", "years": ["2024"], "papers": 1, "raw": 3, "marks": 1, "types": ["Extract-SA"], "score": 2}, {"key": "PM4-277", "chapter_code": "PM4", "chapter_name": "How to Tell Wild Animals", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[How to Tell Wild Animals] Mention two chameleon characteristics. What trait does 'If there is nothing on the tree, 'Tis the Chameleon you see' refer to?", "answer": "The chameleon is small, like a lizard, with no ears and no wings. Its key trait is camouflage / changeability — it blends so well with the tree that ‘nothing on the tree’ means the chameleon is actually there. ‘A lizard sort of thing’ means it resembles a lizard but is distinct from it.", "explanation": "Chameleon ki khaas baat: woh apna rang badal kar ped/aas-paas mein ghul-mil jaata hai - isko camouflage / changeability kehte hain. Tabhi poet kehta hai agar ped par 'kuch nahi' dikhe, toh wahi chameleon hai (chhup gaya!). Baaki traits: chhota, lizard jaisa, na kaan na pankh. Hook: Chameleon = colour-change = camouflage.", "years": ["2024"], "papers": 1, "raw": 6, "marks": 1, "types": ["Extract-SA"], "score": 2}, {"key": "PM9-325", "chapter_code": "PM9", "chapter_name": "The Tale of Custard the Dragon", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[The Tale of Custard the Dragon] Contrast the last two lines. What trait do Ink & Blink reveal? Comment on the poet's language. What is the poem's best theme?", "answer": "Contrast: the dog Mustard behaves fiercely like a tiger, while Custard, expected to be the most ferocious, only wants the safety of a cage. Ink and Blink chasing lions reveals a fearless/bold trait. Poet's language: simple words, similes, alliteration, vivid imagery and humorous descriptions in a ballad style. Best theme (MCQ) = (D) Crisis reveals character.", "explanation": "Yeh extract bravery ke comparisons ka hai. Contrast: kutta sher jaisa bahadur, par dragon cage maangta hai (bilkul ulta!). Ink-Blink ka trait = fearless/bold. Language: similes + alliteration + imagery + humour = ballad style. Theme MCQ ka answer hamesha (D) 'Crisis reveals character'. Hook: 'as brave as...' = similes.", "years": ["2024"], "papers": 1, "raw": 7, "marks": 1, "types": ["Extract-SA"], "score": 2}, {"key": "WR2-347", "chapter_code": "WR2", "chapter_name": "Analytical Paragraph", "unit": "Writing", "topic": "From a map/process/flow chart", "question": "The visual given shows the life cycle of a butterfly. Study the information carefully and then summarise it in the form of an analytical paragraph. Make comparisons and draw conclusions wherever applicable. [VISUAL: Diagram showing the Life Cycle of a Butterfly (Egg, Caterpillar, Pupa, Emerging Butterfly, Adult Butterfly)]", "answer": "STRUCTURE (single paragraph, ~100-120 words, formal, sequencing words):\n1) OPENING line — name the process/diagram: 'The diagram illustrates the life cycle of a butterfly, which passes through four stages.'\n2) BODY (2-3 sentences) — describe the stages/steps IN ORDER using sequence connectors (First/Initially → Then/Next → After that → Finally): egg → caterpillar (larva) → pupa (chrysalis) → adult butterfly. Mention what happens at each step and any comparison/transformation.\n3) CLOSING line — a concluding inference about the whole process ('Thus the cycle shows a complete metamorphosis/transformation and then repeats').\nMarking: Content 2, Organisation (correct sequence) 2, Accuracy 1. ONE paragraph; describe stages in the right order — that ordering is where the marks sit.", "explanation": "Process/flow-chart (jaise butterfly life cycle) mein sabse important hai SAHI ORDER. Pehli line: yeh diagram kis process ka hai aur kitne stage hain. Phir sequence words use karo — 'First… Then… Next… After that… Finally' — har step ko order mein describe karo (egg→larva→pupa→butterfly). End me ek line: 'is tarah poora transformation hota hai aur cycle dohrata hai'. Steps aage-peeche ho gaye to marks katenge, isliye arrow ke hisaab se chalo. Present tense, ek paragraph, 100-120 words.", "years": ["2024"], "papers": 1, "raw": 2, "marks": 5, "types": ["Paragraph"], "score": 2}, {"key": "FP1-5", "chapter_code": "FP1", "chapter_name": "A Letter to God", "unit": "First Flight: Prose", "topic": "Incident / plot point", "question": "What did Lencho hope for and why?", "answer": "Lencho hoped for a good downpour of rain, because his field of ripe corn badly needed a shower to give a fine harvest, and that harvest was his family's only source of food and income. When he saw big black clouds and felt the first drops he was delighted – he even compared the raindrops to new coins, dreaming of the money the crop would bring.", "explanation": "Lencho ko sirf ek cheez chahiye thi – achhi baarish, kyunki uski poori roti-roji fasal par tiki thi. Isiliye baarish ko vo paison jaisa dekhta hai. 'Hope for and why' poochein to: baarish chahiye -> achhi fasal -> ghar ka kharcha. Hook: 'baarish hi uski kamaai thi'.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 1}, {"key": "FP1-6", "chapter_code": "FP1", "chapter_name": "A Letter to God", "unit": "First Flight: Prose", "topic": "Figure of speech / poetic device", "question": "What are the raindrops compared to and why?", "answer": "The raindrops are compared to new silver coins. Lencho imagines the big drops as ten-cent pieces and the small ones as five-cent pieces. The comparison shows that for a farmer rain literally means money – a good shower would ripen his corn and bring a rich harvest, so each falling drop felt like wealth pouring down from the sky.", "explanation": "Yahan ek pyaari image hai: baarish ki boondein = naye sikke (coins). Bade drops das cent, chhote paanch cent. Reason ek hi – kisan ke liye baarish ka matlab paisa aur achhi fasal. Comparison waale question mein 'new coins' likhna aur reason 'rain = money = good harvest' dena. Hook: 'boondein nahi, sikke baras rahe the'.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 1}, {"key": "FP2-22", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Extract from Nelson Mandela: Long Walk to Freedom] Mandela spoke of conferring glory and hope to newborn liberty. What did he mean by 'outlaws' and 'common victory'?", "answer": "Society born of disaster = one all humanity would be proud of. Former outlaws' privilege = hosting the nations of the world on their soil. Speaker's feeling = gratitude / achievement. True/False (common victory was when SA did NOT become independent) = False. Noun form of 'confer' = conference.", "explanation": "Yeh RTC inauguration speech se hai. Key points pakke kar: 'outlaws' = jinse duniya ne naata toda tha; ab woh hosts ban gaye. Feeling = gratitude + achievement. Vocab: confer ka noun = conference. RTC tip: jawaab hamesha diye gaye extract se hi nikaalo, bahar se nahi.", "years": ["2023"], "papers": 1, "raw": 16, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 1}, {"key": "FP3-34", "chapter_code": "FP3", "chapter_name": "Two Stories about Flying", "unit": "First Flight: Prose", "topic": "Character sketch", "question": "Why does the narrator take the risk? Why does the narrator take it? (The Black Aeroplane)", "answer": "The narrator (pilot) chose to fly his old Dakota straight into the huge dark storm clouds instead of turning back to Paris. He took this risk because he was longing to get home, be with his family on holiday, and enjoy an English breakfast. His strong desire to reach home overpowered the obvious danger of crashing.", "explanation": "Pilot ne jaan-boojh kar storm mein ghusne ka risk liya - kyun? Kyunki ghar, family aur 'English breakfast' ki yaad usse keench rahi thi. Lesson: kabhi-kabhi strong desire risk uthwa deti hai. Hook: 'breakfast aur family ke liye toofan se panga'. Yeh seedha official answer hai, ratt lo.", "years": ["2023"], "papers": 1, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 1}, {"key": "FP3-40", "chapter_code": "FP3", "chapter_name": "Two Stories about Flying", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Extract from Two Stories about Flying] Describe the narrator's experience inside the clouds. Why couldn't Paris control tower reply? What does 'twisted' mean?", "answer": "Storm extract (Black Aeroplane): (i) Inside the cloud the pilot's vision was obstructed - everything went black. (ii) The instruments (compass, radio) were malfunctioning / had stopped responding (\"dead\"). (iii) Paris Control did not reply because the radio was dead, cutting off all communication. (iv) The narrator's disbelief/helplessness shows when the compass spins round and round. (v) 'twisted' = turned/spun in the air (option: the swimmer who twisted twice before diving).", "explanation": "Yeh 'storm wala extract' hai - sab kuch dead: compass, radio, vision. RTC mein bas extract ke andar se answer dhoondo, bahar ka gyaan mat lagao. 'twisted' = hawa mein ghoomna (swimmer wala option), 'dead' = kaam karna band. Hook: 'black clouds = sab instruments dead, pilot lost'.", "years": ["2023"], "papers": 1, "raw": 15, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 1}, {"key": "FP4-44", "chapter_code": "FP4", "chapter_name": "From the Diary of Anne Frank", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Extract from From the Diary of Anne Frank] How does Anne's writing suggest she felt alone despite being thirteen? Explain 'bring myself'.", "answer": "On the surface Anne 'has everything' (loving parents, a sister, ~30 friends, a good house). Yet we infer she feels alone because she craves one true friend. With friends she discusses only common everyday things. Analogy: alone:friends::nothing:everything. The idiom 'bring myself' = to do something willingly.", "explanation": "Yeh extract Anne ke andar ki loneliness dikhata hai. Bahar se sab kuch hai par sacche dost ki kami hai — isliye paper/diary hi uski dost banti hai. Memory hook: 'everything except one true friend'. RTC sub-qs me analogy aur idiom-meaning aate hain, toh option ko line ke context se match karo, ratta mat maaro.", "years": ["2023"], "papers": 1, "raw": 15, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 1}, {"key": "FP4-45", "chapter_code": "FP4", "chapter_name": "From the Diary of Anne Frank", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Extract from From the Diary of Anne Frank] Anne wrote three pages for Mr. Keesing. Why couldn't she cure her 'incorrigible habit'? Routine:habit::characteristic:___.", "answer": "Mr. Keesing was Anne's (Maths) teacher who set her punishment essays. The incorrigible habit was talking too much (only II). She cannot control it because she inherited it from her mother. Analogy: routine:habit::characteristic:trait. 'most nearly opposite of assigned' = find it difficult to manage.", "explanation": "Yeh wala extract Anne ki talkativeness aur Mr. Keesing ki punishment ke baare me hai. Key point: talking ek 'inherited trait' hai jo maa se aaya — isliye control nahi hota. Memory hook: 'Mr. Keesing = maths teacher = extra homework'. Analogy me word extract me se hi uthana hai (trait).", "years": ["2023"], "papers": 1, "raw": 15, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 1}, {"key": "FP7-79", "chapter_code": "FP7", "chapter_name": "Madam Rides the Bus", "unit": "First Flight: Prose", "topic": "Character sketch", "question": "What stopped Valli from going to the stall to have a drink? What do we learn about Valli from this?", "answer": "Valli refused the conductor's offer of a free cold drink. Her self-respect and pride stopped her from accepting a favour she could not repay, and her good sense kept her from going to an unknown stall alone without money. This shows she was self-willed, dignified and intelligent despite being only eight.", "explanation": "Yeh chhota incident Valli ke SWABHIMAAN ko dikhata hai - free drink mana kar di kyunki ehsaan nahi lena tha. Sikhne ko milta hai: bachcha hone par bhi usme atma-samman aur samajhdaari thi. Memory hook: 'Muft ka bhi nahi liya - ghamand nahi, swabhimaan'. Do-part question hai: pehle 'kyun ruki', phir 'kya seekha' - dono likhna.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 1}, {"key": "FP8-85", "chapter_code": "FP8", "chapter_name": "The Sermon at Benares", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "What did Siddhartha Gautama come across by chance when he was about twenty-five years old?", "answer": "While riding out, the young prince Siddhartha Gautama chanced upon four sights that changed his life - a sick man, an aged man, a funeral procession, and a monk begging for alms. These revealed to him the harsh realities of sickness, old age, death, and renunciation. Deeply disturbed by this suffering of the world, he renounced his royal life and set out to seek enlightenment and the cause of human misery.", "explanation": "Yeh Buddha ke background ki incident hai - 4 'sights' jo usne dekhe. Memory hook: SOFM - Sick man, Old man, Funeral, Monk. Inhe dekh kar usne mahal chhod diya aur sachai dhoondhne nikal pada. 3-marker SA mein chaaron sights likhna - ek bhi miss hua toh marks katenge.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 1}, {"key": "FP9-91", "chapter_code": "FP9", "chapter_name": "The Proposal (Drama)", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Extract from The Proposal (Drama)] The dispute was over the Meadows' (a) free use (b) brick-making (c) peasant use (d) ownership. Explain 'continuance' and why Natalya claims them.", "answer": "Dispute = (d) ownership of Meadows. 'Continuance' = (b) perpetuity. Lomov's aunt's grandmother gave the Meadows in lieu of (c) making bricks for her. Natalya claims them because her grandfather and great-grandfather reckoned their land extended up to Burnt Marsh. The peasants had free use for forty years.", "explanation": "Yeh wala extract Oxen Meadows ke jhagde se hai. Yaad rakh: dispute hamesha OWNERSHIP (kiski zameen) par hai, bricks par nahi. 'Perpetuity' = hamesha ke liye (continuance). Natalya ka logic: hamari zameen Burnt Marsh tak, isliye Meadows hamare. Memory hook: bricks ke badle 40 saal free use mila — par dono apni-apni zid par ade hain.", "years": ["2023"], "papers": 1, "raw": 15, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 1}, {"key": "FP9-102", "chapter_code": "FP9", "chapter_name": "The Proposal (Drama)", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "Chubukov was suspicious when Lomov came to his house. Explain.", "answer": "When Lomov arrives dressed formally in evening attire, Chubukov is suspicious about the reason for the visit. He assumes Lomov has come to borrow money from him, and is initially wary and guarded — until he realises Lomov has actually come to propose marriage to Natalya, after which his attitude turns to delight.", "explanation": "Chubukov ka shak: Lomov formal kapdon (evening dress) mein aaya, toh Chubukov soch leta hai ki yeh udhaar paisa maangne aaya hoga. Hook: galat-fahmi se comedy banti hai — asli wajah toh proposal thi! Yeh choti incident-question hai, seedha reason likh do: borrow money.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 1}, {"key": "FW2-120", "chapter_code": "FW2", "chapter_name": "The Thief's Story", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "What does the thief say about the different reactions of the people when they are robbed?", "answer": "From his experience as a thief, the narrator observes that people react differently to being robbed: the greedy man shows fear (terrified of further loss), the rich man shows anger (outraged at the dent to his wealth), and the poor man accepts the loss quietly, since he is used to hardship. He says he has carefully studied these reactions over his years of stealing.", "explanation": "Yeh chhota detail-based question hai - teen reactions ratt lo: greedy = darr (fear), ameer = gussa (anger), gareeb = chup-chaap maan lena (acceptance). Hari ne yeh apne chori ke experience se observe kiya. Hook: 'G-A-P' - Greedy/Fear, Angry/rich, Poor/accepts. Bas teeno seedha likh do, zyada explanation ki zaroorat nahi.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 1}, {"key": "FW3-127", "chapter_code": "FW3", "chapter_name": "The Midnight Visitor", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "Describe Max as a secret agent.", "answer": "Max was Ausable's rival secret agent - slender, smartly dressed and crafty. He broke in and held Ausable at gunpoint to seize the secret report. Yet he was gullible and easily fooled: his only truly menacing feature was his pistol, and he panicked the moment he feared the police, jumping to his death.", "explanation": "Max ko hamesha Ausable ke ULTA likh - smart-dikhne wala par andar se buddhu. Slender, crafty, pistol uska ekmaatra dangerous part tha. Memory hook: 'Max = pistol strong, brain weak'. Uski gullibility hi haar ki wajah bani - yeh point zaroor likhna.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 1}, {"key": "FW4-136", "chapter_code": "FW4", "chapter_name": "A Question of Trust", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "What does 'honour among thieves' mean ? Why does Horace get angry at this phrase ?", "answer": "'Honour among thieves' means that even thieves stay loyal to one another and don't cheat their own kind. Horace gets angry because the lady thief broke this very code — despite being a thief herself, she deceived and outsmarted him, stole everything, and let him take the blame, damaging his reputation.", "explanation": "Phrase ka matlab: chor bhi aapas mein loyal rehte hain, ek-doosre ko dhokha nahi dete. Horace gussa isliye hai kyunki lady ne yeh usool tod diya — khud chor hokar bhi usi ko cheat kar diya. Memory hook: 'apne hi bande ne dhokha diya, isiliye gussa'. Yeh question uske reaction/izzat par focus karta hai, plan par nahi.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 1}, {"key": "FW5-143", "chapter_code": "FW5", "chapter_name": "Footprints Without Feet", "unit": "Footprints Without Feet", "topic": "Extract-based comprehension", "question": "[Extract from Footprints Without Feet] Griffin set fire to his landlord's house. Why did the landlord try to eject him, and why did Griffin retaliate?", "answer": "From the landlord/fire/footprints extract: Griffin's landlord disliked him and tried to evict him, so in revenge Griffin set the house on fire. He removed his clothes to escape unseen, becoming a penniless, invisible, homeless wanderer. He became visible only when he stepped in mud and left footprints. (The 'not true' statement: he never promised to behave himself.) (approx 45 words)", "explanation": "Yeh extract Griffin ke 'homeless wanderer' banne ki kahani hai. Key chain yaad rakho: landlord nafrat -> revenge mein aag -> kapde utare invisible rehne ko -> mud mein footprints se dikha. MCQs isi sequence par bante hain. Hook: 'aag, kapde, kichad, footprints'. Cause-effect saaf rakho.", "years": ["2023"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 1}, {"key"
