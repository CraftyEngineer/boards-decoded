: "FW5-144", "chapter_code": "FW5", "chapter_name": "Footprints Without Feet", "unit": "Footprints Without Feet", "topic": "Extract-based comprehension", "question": "[Extract from Footprints Without Feet] Mrs. Hall fell down the stairs in hysterics. Why was she convinced the room was haunted, and what caused her to trip?", "answer": "From the haunted-room extract: Mrs. Hall tripped because she was in a state of panic. She believed spirits/the scientist had bewitched the room and entered her furniture. She was terrified, convinced of witchcraft. The fear and superstition explain her hysteria as the 'invisible' Griffin's doings seemed supernatural to her. (approx 45 words)", "explanation": "Iping inn wala scene - Mrs. Hall ko lagta hai kamre mein bhoot (spirits) hain aur furniture par jaadu hua. Ghabrahat (panic) mein woh giri. Reason hamesha 'state of panic' hai, oily floor nahi. Hook: 'Mrs. Hall = darr aur vehem'. Extract ke andar se hi answer dhundo, bahar se mat socho.", "years": ["2023"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 1}, {"key": "FW5-145", "chapter_code": "FW5", "chapter_name": "Footprints Without Feet", "unit": "Footprints Without Feet", "topic": "Extract-based comprehension", "question": "[Extract from Footprints Without Feet] The boys were surprised by fresh muddy imprints of bare feet. Why was seeing a barefooted man in London unusual?", "answer": "From the two-boys-in-London extract: the boys were surprised because it was too cold in London to move around barefoot. Footprints appeared from nowhere and descended the steps, fascinating them. Their reaction is best described as captivated and interested; on first seeing the footmark they felt curious and puzzled (not terrified). (approx 45 words)", "explanation": "Do ladke London mein achanak akele footprints dekhte hain - invisible Griffin chal raha hai. Woh hairaan kyunki itni thand mein nange paer kaun chalega. Unka mood: curious + puzzled, captivated + interested - darr nahi, fascination. Hook: 'thand mein nange paer = mystery'. Feeling-wale MCQ mein excitement waale options chuno.", "years": ["2023"], "papers": 1, "raw": 9, "marks": 1, "types": ["Extract-MCQ"], "score": 1}, {"key": "FW6-149", "chapter_code": "FW6", "chapter_name": "The Making of a Scientist", "unit": "Footprints Without Feet", "topic": "Central theme / message", "question": "What qualities go into the making of a scientist ?", "answer": "The making of a scientist needs three core 'ingredients': a first-rate mind, a deep curiosity about the world, and the will to win for the right reasons — doing one's best, not chasing prizes. Richard Ebright had all three, plus hard work and his mother's early encouragement.", "explanation": "Yeh chapter ka central message hai — scientist banne ke liye sirf dimaag (first-rate mind) kaafi nahi, curiosity aur 'right reasons' ke liye best banne ki will bhi chahiye. Memory hook: '3 ingredients = first-rate Mind + Curiosity + Will to win'. Note: is question ka text qualities/ingredients poochta hai, isliye answer mother nahi, balki scientist ke gun honge.", "years": ["2023"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 1}, {"key": "FW6-150", "chapter_code": "FW6", "chapter_name": "The Making of a Scientist", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "What opinion did Mr. Weiherer, Ebright’s Social Science teacher have about him ?", "answer": "Mr. Weiherer felt Ebright was genuinely competitive — but 'not in a bad sense'. He didn't win for the sake of prizes; he competed to do the best job he possibly could. He was hardworking, put in extra effort, managed his time well, and wanted to be the best for the right reasons.", "explanation": "Weiherer Ebright ke Social Science teacher the — unke according Richard competitive tha 'but not in a bad sense'. Matlab prize ke liye nahi, apna best dene ke liye jeetta tha. Memory hook: 'competitive for the RIGHT reasons'. Common mistake: ise mother wale answer se mat mila dena — yeh sirf teacher ki raay hai.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 1}, {"key": "FW6-155", "chapter_code": "FW6", "chapter_name": "The Making of a Scientist", "unit": "Footprints Without Feet", "topic": "Value / life-lesson", "question": "What lesson did Ebright learn when he did not win anything at a science fair ?", "answer": "At his first county science fair Ebright lost because he had only shown a neat display of frog slides, not real experimental work. He learned that science is not about pretty exhibits — it is about real experiments, innovation and original investigation. Next time he did genuine research, and started winning.", "explanation": "Pehle science fair mein Ebright haar gaya kyunki usne sirf slides ka neat display lagaya tha, koi real experiment nahi. Lesson: science = experiments aur innovation, sirf decoration nahi. Memory hook: 'display nahi, discovery'. Yeh failure-se-seekh wala value question hai — lesson clearly likhna.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 1}, {"key": "FW7-165", "chapter_code": "FW7", "chapter_name": "The Necklace", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "Matilda's over-ambitiousness was the cause of her destruction. Justify.", "answer": "Matilda came from an ordinary family yet dreamt only of wealth, grand homes and admiration far beyond her means. This over-ambition made her perpetually unhappy and dissatisfied. It drove her to borrow a costly necklace to shine at the ball; when she lost it, the huge debt to replace it destroyed the next ten years of her life and her beauty. Her reach exceeding her grasp was the direct cause of her destruction.", "explanation": "Is group ka focus Matilda ke 'over-ambition' par hai — apni aukaat se zyada sapne dekhna. Average family se thi par maharani jaisi zindagi chahti thi, isiliye barbaad hui. Hook: 'Aukaat se zyada chahat = vinaash'. Justify-type question hai, toh thesis (over-ambition ne destroy kiya) + 2-3 proof points do.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 6, "types": ["Literature-LA"], "score": 1}, {"key": "FW8-173", "chapter_code": "FW8", "chapter_name": "Bholi", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "Education is always a great asset in the life of a woman. How did Bholi, an educated girl, face the challenge posed by Bishamber's greed?", "answer": "When Bishamber demanded five thousand rupees as dowry on the wedding day, Bholi's educated mind refused to accept such greed and the insult to her father, who was ready to fall at the groom's feet. Calmly but firmly she threw away the garland and declared she would not marry such a mean, greedy man. Her education gave her the courage to reject him, save her father's honour, and decide to serve her parents and teach village children instead. Education was the asset that let her turn a moment of humiliation into one of strength.", "explanation": "Yeh specifically WEDDING wala scene hai - Bishamber ki dowry demand aur Bholi ka jawaab. Key point: 5000 rupees dowry maanga, father zhukne laga, par Bholi ne mala phenk di aur shaadi se mana kar diya. Education = asset jisne himmat di. Common mistake: sirf 'education good hai' mat likho - is incident ko detail mein batao (dowry, garland, refusal).", "years": ["2023"], "papers": 1, "raw": 3, "marks": 6, "types": ["Literature-LA"], "score": 1}, {"key": "FW8-177", "chapter_code": "FW8", "chapter_name": "Bholi", "unit": "Footprints Without Feet", "topic": "Value / life-lesson", "question": "Destiny had been cruel to Bholi yet she made a place for herself in a conservative society. Discuss.", "answer": "Destiny was harsh to Bholi from the start - an infant fall left her dull and stammering, smallpox scarred her face, her family neglected her as a burden, and she was pushed into marriage with a greedy old man. Yet she carved out her own place. School and a loving teacher gave her confidence and speech; she gathered the courage to reject Bishamber's dowry demand, refused to be humiliated, and resolved to look after her parents and become a teacher. Despite a cruel fate and a conservative society, Bholi rose through education and determination to claim dignity and purpose.", "explanation": "Do hisse hain: (1) destiny kitni cruel thi - fall, stammer, pockmarks, neglect, forced marriage. (2) phir bhi place kaise banayi - education, teacher, dowri refuse, teacher banne ka faisla. Dono points balance karo. Memory hook: 'cruel fate vs strong will' - Bholi ne haalat ko haraaya. Conservative society mein bhi usne apni jagah banayi.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 6, "types": ["Literature-LA"], "score": 1}, {"key": "FW9-189", "chapter_code": "FW9", "chapter_name": "The Book that Saved the Earth", "unit": "Footprints Without Feet", "topic": "Extract-based comprehension", "question": "[Extract from The Book that Saved the Earth] Think-Tank wants to communicate with a probe to Earth. Read:learn::explore:___. 'Your Intelligence' refers to whom? What does Think-Tank want to do, and what is his role?", "answer": "(i) Martians on Earth. (ii) probe (read leads to learn, as explore leads to probe). (iii) 'Your Intelligence' refers to Think-Tank (a respectful title for him). (iv) He wants to invade/take over Earth and communicate with his Martians already on Earth. (v) Think-Tank is the ruler / Commander-in-Chief / leader of the Martian team. The extract shows his arrogance — he calls Earth 'ridiculous' and 'insignificant' yet vainly stops to admire himself in his mirror.", "explanation": "Yeh pehla extract passage hai (mirror/space-probe wala) — same 5 sub-questions kai sets aur years mein repeat hue hain, isliye sab ek group mein. Quick answers ratt le: Martians on Earth / probe / Think-Tank / invade Earth / ruler-leader. Hook: 'Earth ko insignificant bola, par sheeshe mein khud ko nihaarta raha — pakka ghamandi!' Analogy mein passage ka hi word dhoondhna hai.", "years": ["2023"], "papers": 1, "raw": 16, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 1}, {"key": "PM3-256", "chapter_code": "PM3", "chapter_name": "A Tiger in the Zoo", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[Extract from A Tiger in the Zoo] The tiger 'stalks in his vivid stripes'. What do these stripes refer to?", "answer": "The vivid stripes refer to the bright, bold black-and-yellow stripes on the body of the tiger.", "explanation": "'Vivid stripes' = tiger ki bright black-yellow dhaariyan. Stanza 1 padho dhyaan se: tiger cage mein hai par uski body abhi bhi majestic hai. Yaad rakho: 'vivid' = bright/clear, aur stripes hamesha tiger ke body ki hi baat karti hain. Extract questions mein answer hamesha lines ke andar se hi nikaalo.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Extract-SA"], "score": 1}, {"key": "PM3-262", "chapter_code": "PM3", "chapter_name": "A Tiger in the Zoo", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "It is clear that repetition is the poetic device used for 'his brilliant eyes' and 'brilliant stars' because ______. (explain how repetition applies)", "answer": "The word 'brilliant' is repeated in 'brilliant eyes' and 'brilliant stars'. This repetition creates a musical, rhythmic effect and emphasises the brilliance — linking the tiger's bright eyes to the bright, free stars he longs for.", "explanation": "Repetition = ek hi shabd jaan-bujhkar dohraana. Yahan 'brilliant' do baar aaya — eyes aur stars dono ke liye. Isse rhythm/music banta hai aur brilliance par zor padta hai. Saath hi tiger ki aankhein aur door ke aazaad sitaare jud jaate hain. Hook: repetition ka effect = emphasis + musical sound.", "years": ["2023"], "papers": 1, "raw": 3, "marks": 1, "types": ["Extract-SA"], "score": 1}, {"key": "PM9-324", "chapter_code": "PM9", "chapter_name": "The Tale of Custard the Dragon", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[Extract from The Tale of Custard the Dragon] Describe Custard's features. Sharp:blunt::above:___. What is the effect of 'Mouth like a fireplace' and 'chimney for a nose'? Was Custard courageous?", "answer": "Analogy: above : underneath. The option that is NOT a feature of the dragon = (c) brave as a lion. The simile 'Mouth like a fireplace' creates (a) emphasis, stressing his fierce looks. 'Chimney for a nose' is a metaphor: the nose is compared to a chimney because it puffs out smoke-like air. True/False ('Custard was known for his courage') = False — he was called a coward.", "explanation": "Yeh extract Custard ki appearance wala hai. Quick answers: above→underneath; 'brave as a lion' uska feature NAHI hai; 'mouth like a fireplace' = simile (emphasis ke liye); 'chimney for a nose' = metaphor (smoke nikaalti naak); courage wali statement FALSE (woh coward kehlata tha). Tip: in 1-markers mein seedha extract dekho, overthink mat karo.", "years": ["2023"], "papers": 1, "raw": 16, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 1}]};
const UL={"First Flight: Prose":"FP","First Flight: Poems":"PM","Footprints Without Feet":"FW","Grammar":"GR","Writing":"WR","Reading":"RD"};
const esc=s=>(s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));
const app=document.getElementById('app');
document.getElementById('ft').textContent=DATA.meta.sets;
let curChapter=null, filters={year:null,marks:null,type:null};

function go(v,arg){window.scrollTo(0,0);
 document.getElementById('n-home').className=v=='home'?'on':'';
 document.getElementById('n-hy').className=v=='hy'?'on':'';
 if(v=='home')renderHome();else if(v=='hy')renderHY();else if(v=='chapter'){curChapter=arg;filters={year:null,marks:null,type:null};renderChapter();}}

function conceptsFor(code){return DATA.concepts.filter(c=>c.chapter_code==code).sort((a,b)=>b.papers-a.papers||b.score-a.score);}

function unitCard(d){const L=UL[d.name]||'FP';
 let h=`<h2 class="sec"><span class="dot" style="background:var(--u-${L})"></span>${esc(d.name)} · ${d.marks} marks</h2><div class="cards">`;
 for(const c of d.chapters){
  h+=`<a class="ch" style="border-left-color:var(--u-${L})" onclick="go('chapter','${c.code}')">
   <div class="nm">${esc(c.name)}</div>
   <div class="meta"><span><span class="bigmark">${c.marks_per_paper}</span> mk/paper</span>
   <span class="badge ${c.importance}">${c.importance}</span></div>
   <div class="meta" style="margin-top:8px"><span>${c.papers}/21 papers · ${c.total_q} Qs</span><span>${c.concepts} key Qs ›</span></div>
  </a>`;}
 return h+`</div>`;}

function renderHome(){
 let h=`<div class="stats">
  <div class="stat"><b>${DATA.meta.sets}</b><span>official papers analysed</span></div>
  <div class="stat"><b>4</b><span>exam years (2023–26)</span></div>
  <div class="stat"><b>${DATA.meta.total_questions.toLocaleString()}</b><span>questions classified</span></div>
  <div class="stat"><b>${DATA.meta.canonical_questions.toLocaleString()}</b><span>canonical Qs</span></div></div>`;
 h+=`<p style="color:var(--mut);margin:0 0 6px">The paper = <b style="color:var(--ink)">Reading 20 · Writing &amp; Grammar 20 · Literature 40</b>. Literature repeats by <b style="color:var(--ink)">lesson + theme</b>, grammar by <b style="color:var(--ink)">rule</b>, writing by <b style="color:var(--ink)">format</b>; reading is <b style="color:var(--ink)">skill-practice</b> (passages change yearly). Cards are ranked by importance (marks/paper × how often asked) — tap any for the questions that recur, a model answer, and a Hinglish explanation.</p>`;
 h+=`<div class="band">📚 Literature <span>· 40 marks · the most repeatable part — these exact lessons/poems/stories come back</span></div>`;
 for(const d of DATA.units) if(["First Flight: Prose","First Flight: Poems","Footprints Without Feet"].includes(d.name)) h+=unitCard(d);
 h+=`<div class="band">✍️ Reading, Writing &amp; Grammar <span>· 40 marks · learn the formats &amp; rules; practise the reading skills</span></div>`;
 for(const d of DATA.units) if(["Grammar","Writing","Reading"].includes(d.name)) h+=unitCard(d);
 app.innerHTML=h;}

function pills(c){let y=c.years.map(x=>`<span class="pill yr">${x}</span>`).join('');
 return `<span class="pill freq">🔁 ${c.papers} papers</span>${y}<span class="pill">${c.marks} mark${c.marks>1?'s':''}</span>${(c.types[0]?`<span class="pill">${esc(c.types[0])}</span>`:'')}`;}

function qcard(c,i,star){const id='a'+Math.random().toString(36).slice(2,9);
 return `<div class="qcard${star?' star':''}">
  <div class="qtop">${star?'<span class="star-tag">⭐ MUST-DO · yeh baar baar aata hai</span>':''}${pills(c)}</div>
  <div class="qtext">${esc(c.question)}</div>
  <span class="toggle" onclick="t('${id}',this)">▸ Show model answer &amp; explanation</span>
  <div class="ans" id="${id}">
   <div class="lab">Model answer</div><div class="ansbox">${esc(c.answer)||'—'}</div>
   ${c.explanation?`<div class="lab">Samajh le (Hinglish)</div><div class="expl">${esc(c.explanation)}</div>`:''}
  </div></div>`;}
function t(id,el){const e=document.getElementById(id);e.classList.toggle('open');
 el.textContent=(e.classList.contains('open')?'▾ Hide':'▸ Show model answer & explanation');}

function renderChapter(){let list=conceptsFor(curChapter);
 const ch=DATA.units.flatMap(d=>d.chapters).find(x=>x.code==curChapter)||{name:curChapter,topics:[]};
 const L=curChapter.slice(0,2);
 const isReading=L=='RD';
 const years=[...new Set(list.flatMap(c=>c.years))].sort();
 const marks=[...new Set(list.map(c=>c.marks))].sort((a,b)=>a-b);
 const types=[...new Set(list.flatMap(c=>c.types))].filter(Boolean).sort();
 const f=l=>l.filter(c=>(!filters.year||c.years.includes(filters.year))&&(!filters.marks||c.marks==filters.marks)&&(!filters.type||c.types.includes(filters.type)));
 const shown=f(list);
 const topics=ch.topics||[];const maxt=topics.length?topics[0].count:1;
 const tid=s=>'t-'+(s||'x').replace(/[^a-z0-9]/gi,'');
 let h=`<div class="crumb"><a onclick="go('home')">Home</a> › <b>${esc(ch.name)}</b></div>
  <h2 class="sec" style="margin-top:4px"><span class="dot" style="background:var(--u-${L})"></span>${esc(ch.name)}</h2>
  <p style="color:var(--mut);margin:0 0 4px">${ch.marks_per_paper||''} marks/paper · appeared in <b style="color:var(--ink)">${ch.papers}/21</b> exam variants · <b style="color:var(--ink)">${ch.total_q_raw||list.length}</b> questions across ${DATA.meta.sets} papers · ${list.length} recurring question types</p>`;
 if(isReading)h+=`<div class="note">📝 This is the <b>unseen passage</b> section — the passage changes every year, so don't memorise content. These are the <b>question-types/skills</b> that recur; practise the skill, not the answer.</div>`;
 if(topics.length){h+=`<div class="card-sec"><div class="lab">${isReading?'Skill':'Theme / question-type'} breakdown · all ${ch.total_q_raw} questions (raw count)</div>`;
  topics.forEach(t=>{h+=`<div class="toprow" onclick="jump('${tid(t.topic)}')"><span class="tname">${esc(t.topic)}</span>
   <span class="tbarwrap"><span class="tbar" style="width:${Math.max(4,Math.round(100*t.count/maxt))}%;background:var(--u-${L})"></span></span>
   <span class="tcount">${t.count}</span></div>`;});h+=`</div>`;}
 const cf=(lab,key,vals,fmt)=>`<div class="chips"><span style="color:var(--mut);font-size:12px;align-self:center">${lab}:</span>`+
  `<span class="chip ${!filters[key]?'on':''}" onclick="setF('${key}',null)">All</span>`+
  vals.map(v=>`<span class="chip ${filters[key]==v?'on':''}" onclick="setF('${key}','${v}')">${fmt?fmt(v):v}</span>`).join('')+`</div>`;
 h+=`<div class="lab" style="margin-top:16px">Most-repeated question types · model answer + Hinglish</div>`;
 h+=cf('Year','year',years)+cf('Marks','marks',marks,v=>v+'m')+(types.length?cf('Type','type',types):'');
 if(!shown.length){h+='<div class="empty">No questions match these filters.</div>';app.innerHTML=h;return;}
 const groups={};shown.forEach(c=>{(groups[c.topic]=groups[c.topic]||[]).push(c);});
 const seen=new Set();
 topics.forEach(t=>{const g=groups[t.topic];if(!g)return;seen.add(t.topic);
  h+=`<div class="tsub" id="${tid(t.topic)}">${esc(t.topic)} · ${g.length} type${g.length>1?'s':''}</div>`;
  g.sort((a,b)=>b.papers-a.papers).forEach((c,i)=>h+=qcard(c,i,c.papers>=6));});
 Object.keys(groups).forEach(tp=>{if(seen.has(tp))return;
  h+=`<div class="tsub">${esc(tp||'Other')}</div>`;groups[tp].forEach((c,i)=>h+=qcard(c,i,c.papers>=6));});
 app.innerHTML=h;}
function jump(id){const e=document.getElementById(id);if(e)e.scrollIntoView({behavior:'smooth',block:'start'});}
function setF(k,v){filters[k]=v;renderChapter();}

function renderHY(){const top=[...DATA.concepts].sort((a,b)=>b.score-a.score||b.papers-a.papers).slice(0,60);
 let h=`<h2 class="sec">⭐ High-Yield for 2027 <span style="font-size:11px;color:var(--mut);text-transform:none;letter-spacing:0">· recency-weighted (2026×4 … 2023×1)</span></h2>
  <p style="color:var(--mut);margin:0 0 10px">If time is short, start here. These question types repeated most — and most recently. Learn the <b style="color:var(--ink)">theme / rule / format</b>; the wording will change in your paper.</p>`;
 top.forEach((c,i)=>{h+=`<div class="chlabel">${i+1}. <span style="color:var(--accent)">${esc(c.chapter_name)}</span> · ${c.unit} · ${esc(c.topic)}</div>`+qcard(c,i,i<5);});
 app.innerHTML=h;}

function search(v){v=v.trim().toLowerCase();if(!v){go('home');return;}
 document.getElementById('n-home').className='';document.getElementById('n-hy').className='';
 const r=DATA.concepts.filter(c=>(c.question+' '+c.key+' '+c.chapter_name+' '+c.topic+' '+(c.answer||'')).toLowerCase().includes(v)).sort((a,b)=>b.papers-a.papers).slice(0,80);
 let h=`<h2 class="sec">🔍 ${r.length} results for “${esc(v)}”</h2>`;
 if(!r.length)h+='<div class="empty">Kuch nahi mila — try another keyword (lesson, character, theme, or grammar rule).</div>';
 r.forEach((c,i)=>h+=`<div class="chlabel"><span style="color:var(--accent)">${esc(c.chapter_name)}</span> · ${c.unit} · ${esc(c.topic)}</div>`+qcard(c,i,false));
 app.innerHTML=h;}
renderHome();
</script></body></html>
