(movement = into, na ki 'upto'). 'IN the theatre / IN our country' = kisi jagah/area ke andar (on nahi). Hook: deadline=within, andar jaana=into, sthir jagah=in. Error wali lines mein galat preposition (upto/on/into) ko sahi se replace karo.", "years": ["2023", "2025", "2026"], "papers": 3, "raw": 8, "marks": 1, "types": ["Grammar"], "score": 8}, {"key": "PM4-274", "chapter_code": "PM4", "chapter_name": "How to Tell Wild Animals", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "Explain the irony in the last two lines of the stanza. / Why is the term ‘bear hug’ ironical? / In the given lines, what effect does the poet create? (a) irony (b) terror (c) sympathy (d) criticism", "answer": "The irony is that an animal's appearance contradicts its deadly nature — hyenas seem to smile and crocodiles seem to weep, yet both are dangerous. ‘Bear hug’ is ironic because a hug suggests love, but the bear's embrace crushes and kills its prey. In the tiger lines, ‘just notice if he eats you’ creates irony — you identify the tiger only by becoming its victim.", "explanation": "Irony = jo dikhta hai uska ulta hota hai. Smile/weep dikhao par jaanwar khatarnaak - yahi irony hai. 'Bear hug' mein 'hug' pyaar lagta hai par bear toh daba ke maar deta hai. Tiger ko tab pata chalega jab woh tumhe kha le - kitni ironic baat hai! Hook: irony mein hamesha 'expectation vs reality' ka contrast batao.", "years": ["2023", "2025", "2026"], "papers": 3, "raw": 7, "marks": 2, "types": ["Extract-MCQ", "Extract-SA", "Literature-SA"], "score": 8}, {"key": "PM6-293", "chapter_code": "PM6", "chapter_name": "Amanda!", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "Explain why Amanda wants to be an orphan. Refer to the given lines, from the text - I am an orphan, roaming the street. I pattern soft dust with my hushed, bare feet. The silence is golden, the freedom is sweet.", "answer": "Amanda imagines being an orphan because an orphan has no parents to nag or control her. Fed up with constant instructions and surveillance, she craves the 'golden' silence and 'sweet' freedom of roaming the streets barefoot, patterning the dust. The barefoot, dusty image signifies a carefree childhood free of rules and correction.", "explanation": "Orphan = jiske maa-baap na ho, matlab koi tok-tok na ho! Amanda asli mein orphan nahi banna chahti, bas nagging se azaadi chahti hai. 'Silence is golden, freedom is sweet' - yeh line peace aur azaadi ka symbol hai. Hook: 'orphan = no nagging = full freedom'. Dusty barefoot image = carefree, bina rules ka bachpan.", "years": ["2024", "2026"], "papers": 3, "raw": 10, "marks": 3, "types": ["Extract-SA", "Literature-SA"], "score": 8}, {"key": "PM6-298", "chapter_code": "PM6", "chapter_name": "Amanda!", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "Identify any one poetic device used in the above extract. / Why is the second verse written in brackets ? / Select the option that applies the same rhyme scheme as the lines of the given extract.", "answer": "Key devices: REPETITION ('Amanda!' repeated for nagging effect), ALLUSION/METAPHOR (Amanda alludes to Rapunzel and a mermaid), and IMAGERY (emerald sea, golden silence). The bracketed (parenthetical) stanzas show Amanda's private inner thoughts/daydreams, set apart from her mother's spoken words. The fantasy stanzas follow a regular aaa rhyme scheme (care/rare/hair).", "explanation": "Devices yaad rakh: Repetition (baar-baar 'Amanda!'), Allusion (Rapunzel/mermaid jaise jaane-maane characters), Imagery (emerald sea, golden silence). Brackets () kyun? Kyunki woh Amanda ki andar ki soch hai, maa ko sunai nahi deti. Hook: 'bracket = Amanda ka dil ki baat (inner thoughts)'. Rhyme scheme fantasy lines mein aaa hota hai.", "years": ["2024", "2025"], "papers": 3, "raw": 9, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 8}, {"key": "PM9-321", "chapter_code": "PM9", "chapter_name": "The Tale of Custard the Dragon", "unit": "First Flight: Poems", "topic": "Character", "question": "Describe the changing reactions of Ink, Blink and Mustard to Custard’s bravado. / What role does each of Belinda's pets play in the narrative? / Belinda and other animals have been described as brave. But on seeing the pirate they behaved in a cowardly way. How did they react?", "answer": "At first Ink, Blink and Mustard mocked timid Custard and called him a coward. When the pirate appeared, the boastful pets and Belinda turned cowardly — Belinda cried and the dog, cat and mouse fled or hid in terror. After Custard killed the pirate they praised him, then ironically boasted they were braver than he, while Custard humbly agreed.", "explanation": "Pets ka reaction badalta rehta hai: pehle Custard ka mazaak (coward, Percival), pirate aate hi sab bhaag gaye/chhup gaye, Custard ke jeetne ke baad uski taareef, phir wapas apni jhooti dhing ('hum zyada bahadur the'). Hook: 'mock → flee → praise → boast again'. Yeh cycle yaad rakh.", "years": ["2024", "2025"], "papers": 3, "raw": 5, "marks": 3, "types": ["Literature-SA"], "score": 8}, {"key": "GR3-208", "chapter_code": "GR3", "chapter_name": "Subject–Verb Concord", "unit": "Grammar", "topic": "Indefinite pronouns (each/everyone)", "question": "Complete the given narrative, by filling in the blank with the correct option : Each of the boys .................... rewarded. (a) are being (b) have been (c) was (d) were", "answer": "Each / every / everyone / each one / either / neither + (of the...) always take a SINGULAR verb. 'Each of the boys WAS rewarded'; 'Every effort HAS BEEN made'; 'Each one of the candidates HAS submitted' (error: have→has). The plural noun after 'of' is a distractor — verb stays singular.", "explanation": "'Each', 'every', 'everyone', 'either', 'neither' — yeh sab hamesha SINGULAR verb lete hain, chahe baad me 'of the boys/candidates' (plural) likha ho. 'Each of the boys WAS' — boys dekhke 'were' mat likhna, woh trap hai! Hook: each/every ka matlab 'ek-ek karke', isliye verb singular. Board me yeh pakka aata hai.", "years": ["2023", "2024", "2026"], "papers": 3, "raw": 3, "marks": 1, "types": ["Grammar"], "score": 7}, {"key": "PM4-278", "chapter_code": "PM4", "chapter_name": "How to Tell Wild Animals", "unit": "First Flight: Poems", "topic": "Tone / mood", "question": "How does Ogden Nash/Wells create humour and entertainment in the poem? / Analyze how the poet employs humour, rhyme, and exaggerated traits to both entertain and educate readers about wild animals.", "answer": "The poet creates humour through non-standard spellings and coined words (‘lep’, ‘nonplus’), funny rhymes, and exaggeration — supposedly brave people flee or are eaten. The grim idea of being attacked is told in a light, witty way. This humour entertains while also teaching readers how to identify animals by their traits, stressing keen observation.", "explanation": "Yeh 3-marker theme question hai. Poet hasi kaise laata hai? Galat-jaan-boojh ke spellings (lep), tukbandi (rhyme), aur exaggeration se - khatarnaak baat ko mazaak mein keh deta hai. Saath hi yeh entertainment ke through hume animals pehchaanna sikhata hai. Hook: 'entertain + educate' dono points likhna - rhyme, wordplay, exaggeration mention karo.", "years": ["2024", "2025"], "papers": 3, "raw": 7, "marks": 3, "types": ["Extract-SA", "Literature-SA"], "score": 7}, {"key": "PM5-285", "chapter_code": "PM5", "chapter_name": "The Ball Poem", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "What does the repetition of the word \"merrily\" suggest in the context of the ball's movement? / The poet repeats the word 'what' — why?", "answer": "The poet uses repetition and alliteration. Repeating 'What, what' conveys the boy's shock, panic and helplessness; repeating 'Merrily...Merrily' (also alliteration) stresses the ball's happy, playful bouncing and symbolises a carefree childhood — sharpening the later contrast with grief. The ball itself is used as a symbol of the boy's childhood.", "explanation": "Do device alag-alag rakhna: (1) Repetition of 'what' = ladke ka shock/helplessness. (2) Repetition + alliteration of 'merrily' = ball ki khushi-khushi bouncing, happy childhood ka symbol. Hook: 'merrily = masti, what-what = ghabraahat.' Fill-in-blank type mein ball = 'childhood' likhna, 'adventure' nahi.", "years": ["2023", "2024", "2026"], "papers": 3, "raw": 12, "marks": 1, "types": ["Extract-SA"], "score": 7}, {"key": "PM6-294", "chapter_code": "PM6", "chapter_name": "Amanda!", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "Amanda wants to be the sole inhabitant in the sea. Elucidate. / Why does Amanda wish to be a mermaid ?", "answer": "Amanda wishes to be a mermaid, the sole inhabitant of a vast 'languid emerald sea', because she is fed up with constant nagging and wants total peace, space and independence. The mermaid drifting 'blissfully' alone symbolises effortless freedom and solitude - the exact opposite of Amanda's restless, controlled reality.", "explanation": "Mermaid samundar mein akeli, bina kisi rok-tok ke aaram se tairti hai - wahi Amanda chahti hai: peace + akelapan + freedom. 'Sole inhabitant' matlab woh akeli, koi nagging karne wala nahi. Hook: 'mermaid = akeli + free + blissful'. Emerald sea ki shaanti vs Amanda ki bechaini - yeh contrast zaroor likho.", "years": ["2023", "2025"], "papers": 3, "raw": 10, "marks": 1, "types": ["Extract-MCQ", "Extract-SA", "Literature-SA"], "score": 7}, {"key": "PM6-295", "chapter_code": "PM6", "chapter_name": "Amanda!", "unit": "First Flight: Poems", "topic": "Character sketch", "question": "In the poem Amanda, why does the poet use the famous fairy tale character, Rapunzel ? Explain. / For what reason does Amanda imagine herself to be Rapunzel ?", "answer": "The poet uses Rapunzel because, like her, Amanda wants to live alone, high in a tower, far from interference. To Amanda the tower life is 'tranquil and rare' - peaceful, private and free of her mother's nagging. Unlike the fairy tale, Amanda would 'never let down her hair', i.e. she wants no one to disturb her solitude.", "explanation": "Rapunzel tower mein akeli rehti hai - Amanda ko wahi chahiye: shaanti aur privacy, koi tang na kare. Twist: Amanda baal niche nahi girayegi, matlab koi upar aakar disturb na kare! 'Tower is tranquil and rare' = peace + solitude. Hook: 'Rapunzel = tower = akeli, shaant, koi nagging nahi'.", "years": ["2024", "2025"], "papers": 3, "raw": 7, "marks": 1, "types": ["Extract-SA", "Literature-SA"], "score": 7}, {"key": "FP3-37", "chapter_code": "FP3", "chapter_name": "Two Stories about Flying", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "Motivation plays an important role in taking risks in life and in succeeding. Do you agree? Discuss with reference to the pilot of the old Dakota and the young seagull.", "answer": "Yes. Both stories prove that motivation drives one to take risks and succeed. The pilot was motivated by the longing to reach home and have breakfast with his family, so he risked flying through a deadly storm. The young seagull was motivated by sharp hunger and his mother's fish, so he overcame his fear and took his first plunge into flight. Their approaches differed (the seagull cautious and fear-driven, the pilot adventurous and instinctive), but in both, strong motivation conquered fear and led to success.", "explanation": "Yeh lesson ka CENTRAL theme hai - 'motivation se hi risk lete hain aur success milti hai'. Pilot ka motivation = ghar/family/breakfast; seagull ka motivation = bhookh. Dono ne darr ko motivation se hara diya. Approach alag (seagull cautious, pilot adventurous) par result same. Hook: 'motivation hi engine hai'. 6-marker mein dono examples + difference likhna.", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 7, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 6}, {"key": "PM4-271", "chapter_code": "PM4", "chapter_name": "How to Tell Wild Animals", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[How to Tell Wild Animals] 'Novice' means the same as: (a) learner (b) beast (c) tender foot (d) beginner. It signifies a/an _____ person.", "answer": "‘Novice’ means a beginner / inexperienced person (option d). In the tiger stanza, the word ‘discern’ tells you that you have recognised the animal.", "explanation": "Vocabulary wale 1-marker pakke marks hain. 'Novice' = beginner / naya, inexperienced banda. 'Discern' = pehchaan lena. Tip: option dekh ke confuse mat ho - 'tender foot' bhi beginner jaisa lagta hai, par CBSE ka official answer 'beginner' hai. In do shabdon ko ratt lo, har saal ghoom ke aate hain.", "years": ["2023", "2026"], "papers": 3, "raw": 9, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 6}, {"key": "RD2-340", "chapter_code": "RD2", "chapter_name": "Case-based / Factual Passage (skills)", "unit": "Reading", "topic": "True/False / fact-opinion", "question": "State which of the given statements is not true : (A) January is the coldest month, with an average maximum temperature of 20 °C and an average lowest temperature of 6 °C. (B) The mean maximum and mean minimum temperatures range from 15 to 20 °C at altitudes of 2 km.", "answer": "This whole section is SKILL-PRACTICE, not memorisation: the passage/data change every year, so practise the technique, not the content. STRATEGY: 1) Read the statement carefully — watch for words like 'all/never/only/always' that often make it FALSE. 2) Find the matching line in the passage and compare word-by-word; even one changed number/word flips it to false. 3) For 'which is NOT true' questions, verify each option against the text and pick the one that contradicts it. 4) Distinguish FACT (stated, verifiable in text) from OPINION (a view/feeling). Never decide from memory — decide only from what the passage actually says.", "explanation": "True/False mein statement dhyan se padho — 'all/never/only/always' jaise shabd aksar use FALSE bana dete hain. Passage ki matching line dhoondho aur word-by-word milao; ek number/shabd bhi badla to false ho jaata hai. 'NOT true' poocha ho to har option ko text se check karo aur jo contradict kare wahi chuno. Fact = text mein likha/verify ho sake; Opinion = kisi ka vichaar. Apni yaaddaasht se nahi, sirf passage se decide karo.", "years": ["2023", "2024", "2025"], "papers": 3, "raw": 9, "marks": 1, "types": ["Reading-MCQ", "Reading-SA"], "score": 6}, {"key": "FP2-11", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "'No one is born hating another person because of the colour of his skin, or his background or his religion. People must learn to hate, and if they can learn to hate, they can be taught to love.' Do you agree? Discuss.", "answer": "Mandela believed hatred is not natural - it is learned, so love can be taught too. Apartheid was a man-made system of oppression that denied Blacks their rights and obligations. Since people are taught to hate, they can equally be taught to love, because love comes more naturally to the human heart and goodness, though hidden, can never be extinguished.", "explanation": "Yeh chapter ki sabse important line hai. Mandela kehte hain ki nafrat koi paida hote hi nahi seekhta - apartheid ne logon ko sikhayi. Agar nafrat sikhayi ja sakti hai, toh pyaar bhi sikhaya ja sakta hai. Memory hook: 'hate is taught, so love can be taught.' Insaan ka asli swabhav goodness hai.", "years": ["2023", "2025"], "papers": 3, "raw": 7, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 5}, {"key": "PM4-276", "chapter_code": "PM4", "chapter_name": "How to Tell Wild Animals", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[How to Tell Wild Animals] If you see a beast with a 'hide with spots is peppered', how can you identify it as a leopard?", "answer": "A leopard is recognised by the way it leaps (it keeps leaping again and again). The Bengal Tiger has black stripes on a yellow ground; a leopard instead has dark/black spots on its hide. Analogy: claws : nails :: hide : skin. Difference between Bengal tiger and Asiatic lion — tiger has black stripes on yellow body and kills silently, while the lion is large, tawny/dull-brown and roars while killing.", "explanation": "Yeh stanza leopard aur tiger ki pehchaan karwata hai. Leopard ki nishaani: woh baar-baar 'lep and lep' koodta hai, aur uski khaal par dhabbe (spots) hote hain. Tiger ki nishaani: peeli khaal par kaali dhaariyan (stripes) aur chup-chaap shikaar. Analogy easy hai - 'hide' = animal ki skin. Hook: Tiger = STRIPES, Leopard = SPOTS, Lion = roar + tawny.", "years": ["2023", "2025"], "papers": 3, "raw": 13, "marks": 1, "types": ["Extract-MCQ", "Extract-SA", "Literature-SA"], "score": 5}, {"key": "FP1-2", "chapter_code": "FP1", "chapter_name": "A Letter to God", "unit": "First Flight: Prose", "topic": "Character sketch", "question": "What idea does the Postmaster come up with? What did he do to stick to his resolution? (A Letter to God)", "answer": "The postmaster – a fat, amiable, kind-hearted man – first breaks out laughing at the odd letter addressed to God, but instantly turns serious, moved by Lencho's faith. To keep that faith alive he decides to reply 'from God'. He collects money from his employees, adds part of his own salary, and manages to send 70 pesos. He is generous, sensitive and good-natured.", "explanation": "Postmaster ka character do shabdon mein: kind aur clever. Pehle hansi aati hai, phir Lencho ki faith dekh ke serious ho jaata hai aur khud chanda jama karke 'God' ke naam se paise bhejta hai. Character/portrayal/'mixed emotions' question mein traits do – jovial, generous, sensitive. Hook: 'hansi se shuru, dil se khatam'.", "years": ["2023", "2024"], "papers": 3, "raw": 7, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FW1-106", "chapter_code": "FW1", "chapter_name": "A Triumph of Surgery", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "How did Mrs. Pumphrey treat Tricki? (The Triumph of Surgery)", "answer": "Mrs Pumphrey was a loving but ignorant, over-indulgent mistress. She treated Tricki like her own child - overfeeding him with cream cakes, chocolates and cod-liver oil between meals. When Dr Herriot advised cutting food and adding exercise, she agreed but never followed it, making excuses (like the gardener being ill) and feeding him more whenever he looked weak. Her blind affection nearly killed him.", "explanation": "Mrs Pumphrey ka character: 'loving but ignorant/foolish.' Woh Tricki ko apne bachche jaisa treat karti hai par sahi knowledge nahi - isliye over-feed karke beemar kar deti hai. Excuses banati hai (gardener beemar hai) aur advice follow nahi karti. Hook: 'Dil acha, dimaag absent.' Iss group mein uski treatment + excuses dono aate hain.", "years": ["2023"], "papers": 3, "raw": 7, "marks": 3, "types": ["Literature-SA"], "score": 3}, {"key": "GR6-222", "chapter_code": "GR6", "chapter_name": "Prepositions", "unit": "Grammar", "topic": "Prepositional verbs/phrases", "question": "Fill in the blank by choosing the correct option : You should ____ your mother for your rude behaviour. (a) apologise for (b) apologise at (c) apologise with (d) apologise to", "answer": "apologise TO (a person); also turn TO (sb for help), comparable TO, stopped FROM (going). Rule: verb/adjective + its fixed preposition — apologise to a person but for a fault; turn to; comparable to; stop somebody from doing.", "explanation": "In sab mein verb/adjective ke saath ek fixed preposition aata hai jo ratna padta hai. 'Apologise TO' kisi insaan se, lekin 'apologise FOR' kisi galti ke liye. 'Turn TO' parents (sahara lena), 'comparable TO' (tulna), aur 'stopped FROM going' (rokna = from). Hook: stop/prevent/refrain ke baad hamesha FROM + -ing.", "years": ["2023"], "papers": 3, "raw": 5, "marks": 1, "types": ["Grammar"], "score": 3}, {"key": "PM3-258", "chapter_code": "PM3", "chapter_name": "A Tiger in the Zoo", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "It is clear that metaphor is the poetic device used for 'pads of velvet' because ______. (explain how metaphor applies) / The phrase 'pads of velvet' means ___.", "answer": "'Pads of velvet' is a metaphor: the tiger's soft paws (pads) are directly compared to velvet — showing their softness and silent movement — without using 'as' or 'like'.", "explanation": "Metaphor = do cheezon ki direct comparison bina 'as/like' ke. Yahan tiger ke paws (pads) ko velvet kaha gaya — matlab paws velvet jaise mulayam aur silent hain. Common mistake: ise simile mat bolna, kyunki 'as/like' nahi hai. Memory hook: 'pads of velvet' = soft silent paws = metaphor.", "years": ["2023"], "papers": 3, "raw": 9, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 3}, {"key": "PM3-259", "chapter_code": "PM3", "chapter_name": "A Tiger in the Zoo", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[A Tiger in the Zoo] True or False: The cage restricts the tiger's steps. The tiger's eyes symbolize freedom. The tiger waits for deer.", "answer": "Cage restricting his steps — True. Staring at stars symbolising longing for freedom — True. Tiger stealthily waiting for deer at the water hole — False (he is caged; 'he SHOULD be' lurking is only what he would do if free).", "explanation": "True/False questions mein trap yahi hota hai: 'He should be lurking...' matlab woh sirf kalpana hai — asli mein tiger cage mein hai, jungle mein nahi. Isliye 'tiger deer ka shikaar kar raha hai' = FALSE. Par cage ne steps restrict kiye aur stars freedom ka symbol hai = TRUE. Hook: 'should be' = wish, reality nahi.", "years": ["2023"], "papers": 3, "raw": 9, "marks": 1, "types": ["Extract-SA"], "score": 3}, {"key": "PM4-272", "chapter_code": "PM4", "chapter_name": "How to Tell Wild Animals", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[How to Tell Wild Animals] True or False: Hyenas weep. The extract identifies a Royal Bengal Tiger. An animal repeatedly leaping is a leopard.", "answer": "‘Hyenas are famous for weeping’ — False (hyenas smile/laugh; crocodiles weep). ‘The extract helps to identify a Royal Bengal Tiger’ — True. ‘When an animal repeatedly leaps at a person, it is a leopard’ — True.", "explanation": "True/False ek-marker easy hai agar stanza yaad ho. Hyena rota nahi, hanste hue aata hai - isliye 'hyenas weep' = False. Tiger wala extract (black stripes, yellow ground) Bengal Tiger pehchaanta hai = True. Leopard baar-baar 'lep and lep' karta hai = True. Hook: statement ko stanza se exactly match karo, apni guess mat lagao.", "years": ["2023"], "papers": 3, "raw": 9, "marks": 1, "types": ["Extract-SA"], "score": 3}, {"key": "FP4-51", "chapter_code": "FP4", "chapter_name": "From the Diary of Anne Frank", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "What was the last task assigned to Anne Frank by Mr. Keesing due to her habit of talking and how does she show her ingenuity to answer it? / In her essay 'A Chatterbox', how does Anne justify her habit of talking? / Anne calls herself a chatterbox — justify.", "answer": "As punishment for talking, Mr. Keesing set Anne essays titled 'A Chatterbox' and 'Quack, Quack, Quack, said Mistress Chatterbox'. She justified talking as a student's natural, inherited (from her mother) and incurable trait. Showing ingenuity, she wrote the last essay as a funny poem about a mother duck and father swan, which Mr. Keesing enjoyed and read aloud.", "explanation": "Yeh key incident hai: Mr. Keesing ki punishment essays aur Anne ki cleverness. Last essay woh poem ki shakal me likhti hai (duck family wali) — Mr. Keesing has padh kar maaf kar dete hain. Memory hook: 'Chatterbox -> Quack Quack poem -> teacher impressed'. Justify me 'inherited trait + student's nature' likhna.", "years": ["2026"], "papers": 2, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 8}, {"key": "FP4-52", "chapter_code": "FP4", "chapter_name": "From the Diary of Anne Frank", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "Give a brief description of Anne Frank's family. / Mention the details that Anne provides about her family in her diary.", "answer": "The Franks were a Jewish family. Anne's father, Otto Frank, was loving, patient and understanding; her mother, Edith, was very talkative; and her elder sister was Margot. The family lived in Frankfurt, Germany before emigrating to Amsterdam, and Anne and Margot had earlier stayed with their grandmother.", "explanation": "Family ke facts yaad rakh: father Otto (patient, loving), mother Edith (talkative), badi behen Margot, Jewish family, Frankfurt se Amsterdam. Yeh chhote-chhote details 3-marker me direct poochhe jaate hain — naam aur ek-ek trait likho, bas.", "years": ["2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 8}, {"key": "FP8-89", "chapter_code": "FP8", "chapter_name": "The Sermon at Benares", "unit": "First Flight: Prose", "topic": "Value / life-lesson", "question": "Though he knew it was impossible, why did Buddha ask Kisa Gotami to bring mustard seeds from a house untouched by death?", "answer": "Buddha set the impossible task deliberately, as a teaching method. A direct sermon would not have eased her grief, for she was blinded by sorrow and could not accept her son's death. By sending her door to door, he let her discover for herself that every family had lost someone - that death is universal and unavoidable. This self-realisation, rather than mere words, healed her and led her from despair to wisdom and peace.", "explanation": "Yeh 'WHY did Buddha do it' wali reasoning questions hain. Point: Buddha smart teacher tha - bhaashan se nahi, experience se sikhaya. Kisa apne dukh mein andhi thi, isliye usse khud ghar-ghar ghuma kar sach dikhaya. Memory hook: 'show, don't tell' - Buddha ne dikhaya ki maut universal hai, sirf bola nahi.", "years": ["2026"], "papers": 2, "raw": 2, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 8}, {"key": "FP9-97", "chapter_code": "FP9", "chapter_name": "The Proposal (Drama)", "unit": "First Flight: Prose", "topic": "Character sketch", "question": "How does Natalya's behaviour in 'The Proposal' reflect her stubbornness and insecurity? / While arguing with Lomov, Natalya always emerged the winner. Justify.", "answer": "Natalya is quarrelsome, stubborn, materialistic and short-tempered. She argues fiercely and dominates Lomov — insisting Oxen Meadows and the dog Squeezer are superior, staying composed while Lomov suffers palpitations, so she 'wins' every dispute. Yet she is insecure: the moment she learns Lomov came to propose, she desperately wants him back, screaming and weeping, revealing her eagerness to marry beneath the stubbornness.", "explanation": "Natalya ka character: ziddi, jhagdalu, materialistic, par andar se insecure (shaadi ki jaldi). Argument mein hamesha jeet jaati hai kyunki woh shaant rehti hai aur Lomov ghabra jaata hai. Twist yaad rakh: proposal ka pata chalte hi woh hi sabse zyada bechain ho jaati hai — yeh insecurity dikhata hai. Char sketch mein 2-3 trait + example likhna.", "years": ["2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 8}, {"key": "FW7-162", "chapter_code": "FW7", "chapter_name": "The Necklace", "unit": "Footprints Without Feet", "topic": "Central theme / message", "question": "Evaluate how “The Necklace” critiques the obsession with appearances and social status.", "answer": "The story criticises judging worth by appearance and status. Matilda equates happiness with looking wealthy, so she borrows a diamond necklace to seem rich at the ball. Losing it forces ten years of poverty to replace it — and the necklace turns out to be fake. Maupassant exposes how chasing appearances and social status leads to ruin, and that real worth lies in contentment and honesty, not superficial show.", "explanation": "Yeh group 'appearance/social status ki obsession' aur 'appearance vs reality' theme ke liye hai. Matilda ko log kya sochenge, woh kaisi dikhe — bas yahi chinta thi. Maupassant samajha raha hai ki dikhawa khokhla hota hai. Hook: 'Dikhawa = dhoka'. Fake necklace wala ironic twist zaroor likhna, kyunki wahi appearance-vs-reality ka asli proof hai.", "years": ["2026"], "papers": 2, "raw": 4, "marks": 6, "types": ["Literature-LA"], "score": 8}, {"key": "FP1-10", "chapter_code": "FP1", "chapter_name": "A Letter to God", "unit": "First Flight: Prose", "topic": "Extract comprehension", "question": "[A Letter to God] Why were no leaves left on the trees after the hailstorm? (A) Locusts (B) Earthquake (C) Hailstorm (D) Animals.", "answer": "RTC (extract) sub-questions – answer straight from the passage. Hailstorm extract: leaves gone because of the hailstorm (C); Lencho felt 'devastated'; 'All our work, for nothing' refers to his ruined cornfields and lost income; he would prefer locusts as they would at least leave a few leaves. Postmaster extract: 'What faith!' shows the postmaster admiring Lencho's immense/'immense' faith; he laughed at first because (D) he had never seen such an address; the postmaster is jovial, amiable, then thoughtful, kind and generous.", "explanation": "RTC ke chhote MCQ, fill-ups aur 1-2 line answers seedhe passage se aate hain – ratna nahi, dhyaan se padho. Do main extracts: (1) hailstorm waala – ole se sab tabaah, Lencho 'devastated', locusts behtar kyunki kuch patte bachte; (2) postmaster waala – 'What faith!', immense faith, naya address dekh ke hansa, postmaster jovial+generous. Hook: 'extract ka jawab paragraph ke andar hi chhupa hai'.", "years": ["2025", "2026"], "papers": 2, "raw": 24, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 7}, {"key": "FP2-13", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "Why did Mandela feel that liberation was important for both the oppressor and the oppressed? Mandela emphasizes the need to liberate the oppressor. Illustrate.", "answer": "Mandela believed both oppressor and oppressed are robbed of their humanity. The oppressed is denied freedom, while the oppressor is himself a prisoner of hatred, prejudice and narrow-mindedness. A man who takes away another's freedom destroys his own dignity. So true freedom demands that both be liberated - the victim from bondage and the oppressor from hatred.", "explanation": "Yeh deep idea hai: Mandela kehte hain ki zulm karne wala bhi azaad nahi hota - woh nafrat aur sankuchit soch ka kaidi hai. Jo dusre ki azaadi cheenta hai, woh apni insaaniyat kho deta hai. Memory hook: 'oppressor bhi nafrat ki jail mein band hai.' Dono ko liberate karna zaroori hai.", "years": ["2025", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 7}, {"key": "FP4-49", "chapter_code": "FP4", "chapter_name": "From the Diary of Anne Frank", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "In 'From the Diary of Anne Frank', how does Anne's relationship with her diary help her cope with isolation and the fear of hiding? / Why did Anne think that paper has more patience than people?", "answer": "Anne felt lonely and friendless, so her diary 'Kitty' became her closest confidant. Paper, unlike people, is patient and non-judgmental, so she could pour out her deepest thoughts and fears freely. During hiding it gave her emotional release, comfort and a sense of companionship, helping her endure isolation and fear.", "explanation": "Central theme: akelapan aur ek sacche dost ki zaroorat. Diary (Kitty) Anne ki sabse achhi dost ban jaati hai kyunki paper patient aur non-judgmental hai. Yeh hi chapter ka dil hai — theme ek line me yaad rakh: 'loneliness + need for a true friend = diary becomes her friend'.", "years": ["2025", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 7}, {"key": "FW1-104", "chapter_code": "FW1", "chapter_name": "A Triumph of Surgery", "unit": "Footprints Without Feet", "topic": "Value-based / life-lesson", "question": "Evaluate how \"A Triumph of Surgery\" is a lesson in thoughtful parenting.", "answer": "Mrs Pumphrey's undisciplined love is like a parent spoiling a child. She mistakes indulgence for care, ignores Dr Herriot's advice and keeps sending treats even during Tricki's 'surgery', nearly killing him. The lesson: real care, like good parenting, needs discipline and boundaries; over-pampering, though well-meant, can seriously harm and even endanger the loved one.", "explanation": "Yeh value/lesson-type questions hain - 'parenting', 'foolishness ya harm', 'kya seekha'. Connect Mrs Pumphrey ko ek over-protective parent se: zaroorat se zyaada laad-pyaar bachche (ya pet) ko bigaad deta hai. Common mistake - sirf story dohrana mat; lesson clearly likho: 'discipline zaroori hai, warna pyaar bhi nuksaandeh ban jaata hai.' LA (6 marks) mein dono side (agree/disagree) touch kar sakti ho.", "years": ["2025", "2026"], "papers": 2, "raw": 6, "marks": 6, "types": ["Literature-LA"], "score": 7}, {"key": "FW1-110", "chapter_code": "FW1", "chapter_name": "A Triumph of Surgery", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "Why did Mrs. Pumphrey think the dog's recovery is 'a triumph of surgery'? (A Triumph of Surgery)", "answer": "Before the stay, Tricki was hugely fat, lethargic, overfed and breathless. With a controlled diet, regular exercise and the company of other dogs, he became a lithe, active, healthy animal again. Because the change was so dramatic - and she never knew the 'cure' was just diet and exercise - Mrs Pumphrey assumed Tricki had undergone some major operation, calling his recovery 'a triumph of surgery'.", "explanation": "Title ka twist yahin hai! Koi surgery hui hi nahi - sirf diet aur exercise se Tricki theek ho gaya. Itna bada change dekh ke Mrs Pumphrey ko laga zaroor koi badi surgery hui hogi, isliye boli 'a triumph of surgery'. Hook: 'No knife, just diet - phir bhi surgery ka credit!' Before/after contrast zaroor likhna.", "years": ["2025", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 7}, {"key": "FW3-129", "chapter_code": "FW3", "chapter_name": "The Midnight Visitor", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "Why was Fowler interested in meeting Ausable? (The Midnight Visitor)", "answer": "Fowler was a young, romantic writer who wanted to witness the thrill, danger and glamour of a real secret agent's life for his writing. He expected Ausable to be a dashing, adventurous spy, but was let down to find him fat, sloppy and dull - proof that appearances deceive, until the night's events finally thrilled him.", "explanation": "Fowler ek young writer tha jo spy ki real excitement dekhna chahta tha - thrill aur adventure for his story. Par Ausable ko dekh ke nirash ho gaya (fat, sloppy). Memory hook: 'writer aaya thrill dhoondhne, mila boring banda'. Disappointment + reason (uske mann mein filmi spy ka stereotype tha) dono touch karna.", "years": ["2025", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 7}, {"key": "FW3-133", "chapter_code": "FW3", "chapter_name": "The Midnight Visitor", "unit": "Footprints Without Feet", "topic": "Extract-based comprehension", "question": "[The Midnight Visitor] How does Ausable's balcony explanation create suspense?", "answer": "Read the extract closely and answer to the point. Balcony extract: the management was meant to BLOCK OFF the balcony; what irritated Ausable was (C) its accessibility from the neighbouring unit; 'last month/now' adds a sense of MYSTERY; the detailed, convincing description confuses Max and builds suspense, foreshadowing his downfall. Hotel/Fowler extract: Fowler felt (C) surprised and disappointed; the gloomy, musty hotel made him feel let down; Ausable's noticing his mood shows he was OBSERVANT; he defies the spy image by being fat, unimpressive, weak in French/German and living in a small dull room.", "explanation": "Extract questions sabse easy marks hain - answer hamesha diye gaye passage ke andar hi hota hai, bahar se mat soch. MCQ aur fill-in ek baar passage padh ke pakka karo. Memory hook: balcony extract = 'block off / accessibility (C) / mystery / suspense'; Fowler extract = 'disappointed (C) / gloomy hotel / observant / defies spy image'. 40-word wale mein seedha-seedha point likho, kahani mat repeat karo.", "years": ["2025", "2026"], "papers": 2, "raw": 25, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 7}, {"key": "FW4-138", "chapter_code": "FW4", "chapter_name": "A Question of Trust", "unit": "Footprints Without Feet", "topic": "Value / life-lesson", "question": "Horace ends up in prison only to regret that a man should not trust anyone blindly without finding out the truth. Do you think his own foolishness was responsible for his arrest ? Give a reasoned answer. (A Question of Trust)", "answer": "Yes, largely his own foolishness caused his arrest. He trusted a complete stranger blindly, never checked whether she was really the owner, removed his gloves and opened the safe on her word — leaving fingerprints. The lesson: never trust anyone blindly without verifying the truth. (Ironically, prison became a 'blessing in disguise' — he became assistant librarian and finally read the rare books he loved.)", "explanation": "Yeh 'opinion + lesson' type question hai — stand lo aur reasons do. Haan, galti uski apni thi: anjaan aurat par andha bharosa, bina verify kiye safe khol diya. Lesson: 'kisi par bhi blindly bharosa mat karo, sach pata karo'. 'Blessing in disguise' wale version mein point yeh hai ki jail mein librarian banke uska kitaabon ka shauk poora ho gaya. Hook: 'blind trust = jail, par jail mein books mil gayi'.", "years": ["2025", "2026"], "papers": 2, "raw": 2, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 7}, {"key": "FW5-148", "chapter_code": "FW5", "chapter_name": "Footprints Without Feet", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "Describe the extraordinary behaviour of the furniture when the Halls entered the stranger's room. / Mrs. Hall's suspicion on Griffin for the theft grew stronger and she confronted him. Describe Griffin's reaction.", "answer": "Furniture scene: when the Halls entered, the furniture - especially the bedroom chair - moved violently on its own, charged at them, pushed them out and slammed the door (the invisible Griffin at work). Theft confrontation: a cornered Griffin threw off his bandages/disguise, grew nervous and agitated, gave vague replies, flung furniture and fled. (approx 45 words)", "explanation": "Do dramatic incidents: (1) kursi/furniture apne aap hilta hai aur Halls ko dhakka deta hai - kyunki invisible Griffin baitha tha. (2) Theft ka shak hone par Griffin patti utaar deta hai, bhadak jaata hai, samaan phenkta hai. Hook: 'invisible aadmi = udta furniture'. Incident ka 'kyun' (Griffin invisible tha) zaroor likhna.", "years": ["2025", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 7}, {"key": "FW9-185", "chapter_code": "FW9", "chapter_name": "The Book that Saved the Earth", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "Think-Tank excelled in misinterpreting and misrepresenting things. Do you agree? Justify giving appropriate reasons. (The Book that Saved the Earth)", "answer": "Yes, Think-Tank is the Martian Commander-in-Chief — vain, pompous and falsely 'intelligent', yet he repeatedly misjudges everything. He mistakes a library for a barn, then a refreshment stand, books for sandwiches, and harmless nursery rhymes for advanced weapons and an assassination plot. His arrogance makes him crave flattery and ignore his clever subordinate Noodle. His half-cooked knowledge and refusal to admit fault show he indeed excels at misinterpreting and misrepresenting things.", "explanation": "Character sketch of Think-Tank: ghamandi, apne aap ko sabse intelligent samajhne wala, par actually har cheez galat samajhta hai. Traits yaad rakh — vain, pompous, flattery-lover, stubborn, half-cooked knowledge. Hook: 'naam Think-Tank, par dimaag empty tank!' Justify karne ke liye 2-3 examples do: library ko barn samjha, books ko sandwich, rhymes ko weapon.", "years": ["2025", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["Extract-SA", "Literature-SA"], "score": 7}, {"key": "PM1-240", "chapter_code": "PM1", "chapter_name": "Dust of Snow", "unit": "First Flight: Poems", "topic": "Key incident / plot", "question": "What changes the mood of the poet in the poem 'Dust of Snow'?", "answer": "A crow, sitting on a hemlock tree, shakes down a fine dust of snow that falls on the poet. This small, unexpected moment in nature instantly changes his mood — it shakes off his sadness and regret, fills him with relief and hope, and saves the rest of his day.", "explanation": "Yeh 'kya hua' wala incident question hai. Sequence yaad rakh: crow hila → snow gira → poet par → mood badal gaya. Key point: yeh ek chhota, unexpected pal tha jisne sadness ko relief aur hope mein badal diya. Memory hook: 'Ek chhoti si baat ne poora din bana diya.' Hamesha bata ki kis cheez ne change kiya (snow) aur kaise (sadness se hope).", "years": ["2025", "2026"], "papers": 2, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 7}, {"key": "PM10-246", "chapter_code": "PM10", "chapter_name": "For Anne Gregory", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "How does the poet present the concept of beauty in the poem 'For Anne Gregory'?", "answer": "The poem's central message is the contrast between external beauty and inner worth. Yeats shows that conventional, physical beauty is a changeable, human-made idea that attracts only shallow admiration, while true beauty lies in a person's inner self. The reflective tone urges us to value who a person really is, not just their looks.", "explanation": "Poem ka central theme ek line mein: 'bahari sundarta vs andar ki sachchi sundarta'. Yeats kehte hai ki physical beauty toh society ki banayi hui soch hai aur badalti rehti hai; asli beauty andar hoti hai. Tone thoughtful aur thoda sad hai. Yaad rakh: theme wale, concept-of-beauty wale aur tone wale — sab same idea, ek hi answer chalega.", "years": ["2025", "2026"], "papers": 2, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 7}, {"key": "PM2-254", "chapter_code": "PM2", "chapter_name": "Fire and Ice", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "'Fire' and 'Ice' are used in the poem as _______. (A) similes (B) metaphors (C) repetition (D) oxymorons", "answer": "(B) Metaphors - fire and ice are not compared using 'like' or 'as', they directly stand for desire and hatred. The rhyme-scheme MCQ from the same extract set takes option (D), whose line-endings rhyme like the poem's (fire-desire-fire, ice-twice-suffice).", "explanation": "Device MCQs ek saath: (1) Fire/Ice = METAPHORS (B) - bina 'like/as' ke ek cheez doosri ke liye khadi. Memory hook 'No like/as = metaphor'. (2) Rhyme-scheme option mein wahi chuno jiske line-endings aapas mein rhyme karein, jaise 'fire-desire-fire'. Ye 1-mark MCQs har set mein repeat hote hain, isliye pakka kar lo - free marks.", "years": ["2025", "2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["Extract-MCQ"], "score": 7}, {"key": "PM5-282", "chapter_code": "PM5", "chapter_name": "The Ball Poem", "unit": "First Flight: Poems", "topic": "Value / life-lesson", "question": "'The Ball Poem' deals with the undertones of loss and responsibility. How is the poem very relatable to our lives and what important message/s do we learn from it?", "answer": "We learn that loss is an inevitable, universal part of life and growing up — 'what every man must one day know'. Instead of consoling the boy, the poet lets him feel the grief so he learns resilience, self-reliance and 'how to stand up'. The lesson: accept impermanence, take responsibility, and value what is irreplaceable over money.", "explanation": "Life-lesson type questions mein 'hum kya seekhte hain' poocha jaata hai. Answer: loss zindagi ka hissa hai, sabko ek din face karna padta hai, aur khud uthna (how to stand up) seekhna padta hai. Poet boy ko console nahi karta kyunki real seekh khud dukh face karke aati hai. Hook: 'grief feel karo, tabhi stand up karna aayega.'", "years": ["2025", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 7}, {"key": "PM7-304", "chapter_code": "PM7", "chapter_name": "The Trees", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "How does the comparison between the boughs and newly discharged patients contribute to the theme or message of the poem? Answer in about 40 words.", "answer": "The boughs are compared (simile) to 'newly discharged patients, half-dazed' — long confined and weak, now stepping out disoriented and fragile. This reinforces the theme of a difficult transition: like patients leaving a clinic after long illness, the trees move uncertainly into freedom after a long period of constraint, highlighting adjustment and struggle.", "explanation": "Simile yaad rakho: 'boughs LIKE newly discharged patients' — 'like'/'as' aaye toh simile. Matlab: lambe time se band the, ab bahar nikal rahe hain par kamzor aur 'half-dazed' (disoriented + fragile). Theme se link: aazaadi aasaan nahi, transition mein struggle hota hai. Branches = patients = yaad rakhne ka hook.", "years": ["2025", "2026"], "papers": 2, "raw": 9, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 7}, {"key": "PM7-307", "chapter_code": "PM7", "chapter_name": "The Trees", "unit": "First Flight: Poems", "topic": "Tone / mood", "question": "What atmosphere or mood is created by the language and imagery used in the above lines? (I sit inside, doors open to the veranda... the whole moon shines in a sky still open)", "answer": "These closing lines create a tranquil, detached, yet hopeful mood — serenity and a sense of joy/relief. The fresh night, the whole unbroken moon and the open sky metaphorically suggest hope, optimism and revolution: freedom has been achieved and a calm, new beginning has arrived.", "explanation": "Ye poem ka aakhri, shaant hissa hai — narrator andar baith ke letter likh rahi hai. Mood = serene, detached, hopeful (serenity + joy). 'Whole moon' aur 'open sky' = hope/revolution ka symbol. Note: yahan atmosphere MCQ ka answer aksar 'serenity'/'2 and 5' hota hai — pichle eerie wale se ulta.", "years": ["2025", "2026"], "papers": 2, "raw": 6, "marks": 2, "types": ["Extract-MCQ", "Extract-SA"], "score": 7}, {"key": "PM7-310", "chapter_code": "PM7", "chapter_name": "The Trees", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[The Trees] What is conspicuously absent from the long letters the speaker writes?", "answer": "What is conspicuously absent is any mention of the departure of the forest/trees from the house — the single most significant event happening around her. She 'scarcely mentions' this momentous change in her letters, suggesting she takes the trees' bid for freedom as natural and beyond words.", "explanation": "Factual question hai: letter mein narrator ne kya 'mushkil se' likha? — trees/forest ke ghar se nikal jaane ki baat. Itni badi event ko woh barely mention karti hai. Tip: ye seedha extract se uthana hai, koi deep analysis nahi — bas 'departure of the forest from the house' likho.", "years": ["2025", "2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["Extract-SA"], "score": 7}, {"key": "FP1-1", "chapter_code": "FP1", "chapter_name": "A Letter to God", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "Explain the irony in the chapter, “A Letter to God\".", "answer": "The irony is that Lencho, who firmly believes only God will help him, actually receives help from ordinary human beings – the postmaster and the office staff. Yet, finding 70 pesos instead of 100, he never suspects God; instead he calls these very kind helpers 'a bunch of crooks' for supposedly stealing the rest. The people he distrusts are exactly the ones who saved him.", "explanation": "Irony matlab jo ulta ho jaaye jiski ummeed na ho. Lencho sochta hai God madad karega, par asli madad insaano ne ki – aur unhi ko 'crooks' bol diya! Irony poochein to do cheezein likho: (1) madad divine nahi, human thi, (2) helpers ko hi chor samajh liya. Hook: 'jisne diya, usi ko chor bola'.", "years": ["2024", "2026"], "papers": 2, "raw": 5, "marks": 3, "types": ["Literature-SA"], "score": 6}, {"key": "FP2-16", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "Mandela in his speech says, 'The policy of apartheid created a deep and lasting wound in my country and my people.' Explain the significance of the word 'wound'.", "answer": "The word 'wound' shows that apartheid caused deep, long-lasting pain and damage - not just physical, but psychological. Decades of brutal oppression created prejudice, discrimination and a sense of inferiority among Black people, who were tortured, enslaved and stripped of dignity. Like a wound, this suffering left lasting scars that would take generations to heal.", "explanation": "'Wound' yaani ghaav - Mandela apartheid ko ek gehre ghaav jaisa kehte hain jo sirf body nahi, mann par bhi laga. Decades tak Blacks ko zillat, gulami aur heen-bhavna sehni padi. Memory hook: 'apartheid = ghaav jo peedhiyon tak rehta hai.'", "years": ["2025"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 6}, {"key": "FP3-39", "chapter_code": "FP3", "chapter_name": "Two Stories about Flying", "unit": "First Flight: Prose", "topic": "Value / life-lesson", "question": "You have been asked to present an evaluation of the approaches of both, the Baby Seagull and the Pilot who was lost in the clouds, towards achieving their dreams of conquering the skies. Compare the role of faith, determination or self-doubt vs curiosity across the seagull and another character (e.g. Lencho, or Valli in 'Madam Rides the Bus').", "answer": "Across these texts, fear and self-doubt block success while faith, determination and curiosity unlock it. The young seagull, gripped by self-doubt, only flew when hunger forced him and his wings instinctively worked, showing resilience and trust in his own ability. Lencho's unshaken faith in God made him write a letter for help after the hailstorm ruined his crop. Valli's curiosity to see the world drove her to plan a bus ride, where she enjoyed the scenery but also glimpsed death and life's impermanence. All overcame limits through inner drive.", "explanation": "Cross-text value question hai: self-doubt/fear = barrier, par faith/determination/curiosity = success ki chaabi. Seagull ne darr ko persistence se hara diya; Lencho ne faith dikhayi; Valli ne curiosity se duniya dekhi. Hook: 'andar ka vishwaas bahar ke darr se bada hota hai'. Jo bhi second text aaye, seagull ke saath uska resilience/faith compare kar dena.", "years": ["2025"], "papers": 2, "raw": 5, "marks": 6, "types": ["Literature-LA"], "score": 6}, {"key": "FW1-103", "chapter_code": "FW1", "chapter_name": "A Triumph of Surgery", "unit": "Footprints Without Feet", "topic": "Central theme / message", "question": "We are often over-indulgent towards people we care about. Explain with reference to the story A Triumph of Surgery.", "answer": "Mrs Pumphrey's excessive love made her over-indulge Tricki, overfeeding him with cream cakes, chocolates and cod-liver oil and giving no exercise. This pampering, mistaken for care, made the dog obese and seriously ill. The story shows that love without discipline harms the one we love; true care needs boundaries and restraint.", "explanation": "Is kahani ka core message ek line mein: 'Pyaar bina discipline ke nuksaan karta hai.' Mrs Pumphrey Tricki se itna pyaar karti hai ki use over-feed karke beemar bana deti hai. Yaad rakhne ka hook - 'Love + no limits = harm.' Jab bhi over-indulgence/central theme wala question aaye, yeh line aur Tricki ka 'bloated sausage' example likh do.", "years": ["2024", "2026"], "papers": 2, "raw": 4, "marks": 3, "types": ["Literature-SA"], "score": 6}, {"key": "FW3-130", "chapter_code": "FW3", "chapter_name": "The Midnight Visitor", "unit": "Footprints Without Feet", "topic": "Central theme / message", "question": "\"The Midnight Visitor\" illustrates that \"Stereotypes are often misleading\". Justify.", "answer": "The story shows that stereotypes and appearances mislead us. Ausable defies the glamorous spy image - overweight, lethargic and unassuming - yet he is the sharpest mind in the room, easily trapping the crafty Max. The message: never judge a book by its cover; true ability lies in intelligence and presence of mind, not looks.", "explanation": "Central theme ek line mein yaad rakh: 'kitaab cover se nahi, intelligence se aaki jaati hai'. Ausable filmi spy jaisa nahi tha, phir bhi sabse tez nikla. Yeh 'justify/explain' theme question hai - statement ko Ausable ke example se sabit kar. Force ya glamour nahi, brain jeeta - yahi lesson hai.", "years": ["2024", "2026"], "papers": 2, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 6}, {"key": "FW6-156", "chapter_code": "FW6", "chapter_name": "The Making of a Scientist", "unit": "Footprints Without Feet", "topic": "Value / life-lesson", "question": "In what manner does Richard Ebright's perseverance, dedication and inquisitiveness inspire you to pursue your dreams?", "answer": "Ebright rose from a curious boy collecting butterflies to a top scientist who discovered how cells read DNA — driven by curiosity, hard work and his mother's support. He failed at his first fair but didn't quit; he turned that setback into better research. He inspires us to follow our curiosity, work hard, and treat failure as a step forward.", "explanation": "Yeh LA/value question hai — Ebright ki journey (curious bachcha → great scientist) se hum kya seekhte hain. Points: curiosity follow karo, mehnat karo, aur failure se haar mat maano (first fair haara phir bhi laga raha). Memory hook: 'curiosity + hard work + never quit'. Transformation wala question (id 2207) bhi yahi journey trace karta hai — early influences → fairs → cell theory.", "years": ["2025"], "papers": 2, "raw": 4, "marks": 6, "types": ["Literature-LA"], "score": 6}, {"key": "FW7-168", "chapter_code": "FW7", "chapter_name": "The Necklace", "unit": "Footprints Without Feet", "topic": "Incident / plot point", "question": "Why does Mme Loisel hastily depart from the ball when her husband places a modest wrap on her shoulders? Also: why was her husband so excited at having received the invitation?", "answer": "Mr. Loisel was excited because the ball invitation was hard to get — only a few clerks were chosen — and he believed it would delight his wife. But Matilda hurried away from the ball because her husband draped a plain, modest wrap over her elegant gown; she feared the other rich women in costly furs would notice her poverty. Her hasty exit reveals her pretentiousness, vanity and shame about her real status.", "explanation": "Yeh ball ke do moments cover karta hai: pati khush kyun (invitation badi mushkil se mili, socha biwi khush hogi) aur Matilda jaldi kyun bhaagi (sasti shawl mein ameer auraton ke saamne sharm aayi). Hook: 'Dikhawe ki sharm — isliye bhaagi'. Matilda ke pretentious/vain hone ko zaroor connect karo, kyunki wahi answer ka asli point hai.", "years": ["2025"], "papers": 2, "raw": 4, "marks": 3, "types": ["Literature-SA"], "score": 6}, {"key": "FW8-176", "chapter_code": "FW8", "chapter_name": "Bholi", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "Why did Bholi's teacher feel like an artist admiring her masterpiece?", "answer": "When Bholi boldly refused to marry the dowry-seeking Bishamber and took a confident stand, the teacher felt like an artist gazing at her finest masterpiece. The frightened, stammering, neglected girl she had first met was now a self-assured young woman speaking up for her own dignity. Just as an artist takes pride in a creation shaped by his own hands, the teacher felt proud that her care and faith in education had moulded Bholi into this transformed, fearless person - living proof of education's power.", "explanation": "Yeh ek beautiful image hai - teacher = artist, transformed Bholi = uski masterpiece (painting). Kyun? Kyunki teacher ne hi mehnat se Bholi ko gada (shaped). 'Who did the teacher compare herself with' = an artist. Memory hook: artist + masterpiece = teacher ka garv apni 'creation' Bholi par. Yeh climax ke baad aata hai.", "years": ["2024", "2026"], "papers": 2, "raw": 4, "marks": 3, "types": ["Literature-SA"], "score": 6}, {"key": "PM10-247", "chapter_code": "PM10", "chapter_name": "For Anne Gregory", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "Explain, why the speaker mentions God in the poem \"For Anne Gregory\".", "answer": "The speaker mentions God to show that only divine love is selfless and unconditional. Human beings are often incapable of seeing beyond outward appearance and love Anne only for her yellow hair. Quoting an old religious man's text, the poet says only God can love a person for their true self alone, reinforcing the idea of pure, spiritual love.", "explanation": "God ka zikr isliye kiya gaya kyunki sirf God ka pyaar selfless hai — woh insaan ko uske asli roop ke liye pyaar karta hai, baalon ke liye nahi. Insaan toh bahari sundarta mein atak jaata hai. Memory hook: 'only God = selfless love, insaan = selfish/dikhawa wala love'. MCQ aur fill-in-blank mein bhi yahi logic kaam karega.", "years": ["2024", "2026"], "papers": 2, "raw": 4, "marks": 3, "types": ["Literature-SA"], "score": 6}, {"key": "PM10-248", "chapter_code": "PM10", "chapter_name": "For Anne Gregory", "unit": "First Flight: Poems", "topic": "Value / life-lesson", "question": "Do you think you can love a person for his/her inner beauty alone and not care about the physical appearance?", "answer": "Yes — loving someone for inner beauty alone is the truest, most lasting form of love, since physical looks fade with time while character endures. The poem teaches that youthful love often chases appearance, but real, divine-like love values a person's true self. So we should look beyond outer beauty to a person's heart and qualities.", "explanation": "Yeh opinion/value wala question hai — apni rai do par poem se jodo. Bolo: haan, kyunki bahari sundarta dhal jaati hai, par andar ka insaan hamesha rehta hai; isliye andar ki sundarta se pyaar karna hi sachcha pyaar hai. Lesson: youth dikhawe ke peeche bhaagti hai, par asli love insaan ke true self ko dekhta hai. Hamesha 'I think... because...' format mein justify karo.", "years": ["2024", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 6}, {"key": "PM6-296", "chapter_code": "PM6", "chapter_name": "Amanda!", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "In every alternate stanza, Amanda drifts into fantasy and yearns for more freedom and silence. Justify and elaborate the reason.", "answer": "Amanda drifts into fantasy in alternate stanzas because reality suffocates her - every real stanza is her mother nagging. The poet uses allusions (mermaid, orphan, Rapunzel) to contrast this control with Amanda's craving for silence, autonomy and freedom. Imagination becomes her escape route, the only place she feels at peace.", "explanation": "Pattern samjho: ek stanza maa ki nagging (reality), agla stanza Amanda ki fantasy (bracket wala) - alternate chalta hai. Jitni zyada tok-tok, utna zyada woh sapno mein bhaagti hai. Allusions (mermaid/orphan/Rapunzel) freedom ka symbol hain. Hook: 'reality = nagging, fantasy = freedom, dono baari-baari'.", "years": ["2024", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 6}, {"key": "PM7-303", "chapter_code": "PM7", "chapter_name": "The Trees", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "Describe how the poem 'The Trees' brings out the conflict between man and nature.", "answer": "The poem shows nature trapped inside man-made structures — roots cramped in the veranda, boughs pressed under the roof, leaves straining against glass. The trees struggle to escape concrete and break the glass barriers humans built. This eerie, foreboding tension highlights the discord between artificial human structures and the natural world's urge for freedom.", "explanation": "'Man vs nature conflict' wala question alag hai theme se — yahan dikhana hai ki insaan ne nature ko cage kiya (glass, roof, concrete veranda) aur nature usse tod ke nikalna chahti hai. Mood = eerie aur foreboding. Tip: glass/roof/veranda = man-made qaid, roots/boughs = nature ki rebellion.", "years": ["2025"], "papers": 2, "raw": 4, "marks": 2, "types": ["Extract-SA", "Literature-SA"], "score": 6}, {"key": "PM7-306", "chapter_code": "PM7", "chapter_name": "The Trees", "unit": "First Flight: Poems", "topic": "Tone / mood", "question": "Based on the tone, discuss how Adrienne Rich presents the conflict between man and nature / What atmosphere or mood is created by the imagery in the passage?", "answer": "The imagery of breaking glass and straining, struggling trees creates an eerie, foreboding mood of transition and uncertainty. The atmosphere is tense and unsettled, mirroring the trees' painful, suspenseful movement from captivity toward freedom — change is coming, but it is uneasy, not joyful.", "explanation": "Tone/mood ke do flavours iss poem mein: (1) struggle wale extracts (glass breaking, twigs stiff) = 'eerie/foreboding' + 'transition and uncertainty'; (2) end wala calm extract = serene/hopeful. MCQ mein dhyan se padho kaunsa extract hai. Common trap: 'joyful and celebratory' galat hai struggle wale part mein.", "years": ["2025"], "papers": 2, "raw": 6, "marks": 1, "types": ["Extract-MCQ"], "score": 6}, {"key": "FP2-18", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "The transition from the apartheid system in South Africa to a new era of equality reflects broader historical trends in the struggle for human rights and social justice. Elaborate. / Comment on the kind of society apartheid had created.", "answer": "Apartheid was one of the harshest, most inhuman systems - a regime of racial domination and segregation in which dark-skinned people were oppressed in their own land, denied rights, dignity and equality. Its end ushered in a new era of political emancipation, equality and justice for all. This mirrors humanity's larger struggle for human rights everywhere.", "explanation": "Apartheid ek bahut hi kroor, amaanviya system tha - apne hi desh mein kaale logon ko rang ke aadhaar par dabaya gaya. Iska ant ek naye yug ki shuruaat tha: equality, justice, sabke liye azaadi. Yeh poori duniya ke human rights sangharsh ka hissa hai. Memory hook: 'apartheid = inhuman racial segregation.'", "years": ["2024", "2025"], "papers": 2, "raw": 4, "marks": 2, "types": ["Extract-SA", "Literature-SA"], "score": 5}, {"key": "FP3-35", "chapter_code": "FP3", "chapter_name": "Two Stories about Flying", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "How did the pilot of the Black Aeroplane help the narrator? In 'Two Stories about Flying – Part II', what does the narrator's experience suggest about unexpected help and mystery?", "answer": "Lost in the storm with a dead compass, radio and no fuel, the narrator suddenly saw a black aeroplane beside him. Its pilot signalled him to follow, and guided him safely through the dark clouds to a runway before vanishing. This mysterious, unasked-for help saved the narrator's life. Strangely, no other plane was on the radar that night, leaving the rescuer's identity an unsolved wonder that inspires faith in unexpected help.", "explanation": "Yaad rakh: pilot bilkul phasa hua tha (compass dead, radio dead, fuel khatm), tabhi mysterious black aeroplane aaya aur safe runway tak le gaya, phir gayab. Twist - radar pe koi dusra plane tha hi nahi! Theme: 'unexpected help + mystery'. Hook: 'musibat mein anjaan madad'. Iska answer wonder/faith par end karna.", "years": ["2023", "2026"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 5}, {"key": "FP4-53", "chapter_code": "FP4", "chapter_name": "From the Diary of Anne Frank", "unit": "First Flight: Prose", "topic": "Value / life-lesson", "question": "The journeys of Anne Frank and Valli teach us that optimism and self-assurance empower women to rise above circumstances and overcome obstacles. Examine the similarities. / Speech on the resilience and indomitable spirit of Anne Frank and Valli — commonality and contrast.", "answer": "Both girls show resilience, optimism and self-assurance. Anne, a sensitive teenager hiding during the Holocaust, stays hopeful and finds solace and friendship in her diary, even turning a teacher's punishment into goodwill. Valli, an eight-year-old, is mature, observant and self-respecting, planning and fearlessly executing her bus journey. Difference: Anne battles fear and isolation; Valli pursues a small dream with bold independence.", "explanation": "Yeh cross-text LA (6 marks) hai — Anne + Valli dono ka comparison. Commonality: dono optimistic, confident, apne haalat se upar uthti hain. Contrast: Anne isolation/fear me hope rakhti hai (diary), Valli chhoti umar me bahadur planning se bus ride karti hai. Speech/format wale me opening-closing line dena mat bhoolna, warna format marks katenge.", "years": ["2024", "2025"], "papers": 2, "raw": 6, "marks": 6, "types": ["Literature-LA"], "score": 5}, {"key": "FP8-87", "chapter_code": "FP8", "chapter_name": "The Sermon at Benares", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "What does Kisa Gotami ask for when she goes from house to house after she speaks with Buddha? Does she get it? Why? Why not?", "answer": "After meeting the Buddha, Kisa Gotami was asked to fetch a handful of mustard seeds - but only from a house where no one had ever died. Mustard seeds were common, yet she could not get them, because not a single household was untouched by death. Going door to door, she grew weary and hopeless, finally understanding that her grief had blinded her to a simple truth: death visits every home. This realisation cured her sorrow.", "explanation": "Yeh specifically MUSTARD-SEED quest pe focus karta hai (Buddha se BAAD mein). Twist: seeds toh common the, par 'jis ghar mein koi na mara ho' wali shart impossible thi. Ghar-ghar ghoom kar thak gayi aur samajh gayi maut har jagah hai. Memory hook: 'no-death house = aisa koi ghar hai hi nahi'.", "years": ["2023", "2026"], "papers": 2, "raw": 3, "marks": 3, "types": ["Literature-SA"], "score": 5}, {"key": "FW1-112", "chapter_code": "FW1", "chapter_name": "A Triumph of Surgery", "unit": "Footprints Without Feet", "topic": "Extract-based comprehension", "question": "[A Triumph of Surgery] Why did the author make his plans in advance?", "answer": "Reference-to-Context (the passage where Tricki refuses food, vomits and lies panting, and Herriot decides to hospitalise him). Key answers: (i) Herriot planned ahead because he was aware of the severity of Tricki's condition (NOT to experiment on him). (ii) He removed Tricki because the dog's declining health - no eating, vomiting, lethargy - needed monitoring away from over-pampering. (iii) 'Swooned' means almost fainted; the 'plans in advance' line shows he had foreseen this. (iv) Mrs Pumphrey is best described as impractical but compassionate - distraught because she is deeply, emotionally attached to Tricki.", "explanation": "Yeh extract/RTC questions hain (Q6) - passage saamne hoga, ghabrao mat. Strategy: pehle passage dhyaan se padho, phir answer wahi se utha lo. Yaad rakho: Herriot ko Tricki ki seriousness pata thi (experiment nahi); 'swooned' = faint; Mrs Pumphrey = impractical but compassionate. Vocab/True-False ke marks sabse easy - in mein galti mat karna.", "years": ["2024", "2025"], "papers": 2, "raw": 24, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 5}, {"key": "FW4-134", "chapter_code": "FW4", "chapter_name": "A Question of Trust", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "What plan did Horace Danby make to rob the house at Shotover Grange ? (A Question of Trust)", "answer": "Horace Danby was a careful, methodical thief. He studied Shotover Grange for two weeks, learnt the dog's name, confirmed the servants were away, and located the safe behind a painting from a magazine article. He wore gloves, found the kitchen key under a stone, and entered with precision — robbing once a year to fund his love of rare books.", "explanation": "Yahan Horace ka 'planner' wala side dikhana hai — woh koi lalchi criminal nahi, balki ek careful, methodical aadmi tha. Points yaad rakh: 2 hafte ki recce, kutte ka naam (Sherry), gloves, servants ka bahar hona, safe painting ke peeche. Memory hook: 'planning perfect, par bharosa galti se' — isi se aage uski failure ka contrast banta hai.", "years": ["2024", "2025"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 5}, {"key": "FW5-141", "chapter_code": "FW5", "chapter_name": "Footprints Without Feet", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "A character arc is the transformation or development of a character throughout a story... In light of the above information, trace the character arc of Griffin in H.G. Wells' 'Footprints without Feet'.", "answer": "Griffin begins as a gifted, dedicated scientist obsessed with his invisibility research. After succeeding, he is consumed by power and turns into a lawless, ruthless wanderer who robs, burns and assaults without empathy. As consequences mount, his once-extraordinary ability becomes a burden, forcing him to grapple with the moral fallout, yet he fails to win sympathy because of his evil deeds. (approx 50 words)", "explanation": "Character arc matlab character kaise badalta hai shuru se end tak. Griffin: dedicated scientist -> power-hungry criminal -> phasa hua, burdened aadmi. Show the JOURNEY, ek hi trait nahi. Hook: 'genius se gunehgaar tak'. Yaad rakho - uski power hi uski musibat ban gayi, aur logon ki sympathy nahi mili kyunki harkatein buri thi.", "years": ["2024", "2025"], "papers": 2, "raw": 6, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 5}, {"key": "FW6-152", "chapter_code": "FW6", "chapter_name": "The Making of a Scientist", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "Why did Richard Ebright raise a flock of butterflies ?", "answer": "Tagging wild butterflies one by one for Dr Urquhart was slow and tedious, because the monarch season was short and they were hard to catch. So Ebright raised his own flock at home — to get a steady supply to tag, to watch their life cycle and metamorphosis closely, and to study them seriously like a real scientist, not a hobbyist.", "explanation": "Wild butterflies pakadna boring aur slow tha (season chhota tha), isliye Ebright ne ghar par hi poora flock paala — taaki aaraam se tag kar sake aur unka life-cycle dhyaan se dekh sake. Memory hook: 'apni butterfly factory'. Vision wala question (id 3668) bhi yahi idea hai — serious scientific study, sirf shauk nahi.", "years": ["2023", "2026"], "papers": 2, "raw": 4, "marks": 3, "types": ["Literature-SA"], "score": 5}, {"key": "FW7-164", "chapter_code": "FW7", "chapter_name": "The Necklace", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "A character arc is the transformation or development of a character throughout a story. In the light of the above information, trace the character arc of Matilda in Guy De Maupassant's ‘The Necklace’, in about 120 words.", "answer": "Matilda begins as a beautiful but vain, dissatisfied woman who feels she deserves luxury and resents her clerk husband's modest life. Borrowing a necklace, she enjoys one dazzling night at the ball — then loses it. To replace it the Loisels endure ten years of poverty and hard labour, which destroys her beauty but transforms her character. The shallow, complaining girl matures into a humble, hard-working, realistic woman who has learned the value of honesty and living within her means.", "explanation": "Character arc matlab Matilda ki shuruaat se ant tak ki badlaav-yatra. Pehle: ghamandi, asantusht, dikhawe-pasand. Phir: galti, sazaa (10 saal mehnat), aur ant mein samajhdaar aur humble. Hook: '3 stages — vain → ruined → matured'. 120 words me likho aur transformation (badlaav) ka shabd zaroor use karo, sirf traits mat ginao.", "years": ["2024", "2025"], "papers": 2, "raw": 4, "marks": 6, "types": ["Literature-LA"], "score": 5}, {"key": "FW9-187", "chapter_code": "FW9", "chapter_name": "The Book that Saved the Earth", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "How did Think-Tank interpret the following nursery rhyme? \"How does your garden grow with cockle shells and silver bells?\" (The Book that Saved the Earth)", "answer": "Reading 'Mistress Mary' from Mother Goose, Think-Tank takes every line literally and twists it into a threat. He decides Earthlings have learned to combine agriculture and mining, so they can grow crops of rare metals like silver, plus cockle shells and even high explosives. From 'Hey Diddle Diddle' he concludes humans are so advanced they teach music and space techniques to animals. These absurd misreadings convince him Earth is dangerously powerful.", "explanation": "Yeh specific incident hai — Think-Tank rhymes ko literally decode karta hai. 'Mistress Mary' se: silver aur explosives ugaa sakte hain Earthlings! 'Hey Diddle Diddle' se: jaanwar bhi advanced hain. Hook: 'cockle shells = explosives, kya logic!' Jab bhi 'kaise interpret kiya' poocha jaaye, rhyme ka galat meaning + threat conclusion likhna hai.", "years": ["2024", "2025"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 5}, {"key": "GR2-204", "chapter_code": "GR2", "chapter_name": "Modals", "unit": "Grammar", "topic": "Past habit (would/used to)", "question": "Select the correct option to complete the given sentence from the memoir of your grandparent : 'When I was the team Captain, I _____ often organise get-togethers to develop bonding among the team mates.'", "answer": "'would' = repeated past habit ('When I was Captain, I WOULD often organise get-togethers') and the conditional result in if-clauses ('If I were attending, I WOULD stay', 'If you had worked hard you would/might have passed', 'if they submitted... they might'). Rule: would = past habit + result of a condition.", "explanation": "'Would' do jagah aata hai: (1) past ki aadat — 'When I was Captain, I would often organise get-togethers' (baar-baar hota tha), aur (2) if-condition ka result — 'If I were attending, I would stay till the end'. Memory hook: past habit ya 'if...then' ka jawab = WOULD. Jahan 'often' + past ho, ya 'If I were/If you had' ho, wahan would/might lagao.", "years": ["2023", "2026"], "papers": 2, "raw": 6, "marks": 1, "types": ["Grammar"], "score": 5}, {"key": "GR6-225", "chapter_code": "GR6", "chapter_name": "Prepositions", "unit": "Grammar", "topic": "Place/direction (in/on/at/to)", "question": "Select the option that identifies the error and supplies the correction for the following line taken from an article about growing obesity. Obesity in teenage children is a major concern between parents today. (C) between among", "answer": "between → among — use 'between' for TWO things, 'among' for MORE than two (parents = many; exposure & vitamin D... here 'association BETWEEN two things' but scheme marks 'among'). Rule: among for groups of three+.", "explanation": "Simple rule: do cheezon ke beech = BETWEEN, teen ya zyada ke beech = AMONG. 'Parents' bahut saare hain, isliye 'concern AMONG parents'. Hook: 'twO = betwEEn (do), many = amОng'. Error-correction mein agar group/plural dikhe toh between ko among bana do.", "years": ["2024", "2025"], "papers": 2, "raw": 4, "marks": 1, "types": ["Grammar"], "score": 5}, {"key": "GR8-237", "chapter_code": "GR8", "chapter_name": "Gap-filling / Transformation", "unit": "Grammar", "topic": "Sentence transformation/rephrasing", "question": "Complete the given sentence about the reaction of a tourist to another, by selecting the correct option : Yesterday you loved the spicy Indian curry, _____ you?", "answer": "Method: complete the sentence's grammatical structure. Question tag rule: positive statement -> negative tag, same tense/auxiliary. Sample: 'You loved... didn't you?'. Correlative 'Not only... but ... also': 'Not only did he work hard, but he also helped...'.", "explanation": "Question tag ka rule simple: statement positive hai toh tag negative, aur tense match kare — 'loved' (past) -> 'didn't you'. Correlative pairs bhi yaad rakho: 'not only... but also', 'either... or'. Hook: tag banate waqt helping verb aur subject palat do (loved->did + n't + you). Mismatch tense me hi log galti karte hain, dhyan se.", "years": ["2023", "2026"], "papers": 2, "raw": 4, "marks": 1, "types": ["Grammar"], "score": 5}, {"key": "PM6-300", "chapter_code": "PM6", "chapter_name": "Amanda!", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[Amanda!] Complete the analogy: rare : uncommon :: peace : ____. What is the opposite of 'dull'? What does the speaker do on the dust?", "answer": "Vocabulary/factual sub-questions: 'peace' matches 'tranquil' (analogy rare:uncommon). The antonym of 'dull' in the extract is 'bright'. TRUE - Amanda did not want anyone to invade her privacy and silence. On the dust, the speaker (orphan-Amanda) makes/patterns shapes with her hushed, bare feet.", "explanation": "Yeh chote 1-mark extract sub-questions hain - seedha text se answer milta hai. tranquil = peaceful, bright = opposite of dull. Analogy mein same relation dhoondo. Hook: 'extract ke andar hi shabd chhupa hota hai, bahar mat dhoondo'. True/False aur antonym jaise factual answers extract padhke confirm karo, guess mat karo.", "years": ["2023", "2026"], "papers": 2, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 5}, {"key": "PM7-302", "chapter_code": "PM7", "chapter_name": "The Trees", "unit": "First Flight: Poems", "topic": "Title / symbolism", "question": "Explain the significance of the line: \"The moon is broken like a mirror, its pieces flash now in the crown of the tallest Oak.\" Answer in about 40 words.", "answer": "The broken moon scattering its pieces into the treetops symbolizes societal change — women overcoming patriarchy and claiming their own space. The shattering of the old order ends in a victory for their movement, marking a triumphant shift in power dynamics as nature/freedom reclaims its place.", "explanation": "Ye 'symbolism' wale questions hain — moon, glass, oak ka deeper matlab. Tuta hua moon = purana patriarchal system tut raha hai, aur uske tukde sabse oonche ped par chamak rahe hain = jeet/victory of the movement. Hint: image ko literal mat lo, hamesha 'change + victory of freedom' se jodo.", "years": ["2
