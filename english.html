024", "2025"], "papers": 2, "raw": 6, "marks": 2, "types": ["Extract-SA"], "score": 5}, {"key": "PM7-305", "chapter_code": "PM7", "chapter_name": "The Trees", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "Identify the figure of speech used in the line: \"The Trees are stumbling forward into the night\".", "answer": "Personification — trees are given the human action of 'stumbling forward,' a metaphorical expression for their movement. Giving non-human things (trees) human qualities and actions is personification, used throughout the poem to make the trees feel alive and struggling like people.", "explanation": "Jab cheezon (trees) ko insaan jaise kaam karte dikhate hain — 'stumbling', 'shuffling', 'strain' — woh PERSONIFICATION hai. Pure poem mein trees insaano ki tarah behave karte hain. Question agar 'metaphorical expression for movement' poochhe toh answer = 'stumbling forward'. Hook: ped chal rahe = personification.", "years": ["2024", "2025"], "papers": 2, "raw": 6, "marks": 1, "types": ["Extract-SA"], "score": 5}, {"key": "PM7-308", "chapter_code": "PM7", "chapter_name": "The Trees", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[The Trees] What does 'My head is full of whispers which tomorrow will be silent' reveal about the poet's state of mind?", "answer": "It shows the poet is restless, confused, apprehensive and doubtful. Her mind is full of uneasy whispers about the change about to happen. The whispers will fall silent tomorrow because the trees will have moved out of the house into the forest — their struggle inside will be over.", "explanation": "Do chote questions ek saath: (1) poet ka state of mind = restless/confused/apprehensive/doubtful (uske dimaag mein khusur-phusur chal rahi hai). (2) 'whispers silent tomorrow kyun?' — kyunki kal tak trees ghar se nikal ke forest mein chale jaayenge. Hook: change se pehle ki bechaini = whispers.", "years": ["2024", "2025"], "papers": 2, "raw": 9, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 5}, {"key": "FP2-12", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "What does Mandela mean by 'courage is not the absence of fear, but the triumph over it'? How did Mandela learn the meaning of courage?", "answer": "Mandela learnt that a brave man is not one who feels no fear, but one who conquers that fear. He saw his comrades risk their lives and stand up to torture without breaking, showing remarkable resilience. True courage, therefore, is not being fearless - it is mastering and overcoming fear for a worthy cause.", "explanation": "Mandela ki courage ki definition yaad rakh: 'darr ka na hona courage nahi hai, darr ko jeet lena courage hai.' Unke saathi torture ke saamne tute nahi - wahi se unhe himmat ka matlab samajh aaya. Common mistake: bachche likh dete hain 'brave = no fear' - galat! Brave = fear ko conquer karna.", "years": ["2023", "2025"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FP5-55", "chapter_code": "FP5", "chapter_name": "Glimpses of India", "unit": "First Flight: Prose", "topic": "Key incident / plot (Tea from Assam)", "question": "What according to Rajvir was the Indian legend about the origin of tea? (Glimpses of India – Tea from Assam)", "answer": "Rajvir narrated the Indian legend of Bodhidharma, an ancient Buddhist monk who cut off his eyelids to stop himself from sleeping during meditation. Ten tea plants grew from the fallen eyelids; when their leaves were put in hot water and drunk, they drove away sleep — which is how tea was discovered.", "explanation": "Do legends hain — par yahan Indian wala poocha jaata hai: Bodhidharma ne neend bhagane ke liye apni eyelids kaat di, unse tea plants ugay. Chinese legend (emperor + ubalta paani) alag hai, confuse mat karna. Hook: 'Eyelids → tea → no sleep.' Monk ka naam Bodhidharma yaad rakhna must hai.", "years": ["2023", "2025"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FP7-78", "chapter_code": "FP7", "chapter_name": "Madam Rides the Bus", "unit": "First Flight: Prose", "topic": "Value / life-lesson", "question": "Valli was sensitive, but at the same time, she was fearless and quite determined. Think of another character from your text book who displayed similar character traits. Compare and contrast the lives of Valli and the other character that you have chosen.", "answer": "Valli, an intelligent, self-respecting eight-year-old, planned and completed a solo bus journey, facing her fears bravely. The young seagull (His First Flight), driven by hunger, finally conquered fear to fly; Anne Frank kept hope and optimism alive while hiding. All are young, fearless and determined - willing to take risks, face their fears and learn without being afraid to fail. (Differences: Valli acts by choice, the seagull out of compulsion, Anne through inner hope.)", "explanation": "Yeh 'compare two characters' wale questions hain - Valli vs seagull ya Anne Frank. Formula: pehle dono ka similar trait (fearless, determined), phir difference (Valli khud chali; seagull majboori se; Anne hope se). Memory hook: 'Same himmat, alag situation'. Speech/letter format aaye to greeting aur closing mat bhoolna - format ke marks pakke.", "years": ["2024"], "papers": 2, "raw": 5, "marks": 6, "types": ["Literature-LA"], "score": 4}, {"key": "FW1-105", "chapter_code": "FW1", "chapter_name": "A Triumph of Surgery", "unit": "Footprints Without Feet", "topic": "Value-based / life-lesson", "question": "Analyze how Herriot uses Tricki and Mrs. Pumphrey's relationship to comment on societal attitudes towards pets and the responsibilities associated with their care.", "answer": "Through Tricki, Herriot shows the danger of irresponsible, over-indulgent pet care. Mrs Pumphrey's overfeeding and lack of exercise turn Tricki into a fat, lethargic, vomiting dog with rheumy eyes - his 'real disease' is simply overfeeding. He is cured by a normal diet and exercise. The message: responsible pet ownership means proper diet, discipline and exercise, not endless pampering.", "explanation": "Yeh group pet-care responsibility aur 'overfeeding ka khatra' cover karta hai. Tricki ki 'real disease' koi serious bimari nahi thi - bas zyaada khana aur zero exercise! Cure bhi simple - normal diet + exercise. Hook: 'Pet ko pyaar do, par junk nahi - diet aur walk zaroori.' Yeh point overfeeding/responsibility dono questions mein kaam aayega.", "years": ["2023", "2025"], "papers": 2, "raw": 5, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FW2-114", "chapter_code": "FW2", "chapter_name": "The Thief's Story", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "Hari Singh says \"He knew it but neither his lips nor his eyes showed anything.\" Anil successfully addressed the situation by not addressing it at all. Elaborate based on your reading of The Thief's Story.", "answer": "After stealing Anil's notes at the station, Hari's conscience makes him return at midnight and slip the damp money back. Next morning Anil hands him a slightly damp fifty-rupee note as his first week's pay and says nothing about the theft, though he clearly knows. By choosing not to confront or punish Hari, Anil shows quiet forgiveness and trust - and this silent acceptance, more than any scolding, transforms Hari into an honest person.", "explanation": "Yeh kahani ka turning point hai - Anil ko sab pata hai par woh kuch bolta hi nahi, sirf damp note dekar chai maang leta hai. 'Not addressing it' ka matlab - bina sazaa diye Hari ko ek aur mauka dena, jiska asar gussa karne se kahin zyada hota hai. Common mistake: sirf chori likh dena - asli baat Anil ki chuppi aur forgiveness hai, woh zaroor likhna.", "years": ["2024"], "papers": 2, "raw": 6, "marks": 6, "types": ["Literature-LA"], "score": 4}, {"key": "PM5-284", "chapter_code": "PM5", "chapter_name": "The Ball Poem", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "Identify and discuss the poet's use of metaphor in the poem \"The Ball Poem\".", "answer": "The central figure of speech is metaphor: the 'ball' is a metaphor for material possessions, childhood and innocence. Its loss stands for the inevitable loss of cherished things and the boy's transition from carefree childhood to mature, responsible adulthood and emotional growth.", "explanation": "Sabse bada device = METAPHOR. Ball = possessions/bachpan/innocence (literally ball nahi, symbol hai). Iska loss = zindagi ki cheezein khona aur bada hona. Memory hook: 'ball ek metaphor hai — uska girna = childhood ka chhoot jaana.' Question 'metaphor discuss karo' aaye to ball-symbol wala point pakka likhna.", "years": ["2024"], "papers": 2, "raw": 6, "marks": 1, "types": ["Extract-SA"], "score": 4}, {"key": "PM6-290", "chapter_code": "PM6", "chapter_name": "Amanda!", "unit": "First Flight: Poems", "topic": "Character sketch", "question": "What impression do you form about Amanda in the poem ?", "answer": "Amanda is a sensitive, imaginative young girl who feels suffocated and controlled by her mother's constant nagging. She yearns for freedom, peace and solitude, and escapes her dull, restricted reality by daydreaming of being a mermaid, an orphan or Rapunzel. She comes across as unhappy and withdrawn.", "explanation": "Amanda ki personality ek line mein: ghutan-bhari (suffocated), sensitive aur imaginative ladki jo freedom chahti hai. Har baar maa ki tok-tok se bachne ke liye woh fantasy mein bhaag jaati hai. Memory hook: 'controlled + creative = Amanda'. Likhte waqt 3 baatein zaroor daalo - nagging se dukhi, akelapan chahti hai, daydreams mein freedom dhoondti hai.", "years": ["2023", "2025"], "papers": 2, "raw": 6, "marks": 3, "types": ["Extract-SA", "Literature-SA"], "score": 4}, {"key": "PM6-291", "chapter_code": "PM6", "chapter_name": "Amanda!", "unit": "First Flight: Poems", "topic": "Character sketch", "question": "Amanda gets a list of instructions from her mother of dos and don'ts. What do these tell you about the relationship between Amanda and her mother ?", "answer": "The endless dos and don'ts show a strained, one-sided relationship: the mother is dominating and over-controlling, while Amanda feels suppressed and pressurised. The constant nagging makes Amanda sulk and grow moody; she cannot ignore the orders but does not want to obey, so she withdraws and dreams of escaping to live alone.", "explanation": "Yahan rishta dikhana hai, sirf Amanda nahi. Maa = bossy/dominating, Amanda = dabav mein (suppressed), isliye woh chidchidi (moody) ho jaati hai. Common mistake: log sirf 'maa strict hai' likh dete hain - relationship ka dono-taraf ka asar likho: maa control karti hai, Amanda escape chahti hai. Hook: 'orders bahut, pyaar kam'.", "years": ["2023", "2025"], "papers": 2, "raw": 5, "marks": 1, "types": ["Extract-SA", "Literature-SA"], "score": 4}, {"key": "PM9-316", "chapter_code": "PM9", "chapter_name": "The Tale of Custard the Dragon", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "Bring out the central idea of the poem, ‘The Tale of Custard the Dragon’.", "answer": "The central idea is that appearances can be deceptive and a crisis reveals one's true character. Custard, mocked as a coward, turns out to be the bravest when the pirate attacks, while those who boasted of bravery flee. Real courage shows in action, not in big talk.", "explanation": "Theme ek line mein yaad rakh: 'appearances deceive; asli bahaduri mushkil waqt mein dikhti hai'. Jo log sabse zyada apni bravery ki dhing maarte the (Belinda, Mustard, Ink, Blink), woh pirate aate hi bhaag gaye — aur 'coward' Custard ne use khatam kar diya. Hook: 'crisis reveals character' — yahi MCQ ka bhi answer (D) hota hai.", "years": ["2024"], "papers": 2, "raw": 7, "marks": 1, "types": ["Extract-MCQ", "Extract-SA", "Literature-SA"], "score": 4}, {"key": "PM9-323", "chapter_code": "PM9", "chapter_name": "The Tale of Custard the Dragon", "unit": "First Flight: Poems", "topic": "Character", "question": "What character trait is revealed of Custard when he accepts that the other animals are braver than him? / Why does Custard long for a nice safe cage?", "answer": "Custard longs for a safe cage because he is portrayed as timid and is constantly teased by Belinda, Ink, Blink and Mustard for being a coward. When he later lets the others claim they are braver, he shows humility and modesty — he is unaware of and unboastful about his own real strength, unlike the boastful pets.", "explanation": "Custard 'safe cage' maangta hai kyunki sab use coward keh ke chidhate hain aur woh confrontation se darta hai. Baad mein jab woh maan leta hai 'haan tum zyada bahadur ho', yeh uski humility/modesty dikhata hai. Hook: 'humble hero' — jo sach mein bahadur hai, woh dhing nahi maarta.", "years": ["2023", "2025"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FP3-30", "chapter_code": "FP3", "chapter_name": "Two Stories about Flying", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "Describe the young seagull's first flight. (Two stories about flying)", "answer": "Hungry and alone on the ledge, the young seagull was tempted by his mother who flew near with a piece of fish. As he dived to seize it, he fell into space; terror made him scream, but then his wings spread and beat the air. He soared, flapped, and finally landed safely on the green sea, completely forgetting his earlier fear.", "explanation": "Yaad rakh: pehla flight ek 'before vs after' story hai. Pehle seagull dara hua tha, wings pe bharosa nahi tha; phir bhookh aur maa ki fish ne usse dive karwaya, aur achanak udna aa gaya. Memory hook - 'HUNGER ne FEAR ko hara diya'. Contrast wale question mein bhi yahi likhna: initial = scared/screaming, final = soaring/floating fearless.", "years": ["2023", "2024"], "papers": 2, "raw": 6, "marks": 3, "types": ["Literature-SA"], "score": 3}, {"key": "FP4-46", "chapter_code": "FP4", "chapter_name": "From the Diary of Anne Frank", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[From the Diary of Anne Frank] Who is 'I'? What does 'right away' mean? Explain 'we were both in tears'. Complete: dawn:dusk::mourning:___. Discuss 'form', an inference about Anne, her first education, Mrs. Kuperus, and substitute 'heartbreaking'.", "answer": "The narrator 'I' is Anne Frank; her first education was at the Montessori nursery school. 'right away'=immediately; 'we were both in tears'=sad at parting; analogy dawn:dusk::mourning:celebration; 'form'=class/grade. Mrs. Kuperus was her sixth-form teacher and headmistress, sharing a bond of mutual love and respect. Inference: Anne was sensitive, attached to her grandmother. 'heartbreaking'≈emotional/poignant/painful.", "explanation": "Is extract me Anne apni schooling aur Mrs. Kuperus se bidaai bata rahi hai — isse uska sensitive, emotional swabhaav dikhta hai. Mrs. Kuperus = sixth-form teacher + headmistress, rishta = love aur respect. Vocab tip: 'form' yahan 'class/grade' hai (option me 'promoted to next form'). Inference questions me ek line ka emotion likho, bas.", "years": ["2023", "2024"], "papers": 2, "raw": 27, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 3}, {"key": "FP8-88", "chapter_code": "FP8", "chapter_name": "The Sermon at Benares", "unit": "First Flight: Prose", "topic": "Value / life-lesson", "question": "'As ripe fruits are in danger of falling early, so mortals when born are always in danger of death.' With this statement of the Buddha find out the moral values that Kisa Gotami learnt after the death of her child.", "answer": "Kisa Gotami learnt several lasting values: that life is inherently full of sorrow and suffering; that death is inevitable and treats everyone - rich or poor, powerful or humble - equally; and that weeping or lamenting cannot bring back the dead. The world is subject to decay, so one should not be ruled by selfish desires or attachment. For those in power and privilege, the message is humbling: death takes away all possessions and status, so true peace lies in acceptance and detachment.", "explanation": "Yeh 'kya seekha / kya message hai' type (value-based) questions ka group hai, including power-and-privilege wali. Core values: (1) life is sorrowful, (2) death universal aur sabke liye equal, (3) rone se kuch wapas nahi aata. Powerful logon ke liye lesson: maut sab cheen leti hai, ghamand mat karo. Tip: value questions mein hamesha 'we learn that...' format mein 2-3 lessons likhna.", "years": ["2023", "2024"], "papers": 2, "raw": 6, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 3}, {"key": "FP9-95", "chapter_code": "FP9", "chapter_name": "The Proposal (Drama)", "unit": "First Flight: Prose", "topic": "Value / life-lesson", "question": "Forgiveness is the foundation of a cordial relationship. Do you agree? How does this apply to the play 'The Proposal'? / What do you think of relationships? Prepare a speech draft based on Natalya's and Anne Frank's characters.", "answer": "Yes — forgiveness and tolerance hold relationships together. In 'The Proposal', Lomov, Natalya and Chubukov constantly insult each other over land and dogs, yet 'forgive' and reconcile because they need the marriage. Compared with Anne Frank, who built a strong inner relationship with her diary, Natalya's poor relationship with herself spills into petty conflict with others. Lesson: mutual understanding, patience and forgiveness, not ego, make relationships cordial.", "explanation": "Yeh value/life-lesson type hai — answer mein apni opinion + text se proof dono chahiye. Point: rishton mein ego nahi, forgiveness aur samajhdari chahiye. Natalya-Lomov toh sirf zaroorat (shaadi/darr) ki wajah se maan jaate hain. Speech-draft wale (Anne Frank ke saath) mein format yaad rakh: greeting → body (dono texts compare) → 'To conclude...' → Thank you.", "years": ["2023", "2024"], "papers": 2, "raw": 6, "marks": 6, "types": ["Literature-LA"], "score": 3}, {"key": "GR5-218", "chapter_code": "GR5", "chapter_name": "Determiners", "unit": "Grammar", "topic": "Some/any", "question": "Select the correct option to fill in the blanks for the given line : Don't you have _____ friends in the school ? (a) much (b) few (c) little (d) any", "answer": "'Any' is used in negative and question sentences (Don't you have any friends?); also for 'it doesn't matter which' in conditionals (resemblance to any illegal materials). 'Some' = positive statements/offers.", "explanation": "Rule simple hai: POSITIVE sentence me 'some' (I have some books), aur QUESTION ya NEGATIVE me 'any' (Do you have any? / I don't have any). Yahan 'Don't you have...' question+negative dono — to 'any' pakka. Hook: na/sawaal aaye to 'any', haan/seedhi baat me 'some'. Conditional 'any' = koi bhi, chahe jo.", "years": ["2023", "2024"], "papers": 2, "raw": 2, "marks": 1, "types": ["Grammar"], "score": 3}, {"key": "GR6-221", "chapter_code": "GR6", "chapter_name": "Prepositions", "unit": "Grammar", "topic": "Prepositional verbs/phrases", "question": "Fill in the blank with the correct option : There is something wonderful waiting __________ her, when she reaches home. (a) of (b) about (c) for (d) inside", "answer": "for — 'waiting FOR somebody' and 'for (cinematic) expressions' fix the preposition that follows the verb; rule: certain verbs/nouns take a set preposition (wait for, dramatize for).", "explanation": "Yaad rakh: kuch verbs ke saath ek hi fixed preposition chipakta hai — 'wait' hamesha 'for' leta hai (waiting FOR her). Yahan option choose karte waqt soch — kis cheez ka intezaar? FOR + cheez. Memory hook: 'Wait FOR, not wait of/about'. Documentary wali line mein bhi 'for cinematic expressions' = purpose, isliye for.", "years": ["2023", "2024"], "papers": 2, "raw": 4, "marks": 1, "types": ["Grammar"], "score": 3}, {"key": "PM9-317", "chapter_code": "PM9", "chapter_name": "The Tale of Custard the Dragon", "unit": "First Flight: Poems", "topic": "Tone / mood", "question": "How does the poem ‘The Tale of Custard The Dragon’ differ from the traditional ballad?", "answer": "A traditional ballad narrates a serious, heroic story, but this poem is a mock-heroic, humorous ballad. It deviates by making the supposed hero (the dragon) a coward and using irony, playful coined words ('realio, trulio') and exaggeration. It keeps the ballad's narrative storyline and rhythm but replaces solemnity with comedy.", "explanation": "Ballad = ek kahani sunane wali serious heroic poem. Yeh poem 'mock-heroic' hai — yaani ballad ka roop hai par mazaak udane ke liye. Hero (dragon) hi coward nikalta hai, aur Nash funny coined words ('realio, trulio') use karta hai. Hook: storyline ballad jaisi, par tone humorous — isiliye ise 'humorous ballad' kehte hain.", "years": ["2023", "2024"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 3}, {"key": "PM9-319", "chapter_code": "PM9", "chapter_name": "The Tale of Custard the Dragon", "unit": "First Flight: Poems", "topic": "Character", "question": "What makes Custard, the dragon look fearsome? Explain. / What did Custard look like?", "answer": "Custard looked fearsome despite his timid nature: he had big sharp teeth, spikes on top and scales underneath, a mouth like a fireplace, a nose like a chimney, and 'realio, trulio' daggers on his toes. His frightening looks ironically contrast with his cowardly behaviour.", "explanation": "Custard ki shakal darawni hai par andar se woh darpok — yahi irony hai. Yaad rakhne ka tareeka: teeth, spikes, scales, mouth = fireplace, nose = chimney, daggers on toes. Hook: 'looks fierce, acts coward'. Yeh exam mein baar-baar aata hai, poori list ratt lo.", "years": ["2023", "2024"], "papers": 2, "raw": 4, "marks": 3, "types": ["Literature-SA"], "score": 3}, {"key": "PM9-320", "chapter_code": "PM9", "chapter_name": "The Tale of Custard the Dragon", "unit": "First Flight: Poems", "topic": "Character", "question": "Describe the pirate who comes through the window? / Ogden Nash uses vivid imagery in 'The Tale of Custard the Dragon' to appeal to the senses. Elaborate the imagery used for the Pirate.", "answer": "The pirate looked evil and frightening. He had a black beard, a wooden (peg) leg, a pistol in each hand and a cutlass held in his teeth. He came drinking wine and glared greedily at the house, clearly up to no good. The vivid imagery makes him appear menacing and villainous.", "explanation": "Pirate ka description visual imagery se bharpoor hai: black beard, wooden leg, dono haathon mein pistol, daanton mein cutlass, sharab peeta hua. Hook: 'do pistol + ek cutlass = poora villain look'. Imagery wale question mein dekhne wale concrete details zaroor likhna.", "years": ["2023", "2024"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 3}, {"key": "FP8-83", "chapter_code": "FP8", "chapter_name": "The Sermon at Benares", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "Through the story of Kisa Gotami, what did the Buddha try to preach to the common man?", "answer": "Kisa Gotami's only son died and she desperately sought the Buddha to revive him. He asked her to bring mustard seeds from a house where no one had ever died. Going door to door, she found no such house and realised that death is universal and inevitable. This acceptance freed her from grief and brought her peace. Buddha thus taught the common man that sorrow is part of every life and that lamenting cannot bring the dead back.", "explanation": "Yeh chapter ka DIL hai - Kisa Gotami wali kahani. Buddha ne seedha lecture nahi diya, usse khud realise karwaaya ki maut har ghar mein aati hai. Memory hook: 'mustard seed' = har ghar mein koi na koi mara hai, isliye death universal hai. Itni saari 6-marker LA isi point pe aati hain, toh story crisp yaad rakh - grief mein doobne se kuch nahi milta, acceptance se peace milta hai.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 6, "types": ["Literature-LA"], "score": 2}, {"key": "FP8-86", "chapter_code": "FP8", "chapter_name": "The Sermon at Benares", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "What did Kisa Gotami do after the death of her only son?", "answer": "Maddened by grief at the death of her only son, Kisa Gotami refused to accept that he was dead. Carrying the dead child in her arms, she went from house to house begging her neighbours for medicine to cure him. People thought she had lost her senses, and no one could help. Finally a kind man directed her to the Buddha, whom she begged to revive her child - which led her to the mustard-seed lesson.", "explanation": "Iss group mein woh questions hain jo Kisa Gotami ki PEHLI reaction poochhte hain - beta marne ke baad usne kya kiya. Answer: pagal ho kar ghar-ghar dawai maangti rahi, phir Buddha ke paas gayi revive karne ke liye. Yeh 'door to door for medicine' wali action hai jo baad wale mustard-seed quest se ALAG hai. Dono ko mix mat karna.", "years": ["2023"], "papers": 2, "raw": 4, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "FW7-161", "chapter_code": "FW7", "chapter_name": "The Necklace", "unit": "Footprints Without Feet", "topic": "Central theme / message", "question": "Pride and vanity are the root cause of all evil. Elucidate with reference to the text.", "answer": "Matilda was excessively proud of her beauty and charm and vain about appearances. This vanity made her crave luxury and long to outshine others at the ball. To look rich she borrowed an expensive-looking necklace; losing it plunged the Loisels into ten years of debt and back-breaking work, destroying her youth and beauty. Thus her pride and vanity became the root cause of her downfall.", "explanation": "Is group ka theme thoda alag hai — yahan focus 'pride aur vanity' (ghamand aur dikhawe ki chahat) pe hai, sirf discontent pe nahi. Matilda apni khoobsurti pe itna ghamand karti thi ki dikhawe ke chakkar mein sab kuch ganwa baithi. Hook: 'Ghamand ka sar hamesha neecha'. Answer mein 'pride/vanity ne downfall kiya' clearly likhna — yahi keyword examiner dhoondhta hai.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 6, "types": ["Literature-LA"], "score": 2}, {"key": "GR5-216", "chapter_code": "GR5", "chapter_name": "Determiners", "unit": "Grammar", "topic": "Articles (a/an/the)", "question": "Fill in the blank by choosing the correct option to complete the slogan : _____ EDUCATED MIND CAN TEACH MANY. (a) THE (b) A (c) AN (d) THIS", "answer": "Use 'an' before a vowel SOUND (an educated mind); 'the' for a unique/specific noun (the only weapon). So 868 = AN, 450 = THE.", "explanation": "Article ka rule sound pe depend karta hai, spelling pe nahi. Agle word ki AWAAZ vowel (a,e,i,o,u) jaisi ho to 'an' lagao — 'an educated mind', 'an hour' (h silent). 'The' tab jab cheez specific/ek-hi-ho — 'the only weapon'. Memory hook: kaan se suno, aankh se nahi — 'an honest', 'a university' (yoo-sound).", "years": ["2023"], "papers": 2, "raw": 2, "marks": 1, "types": ["Grammar"], "score": 2}, {"key": "PM4-273", "chapter_code": "PM4", "chapter_name": "How to Tell Wild Animals", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "Complete the sentence appropriately : It is clear that alliteration is the poetic device used for 'roaming round' because _______ / repetition is the device for ‘lep and lep again’ because _______.", "answer": "‘Roaming round’ is alliteration — the same consonant sound ‘r’ is repeated at the start of nearby words. ‘Lep and lep again’ is repetition — the word is repeated to stress the leopard's repeated leaping/jumping action.", "explanation": "Do alag devices yaad rakho. Alliteration = paas-paas shabdon ki shuruaat mein same vyanjan (consonant) sound, jaise 'Roaming Round' mein 'R-R'. Repetition = poora shabd dohraana, jaise 'lep and lep' jo leopard ke baar-baar koodne ko dikhata hai. Mistake-warning: alliteration aur repetition mat mila do - alliteration sirf SOUND repeat, repetition poora WORD repeat.", "years": ["2023"], "papers": 2, "raw": 6, "marks": 1, "types": ["Extract-SA"], "score": 2}, {"key": "PM9-322", "chapter_code": "PM9", "chapter_name": "The Tale of Custard the Dragon", "unit": "First Flight: Poems", "topic": "Key incident / plot", "question": "Describe how Custard the dragon fights with the Pirate. / How did the other pets celebrate Custard getting rid of the pirate?", "answer": "Unlike the others who panicked, Custard jumped up bravely, snorting fire, banged his tail and clashed with the pirate, finally gobbling him up completely. After the pirate was gone, the pets celebrated: Mustard the dog licked Custard, and Ink the cat and Blink the mouse danced merrily around him.", "explanation": "Climax incident: Custard akela bahaduri se ladta hai — aag ugalta hai, tail bajata hai, aur pirate ko poora nigal jaata hai. Phir celebration: Mustard chaatta hai, Ink aur Blink uske around naachte hain. Hook: 'coward dragon = real hero'. Plot point ke saath thoda bravery wala detail bhi likhna.", "years": ["2023"], "papers": 2, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 2}, {"key": "FP2-17", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "Why does Mandela mention that he was prevented from fulfilling his obligations as a son, a brother, a father, and a husband (the twin obligations)?", "answer": "Mandela speaks of 'twin obligations' - one to his family (as son, brother, husband, father) and one to his people and country. Under apartheid, a man of his colour could not fulfil both; serving his people meant being ripped from his family, forced into secrecy and rebellion, and denied a normal life. The system made personal and public duty impossible to balance.", "explanation": "'Twin obligations' = do farz: ek apne parivaar ke liye, doosra apne desh-jaati ke liye. Apartheid mein Mandela dono nibha nahi sakte the - desh ki seva karne ke liye parivaar se door rehna pada. Memory hook: 'do farz, par apartheid ne dono todna namumkin bana diya.'", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FP2-26", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Nelson Mandela: Long Walk to Freedom] What tone is Mandela UNLIKELY to use? Explain how emancipation is more than political. Contrast past and future. Explain 'The sun shall never set...'", "answer": "Tone Mandela is UNLIKELY to use = conflicted (his tone is hopeful/proud). Emancipation is not merely political: it also means freedom from poverty, deprivation, suffering and all discrimination. Fill blank: the speech swings between past and a PROMISING future. 'The sun shall never set on so glorious a human achievement' = South Africa shall never again face oppression; democracy and the non-racial regime will prevail forever.", "explanation": "Same pledge speech ka 2026 RTC. Tone wala MCQ: Mandela hopeful/proud the, isliye 'conflicted' UNLIKELY. 'Sun shall never set' = oppression kabhi wapas nahi aayega, democracy hamesha rahegi. Vocab/tone questions mein extract ka mood dekh ke decide kar.", "years": ["2026"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 4}, {"key": "FP2-27", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Nelson Mandela: Long Walk to Freedom] Justify 'We who were outlaws'. Why did Mandela thank international guests? What is the significance of 'extraordinary human disaster'? Describe Mandela's tone.", "answer": "'We who were outlaws' is justified because, due to apartheid, many countries had broken diplomatic relations with South Africa. Mandela thanked the international guests because they supported the fight against racial discrimination and joined the ceremony. 'Extraordinary human disaster' = the long, brutal apartheid that denied basic rights and freedom, causing great suffering. Tone = unifying and determined (options 1 and 2).", "explanation": "Yeh RTC 'outlaws/human disaster' wala hai. 'Outlaws' kyun? Kyunki apartheid ki wajah se duniya ne South Africa se rishte tod diye the. 'Extraordinary human disaster' = lamba kroor apartheid. Tone = unifying + determined (aggressive ya pessimistic NAHI). Memory hook: Mandela ka tone hamesha hopeful+firm.", "years": ["2026"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 4}, {"key": "FP2-29", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Extract from Nelson Mandela: Long Walk to Freedom] What was the main ideal? What does 'prepared to die' show about his commitment to justice and fighting domination?", "answer": "Main ideal = (B) a representative and free society. Commitment to justice: Mandela was dedicated to ending oppression, building a fair, democratic society and ensuring equal opportunities for all. Fill blank: he wished to 'fight' all forms of domination. 'Prepared to die' shows Mandela's (C) passion - his deep, selfless commitment to the cause of freedom.", "explanation": "Yeh RTC Mandela ke 'democratic free society' ideal par hai. Main ideal = representative/free society (B). 'Prepared to die' = passion (C), uski lagan dikhata hai. Wo domination ko 'fight' karna chahte the, appease nahi. Memory hook: Mandela apne ideal ke liye marne tak taiyaar - that's passion.", "years": ["2026"], "papers": 1, "raw": 13, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 4}, {"key": "FP3-33", "chapter_code": "FP3", "chapter_name": "Two Stories about Flying", "unit": "First Flight: Prose", "topic": "Value / life-lesson", "question": "What strategy did the mother adopt to teach the young seagull how to fly? Compare the seagull's mother's method of fostering independence with a controlling, nagging parent (e.g. Amanda's mother).", "answer": "The seagull's mother used indirect motivation and practical 'tough love': she let him grow hungry, taunted his cowardice, then tempted him with fish just beyond reach so desperation made him fly. This fostered courage, autonomy and family closeness. In contrast, a controlling mother like Amanda's nags and restricts constantly, which breeds resentment, rebellion and a feeling of being trapped. The seagull's method encourages growth; constant nagging stifles it.", "explanation": "Do parenting styles ka contrast: seagull ki maa = indirect motivation, bachche ko khud karne deti hai, isliye courage aur closeness aati hai. Amanda ki maa = constant nagging, control, isliye Amanda trapped feel karti hai aur escape chahti hai. Hook: 'space dena = growth, control karna = rebellion'. Cross-text comparison questions mein dono ka emotional effect zaroor likhna.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 6, "types": ["Literature-LA"], "score": 4}, {"key": "FP3-36", "chapter_code": "FP3", "chapter_name": "Two Stories about Flying", "unit": "First Flight: Prose", "topic": "Value / life-lesson", "question": "How does the contrast between the pilot's fear in 'The Black Aeroplane' and Custard's initial cowardice in 'The Tale of Custard the Dragon' highlight that courage can be found in the most unexpected characters when circumstances demand it? Discuss with reference to the two.", "answer": "Both texts show that courage surfaces in unlikely people when danger strikes. The pilot first panicked, blind in the black storm clouds with dead instruments, yet found the determination to keep flying and follow the mysterious plane to safety. Custard the dragon, mocked as a coward who cried for a safe cage, suddenly fought and killed the pirate, saving everyone. Despite their initial fear or reputation, circumstances drew out hidden inner strength in both.", "explanation": "Dono characters pehle darpok lagte hain, par mushkil aate hi himmat dikhate hain - yahi message hai. Pilot panic hua par udta raha; Custard ko coward kehte the par usne pirate maar diya. Hook: 'asli himmat tab dikhti hai jab haalat majboor karein'. Comparison question mein dono ki 'before fear -> after brave' journey likhna.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 6, "types": ["Literature-LA"], "score": 4}, {"key": "FP4-50", "chapter_code": "FP4", "chapter_name": "From the Diary of Anne Frank", "unit": "First Flight: Prose", "topic": "Character sketch", "question": "In 'From the Diary of Anne Frank', Anne's writing reflects her maturity despite her young age. Elaborate.", "answer": "Despite being only thirteen, Anne is remarkably mature and self-aware. She uses writing as an emotional outlet, reflecting deeply on loneliness and the need for a true friend. She balances typical teenage feelings with insight, and wittily yet logically defends her talkative nature, showing maturity well beyond her years.", "explanation": "Anne ka character: sensitive, self-aware aur umar se zyada mature. Woh apni feelings ko likh kar samajhti hai aur khud ka analysis karti hai. Memory hook: '13 saal ki, par soch badi'. Character sketch me 2-3 traits + ek example likho, full marks.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FP5-56", "chapter_code": "FP5", "chapter_name": "Glimpses of India", "unit": "First Flight: Prose", "topic": "Central theme / message (Tea from Assam)", "question": "In 'Glimpses of India – Part III (Tea from Assam)', how does the story connect tea with both culture and economic significance?", "answer": "Culturally, tea is part of everyday Indian life — a habit, a symbol of hospitality, and surrounded by legends from China and India. Economically, the vast Assam tea gardens (the world's largest tea-growing region) provide employment to many workers and earn huge revenue through India's massive domestic consumption and global exports.", "explanation": "Tea ke do angle yaad rakho: culture (har ghar mein chai, mehmaan-nawazi, legends) aur economy (Assam = sabse bada tea region, jobs + export se paisa). Hook: 'Chai = Sanskriti + Paisa.' Dono points likhoge tabhi 3 marks milenge — sirf ek pe atak mat jaana.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FP5-66", "chapter_code": "FP5", "chapter_name": "Glimpses of India", "unit": "First Flight: Prose", "topic": "Value / life-lesson (cross-text: Tea from Assam & Madam Rides the Bus)", "question": "Both Rajvir in 'Tea from Assam' and Valli in 'Madam Rides the Bus' are motivated by a strong desire to experience the world beyond their everyday life. How do their respective journeys reflect their curiosity, enthusiasm for discovering new things and shape their understanding of the world around them?", "answer": "Both Rajvir and Valli are driven by curiosity to explore the world. Rajvir's train journey to Assam lets him soak in the scenic tea gardens and learn fascinating facts and legends about tea, enriching his worldview. Valli secretly saves money and plans her bus ride to discover the town, gaining independence but also confronting the harsh reality of death. Both are observant and enthusiastic; their journeys broaden their understanding — Rajvir's through knowledge of nature, Valli's through life's bittersweet realities.", "explanation": "Cross-chapter LA: Rajvir + Valli dono curious aur duniya dekhna chahte hain. Rajvir train se tea & nature seekhta hai; Valli bus se sheher aur zindagi-maut ki sachhai. Similarity: curiosity, observation, growth. Difference: Rajvir ko knowledge mila, Valli ko life ki reality. Hook: 'Dono curious — Rajvir seekha nature, Valli seekhi reality.' 6 marks = dono characters balance karke likho.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 6, "types": ["Literature-LA"], "score": 4}, {"key": "FP6-68", "chapter_code": "FP6", "chapter_name": "Mijbil the Otter", "unit": "First Flight: Prose", "topic": "Character sketch", "question": "Describe the physical appearance of Mijbil, the Otter. (Mijbil the Otter)", "answer": "Mijbil looked like a small medieval dragon. His body was covered with pointed scale-like spikes of mud at first; underneath he had soft chocolate-brown velvet fur. He had a sleek, flexible body, a flat head, webbed feet and tiny velvety ear-flaps that were hardly visible.", "explanation": "Appearance wala question alag hai — yahan traits nahi, looks chahiye. Picture banao: 'chhota medieval dragon' jaisa, chocolate-brown velvet fur, sleek body, flat head. Hook: 'dragon jaisa lekin chocolaty fur'. Description type mein adjectives khoob use karo, examiner ko visual chahiye.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FP6-71", "chapter_code": "FP6", "chapter_name": "Mijbil the Otter", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "What happened when Maxwell took Mijbil to the bathroom? (Mijbil the Otter)", "answer": "In the bathroom Mij was startled at first, then went wild with joy. He plunged into the bathtub, splashed and rolled in the water, dived and dribbled, scattering all the toiletries around and thoroughly enjoying every drop—revealing an otter's natural love of water.", "explanation": "Bathroom scene = Mij ka favourite. Startled → phir paani mein masti, splashing, toiletries bikhera diye. Hook: 'paani mila toh Mij pagal ho gaya khushi se'. Ye incident otters ke 'love water' trait ko bhi prove karta hai, dono jagah use ho sakta hai.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FP6-74", "chapter_code": "FP6", "chapter_name": "Mijbil the Otter", "unit": "First Flight: Prose", "topic": "Value / life-lesson", "question": "How does the author's portrayal of the air hostess in 'Mijbil the Otter' unveil the theme of kindness and empathy?", "answer": "When Maxwell was anxious about Mij on the flight, the kind air hostess put him at ease. She suggested he keep the otter on his knee, helped search when Mij escaped into the plane, and even stored fish for him to feed Mij. Her thoughtful cooperation shows true kindness and empathy towards both man and animal.", "explanation": "Air hostess = kindness/empathy ki misaal. Usne Maxwell ko tension mein support kiya: knee pe rakhne ka idea, Mij dhoondhne mein madad, machhli store ki. Hook: 'air hostess = helping angel'. Theme question mein 2-3 specific acts likho jo uski empathy dikhayein.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FP7-82", "chapter_code": "FP7", "chapter_name": "Madam Rides the Bus", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Extract from Madam Rides the Bus] Valli's reaction to the bus reveals she is (A) awed. How does descriptive language enhance the narrative? 'Devoured' adds a sense of fascination. What action shows she didn't want to miss anything?", "answer": "(i) (A) awed - the gleaming new bus fills her with wonder. (ii) The vivid, sensory description (gleaming white, silver-like bars, soft seats) immerses the reader in Valli's fascination and excitement, narrating the journey from her eager point of view. (iii) fascination - she eagerly takes in every detail with her eyes. (iv) She devoured everything with her eyes, stood up on the seat and peered over the canvas blind so as not to miss anything.", "explanation": "Yeh Reference-to-Context (extract) wala set hai - chhote MCQ/vocab questions. Trick: option choose karke text se ek phrase quote kar do (jaise 'devoured everything with her eyes'). 'Awed' = wonder/aश्charya, 'devoured' yahan = aankhon se nazaaron ko 'kha' jaana = fascination. Memory hook: 'Extract ka jawab extract ke andar'. Vocab fill-ups mein passage ke tone se shabd chuno, dimaag se nahi.", "years": ["2026"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 4}, {"key": "FW1-107", "chapter_code": "FW1", "chapter_name": "A Triumph of Surgery", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "How does Dr. Herriot's approach to treat Tricki reflect his deep understanding of the animal's needs and bring to the fore the character traits of patience, observation and empathy in 'A Triumph of Surgery'? Discuss.", "answer": "Dr Herriot is a skilled, practical and empathetic vet. He quickly sees that Tricki's real problem is overfeeding, not disease, and cures him without medicine - through diet control, exercise and company of other dogs. His patience, sharp observation and firm-yet-gentle handling of the anxious Mrs Pumphrey contrast with her blind, emotional pampering and reveal him as both a skilled veteran and a perceptive judge of human nature.", "explanation": "Dr Herriot ka character: practical, observant, empathetic aur clever. Woh bina dawai ke, sirf diet + exercise se Tricki ko theek kar deta hai - aur Mrs Pumphrey ko bhi politely handle karta hai. Contrast yaad rakho: Herriot = dimaag/practical, Mrs Pumphrey = dil/emotional. Hook: 'No medicine, just common sense - that's Herriot.'", "years": ["2026"], "papers": 1, "raw": 2, "marks": 6, "types": ["Literature-LA"], "score": 4}, {"key": "FW1-111", "chapter_code": "FW1", "chapter_name": "A Triumph of Surgery", "unit": "Footprints Without Feet", "topic": "Central theme / message", "question": "Evaluate the elements of humour and endearment in \"A Triumph of Surgery\".", "answer": "Humour comes from the exaggerated picture of the fat 'bloated sausage' Tricki, Mrs Pumphrey's silly over-pampering, and the irony that a 'serious illness' is just overfeeding (while the doctors feast on the dog's eggs and wine). Endearment comes from Mrs Pumphrey's deep love and anxiety for Tricki, his joyful recovery, and Dr Herriot's genuine, gentle care - making the story warm as well as funny.", "explanation": "Iss kahani mein comedy aur warmth dono hain. Humour: mota 'bloated sausage' Tricki, Mrs Pumphrey ki bewakoofi, aur doctors ka Tricki ka khaana udaana. Endearment: Mrs Pumphrey ka sacha pyaar aur Herriot ki genuine care. Hook: 'Hasao bhi, pyaar bhi.' Aise questions mein dono ke 1-1 example dena.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 6, "types": ["Literature-LA"], "score": 4}, {"key": "FW3-131", "chapter_code": "FW3", "chapter_name": "The Midnight Visitor", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "Describe the role of the 'balcony' in the story 'The Midnight Visitor'.", "answer": "The balcony was entirely Ausable's invention and the heart of his trick. By describing a non-existent balcony under his window - supposedly accessible to intruders - he made his story believable and built suspense. It became the fake 'escape route' Max trusted; fleeing the imagined police, Max leapt for it and fell, sealing his own downfall.", "explanation": "Balcony asli mein thi hi nahi - poori kahani Ausable ne gadhi thi. Yeh trick ka centre hai: isse suspense bana, Max ko escape route laga, aur wahi uski maut bani. Memory hook: 'jo balcony thi hi nahi, usne Max ko maar diya'. Likh: fabricated + suspense + Max ka downfall.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FW3-132", "chapter_code": "FW3", "chapter_name": "The Midnight Visitor", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "How does the setting of the hotel room become a tool in Ausable's plan to defeat Max? (The Midnight Visitor)", "answer": "The dull, ordinary hotel room - a small top-floor room with a window - gave Ausable's lies their realism. Its plainness let him calmly weave the fake balcony 'under the window' and present the waiter's knock as a police raid. The very setting that disappointed Fowler became the believable stage on which Max was trapped and met his end.", "explanation": "Ironic baat: jo kamra boring tha, wahi Ausable ka hathiyaar ban gaya. Uski simplicity ne jhooth ko sach jaisa bana diya - khidki ke neeche fake balcony, darwaze pe fake police. Memory hook: 'boring room = perfect trap'. Setting ko plan se jodna mat bhoolna - yahi is question ka asli point hai.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FW4-137", "chapter_code": "FW4", "chapter_name": "A Question of Trust", "unit": "Footprints Without Feet", "topic": "Central theme / message", "question": "How does the statement \"society must be protected from men like you\" prove to be ironical in the story “A Question of Trust\" ?", "answer": "The line is ironical because it is spoken by the lady in red — herself a cunning thief who is at that very moment robbing the safe through Horace. A criminal is condemning another criminal and posing as society's protector while committing the bigger crime. The irony underlines the story's message about deceit, appearances and misplaced trust.", "explanation": "Irony ka matlab: jo keh raha hai, ulta wahi kar raha hai. Lady kehti hai 'society ko aise logon se bachana chahiye', jabki woh khud uss waqt chori kar rahi hai — isse bada hypocrisy kya hoga! Memory hook: 'chor hi imaandaari ka bhashan de raha hai'. Theme ek line mein: appearances dhokha dete hain, andha bharosa mat karo.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FW4-139", "chapter_code": "FW4", "chapter_name": "A Question of Trust", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "Why does Horace Danby consider himself an honest man despite being a thief ? How does this self-perception affect his decision in the story ? (A Question of Trust)", "answer": "Horace's one passion was collecting rare, expensive books, which he funded by robbing a safe just once a year. Because he stole only from the rich and only once annually, he thought of himself as basically 'honest'. This self-justifying, soft self-image clouded his judgement — it made him careless and trusting, so he believed the lady in red and walked straight into her trap.", "explanation": "Horace ka shauk: rare aur mehengi kitaaben, jiske liye woh saal mein sirf ek baar chori karta tha — isiliye khud ko 'honest thief' samajhta tha. Yeh soch hi uski kamzori ban gayi: over-confident aur trusting, isliye lady ke jaal mein fas gaya. Hook: 'saal mein ek chori + kitaabon ka pyaar = khud ko imaandaar samajhta tha'. Character + uske passion wale dono sawaal yahin aate hain.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FW6-158", "chapter_code": "FW6", "chapter_name": "The Making of a Scientist", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "Working through his project of collecting and tagging butterflies, Ebright developed a scientific temperament. Elaborate.", "answer": "Catching, raising and tagging thousands of butterflies taught Ebright patience, discipline and careful, systematic recording of data — the habits of a real scientist. Working with Dr Urquhart turned his childhood curiosity into a proper scientific temperament, training him to observe closely, ask questions and investigate methodically.", "explanation": "Butterfly tagging sirf shauk nahi tha — isne Ebright ko patience aur systematic data-recording sikhaaya, jo ek scientist ki aadat hai. Dr Urquhart ke saath kaam karke curiosity ek pakka 'scientific temperament' ban gayi. Memory hook: 'tagging = training for a scientist's mind'.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FW6-159", "chapter_code": "FW6", "chapter_name": "The Making of a Scientist", "unit": "Footprints Without Feet", "topic": "Extract-based comprehension", "question": "[Extract from The Making of a Scientist] What can be inferred about Richard from Mr. Weiherer's statement, 'Richard was competitive, but not in a bad sense'?", "answer": "(i) It means Richard genuinely wanted to win, but to do his best work and out of passion for science — not for prizes, fame or money. (ii) The 'ingredients' for making a scientist: a first-rate mind, strong curiosity, and the will to win for the right reasons (determination/will to excel). (iii) persistent. (iv) Not true about Ebright → (D) irrational.", "explanation": "Yeh Reference-to-Context extract hai Weiherer wale paragraph se — har saal repeat hota hai. Yaad rakh: ingredients = 'first-rate mind + curiosity + will to win for right reasons'. Blank → 'persistent'; MCP option jo galat hai → 'irrational'. Tip: extract ke andar hi answer dhoond, bahar ka knowledge mat lagana.", "years": ["2026"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 4}, {"key": "FW7-170", "chapter_code": "FW7", "chapter_name": "The Necklace", "unit": "Footprints Without Feet", "topic": "Extract comprehension", "question": "[Extract from The Necklace] How is 'success' perceived by Matilda?", "answer": "For Matilda 'success' means being the prettiest and most admired woman at the ball — her beauty, dress and ornaments win everyone's attention and raise her social standing. Sub-answers: (i) success = admiration and being envied/noticed by all. (ii) Fill in the blank: the men wanted to be formally 'introduced' to her. (iii) Her state of mind is (A) overwhelmed. (iv) 'This victory so complete and sweet to her heart' means she finally felt admired, envied and validated, the centre of attention she had always craved.", "explanation": "Yeh ball-night wala extract hai jahan Matilda chhaa jaati hai. Uske liye 'success' = sabse sundar dikhna aur tareef/envy paana. Vocab: 'presented' ka matlab 'introduced'. State of mind = overwhelmed (A). 'Victory sweet to her heart' = social validation mil gaya. Hook: 'Matilda ki success = dikhawe ki taareef'. Extract MCQ/vocab seedhe text se utha ke confirm karo.", "years": ["2026"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 4}, {"key": "FW8-180", "chapter_code": "FW8", "chapter_name": "Bholi", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "Based on your understanding of the story, how do you assess Bholi's father?", "answer": "Ramlal, Bholi's father, is a traditional village man and a fairly well-off farmer. At first he shares the family's neglect of Bholi because of her looks and dullness, and he readily arranges her marriage to the much older Bishamber to discharge a duty. Yet he is not heartless - he obeys the order to educate his daughters, and on the wedding day he is mortified by the dowry demand. In the end he respects Bholi's bold refusal and her decision to stay and serve the family, showing genuine growth from a conventional father to a proud, understanding one.", "explanation": "Father (Ramlal) ka character mixed hai - na pura bura, na pura accha. Start: traditional, Bholi ko ignore, buddhe se shaadi tay. End: dowry pe sharminda, Bholi ka faisla accept - growth dikhata hai. Tip: character sketch mein 2-3 traits + change zaroor likho. Yaad rakho: Ramlal = grows from neglectful to proud.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FW8-181", "chapter_code": "FW8", "chapter_name": "Bholi", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "Mention any two reasons that substantiate that Bholi's mother was a negative presence in her life.", "answer": "Bholi's mother is shown as a cold, negative presence. First, she neglected Bholi and openly treated her as a burden, calling her a 'dumb cow' and giving her none of the love or care she gave her other children. Second, she was eager to be rid of her, supporting marriage to a much older, greedy man without caring for Bholi's happiness, and even objected to sending her to school. Her cruelty and lack of affection deepened Bholi's low self-worth.", "explanation": "Mother = negative presence, 'koi do reasons' maange hain to bas 2 clear points do. (1) neglect + 'dumb cow' bulaana, koi pyaar nahi. (2) buddhe greedy aadmi se shaadi karwana, padhai ka virodh. Tip: 'any two reasons' = exactly 2 points, point-wise likho. Memory hook: maa ne Bholi ko kabhi apनाya hi nahi.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "FW9-190", "chapter_code": "FW9", "chapter_name": "The Book that Saved the Earth", "unit": "Footprints Without Feet", "topic": "Extract-based comprehension", "question": "[Extract from The Book that Saved the Earth] What is Think-Tank's tone in 'Elementary, my dear Omega'? Why does Omega call him great and mighty? Think-Tank concludes Earth creatures enjoy eating. Why does Oop put the book on his head?", "answer": "(i) Patronising — Think-Tank speaks down to Omega with false superiority. (ii) She calls him 'great and mighty' as a mark of respect and to flatter him, accepting his supposed supremacy and wisdom (and to stay safe). (iii) enjoy — he wrongly decides the library is a 'refreshment stand' because Earth creatures are 'always eating'. (iv) Oop mistakes the book for a hat, so he opens it and puts it on his head. The passage highlights the Martians' comic ignorance of ordinary Earth objects.", "explanation": "Dusra extract passage (haberdashery/refreshment-stand wala) — saari sub-questions kai sets mein same hain, isliye ek group. Answers: tone = patronising; respect/flattery; enjoy; book ko hat samjha. Hook: 'kitaab ko topi aur library ko canteen samjha!' Tone wale MCQ mein character ka attitude dekhna — Think-Tank hamesha ghamand se neeche dikha ke baat karta hai.", "years": ["2026"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 4}, {"key": "FW9-191", "chapter_code": "FW9", "chapter_name": "The Book that Saved the Earth", "unit": "Footprints Without Feet", "topic": "Extract-based comprehension", "question": "[Extract from The Book that Saved the Earth] What can be inferred from 'This is no time for levity'? Why does Think-Tank think Earthlings are highly civilized? What is the information Noodle provides? What is Omega's tone while reading the rhyme?", "answer": "(i) It shows Think-Tank now believes Earthlings are dangerous and their civilisation is highly advanced, so joking is inappropriate. (ii) Because he thinks Earthlings have combined agriculture and mining — growing rare metals like silver, cockle shells and even high explosives — and may attack. (iii) Noodle informs him that their invasion fleet is ready to go down and take control of Earth. (iv) Serious — Omega reads the rhyme with great seriousness (option C). The extract captures the absurd moment Think-Tank turns a harmless rhyme into a war threat.", "explanation": "Teesra extract (Mistress Mary / 'no time for levity' wala). Answers: Earthlings khatarnaak lagte hain; kheti+mining se metal-explosive ugaate hain; invasion fleet ready hai; Omega ka tone = serious. Hook: 'rhyme padhi seriously, aur Think-Tank ne war declare kar di!' 'Levity' ka matlab = mazaak/halkapan — isse infer karna easy ho jaata hai.", "years": ["2026"], "papers": 1, "raw": 10, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 4}, {"key": "PM1-244", "chapter_code": "PM1", "chapter_name": "Dust of Snow", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "How does the short structure of poem 'Dust of Snow' enhance its message about emotional renewal? Support your answer briefly.", "answer": "The poem is very short — just two brief stanzas of one sentence. This compact, minimal structure mirrors the sudden, instant shift in the poet's mood: a single small act (the crow shaking snow) swiftly changes regret into optimism. The brevity reinforces the idea that emotional renewal can happen in a fleeting moment.", "explanation": "Yahan question form/structure pe hai, content pe nahi. Point yeh hai: poem chhoti hai (do tiny stanzas, ek hi sentence) — aur yeh shortness mood ke achanak badalne ko mirror karti hai. Hook: 'Chhoti poem = achanak change.' Jab structure/form pe likho, link karo ki form kaise meaning ko strong banata hai — brevity = suddenness of renewal.", "years": ["2026"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 4}, {"key": "PM2-252", "chapter_code": "PM2", "chapter_name": "Fire and Ice", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[Extract from Fire and Ice] In 'But if it has to perish twice', 'it' refers to the _____.", "answer": "'It' refers to the world. The line means: if the world had to be destroyed twice over, the second agent of destruction would be ice (hatred), which 'would suffice'.", "explanation": "Seedha reference blank: 'it' = the world. Poori line ka matlab - agar duniya do baar perish ho. Tip: pronoun-reference blanks mein hamesha line se theek pehle wala noun dekho; yahan poem 'the world' ki hi baat kar raha hai. Ye 1-mark pakka point hai, miss mat karna.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Extract-SA"], "score": 4}, {"key": "PM2-253", "chapter_code": "PM2", "chapter_name": "Fire and Ice", "unit": "First Flight: Poems", "topic": "Figure of speech / poetic device", "question": "According to Robert Frost, fire refers to _____.", "answer": "Fire refers to violent desires and passions - greed, lust, jealousy, cruelty, conflict and fury - the intense, uncontrolled emotions powerful enough to destroy the world.", "explanation": "Direct one-liner: Fire = violent desire/passion (greed, lust, jealousy, cruelty, fury). Keywords likh dena, full sentence ki zaroorat nahi. Memory hook: 'fire = garmi wali emotions = desire'. Common mistake: sirf 'desire' likh ke mat ruk - ek-do strong words (greed/lust/fury) add karne se answer pakka. Ice ka opposite yaad rakh: hate/coldness.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Extract-SA"], "score": 4}, {"key": "PM3-266", "chapter_code": "PM3", "chapter_name": "A Tiger in the Zoo", "unit": "First Flight: Poems", "topic": "Tone / mood", "question": "What mood is created by the poet in the above lines? (A) sympathetic and thoughtful (B) angry and violent (C) cheerful and happy (D) exciting and fun", "answer": "The mood is sympathetic and thoughtful — the poet makes us pity the caged tiger and reflect on the cruelty of robbing a wild creature of its freedom.", "explanation": "Tone/mood = poet ka feel jo poem mein aata hai. Yahan mood 'sympathetic and thoughtful' hai — humein tiger par taras aata hai aur soch mein daal deta hai. Trap option: 'angry and violent' — ye tiger ki feeling hai, poem ka mood nahi. Hook: mood = reader ko kaisa feel hota hai (yahan: sad + reflective).", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Extract-MCQ"], "score": 4}, {"key": "PM5-287", "chapter_code": "PM5", "chapter_name": "The Ball Poem", "unit": "First Flight: Poems", "topic": "Character sketch", "question": "Comment on the portrayal of the character of the boy in the given extract.", "answer": "The boy is shown transfixed and dejected at losing his ball. Through his desperate, grieving eyes we see a gradual emotional transformation — from innocent, carefree childhood to painful awareness and his first sense of responsibility. He emerges as a young learner of life's hard truth that loss is inevitable.", "explanation": "Boy ka character: shuru mein innocent aur khel mein khoya hua, ball khone par transfixed/dejected, phir dheere-dheere mature aur aware ho jaata hai. Ek line: 'innocence se awareness tak ka safar.' Common mistake: ise sirf 'sad boy' mat likhna — uska transformation aur 'first responsibility' wala growth zaroor mention karna.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 2, "types": ["Extract-SA"], "score": 4}, {"key": "PM5-288", "chapter_code": "PM5", "chapter_name": "The Ball Poem", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[Extract from The Ball Poem] What does the poet mean by 'epistemology of loss'?", "answer": "'Epistemology of loss' means the knowledge or understanding of loss — learning what loss truly is. The boy is learning, behind his desperate eyes, that losses are inevitable and universal ('what every man must one day know'), and that one must reconcile with this fate and learn 'how to stand up' again.", "explanation": "'Epistemology' = knowledge/study. 'Epistemology of loss' = loss ko samajhne ki seekh — ki khona zindagi ka sach hai, sabko hota hai, aur phir se uthna padta hai. Hook: 'epistemology = gyaan; loss ka gyaan = har insaan ek din seekhta hai.' Phrase-meaning question hai, to seedha meaning + 'how to stand up' wala point likhna.", "years": ["2026"], "papers": 1, "raw": 2, "marks": 1, "types": ["Extract-SA"], "score": 4}, {"key": "PM7-309", "chapter_code": "PM7", "chapter_name": "The Trees", "unit": "First Flight: Poems", "topic": "Extract-based comprehension", "question": "[Extract from The Trees] Comment on the portrayal of the narrator.", "answer": "The narrator is introspective, calm and hopeful, deeply connected to nature through her senses — she feels the fresh night, sees the whole moon and smells the leaves and lichen reaching like a voice into the rooms. Though she sits indoors writing letters, she is quietly aware of and at peace with the trees' departure.", "explanation": "Narrator ka character: introspective (soch-vichaar wali), hopeful, aur nature se sensory connection (smell of leaves, moonlight). Woh andar baithi hai par baahar ki aazaadi ko mehsoos kar rahi hai. Tip: 'portrayal of narrator' = uske traits likho (calm, observant, connected to nature), sirf events nahi.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Extract-SA"], "score": 4}, {"key": "PM8-314", "chapter_code": "PM8", "chapter_name": "Fog", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "How does the poet portray the relationship between nature and the urban environment?", "answer": "Nature (the fog) and the city exist side by side. The fog quietly covers the 'harbour and city', sits and silently 'looks over' the human world, and then moves on without disturbing it. Nature is shown as soft, calm and seemingly harmless, yet it is a powerful, pervasive force that watches over and momentarily takes charge of the busy urban landscape before gently withdrawing.", "explanation": "Central idea: nature aur sheher ka rishta. Fog (nature) chup-chaap aakar harbour aur city ko dhak leta hai, unhe dekhta hai, aur phir chala jaata hai — bina koi shor ya nuksaan kiye. Matlab nature soft aur harmless lagta hai, par hai bahut powerful — woh insaan ki duniya ke upar chhup ke control rakhta hai. Theme ek line mein yaad rakh: 'Nature silently watches over and overpowers the busy city.'", "years": ["2026"], "papers": 1, "raw": 3, "marks": 2, "types": ["Extract-SA"], "score": 4}, {"key": "PM8-315", "chapter_code": "PM8", "chapter_name": "Fog", "unit": "First Flight: Poems", "topic": "Tone / mood", "question": "Fill in the blank with the appropriate option from the brackets: In the given extract, the tone of the poet is __________ (playful and mysterious/cold and rough/pessimistic and aggressive).", "answer": "The tone of the poem is playful and mysterious. The light, gentle cat-image gives a playful feel, while the silent, unseen way the fog appears and vanishes creates a sense of mystery. It is never cold, rough, pessimistic or aggressive.", "explanation": "Tone yaad rakhne ka shortcut: 'playful and mysterious'. Billi wali soft, cute image se playful feel aati hai, aur fog jaise chup-chaap aata aur gayab ho jaata hai usse mystery banti hai. Common mistake: bachche 'cold and rough' ya 'aggressive' choose kar lete hain — galat! Fog gentle hai, dukhi ya aggressive nahi. Mantra: Fog ka mood = playful + mysterious.", "years": ["2026"], "papers": 1, "raw": 3, "marks": 1, "types": ["Extract-SA"], "score": 4}, {"key": "FP1-4", "chapter_code": "FP1", "chapter_name": "A Letter to God", "unit": "First Flight: Prose", "topic": "Incident / plot point", "question": "Why did Lencho not trust the post office employees? (A Letter to God)", "answer": "Lencho had asked God for 100 pesos but found only 70 in the envelope. Being certain that God could never make a mistake, he concluded that the missing 30 pesos must have been stolen by the post-office employees who handled the money. So he distrusted them and, in his next letter, even called them 'a bunch of crooks'.", "explanation": "Logic simple hai: Lencho ne 100 maange, mile sirf 70. Uske liye God galti kar hi nahi sakta, to baaki 30 zaroor post-office waalon ne chura liye – isiliye unpe shaq. Yahi se irony bhi banti hai. Hook: 'God galti nahi karta, to chor to insaan hi honge'.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 3}, {"key": "FP2-15", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "Why does the author use the phrase 'that drove a law-abiding citizen to become a criminal' to describe Mandela?", "answer": "Mandela was a peaceful, law-abiding man, but the cruel injustice of apartheid forced him to break unjust laws to free his people and restore their dignity. His fight against discrimination led to imprisonment and brutalities. It was the system, not his nature, that turned him into a so-called 'criminal' - a freedom fighter in the eyes of his people.", "explanation": "Mandela criminal nahi the - unhe apartheid ne 'criminal' banaya kyunki unhone galat kanoon tode. Point yeh hai: jab kanoon hi anyaayi ho, toh use todna sahi hai. Memory hook: 'system ne law-abiding citizen ko criminal banaya, na ki uska swabhav.'", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 3}, {"key": "FP2-19", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Value-based / life-lesson", "question": "Both 'Nelson Mandela: Long Walk to Freedom' and 'The Trees' by Adrienne Rich explore themes of transformation, liberation and the power to change. Examine the commonality of themes in both works.", "answer": "Both works celebrate transformation and the urge to break free. Mandela's struggle against apartheid is a fight for individual and collective freedom, ending in the triumph of the ANC and democracy. Rich's trees, struggling out of confinement into the open, symbolise liberation - of nature, and of women breaking free from oppression. Both show that the will to be free cannot be caged forever.", "explanation": "Cross-text question: Mandela aur 'The Trees' dono mein common theme hai - liberation aur transformation. Mandela apartheid se azaadi paate hain; Rich ke ped ghar ki kaid se bahar nikalte hain (feminism/freedom ka symbol). Memory hook: 'dono mein qaid se azaadi ki chahat.'", "years": ["2025"], "papers": 1, "raw": 1, "marks": 6, "types": ["Literature-LA"], "score": 3}, {"key": "FP2-28", "chapter_code": "FP2", "chapter_name": "Nelson Mandela: Long Walk to Freedom", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Extract from Nelson Mandela: Long Walk to Freedom] What is the effect on the speaker? What can be inferred about courage? What does true courage entail versus misconception? Fill in the blank: 'strength and resilience that is...'", "answer": "Effect on speaker = he realised the true meaning of courage - resilience and the conquering of fear. Inference about courage = (D) the ability to overcome fear. True courage entails triumphing over fear, not its absence - it means overcoming fear rather than avoiding it (the common misconception is that brave people feel no fear). Fill blank: men stood up to torture showing strength and resilience that is 'impossible to understand'.", "explanation": "Yeh RTC courage wala hai. Core: courage = darr ko jeetna, darr ka na hona nahi (D wala option). Mandela ke saathi torture ke saamne khade rahe - unki himmat 'impossible to understand' thi. Memory hook: 'triumph over fear, not absence of fear.' RTC mein hamesha extract ke shabd use karo.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 3}, {"key": "FP3-38", "chapter_code": "FP3", "chapter_name": "Two Stories about Flying", "unit": "First Flight: Prose", "topic": "Central theme / message", "question": "In 'Two Stories About Flying – Part I', how does the young seagull's hesitation reflect a universal human fear? How is it eventually overcome? Justify how the theme of independence and courage develops.", "answer": "The young seagull's terror of leaving his ledge mirrors the universal human fear of failure and of stepping into the unknown. His reluctance creates the central conflict and drives his growth. Pushed by hunger and his family's tough-love tactics, he finally takes the plunge, his wings open instinctively, and he flies. Thus his journey from fear to flight develops the theme that facing one's fears is essential for independence and courage.", "explanation": "Seagull ka darr har insaan ke 'failure ke darr' jaisa hai - naya kadam uthane se ghabrahat. Theme = independence + courage, jo tab develop hota hai jab woh darr ko face karke udta hai. Hook: 'darr ko face karo, tabhi azaadi milti hai'. Universal-fear wale questions mein seagull ko 'har insaan' se relate karna.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 3}, {"key": "FP3-41", "chapter_code": "FP3", "chapter_name": "Two Stories about Flying", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Extract from Two Stories about Flying] What is the time of day? What can be inferred about the writer? What does 'clear sky' indicate? How does the serene atmosphere shape mood and anticipation?", "answer": "Opening night-flight extract (Black Aeroplane): (i) The extract is set at night (around 1:30 a.m., moon and stars out). (ii) Inference about the writer - he is eager, excited and longing to meet his family, showing a loving bond. (iii) 'clear sky' suggests favourable weather conditions. (iv) The serene, peaceful atmosphere creates a tranquil, happy mood and builds anticipation of reuniting with family and having an English breakfast back in England.", "explanation": "Yeh lesson ka SHURUAATI peaceful extract hai - raat, chaand, taare, sab calm. Mood = peaceful/happy, anticipation = family + breakfast. 'clear sky' = favourable (flavourful trap mat choose karna!). Hook: 'shuruaat shaant thi, baad mein storm aaya' - contrast yaad rahega.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 3}, {"key": "FP3-42", "chapter_code": "FP3", "chapter_name": "Two Stories about Flying", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Extract from Two Stories about Flying] What can be inferred about the parents? Where did the seagull sleep? What factors caused his reluctance to fly? What is the meaning of 'muster up'?", "answer": "Ledge extract (His First Flight): (i) Inference about the parents - they show tough love / parental concern, calling shrilly, upbraiding and threatening to starve him to make him fly. (ii) The seagull slept in a little hole under the ledge. (iii) His reluctance came from a deep-seated fear that his wings would not support him, despite seeing his shorter-winged siblings fly, worsened by parental pressure and fear of failure. (iv) 'muster up' means to gather (courage).", "explanation": "Yeh 'ledge wala' extract hai - seagull darr ke maare hil bhi nahi pa raha. Parents = tough love (daant, taunt, starve karne ki dhamki). 'muster up' = gather (himmat jutaana). Reluctance ka reason = wings pe bharosa nahi + parental pressure. Hook: 'wings to theek the, confidence missing tha'.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 3}, {"key": "FP3-43", "chapter_code": "FP3", "chapter_name": "Two Stories about Flying", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Extract from Two Stories about Flying] What does 'proud cackle' signify? How do parents teach independence? Compare the parents' reactions to their children. What is the meaning of 'devour'?", "answer": "Plateau extract (His First Flight): (i) 'proud cackle' adds a sense of pride. (ii) The parents teach independence by perfecting the young in flight, showing them how to skim the waves and dive for fish. (iii) Contrasting reactions - they circled and cackled proudly when the elder brother caught his first herring, but left the timid young seagull alone, taunting him for his cowardice and threatening starvation. (iv) 'devour' most nearly means gobbled (ate hungrily).", "explanation": "Yeh extract dikhata hai parents kaise independence sikhate hain - flying, skimming, diving. Contrast: bhai ke liye 'proud cackle', darpok seagull ke liye taunt + akela. 'devour' = gobble (jaldi-jaldi khana), 'proud cackle' = pride (noise trap nahi). Hook: 'ek bachche par garv, doosre ko push' - tough love phir se.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 3}, {"key": "FP4-48", "chapter_code": "FP4", "chapter_name": "From the Diary of Anne Frank", "unit": "First Flight: Prose", "topic": "Extract-based comprehension", "question": "[Extract from From the Diary of Anne Frank] What can be inferred about the speaker's emotional state? What narrative technique is used? She has no real friend. Why does she say 'paper has more patience than people'?", "answer": "Anne's emotional state is depressed/lonely/bored/listless. The narrative technique is reflective. She keeps the diary private because she has no real friend. She says 'paper has more patience than people' because paper is non-judgmental and patient, letting her express herself freely, unlike critical humans.", "explanation": "Iconic line: 'paper has more patience than people' — paper judge nahi karta, isliye Anne usme dil khol kar likhti hai. Mood = depressed/lonely, technique = reflective (woh apne aap se baat kar rahi hai). Yaad rakho: diary uski 'real friend' ki kami ko bhar deti hai.", "years": ["2025"], "papers": 1, "raw": 12, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 3}, {"key": "FP6-72", "chapter_code": "FP6", "chapter_name": "Mijbil the Otter", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "What efforts did the narrator make to get his mail from Europe? (Mijbil the Otter)", "answer": "Maxwell first cabled England but got no reply for three days. He then booked a phone call twenty-four hours in advance, but the line was out of order; next the telephone exchange was closed, then there was another breakdown. After all these failures his mail finally reached him only five days later.", "explanation": "Mail wala incident dikhata hai Basra mein communication kitna kharab tha. Sequence: cable bheji (3 din kuchh nahi) → call book ki → line kharab → exchange band → phir breakdown → 5 din baad mail aayi. Hook: 'cable-call-breakdown-5 days'. Frustration aur delay highlight karo.", "years": ["2025"], "papers": 1, "raw": 1, "marks": 3, "types": ["Literature-SA"], "score": 3}, {"key": "FP7-81", "chapter_code": "FP7", "chapter_name": "Madam Rides the Bus", "unit": "
