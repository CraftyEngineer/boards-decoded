opics": [{"topic": "Prepositional verbs/phrases", "count": 14}, {"topic": "Time (in/on/at/since/for)", "count": 8}, {"topic": "Place/direction (in/on/at/to)", "count": 4}]}]}, {"name": "Writing", "marks": 10, "chapters": [{"code": "WR2", "name": "Analytical Paragraph", "marks_per_paper": 5.4, "importance": "HIGH", "total_q": 148, "total_q_raw": 148, "papers": 21, "years": 4, "concepts": 4, "topics": [{"topic": "From cues/clues", "count": 80}, {"topic": "From a table", "count": 35}, {"topic": "From a bar/line/pie chart", "count": 31}, {"topic": "From a map/process/flow chart", "count": 2}]}, {"code": "WR1", "name": "Formal Letter", "marks_per_paper": 4.6, "importance": "HIGH", "total_q": 126, "total_q_raw": 126, "papers": 21, "years": 4, "concepts": 4, "topics": [{"topic": "Letter to the Editor", "count": 58}, {"topic": "Complaint letter", "count": 40}, {"topic": "Application/request to an official", "count": 14}, {"topic": "Letter of enquiry/order/placement", "count": 14}]}]}, {"name": "Reading", "marks": 20, "chapters": [{"code": "RD2", "name": "Case-based / Factual Passage (skills)", "marks_per_paper": 10.1, "importance": "HIGH", "total_q": 575, "total_q_raw": 575, "papers": 21, "years": 4, "concepts": 7, "topics": [{"topic": "Factual / literal", "count": 272}, {"topic": "Inference", "count": 142}, {"topic": "Vocabulary in context", "count": 62}, {"topic": "Data/visual interpretation", "count": 36}, {"topic": "Analogy", "count": 30}, {"topic": "Main idea / title", "count": 24}, {"topic": "True/False / fact-opinion", "count": 9}]}, {"code": "RD1", "name": "Discursive Passage (skills)", "marks_per_paper": 9.9, "importance": "HIGH", "total_q": 534, "total_q_raw": 534, "papers": 21, "years": 4, "concepts": 6, "topics": [{"topic": "Factual / literal", "count": 301}, {"topic": "Inference", "count": 99}, {"topic": "Vocabulary in context", "count": 53}, {"topic": "True/False", "count": 40}, {"topic": "Main idea / title", "count": 29}, {"topic": "Analogy", "count": 12}]}]}], "concepts": [{"key": "RD1-328", "chapter_code": "RD1", "chapter_name": "Discursive Passage (skills)", "unit": "Reading", "topic": "Factual / literal", "question": "Complete the sentence by choosing an appropriate option: Avalanche can be caused by (a) new snow or rain. (b) heavy winds. (c) high altitude. (d) global warming.", "answer": "STRATEGY (passage changes every year, so this is skill-practice, not memorisation): The answer is stated word-for-word in the passage. Scan-and-match: pull a keyword from the question (e.g. 'caused by', 'two reasons', 'one benefit'), find that exact line in the text, and lift the answer straight from there. For MCQs, eliminate options not supported by any sentence. For 'complete the sentence' / SA, copy the relevant phrase verbatim - don't add your own opinion. Answer in the same number of points/sentences the question asks for.", "explanation": "Yeh sabse easy aur scoring skill hai - answer passage mein literally likha hota hai. Question ka keyword pakdo, woh line dhoondo, aur seedha utha lo. Apne se add mat karo. Jitne points/sentences maange (e.g. 'two reasons'), utne hi do. Passage har saal badalta hai, isliye yeh yaad karne ka nahi, scan-and-match practice karne ka topic hai.", "years": ["2023", "2024", "2025", "2026"], "papers": 21, "raw": 301, "marks": 1, "types": ["Reading-MCQ", "Reading-SA"], "score": 53}, {"key": "RD1-329", "chapter_code": "RD1", "chapter_name": "Discursive Passage (skills)", "unit": "Reading", "topic": "Inference", "question": "Select the option that displays what the writer projects with reference to the following : Is organic food safer and more nutritious ? This is an important part of the debate. (a) denial (b) confirmation (c) caution (d) acceptance", "answer": "STRATEGY (skill-practice): The answer is NOT written directly - you must read between the lines. Combine 2-3 clues from the passage and ask 'what does the writer imply / how does the writer feel?'. For attitude/tone options (caution, speculative, conviction, denial), notice hedging words like 'may', 'could', 'is said to' -> caution/speculative; firm words like 'will', 'clearly' -> conviction. Eliminate options that go beyond or contradict the text. Pick the choice the evidence best supports, not the one that's merely 'true in real life'.", "explanation": "Inference mein answer directly nahi likha hota - clues jodo aur socho writer ka matlab kya hai. Attitude waale MCQ mein hint words dekho: 'may/could/might' matlab caution ya speculative, 'will/clearly' matlab conviction. Jo option text se zyada bol raha ho ya bahar ki baat ho, usse hata do. Real-life mein sahi hone se kaam nahi chalega - passage ka saboot dekho.", "years": ["2023", "2024", "2025", "2026"], "papers": 21, "raw": 99, "marks": 1, "types": ["Reading-MCQ", "Reading-SA"], "score": 53}, {"key": "RD2-334", "chapter_code": "RD2", "chapter_name": "Case-based / Factual Passage (skills)", "unit": "Reading", "topic": "Factual / literal", "question": "The vehicles emit pollutants which affect _______ badly.", "answer": "This whole section is SKILL-PRACTICE, not memorisation: the passage/data change every year, so practise the technique, not the content. STRATEGY: The answer is sitting in the passage word-for-word or close to it. 1) Read the question and underline the key noun/keyword. 2) Scan the named paragraph (questions usually say 'paragraph 1/2...') for that keyword. 3) Lift the answer directly from that sentence; do NOT add your own opinion. For MCQs, match each option back to a line in the text and eliminate ones that are not stated. Keep it short — 1 phrase/line is enough for 1 mark.", "explanation": "Yeh literal questions ka jawab passage ke andar hi chhupa hota hai, bas dhoondhna hai. Question ka keyword pakdo aur usi paragraph mein scan karo jo mention kiya gaya hai. Apni taraf se kuch mat jodo — jo likha hai wahi answer hai. Common galti: poora paragraph likh dena — sirf relevant line/phrase likho, 1 mark = 1 line.", "years": ["2023", "2024", "2025", "2026"], "papers": 21, "raw": 272, "marks": 1, "types": ["Reading-MCQ", "Reading-SA"], "score": 53}, {"key": "RD2-335", "chapter_code": "RD2", "chapter_name": "Case-based / Factual Passage (skills)", "unit": "Reading", "topic": "Inference", "question": "Infer one reason for the following, based on information in paragraph 1. Reducing traffic congestion is not easy.", "answer": "This whole section is SKILL-PRACTICE, not memorisation: the passage/data change every year, so practise the technique, not the content. STRATEGY: The answer is NOT written directly — you must reason from clues. 1) Find the sentence/data the question points to. 2) Ask 'what does this imply / why would this be?' 3) Make a logical link the writer hints at but doesn't spell out (cause-effect, conclusion, intention). For Assertion-Reason MCQs: check (a) is the Assertion true? (b) is the Reason true? (c) does the Reason actually EXPLAIN the Assertion? Pick the option matching all three. Stay tied to the text — infer, don't invent.", "explanation": "Inference matlab seedha answer nahi milega — clues se dimaag lagana hai. Text jo ishaara kar raha hai usse logical conclusion nikaalo (kyun? toh kya hua?). Assertion-Reason mein teen cheez check karo: Assertion sahi? Reason sahi? Aur Reason, Assertion ko explain kar raha hai ya nahi? Apni kahani mat banao — hamesha passage se juda raho.", "years": ["2023", "2024", "2025", "2026"], "papers": 21, "raw": 142, "marks": 1, "types": ["Reading-MCQ", "Reading-SA"], "score": 53}, {"key": "WR1-341", "chapter_code": "WR1", "chapter_name": "Formal Letter", "unit": "Writing", "topic": "Letter to the Editor", "question": "As Sohail Khan, the sports captain of Pinnacle Public School, you believe that fitness as a lifestyle should be promoted. Write a letter to the Editor of a national daily, in about 120 words, suggesting the introduction of “Cycle to School\" campaign for school going students. The programme aims to develop the habit of exercising through cycling to maintain fitness and keeping children active. Share the importance and credibility of such a programme and suggest a feasible way to execute it along with possible activities.", "answer": "FORMAT SKELETON (write in 100-120 words). 1) Sender's address (2-3 lines, top-left). 2) Date (line below address). 3) Receiver: 'The Editor', newspaper's name & city. 4) Salutation: 'Sir/Madam,'. 5) Subject line naming the issue (e.g. 'Subject: Need to promote fitness through a Cycle-to-School campaign'). 6) BODY in 3 short paras -- Para1: introduce yourself + state the issue 'Through the columns of your esteemed daily...'; Para2: explain the problem/your views, its impact and importance; Para3: give 2-3 concrete suggestions + a request to authorities to act. 7) Complimentary close: 'Yours faithfully,' then signature + name. CONTENT: a Letter to the Editor RAISES PUBLIC AWARENESS about a social issue and appeals to authorities through the paper -- it is NOT addressed to the official directly. Always weave in: cause, effect on people, and remedies/suggestions.", "explanation": "Letter to the Editor matlab newspaper ke editor ko likh ke public issue uthana -- seedha officer ko nahi. Format ke 1-2 marks pakke: sender's address, date, 'The Editor + paper ka naam', 'Sir/Madam,', SUBJECT line, aur 'Yours faithfully' + naam -- inme se kuch bhi mat bhoolna. Body 3 chhote paras: issue introduce karo, uska asar bataao, phir 2-3 suggestions do. Memory hook: 'Through the columns of your esteemed daily...' opening line ratt lo. Word limit 100-120 -- count zaroor karo, zyada likhne par marks katte hain.", "years": ["2023", "2024", "2025", "2026"], "papers": 21, "raw": 58, "marks": 5, "types": ["Letter"], "score": 53}, {"key": "WR1-342", "chapter_code": "WR1", "chapter_name": "Formal Letter", "unit": "Writing", "topic": "Complaint letter", "question": "As Sharman Singh of 776, Hemkunt Apartments, Arampur, you believe that as a law abiding citizen who pays regular taxes you deserve regular supply of clean drinking water in your house. However, your locality is facing acute shortage as supply is often disrupted without notice causing problems to the residents. Write a letter to the Director of Jal Board of your city area, in about 120 words, apprising him of the situation; sharing the need for regular supply of clean water and requesting him to take necessary action to improve the situation.", "answer": "FORMAT SKELETON (write in 100-120 words). 1) Sender's address. 2) Date. 3) Receiver: the AUTHORITY/officer directly -- e.g. 'The Municipal Commissioner / The Director, Jal Board / The MLA / The President, RWA / The Manager, <shop>', with office address. 4) Salutation: 'Sir/Madam,'. 5) Subject line stating the grievance (e.g. 'Subject: Complaint regarding acute shortage of clean drinking water'). 6) BODY in 3 paras -- Para1: who you are + the complaint clearly; Para2: details of the problem and the inconvenience/harm caused (health, safety, daily life); Para3: request prompt action + 1-2 suggestions; for a faulty product ask for repair/replacement. 7) Close: 'Yours faithfully,' + signature + name. CONTENT: a complaint POINTS OUT A GRIEVANCE to an authority and DEMANDS REDRESSAL -- keep tone firm but polite. Cover the problem, its impact, and the action wanted.", "explanation": "Complaint letter mein kisi authority (Municipal Commissioner, MLA, DM, RWA President, ya shop Manager) ko seedha shikayat likhte ho aur action maangte ho. Editor wale se farak: yeh DIRECT officer ko jaata hai, awareness ke liye nahi. Format marks ke liye: address, date, receiver ka designation + address, 'Sir/Madam,', SUBJECT mein 'Complaint regarding...', aur 'Yours faithfully' + naam. Body: problem batao -> uska nuksan (health/safety) -> turant action + suggestion. Tone polite par firm. Faulty product ho to replacement/repair clearly maango. 100-120 words -- count karo.", "years": ["2023", "2024", "2025", "2026"], "papers": 20, "raw": 40, "marks": 5, "types": ["Letter"], "score": 52}, {"key": "WR2-348", "chapter_code": "WR2", "chapter_name": "Analytical Paragraph", "unit": "Writing", "topic": "From cues/clues", "question": "Social Media has a lasting impact on our thought process and influences our thinking in both positive and negative ways. With the help of the given cues and using your own ideas, write an analytical paragraph on “The Impact of Social Media on Teenagers’’ in about 120 words. POSITIVE : • connects peers • creative expression • access information • community building NEGATIVE : • impacts self-esteem • cyber bullying • privacy intrusion • distraction and addiction", "answer": "STRUCTURE (single paragraph, 100-120 words, formal tone, linking words). Used for cue/notes prompts AND for extract/statement/'read the given details' prompts, including all Visually-Impaired versions that give notes instead of a visual:\n1) OPENING line — introduce the topic in your own words: 'Social media has become an inseparable part of teenagers' lives, influencing them both positively and negatively.'\n2) BODY (2-3 sentences) — EXPAND every given cue into full sentences, grouped logically (e.g. all positives together — connects peers, creative expression, access to information, community building — then all negatives — lowers self-esteem, cyber-bullying, privacy intrusion, addiction). Use ALL the cues; add a little of your own idea/example; keep them flowing with linkers (moreover, however, on the other hand, consequently).\n3) CLOSING line — a balanced concluding inference ('Hence, used wisely, … proves beneficial, but caution is essential').\nMarking: Content 2, Organisation/coverage of all cues 2, Accuracy 1. ONE paragraph; cover every cue — leaving cues out loses content marks.", "explanation": "Cue/notes (ya 'read the given details'/extract/statement) wale prompt — yahan koi chart nahi, points diye hote hain. Rule: HAR cue ko poore sentence mein expand karo, ek bhi mat chhodo (chhodne par content marks jaate hain). Similar points ko saath group karo — pehle saare positives, phir saare negatives — aur linkers se jodo (moreover, however, on the other hand). Thoda apna idea/example add karo. Pehli line topic introduce, last line balanced conclusion ('soch-samajh kar use karein to faydemand'). Visually-impaired wale questions bhi isi tarah — woh chart ki jagah notes dete hain. Ek paragraph, 100-120 words, formal.", "years": ["2023", "2024", "2025", "2026"], "papers": 19, "raw": 80, "marks": 5, "types": ["Paragraph"], "score": 49}, {"key": "GR4-212", "chapter_code": "GR4", "chapter_name": "Reported Speech", "unit": "Grammar", "topic": "Reporting a statement", "question": "Read the conversation between Meera and her father. Complete the sentence by reporting the reply correctly. Meera : What did you buy ? Father : I bought a heater. Meera asked her father what he had bought. The father replied that he __________.", "answer": "'...he had bought a heater.' Rule: reported statements use 'that' + backshift the verb one tense back (simple past->past perfect, present->past, will->would, can->could, have/has->had); change pronouns to match the reporter and shift time-words (yesterday->the previous day, today->that day, this->that, now->then).", "explanation": "Statement report karna sabse common hai. Reporting verb (said/replied/told) ke baad 'that' lagao aur verb ko ek step peeche le jao: 'bought'->'had bought', 'will'->'would', 'am/is'->'was', 'have'->'had'. Pronoun bhi badlo (I->he/she, my->his/her) aur time-words (yesterday->the previous day, tomorrow->the next day, this->that, now->then). Yaad rakho: NO inverted commas, NO question mark. Memory hook: 'verb ek seedhi peeche, pronoun-time saath mein kheeche'. Common galti: jab 'told' use ho toh 'that' chhodna mat, aur universal truth ho toh tense same rehta hai.", "years": ["2023", "2024", "2025", "2026"], "papers": 18, "raw": 93, "marks": 1, "types": ["Grammar"], "score": 43}, {"key": "GR7-231", "chapter_code": "GR7", "chapter_name": "Editing / Error Correction", "unit": "Grammar", "topic": "Word form/part-of-speech error", "question": "Identify the error and supply the correction for the following note on a food packet. This product is manufacturing for infants and contains no additives.", "answer": "Error: manufacturing -> Correction: manufactured. The word is in the wrong form/part of speech: use the past participle in a passive ('is manufactured'), the noun not the adjective (excitement, hospitality), and singular vs plural nouns correctly (food, information, traffic). Change the FORM, keep the root.", "explanation": "Word-form / part-of-speech error: shabd SAHI hai par ROOP galat. Passive mein V3 chahiye (is manufactured, is trapped), naam-wala roop chahiye to noun (excitement, hospitality, identity), na ki adjective. Singular/plural noun dekho: 'informations/foods/traffics' galat -> uncountable singular. -ing vs -ed: jo cheez feeling deti hai = -ing (exciting movie), jo feel karta hai = -ed (excited child). Hook: jad (root) wahi rakho, sirf uska kapda (form) badlo - verb? noun? adjective? plural?", "years": ["2023", "2024", "2025", "2026"], "papers": 17, "raw": 59, "marks": 1, "types": ["Grammar"], "score": 39}, {"key": "RD2-337", "chapter_code": "RD2", "chapter_name": "Case-based / Factual Passage (skills)", "unit": "Reading", "topic": "Vocabulary in context", "question": "Substitute the underlined word with ONE WORD similar in meaning in the following sentence. Citizens of Delhi/NCR have time and time again pondered over the possibilities of how to reduce traffic congestion.", "answer": "This whole section is SKILL-PRACTICE, not memorisation: the passage/data change every year, so practise the technique, not the content. STRATEGY: Meaning depends on HOW the word is used in that sentence, not the dictionary alone. 1) Re-read the full sentence the word sits in and feel the tone (positive/negative). 2) For synonyms/antonyms, replace the word with each option and keep the one that preserves the meaning. 3) For 'word from the paragraph' questions, hunt the paragraph for a same-meaning (synonym) or opposite-meaning (antonym) word. Trust the surrounding words (context clues) over your first guess.", "explanation": "Vocab questions mein word ka matlab uske sentence ke hisaab se nikaalo, ratta-maara dictionary se nahi. Poora sentence padho, tone samjho (achha/bura), phir har option ko us jagah rakh kar check karo. Synonym = same meaning, antonym = opposite — paragraph mein wahi word dhoondho. Context clues sabse bada hint hai — aas-paas ke shabd dekho.", "years": ["2023", "2024", "2025", "2026"], "papers": 16, "raw": 62, "marks": 1, "types": ["Reading-MCQ", "Reading-SA"], "score": 41}, {"key": "GR4-213", "chapter_code": "GR4", "chapter_name": "Reported Speech", "unit": "Grammar", "topic": "Reporting a question (wh-/yes-no)", "question": "Manthan and Sonalika had a conversation about Sonalika's job interview. Report Manthan's question. How are you preparing for the interview ?", "answer": "'Manthan asked Sonalika how she was preparing for the interview.' Rule (WH-question): use 'asked' + the same wh-word (what/where/why/how/which/who), then switch to STATEMENT word-order (remove do/did/is inversion), backshift the tense and adjust pronouns/time; drop the '?'.", "explanation": "Wh-question report karte waqt question word (what/where/why/how/which/who) wahi rehta hai, par uske baad sentence STATEMENT ban jaata hai - 'did you', 'are you', 'is it' ka ulta-pulta hata do aur seedha subject+verb likho ('how are you'->'how she was'). Reporting verb 'asked/enquired', question mark UDA do, tense ek step peeche (are->was, did->had, is->was). 'Which is the route'->'which the route was'. Memory hook: 'wh-word rakho, baaki sentence seedha karo, prashn-chinh bhula do'. Common galti: 'asked that' likhna - questions mein 'that' NAHI aata.", "years": ["2023", "2024", "2025", "2026"], "papers": 16, "raw": 58, "marks": 1, "types": ["Grammar"], "score": 39}, {"key": "GR7-228", "chapter_code": "GR7", "chapter_name": "Editing / Error Correction", "unit": "Grammar", "topic": "Subject-verb agreement error", "question": "Select the option that identifies the error and supplies the correction for the line given below : Mohini attend every concert in the city because she loves classical music.", "answer": "Error: attend -> Correction: attends. The verb must agree with its subject in number/person: a singular third-person subject (Mohini / the board / it / each) takes the -s verb; plural subjects (phones, libraries) take the plain verb; 'neither...nor' agrees with the nearer subject.", "explanation": "Subject-verb agreement: pehle ASLI subject dhoondo (beech ke 'along with / one of / the team of' words ko ignore karo), phir verb match karo. Singular subject (he/she/it/Mobile phone... wait phones=plural) -> verb ko -s lagao; plural subject -> plain verb. Trap: 'Each one of the candidates HAS' (each = singular). 'Neither X nor Y' -> verb paas wale se match. Hook: 'singular noun ko -s wala verb, plural ko nanga verb.'", "years": ["2023", "2024", "2025", "2026"], "papers": 16, "raw": 44, "marks": 1, "types": ["Grammar"], "score": 39}, {"key": "RD1-330", "chapter_code": "RD1", "chapter_name": "Discursive Passage (skills)", "unit": "Reading", "topic": "Vocabulary in context", "question": "The word ‘deadly’ in the (3) paragraph most nearly means (a) likely to cause death (b) harmful (c) very boring (d) scary", "answer": "STRATEGY (skill-practice): Meaning depends on HOW the word is used in that sentence, not the dictionary alone. Re-read the full line, replace the target word with each option, and keep the one that preserves the sentence's sense. For SYNONYM ('most nearly means') pick the closest match; for ANTONYM ('opposite of') pick the reverse and beware near-synonyms planted as traps. For a phrase ('refers to'), restate it in your own simple words first, then match. Use the surrounding context as your dictionary.", "explanation": "Yahan word ka matlab us line ke hisaab se nikaalna hai, dictionary ratne se nahi. Trick: word ki jagah har option daal ke padho - jo line ka sense theek rakhe wahi sahi. Synonym = same matlab, antonym = ulta matlab (aur paas-paas waale fake options se bacho). Phrase ho ('refers to') to pehle apne simple shabdon mein bolo, phir match karo. Context hi tumhari dictionary hai.", "years": ["2023", "2024", "2025", "2026"], "papers": 15, "raw": 53, "marks": 1, "types": ["Reading-MCQ", "Reading-SA"], "score": 39}, {"key": "GR4-214", "chapter_code": "GR4", "chapter_name": "Reported Speech", "unit": "Grammar", "topic": "Reporting a question (wh-/yes-no)", "question": "Maria shared some information with Mathew about her flight to Kanpur. Report Mathew's question. Were you nervous on your first flight ?", "answer": "'Mathew asked Maria whether/if she was nervous on her first flight.' Rule (yes/no question): use 'asked' + 'if/whether' (NO wh-word), convert to statement order, backshift tense (were->was, did->had, do/does->past, will->would, can->could), adjust pronouns/time; drop the '?'.", "explanation": "Jo question 'Yes/No' mein answer maange (Did/Do/Is/Are/Was/Will/Can se shuru), use report karte waqt 'if' ya 'whether' lagao - koi wh-word nahi. Phir statement order: 'Did you spot'->'if he had spotted', 'Are you'->'if she was', 'Will you'->'if she would'. Reporting verb 'asked', question mark gayab. Tense ek step peeche, pronoun adjust. Memory hook: 'Yes/No waala sawaal = if/whether ka kamaal'. Common galti: question mark chhod dena ya 'asked that' likhna - dono galat.", "years": ["2023", "2024", "2025", "2026"], "papers": 15, "raw": 43, "marks": 1, "types": ["Grammar"], "score": 34}, {"key": "GR7-229", "chapter_code": "GR7", "chapter_name": "Editing / Error Correction", "unit": "Grammar", "topic": "Preposition error", "question": "Identify and correct the error in the given line. I prefer the chocolate pudding than the vanilla truffle anyday. Option No. Error Correction (A) prefer preferred (B) the an (C) than to (D) anyday everyday", "answer": "Error: than -> Correction: to. Use the preposition the word actually demands: prefer X to Y, superior to, different from/between, for->to before purpose, in->between two things, by->from, into->in. Learn the fixed verb+preposition pairs.", "explanation": "Preposition error: yeh fixed pairs ka khel hai - ratt-na padta hai! prefer A TO B, superior/inferior TO, different FROM, married TO. Kisi kaam ka MAQSAD batane ke liye 'to + verb' aata hai, 'for + verb' galat (For avoid -> To avoid). Do cheezon ke beech = BETWEEN (not of/among). Hook: ek list bana lo top 15 verb+preposition jodi ki aur roz dohrao.", "years": ["2023", "2024", "2025", "2026"], "papers": 14, "raw": 40, "marks": 1, "types": ["Grammar"], "score": 33}, {"key": "WR2-346", "chapter_code": "WR2", "chapter_name": "Analytical Paragraph", "unit": "Writing", "topic": "From a table", "question": "The chart below gives the percentage of social media users by age in India in 2020. Write a paragraph analysing the given information in 100-120 words. [VISUAL: Table titled \"Internet Activities by Age Group\" with rows for Activity % (Get News, Online games, Downloads, Product research, Buying a product, Searching for people) and columns for Age Group (Teens, 20s, 30s, 40s, 50s, 60s, 70+) with corresponding percentages.]", "answer": "STRUCTURE (single paragraph, 100-120 words, formal, linking words, NO opinions):\n1) OPENING line — introduce the table: 'The table presents the percentage of social-media users by age in India in 2020…' (say what the rows and columns represent).\n2) BODY (2-3 sentences) — pick out KEY figures: the highest and lowest in the table, then COMPARE across the categories/columns ('among teens, getting news tops at X%, whereas buying a product is lowest at Y%'; for two-period tables note increase/decrease over the years; for pros-cons/comparison tables state the main advantages of one vs the other). Quote figures exactly; don't list every cell — select the striking ones.\n3) CLOSING line — an INFERENCE: 'Thus the data reveals that…' / 'Overall, … emerges as the most preferred/affected…'.\nMarking: Content 2, Organisation/data-coverage 2, Accuracy 1. ONE paragraph only.", "explanation": "Table wale question mein ghabrao mat — har cell mat likho! Pehle ek line: table kis cheez ka data hai (rows aur columns kya hain). Phir highest & lowest figure uthao, aur columns/age-groups ke beech compare karo ('teens me sabse zyada, 60+ me sabse kam'). Do-saal wali table ho to badha/ghata bolo; pros-cons table ho to dono ka comparison do. End me 'is prakar, data dikhata hai ki…' — ek inference. Trick: select karo, sab mat batao — strong numbers hi marks dilate hain. Ek paragraph, no personal opinion, 100-120 words.", "years": ["2023", "2024", "2025", "2026"], "papers": 14, "raw": 35, "marks": 5, "types": ["Paragraph"], "score": 31}, {"key": "RD1-331", "chapter_code": "RD1", "chapter_name": "Discursive Passage (skills)", "unit": "Reading", "topic": "True/False", "question": "Even when the prediction is accurate, people do not evacuate the places where the warning is given. (a) True (b) False", "answer": "STRATEGY (skill-practice): Treat True/False (and 'which statement is false', fact-check) as a match-against-text job. Find the exact line the statement is based on and compare meaning word by word. If every part agrees with the passage -> True; if even one detail is changed, added, reversed or not mentioned -> False. Watch absolute words ('only', 'always', 'never') and don't rely on outside knowledge - decide strictly by what the passage says.", "explanation": "True/False (aur 'which is false') mein har statement ko passage ki line se milao. Sab kuch match kare to True; agar ek bhi detail badli, ulti ya add ki gayi ho, ya passage mein hai hi nahi, to False. 'only/always/never' jaise strong words se savdhaan raho. Apni general knowledge nahi, sirf passage jo kehta hai wahi maano.", "years": ["2023", "2024", "2025", "2026"], "papers": 13, "raw": 40, "marks": 1, "types": ["Reading-MCQ", "Reading-SA"], "score": 38}, {"key": "GR1-193", "chapter_code": "GR1", "chapter_name": "Tenses", "unit": "Grammar", "topic": "Simple past (completed action)", "question": "Complete the given narrative with the correct option to fill in the blank. Yesterday, Tanu walked to the park and __________ a breezy evening. (A) to enjoying (B) will enjoy (C) enjoyed (D) did enjoyed", "answer": "enjoyed — Simple past (V2) is used for an action finished at a definite past time (yesterday, last week/year, in 1872) and to narrate a sequence of past events. Use the correct irregular form (swore, gave, began) and never 'did + V2'.", "explanation": "Jab kaam past mein khatam ho chuka ho — yesterday, last week, last year, kal ki kahani — tab Simple Past (verb ki second form: walked, enjoyed, started, purchased) use karo. Irregular verbs ratta maar lo: swear→swore, give→gave, begin→began (NOT 'sweared'/'gived'). Trap: 'did enjoyed' galat hai — 'did' ke baad hamesha plain verb (did enjoy), warna sirf 'enjoyed'.", "years": ["2023", "2024", "2025", "2026"], "papers": 13, "raw": 31, "marks": 1, "types": ["Grammar"], "score": 29}, {"key": "GR7-227", "chapter_code": "GR7", "chapter_name": "Editing / Error Correction", "unit": "Grammar", "topic": "Tense error", "question": "Select the option that identifies the error and supplies the correction for the line given below : He usually ate breakfast before he goes to school. Options Error Correction (A) usually always (B) ate eats (C) before after (D) goes went", "answer": "Error: ate -> Correction: eats. Wrong verb tense for the context: a habitual/present-truth sentence must use simple present (and was->is, had->have, drove->drives, should/ought/may swaps follow the same 'match the time of the sentence' rule).", "explanation": "Tense error spot karne ke liye sentence ka TIME pakdo - kya yeh aadat/universal truth hai (present), beet gaya (past), ya hone wala hai (future)? Universal facts hamesha present mein: 'Water IS vital' (was galat). Modal galat ho to context dekho - advice/possibility = can/may. Memory hook: 'jab time badle, verb bhi badle.' Ek hi line mein do time mix mat hone do.", "years": ["2023", "2024", "2025", "2026"], "papers": 12, "raw": 30, "marks": 1, "types": ["Grammar"], "score": 24}, {"key": "GR2-203", "chapter_code": "GR2", "chapter_name": "Modals", "unit": "Grammar", "topic": "Obligation/advice (should/must/ought)", "question": "Select the correct option to fill in the blank for the given line from school notice board : Students .................... walk silently in the corridor during class hours. (a) should (b) may (c) must (d) would", "answer": "'should/ought to' = advice or moral duty ('One SHOULD read the newspaper', 'You SHOULD be on time', 'Students SHOULD report'); 'must' = strong compulsion/rule ('Drivers MUST wear helmets', 'You MUST keep your promise', 'You MUST add eggs', 'mandatory'). In editing, a too-strong 'must' for mild advice becomes 'can/may'; a too-weak 'should' for a rule stays as advice. Rule: should/ought to = should-do; must = have-to.", "explanation": "Yeh sabse bada group hai. 'Should/ought to' = salah ya farz — 'One should read the newspaper daily', 'Students should report'. 'Must' = pakki majboori ya niyam — 'Drivers must wear helmets', 'You must keep your promise'. Notice/poster/rule ho toh aksar must/should. Editing trick: agar 'must' bahut strong lag raha hai halki salah ke liye toh correction 'can/may' (jaise yoga 'can' help, not 'must'). Memory hook: SHOULD = behtar hai, MUST = karna hi padega.", "years": ["2023", "2024", "2025", "2026"], "papers": 11, "raw": 27, "marks": 1, "types": ["Grammar"], "score": 21}, {"key": "WR2-345", "chapter_code": "WR2", "chapter_name": "Analytical Paragraph", "unit": "Writing", "topic": "From a bar/line/pie chart", "question": "The following pie chart shows the major causes of air pollution in metropolitan cities in India. Study the data and write an analytical paragraph in 100-120 words. [VISUAL: Pie chart showing Air Pollution in Metropolitan Cities in India with categories: Industries, Vehicles, Domestic, Dust & Construction, Others]", "answer": "STRUCTURE (single paragraph, 100-120 words, formal, NO 'I think'/opinions, use linking words):\n1) OPENING line — name what the chart/graph shows: 'The given pie chart/bar graph depicts the major causes of air pollution in metropolitan cities…' (state title, source/year & the variable measured).\n2) BODY (2-3 sentences) — report the data: state the HIGHEST value first ('Vehicles account for the largest share at X%'), then the LOWEST, then 1-2 notable comparisons or trends ('twice as much as…', 'rose steadily from 2019 to 2022', 'while … only …'). Quote the figures/percentages exactly from the visual.\n3) CLOSING line — a concluding INFERENCE drawn from the data ('Clearly, … is the dominant factor, indicating the urgent need for…'). One inference, not a personal feeling.\nMarking: ~Content 2, Organisation/coverage of data 2, Accuracy (grammar/spelling) 1. Keep it ONE paragraph, present tense for the chart, exam-ready.", "explanation": "Beta, chart/graph wale prompt mein pehli line hamesha yeh batao ki chart kya dikha raha hai — title + units + saal. Phir sabse zaroori: SABSE BADA (highest) aur SABSE CHHOTA (lowest) value naam karo, aur 1-2 comparison do ('iska double', 'lagataar badha'). Numbers/percentages chart se hu-be-hu copy karo, apne mann se mat banao. Last line ek inference — 'data se saaf hai ki…'. Apni rai (I feel/I think) mat likhna, sirf data bolega. Memory hook: 'SHEL' — Shuru me chart-name, Highest, lowest, End me inference. Ek hi paragraph, 100-120 words.", "years": ["2023", "2024", "2025"], "papers": 11, "raw": 31, "marks": 5, "types": ["Paragraph"], "score": 18}, {"key": "WR1-343", "chapter_code": "WR1", "chapter_name": "Formal Letter", "unit": "Writing", "topic": "Application/request to an official", "question": "You are Sumitra / Sumit, a student preparing for a college entrance exam. Your friends and you are struggling to get resources that would support your academic journey. Write a letter to the Chief Education Officer of your city requesting him to set up a public library. Highlight how it would provide crucial resources, books, digital access to online books and research. It would also create a welcoming space and host opportunities for both young and old to gather, read, and connect with others.", "answer": "FORMAT SKELETON (write in 100-120 words). 1) Sender's address. 2) Date. 3) Receiver: the official/head you are requesting -- e.g. 'The Principal / The President, RWA / The Director, <dept> / The Chief Education Officer / The Ministry of Health', with address. 4) Salutation: 'Sir/Madam,'. 5) Subject line stating the request/proposal (e.g. 'Subject: Request to set up a public library'). 6) BODY in 3 paras -- Para1: who you are + the purpose/request; Para2: WHY it is needed -- the benefits/importance (and your views); Para3: specific ask -- permission / setting it up / a workshop / appreciation, plus how it can be implemented. 7) Close: 'Yours sincerely/faithfully,' + signature + name. CONTENT: unlike a complaint, this PROPOSES or REQUESTS something positive (a facility, permission, programme, or appreciation) -- tone is persuasive and respectful, focusing on benefits to the community.", "explanation": "Yeh 'request/application to an official' hai -- complaint nahi. Yahan tum kisi official (Principal, RWA President, Director, CEO) se kuch ACHHA karne ki guzaarish karte ho: nayi facility, permission, workshop, ya appreciation. Format same rehta hai: address, date, officer ka designation+address, 'Sir/Madam,', SUBJECT 'Request to...', aur 'Yours sincerely/faithfully' + naam. Body ka dil: kaam kyun zaroori hai aur uske BENEFITS -- persuasive aur polite tone. Memory hook: complaint = shikayat, request = guzaarish/proposal. Benefits + implementation zaroor likho. 100-120 words.", "years": ["2023", "2024", "2025", "2026"], "papers": 10, "raw": 14, "marks": 5, "types": ["Letter"], "score": 29}, {"key": "RD1-332", "chapter_code": "RD1", "chapter_name": "Discursive Passage (skills)", "unit": "Reading", "topic": "Main idea / title", "question": "Select the most suitable title for the above passage : (a) Avalanches (b) Adventure with Snow (c) Ice Games (d) Calamity", "answer": "STRATEGY (skill-practice): Title / main idea / message must cover the WHOLE passage, not one paragraph. Ask 'what is the writer mainly talking about throughout?'. Reject options that are too narrow (one detail only) or too broad/off-topic. A good title is short, relevant and catchy and usually echoes the most-repeated idea/keyword. For 'message conveyed', state the central lesson in one clear line.", "explanation": "Title ya main message poore passage ko cover karna chahiye, sirf ek para ko nahi. Socho 'writer mukhya roop se kis baare mein baat kar raha hai?'. Bahut chhota (ek detail) ya off-topic option chhod do. Acha title short, relevant aur jo idea baar-baar aaya ho usi se juda hota hai. Memory hook: jo keyword sabse zyada repeat ho, title usi ke aas-paas hota hai.", "years": ["2023", "2024", "2025", "2026"], "papers": 10, "raw": 29, "marks": 1, "types": ["Reading-MCQ"], "score": 25}, {"key": "RD2-336", "chapter_code": "RD2", "chapter_name": "Case-based / Factual Passage (skills)", "unit": "Reading", "topic": "Data/visual interpretation", "question": "Based on the table, which three countries were at par with each other in terms of mango import from India in 2019-20?", "answer": "This whole section is SKILL-PRACTICE, not memorisation: the passage/data change every year, so practise the technique, not the content. STRATEGY (reading a chart/table/pie/graph): 1) Read the TITLE and the axis/column/legend labels first — they tell you what is being measured. 2) Note the UNITS (%, numbers, years). 3) For 'maximum/minimum/highest/lowest' questions, compare values and pick the biggest/smallest bar, slice or cell. 4) For 'at par / same' questions, find rows/bars of equal value. 5) For pie charts, bigger slice = bigger share. 6) If asked to 'identify a reason/cause', just lift the labelled category. Always answer with the exact label/value shown — don't estimate vaguely.", "explanation": "Chart/table wale sawaal mein pehle TITLE aur labels (axis/column/legend) padho — yeh batate hain kya measure ho raha hai. Units dhyan se dekho (%, saal, numbers). 'Maximum/highest' poocha to sabse badi value/slice/bar pick karo, 'minimum/lowest' to sabse chhoti. 'At par/same' matlab barabar values dhoondho. Pie chart mein badi slice = zyaada hissa. Jo exact label/number diya hai wahi likho, andaaza mat lagao.", "years": ["2023", "2024", "2025", "2026"], "papers": 10, "raw": 36, "marks": 1, "types": ["Reading-MCQ", "Reading-SA"], "score": 20}, {"key": "RD2-339", "chapter_code": "RD2", "chapter_name": "Case-based / Factual Passage (skills)", "unit": "Reading", "topic": "Analogy", "question": "Complete the following analogy correctly with a word / phrase from the paragraph 5. organized : chaotic : : lowest : _______ Clue : Just as organized is an antonym of chaotic, lowest is an antonym of _______.", "answer": "This whole section is SKILL-PRACTICE, not memorisation: the passage/data change every year, so practise the technique, not the content. STRATEGY: An analogy A : B :: C : ? means 'A relates to B in the SAME WAY C relates to ?'. 1) Work out the relationship in the first pair (synonym? antonym? part-whole? cause-effect? degree?). 2) The clue often states it (e.g. 'organized is an antonym of chaotic'). 3) Apply the SAME relationship to the third word and find the matching word — usually from the named paragraph/table. Example: organized : chaotic :: lowest : peak (antonyms). Keep the relationship identical, not just 'related'.", "explanation": "Analogy ka matlab: A:B me jo rishta hai, wahi rishta C:? me hona chahiye. Pehle pehle jode ka relation pakdo — synonym, antonym, part-whole, cause-effect ya degree. Clue aksar bata deta hai (jaise 'organized, chaotic ka antonym hai'). Wahi same relation teesre word pe lagao aur passage/table se matching word dhoondho. Bas 'related' nahi — bilkul same type ka rishta hona chahiye.", "years": ["2023", "2024", "2025"], "papers": 10, "raw": 30, "marks": 1, "types": ["Reading-SA"], "score": 16}, {"key": "GR2-202", "chapter_code": "GR2", "chapter_name": "Modals", "unit": "Grammar", "topic": "Prediction/future (will/shall)", "question": "Fill in the blank by choosing the correct option to complete the part of a notice, posted on a school notice board. As per the given schedule, the Students Council election of the school for the current session ___________ held on 23rd May at 2·30 pm. (A) may be (B) should be (C) can be (D) will be", "answer": "'will' = certain future / prediction / fixed plan ('there WILL be diversion', 'election WILL be held', 'you WILL enjoy 10% off', 'tourists WILL be fined'). 'Will you help me?' = polite request. In editing, a wrong 'can/must' showing certainty is corrected to 'will'. 'would' = confident prediction with evidence ('She surely WOULD pass').", "explanation": "'Will' use karo jab future pakka ho — prediction ya schedule: 'there will be a diversion', 'you will enjoy 10% off'. 'Will you help me?' polite request bhi hota hai. Editing mein agar galti se 'can/must' likha ho jahan certainty chahiye, toh correction 'will' hoti hai. Aur 'She surely would pass' — yahan evidence ke saath confident prediction hai. Memory hook: pakka future = WILL, surely + proof = WOULD.", "years": ["2023", "2024", "2025", "2026"], "papers": 9, "raw": 19, "marks": 1, "types": ["Grammar"], "score": 20}, {"key": "PM3-265", "chapter_code": "PM3", "chapter_name": "A Tiger in the Zoo", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "Draw a comparison between the tiger in the zoo and in the forest. / In what ways does the contrast between the tiger's natural habitat and its confinement enhance the poem's exploration of captivity and its consequences?", "answer": "The poem's heart is the contrast of FREEDOM vs CAPTIVITY. In the zoo the tiger is confined to a few steps behind bars, an object of display, restless with 'quiet rage', deprived of habitat, hunting and freedom. In the forest he would roam majestically, lurk near the water hole to hunt deer, snarl at houses and terrorise villagers. This contrast critiques human cruelty in caging wild animals and highlights the jungle as his true home.", "explanation": "Ye poem ka DIL hai: freedom vs captivity. Zoo wala tiger = cage mein band, bas object of display, 'quiet rage' mein restless, na shikaar na aazaadi. Jungle wala tiger = majestic, deer ka shikaar, gaon walon ko darata. Poet keh raha hai janglee jaanwar ko cage mein band karna kroorta hai. Hook: theme ek line mein — 'qaid ka dukh, aazaadi ki tadap'. Har contrast/comparison question mein zoo-side aur forest-side dono likho.", "years": ["2023", "2024", "2025", "2026"], "papers": 9, "raw": 19, "marks": 3, "types": ["Extract-MCQ", "Extract-SA", "Literature-SA"], "score": 20}, {"key": "GR1-192", "chapter_code": "GR1", "chapter_name": "Tenses", "unit": "Grammar", "topic": "Simple present / habitual & subject-verb agreement", "question": "Reena always ______ the truth. (a) speak (b) speaks (c) will speak (d) speaking", "answer": "speaks — Simple present (base verb + -s for he/she/it/singular) is used for habits, general truths, and timeless facts (always, usually, every day). The verb must agree with its subject; a base/plain verb is used in slogans/imperatives and after 'Let's' (ensure, make).", "explanation": "Beta, jab kaam habit ho ya hamesha sach ho (always, usually, every day, general fact) tab Simple Present lagta hai. Yaad rakh: he/she/it ya singular subject ke saath verb mein '-s' lagao (Reena speaks, the report explains), par I/you/we/they ke saath plain verb. Common trap: 'always/usually' dekh ke past mat likhna, aur subject singular hai to '-s' kabhi mat bhoolna.", "years": ["2023", "2024", "2025"], "papers": 9, "raw": 15, "marks": 1, "types": ["Grammar"], "score": 17}, {"key": "GR1-195", "chapter_code": "GR1", "chapter_name": "Tenses", "unit": "Grammar", "topic": "Simple past vs past perfect (sequence / background)", "question": "Complete the given sentence by filling in the blank with the correct option. After she ___________ her homework, Anaisha finally relaxed and watched a movie with her friends.", "answer": "had finished — Past perfect (had + V3) marks the earlier of two past actions, used with before/after/when to show which happened first. Past continuous (was/were + V-ing) sets a background action in progress in the past (the candle still burning, the passenger sitting).", "explanation": "Do past kaam ho aur batana ho kaun PEHLE hua, to pehle wale par Past Perfect: had + third form (After she HAD finished... then relaxed; HAD walked before it reached). Aur jo kaam past mein chal hi raha tha (background) us par Past Continuous: was/were + verb+ing (candle still burning, passenger sitting). Trap: 'before/after/when' + earlier action = 'had' + V3, simple past nahi.", "years": ["2023", "2024", "2025", "2026"], "papers": 8, "raw": 19, "marks": 1, "types": ["Grammar"], "score": 22}, {"key": "FP5-63", "chapter_code": "FP5", "chapter_name": "Glimpses of India", "unit": "First Flight: Prose", "topic": "Character sketch (A Baker from Goa)", "question": "\"During our childhood in Goa, the baker used to be our friend, companion and guide.\" What does this statement imply in relation to the character of the baker? (Glimpses of India – A Baker from Goa)", "answer": "The pader (traditional Goan baker) was a friend, companion and guide — sociable, regular (visiting twice a day), and genuinely interested in the children's lives and good conduct. He heralded his arrival with the jingling 'jhang-jhang' of his bamboo staff; children rushed out for bread-bangles and sweet bread. Baking was so profitable that his plump, jackfruit-like physique symbolised prosperity — his family never starved. His old kabai-and-trousers costume and musical entry evoke warm nostalgia.", "explanation": "Baker ka pura character ek jagah: friend-companion-guide, jhang-jhang bamboo se aata, bachche bread-bangles ke liye bhaagte. Mota (jackfruit jaisa) = khushhaali ka symbol, family kabhi bhookhi nahi rahi. Dress: pehle kabai, baad mein lambe shorts + shirt. Hook: 'Jhang-jhang, bread-bangles, jackfruit body.' Jo bhi poocha jaaye, in details mein se chuno.", "years": ["2023", "2024", "2025", "2026"], "papers": 8, "raw": 14, "marks": 3, "types": ["Literature-SA"], "score": 21}, {"key": "GR3-211", "chapter_code": "GR3", "chapter_name": "Subject–Verb Concord", "unit": "Grammar", "topic": "Singular/plural subject (basic agreement)", "question": "Select the option that identifies the error and supplies the correction. My pet dog are very playful", "answer": "Basic rule: singular subject → singular verb (is/was/has/-s form); plural subject → plural verb (are/were/have/base form). 'My pet dog IS' (error are→is); 'cat is'; 'performance WAS' (error were→was); 'board INVITES' (error invite→invites); 'stars SHINE'; 'Mobile phones HAVE' (error has→have); 'we CARRY' (error carries→carry). With 'there', verb agrees with the following noun: 'there ARE vendors'.", "explanation": "Sabse basic concord: singular subject ke saath singular verb (is/was/-s), plural subject ke saath plural verb (are/were). Singular ke saath verb me 's' lagta hai (dog runs), plural ke saath nahi (dogs run) — ulta English ka rule! 'There' wale me verb baad wale noun se milta hai (there ARE vendors). Hook: ek subject = verb me 's', many subjects = verb me no 's'. Editing me yahi galti sabse common hai.", "years": ["2023", "2024", "2025", "2026"], "papers": 8, "raw": 8, "marks": 1, "types": ["Grammar"], "score": 18}, {"key": "GR1-194", "chapter_code": "GR1", "chapter_name": "Tenses", "unit": "Grammar", "topic": "Present perfect (continuous) — since/for", "question": "Fill in the blank with the correct option. Heena _______ from fever since last Sunday. (a) suffered (b) will suffer (c) suffer (d) has been suffering", "answer": "has been suffering — Present perfect continuous (has/have been + V-ing) shows an action that started in the past and is still continuing, signalled by 'since' (point of time) or 'for' (duration). Plain present perfect (has/have + V3, e.g. 'has won', 'have taken') is used for a just-completed action whose result matters now, often in news/result updates.", "explanation": "'Since' ya 'for' dikhe aur kaam abhi tak chal raha ho to Present Perfect Continuous: has/have been + verb+ing (since last Sunday → has been suffering, since morning → haven't eaten). Bas-bas khatam hua kaam jiska asar abhi hai (news, result) to simple Present Perfect: has/have + third form (has won, have taken). Memory hook: SINCE = ek point se, FOR = kitni der — dono perfect maangte hain, present simple/past nahi.", "years": ["2023", "2024", "2026"], "papers": 8, "raw": 16, "marks": 1, "types": ["Grammar"], "score": 17}, {"key": "GR1-198", "chapter_code": "GR1", "chapter_name": "Tenses", "unit": "Grammar", "topic": "Non-finite verb forms (gerund / infinitive / participle)", "question": "Complete the given sentence with the correct form of verb. It is important to ___________ a healthy atmosphere. (A) creates (B) creating (C) create (D) created", "answer": "create — Non-finite forms don't change with tense: use 'to + base verb' (infinitive) after 'It is important to...', and the gerund 'V-ing' after a preposition (thank you for considering, months on treating, keep surprising). After a modal use the base verb (would organise).", "explanation": "Yahan tense nahi, verb ka SAHI ROOP test hota hai. Rule: 'to' ke baad plain verb — to create, to teach (infinitive). Kisi bhi PREPOSITION (for, on, of, in) ke baad verb+ing — 'thank you for considering', 'spent months on treating', 'keep surprising'. Aur modal (would/will/can) ke baad bhi plain verb — 'would organise'. Hook: preposition+ -ing, to + base, modal + base.", "years": ["2023", "2024", "2025"], "papers": 8, "raw": 16, "marks": 1, "types": ["Grammar"], "score": 17}, {"key": "GR8-233", "chapter_code": "GR8", "chapter_name": "Gap-filling / Transformation", "unit": "Grammar", "topic": "Gap-filling (cloze)", "question": "Complete the given narrative, by filling in the blank with the correct option : The chance to mentor a group of underprivileged students helped me ______ the educational disparities in our society.", "answer": "Method: choose the right non-finite verb form (gerund -ing / to-infinitive / bare infinitive / participle) that fits the structure. Sample: 'helped me (to) understand' -> to understand. Others: started turning, made me realize (bare inf after 'made'), wishes to ensure, key to preserve, had me feeling.", "explanation": "Yahan verb ka SAHI roop chunna hai — kab 'to + verb', kab '-ing', kab plain verb. Rule yaad rakh: 'help/want/wish' ke baad to-infinitive, 'make/let/had' ke baad plain verb (made me realize, NOT to realize), aur 'started/kept/busy' ke baad -ing. Galti tab hoti hai jab structure ignore karke meaning se guess karte hain — pehle verb-pattern dekho.", "years": ["2023", "2024", "2025"], "papers": 8, "raw": 13, "marks": 1, "types": ["Grammar"], "score": 17}, {"key": "WR1-344", "chapter_code": "WR1", "chapter_name": "Formal Letter", "unit": "Writing", "topic": "Letter of enquiry/order/placement", "question": "You are Soumya/Soham, living at 43-B, Blue Apartments, Prashant Lok. You wish to take up a three-week summer course in baking after finishing your class X board exams. Write a letter in about 120 words, to the Principal of Excellent Cooking, Block-D, Mahesh Enclave, seeking information about the course structure, course duration, fees, class timings, on job trainings etc.", "answer": "FORMAT SKELETON (write in 100-120 words). 1) Sender's address. 2) Date. 3) Receiver: the person who can give the info / supply goods -- e.g. 'The Director / The Principal / The Manager, <institute/company>', with address. 4) Salutation: 'Sir/Madam,'. 5) Subject line (e.g. 'Subject: Enquiry about summer baking course' OR 'Subject: Order for office furniture'). 6) BODY in 2-3 paras -- ENQUIRY: state interest, then ask the specific details (eligibility, duration, fees, timings, course/tour itinerary) -- a neat point-wise list scores well; ORDER: refer to your earlier enquiry/quotation, then give item, quantity, quality/specifications, mode of payment, delivery date and discount; close requesting an early reply. 7) Close: 'Yours faithfully,' + signature + name. CONTENT: purpose is to GATHER INFORMATION or PLACE AN ORDER -- be precise and list every detail asked for.", "explanation": "Enquiry/order letter ka maqsad: ya to details maangna (course, tour, admission ki fees, duration, eligibility) ya order place karna. Yeh Director/Principal/Manager ko jaata hai, editor ko nahi. Trick: jitne points poochhe hain unhe POINT-WISE list karo -- examiner ko saaf dikhe, har point ka maark milta hai. Order ho to quantity, quality, payment mode, delivery date aur discount mat bhoolna, aur purani enquiry ka reference do. Format marks: address, date, receiver, 'Sir/Madam,', SUBJECT, 'Yours faithfully' + naam. Memory hook: 'enquiry = saare sawaal point-wise, order = quantity+payment+delivery+discount'. 100-120 words.", "years": ["2023", "2024", "2025", "2026"], "papers": 8, "raw": 14, "marks": 5, "types": ["Letter"], "score": 15}, {"key": "PM5-280", "chapter_code": "PM5", "chapter_name": "The Ball Poem", "unit": "First Flight: Poems", "topic": "Central theme / message", "question": "The Ball Poem initially appears simple but it is actually quite impactful and intense. Comment upon the theme of The Ball Poem.", "answer": "On the surface a boy loses his ball, but the poem is really about loss, growing up and transformation. Facing his first real loss, the boy moves from shaking grief to learning the 'epistemology of loss' — he senses his 'first responsibility', realises some things once gone can't be bought back, and matures from innocence to awareness.", "explanation": "Theme ek line mein yaad rakh: 'ball ka loss = childhood/innocence ka loss, aur growing up ki pehli seekh.' Boy ka journey hai shaking grief se 'he is learning' tak — yaani loss ko accept karna aur responsibility samajhna. Memory hook: ball gaya, par bachpan ka maturity wala lesson mil gaya. 3-marker mein loss + responsibility + maturity teeno point likhna.", "years": ["2024", "2025", "2026"], "papers": 7, "raw": 12, "marks": 3, "types": ["Extract-SA", "Literature-SA"], "score": 21}, {"key": "FP7-77", "chapter_code": "FP7", "chapter_name": "Madam Rides the Bus", "unit": "First Flight: Prose", "topic": "Character sketch", "question": "Valli was an extra-ordinary girl who had self-confidence and courage to realise her ambition by planning and drawing on her spirit of adventure. Discuss in reference to the chapter 'Madam Rides the Bus'.", "answer": "Valli is a curious, self-confident and self-respecting eight-year-old. Friendless, she finds joy in watching the world from her doorway. She is resourceful and disciplined - saving money and gathering information - and behaves maturely and proudly on the bus, even refusing the conductor's free drink. Seeing the dead cow, she shows sensitivity, growing from innocence to maturity.", "explanation": "Valli ka character = curious + confident + self-respecting + mature. Har trait ke saath ek example jodo (free drink mana ki = swabhiman; cow dekh ke chup = sensitivity). Memory hook: 'Chhoti umar, badi soch'. Tip: character sketch mein adjectives akele mat likho - text se proof do, warna examiner marks kaat dega.", "years": ["2023", "2025", "2026"], "papers": 7, "raw": 13, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 17}, {"key": "RD2-338", "chapter_code": "RD2", "chapter_name": "Case-based / Factual Passage (skills)", "unit": "Reading", "topic": "Main idea / title", "question": "Select the most suitable title from the following for the passage: (a) Water Shortage. (b) New Ways to Pool Water. (c) Artificial Glacier. (d) River Beds.", "answer": "This whole section is SKILL-PRACTICE, not memorisation: the passage/data change every year, so practise the technique, not the content. STRATEGY: The title/main idea must cover the WHOLE passage, not one detail. 1) Ask 'what is the passage mostly about?' — the repeated subject. 2) Reject options that are too narrow (only one paragraph) or too broad/off-topic. 3) A good title is short, catchy and central. For 'match headings to paragraphs', read each paragraph's first/last line (topic sentence) and pair it with the heading that sums up that paragraph. Pick the option where ALL pairs fit.", "explanation": "Title/main idea poore passage ko cover karna chahiye, sirf ek detail ko nahi. Socho passage 'zyaadatar kis baare mein hai' — wahi central idea hai. Jo option bahut chhota (ek hi para) ya topic se hat ke ho, use hata do. Heading-matching mein har paragraph ki pehli/aakhri line (topic sentence) padho aur sahi heading jodo — wahi option chuno jisme saare jode fit ho.", "years": ["2023", "2024", "2026"], "papers": 7, "raw": 24, "marks": 1, "types": ["Reading-MCQ", "Reading-SA"], "score": 13}, {"key": "FW5-140", "chapter_code": "FW5", "chapter_name": "Footprints Without Feet", "unit": "Footprints Without Feet", "topic": "Central theme / message", "question": "‘Brilliant scientist though he was, Griffin was rather a lawless person.’ Elaborate. (Footprints without Feet)", "answer": "Griffin was a brilliant scientist who discovered invisibility, but he misused this gift for selfish, criminal ends. He set fire to his landlord's house in revenge, stole money and goods from shops and a clergyman, and assaulted people including a constable. His genius faded before his greed, arrogance and lawlessness; he did nothing for humanity's good, proving science is dangerous in immoral hands. (approx 50 words)", "explanation": "Yeh chapter ka DIL hai - science galat haath mein ho toh khatarnaak hai. Griffin genius tha par bina ethics ke, isliye uski brilliance uske crimes ke aage feeki pad gayi. Memory hook: 'Brilliant but Lawless' - dono side ek line mein likhna. Examples zaroor do (aag, chori, constable maara), tabhi full marks. Yeh theme 12+ baar aaya hai, pakka ratto.", "years": ["2024", "2025", "2026"], "papers": 6, "raw": 12, "marks": 6, "types": ["Literature-LA", "Literature-SA"], "score": 18}, {"key": "GR1-196", "chapter_code": "GR1", "chapter_name": "Tenses", "unit": "Grammar", "topic": "Future (simple / passive / perfect continuous)", "question": "Fill in the blank by choosing the correct option to complete an announcement on a flight. In thirty minutes, our flight attendants ________ meal service. (A) will began (B) will begin (C) should begin (D) can begin", "answer": "will begin — Future simple is 'will + base verb' (will begin, will arrive) for an action yet to happen. Future passive = 'will be + V3' (will be held). Future perfect continuous = 'will have been + V-ing' for a duration completed by a future point (By July you will have been living... for three years).", "explanation": "Aane wala kaam = 'will' + plain verb (will begin, will arrive). Dhyan: 'will' ke baad hamesha base form aati hai — 'will began' GALAT, 'will begin' sahi. Notice/event jo karaya jaayega = will be + third form (will be held). 'By + future time' + kitne saal/ghante chal raha hoga to Future Perfect Continuous: will have been + verb+ing. Hook: future ka matlab 'will' — base verb pakka.", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 14, "marks": 1, "types": ["Grammar"], "score": 17}, {"key": "FP7-76", "chapter_code": "FP7", "chapter_name": "Madam Rides the Bus", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "Whenever we want to achieve something, difficulties always come in our way. What did Valli have to do to go and ride in a bus?", "answer": "To ride the bus, Valli planned discreetly and patiently. She listened to neighbours' and passengers' talk to learn the fare (30 paise one way), the timing (about 45 minutes each way) and the route. She saved sixty paise by resisting toys, peppermints, balloons and the merry-go-round, and timed her secret trip during her mother's afternoon nap.", "explanation": "Yeh poora group Valli ki PLANNING ke baare mein hai - paisa, info aur timing. Yaad rakho teen cheezein: (1) info gather ki sun-sun ke, (2) 60 paise bachaye temptations chhod ke, (3) maa ke sone ke time nikli. Memory hook: 'Sunna, Bachana, Nikalna'. Common mistake: sirf 'wo bus dekhna chahti thi' mat likhna - steps batao tabhi marks milenge.", "years": ["2023", "2025", "2026"], "papers": 6, "raw": 11, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 16}, {"key": "PM6-297", "chapter_code": "PM6", "chapter_name": "Amanda!", "unit": "First Flight: Poems", "topic": "Tone / mood", "question": "The Speaker's tone is (a) loving (b) hopeful (c) instructive (d) indifferent.", "answer": "The mother/speaker's tone is INSTRUCTIVE, AUTHORITATIVE and reprimanding (nagging, overbearing, dominating) - she keeps giving sharp orders. By contrast, Amanda's own tone while imagining herself as an orphan/mermaid is calm, EXCITED and peaceful. The repeated 'Amanda!' reinforces this scolding, controlling tone.", "explanation": "Do alag tones yaad rakh: MAA ki tone = instructive/authoritative/reprimanding (daatne wali, hukum dene wali). AMANDA ki apni tone fantasy mein = peaceful/excited (khush, shaant). Hook: 'Maa = bossy tone, Amanda = dreamy tone'. MCQ mein maa ke liye loving/relaxed kabhi mat chuno - woh hamesha order de rahi hai.", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 21, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 16}, {"key": "GR8-235", "chapter_code": "GR8", "chapter_name": "Gap-filling / Transformation", "unit": "Grammar", "topic": "Gap-filling (cloze)", "question": "Fill in the blank by choosing the correct option to complete the line from an insurance company brochure. Suitable for someone who wishes to ____________ (insure/assure/ensure) adequate financial backup.", "answer": "Method: pick the confusable word that fits the meaning. Sample: 'ensure' = make certain. Others: access (reach/enter, not assess), assess (judge), compliment (praise, not complement), migrate (animals' seasonal move, not immigrate/emigrate), communication, mandatory (compulsory).", "explanation": "Ye words sunne me same lagte hain par meaning alag: ensure=pakka karna, assure=bharosa dilana, insure=bima; access=pahunch, assess=aankna; compliment=tareef, complement=poora karna; migrate=mausami pravaas. Hook: ek line me meaning yaad kar lo har pair ka. Sentence ka sense lagao aur sahi spelling wala chuno — yahi sabse common confusion hai exam me.", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 13, "marks": 1, "types": ["Grammar"], "score": 15}, {"key": "FP5-61", "chapter_code": "FP5", "chapter_name": "Glimpses of India", "unit": "First Flight: Prose", "topic": "Place / character sketch (Coorg)", "question": "Where is Coorg located? Write any two characteristics of the people of Coorg.", "answer": "Coorg (Kodagu) lies between Mysore and the coastal town of Mangalore in Karnataka. Its people, the Kodavas, are fiercely independent, brave and hospitable, with a strong martial tradition. They are possibly of Greek or Arab descent — their Kuppia dress resembles the Arab Kuffia, and General Cariappa, India's first Army chief, was a Coorgi. They alone may keep firearms without a licence.", "explanation": "Coorg = Mysore aur Mangalore ke beech. Log: bahadur, swabhimaani, mehmaan-nawaz, fighter-blood (martial). Descent ka clue — Kuppia coat ~ Arab Kuffia, aur General Cariappa Coorgi the. Hook: 'Brave + Hospitable + Kuppia=Kuffia.' Location + 2 traits dono likhna mat bhoolna, warna aadhe marks katenge.", "years": ["2023", "2024", "2025", "2026"], "papers": 6, "raw": 8, "marks": 3, "types": ["Literature-SA"], "score": 14}, {"key": "FW4-135", "chapter_code": "FW4", "chapter_name": "A Question of Trust", "unit": "Footprints Without Feet", "topic": "Key incident / plot", "question": "How did the lady in red manage to outsmart and out maneuver the other thief, Horace Danby, by robbing the safe without leaving a single fingerprint ? (A Question of Trust)", "answer": "A woman in a red dress, herself a thief, walked in pretending to be the owner's wife with confident, sophisticated manners. She mentioned his hay fever; distracted and charmed, Horace took off his gloves. She played on his fear of prison and made him open the safe and hand over the jewels. His meticulous plan failed because he trusted her blindly and left fingerprints, so he alone was arrested while she escaped.", "explanation": "Yeh chapter ka asli twist hai — ek chor ko doosre chor ne ulloo banaya. Lady in red confidently ghar ki malkin ban gayi, hay fever ka zikr karke Horace ke gloves utarwa diye, aur jail ke darr ka faayda uthakar safe khulwa liya. Result: uske fingerprints, uski hi giraftari. Memory hook: 'gloves utre = fingerprints chhute = phasa'. Itni saari wording wali questions same ghatna poochti hain — trick + fingerprints + arrest.", "years": ["2023", "2024", "2025"], "papers": 6, "raw": 12, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 14}, {"key": "GR4-215", "chapter_code": "GR4", "chapter_name": "Reported Speech", "unit": "Grammar", "topic": "Reporting a command/request", "question": "Read the conversation between a passenger and the clerk at the ticket counter. The clerk : Where do you want to go ? Passenger : Please give me a ticket to Bhopal. The clerk enquired where the passenger wanted to go. The passenger requested the clerk ____________.", "answer": "'...to give him a ticket to Bhopal.' Rule (command/request): use a reporting verb of order/request (asked/told/requested/ordered/advised) + object + 'to' + base verb. 'Please...'/'Can you...'->'requested...to'; a negative command->'not to'+verb; instructions/advice may use 'should'. No 'that', no '?'.", "explanation": "Order, request ya instruction report karne ke liye 'that' nahi - balki 'to + verb' lagao. Pattern: asked/told/requested/ordered + (kisko) + to + base-verb. 'Please help me park'->'requested him to help him park'; 'Don't go'->'told him not to go'. 'Can you tell me the way' jaisi polite request jab raasta bataaye toh answer 'should' se aa sakta hai ('he should drive...'). Memory hook: 'hukum ya guzaarish = to + verb, na koi that na prashn-chinh'. Common galti: imperative ko 'to'-form ki jagah 'that he should' likh dena.", "years": ["2023", "2025", "2026"], "papers": 6, "raw": 12, "marks": 1, "types": ["Grammar"], "score": 13}, {"key": "GR3-206", "chapter_code": "GR3", "chapter_name": "Subject–Verb Concord", "unit": "Grammar", "topic": "Subject + intervening phrase", "question": "His brother along with his friends ________ leaving for the stadium. (a) are (b) has (c) is (d) were", "answer": "Verb agrees with the REAL subject, not the words in between. 'His brother (singular) along with his friends' = (c) is. Phrases like 'along with', 'with', 'as well as', 'together with' do NOT change the number. Examples: film with...music = appeals; search for...opportunities = is (error are→is); composition = possesses; plastic contribution = is; members of the jury (plural head 'members') = are.", "explanation": "Yeh sabse bada trap hai! Verb hamesha ASLI subject se match karta hai — beech ke phrases (along with, with, as well as, together with) ko ignore kar do. 'Brother along with friends' me asli subject 'brother' hai (singular) → is. Memory hook: subject dhoondo, beech ka kachra hata do, phir verb lagao. 'Members of the jury' me head 'members' plural hai → are.", "years": ["2023", "2024", "2026"], "papers": 6, "raw": 8, "marks": 1, "types": ["Grammar"], "score": 12}, {"key": "GR1-197", "chapter_code": "GR1", "chapter_name": "Tenses", "unit": "Grammar", "topic": "Passive voice (be + past participle)", "question": "Complete the given sentence with the correct form of the verb by selecting the correct option : A case ___________ against the unidentified truck driver for causing damage to the street poles due to negligence and rash driving. (A) was registered (B) is register (C) have been registered (D) may registered", "answer": "was registered — In the passive, the object becomes the subject and the verb is form of 'be' + past participle (V3), with the tense carried by 'be': is launched (present), was registered (past), has been awarded (present perfect), were asked (past). Choose 'be' to match subject and tense.", "explanation": "Passive tab aata hai jab kaam karne wale se zyada kaam khud important ho (A case was registered, the satellite is launched). Formula: sahi roop of BE + verb ki THIRD form. Tense 'be' se aata hai — is/are (present), was/were (past), has/have been (present perfect). Trap: 'is register' / 'were registered' jaisa singular-plural ya teesri form ka mismatch mat karna; subject ke hisaab se be choose karo.", "years": ["2023", "2024", "2026"], "papers": 6, "raw": 8, "marks": 1, "types": ["Grammar"], "score": 11}, {"key": "PM3-260", "chapter_code": "PM3", "chapter_name": "A Tiger in the Zoo", "unit": "First Flight: Poems", "topic": "Tone / mood", "question": "The above lines express the tiger's ______ (resignation / fear / anger / acceptance). / 'He' is in a rage because he is ___ . / 'Quiet rage' refers to the tiger's ___ . / He is lurking in the shadow because ______.", "answer": "The lines express the tiger's anger, frustration and helplessness — a 'quiet rage' at being caged. He is in a rage because he is locked in a cage; 'quiet rage' conveys his helplessness and the word 'stalks' / 'few steps' his frustration. He 'should be' lurking in shadow to hunt prey (a deer) — showing what he longs to do if free.", "explanation": "Tiger ka emotion = gussa + frustration, par 'quiet rage' (dabaa hua gussa) kyunki woh kuch kar nahi sakta. Cage mein band hone se woh restless hai. Jab puchein 'why lurking' — woh shikaar (deer) ke liye ghaat lagata, par ye sirf uski wish hai. Hook: tiger ki feeling = 'quiet rage' = silent gussa, ye poem ka core emotion hai.", "years": ["2023", "2024", "2025"], "papers": 6, "raw": 27, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 9}, {"key": "GR8-232", "chapter_code": "GR8", "chapter_name": "Gap-filling / Transformation", "unit": "Grammar", "topic": "Gap-filling (cloze)", "question": "Fill in the blank by choosing the correct option : The burglar _______ the house when the owners were away. (a) broke up (b) broke away (c) broke into (d) broke down", "answer": "Method: pick the phrasal verb whose particle matches the meaning. Sample: 'broke into' = entered forcibly. Others: shut off (stop supply), brought about (caused), waited on (served), stand by (support), put up (organise), came down with (fell ill), ran into (met by chance), caught up (involved).", "explanation": "Phrasal verbs me asli verb same rehta hai, bas particle (up/off/into/about) meaning badal deta hai. Sentence ka matlab dekho — 'forcibly enter' = broke INTO, 'cause/start' = brought ABOUT, 'fall ill' = came DOWN with. Memory hook: poore vaakya ka sense pakdo, blank ke aas-paas ke shabd hint dete hain. Ratta mat lagao, logic se particle choose karo.", "years": ["2023", "2024"], "papers": 6, "raw": 17, "marks": 1, "types": ["Grammar"], "score": 7}, {"key": "GR5-220", "chapter_code": "GR5", "chapter_name": "Determiners", "unit": "Grammar", "topic": "Demonstratives/possessives", "question": "Fill in the blank by choosing the correct option to complete the concluding line from a school magazine report on a community outreach programme. _________ (Each / All) community member was given a different set of equipment.", "answer": "'Each/Every' = singular noun + singular verb (each member was, each girl must have her). 'All' = plural noun + plural verb (all candidates must carry). 'Several' = more than two but not all (several people attended).", "explanation": "Distributive determiners ka funda — 'each/every' ek-ek karke dekhte hain, isliye SINGULAR noun+verb (Each girl HAS her book). 'All' poore group ke liye, PLURAL (All candidates ARE...). 'Several' = kaafi saare (par sab nahi). Hook: each/every ke baad hamesha singular — 'was/her', 'all' ke baad plural — 'were/their'. Verb dekh ke answer pakad lo.", "years": ["2025", "2026"], "papers": 5, "raw": 15, "marks": 1, "types": ["Grammar"], "score": 19}, {"key": "FP9-99", "chapter_code": "FP9", "chapter_name": "The Proposal (Drama)", "unit": "First Flight: Prose", "topic": "Key incident / plot", "question": "Explain the contention between the Lomovs and the Chubukovs over the ownership of Oxen Meadows. / Lomov and Natalya trade charges over ownership of Meadows. / What reasons did Lomov give to assert ownership? / What was the cause of conflict between Natalya and Lomov?", "answer": "Both families claim Oxen Meadows. Lomov argues the land is legally his, citing documents and the fact that his aunt's grandmother let the Chubukovs' peasants use it free in return for brick-making. Natalya counters that her family has long held and worked the land up to Burnt Marsh. The quarrel (later joined by the dogs dispute) is the play's central conflict, fuelled by pride and stubbornness; it ends only when Natalya, learning of the proposal, instantly concedes the Meadows are his.", "explanation": "Central incident #1: Oxen Meadows ka jhagda. Lomov ke paas 'documents' aur logic hai; Natalya kehti hai zameen generations se humari hai (Burnt Marsh tak). Resolution funny hai: jaise hi Natalya ko proposal ka pata chalta hai, woh foran maan leti hai 'haan tumhare hi hain!'. Hook: zameen se zyada ego ki ladai.", "years": ["2023", "2024", "2026"], "papers": 5, "raw": 5, "marks": 3, "types": ["Literature-SA"], "score": 15}, {"key": "FW2-115", "chapter_code": "FW2", "chapter_name": "The Thief's Story", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "Why does Anil not hand over Hari Singh to the police? / Explain why Anil chose to overlook the breach of trust in spite of being aware of it.", "answer": "Anil is kind, generous and deeply trusting. Knowing Hari is a thief, he still refuses to call the police because he believes punishment would only harden him into a criminal. Instead he gives Hari a second chance, forgives him, promises a regular salary and keeps teaching him - convinced that trust and education, not jail, are the real cure for Hari's thieving. His act reflects empathy and faith in human goodness.", "explanation": "Anil ka character ek shabd mein - 'trusting aur forgiving'. Woh police isliye nahi bulata kyunki sazaa se Hari pakka criminal ban jaata, par maaf karne se sudhar sakta hai. Yeh 'empathy over punishment' wali soch hai. Hook: Anil maanta hai har insaan ke andar achhai hoti hai. Aise question mein 'second chance + education + believes in goodness' teen points zaroor.", "years": ["2023", "2025", "2026"], "papers": 5, "raw": 7, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 15}, {"key": "FW8-171", "chapter_code": "FW8", "chapter_name": "Bholi", "unit": "Footprints Without Feet", "topic": "Central theme / message", "question": "Education is the most important tool for empowering women in society. It plays an important role in social and cultural development. Prove the above statements in the light of the story 'Bholi'.", "answer": "Education is the central force that empowers women, and Bholi's life proves it. Neglected, mocked for her pockmarks and stammer, she was sent to school only because she seemed worthless at home. There, learning gave her confidence, clear speech and self-worth. The same girl who once agreed to marry an old man for her family's honour could now see through Bishamber's greed, reject the dowry-driven match, and choose to support her parents and become a teacher herself. Education turned a timid 'dumb cow' into a self-respecting, independent woman.", "explanation": "Yeh chapter ka DIL hai - 'education empowers women'. Bholi ko pehle koi value nahi deta tha, par padhai ne usse aawaaz aur aatmvishwas diya. Yaad rakho: school se pehle Bholi = darpok, gungi gaay; school ke baad Bholi = bold, dowry ko 'NO'. Memory hook: 'naya hope, nayi life' = education ka gift. Theme ek line mein - padhai ne Bholi ko zubaan aur himmat di.", "years": ["2023", "2025", "2026"], "papers": 5, "raw": 7, "marks": 3, "types": ["Literature-LA", "Literature-SA"], "score": 15}, {"key": "FP6-67", "chapter_code": "FP6", "chapter_name": "Mijbil the Otter", "unit": "First Flight: Prose", "topic": "Character sketch", "question": "Mijbil the Otter is portrayed as an intelligent, friendly and playful animal who thrives on affection. Discuss how these traits are depicted in the story 'Mijbil the Otter' by Gavin Maxwell.", "answer": "Mijbil was intelligent, playful and affection-loving. He invented his own games—juggling marbles, dribbling a rubber ball, splashing water and balancing toys. His joy in the bathwater showed otters' natural love of water. He mimicked children, formed a strong emotional bond with Maxwell and needed constant companionship, proving he thrived on affection.", "explanation": "Mij ka character ek line mein yaad rakh: 'playful + intelligent + affectionate'. Wo apne khel khud invent karta tha (ball, marbles, paani) — yahi uski intelligence aur masti dikhati hai. Hook: 'paani + games + pyaar = Mij'. Jab bhi character ya 'peculiarities of otters' poochhein, ye teen traits + ek example likh do, marks pakke.", "years": ["2024", "2025", "2026"], "papers": 5, "raw": 7, "marks": 3, "types": ["Extract-SA", "Literature-SA"], "score": 14}, {"key": "PM5-286", "chapter_code": "PM5", "chapter_name": "The Ball Poem", "unit": "First Flight: Poems", "topic": "Tone / mood", "question": "What is the significance of the term \"desperate\" used to describe the boy's eyes, and how does it contribute to the overall mood and tone of the poem?", "answer": "Tone is instructive, reflective and matter-of-fact; the speaker is sympathetic, understanding the depth of the boy's loss. 'Desperate' eyes show the boy's helpless yearning, deepening the somber, stoic and sad mood. The mood shifts from happy/playful (ball bouncing 'merrily') to gloomy/grief-stricken once the ball is lost, creating an atmosphere of reflection and acceptance.", "explanation": "Tone/mood ke keywords ratna: tone = instructive/reflective/matter-of-fact aur speaker sympathetic hai. Mood pehle happy/playful, ball girne ke baad sad/gloomy — ye contrast likhna. 'Desperate eyes' = bechain, helpless yearning. Atmosphere = reflection + acceptance (anger/fear nahi). Hook: 'pehle masti, baad mein udaasi.'", "years": ["2024", "2026"], "papers": 5, "raw": 15, "marks": 1, "types": ["Extract-MCQ", "Extract-SA"], "score": 14}, {"key": "FW3-126", "chapter_code": "FW3", "chapter_name": "The Midnight Visitor", "unit": "Footprints Without Feet", "topic": "Character sketch", "question": "Despite his unusual appearance, Ausable's presence of mind helped him get rid of Max. Comment with reference to the story 'The Midnight Visitor'.", "answer": "Ausable was fat, sloppy and far from the glamorous spy image, yet his quick wit and presence of mind made him a brilliant agent. Staying calm under threat, he invented the balcony story and the police knock, turning his own dull hotel room into a trap. He proves appearances are deceptive and intellect beats looks.", "explanation": "Theme ek line mein: 'looks se nahi, dimaag se jeet'. Ausable mota aur slow dikhta tha par presence of mind ka master tha - tension mein bhi calm rehkar kahani bana di. Justify-type hai, toh ek-do traits (calm, witty, spontaneous, resourceful) likh ke balcony+police example se prove kar. Common mistake: sirf plot mat sunaa, character trait pe focus rakh.", "years": ["
